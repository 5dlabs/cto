      - generic [ref=e184]: "05"
    - generic [ref=e185]:
      - paragraph [ref=e186]:
        - text: Research that points directly to buildable products.
        - link "Read more about our take on mass agent networks here." [ref=e187] [cursor=pointer]:
          - /url: https://thecanteenapp.com/analysis/2026/03/27/multi-agent-landscape.html
      - generic [ref=e188]:
        - generic [ref=e189]:
          - generic [ref=e190]:
            - generic [ref=e191]: "01"
            - generic [ref=e192]:
              - link "Debate Primitives for Multi-Agent LLM Collaboration" [ref=e194] [cursor=pointer]:
                - /url: https://github.com/deeplearning-wisc/debate-or-vote
              - link "Li et al., 2025 · UW-Madison" [ref=e196] [cursor=pointer]:
                - /url: https://github.com/deeplearning-wisc/debate-or-vote
          - paragraph [ref=e198]: "Li's work gives us a concrete design question: when should a swarm deliberate vs. aggregate? The hack here is building that decision as an on-chain primitive — the mechanism selector (debate or vote) lives in a smart contract, debate transcripts are hashed and stored as receipts, and payment releases only after the chosen mechanism reaches quorum. This turns a research finding into auditable, trust-minimized coordination infrastructure. The interesting product wedge is selling it to agent runtime providers (e.g. LangGraph, CrewAI) as a drop-in arbitration layer."
        - generic [ref=e199]:
          - generic [ref=e200]:
            - generic [ref=e201]: "02"
            - generic [ref=e202]:
              - link "TurboQuant KV Cache as Agent Memory" [ref=e204] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2504.19874
              - link "Zandieh & Mirrokni · Google Research · 2026" [ref=e206] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2504.19874
          - paragraph [ref=e208]: Extreme KV cache compression may enable agent memory to be stored onchain for the first time. This would give agents verifiable, persistent memory that survives across sessions and providers — no single inference provider controls the memory state. The hack is a PoC that snapshots a compressed KV cache (using TurboQuant's technique) at the end of each agent session, pins it to Arweave/Filecoin with a hash on Solana, and rehydrates it at session start. If retrieval quality holds up at extreme compression ratios, this is the missing piece for truly persistent agent identity.
        - generic [ref=e209]:
          - generic [ref=e210]:
            - generic [ref=e211]: "03"
            - generic [ref=e212]:
              - link "Craftium On-Chain via Rust Game Engine" [ref=e214] [cursor=pointer]:
                - /url: https://github.com/mikelma/craftium
              - link "Mikelma et al. · ICML 2025" [ref=e216] [cursor=pointer]:
                - /url: https://github.com/mikelma/craftium
          - paragraph [ref=e218]: Craftium provides a Minecraft-based framework for building diverse multi-agent environments in a composable way. Can we rewrite the environment core in a Rust-based game engine (Bevy is the obvious choice given its ECS architecture and WASM compilation target)? This creates a permissionless arena for agent training and evaluation.
        - generic [ref=e219]:
          - generic [ref=e220]:
            - generic [ref=e221]: "04"
            - generic [ref=e222]:
              - link "MiroFish as a Prediction Market Oracle" [ref=e224] [cursor=pointer]:
                - /url: https://github.com/camel-ai/oasis
              - link "OASIS + Manifold/Polymarket" [ref=e226] [cursor=pointer]:
                - /url: https://github.com/camel-ai/oasis
          - paragraph [ref=e228]: "OASIS simulates one million agents reacting to a seed event. MiroFish wraps this into a structured report. The gap: there's no way to bet on whether the simulation is right. The hack is to wire MiroFish's output — e.g. \"68% of simulated agents react negatively to this policy in 72 hours\" — into a prediction market where the resolution criterion is measured real-world sentiment (X API, Farcaster, Reddit). The simulation run is committed on-chain before the real-world event unfolds, making it tamper-evident. The interesting research question OASIS itself raises: at what agent-count threshold does the simulation's predicted sentiment distribution start matching real observed distributions? You'd have ground truth data to actually answer this."
        - generic [ref=e229]:
          - generic [ref=e230]:
            - generic [ref=e231]: "05"
            - generic [ref=e232]:
              - link "zkVM Verifiable Simulation Replays via MiroFish Architecture" [ref=e234] [cursor=pointer]:
                - /url: https://github.com/666ghj/MiroFish
              - link "MiroFish" [ref=e236] [cursor=pointer]:
                - /url: https://github.com/666ghj/MiroFish
          - paragraph [ref=e238]: "MiroFish runs \"dual-platform parallel\" simulations — agents act across two synthetic social platforms simultaneously. This is a natural structure for zkVM-verifiable replays: run the simulation once, generate a proof that the reported emergent behaviors follow deterministically from the initial graph state and the model weights used. Builders could then ship simulation results to clients who verify the proof without re-running the full simulation. The practical bottleneck is that LLM inference isn't cheaply provable today — but MiroFish-Offline's Ollama backend with a quantized local model (qwen2.5 at 4-bit) is small enough that zkML proof generation becomes at least tractable for short simulation windows."
