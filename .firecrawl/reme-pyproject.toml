\[build-system\]
requires = \["setuptools", "wheel"\]
build-backend = "setuptools.build\_meta"

\[project\]
name = "reme\_ai"
dynamic = \["version"\]
description = "Remember Me, Refine Me."
authors = \[\
 { name = "jinli.yl", email = "jinli.yl@alibaba-inc.com" },\
 { name = "dengjiaji.djj", email = "dengjiaji.djj@alibaba-inc.com" },\
 { name = "caozouying.czy", email = "caozouying.czy@alibaba-inc.com" },\
 { name = "weikangzhou.zwk", email = "weikangzhou.zwk@alibaba-inc.com" },\
\]
license = { file = "LICENSE" }
readme = "README.md"
requires-python = ">=3.10"

classifiers = \[\
 "Development Status :: 4 - Beta",\
 "Intended Audience :: Developers",\
 "Intended Audience :: Science/Research",\
 "License :: OSI Approved :: Apache Software License",\
 "Operating System :: OS Independent",\
 "Programming Language :: Python :: 3",\
 "Programming Language :: Python :: 3.10",\
 "Topic :: Scientific/Engineering :: Artificial Intelligence",\
 "Topic :: Software Development :: Libraries :: Python Modules",\
 "Topic :: Software Development :: Libraries :: Application Frameworks",\
 "Typing :: Typed",\
\]

keywords = \["llm", "memory", "experience", "memoryscope", "ai", "mcp", "http", "reme", "personal"\]

dependencies = \[\
 "flowllm\[reme\]>=0.2.0.10",\
 "sqlite-vec>=0.1.6",\
 "prompt\_toolkit>=3.0.52",\
 "rich>=14.2.0",\
 "asyncpg>=0.31.0",\
 "chromadb>=1.3.5",\
 "dashscope>=1.25.1",\
 "elasticsearch>=9.2.0",\
 "fastapi>=0.121.3",\
 "fastmcp>=2.14.1",\
 "httpx>=0.28.1",\
 "litellm>=1.80.0",\
 "loguru>=0.7.3",\
 "mcp>=1.25.0",\
 "numpy>=2.2.6",\
 "openai>=2.8.1",\
 "pandas>=2.3.3",\
 "pydantic>=2.12.4",\
 "qdrant-client>=1.16.0",\
 "tavily-python>=0.7.13",\
 "tiktoken>=0.12.0",\
 "tqdm>=4.67.1",\
 "transformers>=4.57.3",\
 "uvicorn>=0.40.0",\
 "watchfiles>=1.1.1",\
 "pyyaml>=6.0.3",\
\]

\[project.optional-dependencies\]
ray = \[\
 "ray",\
\]

dev = \[\
 "jupyter-book",\
 "ghp-import",\
 "myst-nb",\
 "sphinxcontrib-bibtex",\
 "furo",\
 "sphinxcontrib-mermaid",\
 "pre-commit",\
\]

full = \[\
 "reme\_ai\[dev,ray,light\]",\
\]

light = \[\
 "agentscope==1.0.17",\
\]

\[tool.setuptools.packages.find\]
where = \["."\]
include = \["reme\_ai\*", "reme\*"\]
exclude = \["test\*", "cookbook\*", "doc\*", "library\*", "dist\*"\]

\[tool.setuptools.package-data\]
reme\_ai = \[\
 "\*\*/\*.yaml",\
 "\*\*/\*.py",\
 "\*\*/\*.json",\
\]

reme = \[\
 "\*\*/\*.yaml",\
 "\*\*/\*.py",\
 "\*\*/\*.json",\
\]

\[tool.setuptools.dynamic\]
version = { attr = "reme.\_\_version\_\_" }

\[project.urls\]
Homepage = "https://github.com/agentscope-ai/ReMe"
Documentation = "https://reme.agentscope.io/"
Repository = "https://github.com/agentscope-ai/ReMe"

\[project.scripts\]
reme = "reme\_ai.main:main"
reme2 = "reme.reme:main"
remecli = "reme.reme\_cli:main"

\[tool.pytest.ini\_options\]
asyncio\_default\_fixture\_loop\_scope = "function"
\# Script-style tests that need to be run with \`python test\_\*.py\`
testpaths = \["tests"\]
python\_files = \["test\_\*.py"\]
python\_functions = \["test\_\*"\]
\# Exclude script-style tests that require manual execution
addopts = "--ignore=tests/test\_embedding.py --ignore=tests/test\_embedding\_cache.py --ignore=tests/test\_embedding\_sync.py --ignore=tests/test\_file\_store.py"

\# python -m build && twine upload dist/\*