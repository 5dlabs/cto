server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: intake-llm-calls
    static_configs:
      - targets:
          - localhost
        labels:
          job: intake
          log_type: llm_calls
          __path__: /var/log/intake/llm-calls.jsonl
    pipeline_stages:
      - json:
          expressions:
            event: event
            provider: provider
            model: model
            status: status
            run_id: run_id
            task_name: task_name
            ts: ts
      - labels:
          event:
          provider:
          model:
          status:
          run_id:
          task_name:
      - timestamp:
          source: ts
          format: RFC3339

  - job_name: intake-pipeline
    static_configs:
      - targets:
          - localhost
        labels:
          job: intake
          log_type: pipeline
          __path__: /var/log/intake/pipeline.jsonl
    pipeline_stages:
      - json:
          expressions:
            event: event
            step_id: step_id
            phase: phase
            run_id: run_id
            ts: ts
      - labels:
          event:
          step_id:
          phase:
          run_id:
      - timestamp:
          source: ts
          format: RFC3339

  - job_name: intake-runs
    static_configs:
      - targets:
          - localhost
        labels:
          job: intake
          log_type: runs
          __path__: /var/log/intake/runs.jsonl
    pipeline_stages:
      - json:
          expressions:
            event: event
            run_id: run_id
            project_name: project_name
            mode: mode
            ts: ts
      - labels:
          event:
          run_id:
          project_name:
          mode:
      - timestamp:
          source: ts
          format: RFC3339
