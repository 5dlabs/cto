auth_enabled: false

server:
  http_listen_port: 3100

common:
  ring:
    kvstore:
      store: inmemory
    replication_factor: 1
  path_prefix: /loki/data

schema_config:
  configs:
    - from: "2024-01-01"
      store: boltdb-shipper
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/data/chunks
  boltdb_shipper:
    active_index_directory: /loki/data/boltdb-shipper/active
    cache_location: /loki/data/boltdb-shipper/cache

compactor:
  working_directory: /loki/data/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  compaction_interval: 10m

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 128
  ingestion_burst_size_mb: 256
  retention_period: 168h
