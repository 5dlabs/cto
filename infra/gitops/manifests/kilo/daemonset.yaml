---
# Kilo DaemonSet - WireGuard mesh networking for Talos
# Runs on all nodes to create encrypted tunnels between nodes and to external peers
#
# Configuration Notes:
# - Uses --cni=false to work alongside Cilium (add-on mode)
# - Uses --compatibility=flannel to create flannel-compatible interface
# - Uses an init container to generate kubeconfig for Talos (uses KubePrism localhost:7445)
# - Listens on UDP port 51820 for WireGuard connections
apiVersion: v1
kind: ConfigMap
metadata:
  name: kilo-scripts
  namespace: kilo
data:
  init.sh: |
    #!/bin/sh
    # Generate kubeconfig for Kilo using service account token
    # Talos uses KubePrism on localhost:7445 for API access
    cat > /etc/kubernetes/kubeconfig <<EOF
    apiVersion: v1
    kind: Config
    clusters:
    - cluster:
        certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        server: https://localhost:7445
      name: default
    contexts:
    - context:
        cluster: default
        namespace: kilo
        user: default
      name: default
    current-context: default
    users:
    - name: default
      user:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    EOF
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kilo
  namespace: kilo
  labels:
    app.kubernetes.io/name: kilo
    app.kubernetes.io/component: networking
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kilo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kilo
        platform.5dlabs.io/log-collection: enabled
      annotations:
        logs.platform.5dlabs.io/collect: "true"
        logs.platform.5dlabs.io/service: kilo
    spec:
      serviceAccountName: kilo
      hostNetwork: true

      # Run on all nodes including control plane
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute

      initContainers:
        # Generate kubeconfig for Talos using service account token
        - name: generate-kubeconfig
          image: squat/kilo:0.6.0
          command:
            - /bin/sh
          args:
            - /scripts/init.sh
          volumeMounts:
            - name: kubeconfig
              mountPath: /etc/kubernetes
            - name: scripts
              mountPath: /scripts/
              readOnly: true

      containers:
        - name: kilo
          image: squat/kilo:0.6.0
          args:
            # Path to kubeconfig generated by init container
            - --kubeconfig=/etc/kubernetes/kubeconfig
            # Hostname from node name
            - --hostname=$(NODE_NAME)
            # Add-on mode: don't manage CNI (Cilium does this)
            - --cni=false
            # Compatibility mode with Cilium - creates flannel.1 interface
            - --compatibility=flannel
            # Disable local routing (let Cilium handle it)
            - --local=false
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 1107
              name: metrics
          securityContext:
            privileged: true
          volumeMounts:
            - name: kilo-dir
              mountPath: /var/lib/kilo
            - name: kubeconfig
              mountPath: /etc/kubernetes
              readOnly: true
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: xtables-lock
              mountPath: /run/xtables.lock
              readOnly: false
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

      volumes:
        # Kilo state directory
        - name: kilo-dir
          hostPath:
            path: /var/lib/kilo
        # Generated kubeconfig (from init container)
        - name: kubeconfig
          emptyDir: {}
        # Init scripts
        - name: scripts
          configMap:
            name: kilo-scripts
        # Kernel modules for WireGuard
        - name: lib-modules
          hostPath:
            path: /lib/modules
        # iptables lock
        - name: xtables-lock
          hostPath:
            path: /run/xtables.lock
            type: FileOrCreate
