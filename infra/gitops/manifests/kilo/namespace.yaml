---
# Kilo Namespace
# Requires privileged PodSecurity for WireGuard VPN
# which needs NET_ADMIN, NET_RAW, SYS_MODULE capabilities, hostNetwork, and hostPath volumes
apiVersion: v1
kind: Namespace
metadata:
  name: kilo
  labels:
    app.kubernetes.io/name: kilo
    app.kubernetes.io/part-of: networking
    # PodSecurity: allow privileged workloads for Kilo WireGuard
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/warn-version: latest
