---
# Ralph Runner Job
#
# Kubernetes Job that runs the Ralph lifecycle loop until completion.
# Posts to Linear when the play lifecycle completes or fails.
#
apiVersion: batch/v1
kind: Job
metadata:
  name: ralph-runner
  namespace: cto
  labels:
    app: ralph-runner
spec:
  # Don't retry the Job itself - the entrypoint handles retries
  backoffLimit: 0
  # Keep completed pods for inspection
  ttlSecondsAfterFinished: 86400  # 24 hours
  template:
    metadata:
      labels:
        app: ralph-runner
    spec:
      serviceAccountName: ralph-runner
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret

      # Init container to clone the repo (use ubuntu for better chown support)
      initContainers:
        - name: git-clone
          image: ubuntu:24.04
          command:
            - /bin/bash
            - -c
            - |
              set -e
              apt-get update && apt-get install -y git
              echo "Cloning repository (branch: ralph/agent-ci-optimization-2026-01-17)..."
              if [ -n "$GITHUB_TOKEN" ]; then
                git clone --depth=1 --branch ralph/agent-ci-optimization-2026-01-17 https://x-access-token:${GITHUB_TOKEN}@git.5dlabs.ai/5dlabs/cto.git /workspace
              else
                echo "WARNING: No GITHUB_TOKEN, trying unauthenticated clone..."
                git clone --depth=1 --branch ralph/agent-ci-optimization-2026-01-17 https://git.5dlabs.ai/5dlabs/cto.git /workspace
              fi
              # Make workspace writable by node user (UID 1001 in claude image)
              echo "Setting permissions for UID 1001..."
              chown -R 1001:1000 /workspace
              chmod -R 755 /workspace

              # Patch config for K8s environment:
              # - Disable attended runs (running unattended in K8s)
              # - Remove localhost preflight checks (not applicable in container)
              # - Remove kubectl-context check (already in cluster)
              echo "Patching config for K8s environment..."
              apt-get install -y jq >/dev/null 2>&1 || true
              CONFIG=/workspace/lifecycle-test/ralph-cto.json
              if [ -f "$CONFIG" ]; then
                jq '.attended.enabled = false | .attended.requiredRuns = 0 | .preflight.checks = [.preflight.checks[] | select((.command | test("localhost") | not) and (.name != "kubectl-context"))]' "$CONFIG" > /tmp/config.json && mv /tmp/config.json "$CONFIG"
                chown 1001:1000 "$CONFIG"
                echo "Config patched - removed localhost checks and kubectl-context"
              fi

              ls -la /workspace/lifecycle-test/ | head -10
              echo "Clone complete"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          env:
            - name: GIT_TERMINAL_PROMPT
              value: "0"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tools-github-secrets
                  key: GITHUB_PERSONAL_ACCESS_TOKEN
                  optional: false

      containers:
        - name: ralph-runner
          image: registry.5dlabs.ai/5dlabs/ralph-runner:latest
          imagePullPolicy: Always

          # Environment configuration
          env:
            # Ralph paths (use config from cloned workspace, state in writable volume)
            - name: RALPH_CONFIG
              value: /workspace/lifecycle-test/ralph-cto.json
            - name: RALPH_STATE
              value: /ralph/state/ralph-cto.state.json
            - name: RALPH_PROGRESS
              value: /ralph/state/progress.txt
            - name: RALPH_REPORT
              value: /ralph/state/report.json
            - name: WORKSPACE
              value: /workspace

            # Runner behavior
            - name: SLEEP_INTERVAL
              value: "60"
            - name: MAX_FAILURES
              value: "10"
            - name: NOTIFY_ON_SUCCESS
              value: "true"
            - name: NOTIFY_ON_FAILURE
              value: "true"

            # Linear notification
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: linear-secrets
                  key: LINEAR_API_KEY
                  optional: false
            - name: LINEAR_ISSUE_ID
              value: ""  # Set this when creating the Job

            # GitHub auth for gh CLI
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tools-github-secrets
                  key: GITHUB_PERSONAL_ACCESS_TOKEN
                  optional: false

            # Anthropic API key for Claude
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cto-secrets
                  key: ANTHROPIC_API_KEY
                  optional: false

          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: config
              mountPath: /ralph/config
              readOnly: true
            - name: state
              mountPath: /ralph/state

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

      volumes:
        - name: workspace
          emptyDir: {}
        - name: config
          configMap:
            name: ralph-runner-config
        - name: state
          emptyDir: {}

      # Allow enough time for lifecycle to complete
      activeDeadlineSeconds: 86400  # 24 hours
