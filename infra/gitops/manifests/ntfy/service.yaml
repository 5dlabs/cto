---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: messaging
  labels:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/component: push-server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: ntfy
# Note: ServiceMonitor removed - add back when Prometheus Operator CRDs are installed
# Metrics available at :9090/metrics for Prometheus scrape config
