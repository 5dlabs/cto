---
# Platform-level Cloudflare TunnelBindings
#
# Codifies public hostnames that were previously configured only in the
# Cloudflare remote tunnel config (cto-main). Mirrors those entries into
# the cluster so the cloudflare-operator renders them into the operator
# ConfigMap (cloudflare-operator-system/cto-main), enabling us to flip
# the tunnel from remote-managed to local-managed without losing any
# public exposure.
#
# Pattern intentionally mirrors infra/gitops/manifests/qdrant-tunnel-binding.yaml.
# All bindings target ClusterTunnel `cto-main`.

apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: argocd-server
  namespace: argocd
subjects:
  - kind: Service
    name: argocd-server
    spec:
      fqdn: argocd.5dlabs.ai
      target: http://argocd-server.argocd.svc:80
tunnelRef:
  kind: ClusterTunnel
  name: cto-main
---
# avatar-artifacts.5dlabs.ai exposes static render galleries generated by the
# Avatar OpenClaw pod. The backing process is intentionally simple:
# `python3 -m http.server 18080 --directory /workspace/avatar-render`.
apiVersion: v1
kind: Service
metadata:
  name: avatar-openclaw-artifacts
  namespace: cto
  labels:
    app.kubernetes.io/component: avatar-artifacts
    app.kubernetes.io/instance: cto-avatar-openclaw
    app.kubernetes.io/name: openclaw-avatar-openclaw
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: cto-avatar-openclaw
    app.kubernetes.io/name: openclaw-avatar-openclaw
  ports:
    - name: http
      port: 18080
      targetPort: 18080
      protocol: TCP
---
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: avatar-openclaw-artifacts
  namespace: cto
subjects:
  - kind: Service
    name: avatar-openclaw-artifacts
    spec:
      fqdn: avatar-artifacts.5dlabs.ai
      target: http://avatar-openclaw-artifacts.cto.svc:18080
tunnelRef:
  kind: ClusterTunnel
  name: cto-main
---
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: cto-web
  namespace: cto
subjects:
  - kind: Service
    name: cto-web
    spec:
      fqdn: app.5dlabs.ai
      target: http://cto-web.cto.svc:3000
tunnelRef:
  kind: ClusterTunnel
  name: cto-main
---
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: cto-pm
  namespace: cto
subjects:
  - kind: Service
    name: cto-pm
    spec:
      fqdn: pm.5dlabs.ai
      target: http://cto-pm.cto.svc:8081
tunnelRef:
  kind: ClusterTunnel
  name: cto-main
---
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: morgan-gateway
  namespace: cto
subjects:
  - kind: Service
    name: openclaw-morgan
    spec:
      fqdn: morgan.5dlabs.ai
      target: http://openclaw-morgan.cto.svc:18789
tunnelRef:
  kind: ClusterTunnel
  name: cto-main
---
# grafana.5dlabs.ai repoints from the legacy `grafana.observability.svc:80`
# (which no longer resolves) to the openclaw observability Grafana service.
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: grafana
  namespace: openclaw
subjects:
  - kind: Service
    name: openclaw-observability-grafana
    spec:
      fqdn: grafana.5dlabs.ai
      target: http://openclaw-observability-grafana.openclaw.svc:80
tunnelRef:
  kind: ClusterTunnel
  name: cto-main
---
# avatar.5dlabs.ai routes directly to the Next.js dev server running inside
# the coder workspace (port 3000 on the openclaw-coder Service, exposed via
# the chart's optional devServer block). This bypasses coder's /proxy/<port>
# path, which was returning ECONNREFUSED externally.
#
# SECURITY: `next dev` MUST NOT be reachable unauthenticated on the public
# internet (source maps, HMR, dev-toolchain CVEs). Access to this hostname
# is gated by a Cloudflare Access Self-Hosted Application configured in the
# Cloudflare dashboard — see docs/runbooks/cloudflare-access-avatar-demo.md.
# CF Access applications are not yet codified in this repo (the
# cloudflare-operator only manages Tunnels/TunnelBindings); until that gap
# is closed, the Access app must be (re)created manually if the account is
# ever rebuilt.
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: avatar-demo
  namespace: cto
  annotations:
    # Human-readable pointer to the required out-of-band CF Access config.
    5dlabs.ai/cloudflare-access-runbook: docs/runbooks/cloudflare-access-avatar-demo.md
subjects:
  - kind: Service
    name: openclaw-coder
    spec:
      fqdn: avatar.5dlabs.ai
      target: http://openclaw-coder.cto.svc:3000
tunnelRef:
  kind: ClusterTunnel
  name: cto-main
