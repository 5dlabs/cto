---
# ClusterRole granting Morgan (and co-hosted agents) access to
# platform resources, ArgoCD apps, and CTO CRDs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-morgan
  labels:
    app.kubernetes.io/part-of: openclaw
    openclaw.io/agent: morgan
rules:
  # Core resources in cto namespace (pods, jobs, configmaps, secrets, pvcs, services)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "configmaps", "secrets", "persistentvolumeclaims", "events", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Apps (deployments, statefulsets, replicasets)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Batch (jobs, cronjobs)
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ArgoCD applications — full CRUD + sync
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets", "appprojects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CTO platform CRDs
  - apiGroups: ["agents.platform", "cto.5dlabs.ai"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC (read-only for debugging, create for delegating)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  # Networking (ingress, services)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Storage classes (read)
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # CRD definitions (read)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
# Bind the ClusterRole to the openclaw-morgan ServiceAccount in cto namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-morgan
  labels:
    app.kubernetes.io/part-of: openclaw
    openclaw.io/agent: morgan
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-morgan
subjects:
  - kind: ServiceAccount
    name: openclaw-morgan
    namespace: cto
