---
# Twingate RemoteNetwork - Represents the Kubernetes cluster in Twingate
# This must be created first before Connectors and Network resources
apiVersion: twingate.com/v1alpha1
kind: TwingateRemoteNetwork
metadata:
  name: latitude-cluster
  namespace: operators
  labels:
    app.kubernetes.io/name: twingate-remote-network
    app.kubernetes.io/part-of: networking
spec:
  # Remote Network name in Twingate
  name: latitude-cluster

  # Optional: Location/region tag
  location: "Latitude.sh"
