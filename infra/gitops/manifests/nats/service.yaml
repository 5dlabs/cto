---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: messaging
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: message-bus
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 4222
      targetPort: client
      protocol: TCP
    - name: monitor
      port: 8222
      targetPort: monitor
      protocol: TCP
  selector:
    app.kubernetes.io/name: nats
