---
# NATS Server configuration with JetStream
# See: https://docs.nats.io/running-a-nats-service/configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: messaging
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: message-bus
data:
  nats-server.conf: |
    # Client connections
    listen: 0.0.0.0:4222

    # HTTP monitoring
    http_port: 8222

    # JetStream persistence
    jetstream {
      store_dir: /data/jetstream
      max_mem: 256MB
      max_file: 1GB
    }

    # Logging
    logtime: true
    debug: false
    trace: false
