---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: email
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/component: smtp-server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8025
      targetPort: http
      protocol: TCP
    - name: smtp
      port: 1025
      targetPort: smtp
      protocol: TCP
  selector:
    app.kubernetes.io/name: mailpit
---
# SMTP service alias for easier configuration
apiVersion: v1
kind: Service
metadata:
  name: smtp
  namespace: email
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/component: smtp-alias
spec:
  type: ClusterIP
  ports:
    - name: smtp
      port: 25
      targetPort: smtp
      protocol: TCP
  selector:
    app.kubernetes.io/name: mailpit
