---
# Mayastor Disk Pools - Configure storage pools on nodes with NVMe drives
# Each pool is a dedicated NVMe device used for Mayastor volume provisioning

# Control Plane - Samsung NVMe Drive 1 (~960GB)
apiVersion: openebs.io/v1beta3
kind: DiskPool
metadata:
  name: pool-cp-nvme1
  namespace: mayastor
spec:
  node: admin-cto-cp1
  disks: ["/dev/nvme1n1"]
---
# Control Plane - Samsung NVMe Drive 2 (~960GB)
apiVersion: openebs.io/v1beta3
kind: DiskPool
metadata:
  name: pool-cp-nvme2
  namespace: mayastor
spec:
  node: admin-cto-cp1
  disks: ["/dev/nvme2n1"]
---
# Control Plane - Samsung NVMe Drive 3 (~960GB)
apiVersion: openebs.io/v1beta3
kind: DiskPool
metadata:
  name: pool-cp-nvme3
  namespace: mayastor
spec:
  node: admin-cto-cp1
  disks: ["/dev/nvme3n1"]
