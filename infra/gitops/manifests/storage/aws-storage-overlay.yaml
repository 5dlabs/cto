---
# Storage Class Overlay
# Creates a StorageClass named "mayastor" backed by local-path provisioner
# This allows all existing manifests that reference storageClass: "mayastor"
# to work on bare-metal OVH without modification.
#
# When Mayastor (OpenEBS) is fully set up:
# 1. Disable this overlay app in Argo (toggle_app disable aws-storage-overlay); Argo prunes this StorageClass
# 2. Enable the Mayastor app (toggle_app enable mayastor); it recreates StorageClass "mayastor"
# This overlay does not touch Mayastor operator config or applications/storage/mayastor.yaml
#
# Note: local-path uses node-local storage (hostPath). Suitable for stateful apps until Mayastor is ready.

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: mayastor
  labels:
    app.kubernetes.io/name: mayastor-overlay
    app.kubernetes.io/part-of: platform
  annotations:
    platform.5dlabs.io/overlay: "true"
    platform.5dlabs.io/reason: "local-path overlay for bare-metal OVH (until Mayastor is ready)"
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: false

---
# gp3 StorageClass alias — same pattern as mayastor above.
# openclaw-platform and other upstream charts hardcode storageClassName: gp3 (AWS EBS).
# Aliased to local-path so those charts work on OVH without modification.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  labels:
    app.kubernetes.io/name: gp3-overlay
    app.kubernetes.io/part-of: platform
  annotations:
    platform.5dlabs.io/overlay: "true"
    platform.5dlabs.io/reason: "local-path alias for gp3 (AWS EBS) on OVH"
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: false
