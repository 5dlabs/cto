---
# AWS Storage Class Overlay
# Creates a StorageClass named "mayastor" backed by AWS EBS (gp3)
# This allows all existing manifests that reference storageClass: "mayastor"
# to work on AWS without modification.
#
# When switching back to bare metal (do not modify any Mayastor app or Helm values):
# 1. Disable this overlay app in Argo (toggle_app disable aws-storage-overlay); Argo prunes this StorageClass
# 2. Enable the Mayastor app (toggle_app enable mayastor); it recreates StorageClass "mayastor"
# This overlay does not touch Mayastor operator config or applications/storage/mayastor.yaml
#
# Note: Using gp3 (not gp2) for better baseline performance (3000 IOPS, 125 MiB/s)

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: mayastor
  labels:
    app.kubernetes.io/name: mayastor-overlay
    app.kubernetes.io/part-of: platform
  annotations:
    platform.5dlabs.io/overlay: "true"
    platform.5dlabs.io/reason: "AWS EBS overlay for bare-metal Mayastor storage class"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  fsType: ext4
  encrypted: "true"
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
