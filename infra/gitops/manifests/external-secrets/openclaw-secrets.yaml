---
# =============================================================================
# ExternalSecrets for openclaw namespace (deliberation agents)
# =============================================================================
# Covers: optimist, pessimist, committee-1..5 pods in the openclaw namespace.
# Sourced from OpenBao via ClusterSecretStore (openbao).

# =============================================================================
# openclaw-messaging — Discord tokens (envFrom in each agent pod)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-messaging
  namespace: openclaw
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: openclaw
    app.kubernetes.io/component: messaging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-messaging
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_TOKEN_OPTIMIST
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_OPTIMIST
    - secretKey: DISCORD_TOKEN_PESSIMIST
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_PESSIMIST

---
# =============================================================================
# Per-agent messaging secrets with DISCORD_TOKEN key
# Chart always maps tokenSecretKey (secret-key-name) → DISCORD_TOKEN env var.
# Config template renders "${DISCORD_TOKEN}" — must match the env var name.
# Each agent gets its own secret so the right token lands in DISCORD_TOKEN.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-messaging-optimist
  namespace: openclaw
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-messaging-optimist
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_TOKEN
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_OPTIMIST
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-messaging-pessimist
  namespace: openclaw
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-messaging-pessimist
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_TOKEN
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_PESSIMIST
---
# =============================================================================
# openclaw-api-keys — Model provider API keys
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-api-keys
  namespace: openclaw
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: openclaw
    app.kubernetes.io/component: api-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-api-keys
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: api-keys
        property: ANTHROPIC_API_KEY
    - secretKey: openai-api-key
      remoteRef:
        key: api-keys
        property: OPENAI_API_KEY
    - secretKey: minimax-api-key
      remoteRef:
        key: api-keys
        property: MINIMAX_API_KEY
    - secretKey: brave-api-key
      remoteRef:
        key: api-keys
        property: BRAVE_API_KEY
    - secretKey: firecrawl-api-key
      remoteRef:
        key: api-keys
        property: FIRECRAWL_API_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: api-keys
        property: ANTHROPIC_API_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: api-keys
        property: OPENAI_API_KEY
    - secretKey: MINIMAX_API_KEY
      remoteRef:
        key: api-keys
        property: MINIMAX_API_KEY

---
# =============================================================================
# openclaw-github — GitHub PAT for repo access
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-github
  namespace: openclaw
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: openclaw
    app.kubernetes.io/component: github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-github
    creationPolicy: Owner
  data:
    - secretKey: github-pat
      remoteRef:
        key: tools-github
        property: GITHUB_PERSONAL_ACCESS_TOKEN
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: tools-github
        property: GITHUB_PERSONAL_ACCESS_TOKEN
