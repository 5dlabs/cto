apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tools-tavily-secrets
  namespace: cto
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: tools-tavily-secrets
    creationPolicy: Owner
  data:
    - secretKey: TAVILY_API_KEY
      remoteRef:
        key: tools-tavily
        property: TAVILY_API_KEY
