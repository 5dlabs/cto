---
# Web App Auth Secret - ExternalSecret for Better Auth
# Syncs authentication secret from OpenBao to web-auth-secret in cto namespace
#
# The BETTER_AUTH_SECRET is used by Better Auth for session signing and encryption.
# It should be a secure random string (at least 32 characters).
#
# To populate OpenBao with the auth secret:
#   1. Generate a secure secret:
#      openssl rand -base64 32
#   2. Store in OpenBao:
#      kubectl exec -n openbao openbao-0 -- env BAO_TOKEN="$ROOT_TOKEN" \
#        bao kv put secret/web-app/auth secret="<generated-secret>"
#
# Example:
#   SECRET=$(openssl rand -base64 32)
#   kubectl exec -n openbao openbao-0 -- env BAO_TOKEN="$ROOT_TOKEN" \
#     bao kv put secret/web-app/auth secret="$SECRET"

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: web-auth-secret
  namespace: cto
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/instance: external-secrets-config
    app.kubernetes.io/component: auth
    app.kubernetes.io/application: web
  annotations:
    argocd.argoproj.io/tracking-id: external-secrets-config:external-secrets.io/ExternalSecret:cto/web-auth-secret  # pragma: allowlist secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: web-auth-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        secret: "{{ .secret }}"  # pragma: allowlist secret
  data:
    - secretKey: secret  # pragma: allowlist secret
      remoteRef:
        key: secret/web-app/auth
        property: secret  # pragma: allowlist secret
