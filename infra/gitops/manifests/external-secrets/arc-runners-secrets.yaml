---
# ExternalSecrets for arc-runners namespace
# These secrets provide GitHub credentials for GitHub Actions Runner Controller (ARC)

# =============================================================================
# github-pat - GitHub Personal Access Token for ARC runners
# =============================================================================
# ARC (Actions Runner Controller) uses this secret to authenticate with GitHub
# and register/manage self-hosted runners.
#
# The secret must be in the arc-runners namespace and contain a token with
# the following GitHub scopes:
# - repo (full control of private repositories)
# - admin:org (read:org for organization-level runner management)
#
# To populate OpenBao with the GitHub PAT:
#   kubectl exec -n openbao openbao-0 -- env BAO_TOKEN="$ROOT_TOKEN" \
#     bao kv put secret/tools-github GITHUB_PERSONAL_ACCESS_TOKEN="<your-token>"
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-pat
  namespace: arc-runners
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/component: github-runner
    app.kubernetes.io/instance: external-secrets-config
  annotations:
    # pragma: allowlist secret
    argocd.argoproj.io/tracking-id: external-secrets-config:external-secrets.io/ExternalSecret:arc-runners/github-pat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: github-pat
    creationPolicy: Owner
  data:
    - secretKey: token  # pragma: allowlist secret
      remoteRef:
        key: tools-github
        property: GITHUB_PERSONAL_ACCESS_TOKEN
