---
# Morgan-specific messaging secret for the CTO namespace.
# We keep Morgan isolated from the shared openclaw-messaging secret so we can
# wire in the bot token/App ID from 1Password without mutating the upstream
# openclaw-platform ExternalSecret bundle.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-messaging-morgan
  namespace: cto
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: openclaw
    app.kubernetes.io/component: messaging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-messaging-morgan
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_TOKEN_MORGAN
      remoteRef:
        key: secret/openclaw/discord
        property: DISCORD_TOKEN_MORGAN
    - secretKey: DISCORD_APPID_MORGAN
      remoteRef:
        key: secret/openclaw/discord
        property: DISCORD_APPID_MORGAN
