---
# Web App GitHub OAuth Secret - ExternalSecret for GitHub OAuth credentials
# Syncs GitHub OAuth client ID and secret from OpenBao to web-github-oauth secret in cto namespace
#
# These credentials are required for GitHub OAuth authentication in the web app.
# Create a GitHub OAuth app at: https://github.com/settings/developers
# - Application name: CTO Web App
# - Homepage URL: https://app.5dlabs.ai
# - Authorization callback URL: https://app.5dlabs.ai/api/auth/callback/github
#
# To populate OpenBao with the GitHub OAuth credentials:
#   kubectl exec -n openbao openbao-0 -- env BAO_TOKEN="$ROOT_TOKEN" \
#     bao kv put secret/web-app/github-oauth \
#       client_id="<your-github-client-id>" \
#       client_secret="<your-github-client-secret>"

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: web-github-oauth
  namespace: cto
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/instance: external-secrets-config
    app.kubernetes.io/component: auth
    app.kubernetes.io/application: web
  annotations:
    argocd.argoproj.io/tracking-id: external-secrets-config:external-secrets.io/ExternalSecret:cto/web-github-oauth  # pragma: allowlist secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: web-github-oauth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        client_id: "{{ .client_id }}"
        client_secret: "{{ .client_secret }}"  # pragma: allowlist secret
  data:
    - secretKey: client_id  # pragma: allowlist secret
      remoteRef:
        key: secret/web-app/github-oauth
        property: client_id
    - secretKey: client_secret  # pragma: allowlist secret
      remoteRef:
        key: secret/web-app/github-oauth
        property: client_secret  # pragma: allowlist secret
