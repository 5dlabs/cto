---
# =============================================================================
# ExternalSecrets for trading namespace (trading agents)
# =============================================================================
# Covers: all trader-* pods in the trading namespace.
# Sourced from OpenBao via ClusterSecretStore (openbao).

# =============================================================================
# trading-api-keys — Model provider API keys (needed by OpenClaw for LLM calls)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trading-api-keys
  namespace: trading
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: cto-trading
    app.kubernetes.io/component: api-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: trading-api-keys
    creationPolicy: Owner
  data:
    # Model provider keys (for OpenClaw LLM calls)
    - secretKey: anthropic-api-key
      remoteRef:
        key: api-keys
        property: ANTHROPIC_API_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: api-keys
        property: ANTHROPIC_API_KEY

---
# =============================================================================
# trader-api-keys — Strategy-specific API keys (referenced via extraEnv secretKeyRef)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trader-api-keys
  namespace: trading
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: cto-trading
    app.kubernetes.io/component: trading-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: trader-api-keys
    creationPolicy: Owner
  data:
    - secretKey: grok-api-key
      remoteRef:
        key: trading-api-keys
        property: GROK_API_KEY
    - secretKey: simmer-api-key
      remoteRef:
        key: trading-api-keys
        property: SIMMER_API_KEY
    - secretKey: gemini-api-key
      remoteRef:
        key: trading-api-keys
        property: GEMINI_API_KEY
    - secretKey: helius-api-key
      remoteRef:
        key: trading-api-keys
        property: HELIUS_API_KEY
    - secretKey: polymarket-api-key
      remoteRef:
        key: trading-api-keys
        property: POLYMARKET_API_KEY

---
# =============================================================================
# trading-github — GitHub PAT for repo access (cloning cto repo into workspace)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trading-github
  namespace: trading
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: cto-trading
    app.kubernetes.io/component: github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: trading-github
    creationPolicy: Owner
  data:
    - secretKey: github-pat
      remoteRef:
        key: tools-github
        property: GITHUB_PERSONAL_ACCESS_TOKEN
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: tools-github
        property: GITHUB_PERSONAL_ACCESS_TOKEN
