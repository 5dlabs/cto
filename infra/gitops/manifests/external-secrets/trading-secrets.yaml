---
# =============================================================================
# ExternalSecrets for trading namespace (trading agents)
# =============================================================================
# Covers: all trader-* pods in the trading namespace.
# Sourced from OpenBao via ClusterSecretStore (openbao).
# Uses existing openclaw paths where keys already exist.

# =============================================================================
# trading-api-keys — LLM provider API keys (for OpenClaw agent model calls)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trading-api-keys
  namespace: trading
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: cto-trading
    app.kubernetes.io/component: api-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: trading-api-keys
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: anthropic-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: secret/openclaw/providers
        property: anthropic-api-key

---
# =============================================================================
# trader-api-keys — Strategy-specific API keys
# =============================================================================
# Keys that exist in openclaw/providers are pulled from there.
# Trading-specific keys (simmer, helius, polymarket) need secret/openclaw/trading
# seeded in OpenBao before they'll resolve.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trader-api-keys
  namespace: trading
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: cto-trading
    app.kubernetes.io/component: trading-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: trader-api-keys
    creationPolicy: Owner
  data:
    # Grok/xAI — already in openclaw/providers as xai-api-key
    - secretKey: grok-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: xai-api-key
    # Gemini — already in openclaw/providers
    - secretKey: gemini-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: gemini-api-key
    # Trading-specific keys — need secret/openclaw/trading seeded
    - secretKey: simmer-api-key
      remoteRef:
        key: secret/openclaw/trading
        property: simmer-api-key
    - secretKey: helius-api-key
      remoteRef:
        key: secret/openclaw/trading
        property: helius-api-key
    - secretKey: polymarket-api-key
      remoteRef:
        key: secret/openclaw/trading
        property: polymarket-api-key

---
# =============================================================================
# trading-github — GitHub PAT for repo access (cloning cto repo into workspace)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trading-github
  namespace: trading
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: cto-trading
    app.kubernetes.io/component: github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: trading-github
    creationPolicy: Owner
  data:
    - secretKey: github-pat
      remoteRef:
        key: secret/openclaw/github
        property: github-pat
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: secret/openclaw/github
        property: github-pat
