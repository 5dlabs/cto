---
# =============================================================================
# ExternalSecrets for trading namespace (trading agents)
# =============================================================================
# Mirrors the openclaw-api-keys pattern from the openclaw namespace.
# All provider keys come from the same OpenBao paths used by existing agents.

# =============================================================================
# trading-api-keys — All provider keys + 1Password token (same as openclaw-api-keys)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trading-api-keys
  namespace: trading
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: cto-trading
    app.kubernetes.io/component: api-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: trading-api-keys
    creationPolicy: Owner
  data:
    # Model provider keys (same source as openclaw namespace)
    - secretKey: anthropic-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: anthropic-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: secret/openclaw/providers
        property: anthropic-api-key
    - secretKey: openai-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: openai-api-key
    - secretKey: openrouter-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: openrouter-api-key
    - secretKey: minimax-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: minimax-api-key
    - secretKey: gemini-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: gemini-api-key
    - secretKey: xai-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: xai-api-key
    - secretKey: factory-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: factory-api-key
    - secretKey: cursor-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: cursor-api-key
    - secretKey: morph-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: morph-api-key
    - secretKey: elevenlabs-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: elevenlabs-api-key
    - secretKey: moonshot-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: moonshot-api-key
    - secretKey: browserless-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: browserless-api-key
    # AWS keys
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: secret/openclaw/aws
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: secret/openclaw/aws
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_DEFAULT_REGION
      remoteRef:
        key: secret/openclaw/aws
        property: AWS_DEFAULT_REGION
    # Tools keys
    - secretKey: firecrawl-api-key
      remoteRef:
        key: secret/openclaw/tools
        property: firecrawl-api-key
    - secretKey: brave-api-key
      remoteRef:
        key: secret/openclaw/tools
        property: brave-api-key
    - secretKey: hooks-token
      remoteRef:
        key: secret/openclaw/tools
        property: hooks-token
    - secretKey: hyperbrowser-api-key
      remoteRef:
        key: secret/openclaw/tools
        property: hyperbrowser-api-key
    # 1Password — agents use `op read` for trading-specific secrets
    - secretKey: op-service-account-token
      remoteRef:
        key: secret/openclaw/cloud
        property: op-service-account-token

---
# =============================================================================
# trader-api-keys — Strategy-specific API keys
# =============================================================================
# Grok and Gemini from openclaw/providers.
# Simmer, Helius, Polymarket — agents retrieve via `op read` at runtime.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trader-api-keys
  namespace: trading
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: cto-trading
    app.kubernetes.io/component: trading-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: trader-api-keys
    creationPolicy: Owner
  data:
    # Grok/xAI — already in openclaw/providers as xai-api-key
    - secretKey: grok-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: xai-api-key
    # Gemini — already in openclaw/providers
    - secretKey: gemini-api-key
      remoteRef:
        key: secret/openclaw/providers
        property: gemini-api-key

---
# =============================================================================
# trading-github — GitHub PAT for repo access (cloning cto repo into workspace)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trading-github
  namespace: trading
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/part-of: cto-trading
    app.kubernetes.io/component: github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: trading-github
    creationPolicy: Owner
  data:
    - secretKey: github-pat
      remoteRef:
        key: secret/openclaw/github
        property: github-pat
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: secret/openclaw/github
        property: github-pat
