---
# =============================================================================
# ExternalSecrets for automation namespace
# These secrets support Argo Events and workflow automation
# =============================================================================

# =============================================================================
# github-webhook-secret - Webhook signature verification
# =============================================================================
# Used by the GitHub EventSource to verify webhook payloads from GitHub.
# The secret value must match what's configured in GitHub organization webhook settings.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-webhook-secret
  namespace: automation
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/component: webhooks
    app.kubernetes.io/instance: external-secrets-config
  annotations:
    argocd.argoproj.io/tracking-id: external-secrets-config:external-secrets.io/ExternalSecret:automation/github-webhook-secret  # pragma: allowlist secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: github-webhook-secret
    creationPolicy: Owner
  data:
    - secretKey: secret  # pragma: allowlist secret
      remoteRef:
        key: github-webhook
        property: secret  # pragma: allowlist secret
