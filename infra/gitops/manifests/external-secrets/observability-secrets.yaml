---
# ExternalSecrets for observability namespace
# Discord webhook for Alertmanager notifications

# =============================================================================
# alertmanager-discord-secret - Discord webhook URL for alert notifications
# =============================================================================
# To add the secret to OpenBao:
#   bao kv put secret/alertmanager-discord webhook-url="https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-discord-secret
  namespace: observability
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/component: alertmanager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: alertmanager-discord-secret
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_WEBHOOK_URL
      remoteRef:
        key: alertmanager-discord
        property: webhook-url

---
# =============================================================================
# loki-s3-secret - SeaweedFS S3 credentials for Loki log storage
# =============================================================================
# Loki uses SeaweedFS S3-compatible storage for chunks and indexes
# This provides virtually unlimited storage without local disk constraints
#
# SeaweedFS S3 endpoint: http://seaweedfs-s3.seaweedfs:8333
# Bucket: loki (auto-created by Loki)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: loki-s3-secret
  namespace: observability
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: storage
type: Opaque
stringData:
  # SeaweedFS admin credentials (from seaweedfs-s3-secret)
  # These are auto-generated by SeaweedFS helm chart
  S3_ACCESS_KEY_ID: "eYXuhs8KbNeRZNsN"
  S3_SECRET_ACCESS_KEY: "xoxxNIec0MNK0jGJGjNvJKO5UAHHksOd"
