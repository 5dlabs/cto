---
# =============================================================================
# ExternalSecrets for bots namespace (OpenClaw agents)
# =============================================================================
# These secrets are automatically synced from OpenBao via the ClusterSecretStore.
# Discord tokens must be manually added to OpenBao before agents can start.

# =============================================================================
# ghcr-secret - Docker registry credentials for ghcr.io/5dlabs images
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-secret
  namespace: bots
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/instance: external-secrets-config
    app.kubernetes.io/part-of: openclaw
  annotations:
    argocd.argoproj.io/tracking-id: external-secrets-config:external-secrets.io/ExternalSecret:bots/ghcr-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: ghcr-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: ghcr-secret
        property: .dockerconfigjson

---
# =============================================================================
# openclaw-discord-tokens - Discord bot tokens for each OpenClaw agent
# =============================================================================
# IMPORTANT: You must create these Discord bots and store their tokens in
# OpenBao at: secret/openclaw-discord
# Required properties: DISCORD_TOKEN_ALERT, DISCORD_TOKEN_CONDUCTOR, DISCORD_TOKEN_FORGE,
# DISCORD_TOKEN_HEALER, DISCORD_TOKEN_HOLT, DISCORD_TOKEN_INFRA, DISCORD_TOKEN_INTAKE,
# DISCORD_TOKEN_KEEPER, DISCORD_TOKEN_METAL, DISCORD_TOKEN_PITCH, DISCORD_TOKEN_PLANNER,
# DISCORD_TOKEN_PLAYMON, DISCORD_TOKEN_PM, DISCORD_TOKEN_RESEARCH, DISCORD_TOKEN_STITCH,
# DISCORD_TOKEN_TRADER
# Note: PIXEL runs locally (token in 1Password only), SCOUT has been removed
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-discord-tokens
  namespace: bots
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/instance: external-secrets-config
    app.kubernetes.io/part-of: openclaw
    app.kubernetes.io/component: discord
  annotations:
    argocd.argoproj.io/tracking-id: external-secrets-config:external-secrets.io/ExternalSecret:bots/openclaw-discord-tokens
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-discord-tokens
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_TOKEN_METAL
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_METAL
    - secretKey: DISCORD_TOKEN_FORGE
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_FORGE
    - secretKey: DISCORD_TOKEN_HEALER
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_HEALER
    - secretKey: DISCORD_TOKEN_TRADER
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_TRADER
    - secretKey: DISCORD_TOKEN_ALERT
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_ALERT
    - secretKey: DISCORD_TOKEN_CONDUCTOR
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_CONDUCTOR
    - secretKey: DISCORD_TOKEN_HOLT
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_HOLT
    - secretKey: DISCORD_TOKEN_INFRA
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_INFRA
    - secretKey: DISCORD_TOKEN_INTAKE
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_INTAKE
    - secretKey: DISCORD_TOKEN_KEEPER
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_KEEPER
    - secretKey: DISCORD_TOKEN_PITCH
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_PITCH
    - secretKey: DISCORD_TOKEN_PLANNER
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_PLANNER
    - secretKey: DISCORD_TOKEN_PLAYMON
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_PLAYMON
    - secretKey: DISCORD_TOKEN_PM
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_PM
    - secretKey: DISCORD_TOKEN_RESEARCH
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_RESEARCH
    - secretKey: DISCORD_TOKEN_STITCH
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_STITCH
    - secretKey: DISCORD_TOKEN_OPTIMIST
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_OPTIMIST
    - secretKey: DISCORD_TOKEN_PESSIMIST
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_PESSIMIST

---
# =============================================================================
# openclaw-api-keys - Shared API keys for model providers and services
# =============================================================================
# Reuses existing OpenBao paths (same keys as CTO platform)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openclaw-api-keys
  namespace: bots
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/instance: external-secrets-config
    app.kubernetes.io/part-of: openclaw
    app.kubernetes.io/component: api-keys
  annotations:
    argocd.argoproj.io/tracking-id: external-secrets-config:external-secrets.io/ExternalSecret:bots/openclaw-api-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-api-keys
    creationPolicy: Owner
  data:
    # Primary model provider
    - secretKey: anthropic-api-key
      remoteRef:
        key: api-keys
        property: ANTHROPIC_API_KEY
    # Fallback / secondary provider
    - secretKey: openai-api-key
      remoteRef:
        key: api-keys
        property: OPENAI_API_KEY
    # GitHub PAT for private repo cloning and git operations
    - secretKey: github-pat
      remoteRef:
        key: tools-github
        property: GITHUB_PERSONAL_ACCESS_TOKEN
    # Factory API key (Droid CLI — model provider TBD)
    - secretKey: factory-api-key
      remoteRef:
        key: api-keys
        property: FACTORY_API_KEY
    # Brave Search API key (web_search tool)
    - secretKey: brave-api-key
      remoteRef:
        key: api-keys
        property: BRAVE_API_KEY
    # Firecrawl API key (anti-bot web scraping)
    - secretKey: firecrawl-api-key
      remoteRef:
        key: api-keys
        property: FIRECRAWL_API_KEY
    # 1Password Service Account token for headless op CLI
    # IMPORTANT: You must create a 1Password Service Account and store
    # the token in OpenBao at: secret/openclaw-onepassword
    - secretKey: op-service-account-token
      remoteRef:
        key: openclaw-onepassword
        property: OP_SERVICE_ACCOUNT_TOKEN
