---
# ConfigMap with connection strings for AlertHub services
# Applications can mount this to get database connection information
apiVersion: v1
kind: ConfigMap
metadata:
  name: alerthub-connection-strings
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-config
    app.kubernetes.io/part-of: alerthub
    app.kubernetes.io/component: config
data:
  # PostgreSQL connection info
  POSTGRES_HOST: alerthub-postgres-rw.alerthub.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DATABASE: alerthub
  POSTGRES_USER: alerthub_user
  # Connection string template (password from secret)
  POSTGRES_URL_TEMPLATE: >-
    postgresql://alerthub_user:${POSTGRES_PASSWORD}@alerthub-postgres-rw.alerthub.svc.cluster.local:5432/alerthub

  # Valkey/Redis connection info
  VALKEY_HOST: alerthub-valkey.alerthub.svc.cluster.local
  VALKEY_PORT: "6379"
  REDIS_HOST: alerthub-valkey.alerthub.svc.cluster.local
  REDIS_PORT: "6379"
  REDIS_URL: redis://alerthub-valkey.alerthub.svc.cluster.local:6379

  # Kafka connection info
  KAFKA_BOOTSTRAP_SERVERS: alerthub-kafka-kafka-bootstrap.alerthub.svc.cluster.local:9092
  KAFKA_BOOTSTRAP_SERVERS_TLS: alerthub-kafka-kafka-bootstrap.alerthub.svc.cluster.local:9093

  # MongoDB connection info
  MONGODB_HOST: alerthub-mongodb-rs0.alerthub.svc.cluster.local
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: alerthub
  # Connection string template (password from secret)
  MONGODB_URL_TEMPLATE: >-
    mongodb://alerthub_user:${MONGODB_PASSWORD}@alerthub-mongodb-rs0.alerthub.svc.cluster.local:27017/alerthub?replicaSet=rs0

  # RabbitMQ connection info
  RABBITMQ_HOST: alerthub-rabbitmq.alerthub.svc.cluster.local
  RABBITMQ_PORT: "5672"
  RABBITMQ_MANAGEMENT_PORT: "15672"
  RABBITMQ_VHOST: alerthub
  RABBITMQ_USER: alerthub_user
  # Connection string template (password from secret)
  RABBITMQ_URL_TEMPLATE: >-
    amqp://alerthub_user:${RABBITMQ_PASSWORD}@alerthub-rabbitmq.alerthub.svc.cluster.local:5672/alerthub

  # SeaweedFS S3-compatible storage (deployed separately in seaweedfs namespace)
  SEAWEEDFS_S3_ENDPOINT: http://seaweedfs-filer.seaweedfs.svc.cluster.local:8333
  SEAWEEDFS_FILER_ENDPOINT: http://seaweedfs-filer.seaweedfs.svc.cluster.local:8888
  SEAWEEDFS_MASTER_ENDPOINT: http://seaweedfs-master.seaweedfs.svc.cluster.local:9333
  # Default bucket for AlertHub assets
  S3_BUCKET: alerthub
  S3_REGION: us-east-1
---
# External secrets reference for production use
# This ConfigMap provides environment variable names that map to secrets
apiVersion: v1
kind: ConfigMap
metadata:
  name: alerthub-secret-refs
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-config
    app.kubernetes.io/part-of: alerthub
    app.kubernetes.io/component: config
data:
  # Secret names for each service
  # PostgreSQL credentials are auto-generated by CloudNativePG
  # Secret name: alerthub-postgres-app
  POSTGRES_SECRET_NAME: alerthub-postgres-app
  POSTGRES_PASSWORD_KEY: password

  # MongoDB credentials
  MONGODB_SECRET_NAME: alerthub-mongodb-users
  MONGODB_PASSWORD_KEY: MONGODB_USER_ADMIN_PASSWORD

  # RabbitMQ credentials
  RABBITMQ_SECRET_NAME: alerthub-rabbitmq-user-credentials
  RABBITMQ_PASSWORD_KEY: password
