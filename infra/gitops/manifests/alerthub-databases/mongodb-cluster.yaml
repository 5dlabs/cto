---
# AlertHub MongoDB cluster using Percona Operator
# Used for document storage and flexible schema data
# Source: https://github.com/percona/percona-server-mongodb-operator
apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDB
metadata:
  name: alerthub-mongodb
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-mongodb
    app.kubernetes.io/part-of: alerthub
    app.kubernetes.io/component: database
  finalizers:
    - delete-psmdb-pods-in-order
spec:
  # CRW image version
  crVersion: 1.18.0
  image: percona/percona-server-mongodb:7.0.8-5

  # Update strategy
  updateStrategy: SmartUpdate

  # Allow unsafe configurations for development
  # Set to false in production
  allowUnsafeConfigurations: true

  # Replica set configuration
  replsets:
    - name: rs0
      size: 1
      # Affinity - allow scheduling on any node for dev
      affinity:
        antiAffinityTopologyKey: "none"
      # Pod disruption budget
      podDisruptionBudget:
        maxUnavailable: 1
      # Storage configuration
      volumeSpec:
        persistentVolumeClaim:
          storageClassName: mayastor
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
      # Resource limits
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
      # Non-voting configuration (single node)
      nonvoting:
        enabled: false
      # Arbiter configuration (not needed for single node)
      arbiter:
        enabled: false

  # Sharding disabled for development
  sharding:
    enabled: false

  # PMM monitoring disabled
  pmm:
    enabled: false

  # Backup configuration (disabled for dev)
  backup:
    enabled: false

  # Users configuration
  users:
    - name: alerthub_user
      db: admin
      passwordSecretRef:
        name: alerthub-mongodb-users
        key: MONGODB_USER_ADMIN_PASSWORD
      roles:
        - name: readWriteAnyDatabase
          db: admin
        - name: dbAdminAnyDatabase
          db: admin

  # Secrets configuration
  secrets:
    users: alerthub-mongodb-secrets
---
# MongoDB users secret (will be auto-generated by operator if not exists)
apiVersion: v1
kind: Secret
metadata:
  name: alerthub-mongodb-secrets
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-mongodb
    app.kubernetes.io/part-of: alerthub
type: Opaque
stringData:
  # Default passwords for development - change in production
  MONGODB_BACKUP_USER: backup
  MONGODB_BACKUP_PASSWORD: backup123
  MONGODB_CLUSTER_ADMIN_USER: clusterAdmin
  MONGODB_CLUSTER_ADMIN_PASSWORD: clusterAdmin123
  MONGODB_CLUSTER_MONITOR_USER: clusterMonitor
  MONGODB_CLUSTER_MONITOR_PASSWORD: clusterMonitor123
  MONGODB_USER_ADMIN_USER: userAdmin
  MONGODB_USER_ADMIN_PASSWORD: userAdmin123
---
# Additional users secret for application access
apiVersion: v1
kind: Secret
metadata:
  name: alerthub-mongodb-users
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-mongodb
    app.kubernetes.io/part-of: alerthub
type: Opaque
stringData:
  MONGODB_USER_ADMIN_PASSWORD: alerthub_password123
