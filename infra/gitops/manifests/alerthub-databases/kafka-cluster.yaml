---
# AlertHub Kafka cluster using Strimzi Operator
# Used for event streaming and message processing
# KRaft mode (no ZooKeeper dependency)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: alerthub-kafka-pool
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-kafka
    app.kubernetes.io/part-of: alerthub
    app.kubernetes.io/component: messaging
    strimzi.io/cluster: alerthub-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        class: mayastor
        deleteClaim: false
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2Gi
      cpu: "1"
---
# Kafka cluster with KRaft mode (ZooKeeper-less)
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: alerthub-kafka
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-kafka
    app.kubernetes.io/part-of: alerthub
    app.kubernetes.io/component: messaging
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.8.0
    # Listener configuration
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    # Kafka configuration
    config:
      # Replication settings (single node)
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      # Performance tuning
      num.partitions: 3
      log.retention.hours: 168
      log.segment.bytes: 1073741824
      log.retention.check.interval.ms: 300000
      # Auto-create topics for development
      auto.create.topics.enable: true
    # Metrics configuration
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: alerthub-kafka-metrics
          key: kafka-metrics-config.yml
  # Entity Operator for topic and user management
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
    userOperator:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
---
# Default Kafka topic for alerts
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: alerts
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-kafka
    app.kubernetes.io/part-of: alerthub
    strimzi.io/cluster: alerthub-kafka
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: 604800000
    segment.bytes: 1073741824
---
# Kafka topic for events
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: events
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-kafka
    app.kubernetes.io/part-of: alerthub
    strimzi.io/cluster: alerthub-kafka
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: 604800000
    segment.bytes: 1073741824
---
# ConfigMap for Kafka metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: alerthub-kafka-metrics
  namespace: alerthub
  labels:
    app.kubernetes.io/name: alerthub-kafka
    app.kubernetes.io/part-of: alerthub
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    rules:
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          topic: "$4"
          partition: "$5"
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          broker: "$4:$5"
      - pattern: kafka.server<type=(.+), name=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
      - pattern: kafka.server<type=(.+), name=(.+)><>Count
        name: kafka_server_$1_$2_total
        type: COUNTER
