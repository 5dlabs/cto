---
# ExternalSecrets for GitLab namespace
# Synced from OpenBao when it's unsealed

# =============================================================================
# gitlab-initial-root-password - GitLab admin root password
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-initial-root-password
  namespace: gitlab
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/instance: external-secrets-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitlab-initial-root-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: gitlab
        property: root-password

---
# =============================================================================
# gitlab-registry-secret - Docker credentials for pulling from GitLab registry
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-registry-secret
  namespace: gitlab
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/instance: external-secrets-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitlab-registry-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: gitlab-registry
        property: .dockerconfigjson

---
# =============================================================================
# gitlab-oauth-credentials - OAuth app credentials for CTO agent platform
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-oauth-credentials
  namespace: gitlab
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/instance: external-secrets-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitlab-oauth-credentials
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: gitlab-oauth
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: gitlab-oauth
        property: client-secret

---
# =============================================================================
# gitlab-runner-token - Runner registration token for GitLab Runner
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-runner-token
  namespace: gitlab-runners
  labels:
    app.kubernetes.io/managed-by: external-secrets
    app.kubernetes.io/instance: external-secrets-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: gitlab-runner-token
    creationPolicy: Owner
  data:
    - secretKey: runner-registration-token
      remoteRef:
        key: gitlab-runner
        property: registration-token
    - secretKey: runner-token
      remoteRef:
        key: gitlab-runner
        property: registration-token
