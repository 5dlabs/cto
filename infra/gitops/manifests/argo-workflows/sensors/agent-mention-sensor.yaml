---
# =============================================================================
# Agent @Mention Sensor
# =============================================================================
# Triggers agent actions when @mentioned in PR comments or review comments.
# Supports all implementation agents: Rex, Grizz, Nova, Blaze, Tap, Spark, Vex, Forge
# Plus support agents: Stitch (review), Cleo (quality), Cipher (security), Tess (testing)
#
# Examples:
#   "@5DLabs-Stitch please re-review the error handling"
#   "@5DLabs-Rex fix the clippy warnings"
#   "@5DLabs-Blaze update the component styling"
#
# Webhook: Org-level GitHub webhook → github-webhooks.5dlabs.ai
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: agent-mention
  namespace: automation
  labels:
    app.kubernetes.io/name: agent-mention
    app.kubernetes.io/component: sensor
    platform.5dlabs.io/log-collection: enabled
spec:
  dependencies:
    # PR comment mentions (issue_comment on PRs)
    - name: pr-comment-mention
      eventSourceName: github
      eventName: org
      filters:
        data:
          # issue_comment events (PRs are issues in GitHub's model)
          - path: body.X-GitHub-Event
            type: string
            value:
              - issue_comment
          # Only on created comments (not edited/deleted)
          - path: body.action
            type: string
            value:
              - created
          # Only from human users (not bots)
          - path: body.comment.user.type
            type: string
            value:
              - User
        # Must mention one of our agents AND be on a PR (check pull_request.url exists)
        exprs:
          - expr: >-
              body =~ "(?i)@5dlabs-(stitch|rex|grizz|nova|blaze|tap|spark|vex|forge|cleo|cipher|tess)" && prUrl != ""
            fields:
              - name: body
                path: body.comment.body
              - name: prUrl
                path: body.issue.pull_request.url

    # Review comment mentions (pull_request_review_comment)
    - name: review-comment-mention
      eventSourceName: github
      eventName: org
      filters:
        data:
          - path: body.X-GitHub-Event
            type: string
            value:
              - pull_request_review_comment
          - path: body.action
            type: string
            value:
              - created
          - path: body.comment.user.type
            type: string
            value:
              - User
        exprs:
          - expr: >-
              body =~ "(?i)@5dlabs-(stitch|rex|grizz|nova|blaze|tap|spark|vex|forge|cleo|cipher|tess)"
            fields:
              - name: body
                path: body.comment.body

  template:
    serviceAccountName: argo-events-sa
    metadata:
      labels:
        platform.5dlabs.io/log-collection: enabled

  triggers:
    # Trigger for PR comment mentions
    - template:
        name: handle-pr-comment-mention
        conditions: pr-comment-mention
        http:
          url: http://cto-pm.cto.svc.cluster.local:8081/webhooks/github/mention
          method: POST
          headers:
            Content-Type: application/json
            X-Mention-Source: issue_comment
          payload:
            - src:
                dependencyName: pr-comment-mention
                dataKey: body
              dest: payload
      retryStrategy:
        steps: 3
        duration: 5s

    # Trigger for review comment mentions
    - template:
        name: handle-review-comment-mention
        conditions: review-comment-mention
        http:
          url: http://cto-pm.cto.svc.cluster.local:8081/webhooks/github/mention
          method: POST
          headers:
            Content-Type: application/json
            X-Mention-Source: pull_request_review_comment
          payload:
            - src:
                dependencyName: review-comment-mention
                dataKey: body
              dest: payload
      retryStrategy:
        steps: 3
        duration: 5s
