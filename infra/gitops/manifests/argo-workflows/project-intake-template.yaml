---
# =========================================================================
# Project Intake WorkflowTemplate
# =========================================================================
# This template handles PRD intake with a separate GitHub preparation step:
#
# 1. github-prep: Creates new repo (if needed) or validates existing repo,
#                 sets up webhooks, outputs repository URL
# 2. intake-container: Runs tasks CLI to parse PRD and generate tasks
# 3. cleanup: Removes temporary ConfigMaps
#
# The github-prep step is decoupled from intake, ensuring repository
# creation/setup is handled separately before the main intake runs.
# =========================================================================
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: project-intake
  namespace: cto
  labels:
    app.kubernetes.io/name: controller
    app.kubernetes.io/component: project-intake
    app.kubernetes.io/managed-by: Helm
spec:
  activeDeadlineSeconds: 7200
  serviceAccountName: argo-workflow
  entrypoint: intake-main
  arguments:
    parameters:
      # Core parameters
      - name: configmap-name
        description: "Name of the ConfigMap containing intake files"
      - name: project-name
        description: "Project name (used for repo creation if no URL provided)"
        value: ""
      - name: repository-url
        description: "Target repository URL (empty = create new repo)"
        value: ""
      - name: source-branch
        description: "Source branch to work from"
        value: "main"
      # GitHub parameters
      - name: github-app
        description: "GitHub App for authentication"
      - name: github-default-org
        description: "Default GitHub org for new repos"
        value: "5dlabs"
      - name: github-visibility
        description: "Visibility for new repos (public/private)"
        value: "private"
      - name: webhook-callback-url
        description: "Webhook callback URL for GitHub events"
        value: ""
      # AI model parameters
      - name: primary-model
        description: "Primary AI model for task generation"
      - name: research-model
        description: "Research AI model"
      - name: fallback-model
        description: "Fallback AI model"
      - name: primary-provider
        description: "Primary AI provider"
      - name: research-provider
        description: "Research AI provider"
      - name: fallback-provider
        description: "Fallback AI provider"
      # Task generation parameters
      - name: num-tasks
        description: "Target number of tasks to generate"
        value: "15"
      - name: expand-tasks
        description: "Whether to expand tasks with subtasks"
        value: "true"
      - name: analyze-complexity
        description: "Whether to analyze task complexity"
        value: "true"
      - name: docs-model
        description: "Model for documentation generation"
        value: ""
      - name: enrich-context
        description: "Whether to enrich context from URLs"
        value: "true"
      - name: include-codebase
        description: "Whether to include codebase context"
        value: "false"
      - name: cli
        description: "CLI tool to use (when mode=cli)"
        value: "claude"
      - name: intake-mode
        description: "Intake mode: api (direct API calls) or cli (use AI CLI)"
        value: "api"
      # Linear callback parameters
      - name: linear-session-id
        description: "Linear session ID for callbacks"
        value: ""
      - name: linear-issue-id
        description: "Linear issue ID"
        value: ""
      - name: linear-issue-identifier
        description: "Linear issue identifier (e.g., TSK-1)"
        value: ""
      - name: linear-team-id
        description: "Linear team ID"
        value: ""
      # Runtime image (can be overridden for dev)
      # Uses claude image which includes the Anthropic Claude CLI
      - name: runtime-image
        description: "Container image for workflow steps"
        value: "ghcr.io/5dlabs/claude:latest"

  templates:
    # =========================================================================
    # Main Entry Point
    # =========================================================================
    - name: intake-main
      steps:
        # Step 1: GitHub Preparation (creates repo if needed, sets up webhooks)
        - - name: github-prep
            template: github-prep-container
            arguments:
              parameters:
                - name: configmap-name
                  value: "{{workflow.parameters.configmap-name}}"

        # Step 2: Run intake (expects valid repository URL from github-prep)
        - - name: run-intake
            template: intake-container
            arguments:
              parameters:
                - name: configmap-name
                  value: "{{workflow.parameters.configmap-name}}"
                - name: repository-url
                  value: "{{steps.github-prep.outputs.parameters.repository-url}}"

        # Step 3: Cleanup ConfigMap
        - - name: cleanup-config
            template: cleanup-intake-config
            arguments:
              parameters:
                - name: configmap-name
                  value: "{{workflow.parameters.configmap-name}}"

    # =========================================================================
    # GitHub Preparation Step
    # =========================================================================
    # Creates repository if not provided, validates access, sets up webhooks
    - name: github-prep-container
      inputs:
        parameters:
          - name: configmap-name
      outputs:
        parameters:
          - name: repository-url
            valueFrom:
              path: /tmp/repository-url
      container:
        image: "{{workflow.parameters.runtime-image}}"
        imagePullPolicy: Always
        command: ["/bin/bash"]
        args: ["/agent-templates/github_prep.sh"]
        workingDir: /workspace
        # Run as node user (UID 1000) to match image user
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        env:
          # Linear Agent Activity emission (pm-activity)
          - name: LINEAR_SESSION_ID
            value: "{{workflow.parameters.linear-session-id}}"
          - name: LINEAR_ISSUE_ID
            value: "{{workflow.parameters.linear-issue-id}}"
          - name: LINEAR_ISSUE_IDENTIFIER
            value: "{{workflow.parameters.linear-issue-identifier}}"
          - name: LINEAR_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: linear-secrets
                key: LINEAR_OAUTH_TOKEN
          - name: GITHUB_APP_ID
            valueFrom:
              secretKeyRef:
                name: github-app-5dlabs-morgan
                key: app-id
                optional: true
          - name: GITHUB_APP_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: github-app-5dlabs-morgan
                key: private-key
                optional: true
          - name: GITHUB_APP_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: github-app-5dlabs-morgan
                key: client-id
                optional: true
          - name: GITHUB_APP_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: github-app-5dlabs-morgan
                key: client-secret
                optional: true
          - name: GITHUB_APP
            value: "{{workflow.parameters.github-app}}"
        volumeMounts:
          - name: intake-files
            mountPath: /intake-files
            readOnly: true
          - name: agent-templates
            mountPath: /agent-templates
            readOnly: true
      volumes:
        - name: intake-files
          configMap:
            name: "{{inputs.parameters.configmap-name}}"
        - name: agent-templates
          projected:
            sources:
              - configMap:
                  name: controller-agent-templates-intake
                  optional: true

    # =========================================================================
    # Intake Container Step (via CodeRun CR)
    # =========================================================================
    # Creates a CodeRun CR for intake which the controller processes using
    # the Handlebars templates (morgan/intake.sh.hbs). This aligns intake with
    # the Play workflow architecture - single source of truth for all agent scripts.
    - name: intake-container
      inputs:
        parameters:
          - name: configmap-name
          - name: repository-url
      outputs:
        parameters:
          - name: coderun-name
            valueFrom:
              parameter: "{{steps.create-intake-coderun.outputs.parameters.coderun-name}}"
      steps:
        - - name: create-intake-coderun
            template: create-intake-coderun
            arguments:
              parameters:
                - name: configmap-name
                  value: "{{inputs.parameters.configmap-name}}"
                - name: repository-url
                  value: "{{inputs.parameters.repository-url}}"
        - - name: wait-for-job
            template: wait-for-intake-job
            arguments:
              parameters:
                - name: coderun-name
                  value: "{{steps.create-intake-coderun.outputs.parameters.coderun-name}}"
        - - name: wait-for-completion
            template: wait-for-intake-completion
            arguments:
              parameters:
                - name: coderun-name
                  value: "{{steps.create-intake-coderun.outputs.parameters.coderun-name}}"

    # =========================================================================
    # Create Intake CodeRun Resource
    # =========================================================================
    - name: create-intake-coderun
      inputs:
        parameters:
          - name: configmap-name
          - name: repository-url
      outputs:
        parameters:
          - name: coderun-name
            valueFrom:
              path: /tmp/coderun-name.txt
      script:
        image: alpine/k8s:1.31.0
        command: [sh]
        source: |
          #!/bin/sh
          set -e

          # Build CodeRun manifest for intake
          PROJECT_NAME="{{workflow.parameters.project-name}}"
          REPOSITORY_URL="{{inputs.parameters.repository-url}}"
          GITHUB_APP="{{workflow.parameters.github-app}}"
          WORKFLOW_NAME="{{workflow.name}}"
          CONFIGMAP_NAME="{{inputs.parameters.configmap-name}}"

          # Model configuration
          PRIMARY_MODEL="{{workflow.parameters.primary-model}}"
          
          # Task generation parameters
          NUM_TASKS="{{workflow.parameters.num-tasks}}"
          EXPAND_TASKS="{{workflow.parameters.expand-tasks}}"
          ANALYZE_COMPLEXITY="{{workflow.parameters.analyze-complexity}}"
          
          # Intake mode
          INTAKE_MODE="{{workflow.parameters.intake-mode}}"
          INTAKE_CLI="{{workflow.parameters.cli}}"

          # Linear integration
          LINEAR_SESSION_ID="{{workflow.parameters.linear-session-id}}"
          LINEAR_ISSUE_ID="{{workflow.parameters.linear-issue-id}}"
          LINEAR_TEAM_ID="{{workflow.parameters.linear-team-id}}"

          # Validate required parameters
          if [ -z "$PROJECT_NAME" ]; then
            echo "ERROR: project-name is required"
            exit 1
          fi
          if [ -z "$REPOSITORY_URL" ]; then
            echo "ERROR: repository-url is required (should come from github-prep step)"
            exit 1
          fi

          # Generate unique name suffix
          TIMESTAMP=$(date +%s)
          NAME_SUFFIX=$(echo "$PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-20)

          cat > /tmp/coderun.yaml << MANIFEST_EOF
          apiVersion: agents.platform/v1
          kind: CodeRun
          metadata:
            generateName: "intake-${NAME_SUFFIX}-"
            namespace: cto
            labels:
              workflow-type: intake
              workflow-name: "${WORKFLOW_NAME}"
              project-name: "${NAME_SUFFIX}"
              github-app: "${GITHUB_APP}"
          spec:
            runType: intake
            service: "${PROJECT_NAME}"
            repositoryUrl: "${REPOSITORY_URL}"
            githubApp: "${GITHUB_APP}"
            model: "${PRIMARY_MODEL}"
            enableDocker: false
            env:
              PROJECT_NAME: "${PROJECT_NAME}"
              REPOSITORY_URL: "${REPOSITORY_URL}"
              NUM_TASKS: "${NUM_TASKS}"
              EXPAND_TASKS: "${EXPAND_TASKS}"
              ANALYZE_COMPLEXITY: "${ANALYZE_COMPLEXITY}"
              INTAKE_MODE: "${INTAKE_MODE}"
              INTAKE_CLI: "${INTAKE_CLI}"
              INTAKE_CONFIGMAP: "${CONFIGMAP_NAME}"
              WORKFLOW_NAME: "${WORKFLOW_NAME}"
          MANIFEST_EOF

          # Add linearIntegration section if LINEAR_SESSION_ID is provided
          if [ -n "${LINEAR_SESSION_ID}" ]; then
            cat >> /tmp/coderun.yaml << LINEAR_EOF
            linearIntegration:
              enabled: true
              sessionId: "${LINEAR_SESSION_ID}"
              issueId: "${LINEAR_ISSUE_ID}"
              teamId: "${LINEAR_TEAM_ID}"
          LINEAR_EOF
          fi

          echo "Creating CodeRun resource for intake..."
          cat /tmp/coderun.yaml
          echo "---"

          RESULT=$(kubectl create -f /tmp/coderun.yaml -o json)
          NAME=$(echo "$RESULT" | jq -r '.metadata.name')
          echo "Created CodeRun: $NAME"
          echo "$NAME" > /tmp/coderun-name.txt

    # =========================================================================
    # Wait for Job Creation (Controller Processing)
    # =========================================================================
    - name: wait-for-intake-job
      inputs:
        parameters:
          - name: coderun-name
      resource:
        action: get
        manifest: |
          apiVersion: agents.platform/v1
          kind: CodeRun
          metadata:
            name: "{{inputs.parameters.coderun-name}}"
            namespace: cto
        successCondition: status.jobName
        failureCondition: status.phase == Failed
      retryStrategy:
        limit: 20
        retryPolicy: "OnError"
        backoff:
          duration: "30s"
          factor: 2
          maxDuration: "10m"

    # =========================================================================
    # Wait for Intake Completion
    # =========================================================================
    - name: wait-for-intake-completion
      inputs:
        parameters:
          - name: coderun-name
      resource:
        action: get
        manifest: |
          apiVersion: agents.platform/v1
          kind: CodeRun
          metadata:
            name: "{{inputs.parameters.coderun-name}}"
            namespace: cto
        successCondition: status.phase == Succeeded
        failureCondition: status.phase == Failed
      retryStrategy:
        limit: 200
        retryPolicy: "OnError"
        backoff:
          duration: "60s"
          factor: 2

    # =========================================================================
    # Cleanup Step
    # =========================================================================
    - name: cleanup-intake-config
      inputs:
        parameters:
          - name: configmap-name
      script:
        image: "{{workflow.parameters.runtime-image}}"
        command: ["/bin/sh"]
        source: |
          #!/bin/sh
          echo "Cleaning up ConfigMap: {{inputs.parameters.configmap-name}}"
          kubectl delete configmap "{{inputs.parameters.configmap-name}}" \
            -n cto \
            --ignore-not-found=true
          echo "Cleanup complete"
