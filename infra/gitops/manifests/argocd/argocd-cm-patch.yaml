---
# ArgoCD ConfigMap Patch
# This configures ArgoCD to use annotation-based resource tracking
# which prevents SharedResourceWarning when multiple apps deploy to the same namespace
#
# Resources are tracked by the argocd.argoproj.io/tracking-id annotation
# instead of namespace + kind + name. This allows multiple apps to share
# a namespace without warnings, as long as each resource has the correct
# tracking annotation pointing to its owning app.
#
# Apply with: kubectl patch configmap argocd-cm -n argocd --patch-file argocd-cm-patch.yaml
#
# TLS terminates at Cloudflare: argocd-server must also run with HTTP on the pod or every
# request 307-redirects to https://argocd.5dlabs.ai/ (infinite loop). Merge patch once:
#   kubectl patch configmap argocd-cmd-params-cm -n argocd --type merge -p '{"data":{"server.insecure":"true"}}'
#   kubectl rollout restart deployment argocd-server -n argocd
# If Argo CD is installed via Helm, set configs.params.server.insecure: true instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Use annotation-based tracking to prevent SharedResourceWarning
  # when multiple apps deploy resources to the same namespace
  # Resources must have: argocd.argoproj.io/tracking-id: <app-name>:<group/kind:namespace/name>
  application.resourceTrackingMethod: annotation

  # External URL (TLS terminates at Cloudflare; pair with server.insecure in argocd-cmd-params-cm)
  url: https://argocd.5dlabs.ai

  # Custom health checks for CRDs that don't have built-in ArgoCD health logic

  # ClusterTunnel (cloudflare-operator): returns Healthy when status is empty
  # (tunnel is not yet provisioned — needs Cloudflare tunnel credentials)
  resource.customizations.health.networking.cfargotunnel.com_ClusterTunnel: |
    hs = {}
    if obj.status == nil or next(obj.status) == nil then
      hs.status = "Healthy"
      hs.message = "Tunnel not yet provisioned"
      return hs
    end
    hs.status = "Healthy"
    hs.message = "Tunnel configured"
    return hs

  # TunnelBinding (cloudflare-operator): always Healthy (binding is declarative)
  resource.customizations.health.networking.cfargotunnel.com_TunnelBinding: |
    hs = {}
    hs.status = "Healthy"
    hs.message = "Binding configured"
    return hs

  # PersistentVolumeClaim: treat Pending PVCs as Healthy (WaitForFirstConsumer binding mode
  # is by design on this cluster — local-path provisioner only binds when a pod consumes the PVC)
  resource.customizations.health.PersistentVolumeClaim: |
    hs = {}
    if obj.status ~= nil then
      if obj.status.phase == "Bound" then
        hs.status = "Healthy"
        hs.message = "PVC bound"
        return hs
      end
      if obj.status.phase == "Pending" then
        hs.status = "Healthy"
        hs.message = "PVC pending (WaitForFirstConsumer)"
        return hs
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting to be bound"
    return hs

  # HTTPRoute (gateway.networking.k8s.io): Healthy when no gateway parent is available
  # Prevents Progressing state when Gateway controller is not deployed
  resource.customizations.health.gateway.networking.k8s.io_HTTPRoute: |
    hs = {}
    if obj.status == nil or obj.status.parents == nil or #obj.status.parents == 0 then
      hs.status = "Healthy"
      hs.message = "No gateway parent configured"
      return hs
    end
    for _, parent in ipairs(obj.status.parents) do
      for _, cond in ipairs(parent.conditions or {}) do
        if cond.type == "Accepted" then
          if cond.status == "True" then
            hs.status = "Healthy"
            return hs
          else
            hs.status = "Degraded"
            hs.message = cond.message
            return hs
          end
        end
      end
    end
    hs.status = "Healthy"
    hs.message = "No Accepted condition"
    return hs
