---
# TLS Certificates for Platform Ingresses - Home Cluster
# Uses cert-manager with self-signed issuer
# DNS: *.home.5dlabs.ai

# ArgoCD Server Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  namespace: argocd
spec:
  secretName: argocd-server-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - argocd.home.5dlabs.ai
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days
---
# Argo Workflows Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argo-workflows-server-tls
  namespace: automation
spec:
  secretName: argo-workflows-server-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - workflows.home.5dlabs.ai
  duration: 2160h
  renewBefore: 360h
---
# Headscale Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: headscale-tls
  namespace: headscale
spec:
  secretName: headscale-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - headscale.home.5dlabs.ai
    - headscale.headscale.svc.cluster.local
    - headscale.headscale.svc
    - headscale
  duration: 2160h
  renewBefore: 360h
---
# Hubble UI Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hubble-ui-tls
  namespace: kube-system
spec:
  secretName: hubble-ui-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - hubble.home.5dlabs.ai
  duration: 2160h
  renewBefore: 360h
