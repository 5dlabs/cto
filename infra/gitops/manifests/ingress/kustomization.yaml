---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - letsencrypt-issuer.yaml
  - certificates-fra.yaml  # Frankfurt cluster (*.fra.5dlabs.ai)
  - platform-ingress-fra.yaml  # Frankfurt cluster (*.fra.5dlabs.ai)
  # For home cluster, use: certificates-home.yaml + platform-ingress-home.yaml (*.home.5dlabs.ai)

# Common labels
commonLabels:
  app.kubernetes.io/part-of: platform
  app.kubernetes.io/managed-by: argocd
