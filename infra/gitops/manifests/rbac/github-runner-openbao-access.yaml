---
# RBAC for GitHub Actions runners to access OpenBao secrets
# Required for web-ci workflow to fetch DATABASE_URL and BETTER_AUTH_SECRET
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-runner-openbao-access
  namespace: openbao
rules:
  # Allow reading the openbao-token secret
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["openbao-token"]
    verbs: ["get"]
  # Allow exec into openbao pods to run bao commands
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Allow listing pods to find openbao-0
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-runner-openbao-access
  namespace: openbao
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-runner-openbao-access
subjects:
  - kind: ServiceAccount
    name: k8s-runner-gha-rs-no-permission
    namespace: arc-runners
