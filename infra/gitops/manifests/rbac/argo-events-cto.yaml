---
# Allow argo-events-sa in automation namespace to create workflows in cto namespace
# This is required for GitHub webhook sensors to trigger play workflows
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-workflows-cto
  namespace: cto
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-workflow-controller
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: automation
