---
# Cilium Helm values for k3s on OVH Public Cloud (BHS5)
# Replaces flannel CNI — k3s started with --flannel-backend=none --disable-network-policy

# Cluster identity
cluster:
  name: cto-ovh
  id: 1

# k3s API server (control-plane public IP)
k8sServiceHost: "51.79.26.198"
k8sServicePort: "6443"

# k3s includes kube-proxy — keep partial replacement mode initially
# Set to false so cilium handles pod routing but kube-proxy handles Services
kubeProxyReplacement: false

# Tunnel mode (VXLAN) — safe default for cloud VMs without BGP/direct-routing support
# OVH VMs may not support native routing without extra cloud config
routingMode: tunnel
tunnelProtocol: vxlan

# MTU: OVH uses 1500 on physical NIC; VXLAN overhead = 50 bytes → pod MTU 1450
mtu: 1450

# IPAM — use kubernetes mode (respects k3s --cluster-cidr=10.42.0.0/16)
ipam:
  mode: kubernetes

# k3s pod CIDR
# Note: k3s default is 10.42.0.0/16; services 10.43.0.0/16
ipv4NativeRoutingCIDR: 10.42.0.0/16

# Hubble observability
hubble:
  enabled: true
  relay:
    enabled: true
    replicas: 1
  ui:
    enabled: true
    replicas: 1
    frontend:
      server:
        ipv6:
          enabled: false
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp

# Operator — 1 replica is fine for this cluster size
operator:
  replicas: 1
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 128Mi

# Agent resources
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 256Mi

# BPF masquerading
bpf:
  masquerade: true
  hostLegacyRouting: false

# CNI config paths — same for k3s and Talos
cni:
  install: true
  confPath: /etc/cni/net.d
  binPath: /opt/cni/bin
  exclusive: true

# Run on all nodes including control-plane
tolerations:
  - operator: Exists

# Security — needs privileged for eBPF
securityContext:
  privileged: true

# Encryption disabled (WireGuard conflicts with some k3s networking)
encryption:
  enabled: false

# Prometheus metrics
prometheus:
  enabled: true
  serviceMonitor:
    enabled: false

# Rolling update — allow 1 unavailable at a time
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# Host firewall
hostFirewall:
  enabled: false  # start disabled; enable after verifying connectivity

# Disable features not needed initially
localRedirectPolicy: false
bandwidthManager:
  enabled: false
socketLB:
  enabled: true
  hostNamespaceOnly: false

gatewayAPI:
  enabled: false
ingressController:
  enabled: false
nodeinit:
  enabled: false
externalWorkloads:
  enabled: false
bgp:
  enabled: false

endpointHealthChecking:
  enabled: true

debug:
  enabled: false

image:
  pullPolicy: IfNotPresent

podDisruptionBudget:
  enabled: false  # disabled during initial install
