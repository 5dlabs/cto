---
# ServiceAccount for CodeRun task agent pods (Rex, Blaze, Cipher, Coder, etc.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cto-agent
  namespace: cto
  labels:
    app.kubernetes.io/part-of: cto
    cto.5dlabs.ai/component: agent
---
# ClusterRole for task agents — broad read + targeted write for infra work.
# Coder agent needs node inspection, pod exec, and workload write for GPU /
# MuseTalk / infra rollouts. Symmetric with openclaw-coder which has wildcard
# admin; ephemeral CodeRun pods doing the same work need equivalent reach.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cto-agent
  labels:
    app.kubernetes.io/part-of: cto
    cto.5dlabs.ai/component: agent
rules:
  # Core read (pods, logs, services, events, namespaces, configmaps, secrets)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - services
      - events
      - namespaces
      - configmaps
      - secrets
      - persistentvolumeclaims
      - endpoints
    verbs: ["get", "list", "watch"]
  # Pod exec — needed for in-pod verification (nvidia-smi, torch CUDA checks)
  - apiGroups: [""]
    resources: ["pods/exec", "pods/portforward"]
    verbs: ["create", "get"]
  # Nodes — read + patch (labeling for NFD / GPU scheduling overrides)
  - apiGroups: [""]
    resources: ["nodes", "nodes/status"]
    verbs: ["get", "list", "watch", "patch"]
  # ConfigMap / Secret writes — apply app configs during rollouts
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["create", "update", "patch", "delete"]
  # Apps — read + write for rollouts (deployments, daemonsets for operators)
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
      - daemonsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Batch — read + create (jobs for smoke tests / one-shots)
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ArgoCD — read + sync (patch triggers sync)
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets", "appprojects"]
    verbs: ["get", "list", "watch", "patch"]
  # CTO platform CRDs — full access
  - apiGroups: ["agents.platform", "cto.5dlabs.ai"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Networking — read ingresses / network policies
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  # CRD definitions — read
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # RBAC — read (inspect bindings during debugging)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  # NFD — read NodeFeatures / NodeFeatureRules for GPU detection
  - apiGroups: ["nfd.k8s-sigs.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # NVIDIA GPU operator — read ClusterPolicy + NodeFeatureRule
  - apiGroups: ["nvidia.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Self-access — authorization checks (SelfSubjectAccessReview for can-i)
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews", "selfsubjectrulesreviews"]
    verbs: ["create"]
---
# Bind the ClusterRole to the cto-agent ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cto-agent
  labels:
    app.kubernetes.io/part-of: cto
    cto.5dlabs.ai/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cto-agent
subjects:
  - kind: ServiceAccount
    name: cto-agent
    namespace: cto

