---
# ServiceAccount for CodeRun task agent pods (Rex, Blaze, Cipher, etc.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cto-agent
  namespace: cto
  labels:
    app.kubernetes.io/part-of: cto
    cto.5dlabs.ai/component: agent
---
# ClusterRole for task agents — scoped access to Kubernetes + ArgoCD.
# More limited than Morgan's role: read-heavy, write only where needed.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cto-agent
  labels:
    app.kubernetes.io/part-of: cto
    cto.5dlabs.ai/component: agent
rules:
  # Core resources — read-only for status checks and log tailing
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  # No pods/exec — agents should not pivot into other pods
  # No secrets — prevents privilege escalation via secret exfiltration
  # Apps — read deployments/statefulsets for status checks
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Batch — read jobs (can see their own CodeRun jobs)
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # ArgoCD — read apps + sync (patch triggers sync)
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets", "appprojects"]
    verbs: ["get", "list", "watch", "patch"]
  # CTO platform CRDs — read CodeRuns + update status
  - apiGroups: ["agents.platform", "cto.5dlabs.ai"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Networking — read ingresses
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  # CRD definitions — read
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
# Bind the ClusterRole to the cto-agent ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cto-agent
  labels:
    app.kubernetes.io/part-of: cto
    cto.5dlabs.ai/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cto-agent
subjects:
  - kind: ServiceAccount
    name: cto-agent
    namespace: cto
