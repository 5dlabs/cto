---
# =============================================================================
# Trading API Keys — ExternalSecret
# =============================================================================
# Pulls trading-related API keys from 1Password into a K8s Secret.
# Referenced by trading agent pods via extraEnv[].valueFrom.secretKeyRef.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: trader-api-keys
  namespace: trading
  labels:
    app.kubernetes.io/name: trader-api-keys
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: trading
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: trader-api-keys
    creationPolicy: Owner
  data:
    - secretKey: grok-api-key
      remoteRef:
        key: trader-api-keys
        property: grok-api-key
    - secretKey: simmer-api-key
      remoteRef:
        key: trader-api-keys
        property: simmer-api-key
    - secretKey: gemini-api-key
      remoteRef:
        key: trader-api-keys
        property: gemini-api-key
    - secretKey: polymarket-api-key
      remoteRef:
        key: trader-api-keys
        property: polymarket-api-key
    - secretKey: helius-api-key
      remoteRef:
        key: trader-api-keys
        property: helius-api-key
