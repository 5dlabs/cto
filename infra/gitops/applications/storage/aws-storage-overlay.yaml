---
# AWS Storage Class Overlay - Argo CD Application
# Deploys a StorageClass named "mayastor" backed by EBS gp3 so existing manifests
# that reference storageClass: mayastor work on EKS without modification.
#
# - On EKS: Enable this app via toggle_app (action=enable, application_name=aws-storage-overlay)
#   so PVCs can bind. Leave skip-reconcile in place so app-of-apps still creates this Application.
# - On bare metal: Leave this app disabled (skip-reconcile). Enable the Mayastor app instead.
#
# Switching back to bare metal (no clobber of Mayastor settings):
# 1. Disable this overlay: toggle_app action=disable application_name=aws-storage-overlay
# 2. Argo will prune the overlay's StorageClass (name: mayastor)
# 3. Enable Mayastor: toggle_app action=enable application_name=mayastor
# 4. Mayastor creates its own StorageClass "mayastor". No changes to mayastor.yaml or operator config.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-storage-overlay
  namespace: argocd
  labels:
    app.kubernetes.io/name: aws-storage-overlay
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    # Disabled by default — enable on EKS via toggle_app; on bare metal Mayastor provides "mayastor"
    argocd.argoproj.io/skip-reconcile: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto
    targetRevision: main
    path: infra/gitops/manifests/storage
    directory:
      recurse: false
      include: aws-storage-overlay.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ""

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  revisionHistoryLimit: 3
