---
# Argo CD Application: Cloudflare Tunnel Operator
# Community operator for managing Cloudflare Tunnels via Kubernetes CRDs
# https://github.com/adyanth/cloudflare-operator
#
# All Cloudflare components (operator + tunnel pods) live in operators namespace
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-operator
  namespace: argocd
  labels:
    app.kubernetes.io/name: cloudflare-operator
    app.kubernetes.io/part-of: platform
  annotations:
    # Deploy early so Cloudflare CRDs exist before CTO resources and vault-config
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto.git
    path: infra/gitops/manifests/cloudflare-operator
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: operators

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

  revisionHistoryLimit: 10
