---
# Argo CD Application for Twingate Connector (Helm Chart)
# Deploys Twingate connector pods using the official Helm chart
# Connector tokens are stored in Kubernetes secret via ExternalSecret
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twingate-connector
  namespace: argocd
  labels:
    app.kubernetes.io/name: twingate-connector
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: networking
  annotations:
    # Deploy after the operator is ready
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://twingate.github.io/helm-charts
    chart: connector
    targetRevision: 0.1.*
    helm:
      values: |
        # Twingate connector configuration
        connector:
          # Twingate network subdomain
          network: turquoiseelephant631
          # Use existing secret for tokens
          existingSecret: twingate-connector-tokens

        # Replica count for HA
        replicaCount: 2

        # Resource limits (reduced CPU request for scheduling)
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Pod labels for log collection
        podLabels:
          platform.5dlabs.io/log-collection: enabled

        # Pod annotations for log collection
        podAnnotations:
          logs.platform.5dlabs.io/collect: "true"
          logs.platform.5dlabs.io/service: twingate-connector

        # Service account
        serviceAccount:
          create: true
          name: twingate-connector

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5
