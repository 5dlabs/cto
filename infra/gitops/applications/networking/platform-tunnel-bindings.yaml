---
# Platform Tunnel Bindings Application
#
# Codifies TunnelBindings for platform-level public hostnames (argocd, app,
# pm, grafana) so the cloudflare-operator renders them into its local
# ConfigMap. Required before flipping `cto-main` from CF remote-managed to
# local-managed tunnel configuration.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-tunnel-bindings
  namespace: argocd
  labels:
    app.kubernetes.io/name: platform-tunnel-bindings
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: networking
  annotations:
    # Sync after cloudflare-operator CRDs are installed
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto.git
    path: infra/gitops/manifests/platform-tunnel-bindings
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    # Resources carry their own metadata.namespace (argocd/cto/openclaw)
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  revisionHistoryLimit: 5
