---
# Kilo - WireGuard-based VPN mesh for Kubernetes
# Provides encrypted connectivity between nodes and external peers
#
# After deployment:
# 1. Generate WireGuard keys on your client: wg genkey | tee privatekey | wg pubkey > publickey
# 2. Create a Peer resource with your public key (see manifests/kilo/peer.yaml for example)
# 3. Get the cluster's WireGuard config: kubectl get nodes -o yaml | grep kilo
# 4. Configure your client's WireGuard interface with the cluster's public key and endpoint
#
# Network access provided:
# - Pod CIDR: 10.244.0.0/16
# - Service CIDR: 10.96.0.0/12
# - Node Network: 192.168.1.0/24 (K8s API at 192.168.1.77:6443)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kilo
  namespace: argocd
  labels:
    app.kubernetes.io/name: kilo
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: networking
  annotations:
    # Deploy early as it provides network connectivity
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto.git
    path: infra/gitops/manifests/kilo
    targetRevision: develop

  destination:
    server: https://kubernetes.default.svc
    namespace: kilo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5
