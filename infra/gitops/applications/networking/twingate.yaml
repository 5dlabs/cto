---
# Argo CD Application for Twingate Resources
# Manages Twingate RemoteNetwork, Connector, and Network resources
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twingate
  namespace: argocd
  labels:
    app.kubernetes.io/name: twingate
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: networking
  annotations:
    # Deploy after the operator is ready
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/5dlabs/cto
    path: infra/gitops/manifests/twingate
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: operators
  # Ignore stale v1alpha1 resources that can't be pruned (CRDs no longer exist at v1alpha1)
  ignoreDifferences:
    - group: twingate.com
      kind: TwingateConnector
      name: latitude-connector
    - group: twingate.com
      kind: TwingateRemoteNetwork
      name: latitude-cluster
    - group: twingate.com
      kind: TwingateResource
      name: latitude-pod-network
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
