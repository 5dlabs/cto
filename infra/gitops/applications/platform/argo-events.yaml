---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-events
  namespace: argocd
  labels:
    app.kubernetes.io/name: argo-events
    app.kubernetes.io/part-of: platform
  annotations:
    # Ensure CRDs/controllers are ready before event sources/sensors
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-events
    targetRevision: 2.4.16
    helm:
      values: |
        serviceAccount:
          create: true
          name: argo-events-sa
        singleNamespace: true
        # Note: Don't override app.kubernetes.io/component in podLabels - it's part of the
        # selector and can't be changed on existing Deployments
        controller:
          replicas: 1
          podLabels:
            platform.5dlabs.io/log-collection: enabled
          podAnnotations:
            logs.platform.5dlabs.io/collect: "true"
            logs.platform.5dlabs.io/service: argo-events-controller
        gateway:
          enabled: true
        sensor:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: automation

  ignoreDifferences:
    # Webhook CA bundles are managed by the controller and drift frequently
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
  revisionHistoryLimit: 5
