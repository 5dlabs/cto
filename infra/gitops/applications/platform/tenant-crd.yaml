---
# Tenant CRD ArgoCD Application
# Installs the Tenant Custom Resource Definition for multi-tenancy support
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-crd
  namespace: argocd
  labels:
    app.kubernetes.io/name: tenant-crd
    app.kubernetes.io/part-of: cto-platform
  annotations:
    # Deploy CRD early to prevent Tenant resource race conditions
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://gitlab.5dlabs.ai/5dlabs/cto.git
    targetRevision: main
    path: infra/gitops/manifests/tenant-crd

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
