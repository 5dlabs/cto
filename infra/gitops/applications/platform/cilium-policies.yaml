---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-policies
  namespace: argocd
  labels:
    app.kubernetes.io/name: cilium-policies
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    # Enable via toggle_app MCP tool when running on bare metal
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://git.5dlabs.ai/5dlabs/cto.git
    path: infra/gitops/manifests/cilium/policies
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
