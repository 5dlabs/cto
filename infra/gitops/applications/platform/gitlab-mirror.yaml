---
# In-cluster GitHub -> GitLab mirror (CronJob).
# Pushes via SSH using the deploy key in Secret `gl-mirror-key` (gitlab ns).
# Replaces the external GitHub Actions mirror, which hits Cloudflare's 100MB
# request limit on full clones.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-mirror
  namespace: argocd
  labels:
    app.kubernetes.io/name: gitlab-mirror
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: ci-cd
  annotations:
    # Deploy after GitLab itself is up
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto
    targetRevision: main
    path: infra/charts/gitlab-mirror
    helm:
      releaseName: gitlab-mirror
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground

    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5
