---
# Platform Namespaces
# Ensures core namespaces exist before dependent GitOps apps sync
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-namespaces
  namespace: argocd
  labels:
    app.kubernetes.io/name: platform-namespaces
    app.kubernetes.io/part-of: platform
  annotations:
    # Deploy namespaces very early
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://gitlab.5dlabs.ai/5dlabs/cto.git
    targetRevision: main
    path: infra/cluster-config
    directory:
      include: "{cto-namespace.yaml,external-dns-namespace.yaml,gitlab-namespace.yaml,headscale-namespace.yaml,mayastor-namespace.yaml,observability-namespace.yaml,openbao-namespace.yaml}"

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m

  ignoreDifferences:
    # Namespaces accumulate labels/annotations from other controllers; ignore drift
    - group: ""
      kind: Namespace
      jqPathExpressions:
        - .metadata.labels
        - .metadata.annotations

  revisionHistoryLimit: 5
