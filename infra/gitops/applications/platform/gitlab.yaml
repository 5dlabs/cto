---
# GitLab CE (Self-Hosted)
# Primary Git hosting, container registry, and CI/CD platform
# Replaces GitHub for repos, CI/CD, and container registry
# Accessible at gitlab.5dlabs.ai with registry at registry.5dlabs.ai

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab
  namespace: argocd
  labels:
    app.kubernetes.io/name: gitlab
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: git-platform
  annotations:
    # Deploy after core infrastructure (ingress, cert-manager, external-secrets)
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  sources:
    - repoURL: https://charts.gitlab.io/
      chart: gitlab
      targetRevision: 9.10.0
      helm:
        releaseName: gitlab
        valueFiles:
          - $values/infra/charts/gitlab/values.yaml

    - repoURL: https://github.com/5dlabs/cto
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    - group: batch
      kind: Job
      jqPathExpressions:
        - .spec.template.spec.containers[].env
    # Gitaly StatefulSet: ignore SSA-defaulted fields the API server adds
    # so the chart-rendered manifest doesn't perpetually flag OutOfSync.
    - group: apps
      kind: StatefulSet
      name: gitlab-gitaly
      namespace: gitlab
      jqPathExpressions:
        - .metadata.labels."app.kubernetes.io/managed-by"
        - .metadata.annotations."meta.helm.sh/release-name"
        - .metadata.annotations."meta.helm.sh/release-namespace"
        - .spec.revisionHistoryLimit
        - .spec.persistentVolumeClaimRetentionPolicy
        - .spec.updateStrategy
        - .spec.template.spec.dnsPolicy
        - .spec.template.spec.restartPolicy
        - .spec.template.spec.schedulerName
        - .spec.template.spec.containers[].imagePullPolicy
        - .spec.template.spec.containers[].terminationMessagePath
        - .spec.template.spec.containers[].terminationMessagePolicy
        - .spec.template.spec.containers[].ports[].protocol
        - .spec.template.spec.containers[].env[].valueFrom.resourceFieldRef.divisor
        - .spec.template.spec.containers[].livenessProbe.grpc.service
        - .spec.template.spec.containers[].readinessProbe.grpc.service
        - .spec.template.spec.containers[].startupProbe.grpc.service
        - .spec.template.spec.initContainers[].imagePullPolicy
        - .spec.template.spec.initContainers[].terminationMessagePath
        - .spec.template.spec.initContainers[].terminationMessagePolicy
        - .spec.template.spec.initContainers[].volumeMounts[].readOnly
        - .spec.template.spec.volumes[].configMap.defaultMode
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
        - .spec.volumeClaimTemplates[].metadata.annotations
        - .spec.volumeClaimTemplates[].spec.volumeMode
        - .spec.volumeClaimTemplates[].spec.selector
        - .spec.volumeClaimTemplates[].status

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 5
