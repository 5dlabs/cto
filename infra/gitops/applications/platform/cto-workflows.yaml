---
# ArgoCD Application for CTO-specific Argo Workflow resources
# Deploys WorkflowTemplates and CronWorkflows from the cto repo
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cto-workflows
  namespace: argocd
  labels:
    app.kubernetes.io/name: cto-workflows
    app.kubernetes.io/part-of: platform
  annotations:
    # Deploy after Argo Workflows/Events CRDs are available
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto
    targetRevision: main
    path: infra/gitops/manifests/argo-workflows

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
