---
# =============================================================================
# Morgan Avatar Agent — Phase 2 self-hosted LiveKit wiring
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: avatar-agent-gpu
  namespace: argocd
  labels:
    app.kubernetes.io/name: avatar-agent-gpu
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: avatar-runtime
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  sources:
    - repoURL: https://github.com/5dlabs/cto.git
      targetRevision: main
      path: infra/charts/openclaw-agent
      helm:
        releaseName: avatar-agent-gpu
        valueFiles:
          - ../../gitops/agents/morgan-avatar-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "3m"
