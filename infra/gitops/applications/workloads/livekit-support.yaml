---
# Path-based ArgoCD app for LiveKit support resources:
#   - livekit namespace's Valkey instance (room state)
#   - LiveKit ExternalSecret + signaling tunnel for lk.5dlabs.ai
#
# The livekit-server Helm app deploys the SFU itself; this app
# provides the surrounding infrastructure that lives in our repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: livekit-support
  namespace: argocd
  labels:
    app.kubernetes.io/name: livekit-support
    app.kubernetes.io/part-of: avatar
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto.git
    targetRevision: HEAD
    path: infra/manifests/livekit

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    - group: networking.cfargotunnel.com
      kind: ClusterTunnel
      jsonPointers:
        - /status
    - group: networking.cfargotunnel.com
      kind: TunnelBinding
      jqPathExpressions:
        - .subjects
        - .tunnelRef

  revisionHistoryLimit: 5
