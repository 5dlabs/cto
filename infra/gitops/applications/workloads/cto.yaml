---
# CTO Platform - Single Application Deployment (Main Branch)
# =============================================================================
# Deploys all CTO platform components from a single Helm chart.
# This application tracks the 'main' branch and uses 'latest' tagged images.
#
# Branch-based image tagging:
#   - main branch → images tagged 'latest'
#
# Components:
# - Controller: Agent orchestration and CodeRun management
# - PM Server: Project management integrations (Linear)
# - Tools Server: MCP server proxy
# - Healer: Self-healing platform monitor
# - OpenMemory: Long-term AI agent memory
# - Sensors: Argo Event automation
# - Webhooks: GitHub event handling

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cto
  namespace: argocd
  labels:
    app.kubernetes.io/name: cto
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/branch: main
  annotations:
    # Image Updater for all CTO images
    # Uses digest strategy to track the 'latest' tag specifically
    # NOTE: Version constraint (:latest) required for digest strategy
    argocd-image-updater.argoproj.io/image-list: |
      controller=ghcr.io/5dlabs/controller:latest,
      pm=ghcr.io/5dlabs/pm-server:latest,
      tools=ghcr.io/5dlabs/tools:latest,
      openmemory=ghcr.io/5dlabs/openmemory:latest,
      healer=ghcr.io/5dlabs/healer:latest,
      tweakcn=ghcr.io/5dlabs/tweakcn:latest,
      research=ghcr.io/5dlabs/research:latest
    # Use 'digest' strategy to track the 'latest' tag and auto-update on new pushes
    # This ensures we always get the latest digest when CI pushes a new image
    argocd-image-updater.argoproj.io/controller.update-strategy: "digest"
    argocd-image-updater.argoproj.io/controller.allow-tags: "regexp:^latest$"
    argocd-image-updater.argoproj.io/pm.update-strategy: "digest"
    argocd-image-updater.argoproj.io/pm.allow-tags: "regexp:^latest$"
    argocd-image-updater.argoproj.io/tools.update-strategy: "digest"
    argocd-image-updater.argoproj.io/tools.allow-tags: "regexp:^latest$"
    argocd-image-updater.argoproj.io/openmemory.update-strategy: "digest"
    argocd-image-updater.argoproj.io/openmemory.allow-tags: "regexp:^latest$"
    argocd-image-updater.argoproj.io/healer.update-strategy: "digest"
    argocd-image-updater.argoproj.io/healer.allow-tags: "regexp:^latest$"
    argocd-image-updater.argoproj.io/tweakcn.update-strategy: "digest"
    argocd-image-updater.argoproj.io/tweakcn.allow-tags: "regexp:^latest$"
    argocd-image-updater.argoproj.io/research.update-strategy: "digest"
    argocd-image-updater.argoproj.io/research.allow-tags: "regexp:^latest$"
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto
    targetRevision: main
    path: infra/charts/cto
    helm:
      valueFiles:
        - values.yaml
      # Main branch overrides - uses 'latest' tagged images
      # =======================================================================
      # CLUSTER: Latitude.sh (cto-dal)
      # Worker: hardware-219s058355, Control: hardware-21bs002557
      # Registry: 10.8.0.2:30500 (internal VPN IP)
      # Storage: local-path (no mayastor on Latitude)
      # =======================================================================
      values: |
        global:
          namespace: cto
          imagePullSecrets:
            - name: ghcr-secret
          storageClass: "local-path"  # Latitude uses local-path (no mayastor)
          # Dev registry for local development builds
          devRegistry:
            enabled: true
            url: "10.8.0.2:30500"
            tag: "tilt-dev"
            pullPolicy: Always

        controller:
          enabled: true
          image:
            repository: ghcr.io/5dlabs/controller
            tag: latest

        pm:
          enabled: true
          image:
            repository: ghcr.io/5dlabs/pm-server
            tag: latest
          github:
            defaultOrg: "5dlabs"
            webhookCallbackUrl: "https://pm.5dlabs.ai/webhooks/github"

        tools:
          enabled: true
          image:
            repository: ghcr.io/5dlabs/tools
            tag: latest

        healer:
          enabled: true
          image:
            repository: ghcr.io/5dlabs/healer
            tag: latest

        openmemory:
          enabled: true
          image:
            repository: ghcr.io/5dlabs/openmemory
            tag: latest

        sensors:
          enabled: true

        webhooks:
          enabled: true

        tweakcn:
          enabled: true
          image:
            repository: ghcr.io/5dlabs/tweakcn
            tag: latest

        # Research - Twitter/X bookmark research pipeline
        research:
          enabled: true
          image:
            repository: ghcr.io/5dlabs/research
            tag: latest
          # CronJob schedule (every 5 minutes)
          schedule: "*/5 * * * *"
          # Research configuration
          minRelevance: "0.4"  # Lower threshold to capture more bookmarks
          batchSize: "50"      # Process more per run
          model: "claude-sonnet-4-20250514"
          # PR creation disabled - research is local
          createPR: false
          # Email digest (daily at 9am UTC / 4am EST)
          digest:
            enabled: true
            schedule: "0 9 * * *"
            hoursBetween: "24"
            skipAnalysis: false

        cloudflare:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    # Cloudflare operator adds default values
    - group: networking.cfargotunnel.com
      kind: ClusterTunnel
      jsonPointers:
        - /status
    - group: networking.cfargotunnel.com
      kind: TunnelBinding
      jqPathExpressions:
        - .subjects
        - .tunnelRef

  revisionHistoryLimit: 5
