---
# =============================================================================
# Hermes Gateway — ArgoCD Application
# =============================================================================
# Deploys the upstream nousresearch/hermes-agent image as a Discord gateway
# (`hermes gateway run`) in the cto namespace. This is the production Hermes
# Discord bot — distinct from the `cto-hermes-coder` debug harness
# (which runs `sleep infinity` for kubectl-exec experimentation).
#
# Required pre-existing secrets in the cto namespace:
#   - hermes-coder-secrets       (NOUS_API_KEY, optional NOUS_BASE_URL/MODEL)
#   - openclaw-discord-tokens    (key `coder` -> DISCORD_BOT_TOKEN)
#
# Before merging: replace `discord.allowedUsers` placeholder in
# infra/charts/hermes-gateway/values.yaml with the real Discord user ID,
# and confirm Message Content + Server Members intents are ON in the
# Discord Developer Portal for this bot.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cto-hermes-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/name: cto-hermes-gateway
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: hermes-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://github.com/5dlabs/cto.git
      targetRevision: main
      path: infra/charts/hermes-gateway
      helm:
        releaseName: cto-hermes-gateway

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "3m"
