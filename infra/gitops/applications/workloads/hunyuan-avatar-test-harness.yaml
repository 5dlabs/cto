---
# Hunyuan Avatar Test Harness
# =============================================================================
# Scaffold validation job for Hunyuan Avatar worker availability.
# For now this only verifies the worker pod is running in the cto namespace.
#
# Usage:
#   kubectl apply -f this-file
#   kubectl logs -n cto job/hunyuan-avatar-test-harness -f

apiVersion: batch/v1
kind: Job
metadata:
  name: hunyuan-avatar-test-harness
  namespace: cto
  labels:
    app.kubernetes.io/name: hunyuan-avatar-test-harness
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: test
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hunyuan-avatar-test-harness
        app.kubernetes.io/component: test
    spec:
      restartPolicy: Never
      serviceAccountName: default
      containers:
        - name: verify-worker
          image: alpine/k8s:1.31.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              echo "Checking for running Hunyuan Avatar worker pod..."
              kubectl get pods -n cto -l app.kubernetes.io/name=hunyuan-avatar-worker \
                --field-selector=status.phase=Running \
                --no-headers | grep -q .
              echo "Hunyuan Avatar worker pod is running."
