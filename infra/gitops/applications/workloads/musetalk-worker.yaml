---
# MuseTalk Avatar Rendering Worker
# =============================================================================
# GPU-accelerated lip-sync video generation using MuseTalk on V100S.
# Consumes render requests via NATS JetStream, produces MP4 avatar clips.
#
# Prerequisites:
#   - GPU node with nvidia.com/gpu resource (auto-configured by GPU Operator)
#   - NATS server accessible at openclaw-nats.openclaw.svc.cluster.local
#   - ghcr-secret for image pull
#
# GPU Node: OVH t2-45 (V100S 32GB) in GRA9
# Model: TMElyralab/MuseTalk (MIT license, 30+ FPS on V100)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: musetalk-worker
  namespace: argocd
  labels:
    app.kubernetes.io/name: musetalk-worker
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: avatar-rendering
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd-image-updater.argoproj.io/image-list: |
      worker=ghcr.io/5dlabs/musetalk-worker:0ec30614c
    argocd-image-updater.argoproj.io/worker.update-strategy: "digest"
    argocd-image-updater.argoproj.io/worker.allow-tags: "regexp:^[0-9a-f]{7,40}$"
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto.git
    targetRevision: main
    path: infra/charts/musetalk-worker
    helm:
      valueFiles:
        - values.yaml
      values: |
        image:
          repository: ghcr.io/5dlabs/musetalk-worker
          tag: 0ec30614c

        # Storage class for model weights PVC
        persistence:
          storageClass: "mayastor"
          size: 20Gi

        model:
          repo: "https://github.com/TMElyralab/MuseTalk.git"
          dtype: "float16"

        huggingface:
          existingSecret: "musetalk-hf-token"
          secretKey: "HF_TOKEN"

        # NATS — dedicated JetStream-enabled NATS for musetalk (see cto namespace)
        nats:
          url: "nats://musetalk-nats.cto.svc.cluster.local:4222"

        # Node selector for GPU nodes
        nodeSelector:
          nvidia.com/gpu.present: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

  revisionHistoryLimit: 5
