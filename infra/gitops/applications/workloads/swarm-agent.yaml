---
# =============================================================================
# Swarm Agent — ArgoCD Application
# =============================================================================
# Deploys the Swarm agent for the Canteen hackathon alongside Morgan.
# Uses the same openclaw-platform chart with inline values (Morgan pattern).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-swarm
  namespace: argocd
  labels:
    app.kubernetes.io/name: openclaw-swarm
    app.kubernetes.io/part-of: openclaw
    app.kubernetes.io/component: canteen-hackathon
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/5dlabs/openclaw-platform
    path: charts/openclaw
    targetRevision: main
    helm:
      releaseName: openclaw-swarm
      values: |
        replicaCount: 1
        deploymentMode: statefulset

        global:
          namespace: cto
          createNamespace: false

        openclawCompat:
          schemaVersion: "2026.2"

        image:
          repository: "ghcr.io/5dlabs/agents"
          tag: "latest"
          pullPolicy: Always

        imagePullSecrets:
          - name: ghcr-secret

        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

        nodeOptions: "--max-old-space-size=2048"

        agent:
          id: "swarm"
          name: "Colosseum"
          model: "fireworks/accounts/fireworks/routers/kimi-k2p5-turbo"
          sandbox: "off"
          heartbeat:
            every: "12h"
            target: "last"
            ackMaxChars: 120
            prompt: >-
              If there is no active user request, reply HEARTBEAT_OK and do nothing
              else. Do not start background work or new tasks on your own.

        agentDefaults:
          thinkingDefault: "low"
          typingMode: "instant"

        modelDefaults:
          primary: "fireworks/accounts/fireworks/routers/kimi-k2p5-turbo"
          fallbacks:
            - "google/gemini-2.5-pro"
            - "anthropic/claude-sonnet-4-20250514"
            - "openai-api/gpt-5.4-pro"

        openaiOAuth:
          enabled: true
          authProfilesSecretKey: "openai-oauth-auth-profiles"
          codexAuthSecretKey: "openai-oauth-codex-auth"

        models:
          providers:
            fireworks:
              api: "openai-completions"
              baseUrl: "https://api.fireworks.ai/inference/v1"
              enabled: true
              models:
                - id: "accounts/fireworks/routers/kimi-k2p5-turbo"
                  name: "Kimi K2.5 Turbo (Fire Pass)"
                  contextWindow: 256000
                  maxTokens: 256000
                  reasoning: true
                  input: ["text", "image"]

        secrets:
          external:
            apiKeysSecret: "openclaw-api-keys"
            messagingSecret: "discord-agent-bots"
            githubSecret: "openclaw-github"

        messaging:
          discord:
            enabled: true
            accountId: "swarm"
            tokenSecretKey: "DISCORD_TOKEN_SWARM"
            allowBots: false
            dmPolicy: "allowlist"
            allowFrom:
              - "444519104808878090"
              - "1467013771548426291"
              - "1466937419981918220"
              - "1466938003451674748"
              - "1466938424790356253"
              - "1468829684195135592"
              - "1466930035356078251"
              - "1466938744593715210"
            groupPolicy: "allowlist"
            guilds:
              "*":
                requireMention: true
                users:
                  - "444519104808878090"
                  - "1467013771548426291"
                  - "1466937419981918220"
                  - "1466938003451674748"
                  - "1466938424790356253"
                  - "1468829684195135592"
                  - "1466930035356078251"
                  - "1466938744593715210"
              "1490117571977019524":
                requireMention: true
                slug: "cto-5dlabs"
                users:
                  - "444519104808878090"
                  - "1467013771548426291"
                  - "1466937419981918220"
                  - "1466938003451674748"
                  - "1466938424790356253"
                  - "1468829684195135592"
                  - "1466930035356078251"
                  - "1466938744593715210"

        tools:
          acp:
            enabled: false
          web:
            search:
              enabled: true
              provider: "perplexity"
              perplexity:
                apiKey: "${OPENROUTER_API_KEY}"
                baseUrl: "https://openrouter.ai/api/v1"
                model: "perplexity/sonar-pro"

        code:
          clis:
            claude:
              mcp:
                servers:
                  context7:
                    type: "sse"
                    url: "https://mcp.context7.com/mcp"
                    headers:
                      CONTEXT7_API_KEY: "ctx7sk-8b294504-6e43-45e2-85a3-26e9b38c4a1c"

        storage:
          size: 10Gi
          storageClass: "local-path"

        gateway:
          auth:
            token: "openclaw-internal"
          controlUi:
            enabled: false
          http:
            endpoints:
              chatCompletions:
                enabled: true
              responses:
                enabled: false

        probes:
          readiness:
            enabled: false

        memorySearch:
          enabled: false

        openmemory:
          enabled: false

        mem0:
          enabled: false

        session:
          scope: "per-sender"
          dmScope: "per-channel-peer"

        nats:
          url: "nats://nats.messaging.svc.cluster.local:4222"
          subchart:
            enabled: false

        # Cron scheduler engine — enabled but no jobs auto-registered.
        # The daily-digest job is registered manually via `openclaw cron add`
        # and kept DISABLED until end-to-end testing confirms it works.
        # To enable: `openclaw cron enable <job-id>`
        cron:
          enabled: true
          store: "/workspace/.openclaw/cron/cron.json"
          maxConcurrentRuns: 1

        hooks:
          enabled: true
          path: "/hooks"
          token: "${HOOKS_TOKEN}"

        workspace:
          repos:
            - name: swarm-openclaw-agent
              url: "https://github.com/5dlabs/swarm-openclaw-agent.git"
              branch: "main"
            - name: cto
              url: "https://github.com/5dlabs/cto.git"
              branch: "main"
            - name: openclaw-platform
              url: "https://github.com/5dlabs/openclaw-platform.git"
              branch: "main"
            - name: openclaw
              url: "https://github.com/openclaw/openclaw.git"
              branch: "main"
          files:
            AGENTS.md: |
              # AGENTS.md -- Colosseum (Swarm Agent)

              You are **Colosseum**, the Canteen hackathon research and intelligence agent.

              You specialize in tracking daily development progress across monitored
              GitHub repos, creating concise digests for hackathon judges, and posting
              updates via the SWARM CLI.

              ## Capabilities

              - **Daily Digest**: Monitor GitHub repos, summarize commits/PRs/changes,
                post structured updates via SWARM CLI.
              - **SWARM CLI**: Post product and traction updates to The Canteen platform.
              - **Colosseum Copilot**: Research crypto/Solana startup opportunities.
              - **Web Search**: Find current information about projects, protocols, and teams.

              ## Daily Digest Workflow

              When running the daily digest (via cron or on request):

              ### Step 1: Gather Data
              For each monitored repo, use `gh` CLI or GitHub API to fetch:
              - Commits from the last 24 hours: `gh api repos/{owner}/{repo}/commits --jq '.[].commit.message' -f since=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)`
              - PRs merged in the last 24 hours
              - Files changed and their scope (what areas of the codebase were touched)

              Monitored repos (configured in values):
              - https://github.com/5dlabs/cto
              - https://github.com/5dlabs/openclaw-platform
              - https://github.com/openclaw/openclaw
              - https://github.com/5dlabs/swarm-openclaw-agent

              ### Step 2: Create Digest
              Structure the digest as:
              ```
              ## Daily Progress — {date}

              ### What was accomplished
              - [repo] Brief summary of key changes (group related commits)

              ### Key design decisions
              - Any architectural or design choices made

              ### PRs & Reviews
              - Merged PRs with brief descriptions

              ### Next steps
              - Work in progress or planned for tomorrow
              ```

              ### Step 3: Approval Gate
              **IMPORTANT**: Approval mode is ENABLED by default.
              - When `approval_enabled=true`: Post the draft digest to the Discord
                channel and ask the user to approve before submitting via SWARM.
                Say: "Here's today's digest. Reply 'approve' to post it via SWARM,
                or tell me what to change."
              - When `approval_enabled=false`: Post directly via SWARM CLI.

              ### Step 4: Post via SWARM
              To post a product update programmatically:
              ```bash
              echo "YOUR_UPDATE_TEXT" | python3 -c "
              from swarm import config
              from swarm.push import push_event, ping, drain_queue
              import sys
              text = sys.stdin.read().strip()
              updates = config.get('updates.product') or []
              from datetime import datetime, timezone
              updates.append({'date': datetime.now(timezone.utc).isoformat(), 'text': text})
              config.set_val('updates.product', updates)
              ping()
              push_event('update_product', {'text': text})
              drain_queue()
              print('Product update posted')
              "
              ```

              ### Step 5: Verify
              After posting, verify the update was saved:
              ```bash
              swarm ls product
              ```
              Check that the latest entry matches what was just posted.

              ## Interaction Style

              - Be concise, data-driven, and actionable.
              - Lead with findings, then supporting evidence.
              - When researching a project or team, provide structured analysis.
              - Flag risks and opportunities equally.

              ## Operating Rules

              - SWARM CLI is pre-authenticated as @kaseonedge. No login needed.
              - GitHub CLI (`gh`) is available and authenticated via GITHUB_TOKEN.
              - Always verify SWARM posts after submitting (`swarm ls`).
              - When approval is enabled, NEVER post to SWARM without explicit user approval.
              - Use web search for broader crypto/Solana ecosystem research.

            IDENTITY.md: |
              # IDENTITY.md

              - **Name:** Colosseum
              - **Role:** Canteen hackathon daily digest & research agent
              - **Primary mode:** GitHub repo monitoring, progress digests, SWARM updates
              - **Model:** Fireworks Kimi K2.5 Turbo
              - **Skills:** SWARM CLI, Colosseum Copilot, Daily Digest

            TOOLS.md: |
              # TOOLS.md -- Colosseum

              ## Workspace

              - Root workspace: `/workspace`
              - Swarm chart repo: `/workspace/repos/swarm-openclaw-agent`
              - CTO repo: `/workspace/repos/cto`
              - OpenClaw platform: `/workspace/repos/openclaw-platform`
              - OpenClaw core: `/workspace/repos/openclaw`

              ## Available Tools

              - SWARM CLI: `swarm --help` (Canteen platform interaction)
              - GitHub CLI: `gh` (repo data, commits, PRs — authenticated via GITHUB_TOKEN)
              - Web search via Perplexity (built-in)
              - Context7 MCP server (library docs)

              ## Posting SWARM Updates Programmatically

              The `swarm update-product` and `swarm update-traction` commands are
              interactive (require stdin). Use the Python API directly:

              ```bash
              echo "Update text here" | python3 -c "
              from swarm import config
              from swarm.push import push_event, ping, drain_queue
              import sys
              text = sys.stdin.read().strip()
              updates = config.get('updates.product') or []
              from datetime import datetime, timezone
              updates.append({'date': datetime.now(timezone.utc).isoformat(), 'text': text})
              config.set_val('updates.product', updates)
              ping()
              push_event('update_product', {'text': text})
              drain_queue()
              print('Posted')
              "
              ```

              ## Verifying Posts

              ```bash
              swarm ls product    # list product updates
              swarm ls traction   # list traction updates
              swarm ls            # list all
              ```

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "3m"
