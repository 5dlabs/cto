---
# =============================================================================
# Metal Agent — ArgoCD Application
# =============================================================================
# Lead engineering / architecture agent. Cloned from cto-coder; reuses
# cto-coder-api-keys + openclaw-discord-tokens with metal projection.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cto-metal
  namespace: argocd
  labels:
    app.kubernetes.io/name: cto-metal
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: metal
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://github.com/5dlabs/cto.git
      targetRevision: main
      path: infra/charts/openclaw-agent
      helm:
        releaseName: cto-metal
        valueFiles:
          - ../../gitops/agents/metal-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "3m"
