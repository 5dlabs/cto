---
# Discord Bridge
# =============================================================================
# NATS-to-Discord conversation bridge for OpenClaw agent visibility.
# Taps agent.> wildcard and relays inter-agent messages to Discord channels.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: discord-bridge
  namespace: argocd
  labels:
    app.kubernetes.io/name: discord-bridge
    app.kubernetes.io/part-of: openclaw
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto
    targetRevision: main
    path: infra/manifests/discord-bridge

  destination:
    server: https://kubernetes.default.svc
    namespace: bots

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5
