---
# =============================================================================
# Coder Agent — ArgoCD Application
# =============================================================================
# Keeps the legacy OpenClaw Coder control-plane definition dormant. The
# production Coder Discord bot is owned by the cto-hermes-gateway Application.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cto-coder
  namespace: argocd
  labels:
    app.kubernetes.io/name: cto-coder
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: coder
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://github.com/5dlabs/cto.git
      targetRevision: main
      path: infra/charts/openclaw-agent
      helm:
        releaseName: cto-coder
        valueFiles:
          - ../../gitops/agents/coder-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "3m"
