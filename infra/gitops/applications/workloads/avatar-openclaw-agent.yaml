---
# =============================================================================
# Avatar OpenClaw Agent — ArgoCD Application
# =============================================================================
# Deploys the GPU-backed Avatar OpenClaw agent. It inherits Coder's mature
# OpenClaw agent baseline and layers only Avatar OpenClaw-specific overrides.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cto-avatar-openclaw
  namespace: argocd
  labels:
    app.kubernetes.io/name: cto-avatar-openclaw
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: avatar-openclaw
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://github.com/5dlabs/cto.git
      targetRevision: main
      path: infra/charts/openclaw-agent
      helm:
        releaseName: cto-avatar-openclaw
        valueFiles:
          - ../../gitops/agents/coder-values.yaml
          - ../../gitops/agents/avatar-openclaw-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "3m"
