---
# Argo CD Application for AlertHub infrastructure databases
# Deploys PostgreSQL, Valkey, Kafka, MongoDB, and RabbitMQ instances
# for the AlertHub application
#
# Dependencies:
# - CloudNativePG operator must be installed
# - Redis operator must be installed
# - Strimzi Kafka operator must be installed
# - Percona MongoDB operator must be installed
# - RabbitMQ cluster operator must be installed

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerthub-databases
  namespace: argocd
  labels:
    app.kubernetes.io/name: alerthub-databases
    app.kubernetes.io/part-of: alerthub
    app.kubernetes.io/component: infrastructure
  annotations:
    # Deploy after operators are ready
    argocd.argoproj.io/sync-wave: "2"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: cto-deployments
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Project configuration
  project: platform

  # Source configuration - Using local kustomization
  source:
    repoURL: https://github.com/5dlabs/cto
    path: infra/gitops/manifests/alerthub-databases
    targetRevision: main

  # Destination configuration
  destination:
    server: https://kubernetes.default.svc
    namespace: alerthub

  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  # Ignore expected differences
  ignoreDifferences:
    # CloudNativePG manages these fields
    - group: postgresql.cnpg.io
      kind: Cluster
      jsonPointers:
        - /status
        - /spec/postgresql/parameters
    # Strimzi manages these fields
    - group: kafka.strimzi.io
      kind: Kafka
      jsonPointers:
        - /status
    - group: kafka.strimzi.io
      kind: KafkaNodePool
      jsonPointers:
        - /status
    # Percona manages these fields
    - group: psmdb.percona.com
      kind: PerconaServerMongoDB
      jsonPointers:
        - /status
        - /spec/replsets/0/size
    # RabbitMQ manages these fields
    - group: rabbitmq.com
      kind: RabbitmqCluster
      jsonPointers:
        - /status
    # StatefulSet replicas may be managed by operators
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas

  # Revision history
  revisionHistoryLimit: 5
