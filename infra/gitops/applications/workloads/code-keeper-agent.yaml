---
# =============================================================================
# Code Keeper Agent — ArgoCD Application
# =============================================================================
# Deploys a multipurpose Coder-class agent in the cto namespace. Runtime settings
# intentionally mirror cto-hermes-coder; only the agent identity and existing
# Discord token key differ.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cto-code-keeper
  namespace: argocd
  labels:
    app.kubernetes.io/name: cto-code-keeper
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: coder
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://github.com/5dlabs/cto.git
      targetRevision: main
      path: infra/charts/hermes-agent
      helm:
        releaseName: code-keeper
        valueFiles:
          - ../../gitops/agents/code-keeper-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "3m"
