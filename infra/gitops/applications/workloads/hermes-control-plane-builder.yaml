---
# =============================================================================
# Hermes Control-Plane Builder — ArgoCD Application
# =============================================================================
# Isolated native Hermes gateway/agent used to design and build the CTO Discord
# control plane. This is not the control plane itself and is not a replacement
# for the production discord-bridge.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-control-plane-builder
  namespace: argocd
  labels:
    app.kubernetes.io/name: hermes-control-plane-builder
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: control-plane-builder
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto.git
    targetRevision: main
    path: infra/manifests/hermes-control-plane-builder

  destination:
    server: https://kubernetes.default.svc
    namespace: cto

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5
