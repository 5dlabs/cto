---
# Argo CD Application for RKE2 Metrics Server configuration.
# The OVH cluster uses RKE2's bundled metrics-server HelmChart; this app applies
# the matching HelmChartConfig instead of installing a second metrics-server.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/part-of: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Project configuration
  project: platform

  source:
    repoURL: https://github.com/5dlabs/cto.git
    targetRevision: main
    path: infra/gitops/manifests/metrics-server

  # Destination configuration - deploy to kube-system namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=false  # kube-system already exists
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true

    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  # Revision history
  revisionHistoryLimit: 5
