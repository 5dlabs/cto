---
# Argo CD Application for Grafana Loki
# Storage: Filesystem (PVC-backed, single binary mode)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 6.16.0
    chart: loki
    helm:
      values: |
        # Loki configuration - Single Binary with filesystem storage
        deploymentMode: SingleBinary

        # Single binary configuration
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: "mayastor"
            size: 50Gi
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          podLabels:
            platform.5dlabs.io/log-collection: enabled
          podAnnotations:
            logs.platform.5dlabs.io/collect: "true"
            logs.platform.5dlabs.io/service: loki
          securityContext:
            fsGroup: 10001
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true

        # Loki configuration
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
            path_prefix: /var/loki
          # Filesystem storage — everything on the PVC
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          compactor:
            working_directory: /var/loki/compactor
            compaction_interval: 10m
            retention_enabled: true
            retention_delete_delay: 2h
            retention_delete_worker_count: 150
            delete_request_store: filesystem
          limits_config:
            ingestion_rate_mb: 128
            ingestion_burst_size_mb: 256
            max_streams_per_user: 50000
            per_stream_rate_limit: 50MB
            per_stream_rate_limit_burst: 100MB
            retention_period: 168h  # 7 days

        # Gateway configuration
        gateway:
          enabled: true
          replicas: 1

        # Disable components not needed for single binary
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0

        # Disable test pod
        test:
          enabled: false

        # Disable monitoring (we have our own)
        monitoring:
          selfMonitoring:
            enabled: false
        lokiCanary:
          enabled: false

        # Disable caching (not needed for single binary mode)
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  # Ignore differences for fields defaulted by Kubernetes API server
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]?
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
