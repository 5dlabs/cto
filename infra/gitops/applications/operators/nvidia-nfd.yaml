---
# Node Feature Discovery (NFD) - Kubernetes node labeling for hardware features
# Required by NVIDIA GPU Operator to detect and label GPU nodes
# License: Apache 2.0
# Source: https://kubernetes-sigs.github.io/node-feature-discovery/charts

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-nfd
  namespace: argocd
  labels:
    app.kubernetes.io/name: nvidia-nfd
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: gpu
  annotations:
    # Must deploy before GPU operator
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://kubernetes-sigs.github.io/node-feature-discovery/charts
    chart: node-feature-discovery
    targetRevision: 0.18.3
    helm:
      values: |
        # Deploy NFD master on control-plane, workers on all nodes
        master:
          nodeSelector:
            node-role.kubernetes.io/worker: ""
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

        worker:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        gc:
          enable: true

  destination:
    server: https://kubernetes.default.svc
    namespace: operators

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion
        - /spec/versions
        - /metadata/annotations

  revisionHistoryLimit: 5
