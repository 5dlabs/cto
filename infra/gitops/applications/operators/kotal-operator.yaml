---
# Kotal Operator - Blockchain Kubernetes Operator (5dlabs fork)
# Manages blockchain node CRDs: NEAR, Ethereum (Reth/BASE), Bitcoin, and more
# Fork: https://github.com/5dlabs/kotal (adds Reth client + nearcore 2.10.6)
# License: Apache 2.0

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kotal-operator
  namespace: argocd
  labels:
    app.kubernetes.io/name: kotal-operator
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: blockchain
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/5dlabs/kotal
    targetRevision: HEAD
    path: config/default

  destination:
    server: https://kubernetes.default.svc
    namespace: operators

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion
        - /spec/versions
        - /metadata/annotations
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
        - /webhooks/1/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle

  revisionHistoryLimit: 5
