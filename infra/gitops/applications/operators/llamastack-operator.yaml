---
# LlamaStack K8s Operator - Kubernetes operator for Meta's LlamaStack
# Manages Distribution CRDs for LlamaStack inference and agent serving
# License: MIT
# Source: https://github.com/llamastack/llama-stack-k8s-operator

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llamastack-operator
  namespace: argocd
  labels:
    app.kubernetes.io/name: llamastack-operator
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: ai-ml
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/llamastack/llama-stack-k8s-operator
    targetRevision: v0.7.0
    path: config/default

  destination:
    server: https://kubernetes.default.svc
    namespace: llama-stack-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion
        - /spec/versions
        - /metadata/annotations

  revisionHistoryLimit: 5
