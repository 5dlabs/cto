---
# NVIDIA GPU Operator - Automated GPU management for Kubernetes
# Manages: GPU driver, device plugin, DCGM exporter, container toolkit, MIG
# License: Apache 2.0
# Source: https://helm.ngc.nvidia.com/nvidia
#
# NOTE: Current OVH nodes (b2-30) are CPU-only. GPU Operator will install
# in standby mode. DaemonSets only activate on nodes labeled by NFD with
# GPU hardware (feature.node.kubernetes.io/pci-10de.present).
# When GPU nodes are added, they will be auto-configured.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-gpu-operator
  namespace: argocd
  labels:
    app.kubernetes.io/name: nvidia-gpu-operator
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: gpu
  annotations:
    # Deploy after NFD so GPU nodes can be detected
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://helm.ngc.nvidia.com/nvidia
    chart: gpu-operator
    targetRevision: v25.3.4
    helm:
      values: |
        # Use NFD deployed separately (nvidia-nfd app)
        nfd:
          enabled: false

        # Operator configuration
        operator:
          defaultRuntime: containerd
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # Driver configuration - use pre-installed drivers if available
        driver:
          enabled: true
          version: "570.133.20"
          # Only run on GPU nodes (labeled by NFD)
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "feature.node.kubernetes.io/pci-10de.present"
                      operator: In
                      values:
                        - "true"

        # Device plugin - advertises GPU resources to k8s scheduler
        devicePlugin:
          enabled: true
          config:
            name: device-plugin-config
            default: "any"

        # DCGM exporter - GPU metrics for Prometheus/Grafana
        dcgmExporter:
          enabled: true
          serviceMonitor:
            enabled: true
            interval: 15s

        # Container toolkit - configure container runtime for GPU access
        toolkit:
          enabled: true
          installDir: "/usr/local/nvidia"
          # RKE2 containerd configuration
          env:
            - name: CONTAINERD_CONFIG
              value: "/opt/rke2/agent/etc/containerd/config.toml.tmpl"
            - name: CONTAINERD_SOCKET
              value: "/run/k3s/containerd/containerd.sock"
            - name: CONTAINERD_RUNTIME_CLASS
              value: "nvidia"
            - name: CONTAINERD_SET_AS_DEFAULT
              value: "true"
          # Skip driver validation - driver confirmed working via nvidia-smi
          validation:
            disabled: true

        # MIG (Multi-Instance GPU) - disabled by default
        migManager:
          enabled: false

        # GFD (GPU Feature Discovery) - labels nodes with GPU capabilities
        gfd:
          enabled: true

        # Validator - required for GPU Operator v25.3.4
        validator:
          enabled: true
          plugin:
            env:
              - name: WITH_WORKLOAD
                value: "false"

        # VFIO manager - for GPU passthrough (disabled)
        vfioManager:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: operators

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion
        - /spec/preserveUnknownFields
        - /spec/versions
        - /metadata/annotations
    - group: apps
      kind: DaemonSet
      jsonPointers:
        - /spec/template/spec/initContainers
        - /spec/template/metadata/annotations
    - group: nvidia.com
      kind: ClusterPolicy
      jsonPointers:
        - /spec
        - /status

  revisionHistoryLimit: 5
