---
# Twingate Operator - Zero Trust Network Access
# License: MPL-2.0 - Safe to distribute commercially
# Source: infra/charts/twingate-operator (vendored from https://github.com/Twingate/kubernetes-operator)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twingate-operator
  namespace: argocd
  labels:
    app.kubernetes.io/name: twingate-operator
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: networking
    app.kubernetes.io/type: security
    platform.5dlabs.io/license: mpl-2.0
    platform.5dlabs.io/distributable: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/5dlabs/cto
    path: infra/charts/twingate-operator
    targetRevision: main
    helm:
      values: |  # pragma: allowlist secret
        # Twingate Operator configuration
        twingateOperator:
          network: turquoiseelephant631
          remoteNetworkId: UmVtb3RlTmV0d29yazoyNzU4MDY=
          existingAPIKeySecret:  # pragma: allowlist secret
            name: twingate-api-secret
            key: apiToken
        image:
          tag: 0.28.0
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        podLabels:
          platform.5dlabs.io/log-collection: enabled
        podAnnotations:
          logs.platform.5dlabs.io/collect: "true"
          logs.platform.5dlabs.io/service: twingate-operator
        serviceAccount:
          create: true
          name: twingate-operator
        nodeSelector:
          node-role.kubernetes.io/worker: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
        - /spec/conversion
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: twingateresourceaccesses.twingate.com
      jsonPointers:
        - /spec/names/listKind
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/oneOf/0/properties
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/oneOf/1/properties
        - /spec/versions/0/schema/openAPIV3Schema/properties/spec/oneOf/2/properties
  revisionHistoryLimit: 5
