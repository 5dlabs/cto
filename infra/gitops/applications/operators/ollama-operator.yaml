---
# Ollama Operator - Native Kubernetes operator for Ollama models
# Manages Model CRDs (ollama.ayaka.io/v1) for simple model deployment
# License: Apache 2.0
# Source: https://github.com/nekomeowww/ollama-operator

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama-operator
  namespace: argocd
  labels:
    app.kubernetes.io/name: ollama-operator
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: ai-ml
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/nekomeowww/ollama-operator
    targetRevision: v0.10.10
    path: config/default

  destination:
    server: https://kubernetes.default.svc
    namespace: operators

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion
        - /spec/versions
        - /metadata/annotations

  revisionHistoryLimit: 5
