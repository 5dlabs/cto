---
# NATS - High-performance cloud-native messaging system
# License: Apache 2.0
# Source: https://github.com/nats-io/nats-server
#
# Provides inter-agent messaging for OpenClaw agents running in separate pods.
# JetStream enabled for persistent message delivery.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: messaging
    app.kubernetes.io/type: message-bus
    platform.5dlabs.io/license: apache-2.0
    platform.5dlabs.io/distributable: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: cto-deployments
spec:
  project: platform
  source:
    repoURL: https://git.5dlabs.ai/5dlabs/cto.git
    path: infra/gitops/manifests/nats
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: messaging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
