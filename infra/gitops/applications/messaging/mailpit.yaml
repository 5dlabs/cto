---
# Mailpit - Self-hosted email testing server
# License: MIT - Safe to distribute commercially
# Source: https://github.com/axllent/mailpit
#
# Features:
# - SMTP server for capturing emails
# - Modern web UI for viewing emails
# - REST API for integration testing
# - HTML compatibility checker
# - Spam testing with SpamAssassin
# - No external dependencies (single binary)
#
# Replaces: Mailtrap, Gmail SMTP for testing
# Use for: Development and testing environments
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mailpit
  namespace: argocd
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: email
    app.kubernetes.io/type: smtp-testing
    platform.5dlabs.io/license: mit
    platform.5dlabs.io/distributable: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: cto-deployments
spec:
  project: platform
  source:
    repoURL: https://github.com/5dlabs/cto
    path: infra/gitops/manifests/mailpit
    targetRevision: develop

  destination:
    server: https://kubernetes.default.svc
    namespace: email

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
