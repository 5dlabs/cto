---
# ntfy - Self-hosted push notification server
# License: Apache 2.0 / GPL-2.0 (dual licensed) - Safe to distribute
# Source: https://github.com/binwiederhier/ntfy
#
# Features:
# - UnifiedPush support for Android (no Google dependency)
# - Web Push via VAPID keys
# - HTTP/WebSocket subscription
# - Rate limiting and access control
# - iOS support via APNs integration (optional)
# - Single binary, no dependencies
#
# Replaces: Firebase Cloud Messaging (FCM)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ntfy
  namespace: argocd
  labels:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: messaging
    app.kubernetes.io/type: push-notifications
    platform.5dlabs.io/license: apache-2.0
    platform.5dlabs.io/distributable: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: cto-deployments
spec:
  project: platform
  source:
    repoURL: https://github.com/5dlabs/cto
    path: infra/gitops/manifests/ntfy
    targetRevision: HEAD

  destination:
    server: https://kubernetes.default.svc
    namespace: messaging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
