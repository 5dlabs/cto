---
# Argo CD Application for Grafana dashboard ConfigMaps on Cherry trading cluster
# Sources: skills/trader/k8s/observability/dashboards/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cherry-dashboards
  namespace: argocd
  labels:
    app.kubernetes.io/name: cherry-dashboards
    app.kubernetes.io/part-of: cherry-trading
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/5dlabs/cto
    targetRevision: main
    path: skills/trader/k8s/observability/dashboards
  destination:
    server: https://84.32.103.99:6443
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
