---
# Argo CD Application for Fluent Bit on Cherry trading cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cherry-fluent-bit
  namespace: argocd
  labels:
    app.kubernetes.io/name: cherry-fluent-bit
    app.kubernetes.io/part-of: cherry-trading
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://fluent.github.io/helm-charts
      chart: fluent-bit
      targetRevision: 0.47.7
      helm:
        releaseName: fluent-bit
        valueFiles:
          - $values/skills/trader/k8s/observability/fluent-bit-values.yaml
    - repoURL: https://github.com/5dlabs/cto
      targetRevision: main
      ref: values
  destination:
    server: https://84.32.103.99:6443
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
