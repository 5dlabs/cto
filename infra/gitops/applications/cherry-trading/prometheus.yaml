---
# Argo CD Application for Prometheus on Cherry trading cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cherry-prometheus
  namespace: argocd
  labels:
    app.kubernetes.io/name: cherry-prometheus
    app.kubernetes.io/part-of: cherry-trading
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 25.27.0
      helm:
        releaseName: prometheus
        valueFiles:
          - $values/skills/trader/k8s/observability/prometheus-values.yaml
    - repoURL: https://github.com/5dlabs/cto
      targetRevision: main
      ref: values
  destination:
    server: https://84.32.103.99:6443
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
