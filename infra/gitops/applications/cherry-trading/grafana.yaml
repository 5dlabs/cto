---
# Argo CD Application for Grafana on Cherry trading cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cherry-grafana
  namespace: argocd
  labels:
    app.kubernetes.io/name: cherry-grafana
    app.kubernetes.io/part-of: cherry-trading
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: 9.2.9
      helm:
        releaseName: grafana
        valueFiles:
          - $values/skills/trader/k8s/observability/grafana-values.yaml
    - repoURL: https://github.com/5dlabs/cto
      targetRevision: main
      ref: values
  destination:
    server: https://84.32.103.99:6443
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
