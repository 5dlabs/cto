---
# Argo CD Application for Loki on Cherry trading cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cherry-loki
  namespace: argocd
  labels:
    app.kubernetes.io/name: cherry-loki
    app.kubernetes.io/part-of: cherry-trading
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.16.0
      helm:
        releaseName: loki
        valueFiles:
          - $values/skills/trader/k8s/observability/loki-values.yaml
    - repoURL: https://github.com/5dlabs/cto
      targetRevision: main
      ref: values
  destination:
    server: https://84.32.103.99:6443
    namespace: observability
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]?
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
