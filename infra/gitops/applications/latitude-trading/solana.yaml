---
# Argo CD Application for Solana workloads on Latitude trading cluster
# Sources: skills/trader/k8s/ (agave-rpc Deployment, solana-exporter Service)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: latitude-solana
  namespace: argocd
  labels:
    app.kubernetes.io/name: latitude-solana
    app.kubernetes.io/part-of: latitude-trading
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/5dlabs/cto
    targetRevision: main
    path: skills/trader/k8s
    directory:
      recurse: false
  destination:
    server: https://206.223.233.155:6443
    namespace: solana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
