---
# App of Apps Pattern for Platform Infrastructure
# This is the root application that manages all other platform applications

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-apps
  namespace: argocd
  labels:
    app.kubernetes.io/name: platform-apps
    app.kubernetes.io/part-of: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Project configuration
  project: platform

  # Source configuration
  source:
    repoURL: https://github.com/5dlabs/cto
    targetRevision: main
    path: infra/gitops

    # Directory configuration
    # Organized by category: platform, observability, operators, secrets, storage, workloads, ai-models
    # NOTE: recurse is true - we scan all subdirectories and use include/exclude to filter
    # Include only ArgoCD Application definitions (*.yaml in category folders)
    # Exclude nested directories that contain CRD instances (not ArgoCD Applications)
    directory:
      recurse: true
      include: "{applications/*/*.yaml,projects/*.yaml}"
      # Exclude: docs, nested CRD directories, and optional/disabled apps managed elsewhere
      # Note: Use explicit paths relative to source.path (infra/gitops) to match include pattern
      # yamllint disable-line rule:line-length
      exclude: "{*.md,applications/ai-models/ingress/*,applications/ai-models/llamastack-distributions/*,applications/ai-models/ollama-model-crds/*,applications/networking/headscale.yaml,applications/networking/headscale-namespace.yaml,applications/networking/platform-ingress.yaml,applications/networking/tailscale-subnet-router.yaml,applications/networking/kilo.yaml,applications/workloads/buildkit.yaml}"

  # Destination configuration
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

    retry:
      limit: 5
      backoff:
        duration: 1s
        factor: 2
        maxDuration: 3m

  # Ignore image-updater write-backs to helm.parameters (argocd write-back method
  # stores digests directly on the Application CR, not in git)
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jqPathExpressions:
        - .spec.source.helm.parameters
        - .spec.sources[].helm.parameters

  # Revision history
  revisionHistoryLimit: 10
