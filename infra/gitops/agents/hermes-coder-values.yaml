# =============================================================================
# Hermes Coder Agent — Per-Agent Values Override
# =============================================================================
# Persistent Hermes Coder workspace. The pod keeps the Hermes harness
# template staged for manual smoke runs, while also joining Discord through
# the OpenClaw gateway so recovery/status work can happen from chat.
#
# Keep credential material in Kubernetes Secrets. This file only names secret
# keys and allowlisted Discord IDs.
# =============================================================================

namespace: cto

# Persistent, stable pod identity — debug bot is exec'd into repeatedly.
deploymentMode: statefulset

gateway:
  # This agent should check into Discord automatically; the Hermes harness
  # template is still staged in /workspace/.harness for manual smoke runs.
  runAsMain: true

agent:
  id: hermes-coder
  name: "Hermes Coder"

# Use the public agents image (same as openclaw-coder); the default
# registry.5dlabs.ai/5dlabs/openclaw image requires auth.
image:
  repository: ghcr.io/5dlabs/agents
  tag: "latest"
  pullPolicy: Always

# Keep cross-pod NATS messaging disabled; this bot is not part of the
# multi-agent mesh.
nats:
  enabled: false

# Enable the Discord gateway for the regular Coder bot. The chart renders
# DISCORD_TOKEN from openclaw-discord-tokens[coder] at runtime; do not put
# token values in Git.
messaging:
  discord:
    enabled: true
    tokenSecretKey: coder
    allowBots: mentions
    groupPolicy: allowlist
    dmPolicy: allowlist
    allowFrom:
      - "444519104808878090"
    guilds:
      "*":
        requireMention: true
        users:
          - "444519104808878090"
      "1490117571977019524":
        requireMention: true
        slug: "5dlabs-coder"
        channels:
          "1494057364301545542":
            enabled: true
            requireMention: false
    threadBindings:
      enabled: true
      spawnSubagentSessions: true
      spawnAcpSessions: true

codexPlugin:
  # The Hermes Coder gateway image does not currently ship an OpenClaw codex
  # plugin package; leaving the stale plugin enabled creates config warnings.
  enabled: false

# Keep Kubernetes probes disabled until this chart has a first-class
# gateway-vs-harness runtime mode switch. The current container entrypoint
# still sleeps for harness iteration, so gateway recovery is supervised
# manually inside the persistent pod.
probes:
  startup:
    enabled: false
  liveness:
    enabled: false
  readiness:
    enabled: false

# Persist the intake runtime defaults through the Argo-managed Hermes Coder
# application. Smoke/debug runs from this pod should route every intake LLM
# entity through the universal ACPX backend and GitHub Copilot GPT-5.5 rather
# than falling back to Gemini, direct API keys, or OpenClaw gateway defaults.
extraEnv:
  - name: CTO_LLM_INVOKE_BACKEND
    value: acp
  - name: ACPX_LLM_MODEL
    value: gpt-5.5
  - name: ACPX_LLM_TIMEOUT
    value: "300"
  - name: INTAKE_MODEL_PRIMARY_PROVIDER
    value: github-copilot
  - name: INTAKE_MODEL_PRIMARY
    value: gpt-5.5
  - name: INTAKE_MODEL_FAST_PROVIDER
    value: github-copilot
  - name: INTAKE_MODEL_FAST
    value: gpt-5.5
  - name: INTAKE_MODEL_FRONTIER_PROVIDER
    value: github-copilot
  - name: INTAKE_MODEL_FRONTIER
    value: gpt-5.5
  - name: INTAKE_VOTER_1_PROVIDER
    value: github-copilot
  - name: INTAKE_VOTER_1_MODEL
    value: gpt-5.5
  - name: INTAKE_VOTER_2_PROVIDER
    value: github-copilot
  - name: INTAKE_VOTER_2_MODEL
    value: gpt-5.5
  - name: INTAKE_VOTER_3_PROVIDER
    value: github-copilot
  - name: INTAKE_VOTER_3_MODEL
    value: gpt-5.5
  - name: INTAKE_DELIBERATION_VIDEO
    value: "0"
