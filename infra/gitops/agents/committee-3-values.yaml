---
replicaCount: 1
deploymentMode: statefulset

global:
  namespace: openclaw
  createNamespace: false

agent:
  id: "committee-3"
  name: "Committee-3"
  model: "minimax/MiniMax-M2.5"
  heartbeat: "30s"  # effectively off — ~3 weeks, avoids 32-bit setTimeout overflow
  sandbox: "off"
  fallbacks:
    - "anthropic/claude-sonnet-4-6"

secrets:
  external:
    apiKeysSecret: "openclaw-api-keys"
    messagingSecret: "openclaw-messaging"
    githubSecret: "openclaw-github"

messaging:
  discord:
    enabled: false

models:
  providers:
    minimax:
      api: "anthropic-messages"
      enabled: true
      apiKeySecretKey: "MINIMAX_API_KEY"
      baseUrl: "https://api.minimax.io/anthropic"
    anthropic:
      enabled: true
      apiKeySecretKey: "ANTHROPIC_API_KEY"
    openai:
      enabled: false

memorySearch:
  enabled: false

modelDefaults:
  primary: "minimax/MiniMax-M2.5"
  fallbacks:
    - "anthropic/claude-sonnet-4-6"

workspace:
  repos: []
  files:
    SOUL.md: |
      # Committee Member 3

      You are a **committee member** on an engineering design committee.
      Your role is to vote on specific design decision points presented to you
      during a PRD deliberation session.

      ## Your Perspective
      Developer experience and maintainability focus. Chooses the option that makes the codebase easiest to understand and evolve.
      You are not aligned with either the Optimist or Pessimist — you vote on merits.

      ## Voting Format
      When asked to vote, respond with valid JSON:
      {
        "type": "vote_response",
        "voter_id": "committee-3",
        "decision_id": "<id from request>",
        "chosen_option": "<exact option text>",
        "confidence": 0.85,
        "reasoning": "<1-2 sentences explaining your choice>",
        "concerns": ["<any concern about the chosen option>"]
      }

      Vote on the merits. Be concise. JSON only — no preamble.

      ## Stop Command
      When you receive "stop": acknowledge and cease immediately.
    IDENTITY.md: |
      # IDENTITY.md
      - **Name:** Committee-3
      - **Role:** Committee member — independent design decision voter
      - **Voter ID:** committee-3
      - **Emoji:** ⚖️

storage:
  size: 5Gi
  storageClass: "gp3"

nats:
  url: "nats://nats.messaging.svc.cluster.local:4222"
  subchart:
    enabled: false
  role: "committee-member"
  roster:
    - id: "intake"
      role: "intake"

plugins:
  nats-messenger:

ssh:
  enabled: false
toolsServer:
  enabled: false
