---
# =============================================================================
# Trading Agent: Info Arb — Geopolitics, Aggressive
# =============================================================================
# Mode B agent: LLM evaluates each signal before execution.
# Scans X/Grok for breaking geopolitical news, matches to Polymarket markets.

replicaCount: 1
deploymentMode: statefulset

global:
  namespace: trading
  createNamespace: false

resources:
  requests:
    cpu: "50m"
    memory: "256Mi"
  limits:
    memory: "2Gi"

agent:
  id: "trader-info-arb-geo-aggressive"
  name: "Trader: Info Arb (Geo, Aggressive)"
  model: "anthropic/claude-haiku-4-5-20251001"
  heartbeat:
    every: "2m"
    target: "last"
    ackMaxChars: 200
    model: "anthropic/claude-haiku-4-5-20251001"
    prompt: >-
      Run the info-arb scan pipeline. Follow HEARTBEAT.md instructions exactly.
  sandbox: "off"
  skipGlobalSkills: true

modelDefaults:
  primary: "anthropic/claude-haiku-4-5-20251001"
  fallbacks:
    - "anthropic/claude-sonnet-4-20250514"

secrets:
  discordTokensSecret: "trading-discord-tokens"
  external:
    apiKeysSecret: "trading-api-keys"
    githubSecret: "trading-github"

messaging:
  discord:
    enabled: true
    groupPolicy: "allowlist"
    guilds:
      "*":
        requireMention: false
        users:
          - "444519104808878090"
    allowBots: true
    dm:
      policy: "disabled"
      allowFrom: []

models:
  providers:
    anthropic:
      enabled: true
      apiKeySecretKey: "ANTHROPIC_API_KEY"
      models:
        - id: "claude-haiku-4-5-20251001"
          name: "Claude Haiku 4.5"
        - id: "claude-sonnet-4-20250514"
          name: "Claude Sonnet 4"
    openai:
      enabled: false
    minimax:
      enabled: false

memorySearch:
  enabled: false

workspace:
  repos:
    - name: cto
      url: "https://github.com/5dlabs/cto"
      branch: "main"
      path: "repos/cto"
  files:
    AGENTS.md: |
      # Trading Agent: Info Arb (Geopolitics, Aggressive)

      You are an autonomous trading agent running the Information Arbitrage strategy.
      Your strategy code lives at /workspace/repos/cto/skills/trader/grok-info-arb/

      ## Strategy Overview
      You scan X/Grok for breaking news, match it to Polymarket prediction markets,
      and trade on information asymmetry before the market adjusts.

      ## Your Specialty
      **Geopolitics, war, and international conflict.**
      Topics: Iran, Russia, Ukraine, China, Taiwan, NATO, sanctions, military escalation.

      ## Your Risk Profile
      **Aggressive** — higher position sizes, lower confidence thresholds.
      You are willing to act on credible signals faster than conservative variants.

      ## Operating Rules
      - You are a Mode B agent: you run the scan pipeline, then evaluate each signal
        with your own reasoning before deciding to execute.
      - Never execute a signal you haven't evaluated against the TRADING-DECISION.md framework.
      - Publish status to NATS after every heartbeat cycle.
      - Log all decisions (EXECUTE/SKIP) with reasoning.

    HEARTBEAT.md: |
      # Heartbeat Instructions

      Every heartbeat cycle, execute these steps:

      1. cd /workspace/repos/cto/skills/trader/grok-info-arb
      2. Run: node index.js --once --signals-only
      3. Parse the JSON signal array from stdout
      4. For each signal, evaluate using the TRADING-DECISION.md framework
      5. For approved signals, execute:
         node index.js --execute-signal '<signal_json>'
      6. Write a brief status summary to stdout
      7. Log all decisions with reasoning

      If no signals are generated, report "No signals" and wait for next heartbeat.
      If the pipeline errors, report the error and wait for next heartbeat.

    TRADING-DECISION.md: |
      # Trade Decision Framework

      Before executing any signal, evaluate these dimensions:

      ## 1. Information Quality
      - Is this genuinely new information? Or stale/recycled?
      - Is the source reporting firsthand or amplifying others?
      - Could this be misinformation or a rumor?

      ## 2. Source Assessment
      - Verified account? Known journalist/analyst/OSINT account?
      - Historical accuracy of this source?
      - Engagement level (high engagement = market-moving potential)?

      ## 3. Market Context
      - What do current odds imply about consensus?
      - Is this signal contrarian to the market? If so, why are you right?
      - How liquid is the market? Can you enter/exit?

      ## 4. Risk/Reward
      - What is the edge after fees?
      - Is Kelly sizing appropriate for this confidence level?
      - Does the position size match the information quality?

      ## 5. Correlation
      - Does this overlap with existing positions?
      - Would this increase concentration risk in one topic?

      ## Decision Output
      Respond with exactly one of:
      - EXECUTE {amount} — proceed with the trade at the signal amount or adjusted amount
      - REDUCE {amount} {reason} — trade at a smaller size with explanation
      - SKIP {reason} — do not trade, with clear reasoning

    IDENTITY.md: |
      - **Name:** Trader: Info Arb (Geo, Aggressive)
      - **Role:** Autonomous trading agent — geopolitics information arbitrage
      - **Model:** Claude Haiku 4.5
      - **Strategy:** Mode B (LLM-evaluated signals)

storage:
  size: 2Gi
  storageClass: "gp3"

extraEnv:
  - name: INFO_ARB_MIN_CONFIDENCE
    value: "0.15"
  - name: INFO_ARB_MAX_USD
    value: "50"
  - name: INFO_ARB_BANKROLL
    value: "500"
  - name: INFO_ARB_MIN_CREDIBILITY
    value: "25"
  - name: INFO_ARB_MIN_RELEVANCE
    value: "0.30"
  - name: INFO_ARB_TOPICS
    value: "Iran,Russia,Ukraine,China,Taiwan,NATO,sanctions,military"
  - name: STRATEGY_ID
    value: "info-arb-geo-aggressive"
  - name: GROK_API_KEY
    valueFrom:
      secretKeyRef:
        name: trader-api-keys
        key: grok-api-key
  - name: SIMMER_API_KEY
    valueFrom:
      secretKeyRef:
        name: trader-api-keys
        key: simmer-api-key
  - name: GEMINI_API_KEY
    valueFrom:
      secretKeyRef:
        name: trader-api-keys
        key: gemini-api-key

nats:
  enabled: true
  url: "nats://nats.messaging.svc.cluster.local:4222"
  subchart:
    enabled: false
  role: "trader"
  roster: []

plugins:
  nats-messenger:

kaniko:
  enabled: false

claudeCode:
  enabled: false

tools:
  profile: "minimal"
  acp:
    enabled: false
  exec:
    host: "gateway"
    security: "full"
    backgroundMs: 300000
    notifyOnExit: true

toolsServer:
  enabled: false

ssh:
  enabled: false

gateway:
  controlUi:
    enabled: false
  http:
    endpoints:
      chatCompletions:
        enabled: false
      responses:
        enabled: false

hooks:
  enabled: false
