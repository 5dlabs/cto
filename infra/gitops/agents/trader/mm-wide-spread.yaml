---
# =============================================================================
# Trading Agent: Market Maker — Wide Spread
# =============================================================================
# Mode A agent: starts the MM process, monitors via mm-state.json.
# Provides liquidity on Polymarket event markets with wide spreads for safety.

replicaCount: 1
deploymentMode: statefulset

global:
  namespace: trading
  createNamespace: false

resources:
  requests:
    cpu: "50m"
    memory: "256Mi"
  limits:
    memory: "1Gi"

agent:
  id: "trader-mm-wide-spread"
  name: "Trader: Market Maker (Wide Spread)"
  model: "anthropic/claude-haiku-4-5-20251001"
  heartbeat:
    every: "5m"
    target: "last"
    ackMaxChars: 200
    model: "anthropic/claude-haiku-4-5-20251001"
    prompt: >-
      Check the market maker process health. Follow HEARTBEAT.md instructions exactly.
  sandbox: "off"
  skipGlobalSkills: true

modelDefaults:
  primary: "anthropic/claude-haiku-4-5-20251001"
  fallbacks:
    - "anthropic/claude-sonnet-4-20250514"

secrets:
  external:
    apiKeysSecret: "trading-api-keys"
    githubSecret: "trading-github"

messaging:
  discord:
    enabled: false

models:
  providers:
    anthropic:
      enabled: true
      apiKeySecretKey: "ANTHROPIC_API_KEY"
      models:
        - id: "claude-haiku-4-5-20251001"
          name: "Claude Haiku 4.5"
        - id: "claude-sonnet-4-20250514"
          name: "Claude Sonnet 4"
    openai:
      enabled: false
    minimax:
      enabled: false

memorySearch:
  enabled: false

workspace:
  repos:
    - name: cto
      url: "https://github.com/5dlabs/cto"
      branch: "main"
      path: "repos/cto"
  files:
    AGENTS.md: |
      # Trading Agent: Market Maker (Wide Spread)

      You are an autonomous trading agent running the Market Making strategy.
      Your strategy code lives at /workspace/repos/cto/skills/trader/polymarket-mm/

      ## Strategy Overview
      You provide liquidity on Polymarket event markets by placing two-sided
      limit orders (YES bid + NO bid). You earn the spread plus maker rebates.
      Paired YES+NO shares resolve at $1 each regardless of outcome.

      ## Your Configuration
      - **Spread:** 6c (wide — safer, lower fill rate, higher per-fill profit)
      - **Quote size:** $2.00 per side
      - **Max inventory:** $10 per side per market
      - **Skip mid-range:** Yes (avoid 40-60c markets where spread is tightest)

      ## Operating Mode
      Mode A — start and monitor background process.

      ## Key Metrics to Monitor
      - Rebates earned (maker rebate is ~1.5% of fill value)
      - Inventory balance (YES vs NO shares)
      - Paired shares (guaranteed $1 each at resolution)
      - Quote fill rate

    HEARTBEAT.md: |
      # Heartbeat Instructions

      1. Check if the MM process is already running:
         Run: pgrep -f "polymarket-mm" (use exec tool)
      2. If NOT running, start it as a background process:
         Run: cd /workspace/repos/cto/skills/trader/polymarket-mm && node index.js
         IMPORTANT: Use the exec tool with background=true and timeout=300000
      3. Read /workspace/repos/cto/skills/trader/polymarket-mm/mm-state.json
      4. Report: cycles run, quotes placed, fills, rebates earned,
         inventory balance (YES vs NO shares), paired P&L
      5. If mm-state.json doesn't exist yet, just report "Process started, awaiting first cycle"

    IDENTITY.md: |
      - **Name:** Trader: Market Maker (Wide Spread)
      - **Role:** Autonomous trading agent — Polymarket market maker
      - **Model:** Claude Haiku 4.5
      - **Strategy:** Mode A (agent-supervised process)

storage:
  size: 2Gi
  storageClass: "gp3"

extraEnv:
  - name: MM_SPREAD
    value: "0.06"
  - name: MM_QUOTE_SIZE
    value: "2.0"
  - name: MM_MAX_INVENTORY
    value: "10"
  - name: MM_SKIP_MID_RANGE
    value: "true"
  - name: STRATEGY_ID
    value: "mm-wide-spread"
  - name: SIMMER_API_KEY
    valueFrom:
      secretKeyRef:
        name: trader-api-keys
        key: simmer-api-key

nats:
  enabled: true
  url: "nats://nats.messaging.svc.cluster.local:4222"
  subchart:
    enabled: false
  role: "trader"
  roster: []

plugins:
  nats-messenger:

kaniko:
  enabled: false

claudeCode:
  enabled: false

tools:
  profile: "minimal"
  acp:
    enabled: false
  exec:
    host: "gateway"
    security: "full"
    backgroundMs: 300000
    notifyOnExit: true

toolsServer:
  enabled: false

ssh:
  enabled: false

gateway:
  controlUi:
    enabled: false
  http:
    endpoints:
      chatCompletions:
        enabled: false
      responses:
        enabled: false

hooks:
  enabled: false
