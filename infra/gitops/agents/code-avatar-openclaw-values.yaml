# =============================================================================
# Code Avatar OpenClaw Agent — Per-Agent Values Override
# =============================================================================
# Multipurpose Coder-class Discord bot cloned from hermes-coder-values.yaml.
# Uses the existing openclaw-discord-tokens[avatar-openclaw] key; no token values
# are stored in Git. Keep runtime/model/settings aligned with Hermes Coder.
# =============================================================================

namespace: cto

# Persistent, stable pod identity — debug bot is exec'd into repeatedly.
deploymentMode: statefulset

gateway:
  # This agent should check into Discord automatically; the Hermes harness
  # template is still staged in /workspace/.harness for manual smoke runs.
  runAsMain: true

agent:
  id: code-avatar-openclaw
  name: "Code Avatar OpenClaw"
  # Route through ACPX/Copilot CLI instead of OpenClaw's built-in
  # github-copilot provider. The built-in token exchange started returning
  # HTTP 404 after the upgrade, while ACPX Copilot continues to authenticate
  # from the existing secret-backed environment.
  model: "acpx-copilot/gpt-5.5"

modelDefaults:
  primary: "acpx-copilot/gpt-5.5"
  fallbacks:
    - "acpx-copilot/gpt-5.5"

cliBackends:
  acpx-copilot:
    command: "/usr/bin/env"
    args:
      - bash
      - -lc
      - exec acpx --format text --model gpt-5.5 --timeout 300 copilot exec --file -
    input: stdin
    output: text
    serialize: true
    sessionMode: none

models:
  providers:
    anthropic:
      enabled: false

# Use the public agents image (same as openclaw-coder); the default
# registry.5dlabs.ai/5dlabs/openclaw image requires auth.
image:
  repository: ghcr.io/5dlabs/agents
  tag: "latest"
  pullPolicy: Always

# Keep cross-pod NATS messaging disabled; this bot is not part of the
# multi-agent mesh.
nats:
  enabled: false

# Enable the Discord gateway for the regular Coder bot. The chart renders
# DISCORD_TOKEN from openclaw-discord-tokens[avatar-openclaw] at runtime; do not put
# token values in Git.
messaging:
  discord:
    enabled: true
    tokenSecretKey: avatar-openclaw
    allowBots: mentions
    groupPolicy: allowlist
    dmPolicy: allowlist
    allowFrom:
      - "444519104808878090"
    guilds:
      "*":
        requireMention: true
        users:
          - "444519104808878090"
      "1490117571977019524":
        requireMention: true
        slug: "5dlabs-coder"
        channels:
          "1494057364301545542":
            enabled: true
            requireMention: false
    threadBindings:
      enabled: true
      spawnSubagentSessions: true
      spawnAcpSessions: true

codexPlugin:
  # The Code Avatar OpenClaw gateway image does not currently ship an OpenClaw codex
  # plugin package; leaving the stale plugin enabled creates config warnings.
  enabled: false

# Keep Kubernetes probes disabled until this chart has a first-class
# gateway-vs-harness runtime mode switch. The current container entrypoint
# still sleeps for harness iteration, so gateway recovery is supervised
# manually inside the persistent pod.
probes:
  startup:
    enabled: false
  liveness:
    enabled: false
  readiness:
    enabled: false

# Persist the intake runtime defaults through the Argo-managed Code Avatar OpenClaw
# application. Smoke/debug runs from this pod should route every intake LLM
# entity through the universal ACPX backend and GitHub Copilot GPT-5.5 rather
# than falling back to Gemini, direct API keys, or OpenClaw gateway defaults.
extraEnv:
  - name: CTO_LLM_INVOKE_BACKEND
    value: acp
  - name: ACPX_LLM_MODEL
    value: gpt-5.5
  - name: ACPX_LLM_TIMEOUT
    value: "300"
  - name: INTAKE_MODEL_PRIMARY_PROVIDER
    value: github-copilot
  - name: INTAKE_MODEL_PRIMARY
    value: gpt-5.5
  - name: INTAKE_MODEL_FAST_PROVIDER
    value: github-copilot
  - name: INTAKE_MODEL_FAST
    value: gpt-5.5
  - name: INTAKE_MODEL_FRONTIER_PROVIDER
    value: github-copilot
  - name: INTAKE_MODEL_FRONTIER
    value: gpt-5.5
  - name: INTAKE_VOTER_1_PROVIDER
    value: github-copilot
  - name: INTAKE_VOTER_1_MODEL
    value: gpt-5.5
  - name: INTAKE_VOTER_2_PROVIDER
    value: github-copilot
  - name: INTAKE_VOTER_2_MODEL
    value: gpt-5.5
  - name: INTAKE_VOTER_3_PROVIDER
    value: github-copilot
  - name: INTAKE_VOTER_3_MODEL
    value: gpt-5.5
  - name: INTAKE_DELIBERATION_VIDEO
    value: "0"

# =============================================================================
# Coder-Generalist Workspace Context
# =============================================================================
# These agents are general-purpose Coder-class assistants. They are intentionally
# broader than one persona/token account: they get the CTO repo, adjacent
# OpenClaw repos, startup continuity files, tool notes, and the same external
# CTO skills ConfigMap that the primary Coder uses.
workspace:
  repos:
    - name: cto
      url: "https://github.com/5dlabs/cto.git"
      branch: "main"
      path: "repos/cto"
    - name: openclaw-platform
      url: "https://github.com/5dlabs/openclaw-platform.git"
      branch: "main"
      path: "repos/openclaw-platform"
    - name: openclaw
      url: "https://github.com/openclaw/openclaw.git"
      branch: "main"
      path: "repos/openclaw"
  files:
    BOOT.md: |
      # BOOT.md — Coder-Generalist Startup Continuity

      You have just started or reloaded. Before answering user work:

      1. Read `/workspace/AGENTS.md`, `/workspace/SOUL.md`,
         `/workspace/TOOLS.md`, and `/workspace/USER.md`.
      2. Read `/workspace/HANDOFF.md` if present.
      3. Check every git repository under `/workspace/repos/` with
         `git status --short --branch`.
      4. Inspect recent session/checkpoint state if the active CLI exposes it.
      5. Resume any in-flight work that is clearly inferable from those sources;
         otherwise briefly report that the workspace is clean and stand by.

      Do not rely on a missing continuity skill. Execute this checklist directly
      with the tools available in the pod.

    USER.md: |
      # USER.md — About the Human

      Name: Jonathon
      What to call them: Jonathon
      Timezone: Australia/Sydney (AEST/AEDT)

      Jonathon is the founder of 5DLabs and is building the CTO Platform: a
      Kubernetes-native multi-agent orchestration system with CodeRun CRDs,
      OpenClaw gateways, a Lobster workflow engine, and a runtime-neutral
      Discord control plane.

      Communication preference: concise, direct, evidence-backed updates.
      Working code and verified changes matter more than long explanations.

    AGENTS.md: |
      # AGENTS.md — Coder-Generalist

      You are a general-purpose Coder-class CTO Platform assistant. You may be
      connected through a reused Discord bot account such as Scout, Review, or
      Avatar, but your role here is not that legacy persona. Your role is to be
      a capable generalist implementation/debugging agent for CTO work.

      ## Mission

      Help implement, debug, validate, and operate the CTO Platform. Default to
      the `/workspace/repos/cto` monorepo for product and GitOps work, and use
      `/workspace/repos/openclaw-platform` plus `/workspace/repos/openclaw` as
      adjacent reference repos when needed.

      ## Operating Rules

      - Be direct and implementation-focused.
      - Use tools before speculating. Read files, check logs, run tests, and
        verify meaningful changes.
      - Never print, paste, commit, or summarize secret values. Secret/key names
        are OK; values are not.
      - Prefer GitOps changes through `5dlabs/cto` for cluster state.
      - Keep Morgan, Metal, and other named personas distinct. Do not imply this
        bot is Morgan or Metal just because older GitOps files once used those
        words.
      - For coding tasks, create small reviewable changes and run relevant
        package tests/builds before declaring success.
      - For CTO Discord control-plane work, treat Hermes parity as the reference
        behavior and keep Discord credentials inside the control-plane boundary.
      - If blocked, state what you tried, what failed, and the next concrete
        fallback. Do not hand vague work back to the human.

      ## Starting Point

      Read `/workspace/BOOT.md` after startup. If actively assigned a task,
      prioritize the user's current request over idle continuity work.

    SOUL.md: |
      # SOUL.md — Coder-Generalist

      You're not a novelty bot. You're a CTO Platform generalist. Be sharp,
      resourceful, and practical.

      - Skip filler. Help directly.
      - Have opinions when the evidence supports them.
      - Prefer working software, verified rollouts, and clean GitOps state over
        performative status updates.
      - Don't be fooled by the Discord account name: Scout/Review/Avatar tokens
        are transport identities; your job here is generalist CTO coding work.
      - If something looks dumb, inspect the runtime context first. Missing repo
        clones, missing workspace files, and missing skill/config mounts are
        usually fixable infrastructure issues.

    TOOLS.md: |
      # TOOLS.md — Local CTO Workspace Notes

      Runtime: Kubernetes pod in the `cto` namespace.
      Workspace root: `/workspace`.
      Primary repo: `/workspace/repos/cto`.
      Reference repos: `/workspace/repos/openclaw-platform`, `/workspace/repos/openclaw`.

      ## Expected capabilities

      - Git and GitHub operations against `github.com/5dlabs/cto`.
      - Kubernetes/GitOps inspection for CTO workloads when credentials/RBAC are
        available.
      - OpenClaw gateway and Discord channel checks via `openclaw channels status`.
      - ACPX/Copilot execution through `acpx-copilot/gpt-5.5`.
      - CTO external tool server access through `/workspace/.local/bin/tools`
        and the `cto-tools` service when configured.

      ## Verification standard

      If you changed code or GitOps, prove it with the narrowest meaningful
      validation: syntax checks, package tests/builds, `kubectl`/Argo status, and
      smoke tests where safe. Report exact commands and results without secrets.

    HANDOFF.md: |
      # HANDOFF.md

      No task-specific handoff has been written for this generalist workspace yet.
      Check git status and the active user request before starting new work.

# =============================================================================
# Coder-Generalist Tool/Skill Context
# =============================================================================
toolServer:
  url: "http://cto-tools.cto.svc.cluster.local:3000/sse"

toolsConfig:
  remoteTools:
    - "argocd_*"
    - "context7_*"
    - "exa_*"
    - "firecrawl_*"
    - "github_*"
    - "kubernetes_*"
    - "linear_*"
    - "loki_*"
    - "octocode_*"
    - "openmemory_*"
    - "playwright_*"
    - "shadcn_*"
    - "tavily_*"

skills:
  external:
    openclaw:
      - configMapName: "cto-coder-external-skills"
        optional: true

claudeCode:
  enabled: true
  oauthTokenSecretKey: "anthropic-sub1-oauth"
  oauthTokenSecretKeySub2: "anthropic-sub2-oauth"
  model: "claude-opus-4-7"
  permissions:
    defaultMode: "bypassPermissions"
    allow:
      - "Bash"
      - "Read"
      - "Edit"
      - "Write"
      - "WebFetch"
      - "WebSearch"
      - "Task"
  agentTeams:
    enabled: true
    teammateMode: "in-process"
  includeCoAuthoredBy: false
  disableTelemetry: true
  mcp:
    servers:
      tool-server:
        command: "/workspace/.local/bin/tools"
        args: []
        cwd: "/workspace"
