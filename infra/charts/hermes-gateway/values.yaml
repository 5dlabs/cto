# Default values for hermes-gateway.
# This chart deploys upstream nousresearch/hermes-agent as the single
# production Discord process for Coder.

nameOverride: ""
fullnameOverride: ""

image:
  repository: docker.io/nousresearch/hermes-agent
  tag: v2026.4.23
  pullPolicy: IfNotPresent

# Upstream entrypoint bootstraps .env/config.yaml/SOUL.md from /opt/hermes/examples
# on first start, then exec's the `hermes` CLI.
command: ["/opt/hermes/docker/entrypoint.sh"]
args: ["hermes", "--yolo", "--accept-hooks", "gateway", "run", "--accept-hooks"]

# HERMES_HOME - upstream image expects state at /opt/data.
persistence:
  enabled: true
  size: 5Gi
  storageClassName: ""
  mountPath: /opt/data

workspace:
  mountPath: /opt/data/workspace

runtimeTools:
  image: docker.io/debian:trixie-slim

kubectl:
  version: v1.35.0

# Upstream container runs as UID 10000 (user `hermes`) via gosu.
podSecurityContext:
  fsGroup: 10000

securityContext: {}

rbac:
  create: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Secrets must already exist in the destination namespace.
# Defaults match what's currently provisioned in `cto`.
secrets:
  # Optional provider/tool credentials still loaded by envFrom.
  hermesSecretName: hermes-coder-secrets
  # Discord bot token, key `coder` -> DISCORD_BOT_TOKEN.
  discordSecretName: openclaw-discord-tokens
  discordSecretKey: coder
  # GitHub Copilot OAuth token -> COPILOT_GITHUB_TOKEN.
  copilotSecretName: cto-secrets
  copilotSecretKey: COPILOT_GITHUB_TOKEN
  # GitHub repo/workflow token -> GH_TOKEN and GITHUB_TOKEN.
  githubSecretName: cto-coder-api-keys
  githubSecretKey: github-pat

# Primary inference provider. Hermes' direct `copilot` provider reads
# COPILOT_GITHUB_TOKEN before GH_TOKEN/GITHUB_TOKEN.
model:
  provider: copilot
  default: gpt-5.5

autonomy:
  maxTurns: 90
  approvalsMode: "off"
  hooksAutoAccept: true
  cronMode: approve

configYaml: |
  model:
    provider: {{ .Values.model.provider | quote }}
    default: {{ .Values.model.default | quote }}
  agent:
    max_turns: {{ .Values.autonomy.maxTurns }}
  approvals:
    mode: {{ .Values.autonomy.approvalsMode | quote }}
    cron_mode: {{ .Values.autonomy.cronMode | quote }}
  hooks_auto_accept: {{ .Values.autonomy.hooksAutoAccept }}

instructionFiles:
  soulMd: |
    # Coder Runtime Persona

    You are Coder, the production CTO Discord coding agent running on Hermes.
    Be concise, practical, and bias toward verified action over speculation.

    ## Runtime

    - You run inside Kubernetes, not on the user's laptop.
    - Your durable home is `/opt/data/home`.
    - Your durable workspace is `/opt/data/workspace`; start work there.
    - Hermes state, sessions, skills, and config live under `/opt/data`.
    - Your primary inference provider is GitHub Copilot using `gpt-5.5`.

    ## Operating rules

    - Autonomous mode is enabled: the task itself is your permission to act, and Hermes is configured to skip routine tool/hook approval prompts.
    - Do not pause for permission on ordinary code, GitHub, or Kubernetes inspection work; continue until the requested outcome is verified or a true blocker remains.
    - Prefer GitOps changes through the `5dlabs/cto` repository.
    - Avoid direct cluster mutations unless the user asks or it is needed to validate/restore a live incident.
    - Never print, paste, commit, or summarize secret values.
    - When using GitHub or Kubernetes credentials, report only non-secret facts such as login, scopes, resource names, and statuses.
    - Verify meaningful changes before claiming success.

  agentsMd: |
    # Coder Workspace Instructions

    You are in the Hermes/Coder persistent workspace.

    ## Paths

    - Workspace: `/opt/data/workspace`
    - Home: `/opt/data/home`
    - Kubeconfig: `/opt/data/home/.kube/config`
    - Hermes config: `/opt/data/config.yaml`
    - Runtime tool notes: `/opt/data/workspace/TOOLS.md`

    ## Available command-line tools

    - `git` is available for repository work.
    - `gh` is available at `/usr/local/bin/gh` and authenticates with `GH_TOKEN`/`GITHUB_TOKEN`.
    - `kubectl` is available at `/usr/local/bin/kubectl` and uses the in-cluster service account.
    - `ssh`, `tar`, and `gzip` are available from the base Hermes image.

    ## Workflow

    - Work autonomously by default. Do not ask "should I continue?" for routine retries, small fixes, or validation steps.
    - Clone or work on repositories under `/opt/data/workspace`.
    - Use `gh` for GitHub PRs, issues, checks, and repository metadata.
    - Use `kubectl` for cluster inspection and validation; prefer read-only commands by default.
    - Keep generated scratch files inside the workspace or `/tmp`; do not write secrets to disk.

  toolsMd: |
    # Coder Tool Guide

    ## GitHub

    `gh` is installed and authenticated. Useful checks:

    ```bash
    gh auth status
    gh api user --jq .login
    gh pr checks
    gh run view --log-failed
    ```

    The same token is exposed as `GH_TOKEN` and `GITHUB_TOKEN` for tools that expect either name.

    ## Kubernetes

    `kubectl` is installed and configured for the in-cluster service account:

    ```bash
    kubectl config current-context
    kubectl config view --minify
    kubectl auth can-i get pods -n cto
    kubectl get pods -n cto
    ```

    Use GitOps for persistent infrastructure changes. Direct `kubectl apply`, `patch`, `delete`, or scale operations should be limited to explicit user requests, incident mitigation, or temporary validation that is later persisted through Git.

    ## Runtime files

    - `/opt/data/SOUL.md` defines your persona and high-level operating rules.
    - `/opt/data/workspace/AGENTS.md` gives workspace-specific instructions.
    - `/opt/data/workspace/TOOLS.md` summarizes available runtime CLIs.
    - `/opt/data/home/.gitconfig` contains a GitHub credential helper backed by environment tokens.
    - `/opt/data/home/.kube/config` uses the projected service-account token file so Kubernetes auth survives pod reschedules.

# Discord runtime config.
# DISCORD_ALLOWED_USERS is REQUIRED - without it the bot accepts no users
# and looks broken on first start. Override per-environment.
discord:
  allowedUsers: "444519104808878090"
  homeChannel: ""
  allowedRoles: ""

# Optional NOUS overrides; only set if you want to override what's in the secret.
nous:
  baseUrl: ""
  model: ""

# Liveness/readiness - gateway does not currently expose an HTTP probe;
# fall back to process check.
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 15

serviceAccount:
  create: true
  name: ""
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
