{{- if .Values.statefulset.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hermes-gateway.fullname" . }}-headless
  labels:
    {{- include "hermes-gateway.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "hermes-gateway.selectorLabels" . | nindent 4 }}
{{- end }}
