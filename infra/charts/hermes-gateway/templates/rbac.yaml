{{- if and .Values.enabled .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hermes-gateway.fullname" . }}
  labels:
    {{- include "hermes-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hermes-gateway.fullname" . }}
  labels:
    {{- include "hermes-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "hermes-gateway.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hermes-gateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
