apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes-gateway.fullname" . }}
  labels:
    {{- include "hermes-gateway.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hermes-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hermes-gateway.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ tpl .Values.configYaml . | sha256sum }}
    spec:
      serviceAccountName: {{ include "hermes-gateway.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: write-hermes-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p {{ .Values.persistence.mountPath | quote }} {{ .Values.workspace.mountPath | quote }} {{ .Values.persistence.mountPath }}/home/bin {{ .Values.persistence.mountPath }}/home/.kube
              cp /config-template/config.yaml {{ .Values.persistence.mountPath }}/config.yaml
              cat > {{ .Values.persistence.mountPath }}/home/bin/git-credential-github-token <<'EOF'
              #!/bin/sh
              [ "${1:-get}" = "get" ] || exit 0
              host=""
              while IFS= read -r line; do
                [ -n "$line" ] || break
                case "$line" in
                  host=*) host=${line#host=} ;;
                esac
              done
              case "$host" in
                github.com|api.github.com)
                  token="${GH_TOKEN:-${GITHUB_TOKEN:-}}"
                  [ -n "$token" ] || exit 0
                  printf 'username=x-access-token\n'
                  printf 'password=%s\n' "$token"
                  ;;
              esac
              EOF
              sed -i 's/^              //' {{ .Values.persistence.mountPath }}/home/bin/git-credential-github-token
              cat > {{ .Values.persistence.mountPath }}/home/.gitconfig <<EOF
              [credential "https://github.com"]
                helper = {{ .Values.persistence.mountPath }}/home/bin/git-credential-github-token
              [credential "https://api.github.com"]
                helper = {{ .Values.persistence.mountPath }}/home/bin/git-credential-github-token
              EOF
              sed -i 's/^              //' {{ .Values.persistence.mountPath }}/home/.gitconfig
              cat > {{ .Values.persistence.mountPath }}/home/.kube/config <<'EOF'
              apiVersion: v1
              kind: Config
              clusters:
              - name: in-cluster
                cluster:
                  server: https://kubernetes.default.svc
                  certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              users:
              - name: pod-service-account
                user:
                  tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              contexts:
              - name: in-cluster
                context:
                  cluster: in-cluster
                  user: pod-service-account
                  namespace: {{ .Release.Namespace }}
              current-context: in-cluster
              EOF
              sed -i 's/^              //' {{ .Values.persistence.mountPath }}/home/.kube/config
              chown -R 10000:10000 {{ .Values.workspace.mountPath | quote }} {{ .Values.persistence.mountPath }}/home
              chown 10000:10000 {{ .Values.persistence.mountPath }}/config.yaml
              chmod 600 {{ .Values.persistence.mountPath }}/config.yaml
              chmod 700 {{ .Values.persistence.mountPath }}/home/bin
              chmod 700 {{ .Values.persistence.mountPath }}/home/bin/git-credential-github-token
              chmod 600 {{ .Values.persistence.mountPath }}/home/.gitconfig
              chmod 700 {{ .Values.persistence.mountPath }}/home/.kube
              chmod 600 {{ .Values.persistence.mountPath }}/home/.kube/config
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath | quote }}
            - name: config-template
              mountPath: /config-template
        - name: install-runtime-tools
          image: {{ .Values.runtimeTools.image | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
            - |
              set -eu
              apt-get update -qq
              apt-get install -y --no-install-recommends ca-certificates curl gh >/dev/null
              mkdir -p {{ .Values.persistence.mountPath }}/home/bin
              cp "$(command -v gh)" {{ .Values.persistence.mountPath }}/home/bin/gh
              KUBECTL_ARCH="amd64"
              case "$(uname -m)" in
                aarch64|arm64)
                  KUBECTL_ARCH="arm64"
                  ;;
              esac
              curl -fsSL -o {{ .Values.persistence.mountPath }}/home/bin/kubectl "https://dl.k8s.io/release/{{ .Values.kubectl.version }}/bin/linux/${KUBECTL_ARCH}/kubectl"
              chmod 755 {{ .Values.persistence.mountPath }}/home/bin/kubectl
              chmod 755 {{ .Values.persistence.mountPath }}/home/bin/gh
              chown 10000:10000 {{ .Values.persistence.mountPath }}/home/bin/gh {{ .Values.persistence.mountPath }}/home/bin/kubectl
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath | quote }}
      containers:
        - name: hermes
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: {{ .Values.workspace.mountPath | quote }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          env:
            - name: HOME
              value: "{{ .Values.persistence.mountPath }}/home"
            - name: KUBECONFIG
              value: "{{ .Values.persistence.mountPath }}/home/.kube/config"
            - name: PATH
              value: "{{ .Values.persistence.mountPath }}/home/bin:{{ .Values.persistence.mountPath }}/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/games:/usr/games"
            - name: HERMES_HOME
              value: {{ .Values.persistence.mountPath | quote }}
            - name: WORKSPACE
              value: {{ .Values.workspace.mountPath | quote }}
            - name: HERMES_INFERENCE_PROVIDER
              value: {{ .Values.model.provider | quote }}
            - name: HERMES_MODEL
              value: {{ .Values.model.default | quote }}
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.discordSecretName | quote }}
                  key: {{ .Values.secrets.discordSecretKey | quote }}
            - name: COPILOT_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.copilotSecretName | quote }}
                  key: {{ .Values.secrets.copilotSecretKey | quote }}
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.githubSecretName | quote }}
                  key: {{ .Values.secrets.githubSecretKey | quote }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.githubSecretName | quote }}
                  key: {{ .Values.secrets.githubSecretKey | quote }}
            {{- if .Values.discord.allowedUsers }}
            - name: DISCORD_ALLOWED_USERS
              value: {{ .Values.discord.allowedUsers | quote }}
            {{- end }}
            {{- if .Values.discord.allowedRoles }}
            - name: DISCORD_ALLOWED_ROLES
              value: {{ .Values.discord.allowedRoles | quote }}
            {{- end }}
            {{- if .Values.discord.homeChannel }}
            - name: DISCORD_HOME_CHANNEL
              value: {{ .Values.discord.homeChannel | quote }}
            {{- end }}
            {{- if .Values.nous.baseUrl }}
            - name: NOUS_BASE_URL
              value: {{ .Values.nous.baseUrl | quote }}
            {{- end }}
            {{- if .Values.nous.model }}
            - name: NOUS_MODEL
              value: {{ .Values.nous.model | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.hermesSecretName | quote }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath | quote }}
            - name: data
              mountPath: /usr/local/bin/gh
              subPath: home/bin/gh
              readOnly: true
            - name: data
              mountPath: /usr/local/bin/kubectl
              subPath: home/bin/kubectl
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f 'hermes' >/dev/null"]
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f 'hermes' >/dev/null"]
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hermes-gateway.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config-template
          configMap:
            name: {{ include "hermes-gateway.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
