apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "narrator.fullname" . }}
  labels:
    {{- include "narrator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "narrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "narrator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "narrator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: narrator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8082
              protocol: TCP
          env:
            - name: NATS_URL
              value: {{ .Values.nats.url | quote }}
            - name: NATS_SUBJECT
              value: {{ .Values.nats.subject | quote }}
            - name: NATS_RESULT_SUBJECT
              value: {{ .Values.nats.resultSubject | quote }}
            - name: NATS_QUEUE
              value: {{ .Values.nats.queue | quote }}
            - name: NATS_STREAM
              value: {{ .Values.nats.stream | quote }}
            - name: NATS_CONSUMER
              value: {{ .Values.nats.consumer | quote }}
            - name: NATS_ACK_WAIT
              value: {{ .Values.nats.ackWait | quote }}
            - name: NATS_MAX_DELIVER
              value: {{ .Values.nats.maxDeliver | quote }}
            - name: TTS_HOME
              value: {{ .Values.tts.modelCacheDir | quote }}
            - name: METRICS_PORT
              value: {{ .Values.service.metricsPort | quote }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: tts-models
              mountPath: {{ .Values.tts.modelCacheDir }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: tts-models
          persistentVolumeClaim:
            claimName: {{ include "narrator.fullname" . }}-models
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
