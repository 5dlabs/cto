---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: buildkit
  namespace: {{ .Values.namespace }}
  labels:
    app: buildkit
    app.kubernetes.io/name: buildkit
    app.kubernetes.io/component: build-infrastructure
spec:
  serviceName: buildkit
  replicas: 1
  selector:
    matchLabels:
      app: buildkit
  template:
    metadata:
      labels:
        app: buildkit
      annotations:
        container.apparmor.security.beta.kubernetes.io/buildkitd: unconfined
    spec:
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - name: buildkitd
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          args:
            - --addr
            - unix:///run/buildkit/buildkitd.sock
            - --addr
            - tcp://0.0.0.0:1234
            {{- if .Values.config.insecureRegistries }}
            - --config
            - /etc/buildkit/buildkitd.toml
            {{- end }}
          ports:
            - name: buildkit
              containerPort: 1234
              protocol: TCP
          securityContext:
            privileged: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: buildkit-cache
              mountPath: /var/lib/buildkit
            - name: cargo-cache
              mountPath: /cargo-cache
            {{- if .Values.workspace.useMemory }}
            - name: tmpfs-workspace
              mountPath: /tmp
            {{- end }}
            {{- if .Values.config.insecureRegistries }}
            - name: buildkit-config
              mountPath: /etc/buildkit
            {{- end }}
          env:
            - name: BUILDKIT_STEP_LOG_MAX_SIZE
              value: "{{ .Values.config.maxLogSize }}"
            - name: BUILDKIT_STEP_LOG_MAX_SPEED
              value: "{{ .Values.config.maxLogSpeed }}"
      volumes:
        {{- if .Values.workspace.useMemory }}
        # RAM-backed workspace for faster I/O (2-4x speedup vs SSD)
        - name: tmpfs-workspace
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.workspace.sizeLimit }}
        {{- end }}
        {{- if .Values.config.insecureRegistries }}
        - name: buildkit-config
          configMap:
            name: buildkit-config
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: buildkit-cache
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storageClass }}
        resources:
          requests:
            storage: {{ .Values.cache.buildkitSize }}
    - metadata:
        name: cargo-cache
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storageClass }}
        resources:
          requests:
            storage: {{ .Values.cache.cargoSize }}
