---
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkit-config
  namespace: {{ .Values.namespace }}
data:
  buildkitd.toml: |
    # BuildKit daemon configuration

    [worker.oci]
      max-parallelism = {{ .Values.config.maxParallelism }}

    {{- if .Values.config.insecureRegistries }}
    # Allow pushing to insecure (HTTP) registries
    {{- range .Values.config.insecureRegistries }}
    [registry."{{ . }}"]
      http = true
      insecure = true
    {{- end }}
    {{- end }}

    # Garbage collection policies (always enabled)
    # Policy 1: Keep recent builds for specified duration up to max bytes
    [[worker.oci.gcpolicy]]
      keepDuration = "{{ .Values.config.gcKeepDuration }}"
      keepBytes = {{ int64 .Values.config.gcKeepBytes }}

    # Policy 2: Aggressively prune orphaned/unreferenced blobs after 48h
    # This prevents cache corruption from accumulating stale blob references
    [[worker.oci.gcpolicy]]
      all = true
      keepDuration = "48h"
