---
apiVersion: v1
kind: Service
metadata:
  name: buildkit
  namespace: {{ .Values.namespace }}
  labels:
    app: buildkit
spec:
  type: NodePort
  selector:
    app: buildkit
  ports:
    - name: buildkit
      port: 1234
      targetPort: 1234
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP
