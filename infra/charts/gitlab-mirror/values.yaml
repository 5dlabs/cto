# List of repositories to mirror. Each entry renders its own CronJob so the
# jobs run independently. The legacy top-level `github`/`gitlab` keys below are
# used as defaults when a repo entry omits them.
#
# NOTE: this in-cluster SSH mirror path is the canonical way to cover repos
# whose tarball exceeds the Cloudflare 100 MB body cap (which breaks the
# `.github/workflows/mirror-to-gitlab.yml` HTTPS path with HTTP 413).
repos:
  - name: cto
    github:
      url: https://github.com/5dlabs/cto.git
      branch: main
    gitlab:
      project: 5dlabs/cto
  - name: cto-pay
    github:
      url: https://github.com/5dlabs/cto-pay.git
      branch: main
    gitlab:
      project: 5dlabs/cto-pay
  - name: mcp-proxy
    github:
      url: https://github.com/5dlabs/mcp-proxy.git
      branch: main
    gitlab:
      project: 5dlabs/mcp-proxy
  - name: sigma-1
    github:
      url: https://github.com/5dlabs/sigma-1.git
      branch: main
    gitlab:
      project: 5dlabs/sigma-1
  - name: solana
    github:
      url: https://github.com/5dlabs/solana.git
      branch: main
    gitlab:
      project: 5dlabs/solana

# Defaults applied when a repo entry omits a field.
github:
  branch: main

# GitHub PAT secret (must contain key `token`). The mirror script clones via
# https://x-access-token:${GH_TOKEN}@github.com/...
# Created out-of-band; see infra/docs/gitlab-mirror.md.
githubTokenSecret:
  name: gh-mirror-token
  key: token

# Internal GitLab SSH endpoint (gitlab-shell service inside cluster)
gitlab:
  sshHost: gitlab-gitlab-shell.gitlab.svc.cluster.local
  sshPort: 22
  sshUser: git

# Deploy-key Secret (created out-of-band; see infra/docs/gitlab-mirror.md).
# Must contain key `id_ed25519` (private key) — same shape as gl-mirror-key.
sshSecret:
  name: gl-mirror-key
  privateKeyFile: id_ed25519

# How often to mirror (every 5 minutes)
schedule: "*/5 * * * *"

# Retain last few job logs for debugging
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 5

# Job behavior
backoffLimit: 2
activeDeadlineSeconds: 900   # 15 min hard cap per run
ttlSecondsAfterFinished: 86400

# Concurrency: skip if a previous run is still going
concurrencyPolicy: Forbid

# Image: anything with git + openssh-client
image:
  repository: alpine/git
  tag: "2.49.1"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Force-push (matches branch protection allow_force_push=true)
forcePush: true

# Mirror tags too
mirrorTags: true
