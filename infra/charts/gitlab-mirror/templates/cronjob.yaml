apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-mirror
  labels:
    app.kubernetes.io/name: gitlab-mirror
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-mirror-script
  labels:
    app.kubernetes.io/name: gitlab-mirror
data:
  mirror.sh: |
    #!/bin/sh
    set -eu

    : "${GITHUB_URL:?GITHUB_URL not set}"
    : "${GITHUB_BRANCH:?GITHUB_BRANCH not set}"
    : "${GITLAB_HOST:?GITLAB_HOST not set}"
    : "${GITLAB_PORT:?GITLAB_PORT not set}"
    : "${GITLAB_USER:?GITLAB_USER not set}"
    : "${GITLAB_PROJECT:?GITLAB_PROJECT not set}"
    FORCE_FLAG="${FORCE_FLAG:-}"
    MIRROR_TAGS="${MIRROR_TAGS:-false}"

    echo "==> mirror $GITHUB_URL ($GITHUB_BRANCH) -> $GITLAB_USER@$GITLAB_HOST:$GITLAB_PROJECT.git"

    # SSH config
    mkdir -p /root/.ssh
    cp /etc/gitlab-mirror-ssh/{{ .Values.sshSecret.privateKeyFile }} /root/.ssh/id_ed25519
    chmod 600 /root/.ssh/id_ed25519
    cat >/root/.ssh/config <<EOF_SSH
    Host gitlab-mirror
      HostName $GITLAB_HOST
      Port $GITLAB_PORT
      User $GITLAB_USER
      IdentityFile /root/.ssh/id_ed25519
      StrictHostKeyChecking no
      UserKnownHostsFile /dev/null
      LogLevel ERROR
    EOF_SSH

    # Full clone (gitaly rejects shallow pushes). Inject PAT into URL.
    if [ -z "${GH_TOKEN:-}" ]; then
      echo "ERROR: GH_TOKEN env not set" >&2
      exit 1
    fi
    AUTH_URL=$(printf '%s' "$GITHUB_URL" | sed -E "s#https://#https://x-access-token:${GH_TOKEN}@#")
    cd /tmp
    rm -rf repo
    echo "==> cloning $GITHUB_URL"
    git clone --branch "$GITHUB_BRANCH" "$AUTH_URL" repo
    cd repo

    # Fetch all branches/tags from origin so we can push everything.
    # Always push from refs/remotes/origin/<branch> to guarantee we push the
    # freshest SHA (clone can see a slightly stale HEAD due to GitHub replica lag).
    git fetch --tags --prune origin

    git remote add gitlab "ssh://gitlab-mirror/$GITLAB_PROJECT.git"

    echo "==> pushing $GITHUB_BRANCH (from refs/remotes/origin/$GITHUB_BRANCH)"
    git push $FORCE_FLAG gitlab "refs/remotes/origin/$GITHUB_BRANCH:refs/heads/$GITHUB_BRANCH"

    if [ "$MIRROR_TAGS" = "true" ]; then
      echo "==> pushing tags"
      git push $FORCE_FLAG --tags gitlab
    fi

    echo "==> mirror complete"
{{- $root := . }}
{{- range $repo := .Values.repos }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitlab-mirror-{{ $repo.name }}
  labels:
    app.kubernetes.io/name: gitlab-mirror
    app.kubernetes.io/instance: {{ $repo.name }}
    app.kubernetes.io/managed-by: argocd
spec:
  schedule: {{ default $root.Values.schedule $repo.schedule | quote }}
  concurrencyPolicy: {{ $root.Values.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ $root.Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $root.Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ $root.Values.backoffLimit }}
      activeDeadlineSeconds: {{ $root.Values.activeDeadlineSeconds }}
      ttlSecondsAfterFinished: {{ $root.Values.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: gitlab-mirror
            app.kubernetes.io/instance: {{ $repo.name }}
        spec:
          restartPolicy: Never
          serviceAccountName: gitlab-mirror
          securityContext:
            runAsUser: 0
            fsGroup: 0
          containers:
            - name: mirror
              image: "{{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}"
              imagePullPolicy: {{ $root.Values.image.pullPolicy }}
              command: ["/bin/sh", "/etc/gitlab-mirror/mirror.sh"]
              env:
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ $root.Values.githubTokenSecret.name }}
                      key: {{ $root.Values.githubTokenSecret.key }}
                - name: GITHUB_URL
                  value: {{ $repo.github.url | quote }}
                - name: GITHUB_BRANCH
                  value: {{ default $root.Values.github.branch $repo.github.branch | quote }}
                - name: GITLAB_HOST
                  value: {{ $root.Values.gitlab.sshHost | quote }}
                - name: GITLAB_PORT
                  value: {{ $root.Values.gitlab.sshPort | quote }}
                - name: GITLAB_USER
                  value: {{ $root.Values.gitlab.sshUser | quote }}
                - name: GITLAB_PROJECT
                  value: {{ $repo.gitlab.project | quote }}
                - name: FORCE_FLAG
                  value: {{ ternary "--force" "" $root.Values.forcePush | quote }}
                - name: MIRROR_TAGS
                  value: {{ $root.Values.mirrorTags | quote }}
              resources:
                {{- toYaml $root.Values.resources | nindent 16 }}
              volumeMounts:
                - name: script
                  mountPath: /etc/gitlab-mirror
                - name: ssh-key
                  mountPath: /etc/gitlab-mirror-ssh
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: script
              configMap:
                name: gitlab-mirror-script
                defaultMode: 0755
            - name: ssh-key
              secret:
                secretName: {{ $root.Values.sshSecret.name }}
                defaultMode: 0400
            - name: tmp
              emptyDir:
                sizeLimit: 2Gi
{{- end }}
