apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-mirror
  labels:
    app.kubernetes.io/name: gitlab-mirror
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-mirror-script
  labels:
    app.kubernetes.io/name: gitlab-mirror
data:
  mirror.sh: |
    #!/bin/sh
    set -eu

    GITHUB_URL="{{ .Values.github.url }}"
    GITHUB_BRANCH="{{ .Values.github.branch }}"
    GITLAB_HOST="{{ .Values.gitlab.sshHost }}"
    GITLAB_PORT="{{ .Values.gitlab.sshPort }}"
    GITLAB_USER="{{ .Values.gitlab.sshUser }}"
    GITLAB_PROJECT="{{ .Values.gitlab.project }}"
    FORCE_FLAG=""
    {{- if .Values.forcePush }}
    FORCE_FLAG="--force"
    {{- end }}

    echo "==> mirror $GITHUB_URL ($GITHUB_BRANCH) -> $GITLAB_USER@$GITLAB_HOST:$GITLAB_PROJECT.git"

    # SSH config
    mkdir -p /root/.ssh
    cp /etc/gitlab-mirror-ssh/{{ .Values.sshSecret.privateKeyFile }} /root/.ssh/id_ed25519
    chmod 600 /root/.ssh/id_ed25519
    cat >/root/.ssh/config <<EOF
    Host gitlab-mirror
      HostName $GITLAB_HOST
      Port $GITLAB_PORT
      User $GITLAB_USER
      IdentityFile /root/.ssh/id_ed25519
      StrictHostKeyChecking no
      UserKnownHostsFile /dev/null
      LogLevel ERROR
    EOF

    # Full clone (gitaly rejects shallow pushes). Inject PAT into URL.
    if [ -z "${GH_TOKEN:-}" ]; then
      echo "ERROR: GH_TOKEN env not set" >&2
      exit 1
    fi
    AUTH_URL=$(printf '%s' "$GITHUB_URL" | sed -E "s#https://#https://x-access-token:${GH_TOKEN}@#")
    cd /tmp
    rm -rf repo
    echo "==> cloning $GITHUB_URL"
    git clone --branch "$GITHUB_BRANCH" "$AUTH_URL" repo
    cd repo

    # Fetch all branches/tags from origin so we can push everything (we only push main + tags below).
    # Note: `git fetch` updates refs/remotes/origin/* but does NOT fast-forward the local branch,
    # so we always push from refs/remotes/origin/<branch> to guarantee we push the freshest SHA
    # (clone can see a slightly stale HEAD due to GitHub replica lag).
    git fetch --tags --prune origin

    git remote add gitlab "ssh://gitlab-mirror/$GITLAB_PROJECT.git"

    echo "==> pushing $GITHUB_BRANCH (from refs/remotes/origin/$GITHUB_BRANCH)"
    git push $FORCE_FLAG gitlab "refs/remotes/origin/$GITHUB_BRANCH:refs/heads/$GITHUB_BRANCH"

    {{- if .Values.mirrorTags }}
    echo "==> pushing tags"
    git push $FORCE_FLAG --tags gitlab
    {{- end }}

    echo "==> mirror complete"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitlab-mirror
  labels:
    app.kubernetes.io/name: gitlab-mirror
    app.kubernetes.io/managed-by: argocd
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
      ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: gitlab-mirror
        spec:
          restartPolicy: Never
          serviceAccountName: gitlab-mirror
          securityContext:
            runAsUser: 0
            fsGroup: 0
          containers:
            - name: mirror
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/sh", "/etc/gitlab-mirror/mirror.sh"]
              env:
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.githubTokenSecret.name }}
                      key: {{ .Values.githubTokenSecret.key }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: script
                  mountPath: /etc/gitlab-mirror
                - name: ssh-key
                  mountPath: /etc/gitlab-mirror-ssh
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: script
              configMap:
                name: gitlab-mirror-script
                defaultMode: 0755
            - name: ssh-key
              secret:
                secretName: {{ .Values.sshSecret.name }}
                defaultMode: 0400
            - name: tmp
              emptyDir:
                sizeLimit: 2Gi
