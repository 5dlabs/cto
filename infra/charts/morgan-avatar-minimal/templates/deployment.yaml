apiVersion: apps/v1
kind: Deployment
metadata:
  name: morgan-avatar-minimal
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: morgan-avatar-minimal
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: cto-platform
    app.kubernetes.io/component: avatar-audio
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: morgan-avatar-minimal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: morgan-avatar-minimal
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: livekit-keys
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
