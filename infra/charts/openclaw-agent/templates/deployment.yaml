{{- $messaging := .Values.messaging | default dict -}}
{{- $discordConfig := index $messaging "discord" | default .Values.discord -}}
{{- $mem0Plugin := .Values.mem0Plugin | default dict -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw-agent.fullname" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "openclaw-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openclaw-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw-agent.labels" . | nindent 8 }}
      annotations:
        {{- include "openclaw-agent.podAnnotations" . | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/openclaw-skills: {{ include (print $.Template.BasePath "/configmap-openclaw-skills.yaml") . | sha256sum }}
        {{- if .Values.workspace.files }}
        checksum/workspace-files: {{ include (print $.Template.BasePath "/configmap-workspace-files.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.toolsConfig }}
        checksum/tools-config: {{ include (print $.Template.BasePath "/configmap-tools-config.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.nats.enabled }}
        checksum/nats-plugin: {{ include (print $.Template.BasePath "/configmap-nats-plugin.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.telemetry.enabled }}
        checksum/promtail: {{ include (print $.Template.BasePath "/configmap-promtail.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.claudeCode.enabled }}
        checksum/claude-settings: {{ include (print $.Template.BasePath "/configmap-claude-settings.yaml") . | sha256sum }}
        checksum/claude-skills: {{ include (print $.Template.BasePath "/configmap-claude-skills.yaml") . | sha256sum }}
        {{- if .Values.claudeCode.mcp.servers }}
        checksum/claude-mcp: {{ include (print $.Template.BasePath "/configmap-claude-mcp.yaml") . | sha256sum }}
        {{- end }}
        {{- end }}
        {{- if .Values.toolServer.url }}
        checksum/cli-backend-configs: {{ include (print $.Template.BasePath "/configmap-cli-backend-configs.yaml") . | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "openclaw-agent.fullname" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
      initContainers:
        # Ensure workspace directories exist and resolve the config with env vars
        - name: init-workspace
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Init: {{ .Values.agent.id }} ($(date -u +%Y-%m-%dT%H:%M:%SZ)) ==="

              # ---------------------------------------------------------------
              # 1. Core workspace directories (idempotent)
              # ---------------------------------------------------------------
              mkdir -p /workspace/.openclaw/agents/{{ .Values.agent.id }}/agent
              mkdir -p /workspace/.openclaw/extensions
              mkdir -p /workspace/.local/bin
              mkdir -p /workspace/memory
              mkdir -p /workspace/sessions
              echo "[dirs] Core workspace directories OK"

              # ---------------------------------------------------------------
              # 1b. Fix ~ resolution (getpwuid vs $HOME mismatch)
              # ---------------------------------------------------------------
              # Some tools resolve ~ via /etc/passwd (getpwuid) not $HOME.
              # Ensure /etc/passwd home matches /workspace and create a symlink
              # from the old home so ~ paths work either way.
              sed -i 's|node:x:1001:1000::/home/node:|node:x:1001:1000::/workspace:|' /etc/passwd 2>/dev/null || true
              if [ -d /home/node ] && [ ! -L /home/node/.swarm ]; then
                chmod 755 /home/node 2>/dev/null || true
                mkdir -p /workspace/.swarm
                ln -sf /workspace/.swarm /home/node/.swarm 2>/dev/null || true
              fi
              echo "[passwd] home dir fix applied"

              # ---------------------------------------------------------------
              # 2. OpenClaw config (re-rendered every restart with fresh env)
              # ---------------------------------------------------------------
              envsubst < /config-template/openclaw.json > /workspace/.openclaw/openclaw.json
              echo "[config] openclaw.json rendered"
              openclaw doctor --non-interactive >/dev/null 2>&1 || true

              # ---------------------------------------------------------------
              # 3. OpenClaw orchestrator skills (always overwrite from ConfigMap)
              # ---------------------------------------------------------------
              mkdir -p /workspace/.openclaw/skills
              cp /openclaw-skills-template/*.md /workspace/.openclaw/skills/ 2>/dev/null || true
              echo "[skills] OpenClaw: $(ls /workspace/.openclaw/skills/*.md 2>/dev/null | wc -l) loaded"

              {{- if .Values.claudeCode.enabled }}
              # ---------------------------------------------------------------
              # 4. Claude Code CLI setup (always overwrite from ConfigMaps)
              # ---------------------------------------------------------------
              mkdir -p /workspace/.claude/skills

              cp /claude-settings-template/settings.json /workspace/.claude/settings.json
              echo "[claude] settings.json written"

              cp /claude-skills-template/*.md /workspace/.claude/skills/ 2>/dev/null || true
              echo "[skills] Claude Code: $(ls /workspace/.claude/skills/*.md 2>/dev/null | wc -l) loaded"

              {{- if .Values.claudeCode.mcp.servers }}
              cp /claude-mcp-template/claude.json /workspace/.claude.json
              cp /claude-mcp-template/mcp.json /workspace/.mcp.json
              echo "[claude] .claude.json (MCP config) written"
              {{- end }}
              {{- end }}

              {{- if .Values.tools.acp.agentOverrides }}
              # ---------------------------------------------------------------
              # 4a. ACPX agent registry overrides (.acpxrc.json)
              # ---------------------------------------------------------------
              rm -f /workspace/.acpxrc.json /workspace/.acpxrc.json.chart 2>/dev/null || true
              printf '%s\n' {{ dict "agents" .Values.tools.acp.agentOverrides | toJson | squote }} > /workspace/.acpxrc.json
              cp /workspace/.acpxrc.json /workspace/.acpxrc.json.chart
              chmod 444 /workspace/.acpxrc.json.chart
              echo "[acpx] .acpxrc.json written"
              {{- end }}

              {{- if .Values.toolsConfig }}
              # ---------------------------------------------------------------
              # 4b. Tools config (MCP tools for CLI backends)
              # ---------------------------------------------------------------
              cp /tools-config-template/tools-config.json /workspace/tools-config.json
              echo "[tools] tools-config.json written"
              {{- end }}

              {{- if .Values.toolServer.url }}
              # ---------------------------------------------------------------
              # 4b2. tools-client proxy for CLI MCP stdio integrations
              # ---------------------------------------------------------------
              mkdir -p /workspace/.npm-global
              if [ ! -f /workspace/.npm-global/bin/supergateway ]; then
                npm install -g --prefix /workspace/.npm-global --no-audit --no-fund supergateway 2>&1 | tail -2
                echo "[tools] supergateway installed"
              else
                echo "[tools] supergateway already present"
              fi
              printf '#!/bin/sh\nBASE_URL="${TOOL_SERVER_URL:-{{ .Values.toolServer.url }}}"\nBASE_URL="${BASE_URL%%/sse}"\nexec /workspace/.npm-global/bin/supergateway --streamableHttp "${BASE_URL}/mcp" "$@"\n' > /workspace/.local/bin/tools
              chmod +x /workspace/.local/bin/tools
              echo "[tools] tools MCP proxy ready"

              mkdir -p /workspace/.codex /workspace/.gemini /workspace/.factory /workspace/.cursor
              cp /cli-backend-configs-template/codex-config.toml /workspace/.codex/config.toml
              cp /cli-backend-configs-template/gemini-settings.json /workspace/.gemini/settings.json
              cp /cli-backend-configs-template/factory-mcp.json /workspace/.factory/mcp.json
              cp /cli-backend-configs-template/cursor-mcp.json /workspace/.cursor/mcp.json
              cp /cli-backend-configs-template/opencode.json /workspace/opencode.json
              echo "[cli] backend configs written"
              {{- end }}

              {{- if .Values.tools.acp.enabled }}
              # ---------------------------------------------------------------
              # 4b3. ACPX runtime binary
              # ---------------------------------------------------------------
              ACPX_DIR="/usr/local/share/npm-global/lib/node_modules/openclaw/extensions/acpx"
              {{- if .Values.tools.acp.acpxVersion }}
              echo "[plugin] acpx: upgrading to {{ .Values.tools.acp.acpxVersion }}..."
              cd "$ACPX_DIR"
              if sed -i 's/"acpx": "[^"]*"/"acpx": "{{ .Values.tools.acp.acpxVersion }}"/' package.json && \
                npm install --omit=dev --no-save 2>&1 | tail -3; then
                echo "[plugin] acpx: $(node_modules/.bin/acpx --version 2>/dev/null || echo installed)"
              else
                echo "[plugin] acpx: install failed"
              fi
              {{- else }}
              echo "[plugin] acpx: installing binary..."
              cd "$ACPX_DIR"
              if npm install --omit=dev --no-save 2>&1 | tail -2; then
                echo "[plugin] acpx: ready"
              else
                echo "[plugin] acpx: install failed"
              fi
              {{- end }}
              echo "[plugin] pi-acp: installing..."
              npm install -g pi-acp 2>&1 | tail -2 && \
                echo "[plugin] pi-acp: ready" || echo "[plugin] pi-acp: install failed"
              cd /workspace
              {{- end }}

              {{- if .Values.nats.enabled }}
              # ---------------------------------------------------------------
              # 4c. NATS Messenger plugin
              # ---------------------------------------------------------------
              NATS_EXT="/workspace/.openclaw/extensions/nats-messenger"
              mkdir -p "$NATS_EXT"
              cp /nats-plugin-template/* "$NATS_EXT/"
              if [ ! -d "$NATS_EXT/node_modules/nats" ]; then
                cd "$NATS_EXT" && npm install --production --no-audit --no-fund 2>&1 | tail -3
                echo "[plugin] nats-messenger: installed"
              else
                echo "[plugin] nats-messenger: cached"
              fi
              cd /workspace
              {{- end }}

              {{- if and (hasKey $mem0Plugin "enabled") $mem0Plugin.enabled }}
              # ---------------------------------------------------------------
              # 4d. Mem0 plugin (@mem0/openclaw-mem0)
              # ---------------------------------------------------------------
              MEM0_EXT="/workspace/.openclaw/extensions/openclaw-mem0"
              if [ ! -d "$MEM0_EXT/node_modules" ]; then
                mkdir -p "$MEM0_EXT"
                cd "$MEM0_EXT"
                npm init -y --silent 2>/dev/null
                npm install @mem0/openclaw-mem0 --production --no-audit --no-fund 2>&1 | tail -3
                echo "[plugin] openclaw-mem0: installed"
              else
                echo "[plugin] openclaw-mem0: cached"
              fi
              cd /workspace
              {{- end }}

              {{- if .Values.kaniko.enabled }}
              # ---------------------------------------------------------------
              # 4e. kubectl (for kaniko sidecar exec)
              # ---------------------------------------------------------------
              if [ ! -f /workspace/.local/bin/kubectl ]; then
                mkdir -p /workspace/.local/bin
                KUBECTL_ARCH="amd64"
                case "$(uname -m)" in
                  aarch64|arm64)
                    KUBECTL_ARCH="arm64"
                    ;;
                esac
                curl -sLo /workspace/.local/bin/kubectl \
                  "https://dl.k8s.io/release/v1.35.0/bin/linux/${KUBECTL_ARCH}/kubectl"
                chmod +x /workspace/.local/bin/kubectl
                echo "[tools] kubectl v1.35.0 installed (${KUBECTL_ARCH})"
              else
                echo "[tools] kubectl already present"
              fi
              {{- end }}

              # ---------------------------------------------------------------
              # 4e. Log directory setup
              # ---------------------------------------------------------------
              mkdir -p "$(dirname "{{ .Values.logging.file }}")"
              echo "[dirs] Log directory OK"

              # ---------------------------------------------------------------
              # 5. Git credential setup (for private repo access)
              # ---------------------------------------------------------------
              if [ -n "${GITHUB_TOKEN:-}" ]; then
                git config --global credential.helper store
                echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > /workspace/.git-credentials
                chmod 600 /workspace/.git-credentials
                chown 1001:1000 /workspace/.git-credentials
                git config --global credential.helper 'store --file=/workspace/.git-credentials'
                git config --global user.email "bot@5dlabs.ai"
                git config --global user.name "{{ .Values.agent.id }}"
                git config --global --add safe.directory "*"
                chown 1001:1000 /workspace/.gitconfig 2>/dev/null || true
                echo "[git] Credentials configured for github.com"
              else
                echo "[git] WARNING: GITHUB_TOKEN not set — private repo clones may fail"
              fi

              # ---------------------------------------------------------------
              # 6. Git repo health checks (idempotent clone + dirty-state audit)
              # ---------------------------------------------------------------
              WARNINGS=0
              {{- range .Values.workspace.repos }}
              REPO_DIR="/workspace/{{ .path }}"
              echo ""
              echo "[repo] Checking {{ .name }} → $REPO_DIR"

              if [ -d "$REPO_DIR/.git" ]; then
                echo "[repo] {{ .name }}: already cloned"

                # Check for uncommitted changes
                cd "$REPO_DIR"
                git config --global --add safe.directory "$REPO_DIR" 2>/dev/null || true
                DESIRED_BRANCH="{{ .branch | default "main" }}"
                if ! git diff --quiet 2>/dev/null || ! git diff --cached --quiet 2>/dev/null; then
                  echo "⚠ WARNING: {{ .name }} has uncommitted changes!"
                  git status --short 2>/dev/null || true
                  WARNINGS=$((WARNINGS + 1))
                fi

                # Check for detached HEAD
                BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null || echo "DETACHED")
                if [ "$BRANCH" = "DETACHED" ]; then
                  echo "⚠ WARNING: {{ .name }} is in detached HEAD state ($(git rev-parse --short HEAD))"
                  WARNINGS=$((WARNINGS + 1))
                else
                  echo "[repo] {{ .name }}: on branch $BRANCH"
                  if [ "$BRANCH" != "$DESIRED_BRANCH" ]; then
                    if git diff --quiet 2>/dev/null && git diff --cached --quiet 2>/dev/null; then
                  echo "[repo] {{ .name }}: switching branch $BRANCH -> $DESIRED_BRANCH"
                  if git fetch origin "$DESIRED_BRANCH":"refs/remotes/origin/$DESIRED_BRANCH" --depth=1 >/dev/null 2>&1; then
                    if git show-ref --verify --quiet "refs/heads/$DESIRED_BRANCH"; then
                      git checkout "$DESIRED_BRANCH" >/dev/null 2>&1 || true
                    elif git show-ref --verify --quiet "refs/remotes/origin/$DESIRED_BRANCH"; then
                      git checkout -B "$DESIRED_BRANCH" "origin/$DESIRED_BRANCH" >/dev/null 2>&1 || true
                    fi
                  else
                    echo "⚠ WARNING: {{ .name }} remote branch $DESIRED_BRANCH not found; staying on $BRANCH"
                    WARNINGS=$((WARNINGS + 1))
                  fi
                  BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null || echo "DETACHED")
                  echo "[repo] {{ .name }}: now on branch $BRANCH"
                    else
                      echo "⚠ WARNING: {{ .name }} left on $BRANCH because the workspace is dirty (wanted $DESIRED_BRANCH)"
                      WARNINGS=$((WARNINGS + 1))
                    fi
                  fi
                fi

                # Check for unpushed commits
                UNPUSHED=$(git log @{upstream}..HEAD --oneline 2>/dev/null | wc -l || echo "0")
                if [ "$UNPUSHED" -gt 0 ] 2>/dev/null; then
                  echo "⚠ WARNING: {{ .name }} has $UNPUSHED unpushed commit(s)"
                  WARNINGS=$((WARNINGS + 1))
                fi

                cd /workspace
              else
                echo "[repo] {{ .name }}: cloning {{ .url }} (branch: {{ .branch | default "main" }})"
                mkdir -p "$(dirname "$REPO_DIR")"
                if git clone --branch {{ .branch | default "main" }} --single-branch {{ .url }} "$REPO_DIR"; then
                  echo "[repo] {{ .name }}: clone complete"
                else
                  echo "⚠ WARNING: {{ .name }} clone failed; continuing without local mirror"
                  WARNINGS=$((WARNINGS + 1))
                fi
              fi
              {{- end }}

              # ---------------------------------------------------------------
              # 7. Normalize ownership for the runtime user
              # ---------------------------------------------------------------
              RUNTIME_UID="$(id -u node 2>/dev/null || echo 1000)"
              RUNTIME_GID="$(id -g node 2>/dev/null || echo 1000)"
              chown -R "${RUNTIME_UID}:${RUNTIME_GID}" /workspace
              echo "[dirs] Workspace ownership normalized"

              # ---------------------------------------------------------------
              # Summary
              # ---------------------------------------------------------------
              echo ""
              if [ "$WARNINGS" -gt 0 ]; then
                echo "=== Init complete with $WARNINGS warning(s) — review above ==="
              else
                echo "=== Init complete for {{ .Values.agent.id }} — all clean ==="
              fi
          env:
            # Discord token
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.discordTokensSecret }}
                  key: {{ $discordConfig.tokenSecretKey | default .Values.agent.id }}
            # Provider API keys used when init renders openclaw.json via envsubst.
            {{- range $name, $provider := .Values.models.providers }}
            {{- if and (or (not (hasKey $provider "enabled")) $provider.enabled) $provider.apiKeySecretKey }}
            - name: PROVIDER_{{ $name | upper | replace "-" "_" }}_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.apiKeysSecret }}
                  key: {{ $provider.apiKeySecretKey }}
                  optional: true
            {{- end }}
            {{- end }}
            # Web tools API keys
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: brave-api-key
                  optional: true
            - name: FIRECRAWL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: firecrawl-api-key
                  optional: true
            # GitHub PAT for private repo cloning
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: github-pat
                  optional: true
            {{- if .Values.cloudProviders.bedrock.enabled }}
            # AWS Bedrock credentials (used by OpenClaw gateway + Claude Code CLI)
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: aws-access-key-id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: aws-secret-access-key
                  optional: true
            - name: AWS_REGION
              value: {{ .Values.cloudProviders.bedrock.region | quote }}
            {{- end }}
            {{- if .Values.cloudProviders.vertex.enabled }}
            # GCP Vertex AI credentials
            - name: CLOUD_ML_REGION
              value: {{ .Values.cloudProviders.vertex.region | quote }}
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.cloudProviders.vertex.projectId | quote }}
            {{- end }}
            {{- if .Values.cloudProviders.foundry.enabled }}
            # Microsoft Foundry credentials
            - name: ANTHROPIC_FOUNDRY_RESOURCE
              value: {{ .Values.cloudProviders.foundry.resource | quote }}
            - name: ANTHROPIC_FOUNDRY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: foundry-api-key
                  optional: true
            {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: config-template
              mountPath: /config-template
            - name: openclaw-skills-template
              mountPath: /openclaw-skills-template
            {{- if .Values.claudeCode.enabled }}
            - name: claude-settings-template
              mountPath: /claude-settings-template
            - name: claude-skills-template
              mountPath: /claude-skills-template
            {{- if .Values.claudeCode.mcp.servers }}
            - name: claude-mcp-template
              mountPath: /claude-mcp-template
            {{- end }}
            {{- end }}
            {{- if .Values.toolServer.url }}
            - name: cli-backend-configs-template
              mountPath: /cli-backend-configs-template
            {{- end }}
            {{- if .Values.toolsConfig }}
            - name: tools-config-template
              mountPath: /tools-config-template
            {{- end }}
            {{- if .Values.tools.acp.enabled }}
            - name: acpx-node-modules
              mountPath: /usr/local/share/npm-global/lib/node_modules/openclaw/extensions/acpx/node_modules
            {{- end }}
            {{- if .Values.nats.enabled }}
            - name: nats-plugin-template
              mountPath: /nats-plugin-template
            {{- end }}
        {{- if .Values.workspace.files }}
        - name: init-workspace-files
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          command:
            - /bin/sh
            - -c
            - |
              for src in /workspace-files-template/*; do
                [ -f "$src" ] || continue
                name="$(basename "$src")"
                dest="/workspace/$name"
                case "$name" in
                  AGENTS.md|HEARTBEAT.md|IDENTITY.md|SOUL.md|TOOLS.md)
                    cp "$src" "$dest" && echo "[workspace-files] Updated $dest"
                    ;;
                  *)
                    if [ ! -f "$dest" ]; then
                      cp "$src" "$dest" && echo "[workspace-files] Created $dest"
                    else
                      echo "[workspace-files] Skipped $dest (exists)"
                    fi
                    ;;
                esac
              done
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: workspace-files-template
              mountPath: /workspace-files-template
        {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              cd /workspace
              export HOME=/workspace
              export PATH="/workspace/.local/bin:/usr/local/share/npm-global/bin:/usr/local/bin:$PATH"
              export OPENCLAW_CONFIG=/workspace/.openclaw/openclaw.json
              if [ -f /workspace/.acpxrc.json.chart ]; then
                cp -f /workspace/.acpxrc.json.chart /workspace/.acpxrc.json 2>/dev/null || true
                chmod 644 /workspace/.acpxrc.json 2>/dev/null || true
              fi
              # Fix missing @buape/carbon peer dep in OpenClaw 2026.4.5 Discord UI
              node -e "require('@buape/carbon')" 2>/dev/null || {
                echo "[openclaw] Installing missing @buape/carbon dependency"
                npm install -g --no-audit --no-fund @buape/carbon 2>&1 | tail -2
              }
              exec openclaw gateway
          env:
            - name: HOME
              value: /workspace
            - name: TZ
              value: "UTC"
            - name: OPENCLAW_CONFIG
              value: /workspace/.openclaw/openclaw.json
            {{- if .Values.toolServer.url }}
            - name: TOOL_SERVER_URL
              value: {{ .Values.toolServer.url | quote }}
            {{- end }}
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_NO_RESPAWN
              value: "1"
            {{- if .Values.tools.acp.enabled }}
            - name: KIMI_SHARE_DIR
              value: /workspace/.kimi
            {{- end }}
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.discordTokensSecret }}
                  key: {{ $discordConfig.tokenSecretKey | default .Values.agent.id }}
                  optional: true
            # Provider API keys (available at runtime for dynamic use)
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: anthropic-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: openai-api-key
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: gemini-api-key
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: gemini-api-key
                  optional: true
            - name: PROVIDER_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: openai-api-key
                  optional: true
            - name: FACTORY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: factory-api-key
                  optional: true
            # Web tools API keys (Brave search + Firecrawl scraping)
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: brave-api-key
                  optional: true
            - name: FIRECRAWL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: firecrawl-api-key
                  optional: true
            {{- if .Values.claudeCode.enabled }}
            # Claude Code CLI settings path (settings.json with permissions + teams)
            - name: CLAUDE_CONFIG_DIR
              value: /workspace/.claude
            {{- if .Values.claudeCode.agentTeams.enabled }}
            # Enable Agent Teams experimental feature
            - name: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS
              value: "1"
            {{- end }}
            # Disable auto-updater (version pinned in Docker image)
            - name: DISABLE_AUTOUPDATER
              value: "1"
            {{- if .Values.claudeCode.disableTelemetry }}
            - name: DISABLE_TELEMETRY
              value: "1"
            {{- end }}
            {{- end }}
            {{- if .Values.toolsConfig }}
            # Tools config path for CLI backends
            - name: MCP_TOOLS_CONFIG
              value: /workspace/tools-config.json
            {{- end }}
            # GitHub PAT for git operations at runtime (push, pull, etc.)
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: github-pat
                  optional: true
            # 1Password CLI (headless via service account token)
            - name: OP_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: op-service-account-token
                  optional: true
            {{- if .Values.cloudProviders.bedrock.enabled }}
            # AWS Bedrock credentials (used by OpenClaw gateway + Claude Code CLI)
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: aws-access-key-id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: aws-secret-access-key
                  optional: true
            - name: AWS_REGION
              value: {{ .Values.cloudProviders.bedrock.region | quote }}
            {{- end }}
            {{- if .Values.cloudProviders.vertex.enabled }}
            # GCP Vertex AI credentials
            - name: CLOUD_ML_REGION
              value: {{ .Values.cloudProviders.vertex.region | quote }}
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.cloudProviders.vertex.projectId | quote }}
            {{- end }}
            {{- if .Values.cloudProviders.foundry.enabled }}
            # Microsoft Foundry credentials
            - name: ANTHROPIC_FOUNDRY_RESOURCE
              value: {{ .Values.cloudProviders.foundry.resource | quote }}
            - name: ANTHROPIC_FOUNDRY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiKeysSecret }}
                  key: foundry-api-key
                  optional: true
            {{- end }}
          ports:
            - name: gateway
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: /healthz
              port: gateway
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: gateway
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  HEALTH=$(curl -sf --max-time 3 http://localhost:{{ .Values.gateway.port }}/healthz 2>/dev/null) || exit 1
                  echo "$HEALTH" | grep -q '"ok":true' || exit 1
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            {{- if .Values.tools.acp.enabled }}
            - name: acpx-node-modules
              mountPath: /usr/local/share/npm-global/lib/node_modules/openclaw/extensions/acpx/node_modules
            {{- end }}
        {{- if .Values.kaniko.enabled }}
        - name: kaniko
          image: {{ .Values.kaniko.image }}
          command: ["/busybox/sleep", "infinity"]
          env:
            - name: DOCKER_CONFIG
              value: /kaniko/.docker
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: kaniko-docker-config
              mountPath: /kaniko/.docker
              readOnly: true
          resources:
            {{- toYaml .Values.kaniko.resources | nindent 12 }}
        {{- end }}
        {{- if .Values.telemetry.enabled }}
        - name: promtail
          image: {{ .Values.telemetry.promtail.image }}
          args:
            - -config.file=/etc/promtail/promtail.yaml
          volumeMounts:
            - name: workspace
              mountPath: /workspace
              readOnly: true
            - name: promtail-config
              mountPath: /etc/promtail
          resources:
            {{- toYaml .Values.telemetry.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "openclaw-agent.fullname" . }}-workspace
        - name: config-template
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-config
        - name: openclaw-skills-template
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-openclaw-skills
        {{- if .Values.workspace.files }}
        - name: workspace-files-template
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-workspace-files
        {{- end }}
        {{- if .Values.claudeCode.enabled }}
        - name: claude-settings-template
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-claude-settings
        - name: claude-skills-template
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-claude-skills
        {{- if .Values.claudeCode.mcp.servers }}
        - name: claude-mcp-template
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-claude-mcp
        {{- end }}
        {{- end }}
        {{- if .Values.toolServer.url }}
        - name: cli-backend-configs-template
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-cli-backend-configs
        {{- end }}
        {{- if .Values.toolsConfig }}
        - name: tools-config-template
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-tools-config
        {{- end }}
        {{- if .Values.tools.acp.enabled }}
        - name: acpx-node-modules
          emptyDir: {}
        {{- end }}
        {{- if .Values.nats.enabled }}
        - name: nats-plugin-template
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-nats-plugin
        {{- end }}
        {{- if .Values.kaniko.enabled }}
        - name: kaniko-docker-config
          secret:
            secretName: ghcr-secret
            items:
              - key: .dockerconfigjson
                path: config.json
        {{- end }}
        {{- if .Values.telemetry.enabled }}
        - name: promtail-config
          configMap:
            name: {{ include "openclaw-agent.fullname" . }}-promtail
        {{- end }}
