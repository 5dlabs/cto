{{- if .Values.toolServer.url }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw-agent.fullname" . }}-cli-backend-configs
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "openclaw-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: cli-configs
data:
  codex-config.toml: |
    model = "gpt-5.4-pro"
    approval_policy = "never"
    sandbox_mode = "danger-full-access"

    [mcp_servers.tool-server]
    command = "/workspace/.local/bin/tools"
    args = []
    cwd = "/workspace"

  gemini-settings.json: |
    {
      "model": {
        "name": "gemini-2.5-pro",
        "maxSessionTurns": -1,
        "fallback": "gemini-2.0-flash"
      },
      "general": {
        "defaultApprovalMode": "auto_edit",
        "enableAutoUpdate": false,
        "enableNotifications": false
      },
      "context": {
        "fileName": ["GEMINI.md", "AGENTS.md", "CLAUDE.md"]
      },
      "tools": {
        "useRipgrep": true
      },
      "security": {
        "disableYoloMode": false
      },
      "skills": {
        "enabled": true
      },
      "mcpServers": {
        "tool-server": {
          "command": "/workspace/.local/bin/tools",
          "args": [],
          "cwd": "/workspace",
          "trust": true,
          "timeout": 60000
        }
      }
    }

  opencode.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "autoupdate": false,
      "share": "manual",
      "model": "fireworks/kimi-k2-turbo",
      "provider": {
        "fireworks": {
          "npm": "@ai-sdk/openai-compatible",
          "name": "Fireworks AI (Kimi K2 Turbo)",
          "options": {
            "baseURL": "https://api.fireworks.ai/inference/v1",
            "apiKey": "{env:FIREWORKS_API_KEY}"
          },
          "models": {
            "kimi-k2-turbo": {
              "name": "Kimi K2 Turbo",
              "model": "accounts/fireworks/routers/kimi-k2p5-turbo"
            }
          }
        }
      },
      "mcp": {
        "tool-server": {
          "type": "local",
          "command": ["/workspace/.local/bin/tools"],
          "enabled": true
        }
      }
    }

  cursor-mcp.json: |
    {
      "mcpServers": {
        "tool-server": {
          "command": "/workspace/.local/bin/tools",
          "args": [],
          "cwd": "/workspace"
        }
      }
    }

  factory-mcp.json: |
    {
      "mcpServers": {
        "tool-server": {
          "type": "stdio",
          "command": "/workspace/.local/bin/tools",
          "args": [],
          "cwd": "/workspace"
        }
      }
    }

  copilot-config.json: |
    {
      "model": "claude-opus-4.6",
      "trustDirectories": ["/workspace"],
      "allowAllTools": true,
      "mcpServers": {
        "tool-server": {
          "command": "/workspace/.local/bin/tools",
          "args": [],
          "cwd": "/workspace"
        }
      }
    }
{{- end }}
