{{- if .Values.telemetry.enabled }}
# =============================================================================
# Promtail Sidecar Configuration
# =============================================================================
# Ships OpenClaw JSON-line logs from the workspace PVC to Loki.
# Log files are written by the OpenClaw gateway to the path configured
# in logging.file (values.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw-agent.fullname" . }}-promtail
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "openclaw-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: telemetry
data:
  promtail.yaml: |
    server:
      http_listen_port: 0
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: {{ .Values.telemetry.promtail.lokiUrl }}
    scrape_configs:
      - job_name: openclaw
        static_configs:
          - targets:
              - localhost
            labels:
              job: openclaw
              agent_id: {{ .Values.agent.id | quote }}
              namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
              __path__: {{ .Values.logging.file | dir }}/*.log
        pipeline_stages:
          - json:
              expressions:
                level: level
                timestamp: timestamp
          - labels:
              level:
          - timestamp:
              source: timestamp
              format: RFC3339Nano
{{- end }}
