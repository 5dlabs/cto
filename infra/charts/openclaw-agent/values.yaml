# =============================================================================
# OpenClaw Agent Helm Chart - Default Values
# =============================================================================
# Each agent is deployed as a separate Helm release via ArgoCD.
# Per-agent overrides are provided via inline values in the ArgoCD Application.

# -- Namespace for all resources
namespace: bots

# -- Create namespace (handled by ArgoCD syncOptions instead)
createNamespace: false

# -- Image configuration
# Uses the composable openclaw image which includes:
#   - Runtime base (tools, git, node, npm, gh, ripgrep)
#   - Claude Code CLI (COPY --from= ghcr.io/5dlabs/claude:latest)
#   - OpenClaw CLI (npm install)
#   - 1Password CLI (op)
image:
  repository: ghcr.io/5dlabs/openclaw
  tag: full
  pullPolicy: Always

# -- Image pull secrets
imagePullSecrets:
  - name: ghcr-secret

# -- Resource limits (sized for production base + DinD + Rust compilation)
resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "4000m"
    memory: "8Gi"

# -- Storage configuration
storage:
  storageClass: mayastor
  size: 20Gi

# =============================================================================
# Workspace Initialization
# =============================================================================
# Repos to clone into the agent's workspace on first boot.
# On subsequent restarts, the init container checks for dirty state
# (uncommitted changes, detached HEAD, etc.) and logs warnings instead
# of clobbering existing work.
workspace:
  repos: []
  # Example: clone the CTO repo for each agent
  # repos:
  #   - name: cto
  #     url: "https://github.com/5dlabs/cto.git"
  #     branch: "main"
  #     path: "repos/cto"   # relative to /workspace

# =============================================================================
# Agent Configuration
# =============================================================================
agent:
  # -- Unique agent identifier (e.g., "metal", "trader", "forge")
  id: ""
  # -- Display name (e.g., "Metal", "Trader", "Forge")
  name: ""
  # -- Primary model (must match provider/model-id exactly from models.providers)
  model: "anthropic/claude-opus-4-6-20260201"
  # -- Heartbeat interval
  heartbeat: "15m"
  # -- Sandbox mode
  sandbox: "off"
  # -- Allowed tool groups
  tools:
    allow:
      - "group:fs"
      - "group:runtime"
      - "group:web"
      - "browser"
      - "group:sessions"

# =============================================================================
# Discord Configuration
# =============================================================================
discord:
  enabled: true
  # -- Discord account ID (usually matches agent.id)
  accountId: ""
  # -- Key in the openclaw-discord-tokens Secret for this agent's token
  tokenSecretKey: ""
  # -- Group policy for this account
  groupPolicy: "allowlist"
  # -- Guild configuration
  guilds:
    # Wildcard guild (all servers)
    "*":
      requireMention: true
      # -- User IDs allowed to interact
      users:
        - "444519104808878090"
    # 5dlabs guild
    "1409006087331512342":
      requireMention: true
      slug: "5dlabs"
      channels:
        "1409006087969177735":
          allow: true
          requireMention: true
        "1445330230926381056":
          allow: true
          requireMention: true
        "1467540094490640529":
          allow: true
          requireMention: true
  # -- Allow bot interactions
  allowBots: true
  # -- DM configuration
  # policy: "allowlist" ensures only listed users can DM the bot.
  # OpenClaw's config migration may inject "pairing" policy which silently
  # drops messages — always set explicitly.
  dm:
    policy: "allowlist"
    allowFrom:
      - "444519104808878090"

# =============================================================================
# Logging Configuration
# =============================================================================
# Controls OpenClaw gateway log verbosity.
# Levels: error, warn, info, verbose, debug
logging:
  level: "verbose"

# =============================================================================
# Model Providers
# =============================================================================
# API keys are injected via environment variables from ExternalSecrets
models:
  providers:
    anthropic:
      baseUrl: "https://api.anthropic.com"
      models:
        - id: "claude-3-5-haiku-latest"
          name: "claude-3-5-haiku-latest"
        - id: "claude-sonnet-4-20250514"
          name: "claude-sonnet-4-20250514"
        - id: "claude-opus-4-20250514"
          name: "claude-opus-4-20250514"
        - id: "claude-opus-4-6-20260201"
          name: "claude-opus-4-6-20260201"
    minimax:
      baseUrl: "https://api.minimax.io/anthropic"
      models:
        - id: "MiniMax-M2.1"
          name: "MiniMax-M2.1"
    nvidia-nim:
      baseUrl: "https://integrate.api.nvidia.com/v1"
      models:
        - id: "moonshotai/kimi-k2-instruct"
          name: "moonshotai/kimi-k2-instruct"
    openai:
      baseUrl: "https://api.openai.com/v1"
      models:
        - id: "text-embedding-3-small"
          name: "text-embedding-3-small"

# =============================================================================
# Agent Defaults (global across all agents)
# =============================================================================
agentDefaults:
  compaction:
    mode: "safeguard"
    reserveTokensFloor: 25000
    memoryFlush:
      enabled: true
      softThresholdTokens: 6000
  contextPruning:
    mode: "cache-ttl"
    ttl: "1h"
  elevatedDefault: "full"
  maxConcurrent: 4
  heartbeat:
    every: "15m"
    prompt: >-
      Read HEARTBEAT.md if it exists. Follow it strictly.
      AUTONOMY: When you have clear work to do, execute it.
      Don't ask for permission to sequence tasks - determine logical priority
      (dependencies, urgency, complexity) and proceed.
      Ask only when genuinely blocked or when a decision requires user preferences
      you cannot infer. Report results, not 'what should I do next?'.
      Reply HEARTBEAT_OK only if nothing needs attention.

# =============================================================================
# Memory Search Configuration
# =============================================================================
memorySearch:
  model: "text-embedding-3-small"
  provider: "openai"
  sources:
    - "memory"
    - "sessions"
  cache:
    enabled: true
    maxEntries: 50000
  hybrid:
    enabled: true
    textWeight: 0.3
    vectorWeight: 0.7
    candidateMultiplier: 4
  sessionMemory: true
  sync:
    watch: true
    deltaBytes: 50000
    deltaMessages: 25

# =============================================================================
# Session Configuration
# =============================================================================
session:
  dmScope: "per-channel-peer"
  reset:
    mode: "daily"
    atHour: 4
    idleMinutes: 240
  resetByType:
    dm:
      mode: "idle"
      idleMinutes: 480
    group:
      mode: "idle"
      idleMinutes: 240
    thread:
      mode: "daily"
      atHour: 4
  agentToAgent:
    maxPingPongTurns: 5

# =============================================================================
# Gateway Configuration (adapted for Kubernetes)
# =============================================================================
gateway:
  bind: "loopback"
  port: 18789
  # In Kubernetes, gateway runs locally inside the pod (no remote SSH)
  mode: "local"
  # Auth token for the gateway (set via OPENCLAW_GATEWAY_TOKEN env var)
  # For loopback-only gateways this is a simple static token.
  token: "openclaw-k8s-gateway"

# =============================================================================
# Model Fallback Configuration
# =============================================================================
modelDefaults:
  primary: "anthropic/claude-opus-4-6-20260201"
  fallbacks:
    - "minimax/MiniMax-M2.1"
    - "nvidia-nim/moonshotai/kimi-k2-instruct"
    - "anthropic/claude-3-5-haiku-latest"

# =============================================================================
# Tools Configuration (Linux-adapted, no macOS paths)
# =============================================================================
tools:
  profile: "coding"
  agentToAgent:
    enabled: true
  elevated:
    enabled: true
  exec:
    # Linux paths only - no macOS /opt/homebrew or /Users paths
    pathPrepend:
      - "/usr/local/bin"
  # Note: OpenClaw does not support mcpServers natively in its config.
  # External tools (OpenMemory, etc.) are accessed via the `tools` binary
  # on the PATH, which proxies MCP calls through the CTO tool server.

  # -- CTO tools server configuration (for the `tools` MCP client binary)
  # The `tools` binary connects to this HTTP endpoint for remote MCP tools,
  # then uses clientConfig for filtering which tools to expose.
  serverUrl: "http://cto-tools.cto.svc.cluster.local:3000/mcp"

  # -- Client-side tool configuration (rendered to client-config.json)
  # Controls which remote tools the `tools` binary exposes and any local
  # MCP servers to spawn. Based on config.rs ClientConfig struct.
  # If remoteTools is empty, ALL remote tools are exposed (no filtering).
  clientConfig:
    # Remote tools to whitelist from the CTO tool server.
    # Supports wildcard patterns: "mcp_tools_firecrawl_*"
    # Empty list = expose ALL remote tools (no filtering)
    remoteTools: []
    # Example: only expose Firecrawl, OpenMemory, and Context7
    # remoteTools:
    #   - "user_firecrawl_*"
    #   - "user_openmemory_*"
    #   - "user_context7_*"
    #   - "user_tools_*"

    # Local MCP servers to spawn alongside remote tools
    localServers: {}
    # Example: spawn a local OpenMemory server
    # localServers:
    #   openmemory:
    #     command: "npx"
    #     args: ["-y", "@openmemory/mcp-server"]
    #     tools: ["openmemory_*"]
    #     env:
    #       OPENMEMORY_API_KEY: "${OPENMEMORY_API_KEY}"

    # Maximum concurrent MCP server connections (LRU eviction)
    maxConnections: 10

# =============================================================================
# Claude Code CLI Configuration
# =============================================================================
# Controls the Claude Code CLI sessions invoked by OpenClaw agents via `exec`.
# Two separate ConfigMaps are generated:
#   1. claude-settings → settings.json (permissions, agent teams, telemetry)
#   2. claude-mcp      → .claude.json  (MCP server connections for coding tasks)
#
# These are DISTINCT from the OpenClaw gateway's own tool/MCP configuration
# defined in the main configmap.yaml (openclaw.json).
claudeCode:
  # -- Enable Claude Code CLI integration
  enabled: true
  # -- Pinned version installed in the Docker image (set via Dockerfile ARG)
  # This is informational only; the actual version is baked into the image.
  version: "2.1.32"

  # -- Model for Claude Code CLI sessions (alias works, e.g. "claude-opus-4-6")
  model: "claude-opus-4-6"
  # -- Model for sub-agents spawned by Claude Code (Agent Teams teammates)
  subagentModel: "claude-sonnet-4-5"

  # -- Effort level for adaptive thinking (Opus 4.6 only)
  # Controls how deeply Claude reasons: low | medium | high (default) | max
  # "max" = no constraints on thinking depth (most intelligent, most tokens)
  effortLevel: "high"

  # -- Permission settings for Claude Code CLI sessions
  permissions:
    # bypassPermissions = fully autonomous, no confirmation prompts
    defaultMode: "bypassPermissions"
    allow:
      - "Bash"
      - "Read"
      - "Edit"
      - "Write"
      - "WebFetch"
      - "WebSearch"
      - "Task"

  # -- Agent Teams (parallel sub-agent orchestration within Claude Code)
  agentTeams:
    enabled: true
    # in-process = sub-agents run within the same Node.js process (K8s-safe)
    # Agent-to-agent communication between separate Pods happens over Discord
    teammateMode: "in-process"

  # -- Disable co-authored-by commit attribution
  includeCoAuthoredBy: false

  # -- Disable telemetry in Claude Code CLI
  disableTelemetry: true

  # -- MCP servers available to Claude Code CLI sessions
  # These are the tools that the Claude Code coding agent can use when
  # invoked by an OpenClaw agent. Separate from OpenClaw's own tools.
  # The `tools` binary requires two positional args: <TOOLS_URL> <WORKSPACE>
  mcp:
    servers:
      # CTO tool server — proxies all MCP tools (OpenMemory, Firecrawl, etc.)
      # The `tools` binary is the standard MCP client for the CTO platform.
      # It reads MCP_CLIENT_CONFIG for tool filtering, then proxies calls
      # to the remote tool server and any configured local MCP servers.
      tools:
        command: "tools"
        args:
          - "http://cto-tools.cto.svc.cluster.local:3000/mcp"
          - "/workspace"

  # -- Plugins loaded into Claude Code CLI sessions
  # Each plugin is mounted as a ConfigMap and loaded via --plugin-dir
  # Plugins can contain skills/, agents/, hooks/, and .mcp.json
  plugins: []
  # Example:
  # plugins:
  #   - name: "coding-standards"
  #     configMap: "openclaw-claude-plugin-coding-standards"

# =============================================================================
# Secrets Configuration
# =============================================================================
secrets:
  # -- Name of the Secret containing Discord bot tokens (one key per agent)
  discordTokensSecret: "openclaw-discord-tokens"
  # -- Name of the Secret containing shared API keys (Anthropic, OpenAI, etc.)
  apiKeysSecret: "openclaw-api-keys"

# =============================================================================
# Docker-in-Docker Configuration
# =============================================================================
# Enables Docker build capability inside agent pods via a DinD sidecar.
# When enabled, agents can build and push container images to GHCR.
docker:
  enabled: true
  dind:
    enabled: true
    image: docker:dind
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 1Gi
  buildkit:
    enabled: true
    host: "tcp://buildkit.buildkit.svc.cluster.local:1234"
  # GHCR credentials (uses ghcr-secret already synced to bots namespace)
  ghcr:
    secretName: ghcr-secret

# =============================================================================
# Probes
# =============================================================================
probes:
  # OpenClaw gateway exposes a health endpoint
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 5
  readiness:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
