---
# =============================================================================
# CTO Platform - Unified Configuration
# =============================================================================
# Single chart for all CTO platform components:
# - Controller: Agent orchestration and CodeRun management
# - PM: Project management integrations (Linear)
# - Tools: MCP server proxy
# - Healer: Self-healing platform monitor
# - OpenMemory: Long-term AI agent memory
# - Sensors: Argo Event sensors for automation
# - Webhooks: GitHub webhook event handling

# Global configuration shared across all components
global:
  namespace: cto
  createNamespace: true
  imagePullSecrets:
    - name: ghcr-secret
  # Storage class for PVCs
  storageClass: mayastor

  # ==========================================================================
  # Dev Registry - Toggle between GHCR and local in-cluster registry
  # ==========================================================================
  # Enable this to use images from a local registry instead of GHCR.
  # Useful for fast iteration during development without pushing to GHCR.
  #
  # Setup: ./scripts/dev-load.sh --setup
  # Build: ./scripts/dev-load.sh controller
  # Toggle: helm upgrade cto ./infra/charts/cto --set global.devRegistry.enabled=true
  #
  devRegistry:
    # Set to true to use local in-cluster registry images
    enabled: false
    # URL of the local registry (node-ip:nodeport)
    # Get this from: kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}'
    url: "192.168.1.77:30500"
    # Tag for dev images (matches Tilt build tags)
    tag: "tilt-dev"
    # Pull policy for dev images (use Always to get latest pushes)
    pullPolicy: Always
    # Override specific components (leave empty to use defaults)
    # Example: { controller: "my-custom-tag", tools: "feature-branch" }
    componentTags: {}

# =============================================================================
# Datadog - Service tags and log annotations for intake-critical workloads
# =============================================================================
datadog:
  enabled: false
  tags:
    env: production

# =============================================================================
# Secrets - External Secrets Operator Configuration
# =============================================================================
# NOTE: ExternalSecrets are managed by the external-secrets-config ArgoCD application
# located at infra/gitops/manifests/external-secrets/cto-secrets.yaml
# This Helm chart no longer generates ExternalSecrets to avoid SharedResourceWarnings.
# The values below are kept for reference only.
secrets:
  enabled: false  # Disabled - managed by external-secrets-config app
  refreshInterval: "1h"

  # Secret store reference (ClusterSecretStore or SecretStore)
  secretStore:
    name: openbao
    kind: ClusterSecretStore

  # GHCR Docker registry credentials
  ghcr:
    enabled: true
    baoKey: ghcr-secret

  # GitHub App credentials for each agent
  # Each agent has its own GitHub App for repository access
  githubApps:
    - name: morgan
      baoKey: github-app-morgan
      includeClientSecret: true  # Morgan needs client secret for OAuth
    - name: rex
      baoKey: github-app-rex
    - name: blaze
      baoKey: github-app-blaze
    - name: bolt
      baoKey: github-app-bolt
    - name: cleo
      baoKey: github-app-cleo
    - name: tess
      baoKey: github-app-tess
    - name: atlas
      baoKey: github-app-atlas
    - name: cipher
      baoKey: github-app-cipher
    - name: spark
      baoKey: github-app-spark
    - name: grizz
      baoKey: github-app-grizz
    - name: nova
      baoKey: github-app-nova
    - name: tap
      baoKey: github-app-tap
    - name: stitch
      baoKey: github-app-stitch
    - name: vex
      baoKey: github-app-vex
    - name: angie
      baoKey: github-app-angie
    - name: pixel
      baoKey: github-app-pixel

  # API keys for agent CLIs (used by Argo Workflow pods)
  agentPlatformKeys:
    - key: ANTHROPIC_API_KEY
      baoKey: api-keys
    - key: OPENAI_API_KEY
      baoKey: api-keys
    - key: GEMINI_API_KEY
      baoKey: api-keys
    - key: GOOGLE_API_KEY
      baoKey: api-keys
    - key: CURSOR_API_KEY
      baoKey: api-keys
    - key: CONTEXT7_API_KEY
      baoKey: api-keys
    - key: PERPLEXITY_API_KEY
      baoKey: api-keys
    - key: XAI_API_KEY
      baoKey: api-keys
    - key: FACTORY_API_KEY
      baoKey: api-keys
    - key: BRAVE_API_KEY
      baoKey: api-keys
    - key: MINIMAX_API_KEY
      baoKey: api-keys
    - key: MINIMAX_GROUP_ID
      baoKey: api-keys

  # Core platform API keys (cto-secrets)
  ctoKeys:
    - key: ANTHROPIC_API_KEY
      baoKey: api-keys
    - key: OPENAI_API_KEY
      baoKey: api-keys
    - key: GEMINI_API_KEY
      baoKey: api-keys
    - key: GOOGLE_API_KEY
      baoKey: api-keys
    - key: CURSOR_API_KEY
      baoKey: api-keys
    - key: CONTEXT7_API_KEY
      baoKey: api-keys
    - key: PERPLEXITY_API_KEY
      baoKey: api-keys
    - key: XAI_API_KEY
      baoKey: api-keys
    - key: FACTORY_API_KEY
      baoKey: api-keys
    - key: MINIMAX_API_KEY
      baoKey: api-keys
    - key: MINIMAX_GROUP_ID
      baoKey: api-keys

  # Linear integration secrets
  linear:
    enabled: true
    keys:
      - key: LINEAR_API_KEY
        baoKey: linear-sync
      - key: LINEAR_CLIENT_ID
        baoKey: linear-sync
      - key: LINEAR_CLIENT_SECRET
        baoKey: linear-sync
      - key: LINEAR_OAUTH_TOKEN
        baoKey: linear-sync
      - key: LINEAR_WEBHOOK_SECRET
        baoKey: linear-sync

  # Tools MCP server secrets
  tools:
    github:
      enabled: true
      baoKey: tools-github
    firecrawl:
      enabled: true
      baoKey: tools-firecrawl
    kubernetes:
      enabled: true
      baoKey: tools-kubernetes
    kubernetesFra:
      enabled: true
      baoKey: tools-kubernetes-fra
      # Keys: KUBECONFIG (Frankfurt cluster - cto-fra)
    appstoreConnect:
      enabled: true
      baoKey: tools-appstore-connect
      # Keys: APP_STORE_KEY_ID, APP_STORE_ISSUER_ID, APP_STORE_P8_KEY (base64 encoded .p8)
    latitude:
      enabled: true
      baoKey: tools-latitude
      # Keys: LATITUDE_API_KEY

  # Research pipeline secrets
  research:
    twitter:
      enabled: true
      baoKey: research-twitter
    digest:
      enabled: true
      baoKey: research-digest

# =============================================================================
# Controller - Agent Orchestration
# =============================================================================
controller:
  enabled: true
  replicaCount: 1

  image:
    repository: registry.5dlabs.ai/5dlabs/controller
    pullPolicy: Always
    tag: "main"

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  resources:
    limits:
      cpu: 1000m
      memory: 8Gi
    requests:
      cpu: 500m
      memory: 1Gi

  # Argo workflow templates (archived - replaced with new orchestration)
  argo:
    enabled: false

  # Template version - bump to force pod restart
  templatesVersion: "v1.1.0"

  config:
    kubernetesNamespace: "cto"
    serverHost: "0.0.0.0"
    serverPort: "8080"
    rustLog: "debug"

  # Skills cache PVC for downloaded skill tarballs
  skillsCache:
    enabled: false
    storageSize: 1Gi
    storageClassName: ""

  # Linear sidecar configuration (whip cracking enabled)
  linear:
    sidecarImage: registry.5dlabs.ai/5dlabs/linear-sidecar:dev
    serviceUrl: http://pm-server:8080

# =============================================================================
# Agent Configuration - CodeRun/Workflow Defaults
# =============================================================================
agent:
  image:
    repository: registry.5dlabs.ai/5dlabs/agents
    tag: latest
  serviceAccountName: "cto-agent"
  # Single unified image with all CLIs installed (claude, codex, cursor, gemini, factory, opencode, openclaw)
  cliImages:
    claude:
      repository: registry.5dlabs.ai/5dlabs/agents
      tag: latest
    cursor:
      repository: registry.5dlabs.ai/5dlabs/agents
      tag: latest
    codex:
      repository: registry.5dlabs.ai/5dlabs/agents
      tag: latest
    code:
      repository: registry.5dlabs.ai/5dlabs/agents
      tag: latest
    gemini:
      repository: registry.5dlabs.ai/5dlabs/agents
      tag: latest
    factory:
      repository: registry.5dlabs.ai/5dlabs/agents
      tag: latest
    opencode:
      repository: registry.5dlabs.ai/5dlabs/agents
      tag: latest
    research:
      repository: registry.5dlabs.ai/5dlabs/agents
      tag: latest
    grok:
      repository: registry.5dlabs.ai/5dlabs/agents
      tag: latest
  cliProviders: {}
  agentCliConfigs: {}
  inputBridge:
    enabled: false
    image:
      repository: ""
      tag: ""
    port: 8080

# =============================================================================
# PM Server - Project Management
# =============================================================================
pm:
  enabled: true
  replicaCount: 1

  image:
    repository: registry.5dlabs.ai/5dlabs/pm-server
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 8081

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # PM provider configuration
  provider: linear
  maxTimestampAgeMs: 60000

  # Linear integration
  linear:
    enabled: true
    # Linear team ID for intake setup (e.g., "CTOPA" for CTO Platform team)
    teamId: "CTOPA"

  # GitHub configuration
  github:
    defaultOrg: "5dlabs"
    webhookCallbackUrl: "https://pm.5dlabs.ai/webhooks/github"

  # Intake workflow configuration
  intake:
    # CLI to use for intake - image is resolved from agent.cliImages[cli]
    # Options: claude, cursor, codex, gemini, opencode, factory, dexter, research
    cli: claude
    # Model configuration for intake workflows
    # Using Opus 4.5 with extended thinking for complex task generation
    models:
      # Primary model for task generation (PRD → tasks)
      primary: "claude-opus-4-6-20260205"
      primaryProvider: "anthropic"
      # Research model for analysis and context enrichment
      research: "claude-opus-4-6-20260205"
      researchProvider: "anthropic"
      # Docs model for documentation generation
      docs: "claude-opus-4-6-20260205"
      docsProvider: "anthropic"
      # Fallback model if primary fails
      fallback: "claude-opus-4-6-20260205"
      fallbackProvider: "anthropic"

  # Secrets
  secrets:
    secretName: linear-secrets

# =============================================================================
# Tools Server - MCP Proxy
# =============================================================================
tools:
  enabled: true
  replicaCount: 1

  image:
    repository: registry.5dlabs.ai/5dlabs/tools
    pullPolicy: Always
    tag: "latest"

  service:
    type: NodePort
    port: 3000
    nodePort: 30300

  resources:
    limits:
      cpu: 1000m
      memory: 4Gi
    requests:
      cpu: 200m
      memory: 1Gi

  persistence:
    enabled: true
    size: 10Gi

  # Ingress configuration for external access
  ingress:
    enabled: true
    className: nginx
    annotations: {}
    hosts:
      - host: tools.platform.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  rbac:
    create: true
    clusterWide: true

  # MCP Server Configuration
  config:
    # Secret references for API keys
    secrets:
      context7: "tools-context7-secrets"
      github: "tools-github-secrets"

    # MCP Servers - proxied through tools service
    servers:
      # --- Memory & Context ---
      # openmemory: replaced by Mem0 plugin + Qdrant (openclaw-mem0 handles memory natively)

      context7:
        name: "Context7"
        description: "Up-to-date library documentation and code examples"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@upstash/context7-mcp"]
        workingDirectory: "/tmp"
        env:
          CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"

      prompts:
        name: "MCP Prompts"
        description: "Prompt management, versioning, and templates for LLM applications with cognitive architecture"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@sparesparrow/mcp-prompts"]
        workingDirectory: "/tmp"

      # courses: removed - git clone is not an MCP server, it exits immediately

      # --- Infrastructure ---
      docker:
        name: "Docker"
        description: "Docker container management"
        transport: "stdio"
        command: "docker"
        args: ["run", "-i", "--rm", "-v", "/var/run/docker.sock:/var/run/docker.sock", "mcp/docker"]
        workingDirectory: "/tmp"

      # kubernetes: removed - duplicate of kubernetes-mcp, caused prefix conflicts

      kubernetes-mcp:
        name: "Kubernetes MCP"
        description: "Native Go Kubernetes MCP server with direct API access - pods, deployments, services, logs, and Helm operations"
        transport: "stdio"
        command: "npx"
        args: ["-y", "kubernetes-mcp-server@latest"]
        workingDirectory: "/tmp"

      terraform:
        name: "Terraform"
        description: "Terraform Registry API integration"
        transport: "stdio"
        command: "docker"
        args: ["run", "-i", "--rm", "hashicorp/terraform-mcp-server"]
        workingDirectory: "/tmp"

      # --- Development Tools ---
      github:
        name: "GitHub"
        description: "GitHub API operations for repositories, issues, and pull requests"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@modelcontextprotocol/server-github"]
        workingDirectory: "/tmp"
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"

      # --- UI Components ---
      shadcn:
        name: "shadcn/ui"
        description: "Modern React UI component library - browse, search, and get component source code"
        transport: "stdio"
        command: "npx"
        args: ["-y", "shadcn@5.3.0", "mcp"]
        workingDirectory: "/tmp"

      ai-elements:
        name: "AI Elements"
        description: "AI-native UI component library for chat interfaces and streaming UIs"
        transport: "http"
        url: "https://registry.ai-sdk.dev/api/mcp"

      better-auth:
        name: "Better Auth"
        description: "TypeScript authentication patterns - email/password, OAuth, 2FA, passkeys, organizations, sessions, and API keys"
        transport: "http"
        url: "https://mcp.chonkie.ai/better-auth/better-auth-builder/mcp"

      # --- Browser Automation ---
      playwright:
        name: "Playwright Browser"
        description: "Headless browser automation for visual testing - navigate, interact, screenshot"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@playwright/mcp@latest"]
        workingDirectory: "/tmp"
        env:
          PLAYWRIGHT_OUTPUT_DIR: "/tmp/playwright-output"

      # --- Database ---
      pg-aiguide:
        name: "PostgreSQL AI Guide"
        description: "AI-optimized PostgreSQL expertise with semantic search over official docs"
        transport: "http"
        url: "https://mcp.tigerdata.com/docs"
        workingDirectory: "/tmp"

      # --- Blockchain ---
      solana:
        name: "Solana"
        description: "Solana blockchain development tools"
        transport: "http"
        url: "https://mcp.solana.com/mcp"
        workingDirectory: "/tmp"

      # --- Web Search ---
      exa-mcp:
        name: "Exa"
        description: "AI-powered web search, code search, and company research with clean content extraction"
        transport: "http"
        url: "https://mcp.exa.ai/mcp"

      # --- Web Scraping ---
      # firecrawl: removed - broken zod dependencies, no working npm package
      # tavily is available below for web scraping needs

      # --- Codebase Analysis ---
      repomix:
        name: "Repomix"
        description: "Pack codebases into context-optimized formats for LLM analysis - pack remote repos, search and read packed output"
        transport: "stdio"
        command: "npx"
        args: ["-y", "repomix@latest", "--mcp"]
        workingDirectory: "/tmp"

      octocode:
        name: "Octocode"
        description: "GitHub code search and analysis - search repositories, extract context, analyze PRs with token optimization"
        transport: "stdio"
        command: "npx"
        args: ["-y", "octocode-mcp@latest"]
        workingDirectory: "/tmp"
        env:
          GITHUB_TOKEN: "${GITHUB_TOKEN}"

      # --- Project Management ---
      linear:
        name: "Linear"
        description: "Linear issue tracking - full API coverage for issues, projects, milestones, cycles, and more"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@calltelemetry/linear-mcp"]
        workingDirectory: "/tmp"
        env:
          LINEAR_API_KEY: "${LINEAR_API_KEY}"

      # --- Observability ---
      grafana:
        name: "Grafana"
        description: "Grafana dashboards, alerts, Prometheus/Loki queries, and incident management"
        transport: "stdio"
        command: "docker"
        args: ["run", "-i", "--rm", "-e", "GRAFANA_URL", "-e", "GRAFANA_SERVICE_ACCOUNT_TOKEN", "mcp/grafana", "-t", "stdio"]
        workingDirectory: "/tmp"
        env:
          GRAFANA_URL: "${GRAFANA_URL:-http://grafana.observability.svc:80}"
          GRAFANA_SERVICE_ACCOUNT_TOKEN: "${GRAFANA_SERVICE_ACCOUNT_TOKEN}"

      loki:
        name: "Loki"
        description: "Query and analyze Grafana Loki logs with LogQL"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@elad12390/loki-mcp"]
        workingDirectory: "/tmp"
        env:
          LOKI_URL: "${LOKI_URL:-http://loki.observability.svc:3100}"

      prometheus:
        name: "Prometheus"
        description: "Query and analyze Prometheus metrics with PromQL"
        transport: "stdio"
        command: "docker"
        args: ["run", "-i", "--rm", "-e", "PROMETHEUS_URL", "ghcr.io/pab1it0/prometheus-mcp-server:latest"]
        workingDirectory: "/tmp"
        env:
          PROMETHEUS_URL: "${PROMETHEUS_URL:-http://prometheus.observability.svc:9090}"

      # --- Edge & CDN ---
      cloudflare:
        name: "Cloudflare"
        description: "Cloudflare Workers, DNS, security, and edge computing management"
        transport: "http"
        url: "https://bindings.mcp.cloudflare.com/mcp"
        workingDirectory: "/tmp"
        headers:
          # Token is loaded from cto-secrets and substituted at runtime by add_custom_headers()
          Authorization: "Bearer ${CLOUDFLARE_API_TOKEN}"

      # --- AI Generation ---
      # minimax: removed - internal/private npm package not available publicly
      # exa-mcp and tavily are available for web search and research needs

      # --- Web Search & Research ---
      modelcontextprotocol:
        name: "Perplexity"
        description: "Perplexity AI web search, research, and reasoning - real-time search, deep research with sonar-deep-research, and advanced reasoning with sonar-reasoning-pro"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@perplexity-ai/mcp-server"]
        workingDirectory: "/tmp"
        env:
          PERPLEXITY_API_KEY: "${PERPLEXITY_API_KEY}"

      tavily:
        name: "Tavily"
        description: "Tavily AI search engine - optimized for AI agents with focused, reliable web search and content extraction"
        transport: "stdio"
        command: "npx"
        args: ["-y", "tavily-mcp@latest"]
        workingDirectory: "/tmp"
        env:
          TAVILY_API_KEY: "${TAVILY_API_KEY}"

      # --- Bare Metal Cloud ---
      latitudesh:
        name: "Latitude.sh"
        description: "Latitude.sh bare metal cloud - manage servers, plans, regions, VLANs, API keys, and billing"
        transport: "stdio"
        command: "npx"
        args: ["-y", "latitudesh", "start", "--bearer", "${LATITUDE_API_KEY}"]
        workingDirectory: "/tmp"
        env:
          LATITUDE_API_KEY: "${LATITUDE_API_KEY}"

      # xcodebuild: removed - doesn't work on Ubuntu/Linux servers

      # appstore-connect: removed - wrong npm package name, no public package available

      # --- Database ---
      # mongodb: removed - broken ESM dependencies, no working npm package
      # postgres:
      #   name: "PostgreSQL"
      #   description: "Comprehensive PostgreSQL database management - queries, mutations, schema management, and performance analysis"
      #   transport: "stdio"
      #   command: "npx"
      #   args: ["-y", "@henkey/postgres-mcp-server", "--connection-string", "${POSTGRES_URL}"]
      #   workingDirectory: "/tmp"
      #   env:
      #     POSTGRES_URL: "${POSTGRES_URL:-postgresql://localhost:5432/postgres}"

      # --- GitOps & CI/CD ---
      argocd:
        name: "ArgoCD"
        description: "ArgoCD GitOps management - applications, sync, resources, and deployment operations"
        transport: "stdio"
        command: "npx"
        args: ["-y", "argocd-mcp@latest", "stdio"]
        workingDirectory: "/tmp"
        env:
          ARGOCD_BASE_URL: "${ARGOCD_BASE_URL:-https://argocd.platform.local}"
          ARGOCD_API_TOKEN: "${ARGOCD_API_TOKEN}"


      # --- Cloud Storage ---
      s3:
        name: "S3 Storage"
        description: "S3-compatible storage - list buckets, list objects, get objects (supports AWS S3 and SeaweedFS)"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@geunoh/s3-mcp-server", "--region", "${AWS_REGION}", "--bucket", "${S3_BUCKET}"]
        workingDirectory: "/tmp"
        env:
          AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
          AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
          AWS_REGION: "${AWS_REGION:-us-east-1}"
          S3_BUCKET_NAME: "${S3_BUCKET:-default}"

      # --- API Protocols ---
      graphql:
        name: "GraphQL"
        description: "GraphQL API interaction - schema introspection and query execution"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@iflow-mcp/mcp-graphql"]
        workingDirectory: "/tmp"
        env:
          ENDPOINT: "${GRAPHQL_ENDPOINT:-http://localhost:4000/graphql}"
          ALLOW_MUTATIONS: "${GRAPHQL_ALLOW_MUTATIONS:-false}"

      # --- Message Queues ---
      kafka:
        name: "Kafka (Confluent)"
        description: "Confluent Kafka and Confluent Cloud - produce, consume, and manage topics"
        transport: "stdio"
        command: "npx"
        args: ["-y", "@mseep/mcp-confluent"]
        workingDirectory: "/tmp"
        env:
          CONFLUENT_CLOUD_API_KEY: "${CONFLUENT_CLOUD_API_KEY}"
          CONFLUENT_CLOUD_API_SECRET: "${CONFLUENT_CLOUD_API_SECRET}"

      # --- Local Servers (run in agent containers, not proxied) ---
      # rust-tools: removed - requires cursor-rust-tools binary which is only available locally
      # Re-enable when a proper npm package or Docker image is available

# =============================================================================
# Healer - Self-Healing Monitor
# =============================================================================
healer:
  enabled: true
  replicaCount: 0

  image:
    repository: registry.5dlabs.ai/5dlabs/healer
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 80

  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 256Mi

  config:
    # CI Remediation config
    cli: "claude"
    model: "claude-opus-4-6-20260205"
    maxAttempts: 3
    # Time window for deduplication (increased from 10 to 30 mins to prevent rapid re-spawning)
    timeWindowMins: 30
    memoryUrl: ""  # Replaced by Mem0 plugin (no separate memory service needed)
    memoryEnabled: false
    # Auto-merge: merge PRs automatically after CI checks pass
    autoMergeEnabled: true
    # Merge method: squash, merge, or rebase
    mergeMethod: "squash"
    # Maximum time to wait for CI checks before giving up (minutes)
    checkTimeoutMins: 30
    # Circuit breaker to prevent spawning when failures are high
    circuitBreaker:
      enabled: true
      # Number of failed CodeRuns before circuit opens
      failureThreshold: 5
      # Time window to count failures (minutes)
      windowMins: 30
      # Base backoff time for failed branches (minutes), doubles with each retry
      backoffBaseMins: 5
    # Maximum concurrent healer CodeRuns allowed
    maxConcurrentCodeRuns: 5
    # Server config for healer's inline Factory usage (alert analysis/triage)
    server:
      model: "claude-opus-4-6-20260205"
      autoLevel: "high"
      outputFormat: "text"
      remoteTools:
        - "mcp_tools_kubernetes_*"
        - "mcp_tools_argocd_*"
        - "mcp_tools_grafana_*"
      memory:
        enabled: true
        agentName: "healer-server"
        sessionPrefix: "heal-session"
        retrieveOnStart: true
        persistOnComplete: true
    # CodeRun config for spawning remediation agents
    coderun:
      namespace: "cto"
      githubApp: "5DLabs-Rex"
      model: "claude-opus-4-6-20260205"
      repositoryUrl: "https://gitlab.5dlabs.ai/5dlabs/cto"
      docsRepositoryUrl: "https://gitlab.5dlabs.ai/5dlabs/cto"
      docsProjectDirectory: "docs"
      docsBranch: "main"
      workingDirectory: "."
      service: "heal"
      runType: "implementation"
      enableDocker: true
      remoteTools:
        - "mcp_tools_github_*"
        - "mcp_tools_kubernetes_*"
        - "mcp_tools_argocd_*"
        - "mcp_tools_cto_*"
        - "mcp_tools_context7_*"
        - "mcp_tools_firecrawl_*"
        - "mcp_tools_grafana_*"
      localTools: []
      cliConfig:
        cliType: "claude"
        model: "claude-opus-4-6-20260205"
        settings:
          template: "heal/claude"
      memory:
        enabled: true
        agentName: "healer-remediation"
        sessionPrefix: "heal-remediation"
        retrieveOnStart: true
        persistOnComplete: true

  persistence:
    enabled: true
    size: 10Gi

  filebrowser:
    enabled: true
    port: 8081

  # GitHub Actions Sensor - monitors CI failures and spawns remediation
  sensor:
    enabled: true
    replicaCount: 0
    # Comma-separated list of repositories to monitor
    repositories: "5dlabs/cto"
    # Poll interval in seconds (300 = 5 minutes, reduced from 60 to prevent excessive CodeRun spawning)
    pollInterval: 300
    # How far back to look on first poll (minutes)
    lookbackMins: 60
    # Create GitHub issues for detected failures
    createIssues: true
    # Labels to add to created issues (comma-separated)
    issueLabels: "healer,ci-failure"
    # Branches to monitor (empty = all branches)
    branches: ""
    # Workflows to exclude from monitoring (comma-separated)
    excludedWorkflows: ""
    # Maximum failures to process per poll (reduced from 10 to prevent spawning too many CodeRuns)
    maxPerPoll: 3

  # Issue Reconciler - periodically checks and closes resolved issues
  reconciler:
    enabled: true
    # Cron schedule (default: every 5 minutes)
    schedule: "*/5 * * * *"
    # Repository to check issues for
    repository: "5dlabs/cto"
    # Labels that identify healer-created issues (comma-separated)
    labels: "heal"
    # Maximum issues to process per run
    maxIssues: 50
    # Dry run mode - check but don't close issues
    dryRun: false
    # Log level for the reconciler
    logLevel: "info"
    # GitHub secret configuration
    # Use tools-github-secrets which has GITHUB_PERSONAL_ACCESS_TOKEN
    githubSecretName: "tools-github-secrets"  # pragma: allowlist secret
    githubSecretKey: "GITHUB_PERSONAL_ACCESS_TOKEN"  # pragma: allowlist secret
    # Resource limits (defaults to healer resources if not specified)
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

# =============================================================================
# OpenMemory - AI Agent Memory
# =============================================================================
openmemory:
  enabled: false  # Replaced by Mem0 plugin + Qdrant (see qdrant.yaml)
  replicaCount: 1

  image:
    repository: registry.5dlabs.ai/5dlabs/openmemory
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 8080

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  persistence:
    enabled: true
    size: 5Gi

# =============================================================================
# Sensors - Argo Event Automation
# =============================================================================
sensors:
  enabled: true
  # Sensors are deployed to the automation namespace
  namespace: automation

# =============================================================================
# Webhooks - GitHub Event Handling
# =============================================================================
webhooks:
  enabled: true
  # EventSource and sensors for GitHub events
  namespace: automation
  # How GitHub webhooks are exposed externally:
  # - gateway: Gateway API HTTPRoute (default)
  # - ingress: Kubernetes Ingress (nginx or compatible controller)
  # - cloudflare: Cloudflare TunnelBinding
  exposure:
    mode: gateway
    host: github.public.5dlabs.ai
    path: /github/webhook
    # GitLab project webhooks → PM server (dual SCM); templates add routes parallel to GitHub
    gitlab:
      enabled: true
      host: cto.5dlabs.ai
      path: /webhooks/gitlab/events
    gateway:
      name: public-gateway
      namespace: cto
    ingress:
      className: nginx
      annotations: {}
      tls: []

# =============================================================================
# TweakCN - Theme Editor
# =============================================================================
tweakcn:
  enabled: true
  replicaCount: 1

  image:
    repository: registry.5dlabs.ai/5dlabs/tweakcn
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 3000

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# Web App - Next.js Application
# =============================================================================
web:
  enabled: true
  replicaCount: 2

  image:
    repository: registry.5dlabs.ai/5dlabs/web
    pullPolicy: Always
    tag: "latest"

  # Database migrations (runs as init container before app starts)
  migrations:
    enabled: true
    image:
      repository: registry.5dlabs.ai/5dlabs/web-migrate
      pullPolicy: Always
      tag: "latest"

  service:
    type: ClusterIP
    port: 3000

  # Public URL for OAuth trusted origins (required for production auth)
  # This should match the external hostname (e.g., from Cloudflare tunnel)
  publicUrl: "https://app.5dlabs.ai"

  # Environment variables (can be overridden in envFrom)
  env: {}

  # Environment variables from secrets/configmaps
  envFrom: []

  # Database connection (optional - for Better Auth and Drizzle)
  databaseUrl:
    enabled: true
    secretName: web-database-url  # pragma: allowlist secret

  # Auth secret for Better Auth (required if using auth)
  authSecret:
    enabled: true
    secretName: web-auth-secret  # pragma: allowlist secret

  # GitHub OAuth credentials (required for GitHub login)
  githubOAuth:
    enabled: true
    secretName: web-github-oauth  # pragma: allowlist secret

  # Secrets configuration
  secrets:
    databaseUrlSecretName: web-database-url  # pragma: allowlist secret
    authSecretName: web-auth-secret  # pragma: allowlist secret
    githubOAuthSecretName: web-github-oauth  # pragma: allowlist secret

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# =============================================================================
# Grok - X Search Research Pipeline (replaces crates/research)
# =============================================================================
grok:
  enabled: true

  image:
    repository: registry.5dlabs.ai/5dlabs/grok
    pullPolicy: Always
    tag: "latest"

  # CronJob schedule (every 6 hours)
  schedule: "0 */6 * * *"

  # Maximum job runtime in seconds (30 min — 30 categories)
  activeDeadlineSeconds: 1800

  persistence:
    size: 5Gi
    storageClass: ""  # Uses global.storageClass if empty

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# Research - Twitter/X Research Pipeline (DEPRECATED — replaced by grok)
# =============================================================================
research:
  enabled: false  # Deprecated: use grok section above

  image:
    repository: registry.5dlabs.ai/5dlabs/research
    pullPolicy: Always
    tag: "latest"

  # CronJob schedule (every 5 minutes)
  schedule: "*/5 * * * *"

  # Research configuration
  minRelevance: "0.5"
  batchSize: "10"
  model: "claude-sonnet-4-5-20250929"

  # PR creation
  createPR: true
  repo: "5dlabs/cto"
  baseBranch: "main"
  researchDir: "docs/research"

  # Enrichment configuration
  enrichment:
    # Firecrawl - scrapes linked URLs for content
    firecrawl:
      enabled: true
    # OctoCode - searches GitHub for code examples
    octocode:
      enabled: true
      maxExamplesPerTopic: 3
    # Tavily - web research for competitive analysis
    tavily:
      enabled: true
      maxResultsPerTopic: 5

  # Analysis configuration
  analysis:
    # Enable platform context-aware analysis
    contextAware: true
    # Multi-dimensional scoring
    scoringDimensions:
      - technicalFit
      - impact
      - effort
      - urgency
      - strategicAlignment

  persistence:
    size: 10Gi
    storageClass: ""  # Uses global.storageClass if empty

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Email digest (separate CronJob)
  digest:
    enabled: true
    # Daily at 13:00 UTC by default
    schedule: "0 13 * * *"
    hoursBetween: "24"
    # If true, don't do AI analysis; just send the list
    skipAnalysis: false
    # Optional override; defaults to research.model
    model: ""
    # Kubernetes Secret containing: GMAIL_USERNAME, GMAIL_APP_PASSWORD, optional DIGEST_* vars
    secretName: "research-digest-secrets" # pragma: allowlist secret
    # Digest format: "prioritized" (groups by priority) or "chronological"
    format: "prioritized"
    # Auto-merge research PRs (requires GitHub workflow)
    autoMerge: true

# =============================================================================
# Maintenance - Workspace and Event Cleanup
# =============================================================================
maintenance:
  enabled: true

  # Kubectl image for cleanup jobs
  image: bitnami/kubectl:latest

  # Workspace PVC cleaner
  pvcCleaner:
    schedule: "15 * * * *"  # Every hour at :15
    retentionHours: "12"
    maxDeletions: "15"

  # Event cleaner
  eventCleaner:
    schedule: "*/30 * * * *"  # Every 30 minutes
    retentionMinutes: "60"

# =============================================================================
# Cloudflare Tunnel - Ingress via Cloudflare
# =============================================================================
cloudflare:
  enabled: true
  # Cloudflare domain (must be a zone you own)
  domain: 5dlabs.ai
  # Cloudflare Account ID
  accountId: b73ec19faa187789b3f9d1deb0e0d95f
  # Email for API Key authentication
  email: j@jonathonfritz.com
  # Secret name (in cloudflare-operator-system namespace)
  # This secret must contain CLOUDFLARE_API_TOKEN with tunnel permissions
  secretName: cto-main-tunnel-credentials  # pragma: allowlist secret

  # Tunnel configuration
  tunnel:
    name: cto-main
    # Use existing tunnel ID (recommended after initial tunnel creation)
    # This avoids needing full API permissions to create new tunnels
    existingId: "87889b67-ee20-4ed1-8de7-fb43d1b5156f"

  # Service bindings
  bindings:
    pm:
      hostname: pm.5dlabs.ai
    # CTO platform main URL - routes to web app
    cto:
      hostname: app.5dlabs.ai
    # Web app - same as cto URL
    web:
      hostname: app.5dlabs.ai
    webhooks:
      hostname: github-webhooks.5dlabs.ai
    # Platform services (external to CTO namespace)
    argocd:
      hostname: argocd.5dlabs.ai
      # Use in-cluster HTTP to avoid TLS schema incompatibilities on TunnelBinding
      target: http://argocd-server.argocd.svc:80
    grafana:
      hostname: grafana.5dlabs.ai
      target: http://grafana.observability.svc:80
    # Headscale VPN control server (for remote cluster access)
    # Uses HTTPS internally with self-signed cert from cert-manager
    headscale:
      hostname: headscale.5dlabs.ai
      target: https://headscale.headscale.svc:443
      noTlsVerify: true
    # Coder IDE (code-server via openclaw-coder agent)
    coder:
      hostname: coder.5dlabs.ai
      target: http://openclaw-coder.cto.svc:8080
