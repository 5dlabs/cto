# =============================================================================
# ArgoCD Configuration
# =============================================================================
# Configure ArgoCD component logging to reduce noise from cache operations.
# The repo-server generates high-volume INFO messages for manifest cache hits
# during normal GitOps sync operations, which pollute logs and can be
# incorrectly flagged as errors by log scanners.
#
# Reference: https://argo-cd.readthedocs.io/en/stable/operator-manual/argocd-cmd-params-cm/
# =============================================================================
argocd:
  repoServer:
    # Set log level to WARN to suppress info-level cache hit messages
    # Valid levels: debug, info, warn, error
    # This suppresses "manifest cache hit" messages from repo-server
    logLevel: "warn"
    
    # Log format configuration (text or json)
    logFormat: "json"
    
    # Resource defaults for repo-server pods
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

  # Controller log level (manages Application syncs)
  controller:
    logLevel: "warn"
    
  # Application-set controller log level
  applicationSet:
    logLevel: "warn"

# =============================================================================
# Argo Events Sensor Configuration
# =============================================================================
# Configure sensor logging to reduce noise from event processing warnings.
# The sensor was generating 1000+ warn-level messages for normal GitHub event
# processing, which were being flagged as errors by the log scanner.
#
# Reference: https://argoproj.github.io/argo-events/sensors/sensor-spec/
# =============================================================================
argoEvents:
  sensor:
    # Set log level to ERROR to suppress warn-level event processing messages
    # Valid levels: debug, info, warn, error
    logLevel: "error"
    
    # Optional: Configure specific logger components
    # The argo-events.sensor logger at sensors/listener.go:198 generates
    # high-volume warnings for event processing that are not actionable
    loggers:
      # Suppress verbose event listener logging
      "argo-events.sensor": "error"
    
    # Resource defaults for sensor pods
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# =============================================================================
# Tools Configuration
# =============================================================================
tools:
  config:
    servers:
      # AI/ML Tools
      nano-banana-mcp:
        name: "Nano Banana MCP"
        description: "AI image generation and editing using Google's Gemini 2.5 Flash Image API"
        transport: "stdio"
        command: "npx"
        args: ["-y", "nano-banana-mcp"]
        workingDirectory: "/tmp"
        env:
          GEMINI_API_KEY: "${GEMINI_API_KEY}"