# =============================================================================
# Argo Events Sensor Configuration
# =============================================================================
# Configure sensor logging to reduce noise from event processing warnings.
# The sensor was generating 1000+ warn-level messages for normal GitHub event
# processing, which were being flagged as errors by the log scanner.
#
# Reference: https://argoproj.github.io/argo-events/sensors/sensor-spec/
# =============================================================================
argoEvents:
  sensor:
    # Set log level to ERROR to suppress warn-level event processing messages
    # Valid levels: debug, info, warn, error
    logLevel: "error"
    
    # Optional: Configure specific logger components
    # The argo-events.sensor logger at sensors/listener.go:198 generates
    # high-volume warnings for event processing that are not actionable
    loggers:
      # Suppress verbose event listener logging
      "argo-events.sensor": "error"
    
    # Resource defaults for sensor pods
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# =============================================================================
# Tools Configuration
# =============================================================================
tools:
  config:
    servers:
      # AI/ML Tools
      nano-banana-mcp:
        name: "Nano Banana MCP"
        description: "AI image generation and editing using Google's Gemini 2.5 Flash Image API"
        transport: "stdio"
        command: "npx"
        args: ["-y", "nano-banana-mcp"]
        workingDirectory: "/tmp"
        env:
          GEMINI_API_KEY: "${GEMINI_API_KEY}"

      # Educational Tools
      courses:
        name: "Anthropic Courses"
        description: "Access to Anthropic's educational courses including API fundamentals, prompt engineering, and tool use"
        transport: "stdio"
        command: "git"
        args: ["clone", "--depth=1", "https://github.com/anthropics/courses.git", "/tmp/courses"]
        workingDirectory: "/tmp"

# =============================================================================
# Healer Configuration
# =============================================================================
# Configure the healer for auto-remediation of production issues.
# =============================================================================
healer:
  enabled: true
  # CronJob schedule for health checks (every 5 minutes)
  schedule: "*/5 * * * *"
  # Image for healer job
  image:
    repository: bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent
  # Resource limits
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Namespaces to monitor for self-healing
  monitoredNamespaces:
    - argocd
    - automation
    - cto
  # Remediation policies
  policies:
    # Grafana database corruption auto-healing
    grafanaDbCorruption:
      enabled: true
      cooldownSeconds: 300
      maxRetries: 3
    # NATS/STAN eventbus DNS failure healing
    natsStanDnsFailure:
      enabled: true
      cooldownSeconds: 180
      maxRetries: 5
    # General I/O error handling
    dbIoError:
      enabled: true
      cooldownSeconds: 600
      maxRetries: 2