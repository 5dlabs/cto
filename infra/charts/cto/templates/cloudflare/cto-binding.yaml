{{- if and .Values.cloudflare.enabled .Values.web.enabled }}
---
# TunnelBinding: CTO Platform Main URL
# Routes app.5dlabs.ai to the web app service
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: cto-main
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.web.labels" . | nindent 4 }}
    app.kubernetes.io/component: cloudflare-binding
tunnelRef:
  kind: ClusterTunnel
  name: {{ .Values.cloudflare.tunnel.name }}
subjects:
  - name: {{ include "cto.web.fullname" . }}-cto
    spec:
      fqdn: {{ .Values.cloudflare.bindings.cto.hostname }}
      target: http://{{ include "cto.web.fullname" . }}.{{ include "cto.namespace" . }}.svc:{{ .Values.web.service.port }}
{{- end }}
