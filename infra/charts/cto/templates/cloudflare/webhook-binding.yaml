{{- if and .Values.cloudflare.enabled .Values.webhooks.enabled .Values.pm.enabled (eq .Values.webhooks.exposure.mode "cloudflare") }}
---
# TunnelBinding: GitHub Webhooks
# Routes GitHub webhook traffic directly to the PM server's unified webhook handler.
# Previously routed to Argo Events EventSource; now the PM server handles
# HMAC verification, event routing, and CodeRun creation natively.
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: github-webhooks
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.labels" . | nindent 4 }}
    app.kubernetes.io/component: cloudflare-binding
tunnelRef:
  kind: ClusterTunnel
  name: {{ .Values.cloudflare.tunnel.name }}
subjects:
  - name: {{ include "cto.pm.fullname" . }}
    spec:
      fqdn: {{ .Values.webhooks.exposure.host }}
      # Path matches the URL configured in GitHub organization webhook settings.
      # The PM server handles this path via a route alias.
      path: {{ .Values.webhooks.exposure.path }}
      target: http://{{ include "cto.pm.fullname" . }}.{{ include "cto.namespace" . }}.svc:{{ .Values.pm.service.port }}
{{- end }}



