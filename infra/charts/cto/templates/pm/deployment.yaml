{{- if .Values.pm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cto.pm.fullname" . }}
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.pm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.pm.replicaCount }}
  selector:
    matchLabels:
      {{- include "cto.pm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cto.pm.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "cto.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "cto.pm.fullname" . }}
      containers:
        - name: pm
          image: "{{ include "cto.imageRef" (dict "component" "pm" "image" .Values.pm.image "global" .Values.global) }}"
          imagePullPolicy: {{ include "cto.imagePullPolicy" (dict "image" .Values.pm.image "global" .Values.global) }}
          ports:
            - name: http
              containerPort: {{ .Values.pm.service.port }}
              protocol: TCP
          env:
            - name: PM_PROVIDER
              value: {{ .Values.pm.provider | quote }}
            - name: KUBERNETES_NAMESPACE
              value: {{ include "cto.namespace" . }}
            - name: NAMESPACE
              value: {{ include "cto.namespace" . }}
            {{- if eq .Values.pm.provider "linear" }}
            - name: LINEAR_ENABLED
              value: {{ .Values.pm.linear.enabled | quote }}
            - name: LINEAR_PORT
              value: {{ .Values.pm.service.port | quote }}
            {{- if .Values.pm.maxTimestampAgeMs }}
            - name: LINEAR_MAX_TIMESTAMP_AGE_MS
              value: {{ .Values.pm.maxTimestampAgeMs | quote }}
            {{- end }}
            {{- end }}
            # Intake workflow configuration
            - name: INTAKE_MODE
              value: {{ .Values.pm.intake.mode | default "api" | quote }}
            - name: INTAKE_CLI
              value: {{ .Values.pm.intake.cli | default "claude" | quote }}
            # RUNTIME_IMAGE: Resolve from agent.cliImages based on CLI selection
            # - API mode: uses pm.intake.runtimeImage (smaller, has tasks CLI)
            # - CLI mode: uses agent.cliImages[cli] (has the specified AI CLI)
            # - If pm.intake.image is set, use it directly (bypasses devRegistry)
            {{- $isCliMode := eq (.Values.pm.intake.mode | default "api") "cli" }}
            {{- $intakeCli := .Values.pm.intake.cli | default "claude" }}
            {{- if .Values.pm.intake.image }}
            - name: RUNTIME_IMAGE
              value: "{{ .Values.pm.intake.image }}"
            {{- else if $isCliMode }}
            {{- $cliImage := index .Values.agent.cliImages $intakeCli }}
            - name: RUNTIME_IMAGE
              value: "{{ include "cto.imageRef" (dict "component" $intakeCli "image" $cliImage "global" .Values.global) }}"
            {{- else }}
            - name: RUNTIME_IMAGE
              value: "{{ include "cto.imageRef" (dict "component" "runtime" "image" .Values.pm.intake.runtimeImage "global" .Values.global) }}"
            {{- end }}
            # Model configuration for intake (task generation, research, docs)
            {{- with .Values.pm.intake.models }}
            - name: PRIMARY_MODEL
              value: {{ .primary | default "claude-opus-4-5-20251101" | quote }}
            - name: PRIMARY_PROVIDER
              value: {{ .primaryProvider | default "anthropic" | quote }}
            - name: RESEARCH_MODEL
              value: {{ .research | default "claude-opus-4-5-20251101" | quote }}
            - name: RESEARCH_PROVIDER
              value: {{ .researchProvider | default "anthropic" | quote }}
            - name: DOCS_MODEL
              value: {{ .docs | default "claude-opus-4-5-20251101" | quote }}
            - name: DOCS_PROVIDER
              value: {{ .docsProvider | default "anthropic" | quote }}
            - name: FALLBACK_MODEL
              value: {{ .fallback | default "claude-sonnet-4-20250514" | quote }}
            - name: FALLBACK_PROVIDER
              value: {{ .fallbackProvider | default "anthropic" | quote }}
            {{- end }}
            {{- if .Values.pm.github }}
            - name: WEBHOOK_CALLBACK_URL
              value: {{ .Values.pm.github.webhookCallbackUrl | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.pm.secrets.secretName }}
          resources:
            {{- toYaml .Values.pm.resources | nindent 12 }}
{{- end }}
