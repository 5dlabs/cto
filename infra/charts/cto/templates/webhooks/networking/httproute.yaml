{{- if and .Values.webhooks.enabled .Values.pm.enabled (eq .Values.webhooks.exposure.mode "gateway") }}
---
# HTTPRoute: GitHub Webhooks
# Routes GitHub webhook traffic to the PM server's unified webhook handler.
# Previously routed to Argo Events EventSource in automation namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: github-webhooks
  namespace: {{ include "cto.namespace" . }}
  annotations:
    argocd.argoproj.io/ignore-differences: |
      jsonPointers:
      - /status
      - /metadata/annotations
      - /metadata/managedFields
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.webhooks.exposure.gateway.name | quote }}
      namespace: {{ .Values.webhooks.exposure.gateway.namespace | quote }}
  hostnames:
    - {{ .Values.webhooks.exposure.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            # Path matches the URL configured in GitHub organization webhook settings.
            # The PM server handles this path via a route alias.
            value: {{ .Values.webhooks.exposure.path | quote }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "cto.pm.fullname" . }}
          port: {{ .Values.pm.service.port }}
          weight: 1
{{- end }}
