{{- if .Values.tools.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cto.tools.fullname" . }}
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.tools.labels" . | nindent 4 }}
    app.kubernetes.io/component: tools
    platform.5dlabs.io/log-collection: enabled
spec:
  replicas: {{ .Values.tools.replicaCount }}
  {{- if .Values.tools.persistence.enabled }}
  # Use Recreate strategy for RWO volumes to avoid Multi-Attach errors
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "cto.tools.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tools
  template:
    metadata:
      annotations:
        logs.platform.5dlabs.io/collect: "true"
        logs.platform.5dlabs.io/service: "tools-mcp"
      labels:
        {{- include "cto.tools.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tools
        platform.5dlabs.io/log-collection: enabled
    spec:
      {{- include "cto.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "cto.tools.fullname" . }}
      securityContext:
        # Match the 'app' user/group from the container image (UID/GID 1001)
        fsGroup: 1001
        # GID 2375 is the docker group used by docker:dind for the socket
        supplementalGroups: [2375]
      initContainers:
        - name: setup-directories
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Setting up directories..."
              # Setup npm cache in home directory (matches Dockerfile /home/app)
              mkdir -p /home/app/.npm
              mkdir -p /home/app/.npm/_logs
              chown -R 1001:1001 /home/app
              chmod 755 /home/app/.npm
              
              # Setup data directory with correct ownership for app user
              mkdir -p /data/workspace
              chown -R 1001:1001 /data
              
              # Docker data directory is managed by the dind sidecar (runs as root)
              mkdir -p /docker-data
              
              echo "Setup complete"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: home-app
              mountPath: /home/app
            - name: docker-data
              mountPath: /docker-data
      containers:
        - name: tools
          image: "{{ include "cto.imageRef" (dict "component" "tools" "image" .Values.tools.image "global" .Values.global) }}"
          imagePullPolicy: {{ include "cto.imagePullPolicy" (dict "image" .Values.tools.image "global" .Values.global) }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
          ports:
            - name: http
              containerPort: {{ .Values.tools.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.tools.service.port | quote }}
            - name: RUST_LOG
              value: "info,kube=debug,tools=trace"
            - name: SYSTEM_CONFIG_PATH
              value: "/config"
            # Set HOME to match the Dockerfile's app user home directory
            - name: HOME
              value: "/home/app"
            # Docker host points to the dind sidecar via shared socket
            - name: DOCKER_HOST
              value: "unix:///var/run/docker.sock"
            {{- if .Values.tools.config.secrets.context7 }}
            - name: CONTEXT7_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tools.config.secrets.context7 }}
                  key: CONTEXT7_API_KEY
                  optional: true
            {{- end }}
            {{- if .Values.tools.config.secrets.github }}
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tools.config.secrets.github }}
                  key: GITHUB_PERSONAL_ACCESS_TOKEN
                  optional: true
            {{- end }}
            # Latitude.sh API key for bare metal server management
            - name: LATITUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tools-latitude-secrets
                  key: LATITUDE_API_KEY
                  optional: true
            # Firecrawl API key for web scraping and crawling
            - name: FIRECRAWL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tools-firecrawl-secrets
                  key: FIRECRAWL_API_KEY
                  optional: true
            # Tavily API key for web search
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tools-tavily-secrets
                  key: TAVILY_API_KEY
                  optional: true
            # Linear API key for project management MCP server
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: linear-secrets
                  key: LINEAR_API_KEY
                  optional: true
            # GitHub token for OctoCode and GitHub MCP servers
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tools-github-secrets
                  key: GITHUB_PERSONAL_ACCESS_TOKEN
                  optional: true
            # Grafana observability stack
            - name: GRAFANA_URL
              value: "http://grafana.observability.svc:80"
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tools-grafana-secrets
                  key: GRAFANA_SERVICE_ACCOUNT_TOKEN
                  optional: true
            # Loki for log queries
            - name: LOKI_URL
              value: "http://loki.observability.svc:3100"
            # Prometheus for metrics
            - name: PROMETHEUS_URL
              value: "http://prometheus.observability.svc:9090"
            # Perplexity API key for web search
            - name: PERPLEXITY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cto-secrets
                  key: PERPLEXITY_API_KEY
                  optional: true
            # MiniMax AI suite - text, video, speech, and music generation
            - name: MINIMAX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cto-secrets
                  key: MINIMAX_API_KEY
                  optional: true
            - name: MINIMAX_GROUP_ID
              valueFrom:
                secretKeyRef:
                  name: cto-secrets
                  key: MINIMAX_GROUP_ID
                  optional: true
            # Cloudflare API token for Workers, DNS, and edge services
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cto-secrets
                  key: CLOUDFLARE_API_TOKEN
                  optional: true
            # ArgoCD API token for GitOps management
            - name: ARGOCD_BASE_URL
              value: "https://argocd.5dlabs.ai"
            - name: ARGOCD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tools-argocd-secrets
                  key: ARGOCD_API_TOKEN
                  optional: true
            # S3/SeaweedFS credentials for object storage
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-credentials
                  key: access_key
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-credentials
                  key: secret_key
                  optional: true
            - name: AWS_REGION
              value: "us-east-1"
            - name: S3_ENDPOINT
              value: "http://seaweedfs-s3.seaweedfs.svc:8333"
          resources:
            {{- toYaml .Values.tools.resources | nindent 12 }}
          # Readiness probe - ensures service doesn't receive traffic until tools are discovered
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            # Allow time for initial tool discovery (can take 2-4 minutes)
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            # Allow up to 5 minutes (30 failures * 10s period) for full initialization
            failureThreshold: 30
          # Liveness probe - restart if server becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: http
            # Give server time to start before checking liveness
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
            - name: home-app
              mountPath: /home/app
            - name: docker-sock-dir
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
        # Docker-in-Docker sidecar for Docker-based MCP servers
        - name: docker-daemon
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-sock-dir
              mountPath: /var/run
            - name: docker-data
              mountPath: /var/lib/docker
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "cto.tools.fullname" . }}-config
        - name: data
          {{- if .Values.tools.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cto.tools.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: home-app
          emptyDir: {}
        - name: docker-sock-dir
          emptyDir: {}
        - name: docker-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
{{- end }}
