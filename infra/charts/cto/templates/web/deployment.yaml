{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cto.web.fullname" . }}
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.web.labels" . | nindent 4 }}
    platform.5dlabs.io/log-collection: enabled
  annotations:
    logs.platform.5dlabs.io/collect: "true"
    logs.platform.5dlabs.io/service: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "cto.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cto.web.selectorLabels" . | nindent 8 }}
        platform.5dlabs.io/log-collection: enabled
      annotations:
        logs.platform.5dlabs.io/collect: "true"
        logs.platform.5dlabs.io/service: web
    spec:
      {{- include "cto.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: web
          image: "{{ include "cto.imageRef" (dict "component" "web" "image" .Values.web.image "global" .Values.global) }}"
          imagePullPolicy: {{ include "cto.imagePullPolicy" (dict "image" .Values.web.image "global" .Values.global) }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.web.service.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            {{- if .Values.web.publicUrl }}
            - name: NEXT_PUBLIC_APP_URL
              value: {{ .Values.web.publicUrl | quote }}
            {{- end }}
            {{- if .Values.web.env }}
            {{- range $key, $value := .Values.web.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.web.databaseUrl.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.secrets.databaseUrlSecretName }}
                  key: url
                  optional: false
            {{- end }}
            {{- if .Values.web.authSecret.enabled }}
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.web.secrets.authSecretName }}
                  key: secret
                  optional: false
            {{- end }}
          {{- if .Values.web.envFrom }}
          envFrom:
            {{- toYaml .Values.web.envFrom | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
{{- end }}
