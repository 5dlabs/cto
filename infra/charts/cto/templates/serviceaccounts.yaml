{{- if .Values.controller.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cto.controller.fullname" . }}
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
---
{{- end }}
{{- if .Values.pm.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cto.pm.fullname" . }}
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.pm.labels" . | nindent 4 }}
---
{{- end }}
{{- if .Values.tools.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cto.tools.fullname" . }}
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.tools.labels" . | nindent 4 }}
{{- end }}
---
# BOLT-003: ServiceAccount for Bolt agent pods (admin provisioning tasks)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bolt-agent
  namespace: {{ include "cto.namespace" . }}
  labels:
    app.kubernetes.io/name: bolt-agent
    app.kubernetes.io/component: provisioning
    {{- include "cto.labels" . | nindent 4 }}
{{- /* Note: Healer ServiceAccount is defined in templates/healer/rbac.yaml */ -}}
