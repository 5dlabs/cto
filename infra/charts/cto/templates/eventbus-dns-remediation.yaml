# EventBus DNS Resolution Remediation
# Task ID: 2641293645, 2533441310
# Generated: 2026-01-04
# Issue: DNS lookup failures for eventbus-default-stan-*.eventbus-default-stan-svc.automation.svc
# Root Cause: Legacy STAN resources causing DNS failures after migration to JetStream
# This job cleans up legacy STAN and monitors JetStream health

---
# Job: Legacy STAN Cleanup and JetStream Health Check
apiVersion: batch/v1
kind: Job
metadata:
  name: eventbus-dns-remediation
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    app.kubernetes.io/component: dns-health
    remediation.cto.io/task-id: "2641293645,2533441310"
    remediation.cto.io/type: dns-resolution
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eventbus-remediation
    spec:
      serviceAccountName: eventbus-remediation-sa
      restartPolicy: OnFailure
      containers:
        - name: dns-remediation
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== EventBus DNS Remediation Job ==="
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "Namespace: automation"
              echo ""
              echo "NOTE: STAN is deprecated. Migration to JetStream complete."
              echo "This job cleans up legacy STAN resources causing DNS failures."
              
              # ========================================
              # STEP 1: Clean up Legacy STAN Resources
              # ========================================
              echo ""
              echo "=== Step 1: Cleaning Legacy STAN Resources ==="
              
              # Check for legacy STAN StatefulSet
              if kubectl get statefulset eventbus-default-stan -n automation &>/dev/null; then
                echo "Found legacy STAN StatefulSet - removing..."
                kubectl delete statefulset eventbus-default-stan -n automation --grace-period=30 --wait=false || true
              else
                echo "No legacy STAN StatefulSet found (already cleaned)"
              fi
              
              # Check for legacy STAN headless service (causes DNS errors)
              if kubectl get service eventbus-default-stan-svc -n automation &>/dev/null; then
                echo "Found legacy STAN headless service - removing..."
                kubectl delete service eventbus-default-stan-svc -n automation || true
              else
                echo "No legacy STAN headless service found (already cleaned)"
              fi
              
              # Check for legacy STAN client service
              if kubectl get service eventbus-default-stan -n automation &>/dev/null; then
                echo "Found legacy STAN client service - removing..."
                kubectl delete service eventbus-default-stan -n automation || true
              else
                echo "No legacy STAN client service found (already cleaned)"
              fi
              
              # Check for legacy STAN PDB
              if kubectl get pdb eventbus-default-stan -n automation &>/dev/null; then
                echo "Found legacy STAN PDB - removing..."
                kubectl delete pdb eventbus-default-stan -n automation || true
              else
                echo "No legacy STAN PDB found (already cleaned)"
              fi
              
              # Force delete any orphaned STAN pods
              ORPHAN_PODS=$(kubectl get pods -n automation -l app=eventbus-default-stan -o name 2>/dev/null || echo "")
              if [ -n "$ORPHAN_PODS" ]; then
                echo "Found orphaned STAN pods - force deleting..."
                echo "$ORPHAN_PODS" | xargs -r kubectl delete -n automation --force --grace-period=0 || true
              else
                echo "No orphaned STAN pods found"
              fi
              
              # ========================================
              # STEP 2: Verify JetStream EventBus Health
              # ========================================
              echo ""
              echo "=== Step 2: Verifying JetStream EventBus Health ==="
              
              # Check for JetStream EventBus pods
              JETSTREAM_SELECTOR="app.kubernetes.io/name=eventbus-jetstream"
              JETSTREAM_PODS=$(kubectl get pods -n automation -l "$JETSTREAM_SELECTOR" --no-headers 2>/dev/null | wc -l || echo "0")
              
              if [ "$JETSTREAM_PODS" -gt "0" ]; then
                echo "Found $JETSTREAM_PODS JetStream EventBus pods"
                kubectl get pods -n automation -l "$JETSTREAM_SELECTOR" -o wide
                
                # Check for unhealthy JetStream pods
                UNHEALTHY=$(kubectl get pods -n automation -l "$JETSTREAM_SELECTOR" -o jsonpath='{range .items[?(@.status.phase!="Running")]}{.metadata.name}{" "}{end}' 2>/dev/null || echo "")
                if [ -n "$UNHEALTHY" ]; then
                  echo "Found unhealthy JetStream pods: $UNHEALTHY"
                  for pod in $UNHEALTHY; do
                    echo "Deleting unhealthy pod: $pod"
                    kubectl delete pod -n automation "$pod" --grace-period=30 || true
                  done
                else
                  echo "All JetStream pods healthy"
                fi
              else
                echo "No JetStream EventBus pods found"
                # Fallback to generic NATS selector
                NATS_SELECTOR="app.kubernetes.io/name=nats"
                NATS_PODS=$(kubectl get pods -n automation -l "$NATS_SELECTOR" --no-headers 2>/dev/null | wc -l || echo "0")
                if [ "$NATS_PODS" -gt "0" ]; then
                  echo "Found $NATS_PODS NATS pods (fallback selector)"
                  kubectl get pods -n automation -l "$NATS_SELECTOR" -o wide
                fi
              fi
              
              # ========================================
              # STEP 3: Verify DNS Resolution is Clean
              # ========================================
              echo ""
              echo "=== Step 3: Verifying DNS Resolution ==="
              
              # Legacy STAN DNS should now return NXDOMAIN (expected)
              echo "Checking legacy STAN DNS entries (should fail with NXDOMAIN):"
              for i in 0 1 2; do
                host="eventbus-default-stan-${i}.eventbus-default-stan-svc.automation.svc.cluster.local"
                echo -n "  $host: "
                if nslookup "$host" >/dev/null 2>&1; then
                  echo "WARNING - Still resolves (cleanup may need more time)"
                else
                  echo "OK - Not found (expected)"
                fi
              done
              
              echo ""
              echo "=== EventBus DNS Remediation Completed ==="
---
# ServiceAccount for remediation job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eventbus-remediation-sa
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    remediation.cto.io/task-id: "2641293645,2533441310"
---
# Role for EventBus remediation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eventbus-remediation-role
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    remediation.cto.io/task-id: "2641293645,2533441310"
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "delete"]
---
# RoleBinding for remediation job
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eventbus-remediation-binding
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    remediation.cto.io/task-id: "2641293645,2533441310"
subjects:
  - kind: ServiceAccount
    name: eventbus-remediation-sa
    namespace: automation
roleRef:
  kind: Role
  name: eventbus-remediation-role
  apiGroup: rbac.authorization.k8s.io
---
# CronJob: Periodic EventBus health check (JetStream + Legacy STAN cleanup)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: eventbus-health-check
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    app.kubernetes.io/component: health-check
    remediation.cto.io/task-id: "2641293645,2533441310"
spec:
  schedule: "*/15 * * * *"  # Run every 15 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: eventbus-remediation
        spec:
          serviceAccountName: eventbus-remediation-sa
          restartPolicy: OnFailure
          containers:
            - name: health-check
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== EventBus Health Check ==="
                  echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  
                  # Step 1: Clean any remaining legacy STAN resources
                  echo ""
                  echo "--- Checking for Legacy STAN Resources ---"
                  
                  STAN_CLEANUP_NEEDED=false
                  
                  # Check for legacy StatefulSet
                  if kubectl get statefulset eventbus-default-stan -n automation &>/dev/null; then
                    echo "Found legacy STAN StatefulSet - cleaning..."
                    kubectl delete statefulset eventbus-default-stan -n automation --grace-period=30 --wait=false || true
                    STAN_CLEANUP_NEEDED=true
                  fi
                  
                  # Check for legacy services
                  if kubectl get service eventbus-default-stan-svc -n automation &>/dev/null; then
                    echo "Found legacy STAN headless service - cleaning..."
                    kubectl delete service eventbus-default-stan-svc -n automation || true
                    STAN_CLEANUP_NEEDED=true
                  fi
                  
                  if kubectl get service eventbus-default-stan -n automation &>/dev/null; then
                    echo "Found legacy STAN client service - cleaning..."
                    kubectl delete service eventbus-default-stan -n automation || true
                    STAN_CLEANUP_NEEDED=true
                  fi
                  
                  # Check for orphaned STAN pods
                  ORPHAN_PODS=$(kubectl get pods -n automation -l app=eventbus-default-stan -o name 2>/dev/null || echo "")
                  if [ -n "$ORPHAN_PODS" ]; then
                    echo "Found orphaned STAN pods - force cleaning..."
                    echo "$ORPHAN_PODS" | xargs -r kubectl delete -n automation --force --grace-period=0 || true
                    STAN_CLEANUP_NEEDED=true
                  fi
                  
                  if [ "$STAN_CLEANUP_NEEDED" = "true" ]; then
                    echo "Legacy STAN cleanup performed"
                  else
                    echo "No legacy STAN resources found (clean)"
                  fi
                  
                  # Step 2: Check JetStream EventBus health
                  echo ""
                  echo "--- Checking JetStream EventBus Health ---"
                  
                  JETSTREAM_SELECTOR="app.kubernetes.io/name=eventbus-jetstream"
                  NATS_SELECTOR="app.kubernetes.io/name=nats"
                  
                  # Check JetStream pods first
                  JS_UNHEALTHY=$(kubectl get pods -n automation -l "$JETSTREAM_SELECTOR" -o jsonpath='{range .items[?(@.status.phase!="Running")]}{.metadata.name}{" "}{end}' 2>/dev/null || echo "")
                  if [ -n "$JS_UNHEALTHY" ]; then
                    echo "Found unhealthy JetStream pods: $JS_UNHEALTHY"
                    for pod in $JS_UNHEALTHY; do
                      echo "Restarting: $pod"
                      kubectl delete pod -n automation "$pod" --grace-period=30 || true
                    done
                  else
                    # Fallback to NATS selector
                    NATS_UNHEALTHY=$(kubectl get pods -n automation -l "$NATS_SELECTOR" -o jsonpath='{range .items[?(@.status.phase!="Running")]}{.metadata.name}{" "}{end}' 2>/dev/null || echo "")
                    if [ -n "$NATS_UNHEALTHY" ]; then
                      echo "Found unhealthy NATS pods: $NATS_UNHEALTHY"
                      for pod in $NATS_UNHEALTHY; do
                        echo "Restarting: $pod"
                        kubectl delete pod -n automation "$pod" --grace-period=30 || true
                      done
                    else
                      echo "All JetStream/NATS pods healthy"
                    fi
                  fi
                  
                  echo ""
                  echo "=== Health Check Completed ==="
