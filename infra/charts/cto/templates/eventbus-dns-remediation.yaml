# EventBus DNS Resolution Remediation
# Task ID: 2641293645
# Generated: 2026-01-04
# Issue: DNS lookup failures for eventbus-default-stan-*.eventbus-default-stan-svc.automation.svc
# Root Cause: NATS Streaming EventBus cluster pods may be unhealthy or the headless service is misconfigured
# This creates a remediation job to restart EventBus components and verify DNS resolution

---
# Job: EventBus Health Check and Remediation
apiVersion: batch/v1
kind: Job
metadata:
  name: eventbus-dns-remediation
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    app.kubernetes.io/component: dns-health
    remediation.cto.io/task-id: "2641293645"
    remediation.cto.io/type: dns-resolution
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eventbus-remediation
    spec:
      serviceAccountName: eventbus-remediation-sa
      restartPolicy: OnFailure
      containers:
        - name: dns-remediation
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== EventBus DNS Remediation Job ==="
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "Namespace: automation"
              
              # Function to check DNS resolution
              check_dns() {
                local host="$1"
                echo "Checking DNS resolution for: $host"
                if nslookup "$host" 2>/dev/null; then
                  echo "  DNS resolution: OK"
                  return 0
                else
                  echo "  DNS resolution: FAILED"
                  return 1
                fi
              }
              
              # Check EventBus StatefulSet status
              echo ""
              echo "=== Checking EventBus StatefulSet ==="
              kubectl get statefulset -n automation -l app=eventbus-default-stan -o wide || echo "No EventBus StatefulSet found"
              
              # Check EventBus pods
              echo ""
              echo "=== Checking EventBus Pods ==="
              kubectl get pods -n automation -l app=eventbus-default-stan -o wide || echo "No EventBus pods found"
              
              # Check headless service
              echo ""
              echo "=== Checking EventBus Headless Service ==="
              kubectl get svc eventbus-default-stan-svc -n automation -o yaml || echo "Service not found"
              
              # Check endpoints
              echo ""
              echo "=== Checking EventBus Endpoints ==="
              kubectl get endpoints eventbus-default-stan-svc -n automation -o yaml || echo "Endpoints not found"
              
              # Check DNS resolution for each expected pod
              echo ""
              echo "=== DNS Resolution Check ==="
              dns_ok=true
              for i in 0 1 2; do
                host="eventbus-default-stan-${i}.eventbus-default-stan-svc.automation.svc.cluster.local"
                if ! check_dns "$host"; then
                  dns_ok=false
                fi
              done
              
              if [ "$dns_ok" = "false" ]; then
                echo ""
                echo "=== DNS Issues Detected - Attempting Remediation ==="
                
                # Get pod status details
                echo "Pod status details:"
                kubectl get pods -n automation -l app=eventbus-default-stan -o jsonpath='{range .items[*]}{.metadata.name}: {.status.phase} - {.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}' || true
                
                # Check for pods not in Running state
                unhealthy_pods=$(kubectl get pods -n automation -l app=eventbus-default-stan --field-selector=status.phase!=Running -o name 2>/dev/null || echo "")
                
                if [ -n "$unhealthy_pods" ]; then
                  echo "Found unhealthy pods: $unhealthy_pods"
                  echo "Deleting unhealthy pods to trigger restart..."
                  echo "$unhealthy_pods" | xargs -r kubectl delete -n automation --wait=false
                fi
                
                # If all pods appear running but DNS still fails, rollout restart
                running_count=$(kubectl get pods -n automation -l app=eventbus-default-stan --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l || echo "0")
                
                if [ "$running_count" -gt "0" ]; then
                  echo "All pods appear running but DNS fails - checking pod readiness..."
                  not_ready=$(kubectl get pods -n automation -l app=eventbus-default-stan -o jsonpath='{range .items[*]}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}' | grep -c "False" || echo "0")
                  
                  if [ "$not_ready" -gt "0" ]; then
                    echo "Found $not_ready pods not ready - performing rollout restart..."
                    kubectl rollout restart statefulset -n automation -l app=eventbus-default-stan || true
                    echo "Waiting for rollout to complete..."
                    kubectl rollout status statefulset -n automation -l app=eventbus-default-stan --timeout=300s || echo "Rollout status check timed out"
                  fi
                fi
                
                # Final DNS check after remediation
                echo ""
                echo "=== Post-Remediation DNS Check ==="
                sleep 30  # Wait for DNS propagation
                for i in 0 1 2; do
                  host="eventbus-default-stan-${i}.eventbus-default-stan-svc.automation.svc.cluster.local"
                  check_dns "$host" || true
                done
              else
                echo ""
                echo "=== DNS Resolution OK - No Remediation Needed ==="
              fi
              
              # Check NATS cluster health
              echo ""
              echo "=== NATS Cluster Health ==="
              kubectl exec -n automation eventbus-default-stan-0 -- nats-streaming-server --version 2>/dev/null || echo "Could not check NATS version"
              
              echo ""
              echo "=== EventBus DNS Remediation Completed ==="
---
# ServiceAccount for remediation job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eventbus-remediation-sa
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    remediation.cto.io/task-id: "2641293645"
---
# Role for EventBus remediation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eventbus-remediation-role
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    remediation.cto.io/task-id: "2641293645"
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
# RoleBinding for remediation job
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eventbus-remediation-binding
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    remediation.cto.io/task-id: "2641293645"
subjects:
  - kind: ServiceAccount
    name: eventbus-remediation-sa
    namespace: automation
roleRef:
  kind: Role
  name: eventbus-remediation-role
  apiGroup: rbac.authorization.k8s.io
---
# CronJob: Periodic EventBus health check
apiVersion: batch/v1
kind: CronJob
metadata:
  name: eventbus-health-check
  namespace: automation
  labels:
    app.kubernetes.io/name: eventbus-remediation
    app.kubernetes.io/component: health-check
    remediation.cto.io/task-id: "2641293645"
spec:
  schedule: "*/15 * * * *"  # Run every 15 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: eventbus-remediation
        spec:
          serviceAccountName: eventbus-remediation-sa
          restartPolicy: OnFailure
          containers:
            - name: health-check
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== EventBus Health Check ==="
                  echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  
                  # Quick DNS check
                  dns_failures=0
                  for i in 0 1 2; do
                    host="eventbus-default-stan-${i}.eventbus-default-stan-svc.automation.svc.cluster.local"
                    if ! nslookup "$host" >/dev/null 2>&1; then
                      echo "DNS FAIL: $host"
                      dns_failures=$((dns_failures + 1))
                    fi
                  done
                  
                  if [ "$dns_failures" -gt "0" ]; then
                    echo "WARNING: $dns_failures DNS resolution failures detected"
                    
                    # Check pod status
                    not_ready=$(kubectl get pods -n automation -l app=eventbus-default-stan -o jsonpath='{range .items[*]}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}' | grep -c "False" || echo "0")
                    
                    if [ "$not_ready" -gt "0" ]; then
                      echo "Found $not_ready unhealthy pods - triggering restart"
                      kubectl delete pods -n automation -l app=eventbus-default-stan --field-selector=status.phase!=Running --wait=false 2>/dev/null || true
                    fi
                  else
                    echo "All EventBus DNS resolutions successful"
                  fi
                  
                  echo "=== Health Check Completed ==="
