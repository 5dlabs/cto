{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cto.controller.fullname" . }}
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "cto.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cto.controller.selectorLabels" . | nindent 8 }}
        {{- if .Values.datadog.enabled }}
        tags.datadoghq.com/env: {{ .Values.datadog.tags.env | quote }}
        tags.datadoghq.com/service: "cto-controller"
        tags.datadoghq.com/version: {{ .Values.controller.image.tag | quote }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/controller/configmap.yaml") . | sha256sum }}
        checksum/task-config: {{ include (print $.Template.BasePath "/controller/task-controller-config.yaml") . | sha256sum }}
        {{- if .Values.datadog.enabled }}
        ad.datadoghq.com/controller.logs: '[{"source":"rust","service":"cto-controller"}]'
        {{- end }}
    spec:
      {{- include "cto.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "cto.controller.fullname" . }}
      containers:
        - name: controller
          image: "{{ include "cto.imageRef" (dict "component" "controller" "image" .Values.controller.image "global" .Values.global) }}"
          imagePullPolicy: {{ include "cto.imagePullPolicy" (dict "image" .Values.controller.image "global" .Values.global) }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KUBERNETES_NAMESPACE
              value: {{ include "cto.namespace" . }}
            - name: SERVER_HOST
              value: {{ .Values.controller.config.serverHost | quote }}
            - name: SERVER_PORT
              value: {{ .Values.controller.config.serverPort | quote }}
            - name: RUST_LOG
              value: {{ .Values.controller.config.rustLog | quote }}
            - name: TEMPLATES_VERSION
              value: {{ .Values.controller.templatesVersion | quote }}
            - name: AGENT_TEMPLATES_PATH
              value: "/app/templates"
            {{- if .Values.datadog.enabled }}
            - name: DD_ENV
              value: {{ .Values.datadog.tags.env | quote }}
            - name: DD_SERVICE
              value: "cto-controller"
            - name: DD_VERSION
              value: {{ .Values.controller.image.tag | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: cto-secrets
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: task-controller-config
{{- end }}
