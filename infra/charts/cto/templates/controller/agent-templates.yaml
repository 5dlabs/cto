{{- if .Values.controller.enabled }}
# =============================================================================
# Agent Templates ConfigMaps
# =============================================================================
# These ConfigMaps contain shell scripts used by Argo Workflows to run
# intake and play workflows with different CLI tools.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-agents
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: agents
data:
  # Agent configuration for intake and play workflows
  agents.json: |
    {
      "version": "1.0.0",
      "agents": {
        "intake": {
          "name": "intake",
          "type": "intake",
          "description": "PRD analysis and task generation"
        },
        "play": {
          "name": "play",
          "type": "play",
          "description": "Task implementation"
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-agent-templates-intake
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-templates
data:
  # GitHub preparation script - creates/clones repository and sets up webhooks
  # This step runs BEFORE the main intake and handles:
  # 1. Creating new repos if no repository_url is provided
  # 2. Cloning existing repos and setting up webhooks
  # 3. Outputting the final repository URL for the intake step
  github_prep.sh: |
    #!/bin/bash
    set -euo pipefail

    # =========================================================================
    # Output Parameter Handling
    # Ensure Argo can always read the output parameter, even on failure
    # =========================================================================
    cleanup() {
        if [ ! -f /tmp/repository-url ]; then
            echo "ERROR: Script failed before setting repository URL" > /tmp/repository-url
        fi
    }
    trap cleanup EXIT

    # =========================================================================
    # Linear Agent Activity helpers (optional)
    # =========================================================================
    activity_enabled() {
        command -v pm-activity >/dev/null 2>&1 && \
          [ -n "${LINEAR_SESSION_ID:-}" ] && \
          [ -n "${LINEAR_API_TOKEN:-}" ]
    }

    activity_thought() {
        local body="$1"
        if activity_enabled; then
            pm-activity thought --persistent "$body" >/dev/null 2>&1 || true
        fi
    }

    activity_action() {
        local action="$1"
        local parameter="$2"
        if activity_enabled; then
            pm-activity action "$action" "$parameter" >/dev/null 2>&1 || true
        fi
    }

    activity_action_complete() {
        local action="$1"
        local parameter="$2"
        local result="$3"
        if activity_enabled; then
            pm-activity action-complete "$action" "$parameter" "$result" >/dev/null 2>&1 || true
        fi
    }

    activity_error() {
        local body="$1"
        if activity_enabled; then
            pm-activity error "$body" >/dev/null 2>&1 || true
        fi
    }

    # =========================================================================
    # GitHub Repository Preparation Script
    # Runs before intake to ensure repository exists and is configured
    # =========================================================================

    echo "🔧 GitHub Repository Preparation"
    echo "================================="
    echo "📅 Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    echo ""

    activity_thought "GitHub prep started for ${LINEAR_ISSUE_IDENTIFIER:-unknown} (${HOSTNAME:-unknown})"

    # =========================================================================
    # Configuration
    # =========================================================================

    CONFIG_FILE="/intake-files/config.json"

    if [ ! -f "$CONFIG_FILE" ]; then
        echo "❌ Configuration file not found at $CONFIG_FILE"
        exit 1
    fi

    PROJECT_NAME=$(jq -r '.project_name' "$CONFIG_FILE")
    REPOSITORY_URL=$(jq -r '.repository_url // ""' "$CONFIG_FILE")
    GITHUB_DEFAULT_ORG=$(jq -r '.github_default_org // "5dlabs"' "$CONFIG_FILE")
    GITHUB_VISIBILITY=$(jq -r '.github_visibility // "private"' "$CONFIG_FILE")
    WEBHOOK_CALLBACK_URL=$(jq -r '.webhook_callback_url // ""' "$CONFIG_FILE")

    echo "📋 Configuration:"
    echo "  → Project: $PROJECT_NAME"
    echo "  → Repository URL: ${REPOSITORY_URL:-<not provided>}"
    echo "  → Default Org: $GITHUB_DEFAULT_ORG"
    echo "  → Visibility: $GITHUB_VISIBILITY"
    echo ""

    activity_action "GitHub prep: load config" "$PROJECT_NAME"

    # =========================================================================
    # GitHub Authentication
    # =========================================================================

    # Retry wrapper for curl with exponential backoff
    retry_curl() {
        local max_attempts=3
        local attempt=1
        local delay=2
        local result=""
        local exit_code=0
        while [ $attempt -le $max_attempts ]; do
            set +e  # Temporarily disable exit on error
            result=$(curl "$@" 2>&1)
            exit_code=$?
            set -e
            if [ $exit_code -eq 0 ]; then
                break
            fi
            echo "  ⚠️ Attempt $attempt/$max_attempts failed (exit code $exit_code), retrying in ${delay}s..." >&2
            sleep $delay
            delay=$((delay * 2))
            attempt=$((attempt + 1))
        done
        echo "$result"
        return $exit_code
    }

    echo "🔐 Setting up GitHub App authentication..."
    activity_action "GitHub auth" "${GITHUB_DEFAULT_ORG}/${REPO_NAME:-repo}"

    # Debug: Check if credentials are present (without revealing values)
    if [ -z "${GITHUB_APP_ID:-}" ]; then
        echo "  ⚠️ GITHUB_APP_ID is not set"
    else
        echo "  ✓ GITHUB_APP_ID is set"
    fi
    if [ -z "${GITHUB_APP_PRIVATE_KEY:-}" ]; then
        echo "  ⚠️ GITHUB_APP_PRIVATE_KEY is not set"
    else
        KEY_LINES=$(echo "$GITHUB_APP_PRIVATE_KEY" | wc -l)
        KEY_CHARS=$(echo "$GITHUB_APP_PRIVATE_KEY" | wc -c)
        echo "  ✓ GITHUB_APP_PRIVATE_KEY present ($KEY_LINES lines, $KEY_CHARS chars)"
        # Verify PEM format
        if ! echo "$GITHUB_APP_PRIVATE_KEY" | grep -q "BEGIN RSA PRIVATE KEY"; then
            echo "  ⚠️ Private key does not appear to be in PEM format"
        else
            echo "  ✓ Private key is in PEM format"
        fi
    fi

    if [ -n "${GITHUB_APP_ID:-}" ] && [ -n "${GITHUB_APP_PRIVATE_KEY:-}" ]; then
        # Create JWT using temp file for private key (more robust than process substitution)
        NOW=$(date +%s)
        IAT=$((NOW - 60))
        EXP=$((NOW + 600))
        
        HEADER=$(echo -n '{"alg":"RS256","typ":"JWT"}' | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
        PAYLOAD=$(echo -n "{\"iat\":${IAT},\"exp\":${EXP},\"iss\":\"${GITHUB_APP_ID}\"}" | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
        
        # Use temp file instead of process substitution for OpenSSL signing
        KEY_FILE=$(mktemp)
        echo "$GITHUB_APP_PRIVATE_KEY" > "$KEY_FILE"
        chmod 600 "$KEY_FILE"
        SIGNATURE=$(echo -n "${HEADER}.${PAYLOAD}" | openssl dgst -sha256 -sign "$KEY_FILE" | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
        rm -f "$KEY_FILE"
        JWT="${HEADER}.${PAYLOAD}.${SIGNATURE}"
        
        # Get installation token with retries
        INSTALLATIONS=$(retry_curl -s --max-time 30 -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations")
        INSTALLATION_ID=$(echo "$INSTALLATIONS" | jq -r '.[0].id')
        
        if [ -n "$INSTALLATION_ID" ] && [ "$INSTALLATION_ID" != "null" ]; then
            TOKEN_RESPONSE=$(retry_curl -s --max-time 30 -X POST -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens")
            GITHUB_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token')
            
            if [ -n "$GITHUB_TOKEN" ] && [ "$GITHUB_TOKEN" != "null" ]; then
                export GITHUB_TOKEN
                export GH_TOKEN="$GITHUB_TOKEN"
                # Store credentials in a file and configure git to use it
                # Fall back to /tmp if home isn't writable
                CRED_FILE="$HOME/.git-credentials"
                if ! mkdir -p "$HOME" 2>/dev/null || ! touch "$CRED_FILE" 2>/dev/null; then
                    CRED_FILE="/tmp/.git-credentials"
                fi
                echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > "$CRED_FILE"
                chmod 600 "$CRED_FILE"
                # Configure git to use credential file (use XDG config if home not writable)
                export GIT_CONFIG_GLOBAL="/tmp/.gitconfig"
                git config --file="$GIT_CONFIG_GLOBAL" credential.helper "store --file=$CRED_FILE"
                git config --file="$GIT_CONFIG_GLOBAL" url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
                export GIT_TERMINAL_PROMPT=0
                echo "✅ GitHub authentication configured (token-based)"
            else
                echo "❌ Could not get installation token"
                exit 1
            fi
        else
            echo "❌ Could not get installation ID"
            exit 1
        fi
    else
        echo "❌ GitHub App credentials not provided"
        exit 1
    fi
    echo ""

    # =========================================================================
    # Repository Setup
    # =========================================================================

    # Normalize repo name from project name
    REPO_NAME=$(echo "$PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-*//;s/-*$//')

    if [ -z "$REPOSITORY_URL" ] || [ "$REPOSITORY_URL" = "null" ]; then
        # =====================================================================
        # Create New Repository
        # =====================================================================
        echo "🆕 No repository provided - creating new repository"
        activity_action "Create repository" "$GITHUB_DEFAULT_ORG/$REPO_NAME"
        
        FULL_REPO_NAME="${GITHUB_DEFAULT_ORG}/${REPO_NAME}"
        
        # Check if repo already exists
        if gh repo view "$FULL_REPO_NAME" &>/dev/null; then
            echo "  ⚠️ Repository $FULL_REPO_NAME already exists"
            REPOSITORY_URL="https://github.com/${FULL_REPO_NAME}"
        else
            echo "  → Creating $GITHUB_VISIBILITY repository: $FULL_REPO_NAME"
            gh repo create "$FULL_REPO_NAME" \
                --"$GITHUB_VISIBILITY" \
                --description "Generated from Linear intake: $PROJECT_NAME" \
                || { echo "❌ Failed to create repository"; exit 1; }
            
            REPOSITORY_URL="https://github.com/${FULL_REPO_NAME}"
            echo "  ✅ Created repository: $REPOSITORY_URL"
            
            # Initialize with README
            CLONE_DIR="/tmp/repo-init-$(date +%s)"
            git clone "$REPOSITORY_URL" "$CLONE_DIR" 2>/dev/null || {
                # New repo may be empty, init manually
                mkdir -p "$CLONE_DIR"
                cd "$CLONE_DIR"
                git init
                git remote add origin "$REPOSITORY_URL"
            }
            cd "$CLONE_DIR"
            git config user.name "Morgan Intake"
            git config user.email "morgan@5dlabs.com"
            
            if [ ! -f README.md ]; then
                echo "# $PROJECT_NAME" > README.md
                echo "" >> README.md
                echo "Generated by CTO Agent intake workflow." >> README.md
                git add README.md
                git commit -m "chore: initial commit"
                git branch -M main
                git push -u origin main
                echo "  ✅ Initialized repository with README"
            fi
        fi
    else
        # =====================================================================
        # Use Existing Repository
        # =====================================================================
        echo "📂 Using existing repository: $REPOSITORY_URL"
        activity_action "Use existing repository" "$REPOSITORY_URL"
        
        # Verify repo is accessible
        REPO_PATH=$(echo "$REPOSITORY_URL" | sed 's|https://github.com/||' | sed 's|\.git$||')
        if ! gh repo view "$REPO_PATH" &>/dev/null; then
            echo "❌ Cannot access repository: $REPOSITORY_URL"
            exit 1
        fi
        echo "  ✅ Repository accessible"
    fi

    # Write repository URL early (so Argo can capture it even if later steps fail)
    echo "$REPOSITORY_URL" > /tmp/repository-url

    # =========================================================================
    # Webhook Setup (Optional)
    # =========================================================================

    if [ -n "$WEBHOOK_CALLBACK_URL" ] && [ "$WEBHOOK_CALLBACK_URL" != "null" ]; then
        echo ""
        echo "🔗 Setting up GitHub webhook..."
        activity_action "Setup webhook" "$WEBHOOK_CALLBACK_URL"
        
        REPO_PATH=$(echo "$REPOSITORY_URL" | sed 's|https://github.com/||' | sed 's|\.git$||')
        
        # Retry wrapper for gh api (if not already defined)
        retry_gh_webhook() {
            local max_attempts=3
            local attempt=1
            local delay=5
            local exit_code=0
            local result=""
            while [ $attempt -le $max_attempts ]; do
                set +e
                result=$(gh api "$@" 2>&1)
                exit_code=$?
                set -e
                if [ $exit_code -eq 0 ]; then
                    echo "$result"
                    return 0
                fi
                echo "  ⚠️ gh api attempt $attempt/$max_attempts failed, retrying in ${delay}s..." >&2
                sleep $delay
                delay=$((delay * 2))
                attempt=$((attempt + 1))
            done
            echo "$result"
            return $exit_code
        }
        
        # Check if webhook already exists (with retry)
        EXISTING_WEBHOOK=$(retry_gh_webhook "repos/${REPO_PATH}/hooks" 2>/dev/null | jq -r ".[] | select(.config.url == \"${WEBHOOK_CALLBACK_URL}\") | .id" || echo "")
        
        if [ -n "$EXISTING_WEBHOOK" ]; then
            echo "  ⚠️ Webhook already exists (ID: $EXISTING_WEBHOOK)"
            activity_action_complete "Webhook configured" "${REPO_PATH}" "Already exists (id: ${EXISTING_WEBHOOK})"
        else
            # Create webhook using JSON input (ensures correct types for booleans)
            printf '{"name":"web","active":true,"events":["push","pull_request","check_run","check_suite"],"config":{"url":"%s","content_type":"json"}}' "${WEBHOOK_CALLBACK_URL}" > /tmp/webhook-input.json

            if OUT=$(retry_gh_webhook --method POST "repos/${REPO_PATH}/hooks" --input /tmp/webhook-input.json 2>&1); then
                echo "  ✅ Webhook created"
                activity_action_complete "Webhook configured" "${REPO_PATH}" "Created webhook for ${WEBHOOK_CALLBACK_URL}"
            else
                echo "  ❌ Failed to create webhook"
                activity_error "Webhook creation failed for ${REPO_PATH}.\n\nURL: ${WEBHOOK_CALLBACK_URL}\n\n---\n${OUT}\n---"
                # Non-fatal: continue even if webhook fails (permissions issue)
            fi
        fi
    fi

    # =========================================================================
    # Branch Protection (Optional but recommended)
    # =========================================================================

    # Retry wrapper for gh api with exponential backoff
    retry_gh_api() {
        local max_attempts=3
        local attempt=1
        local delay=5
        local exit_code=0
        local result=""
        while [ $attempt -le $max_attempts ]; do
            set +e
            result=$(gh api "$@" 2>&1)
            exit_code=$?
            set -e
            if [ $exit_code -eq 0 ]; then
                echo "$result"
                return 0
            fi
            echo "  ⚠️ gh api attempt $attempt/$max_attempts failed, retrying in ${delay}s..." >&2
            sleep $delay
            delay=$((delay * 2))
            attempt=$((attempt + 1))
        done
        echo "$result"
        return $exit_code
    }

    REPO_PATH=$(echo "$REPOSITORY_URL" | sed 's|https://github.com/||' | sed 's|\.git$||')
    BRANCH_NAME="main"

    echo ""
    echo "🔒 Ensuring branch protection on ${BRANCH_NAME}..."
    activity_action "Protect branch" "${REPO_PATH}:${BRANCH_NAME}"

    # Check if protection already exists (with retry)
    if retry_gh_api "repos/${REPO_PATH}/branches/${BRANCH_NAME}/protection" >/tmp/branch-protection.json 2>/dev/null; then
        echo "  ✅ Branch protection already enabled"
        SUMMARY=$(jq -r '"- requiredApprovingReviews: \(.required_pull_request_reviews.required_approving_review_count // 0)\n- requireCodeOwnerReviews: \(.required_pull_request_reviews.require_code_owner_reviews // false)\n- allowForcePushes: \(.allow_force_pushes.enabled // false)\n- allowDeletions: \(.allow_deletions.enabled // false)"' /tmp/branch-protection.json 2>/dev/null || echo "- existing protection detected")
        activity_action_complete "Branch protected" "${REPO_PATH}:${BRANCH_NAME}" "Already enabled.\n\n${SUMMARY}"
    else
        # Apply branch protection using JSON input (ensures correct types)
        printf '{"required_status_checks":null,"enforce_admins":false,"required_pull_request_reviews":{"dismiss_stale_reviews":true,"require_code_owner_reviews":false,"required_approving_review_count":1},"restrictions":null,"required_linear_history":true,"allow_force_pushes":false,"allow_deletions":false}' > /tmp/branch-protection-input.json

        if OUT=$(retry_gh_api --method PUT "repos/${REPO_PATH}/branches/${BRANCH_NAME}/protection" \
            -H "Accept: application/vnd.github+json" \
            --input /tmp/branch-protection-input.json 2>&1); then
            echo "  ✅ Branch protection applied"
            activity_action_complete "Branch protected" "${REPO_PATH}:${BRANCH_NAME}" "Applied branch protection (1 review required, no force push)"
        else
            echo "  ⚠️ Could not apply branch protection"
            activity_error "Branch protection failed for ${REPO_PATH}:${BRANCH_NAME}.\n\n---\n${OUT}\n---"
            # Non-fatal: continue even if branch protection fails
        fi
    fi

    # =========================================================================
    # Output
    # =========================================================================

    echo ""
    echo "════════════════════════════════════════════════════════════════"
    echo "✅ GitHub preparation complete"
    echo "  Repository URL: $REPOSITORY_URL"
    echo "════════════════════════════════════════════════════════════════"

    activity_action_complete "GitHub prep complete" "$REPOSITORY_URL" "Repository ready"

  # Intake workflow script - parses PRD and generates tasks
  # NOTE: This script expects REPOSITORY_URL to be valid (set by github_prep step)
  intake_intake.sh: |
    #!/bin/bash
    set -euo pipefail

    # =========================================================================
    # Linear Agent Activity helpers (optional)
    # =========================================================================
    activity_enabled() {
        command -v pm-activity >/dev/null 2>&1 && \
          [ -n "${LINEAR_SESSION_ID:-}" ] && \
          [ -n "${LINEAR_API_TOKEN:-}" ]
    }

    activity_thought() {
        local body="$1"
        if activity_enabled; then
            pm-activity thought --persistent "$body" >/dev/null 2>&1 || true
        fi
    }

    activity_thought_ephemeral() {
        local body="$1"
        if activity_enabled; then
            pm-activity thought "$body" >/dev/null 2>&1 || true
        fi
    }

    activity_action() {
        local action="$1"
        local parameter="$2"
        if activity_enabled; then
            pm-activity action "$action" "$parameter" >/dev/null 2>&1 || true
        fi
    }

    activity_action_complete() {
        local action="$1"
        local parameter="$2"
        local result="$3"
        if activity_enabled; then
            pm-activity action-complete "$action" "$parameter" "$result" >/dev/null 2>&1 || true
        fi
    }

    activity_error() {
        local body="$1"
        if activity_enabled; then
            pm-activity error "$body" >/dev/null 2>&1 || true
        fi
    }

    # =========================================================================
    # Unified Intake Script
    # This script runs the tasks CLI to parse PRD and generate documentation
    # NOTE: Repository must already exist (created by github_prep step)
    # =========================================================================

    echo "🚀 Starting Unified Intake Process"
    echo "================================="
    echo "📍 Script version: unified-intake v2.1.0 (tasks CLI)"
    echo "📅 Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    echo "📦 Pod: ${HOSTNAME:-unknown}"
    echo ""

    activity_thought "Intake started for ${LINEAR_ISSUE_IDENTIFIER:-unknown} (${HOSTNAME:-unknown})"

    # =========================================================================
    # Phase 1: Configuration and Environment Setup
    # =========================================================================
    echo "📋 Phase 1: Configuration and Environment Setup"
    echo "================================================"

    CONFIG_FILE="/intake-files/config.json"

    # Support both .txt and .md PRD files
    if [ -f "/intake-files/prd.txt" ]; then
        PRD_FILE="/intake-files/prd.txt"
    elif [ -f "/intake-files/prd.md" ]; then
        PRD_FILE="/intake-files/prd.md"
    else
        echo "❌ No PRD file found (tried prd.txt, prd.md)"
        exit 1
    fi

    ARCH_FILE="/intake-files/architecture.md"

    if [ ! -f "$CONFIG_FILE" ]; then
        echo "❌ Configuration file not found at $CONFIG_FILE"
        exit 1
    fi

    echo "📄 Loading configuration..."
    PROJECT_NAME=$(jq -r '.project_name' "$CONFIG_FILE")
    
    # Get repository URL from:
    # 1. REPOSITORY_URL env var (set by workflow from github-prep output)
    # 2. Fallback to config file
    if [ -n "${REPOSITORY_URL:-}" ] && [ "$REPOSITORY_URL" != "null" ]; then
        echo "  → Using repository URL from workflow parameter"
    else
        REPOSITORY_URL=$(jq -r '.repository_url // ""' "$CONFIG_FILE")
    fi
    
    GITHUB_APP=$(jq -r '.github_app // "5DLabs-Morgan"' "$CONFIG_FILE")
    PRIMARY_MODEL=$(jq -r '.primary_model // "claude-sonnet-4-5-20250929"' "$CONFIG_FILE")
    NUM_TASKS=$(jq -r '.num_tasks // 15' "$CONFIG_FILE")
    EXPAND_TASKS=$(jq -r '.expand_tasks // true' "$CONFIG_FILE")
    ANALYZE_COMPLEXITY=$(jq -r '.analyze_complexity // true' "$CONFIG_FILE")

    echo "  ✓ Project: $PROJECT_NAME"
    echo "  ✓ Repository: $REPOSITORY_URL"
    echo "  ✓ GitHub App: $GITHUB_APP"
    echo "  ✓ Model: $PRIMARY_MODEL"
    echo "  ✓ Tasks: ~$NUM_TASKS"
    echo ""

    activity_action "Intake: configure" "$PROJECT_NAME"

    # Validate repository URL
    if [ -z "$REPOSITORY_URL" ] || [ "$REPOSITORY_URL" = "null" ]; then
        echo "❌ Repository URL not set. Did github_prep step run?"
        exit 1
    fi

    # =========================================================================
    # Phase 2: GitHub Authentication
    # =========================================================================
    echo "🔐 Setting up GitHub App authentication..."

    # Generate GitHub token from app credentials
    if [ -n "${GITHUB_APP_ID:-}" ] && [ -n "${GITHUB_APP_PRIVATE_KEY:-}" ]; then
        echo "Generating fresh GitHub App token..."
        
        # Create JWT using temp file for private key (more robust than process substitution)
        NOW=$(date +%s)
        IAT=$((NOW - 60))
        EXP=$((NOW + 600))
        
        HEADER=$(echo -n '{"alg":"RS256","typ":"JWT"}' | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
        PAYLOAD=$(echo -n "{\"iat\":${IAT},\"exp\":${EXP},\"iss\":\"${GITHUB_APP_ID}\"}" | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
        
        # Use temp file instead of process substitution for OpenSSL signing
        KEY_FILE=$(mktemp)
        echo "$GITHUB_APP_PRIVATE_KEY" > "$KEY_FILE"
        chmod 600 "$KEY_FILE"
        SIGNATURE=$(echo -n "${HEADER}.${PAYLOAD}" | openssl dgst -sha256 -sign "$KEY_FILE" | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
        rm -f "$KEY_FILE"
        JWT="${HEADER}.${PAYLOAD}.${SIGNATURE}"
        
        # Get installation token
        INSTALLATIONS=$(curl -s --max-time 30 -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations")
        INSTALLATION_ID=$(echo "$INSTALLATIONS" | jq -r '.[0].id')
        
        if [ -n "$INSTALLATION_ID" ] && [ "$INSTALLATION_ID" != "null" ]; then
            TOKEN_RESPONSE=$(curl -s --max-time 30 -X POST -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens")
            GITHUB_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token')
            
            if [ -n "$GITHUB_TOKEN" ] && [ "$GITHUB_TOKEN" != "null" ]; then
                export GITHUB_TOKEN
                export GH_TOKEN="$GITHUB_TOKEN"
                # Store credentials in a file and configure git to use it
                # Fall back to /tmp if home isn't writable
                CRED_FILE="$HOME/.git-credentials"
                if ! mkdir -p "$HOME" 2>/dev/null || ! touch "$CRED_FILE" 2>/dev/null; then
                    CRED_FILE="/tmp/.git-credentials"
                fi
                echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > "$CRED_FILE"
                chmod 600 "$CRED_FILE"
                # Configure git to use credential file (use XDG config if home not writable)
                export GIT_CONFIG_GLOBAL="/tmp/.gitconfig"
                git config --file="$GIT_CONFIG_GLOBAL" credential.helper "store --file=$CRED_FILE"
                git config --file="$GIT_CONFIG_GLOBAL" url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
                export GIT_TERMINAL_PROMPT=0
                echo "✅ GitHub authentication configured (token-based)"
            else
                echo "⚠️ Could not get installation token, using default auth"
            fi
        else
            echo "⚠️ Could not get installation ID, using default auth"
        fi
    else
        echo "⚠️ GitHub App credentials not provided, using default auth"
    fi
    echo ""

    # =========================================================================
    # Phase 3: Repository Clone
    # =========================================================================
    echo "📦 Phase 2: Repository Clone and Setup"
    echo "======================================="

    # Retry wrapper for git with exponential backoff
    retry_git() {
        local max_attempts=3
        local attempt=1
        local delay=5
        local exit_code=0
        while [ $attempt -le $max_attempts ]; do
            set +e
            git "$@"
            exit_code=$?
            set -e
            if [ $exit_code -eq 0 ]; then
                return 0
            fi
            echo "  ⚠️ Git attempt $attempt/$max_attempts failed (exit code $exit_code), retrying in ${delay}s..." >&2
            sleep $delay
            delay=$((delay * 2))
            attempt=$((attempt + 1))
        done
        return $exit_code
    }

    CLONE_DIR="/tmp/repo-$(date +%s)"
    echo "📂 Cloning repository to: $CLONE_DIR"
    activity_action "Clone repository" "$REPOSITORY_URL"

    retry_git clone "$REPOSITORY_URL" "$CLONE_DIR" || exit 1
    cd "$CLONE_DIR" || exit 1
    activity_action_complete "Cloned repository" "$REPOSITORY_URL" "Clone complete"

    git config user.name "Morgan Intake"
    git config user.email "morgan@5dlabs.com"

    # Normalize project directory name
    PROJECT_DIR_NAME=$(echo "$PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-*//;s/-*$//')
    PROJECT_DIR="$CLONE_DIR/$PROJECT_DIR_NAME"
    mkdir -p "$PROJECT_DIR"
    cd "$PROJECT_DIR" || exit 1

    # =========================================================================
    # Phase 4: Prepare Input Files
    # =========================================================================
    echo ""
    echo "📝 Setting up input files..."

    mkdir -p .tasks/docs
    cp "$PRD_FILE" ".tasks/docs/prd.txt"
    [ -f "$ARCH_FILE" ] && [ -s "$ARCH_FILE" ] && cp "$ARCH_FILE" ".tasks/docs/architecture.md"

    # =========================================================================
    # Phase 5: Run Intake (API mode or CLI mode)
    # =========================================================================
    echo ""
    echo "🚀 Phase 3: Running intake (mode=${INTAKE_MODE:-api})"
    echo "======================================================="

    OUTPUT_FILE="$(mktemp)"

    if [ "${INTAKE_MODE:-api}" = "cli" ]; then
        # =====================================================================
        # CLI Mode: Use Claude/Factory CLI with stream-json output
        # The status-sync sidecar will parse the stream and send to Linear
        # =====================================================================
        echo "📡 Using CLI mode with real-time streaming to Linear"

        # Determine which CLI to use
        CLI_NAME="${INTAKE_CLI:-claude}"
        echo "  → CLI: $CLI_NAME"

        # Initialize the stream file for sidecar
        STREAM_FILE="${CLAUDE_STREAM_FILE:-/workspace-shared/claude-stream.jsonl}"
        touch "$STREAM_FILE"
        echo "  → Stream file: $STREAM_FILE"

        # Build the intake prompt for Claude
        # IMPORTANT: Write prompt to a file in the workspace for Claude to read
        # PRD may contain backticks, dollar signs, parentheses, etc. that would
        # break shell expansion if passed via command substitution $()
        # Instead, we tell Claude to read the file directly from the workspace
        INTAKE_PROMPT_FILE=".tasks/INTAKE_PROMPT.md"
        {
            echo "# Morgan Intake Task"
            echo ""
            echo "You are Morgan, an expert project manager and task decomposition specialist."
            echo ""
            echo "## Your Task"
            echo ""
            echo "Analyze the PRD below and generate $NUM_TASKS well-structured tasks."
            echo ""
            echo "## PRD Content"
            echo ""
            cat .tasks/docs/prd.txt
            echo ""
            if [ -f ".tasks/docs/architecture.md" ]; then
                echo "## Architecture"
                echo ""
                cat .tasks/docs/architecture.md
                echo ""
            fi
            echo "## Output Requirements"
            echo ""
            echo "Create atomic tasks with acceptance criteria, dependencies, and agent assignments."
            echo "Save output to .tasks/tasks/tasks.json as JSON with a tasks array."
            echo "Each task should have: id, title, description, agent, dependencies, acceptance_criteria."
            echo ""
            echo "The agents available are:"
            echo "  Rex - Rust backend (axum, tokio, sqlx)"
            echo "  Blaze - React/TypeScript frontend (Next.js, shadcn/ui)"
            echo "  Grizz - Go backend (chi, grpc)"
            echo "  Nova - Node.js/Bun backend (Elysia, Effect)"
            echo "  Tap - Expo mobile app"
            echo "  Spark - Electron desktop app"
            echo "  Bolt - Infrastructure setup (Task 1 - databases, caches)"
            echo "  Cleo - Quality assurance"
            echo "  Cipher - Security analysis"
            echo "  Tess - Testing"
            echo "  Atlas - Integration"
            echo ""
            echo "Task 1 should always be Bolt for infrastructure setup if databases/caches are needed."
        } > "$INTAKE_PROMPT_FILE"

        echo "  → Prompt file: $INTAKE_PROMPT_FILE ($(wc -c < "$INTAKE_PROMPT_FILE") bytes)"

        # Build Claude CLI command with stream-json output
        # Use --dangerously-skip-permissions for non-interactive mode
        # --verbose is required when using --print with --output-format stream-json
        if [ "$CLI_NAME" = "claude" ] || [ "$CLI_NAME" = "factory" ]; then
            CLAUDE_ARGS="--verbose --output-format stream-json --dangerously-skip-permissions"
            [ -n "$PRIMARY_MODEL" ] && [ "$PRIMARY_MODEL" != "null" ] && CLAUDE_ARGS="$CLAUDE_ARGS --model opus"
        else
            echo "❌ Unsupported CLI: $CLI_NAME"
            exit 1
        fi

        activity_action "Run Claude CLI intake" "$CLI_NAME"

        echo "  → Running Claude CLI with stream-json..."
        set +e
        # Run Claude with a simple prompt that tells it to read the file
        # This avoids ALL shell escaping issues since the PRD content stays in the file
        # Claude will read INTAKE_PROMPT.md as part of its workspace context
        claude -p "Read the file .tasks/INTAKE_PROMPT.md and follow all instructions within it. Generate the tasks.json file as specified." $CLAUDE_ARGS 2>&1 | tee "$STREAM_FILE" | tee "$OUTPUT_FILE"
        INTAKE_EXIT="${PIPESTATUS[0]}"
        set -e

        # Signal completion to sidecar
        echo '{"type":"result","result":{"type":"success"}}' >> "$STREAM_FILE"

        if [ "$INTAKE_EXIT" -ne 0 ]; then
            SNIPPET="$(tail -n 80 "$OUTPUT_FILE" 2>/dev/null || true)"
            activity_error "Claude CLI intake failed (exit $INTAKE_EXIT)\n\nLast output:\n\n$SNIPPET"
            exit "$INTAKE_EXIT"
        fi
        activity_thought_ephemeral "Claude CLI intake completed"

        # =====================================================================
        # Generate per-task documentation using tasks CLI
        # =====================================================================
        echo "📝 Generating per-task documentation..."
        TASKS_FILE=".tasks/tasks/tasks.json"
        if [ -f "$TASKS_FILE" ]; then
            TASK_COUNT=$(jq '.tasks | length' "$TASKS_FILE")
            echo "  → Found $TASK_COUNT tasks, generating docs..."
            
            # Export environment variables for cto-config.json generation
            export REPOSITORY=$(echo "$REPOSITORY_URL" | sed 's|https://github.com/||' | sed 's|\.git$||')
            export SERVICE="$PROJECT_DIR_NAME"
            export DOCS_REPOSITORY="$REPOSITORY"
            export PROJECT_NAME="$PROJECT_DIR_NAME"
            
            # Use tasks CLI to generate proper documentation structure
            # This creates task-{N}/prompt.xml, prompt.md, acceptance.md
            if command -v tasks >/dev/null 2>&1; then
                tasks generate-docs --output .tasks/docs 2>&1 || {
                    echo "⚠️ tasks generate-docs failed, continuing without per-task docs"
                }
                
                # Generate cto-config.json with per-agent tool configurations
                echo "📋 Generating cto-config.json..."
                tasks generate-config --output . 2>&1 || {
                    echo "⚠️ tasks generate-config failed, continuing without cto-config"
                }
            else
                echo "⚠️ tasks CLI not available, skipping per-task doc generation"
            fi
            echo "✅ Task documentation generation completed"
        else
            echo "⚠️ tasks.json not found, skipping documentation generation"
        fi
    else
        # =====================================================================
        # API Mode: Use tasks CLI (direct API calls, faster)
        # =====================================================================
        echo "📋 Using API mode with tasks CLI"

        # Verify tasks CLI is available
        if ! command -v tasks &> /dev/null; then
            echo "❌ tasks CLI not found in PATH"
            exit 1
        fi
        echo "✓ tasks CLI found: $(which tasks)"
        tasks --version 2>&1 || true

        # Export environment variables for cto-config.json generation
        # The tasks CLI will use these to generate per-agent tool configurations
        export REPOSITORY=$(echo "$REPOSITORY_URL" | sed 's|https://github.com/||' | sed 's|\.git$||')
        export SERVICE="$PROJECT_DIR_NAME"
        export DOCS_REPOSITORY="$REPOSITORY"
        export PROJECT_NAME="$PROJECT_DIR_NAME"
        echo "  → Repository: $REPOSITORY"
        echo "  → Service: $SERVICE"

        # Build intake command
        INTAKE_CMD="tasks intake --prd .tasks/docs/prd.txt --num-tasks $NUM_TASKS"

        # Add architecture if present
        [ -f ".tasks/docs/architecture.md" ] && INTAKE_CMD="$INTAKE_CMD --architecture .tasks/docs/architecture.md"

        # Add model if specified
        [ -n "$PRIMARY_MODEL" ] && [ "$PRIMARY_MODEL" != "null" ] && INTAKE_CMD="$INTAKE_CMD --model $PRIMARY_MODEL"

        # Optionally skip expansion/analysis
        [ "$EXPAND_TASKS" = "false" ] && INTAKE_CMD="$INTAKE_CMD --no-expand"
        [ "$ANALYZE_COMPLEXITY" = "false" ] && INTAKE_CMD="$INTAKE_CMD --no-analyze"

        activity_action "Run tasks intake" "$INTAKE_CMD"

        echo "  → Running: $INTAKE_CMD"
        set +e
        eval "$INTAKE_CMD" 2>&1 | tee "$OUTPUT_FILE"
        INTAKE_EXIT="${PIPESTATUS[0]}"
        set -e

        if [ "$INTAKE_EXIT" -ne 0 ]; then
            SNIPPET="$(tail -n 80 "$OUTPUT_FILE" 2>/dev/null || true)"
            activity_error "tasks intake failed (exit $INTAKE_EXIT)\n\nLast output:\n\n$SNIPPET"
            exit "$INTAKE_EXIT"
        fi
        activity_thought_ephemeral "tasks intake completed successfully"
    fi

    # Verify tasks were generated
    TASKS_FILE=".tasks/tasks/tasks.json"
    if [ ! -f "$TASKS_FILE" ]; then
        echo "❌ tasks.json not found at $TASKS_FILE"
        exit 1
    fi

    TASK_COUNT=$(jq '.tasks | length' "$TASKS_FILE")
    echo "✅ Generated $TASK_COUNT tasks with documentation"
    SNIPPET="$(tail -n 60 "$OUTPUT_FILE" 2>/dev/null || true)"
    activity_action_complete "Generated tasks" "$TASK_COUNT tasks" "tasks.json created.\n\nLast output:\n\n$SNIPPET"

    # =========================================================================
    # Phase 5: Create Linear Project and Issues
    # =========================================================================
    echo ""
    echo "📊 Phase 5: Creating Linear Project and Issues"
    echo "==============================================="

    PM_SERVER_URL="${PM_SERVER_URL:-http://pm-server.cto.svc.cluster.local:8080}"

    if [ -n "${LINEAR_SESSION_ID:-}" ] && [ -n "${LINEAR_ISSUE_ID:-}" ]; then
        echo "  → Creating Linear project and task issues..."
        activity_thought "Creating Linear project and issues for $TASK_COUNT tasks"

        # Build the callback payload
        TASKS_JSON_CONTENT=$(cat "$TASKS_FILE")

        CALLBACK_PAYLOAD=$(jq -n \
            --arg sessionId "${LINEAR_SESSION_ID}" \
            --arg issueId "${LINEAR_ISSUE_ID}" \
            --arg issueIdentifier "${LINEAR_ISSUE_IDENTIFIER:-unknown}" \
            --arg teamId "${LINEAR_TEAM_ID}" \
            --arg workflowName "${WORKFLOW_NAME:-intake}" \
            --argjson tasks "$TASKS_JSON_CONTENT" \
            '{
                sessionId: $sessionId,
                issueId: $issueId,
                issueIdentifier: $issueIdentifier,
                teamId: $teamId,
                tasks: $tasks.tasks,
                workflowName: $workflowName,
                success: true
            }')

        # Call PM server to create Linear project and issues
        CALLBACK_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${PM_SERVER_URL}/callbacks/intake-complete" \
            -H "Content-Type: application/json" \
            -d "$CALLBACK_PAYLOAD" 2>&1) || true

        HTTP_CODE=$(echo "$CALLBACK_RESPONSE" | tail -n1)
        RESPONSE_BODY=$(echo "$CALLBACK_RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" = "200" ]; then
            echo "  ✅ Linear project and issues created successfully"
            activity_action_complete "Linear issues created" "$TASK_COUNT issues" "Project board ready for review"
        else
            echo "  ⚠️ Failed to create Linear issues (HTTP $HTTP_CODE)"
            echo "  Response: $RESPONSE_BODY"
            activity_error "Failed to create Linear issues.\n\nHTTP $HTTP_CODE\n\n$RESPONSE_BODY"
            # Non-fatal: continue with PR creation even if Linear fails
        fi
    else
        echo "  ⚠️ LINEAR_SESSION_ID or LINEAR_ISSUE_ID not set, skipping Linear integration"
    fi

    # =========================================================================
    # Phase 6: Create Pull Request
    # =========================================================================
    echo ""
    echo "🔀 Phase 6: Creating Pull Request"
    echo "=================================="

    cd "$CLONE_DIR" || exit 1

    BRANCH_NAME="intake-${PROJECT_DIR_NAME}-$(date +%Y%m%d-%H%M%S)"
    git checkout -b "$BRANCH_NAME"
    git add -A
    git commit -m "feat: intake for $PROJECT_NAME

    - $TASK_COUNT tasks generated
    - XML + Markdown documentation per task
    - Agent routing hints added
    - Complexity analysis: $ANALYZE_COMPLEXITY
    - Task expansion: $EXPAND_TASKS

    🤖 Generated by Morgan (tasks CLI v2)"

    git push -u origin "$BRANCH_NAME"

    # Build intake metadata JSON for PR body (used by webhook handler on merge)
    INTAKE_METADATA="<!-- intake-metadata: {\"session_id\":\"${LINEAR_SESSION_ID:-}\",\"prd_issue_id\":\"${LINEAR_ISSUE_ID:-}\",\"prd_identifier\":\"${LINEAR_ISSUE_IDENTIFIER:-}\",\"team_id\":\"${LINEAR_TEAM_ID:-}\",\"project_name\":\"${PROJECT_NAME}\",\"project_dir\":\"${PROJECT_DIR_NAME}\"} -->"

    # Ensure cto-intake label exists (create if missing)
    REPO_PATH=$(echo "$REPOSITORY_URL" | sed 's|https://github.com/||' | sed 's|\.git$||')
    LABEL_NAME="cto-intake"
    if ! gh label list --repo "$REPO_PATH" --json name -q ".[].name" 2>/dev/null | grep -q "^${LABEL_NAME}$"; then
        echo "  → Creating label: $LABEL_NAME"
        gh label create "$LABEL_NAME" \
            --repo "$REPO_PATH" \
            --description "CTO Agent intake PR - merge to trigger play workflow" \
            --color "7057ff" 2>/dev/null || echo "  ⚠️ Could not create label (may require admin permissions)"
    fi

    # Create PR body
    PR_BODY="${INTAKE_METADATA}

    ## Intake: $PROJECT_NAME

    ### Generated Structure
    \`\`\`
    $PROJECT_DIR_NAME/
    ├── .tasks/
    │   ├── docs/
    │   │   ├── prd.txt
    │   │   ├── architecture.md (if provided)
    │   │   └── task-*/
    │   │       ├── prompt.xml
    │   │       ├── prompt.md
    │   │       └── acceptance.md
    │   ├── tasks/
    │   │   └── tasks.json
    │   └── reports/
    │       └── complexity-report.json
    \`\`\`

    ### Stats
    - **Tasks**: $TASK_COUNT
    - **Model**: $PRIMARY_MODEL
    - **Expansion**: $EXPAND_TASKS
    - **Complexity**: $ANALYZE_COMPLEXITY

    🤖 Generated by Morgan (tasks CLI v2)"

    # Try to create PR with label, fall back to without label if it fails
    if ! gh pr create \
        --title "🚀 Intake: $PROJECT_NAME" \
        --label "$LABEL_NAME" \
        --body "$PR_BODY" \
        --head "$BRANCH_NAME" \
        --base main 2>/dev/null; then
        echo "  ⚠️ PR creation with label failed, trying without label..."
        gh pr create \
            --title "🚀 Intake: $PROJECT_NAME" \
            --body "$PR_BODY" \
            --head "$BRANCH_NAME" \
            --base main || echo "⚠️ PR creation failed, branch pushed: $BRANCH_NAME"
    fi

    echo ""
    echo "════════════════════════════════════════════════════════════════"
    echo "║ ✅ Intake completed successfully!"
    echo "════════════════════════════════════════════════════════════════"
