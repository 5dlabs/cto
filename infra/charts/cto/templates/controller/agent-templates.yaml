{{- if .Values.controller.enabled }}
# =============================================================================
# Agent Templates ConfigMaps
# =============================================================================
# These ConfigMaps contain shell scripts used by Argo Workflows to run
# intake and play workflows with different CLI tools.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-agents
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: agents
data:
  # Agent configuration for intake and play workflows
  agents.json: |
    {
      "version": "1.0.0",
      "agents": {
        "intake": {
          "name": "intake",
          "type": "intake",
          "description": "PRD analysis and task generation"
        },
        "play": {
          "name": "play",
          "type": "play",
          "description": "Task implementation"
        }
      }
    }
---
# =============================================================================
# DEPRECATED: controller-agent-templates-intake
# =============================================================================
# This ConfigMap was used by the old Argo workflow-based intake process.
#
# NEW ARCHITECTURE (January 2026):
# - Intake now uses direct CodeRun CR creation from PM server
# - Morgan agent template (templates/agents/morgan/intake.sh.hbs) handles
#   ALL intake tasks including GitHub repo creation
# - Linear sidecar logs all progress to the issue
# - No separate github_prep step needed
#
# This ConfigMap is kept for backwards compatibility with any in-flight
# Argo workflows. New intake requests do NOT use this ConfigMap.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-agent-templates-intake
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-templates
  annotations:
    deprecated: "true"
    deprecation-message: "Intake now uses direct CodeRun creation from PM server"
data:
  # =========================================================================
  # DEPRECATED: github_prep.sh
  # =========================================================================
  # This script was used by the Argo workflow's github-prep step.
  # Now replaced by logic in templates/agents/morgan/intake.sh.hbs
  #
  # The new intake.sh.hbs template handles:
  # 1. Loading config from /intake-files/config.json
  # 2. Creating new repos if no repository_url is provided
  # 3. Cloning existing repos
  # 4. Running the intake CLI
  # 5. Creating the PR
  #
  # ALL progress is logged via Linear sidecar (previously github_prep was silent)
  # =========================================================================
  github_prep.sh: |
    #!/bin/bash
    echo "=============================================="
    echo "DEPRECATED: github_prep.sh"
    echo "=============================================="
    echo ""
    echo "This script is deprecated. Intake now uses direct CodeRun creation."
    echo "If you see this message, an old Argo workflow is still running."
    echo ""
    echo "The new intake flow:"
    echo "  1. PM server creates CodeRun CR directly"
    echo "  2. Controller processes CodeRun"
    echo "  3. Morgan agent handles GitHub setup + intake in single pod"
    echo "  4. Linear sidecar logs all progress"
    echo ""
    echo "GitHub repo creation is now handled in:"
    echo "  templates/agents/morgan/intake.sh.hbs"
    echo ""
    exit 1
---
# =============================================================================
# controller-templates-shared - Shared template partials for agent runtime
# =============================================================================
# These templates are mounted at /templates in agent pods for runtime access.
# Used by integration agents (Atlas, Bolt) and healer workflows.
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-templates-shared
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: templates
data:
  # Placeholder - templates are primarily rendered by controller
  # This ConfigMap provides runtime access to any shared resources
  .keep: |
    # Shared template partials for agent runtime use
    # The controller renders templates into per-job ConfigMaps
    # This ConfigMap provides additional runtime resources if needed
---
# =============================================================================
# controller-templates-integration - Integration templates for Atlas/Bolt
# =============================================================================
# Guardian scripts and integration helpers for infrastructure agents.
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-templates-integration
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: templates
data:
  # Placeholder for integration templates
  .keep: |
    # Integration templates for infrastructure agents (Atlas, Bolt)
    # Used for guardian scripts and runtime integration helpers
---
# =============================================================================
# controller-templates-healer - Healer templates for remediation workflows
# =============================================================================
# Templates and scripts used by healer/remediation CodeRuns.
apiVersion: v1
kind: ConfigMap
metadata:
  name: controller-templates-healer
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: templates
data:
  # Placeholder for healer templates
  .keep: |
    # Healer templates for remediation workflows
    # Used by Rex-Healer, Blaze-Healer, and other healing agents
{{- end }}






