{{- if .Values.controller.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: task-controller-config
  namespace: {{ include "cto.namespace" . }}
  labels:
    {{- include "cto.controller.labels" . | nindent 4 }}
data:
  config.yaml: |
    job:
      activeDeadlineSeconds: 7200
    
    agent:
      image:
        repository: {{ .Values.agent.image.repository | quote }}
        tag: {{ .Values.agent.image.tag | quote }}
      imagePullSecrets:
        - ghcr-secret
      cliImages:
        {{- toYaml .Values.agent.cliImages | nindent 8 }}
    
    # Agent definitions from cto-config.json - maps GitHub App to CLI configuration
    agents:
      morgan:
        githubApp: "5DLabs-Morgan"
        cli: "grok"
        model: "claude-sonnet-4-20250514"
      rex:
        githubApp: "5DLabs-Rex"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      blaze:
        githubApp: "5DLabs-Blaze"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      cleo:
        githubApp: "5DLabs-Cleo"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      tess:
        githubApp: "5DLabs-Tess"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      cipher:
        githubApp: "5DLabs-Cipher"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      grizz:
        githubApp: "5DLabs-Grizz"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      nova:
        githubApp: "5DLabs-Nova"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      tap:
        githubApp: "5DLabs-Tap"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      spark:
        githubApp: "5DLabs-Spark"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      bolt:
        githubApp: "5DLabs-Bolt"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      atlas:
        githubApp: "5DLabs-Atlas"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
      stitch:
        githubApp: "5DLabs-Stitch"
        cli: "claude"
        model: "claude-opus-4-5-20251101"
    
    secrets:
      apiKeySecretName: cto-secrets
      apiKeySecretKey: ANTHROPIC_API_KEY
      cliApiKeys:
        codex:
          secretKey: OPENAI_API_KEY
          envVar: OPENAI_API_KEY
        gemini:
          secretKey: GEMINI_API_KEY
          envVar: GEMINI_API_KEY
        factory:
          secretKey: FACTORY_API_KEY
          envVar: FACTORY_API_KEY
    
    permissions:
      agentToolsOverride: false
      allow:
        - "Bash(*)"
        - "Edit(*)"
        - "Read(*)"
        - "Write(*)"
        - "MultiEdit(*)"
        - "Glob(*)"
        - "Grep(*)"
        - "LS(*)"
      deny:
        - "Bash(npm:install*, yarn:install*, cargo:install*, docker:*, kubectl:*, rm:-rf*, git:*)"
    
    telemetry:
      enabled: true
      otlpEndpoint: "http://otel-collector.observability.svc.cluster.local:4317"
      otlpProtocol: "grpc"
      logsEndpoint: "http://otel-collector.observability.svc.cluster.local:4318"
      logsProtocol: "http"
    
    storage:
      storageClassName: {{ .Values.global.storageClass | default "mayastor" }}
      workspaceSize: "10Gi"
    
    cleanup:
      enabled: true
      successTTLSeconds: 3600
      failureTTLSeconds: 7200
      completedJobDelayMinutes: 5
      failedJobDelayMinutes: 60
      deleteConfigMap: true
    
    linear:
      sidecarImage: {{ .Values.controller.linear.sidecarImage | default "ghcr.io/5dlabs/linear-sidecar:latest" | quote }}
      serviceUrl: {{ .Values.controller.linear.serviceUrl | default "http://pm-server:8080" | quote }}
{{- end }}
