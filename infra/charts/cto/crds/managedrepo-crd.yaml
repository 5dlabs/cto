---
# ManagedRepo CRD - Registry of repositories under CTO intake management
# Group: agents.platform, Version: v1alpha1, Kind: ManagedRepo
# Scope: Cluster (a repository is a global fact; namespace-scoping would
# force duplicate entries per consumer namespace)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: managedrepos.agents.platform
spec:
  group: agents.platform
  scope: Cluster
  names:
    plural: managedrepos
    singular: managedrepo
    kind: ManagedRepo
    shortNames:
    - mrepo
    - mrepos
    - managedrepos
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Owner
      type: string
      jsonPath: .spec.owner
    - name: Name
      type: string
      jsonPath: .spec.name
    - name: LastIntakeTime
      type: date
      jsonPath: .status.lastIntakeTime
    - name: Enabled
      type: boolean
      jsonPath: .spec.enabled
    schema:
      openAPIV3Schema:
        type: object
        required: ["spec"]
        properties:
          spec:
            type: object
            required: ["owner", "name"]
            properties:
              owner:
                type: string
                description: "GitHub owner (user or org), e.g. 5dlabs"
              name:
                type: string
                description: "GitHub repository name, e.g. sigma-1"
              prdPath:
                type: string
                default: "docs/prd.md"
                description: "Path to the PRD markdown inside the repo"
              briefing:
                type: object
                description: "Briefing generation configuration"
                properties:
                  enabled:
                    type: boolean
                    default: true
                    description: "Whether briefing generation is enabled for this repo"
                  voice:
                    type: string
                    default: "alloy"
                    description: "TTS voice to use for the audio briefing"
              enabled:
                type: boolean
                default: true
                description: "Master switch — disable to pause intake without deleting"
          status:
            type: object
            properties:
              lastIntakeRef:
                type: string
                description: "Git ref/sha of the most recent successful intake"
              lastIntakeTime:
                type: string
                description: "RFC3339 timestamp of the most recent successful intake"
              totalIntakes:
                type: integer
                format: int32
                description: "Total number of successful intakes recorded"
              conditions:
                type: array
                description: "Conditions for detailed status tracking"
                items:
                  type: object
                  required: ["type", "status"]
                  properties:
                    type:
                      type: string
                      description: "Type of condition (e.g. 'Ready', 'IntakeSucceeded')"
                    status:
                      type: string
                      description: "Status of the condition (True, False, Unknown)"
                    lastTransitionTime:
                      type: string
                      description: "Last time the condition transitioned (RFC3339)"
                    reason:
                      type: string
                      description: "Reason for the condition's last transition"
                    message:
                      type: string
                      description: "Human-readable message about the condition"
