{{- if .Values.pm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cto-lite.fullname" . }}-pm
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
    app.kubernetes.io/component: pm
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cto-lite.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pm
  template:
    metadata:
      labels:
        {{- include "cto-lite.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pm
    spec:
      serviceAccountName: {{ include "cto-lite.serviceAccountName" . }}
      containers:
        - name: pm
          image: {{ .Values.global.imageRegistry }}/{{ .Values.pm.image.repository }}:{{ .Values.pm.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NAMESPACE
              value: {{ .Values.namespace }}
            - name: RUST_LOG
              value: "info,pm=debug"
            {{- if .Values.pm.github.appId }}
            - name: GITHUB_APP_ID
              value: {{ .Values.pm.github.appId | quote }}
            {{- end }}
          envFrom:
            {{- if .Values.pm.github.privateKeySecret }}
            - secretRef:
                name: {{ .Values.pm.github.privateKeySecret }}
            {{- end }}
            {{- if .Values.secrets.github.enabled }}
            - secretRef:
                name: {{ include "cto-lite.fullname" . }}-github
            {{- end }}
          resources:
            {{- toYaml .Values.pm.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cto-lite.fullname" . }}-pm
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
    app.kubernetes.io/component: pm
spec:
  type: {{ .Values.pm.service.type }}
  ports:
    - port: {{ .Values.pm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cto-lite.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pm
{{- end }}
