{{- if .Values.secrets.anthropic.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cto-lite.fullname" . }}-anthropic
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropic.apiKey | quote }}
---
{{- end }}
{{- if .Values.secrets.openai.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cto-lite.fullname" . }}-openai
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openai.apiKey | quote }}
---
{{- end }}
{{- if .Values.secrets.github.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cto-lite.fullname" . }}-github
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITHUB_TOKEN: {{ .Values.secrets.github.token | quote }}
{{- end }}
