{{- if .Values.toolServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cto-lite.fullname" . }}-tool-server
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
    app.kubernetes.io/component: tool-server
spec:
  replicas: {{ .Values.toolServer.replicas }}
  selector:
    matchLabels:
      {{- include "cto-lite.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tool-server
  template:
    metadata:
      labels:
        {{- include "cto-lite.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tool-server
    spec:
      serviceAccountName: {{ include "cto-lite.serviceAccountName" . }}
      containers:
        - name: tool-server
          image: "{{ .Values.toolServer.image.repository }}:{{ .Values.toolServer.image.tag }}"
          imagePullPolicy: {{ .Values.toolServer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.toolServer.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.toolServer.resources | nindent 12 }}
          env:
            - name: PORT
              value: "{{ .Values.toolServer.port }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cto-lite.fullname" . }}-tool-server
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
    app.kubernetes.io/component: tool-server
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.toolServer.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cto-lite.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tool-server
{{- end }}
