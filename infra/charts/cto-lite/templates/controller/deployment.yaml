{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cto-lite.fullname" . }}-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cto-lite.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "cto-lite.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "cto-lite.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: NAMESPACE
              value: {{ .Values.namespace }}
            - name: STACK
              value: {{ .Values.stack }}
            - name: RUST_LOG
              value: "info,controller=debug"
            - name: CTO_LITE
              value: "true"
            - name: TOOLS_SERVER_URL
              value: "http://{{ include "cto-lite.fullname" . }}-tools:8080"
          envFrom:
            {{- if .Values.secrets.anthropic.enabled }}
            - secretRef:
                name: {{ include "cto-lite.fullname" . }}-anthropic
            {{- end }}
            {{- if .Values.secrets.openai.enabled }}
            - secretRef:
                name: {{ include "cto-lite.fullname" . }}-openai
            {{- end }}
            {{- if .Values.secrets.github.enabled }}
            - secretRef:
                name: {{ include "cto-lite.fullname" . }}-github
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: cto-config
              mountPath: /etc/cto
      volumes:
        - name: cto-config
          configMap:
            name: {{ include "cto-lite.fullname" . }}-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cto-lite.fullname" . }}-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cto-lite.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
{{- end }}
