apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cto-lite.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "version": "1.0.0",
      "orgName": "CTO-Lite",
      "tier": "{{ .Values.tier }}",
      "defaults": {
        "cli": "claude",
        "model": "claude-sonnet-4-20250514",
        "timeout": 1800
      },
      "agents": {
        "morgan": {
          "githubApp": "CTO-Lite-Morgan",
          "cli": "claude",
          "model": "claude-sonnet-4-20250514",
          "tier": "free",
          "description": "Intake agent - analyzes requests and creates tasks",
          "tools": {
            "remote": ["read", "write", "edit", "bash", "git"],
            "localServers": {}
          }
        },
        "grizz": {
          "githubApp": "CTO-Lite-Grizz",
          "cli": "claude",
          "model": "claude-sonnet-4-20250514",
          "tier": "free",
          "description": "Go backend development",
          "stack": "go",
          "tools": {
            "remote": ["read", "write", "edit", "bash", "git", "grep", "glob"],
            "localServers": {}
          }
        },
        "nova": {
          "githubApp": "CTO-Lite-Nova",
          "cli": "claude",
          "model": "claude-sonnet-4-20250514",
          "tier": "free",
