# CTO Lite Default Values
# Local Kind cluster deployment

global:
  imageRegistry: ghcr.io/5dlabs

# Controller - disabled until image is published
controller:
  enabled: false
  image:
    repository: ghcr.io/5dlabs/cto-controller
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# PM Lite - disabled until image is published
pmLite:
  enabled: false
  image:
    repository: ghcr.io/5dlabs/cto-pm-lite
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  github:
    appId: ""
    privateKeySecret: ""
    webhookSecret: ""

# Argo Workflows (subchart) - this works out of the box
argo-workflows:
  enabled: true
  controller:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
    workflowNamespaces:
      - cto-lite
  server:
    enabled: true
    replicas: 1
    extraArgs:
      - --auth-mode=server
    serviceType: ClusterIP

# Tool Server - use existing runtime image for now
toolServer:
  enabled: true
  image:
    repository: ghcr.io/5dlabs/runtime
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Agent images - these are pulled on-demand by workflows
agents:
  claude:
    image: ghcr.io/5dlabs/claude:latest

# Cloudflare tunnel - disabled by default
tunnel:
  enabled: false
  tokenSecret: cloudflare-tunnel-token

# Storage - local path for Kind
storage:
  class: standard
  size: 10Gi
