# CTO Lite - Simplified values for local Kind deployment
#
# This chart deploys a minimal CTO platform suitable for individual developers
# running on their local machine with Kind.

# Tier: free or pro (controls feature availability)
tier: free

# Global settings
global:
  # Image pull policy (Always, IfNotPresent, Never)
  imagePullPolicy: IfNotPresent
  # Image registry
  imageRegistry: registry.5dlabs.ai/5dlabs

# Namespace
namespace: cto-lite

# Controller - Manages CodeRun CRDs
# Note: Disabled for MVP - Argo Workflows handles orchestration
controller:
  enabled: false
  image:
    repository: registry.5dlabs.ai/5dlabs/controller
    tag: main
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "50Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  # Service account for creating pods
  serviceAccount:
    create: true
    name: cto-controller

# PM Server - GitHub webhook handler
pm:
  enabled: false  # Disable for now until we have the image
  image:
    repository: cto-claude
    tag: local
    pullPolicy: Never
  resources:
    requests:
      memory: "30Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"
  service:
    type: ClusterIP
    port: 8080
  # GitHub App configuration (set via Tauri app)
  github:
    appId: ""
    privateKeySecret: ""
    webhookSecret: ""

# Tools Server - MCP tool routing and filtering
tools:
  enabled: false  # Disable for now until we have the image
  image:
    repository: cto-claude
    tag: local
    pullPolicy: Never
  resources:
    requests:
      memory: "30Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  service:
    type: ClusterIP
    port: 8080

# Cloudflared tunnel for webhook ingress
cloudflared:
  enabled: true
  image:
    repository: cloudflare/cloudflared
    tag: latest
  resources:
    requests:
      memory: "20Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"
  # Tunnel token (set via Tauri app)
  tunnelToken: ""

# Agent configuration
agents:
  # Default image registry for agent images
  imageRegistry: registry.5dlabs.ai/5dlabs
  
  # Agent definitions (used by controller for pod specs)
  morgan:
    enabled: true
    image: cto-lite-agent-morgan:latest
    resources:
      requests:
        memory: "200Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  grizz:
    enabled: true
    image: cto-lite-agent-grizz:latest
    resources:
      requests:
        memory: "200Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  nova:
    enabled: true
    image: cto-lite-agent-nova:latest
    resources:
      requests:
        memory: "200Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  blaze:
    enabled: true
    image: cto-lite-agent-blaze:latest
    resources:
      requests:
        memory: "200Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  cleo:
    enabled: true
    image: cto-lite-agent-cleo:latest
    resources:
      requests:
        memory: "200Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  cipher:
    enabled: true
    image: cto-lite-agent-cipher:latest
    resources:
      requests:
        memory: "200Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  tess:
    enabled: true
    image: cto-lite-agent-tess:latest
    resources:
      requests:
        memory: "200Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  bolt:
    enabled: true
    image: cto-lite-agent-bolt:latest
    resources:
      requests:
        memory: "200Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# Argo Workflows configuration (archived - replaced with new orchestration)
argo-workflows:
  enabled: false
  
  # Use minimal install
  singleNamespace: true
  
  controller:
    resources:
      requests:
        memory: "100Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
    # Reduce parallelism for local resources
    parallelism: 2
    namespaceParallelism: 1
    
  server:
    enabled: true
    resources:
      requests:
        memory: "50Mi"
        cpu: "25m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    # Expose via NodePort for local access
    serviceType: NodePort
    serviceNodePort: 30000

# API Keys (stored in secrets, referenced by agents)
secrets:
  # Set via Tauri app from keychain
  anthropic:
    enabled: false
    apiKey: ""
  openai:
    enabled: false
    apiKey: ""
  github:
    enabled: false
    token: ""

# Workflow template configuration
workflow:
  # Template to use for Play workflows
  template: play-workflow-lite
  # Default timeout for workflow steps (minutes)
  stepTimeout: 30
  # Artifact storage (local PVC for Kind)
  artifacts:
    storageClass: standard
    size: 5Gi

# Stack selection (grizz or nova)
stack: grizz
