# Default configuration values for cto-app chart
global:
  domain: "localhost"
  tunnel_id: ""
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

argo:
  enabled: false

controller:
  enabled: true
  image:
    repository: registry.5dlabs.ai/5dlabs/cto-controller
    tag: "latest"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  replicas: 1
  serviceAccount:
    create: true
    name: "cto-controller"

agents:
  enabled: true
  global:
    imageRepository: registry.5dlabs.ai/5dlabs
    agentTag: "latest"
  morgan:
    enabled: true
    replicas: 0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  grizz:
    enabled: true
    replicas: 0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  blaze:
    enabled: true
    replicas: 0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  cleo:
    enabled: true
    replicas: 0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  cipher:
    enabled: true
    replicas: 0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  tess:
    enabled: true
    replicas: 0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  bolt:
    enabled: true
    replicas: 0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

pm:
  enabled: true
  image:
    repository: registry.5dlabs.ai/5dlabs/pm-lite
    tag: "latest"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  config:
    github:
      webhookSecret: ""
      appId: ""
      privateKey: ""
    logLevel: "info"

mcp:
  enabled: true
  image:
    repository: registry.5dlabs.ai/5dlabs/mcp-lite
    tag: "latest"
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  config:
    logLevel: "info"

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix
