# Agent images subchart values
# Individual agent chart configurations

morgan:
  enabled: {{ .Values.agents.morgan.enabled }}
  replicaCount: {{ .Values.agents.morgan.replicas }}
  image:
    repository: {{ .Values.agents.global.imageRepository }}/morgan
    tag: {{ .Values.agents.global.agentTag | default "latest" }}
  resources:
    {{- toYaml .Values.agents.morgan.resources | nindent 4 }}

