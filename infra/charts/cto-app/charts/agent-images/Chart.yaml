apiVersion: v2
name: agent-images
description: Subchart for CTO agent images
version: 0.1.0
dependencies:
  {{- if .Values.agents.morgan.enabled }}
  - name: morgan
    version: "0.1.0"
    repository: "file://../morgan"
  {{- end }}
  {{- if .Values.agents.grizz.enabled }}
  - name: grizz
    version: "0.1.0"
    repository: "file://../grizz"
  {{- end }}
  {{- if .Values.agents.blaze.enabled }}
  - name: blaze
    version: "0.1.0"
    repository: "file://../blaze"
  {{- end }}
  {{- if .Values.agents.cleo.enabled }}
  - name: cleo
    version: "0.1.0"
    repository: "file://../cleo"
  {{- end }}
  {{- if .Values.agents.cipher.enabled }}
  - name: cipher
    version: "0.1.0"
    repository: "file://../cipher"
  {{- end }}
  {{- if .Values.agents.tess.enabled }}
  - name: tess
    version: "0.1.0"
    repository: "file://../tess"
  {{- end }}
  {{- if .Values.agents.bolt.enabled }}
  - name: bolt
    version: "0.1.0"
    repository: "file://../bolt"
  {{- end }}
