{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-lite
  namespace: cto-app
  labels:
    {{- include "cto-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicas }}
  selector:
    matchLabels:
      {{- include "cto-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        {{- include "cto-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      containers:
        - name: mcp-lite
          image: {{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag | default "latest" }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.mcp.config.logLevel | default "info" | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-lite
  namespace: cto-app
  labels:
    {{- include "cto-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "cto-app.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
{{- end }}
