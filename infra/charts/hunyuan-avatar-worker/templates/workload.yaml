apiVersion: apps/v1
kind: {{ .Values.workload.kind }}
metadata:
  name: {{ include "hunyuan-avatar-worker.fullname" . }}
  labels:
    {{- include "hunyuan-avatar-worker.labels" . | nindent 4 }}
spec:
  {{- if eq .Values.workload.kind "Deployment" }}
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hunyuan-avatar-worker.selectorLabels" . | nindent 6 }}
  {{- else if eq .Values.workload.kind "StatefulSet" }}
  serviceName: {{ include "hunyuan-avatar-worker.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hunyuan-avatar-worker.selectorLabels" . | nindent 6 }}
  {{- end }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "hunyuan-avatar-worker.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hunyuan-avatar-worker.serviceAccountName" . }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.initContainers.fixSymlink.enabled }}
        - name: fix-symlink
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "fix-symlink disabled for hunyuan-avatar-worker"
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.model.cacheDir }}
        {{- end }}
        {{- if .Values.initContainers.downloadModels.enabled }}
        - name: download-models
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "/app/download_models.py"]
          env:
            - name: HF_MODEL_REPO
              value: {{ .Values.model.repo | quote }}
            - name: MODEL_CACHE_DIR
              value: {{ .Values.model.cacheDir | quote }}
            {{- if .Values.huggingface.existingSecret }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.huggingface.existingSecret }}
                  key: {{ .Values.huggingface.secretKey }}
            {{- end }}
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.model.cacheDir }}
          resources:
            {{- toYaml .Values.initContainers.downloadModels.resources | nindent 12 }}
        {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.debug.enabled }}
          command:
            {{- toYaml .Values.debug.command | nindent 12 }}
          {{- end }}
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: NATS_URL
              value: {{ .Values.nats.url | quote }}
            - name: NATS_SUBJECT
              value: {{ .Values.nats.subject | quote }}
            - name: NATS_RESULT_SUBJECT
              value: {{ .Values.nats.resultSubject | quote }}
            - name: NATS_QUEUE
              value: {{ .Values.nats.queue | quote }}
            - name: NATS_STREAM
              value: {{ .Values.nats.stream | quote }}
            - name: NATS_CONSUMER
              value: {{ .Values.nats.consumer | quote }}
            - name: NATS_ACK_WAIT
              value: {{ .Values.nats.ackWait | quote }}
            - name: NATS_MAX_DELIVER
              value: {{ .Values.nats.maxDeliver | quote }}
            - name: METRICS_PORT
              value: {{ .Values.metrics.port | quote }}
            - name: MODEL_CACHE_DIR
              value: {{ .Values.model.cacheDir | quote }}
            - name: MODEL_DTYPE
              value: {{ .Values.model.dtype | quote }}
            - name: OUTPUT_BUCKET
              value: {{ .Values.output.bucket | quote }}
            - name: OUTPUT_ENDPOINT
              value: {{ .Values.output.endpoint | quote }}
            - name: OUTPUT_REGION
              value: {{ .Values.output.region | quote }}
            - name: OUTPUT_PREFIX
              value: {{ .Values.output.prefix | quote }}
            - name: CACHE_ENABLED
              value: {{ .Values.output.cacheEnabled | quote }}
            - name: CACHE_TTL_DAYS
              value: {{ .Values.output.cacheTTLDays | quote }}
            {{- if .Values.huggingface.existingSecret }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.huggingface.existingSecret }}
                  key: {{ .Values.huggingface.secretKey }}
            {{- end }}
            {{- if .Values.output.existingSecret }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.output.existingSecret }}
                  key: {{ .Values.output.accessKeyKey }}
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.output.existingSecret }}
                  key: {{ .Values.output.secretKeyKey }}
                  optional: true
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.output.existingSecret }}
                  key: {{ .Values.output.sessionTokenKey }}
                  optional: true
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.model.cacheDir }}
            - name: render-scratch
              mountPath: /tmp/renders
          {{- if and (not .Values.debug.enabled) .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- else if .Values.debug.readinessProbe }}
          livenessProbe:
            {{- toYaml .Values.debug.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if and (not .Values.debug.enabled) .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- else if .Values.debug.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.debug.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: model-cache
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hunyuan-avatar-worker.fullname" . }}-models
          {{- else }}
          emptyDir:
            sizeLimit: 60Gi
          {{- end }}
        - name: render-scratch
          emptyDir:
            sizeLimit: 10Gi
