{{- if eq .Values.workload.kind "StatefulSet" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hunyuan-avatar-worker.fullname" . }}
  labels:
    {{- include "hunyuan-avatar-worker.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "hunyuan-avatar-worker.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: 8080
      targetPort: health
      protocol: TCP
{{- end }}
