{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hunyuan-avatar-worker.fullname" . }}-metrics
  labels:
    {{- include "hunyuan-avatar-worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "hunyuan-avatar-worker.selectorLabels" . | nindent 4 }}
---
{{- end }}
{{- if and .Values.service.enabled (ne .Values.workload.kind "StatefulSet") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hunyuan-avatar-worker.fullname" . }}
  labels:
    {{- include "hunyuan-avatar-worker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 8080
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "hunyuan-avatar-worker.selectorLabels" . | nindent 4 }}
{{- end }}
