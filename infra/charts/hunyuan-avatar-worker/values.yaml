# Hunyuan Avatar Rendering Worker
# NATS-driven avatar generation on GPU

replicaCount: 1

workload:
  kind: Deployment

debug:
  enabled: false
  command:
    - sh
    - -c
    - |
      echo "Hunyuan Avatar debug pod ready"
      sleep infinity
  readinessProbe: null
  livenessProbe: null

image:
  repository: ghcr.io/5dlabs/hunyuan-avatar-worker
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

initContainers:
  fixSymlink:
    enabled: false
  downloadModels:
    enabled: true
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 8Gi

resources:
  requests:
    cpu: "2"
    memory: 24Gi
    nvidia.com/gpu: "1"
  limits:
    cpu: "8"
    memory: 32Gi
    nvidia.com/gpu: "1"

nodeSelector:
  nvidia.com/gpu.present: "true"

runtimeClassName: nvidia

tolerations: []

affinity: {}

priorityClassName: ""

podSecurityContext: {}

securityContext:
  runAsNonRoot: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

terminationGracePeriodSeconds: 120

nats:
  url: "nats://musetalk-nats.cto.svc.cluster.local:4222"
  subject: "avatar.render.request"
  resultSubject: "avatar.render.result"
  queue: "hunyuan-workers"
  stream: "AVATAR"
  consumer: "hunyuan-avatar-worker"
  ackWait: "5m"
  maxDeliver: 3

model:
  repo: "tencent/HunyuanVideo-Avatar"
  dtype: "float16"
  cacheDir: "/models/hunyuan-avatar"

persistence:
  enabled: true
  storageClass: "mayastor"
  size: 60Gi
  accessModes:
    - ReadWriteOnce

output:
  bucket: "avatar-renders"
  endpoint: ""
  region: ""
  prefix: "hunyuan-avatar"
  existingSecret: ""
  accessKeyKey: "AWS_ACCESS_KEY_ID"
  secretKeyKey: "AWS_SECRET_ACCESS_KEY"
  sessionTokenKey: "AWS_SESSION_TOKEN"
  cacheEnabled: false
  cacheTTLDays: 30

huggingface:
  existingSecret: "hunyuan-hf-token"
  secretKey: "HF_TOKEN"

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 3

metrics:
  enabled: true
  port: 9090

service:
  enabled: true
  type: ClusterIP

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations:
  logs.platform.5dlabs.io/collect: "true"
  logs.platform.5dlabs.io/service: hunyuan-avatar-worker

podLabels:
  platform.5dlabs.io/log-collection: enabled
  app.kubernetes.io/component: avatar-rendering

extraEnv: []
