# Hunyuan Avatar Worker — H100 80GB overlay
#
# Apply against a node labeled `gpu.5dlabs.io/tier=h100-80g` (or equivalent).
# Expected node profile: 1x H100 80GB, >=128 GiB system RAM, NVIDIA SM 9.0.
#
# Usage:
#   helm upgrade hunyuan-avatar-worker infra/charts/hunyuan-avatar-worker \
#     -n cto \
#     -f infra/charts/hunyuan-avatar-worker/values.yaml \
#     -f infra/charts/hunyuan-avatar-worker/values-h100.yaml
#
# Or via ArgoCD Application: add this file under `source.helm.valueFiles`.
#
# Rationale (empirical, 2026-04-21):
#   - V100S 32GB on musetalk-gpu-1 (43 GiB node RAM) OOMKilled at Linux level
#     during Hunyuan-Avatar-13B CPU-offload load (before GPU allocation).
#   - V100S is SM 7.0 Volta; FP8 checkpoint silently falls back to FP16,
#     doubling VRAM need — blocks native FP8 even if RAM were fixed.
#   - H100 SXM/PCIe: SM 9.0, native FP8 tensor cores, 80GB VRAM lets us
#     run full 704x704 @ 129 frames FP16 with zero offload (no RAM spike).
#   - No shared GPU with MuseTalk on this tier — dedicated node.

# Do not host MuseTalk on this node; separate worker, separate node pool.
nodeSelector:
  nvidia.com/gpu.present: "true"
  gpu.5dlabs.io/tier: h100-80g

# Bypass CPU-offload entirely on H100 — model fits in VRAM natively.
extraEnv:
  - name: CPU_OFFLOAD
    value: "0"
  - name: DISABLE_SP
    value: "1"            # single GPU; flip to 0 if we ever add a 2nd H100
  - name: USE_FP8
    value: "1"            # native on SM 9.0

resources:
  requests:
    cpu: "8"
    memory: 64Gi
    nvidia.com/gpu: "1"
  limits:
    cpu: "16"
    memory: 96Gi          # generous — H100 node should carry >=128 GiB
    nvidia.com/gpu: "1"

# Larger model cache + scratch — H100 nodes typically have bigger local disks.
persistence:
  enabled: true
  storageClass: "mayastor"
  size: 120Gi
  accessModes:
    - ReadWriteOnce

# Exclusive scheduling: taint the H100 node with
#   gpu.5dlabs.io/tier=h100-80g:NoSchedule
# and only Hunyuan tolerates it, so MuseTalk / misc pods don't land here.
tolerations:
  - key: "gpu.5dlabs.io/tier"
    operator: "Equal"
    value: "h100-80g"
    effect: "NoSchedule"
