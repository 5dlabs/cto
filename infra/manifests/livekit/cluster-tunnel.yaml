---
# Dedicated Cloudflare tunnel for the self-hosted LiveKit SFU.
# Exposes WebSocket signaling at wss://lk.5dlabs.ai. UDP media is NOT
# routed through this tunnel (CF tunnels are HTTP/WS/TCP only); media
# falls back to TCP/7881 in Phase 1, with a direct UDP path planned
# for Phase 2.
apiVersion: networking.cfargotunnel.com/v1alpha2
kind: ClusterTunnel
metadata:
  name: livekit
spec:
  newTunnel:
    name: livekit
  cloudflare:
    domain: 5dlabs.ai
    secret: livekit-tunnel-credentials
    accountId: b73ec19faa187789b3f9d1deb0e0d95f
    email: j@jonathonfritz.com
  fallbackTarget: http_status:404
  noTlsVerify: false
  protocol: auto
