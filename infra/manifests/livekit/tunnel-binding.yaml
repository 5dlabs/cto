---
# Routes wss://lk.5dlabs.ai to the in-cluster LiveKit signaling port.
# WebRTC media (UDP 50000-60000) does not traverse this tunnel; clients
# negotiate ICE candidates pointing at the LiveKit pod's host node IP
# (use_external_ip=true on the server). Phase 2 will add a direct
# DNS A record for media if/when needed.
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: livekit-signaling
  namespace: cto
tunnelRef:
  kind: ClusterTunnel
  name: cto-main
subjects:
  - kind: Service
    name: livekit-server
    spec:
      fqdn: lk.5dlabs.ai
      # The in-cluster Service exposes the LiveKit HTTP signaling port
      # (7880 container-side) on service port 80. Targeting 7880 directly
      # bypasses the Service (no such ClusterIP port), so the tunnel's
      # upstream connection fails and Cloudflare serves a bare 404.
      target: http://livekit-server.cto.svc:80
