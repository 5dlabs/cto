---
# LiveKit key shape reference.
#
# Runtime secret material now comes from infra/gitops/manifests/
# external-secrets/cto-secrets.yaml. Keep this file as a schema/example
# for the generated Secret because the livekit-support Argo app points at
# this directory and Phase 1 still expects a `livekit-keys` resource here.
apiVersion: v1
kind: Secret
metadata:
  name: livekit-keys
  namespace: cto
  labels:
    app.kubernetes.io/name: livekit-server
    app.kubernetes.io/part-of: avatar
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    openclaw.ai/managed-by: external-secrets-config
stringData:
  LIVEKIT_URL: wss://lk.5dlabs.ai
  LIVEKIT_API_KEY: "REPLACED_BY_EXTERNAL_SECRET"
  LIVEKIT_API_SECRET: "REPLACED_BY_EXTERNAL_SECRET"
  keys.yaml: |
    REPLACED_BY_EXTERNAL_SECRET: REPLACED_BY_EXTERNAL_SECRET
type: Opaque
