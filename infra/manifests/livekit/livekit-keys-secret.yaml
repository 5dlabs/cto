---
# LiveKit API key/secret pair, mounted by the livekit-server Helm
# release via storeKeysInSecret.existingSecret=livekit-keys.
#
# The chart expects a single key `keys.yaml` whose value is a YAML map
# of "<api_key>: <api_secret>" entries.
#
# These credentials are only used inside the cluster + by our own web
# token-mint endpoint; they are NOT browser-exposed. Rotate by editing
# this Secret and redeploying livekit-server.
apiVersion: v1
kind: Secret
metadata:
  name: livekit-keys
  namespace: cto
  labels:
    app.kubernetes.io/name: livekit-server
    app.kubernetes.io/part-of: avatar
type: Opaque
stringData:
  keys.yaml: |
    8e440e77936d058380185b4c94801dbf: 6+FcfjrWZ7bYGBmhHGfnDH+L4wYKdw+KjKTrnPphwf4=
