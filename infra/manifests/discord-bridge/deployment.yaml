---
apiVersion: v1
kind: Namespace
metadata:
  name: bots
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: discord-bridge
  namespace: bots
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-bridge
  namespace: bots
  labels:
    app: discord-bridge
    app.kubernetes.io/name: discord-bridge
    app.kubernetes.io/component: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discord-bridge
  template:
    metadata:
      labels:
        app: discord-bridge
        tags.datadoghq.com/env: production
        tags.datadoghq.com/service: discord-bridge
        tags.datadoghq.com/version: latest
      annotations:
        ad.datadoghq.com/bridge.logs: '[{"source":"nodejs","service":"discord-bridge"}]'
    spec:
      serviceAccountName: discord-bridge
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: bridge
          image: ghcr.io/5dlabs/discord-bridge:latest
          imagePullPolicy: Always
          env:
            - name: DD_ENV
              value: "production"
            - name: DD_SERVICE
              value: "discord-bridge"
            - name: DD_VERSION
              value: "latest"
            # Discord bot token from OpenBao secret
            - name: DISCORD_BRIDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-discord
                  key: DISCORD_TOKEN_BRIDGE
                  optional: false

            # Discord guild ID (5dlabs server)
            - name: GUILD_ID
              value: "1409006087331512342"

            # HTTP notification API port
            - name: HTTP_PORT
              value: "3200"

            # Linear bridge URL for cross-cancel callbacks
            - name: LINEAR_BRIDGE_URL
              value: "http://linear-bridge.bots.svc:3100"

            # Category name for bot conversations
            - name: CATEGORY_NAME
              value: "Bot Conversations"

            # Inactivity timeout (1 hour = 3600000ms)
            - name: INACTIVITY_TIMEOUT_MS
              value: "3600000"

            # Shared bearer token for runtime presence routes.
            - name: PRESENCE_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-discord
                  key: PRESENCE_SHARED_TOKEN
                  optional: false
            - name: WORKSPACE
              value: /data/discord-bridge
            - name: PRESENCE_ROUTE_STORE_PATH
              value: /data/discord-bridge/.intake/presence-routes.json

          ports:
            - name: http
              containerPort: 3200
              protocol: TCP

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          volumeMounts:
            - name: bridge-state
              mountPath: /data/discord-bridge

          # Liveness probe
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "ps aux | grep -v grep | grep node"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "ps aux | grep -v grep | grep node"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      restartPolicy: Always
      volumes:
        - name: bridge-state
          persistentVolumeClaim:
            claimName: discord-bridge-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: discord-bridge-state
  namespace: bots
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# ExternalSecret to pull Discord token from OpenBao
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: discord-bridge-token
  namespace: bots
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-discord
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DISCORD_TOKEN_BRIDGE: "{{ .token }}"
        PRESENCE_SHARED_TOKEN: "{{ .presenceSharedToken }}"
  data:
    - secretKey: token
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_BRIDGE
    - secretKey: presenceSharedToken
      remoteRef:
        key: openclaw-discord
        property: PRESENCE_SHARED_TOKEN
