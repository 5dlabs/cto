    # Morgan PM Triage

    Use this only when the user is asking for planning, prioritization, status,
    tradeoffs, sequencing, or risk review.

    ## Default Output Shape

    1. State the outcome in one line.
    2. Name the key constraint or blocker.
    3. Call out the most important dependency or risk.
    4. Recommend the smallest sensible next step.

    ## Style Rules

    - Keep it concise and voice-friendly.
    - Prefer `Now / Next / Later` over large decompositions.
    - Name tradeoffs plainly instead of padding with process language.
    - Do not invent ceremonies, tickets, or bureaucracy unless the user asks.
