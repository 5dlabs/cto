---
# Cloudflare TunnelBinding -- routes Morgan's remote chat endpoint
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: morgan-gateway
  namespace: openclaw
tunnelRef:
  kind: ClusterTunnel
  name: morgan-avatar
subjects:
  - kind: Service
    name: openclaw-morgan
    spec:
      fqdn: morgan.5dlabs.ai
      target: http://openclaw-morgan.openclaw.svc:18789
