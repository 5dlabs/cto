---
# Syncs the Coder [control plane] Discord bot token from OpenBao. The OpenBao
# property is seeded from:
# op://Operations/Coder Control Plane Discord token/add more/Token
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hermes-coder-control-plane-discord
  namespace: cto
  labels:
    app.kubernetes.io/name: hermes-gateway
    app.kubernetes.io/instance: cto-hermes-coder-control
    app.kubernetes.io/component: control-plane-builder
    app.kubernetes.io/part-of: cto-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: hermes-coder-control-plane-discord
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: openclaw-discord
        property: DISCORD_TOKEN_CODER_CONTROL_PLANE
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
