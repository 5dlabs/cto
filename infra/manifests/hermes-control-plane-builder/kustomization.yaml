---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: cto-hermes-coder-control-patches
    files:
      - patch-discord-sethome.py
      - gateway-health.sh=scripts/gateway-health.sh

generatorOptions:
  disableNameSuffixHash: true

resources:
  - rbac.yaml
  - secret.yaml
  - storage.yaml
  - configmap.yaml
  - deployment.yaml
