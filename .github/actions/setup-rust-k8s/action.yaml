---
# Composite action for setting up Rust environment on k8s-runner
# OPTIMIZED: Assumes rust-builder image is used (ghcr.io/5dlabs/rust-builder)
# which pre-installs Rust, sccache, mold, and build dependencies.
name: Setup Rust (k8s-runner)
description: |
  Setup optimized Rust environment on k8s-runner with sccache.
  
  NOTE: This action is optimized for the ghcr.io/5dlabs/rust-builder image
  which pre-installs all tooling. If running on a vanilla runner, tools will
  be installed on-demand (slower).

inputs:
  components:
    description: 'Additional rustup components to install (comma-separated)'
    required: false
    default: ''
  sccache-size:
    description: 'sccache cache size'
    required: false
    default: '50G'

outputs:
  rustc-version:
    description: 'Installed rustc version'
    value: ${{ steps.version.outputs.rustc }}
  cargo-version:
    description: 'Installed cargo version'
    value: ${{ steps.version.outputs.cargo }}

runs:
  using: composite
  steps:
    - name: Install build dependencies (if missing)
      shell: bash
      run: |
        # Check if cc/gcc is available (required for Rust build scripts)
        if ! command -v cc &> /dev/null && ! command -v gcc &> /dev/null; then
          echo "⚠️ C compiler (cc/gcc) not found - installing build-essential..."
          installed=false
          for attempt in 1 2 3; do
            echo "📦 apt-get attempt $attempt/3..."
            sudo rm -rf /var/lib/apt/lists/*
            if timeout 120 sudo apt-get update -qq -o Acquire::Retries=2 2>&1 && \
               timeout 180 sudo apt-get install -y -qq build-essential pkg-config libssl-dev 2>&1; then
              echo "✅ Build dependencies installed (attempt $attempt)"
              installed=true
              break
            fi
            echo "⚠️ apt-get attempt $attempt failed (mirror sync?), retrying in $((attempt * 20))s..."
            sleep $((attempt * 20))
          done
          if [ "$installed" = false ]; then
            echo "❌ apt-get failed after 3 attempts — trying with --fix-missing..."
            sudo rm -rf /var/lib/apt/lists/*
            sudo apt-get update --fix-missing -qq || true
            sudo apt-get install -y -qq build-essential pkg-config libssl-dev
          fi
        else
          echo "✅ C compiler found: $(which cc 2>/dev/null || which gcc)"
        fi

    - name: Setup PATH and check pre-installed tools
      shell: bash
      run: |
        echo "🚀 Setting up Rust build environment..."
        
        # Override cache paths to use HOME directory (writable by runner)
        # The builder image sets CARGO_HOME=/cache/cargo etc. but /cache may not be mounted
        mkdir -p "$HOME/.cargo/bin" "$HOME/.cargo/registry" "$HOME/.rustup" "$HOME/.sccache"
        
        # Export environment variables for this step and subsequent steps
        echo "CARGO_HOME=$HOME/.cargo" >> "$GITHUB_ENV"
        echo "RUSTUP_HOME=$HOME/.rustup" >> "$GITHUB_ENV"
        echo "SCCACHE_DIR=$HOME/.sccache" >> "$GITHUB_ENV"
        
        # Also export for current step
        export CARGO_HOME="$HOME/.cargo"
        export RUSTUP_HOME="$HOME/.rustup"
        export SCCACHE_DIR="$HOME/.sccache"
        
        # Add cargo bin to PATH
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.cargo/bin:$PATH"
        
        echo "📁 Using paths:"
        echo "  CARGO_HOME=$CARGO_HOME"
        echo "  RUSTUP_HOME=$RUSTUP_HOME"
        echo "  SCCACHE_DIR=$SCCACHE_DIR"
        
        # Check if running on rust-builder image (tools pre-installed)
        if command -v rustc &> /dev/null && command -v cargo &> /dev/null; then
          echo "✅ Rust toolchain found (pre-installed in rust-builder image)"
          rustc --version
          cargo --version
        else
          echo "⚠️ Rust not found - will install (not using rust-builder image?)"
          echo "NEEDS_RUST_INSTALL=true" >> "$GITHUB_ENV"
        fi
        
        if command -v sccache &> /dev/null; then
          echo "✅ sccache found (pre-installed)"
          sccache --version
        else
          echo "⚠️ sccache not found - will install"
          echo "NEEDS_SCCACHE_INSTALL=true" >> "$GITHUB_ENV"
        fi
        
        if command -v mold &> /dev/null; then
          echo "✅ mold linker found (pre-installed)"
          mold --version
        else
          echo "ℹ️ mold linker not available (optional)"
        fi

    - name: Install Rust (fallback for non-rust-builder images)
      if: env.NEEDS_RUST_INSTALL == 'true'
      shell: bash
      run: |
        echo "📥 Installing Rust toolchain..."
        for attempt in 1 2 3 4 5; do
          if curl --proto '=https' --tlsv1.2 -sSf --retry 5 --retry-delay 10 https://sh.rustup.rs | sh -s -- -y --default-toolchain stable; then
            echo "✅ Rust installed on attempt $attempt"
            source "$HOME/.cargo/env"
            break
          fi
          echo "⚠️ Attempt $attempt failed, retrying..."
          sleep $((attempt * 10))
        done
        
        # Verify installation
        rustc --version
        cargo --version

    - name: Install additional components
      if: inputs.components != ''
      shell: bash
      run: |
        export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
        echo "📦 Installing components: ${{ inputs.components }}"
        IFS=',' read -ra COMP_ARRAY <<< "${{ inputs.components }}"
        for comp in "${COMP_ARRAY[@]}"; do
          comp_name="$(echo "$comp" | xargs)"
          # Check if already installed (rust-builder has clippy, rustfmt)
          if rustup component list --installed | grep -q "^${comp_name}"; then
            echo "  ✅ Component $comp_name already installed"
          else
            echo "  📥 Installing component $comp_name..."
            rustup component add "$comp_name"
          fi
        done

    - name: Install sccache (fallback for non-rust-builder images)
      if: env.NEEDS_SCCACHE_INSTALL == 'true'
      shell: bash
      run: |
        echo "📥 Installing sccache..."
        SCCACHE_VERSION="v0.10.0"
        SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
        curl -fsSL --retry 5 "$SCCACHE_URL" | tar -xz
        mv "sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" "${CARGO_HOME:-$HOME/.cargo}/bin/"
        rm -rf "sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl"
        chmod +x "${CARGO_HOME:-$HOME/.cargo}/bin/sccache"

    - name: Start sccache server
      shell: bash
      env:
        SCCACHE_CACHE_SIZE: ${{ inputs.sccache-size }}
        SCCACHE_IDLE_TIMEOUT: '0'
      run: |
        export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
        
        # Override SCCACHE_DIR to use writable path
        # The rust-builder image may set this to /cache/sccache which isn't writable on all runners
        export SCCACHE_DIR="$HOME/.cache/sccache"
        echo "SCCACHE_DIR=$SCCACHE_DIR" >> "$GITHUB_ENV"
        mkdir -p "$SCCACHE_DIR"
        
        # Stop any existing sccache server
        sccache --stop-server 2>/dev/null || true
        
        # Start fresh sccache server
        sccache --start-server
        
        echo "📊 sccache stats:"
        sccache --show-stats

    - name: Get version info
      id: version
      shell: bash
      run: |
        export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
        echo "rustc=$(rustc --version)" >> "$GITHUB_OUTPUT"
        echo "cargo=$(cargo --version)" >> "$GITHUB_OUTPUT"

        # Final summary
        echo ""
        echo "🔧 Build environment ready:"
        echo "  rustc: $(rustc --version)"
        echo "  cargo: $(cargo --version)"
        echo "  sccache: $(sccache --version 2>/dev/null || echo 'N/A')"
        echo "  mold: $(mold --version 2>/dev/null || echo 'N/A')"
