---
name: Deploy to Develop

# Build and push all service images when code lands on develop
# This is the unified deployment workflow for post-merge builds

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force rebuild all images regardless of changes'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: 5dlabs
  # CI build optimizations
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_DEBUG: false

permissions:
  contents: read
  packages: write

jobs:
  # Detect which components changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      pm: ${{ steps.filter.outputs.pm }}
      controller: ${{ steps.filter.outputs.controller }}
      sidecar: ${{ steps.filter.outputs.sidecar }}
      healer: ${{ steps.filter.outputs.healer }}
      tools: ${{ steps.filter.outputs.tools }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pm:
              - 'crates/pm/**'
              - 'infra/images/pm-server/**'
            controller:
              - 'crates/controller/**'
              - 'infra/images/controller/**'
              - 'templates/**'
            sidecar:
              - 'crates/pm/**'
              - 'infra/images/linear-sidecar/**'
            healer:
              - 'crates/healer/**'
              - 'crates/notify/**'
              - 'infra/images/healer/**'
              - 'templates/healer/**'
            tools:
              - 'crates/tools/**'
              - 'crates/mcp/**'
              - 'infra/images/tools/**'

  # Build PM Server (pre-built binary strategy for fast builds)
  build-pm:
    needs: changes
    if: needs.changes.outputs.pm == 'true' || github.event.inputs.force_all == 'true'
    runs-on: [k8s-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Configure Rust for fast builds
        run: |
          # Verify sccache and mold are available from builder image
          which sccache && sccache --version || echo "sccache not found"
          which mold && mold --version || echo "mold not found"
          # Show cargo config
          cat ~/.cargo/config.toml 2>/dev/null || echo "No cargo config"

      - name: Build pm-server binary
        run: |
          cargo build --profile ci -p pm --bin pm-server
          cp target/ci/pm-server pm-server

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push pm-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/images/pm-server/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/pm-server:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/pm-server:${{ steps.version.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build Controller (pre-built binary strategy for fast builds)
  build-controller:
    needs: changes
    if: needs.changes.outputs.controller == 'true' || github.event.inputs.force_all == 'true'
    runs-on: [k8s-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Configure Rust for fast builds
        run: |
          # Verify sccache and mold are available from builder image
          which sccache && sccache --version || echo "sccache not found"
          which mold && mold --version || echo "mold not found"
          # Show cargo config
          cat ~/.cargo/config.toml 2>/dev/null || echo "No cargo config"

      - name: Build controller binary
        run: |
          cargo build --profile ci --bin agent-controller
          cp target/ci/agent-controller agent-controller

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push controller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/images/controller/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/controller:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/controller:${{ steps.version.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build Linear Sidecar (pre-built binary strategy for fast builds)
  build-sidecar:
    needs: changes
    if: needs.changes.outputs.sidecar == 'true' || github.event.inputs.force_all == 'true'
    runs-on: [k8s-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Configure Rust for fast builds
        run: |
          # Verify sccache and mold are available from builder image
          which sccache && sccache --version || echo "sccache not found"
          which mold && mold --version || echo "mold not found"

      - name: Build status-sync binary
        run: |
          cargo build --profile ci -p pm --bin status-sync
          cp target/ci/status-sync status-sync

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Calculate version
        id: version
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push linear-sidecar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/images/linear-sidecar/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/linear-sidecar:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/linear-sidecar:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build Healer (pre-built binary strategy for fast builds)
  build-healer:
    needs: changes
    if: needs.changes.outputs.healer == 'true' || github.event.inputs.force_all == 'true'
    runs-on: [k8s-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Configure Rust for fast builds
        run: |
          # Verify sccache and mold are available from builder image
          which sccache && sccache --version || echo "sccache not found"
          which mold && mold --version || echo "mold not found"

      - name: Build healer binary
        run: |
          cargo build --release --package healer
          cp target/release/healer healer

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push healer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/images/healer/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/healer:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/healer:${{ steps.version.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build Tools Server (pre-built binary strategy for fast builds)
  build-tools:
    needs: changes
    if: needs.changes.outputs.tools == 'true' || github.event.inputs.force_all == 'true'
    runs-on: [k8s-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Configure Rust for fast builds
        run: |
          # Verify sccache and mold are available from builder image
          which sccache && sccache --version || echo "sccache not found"
          which mold && mold --version || echo "mold not found"

      - name: Build tools binaries
        run: |
          cargo build --release --package tools --bin tools-server
          cargo build --release --package cto-mcp --bin cto-mcp
          cp target/release/tools-server tools-server
          cp target/release/cto-mcp cto-mcp
          # Copy entrypoint script to build context root
          cp infra/images/tools/entrypoint.sh entrypoint.sh

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push tools
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/images/tools/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/tools:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/tools:${{ steps.version.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Summary
  summary:
    needs: [build-pm, build-controller, build-sidecar, build-healer, build-tools]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          {
            echo "## 🚀 Develop Deploy Summary"
            echo ""
            echo "| Image | Status |"
            echo "|-------|--------|"
            echo "| pm-server | ${{ needs.build-pm.result || 'skipped' }} |"
            echo "| controller | ${{ needs.build-controller.result || 'skipped' }} |"
            echo "| linear-sidecar | ${{ needs.build-sidecar.result || 'skipped' }} |"
            echo "| healer | ${{ needs.build-healer.result || 'skipped' }} |"
            echo "| tools | ${{ needs.build-tools.result || 'skipped' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
