---
name: Deploy to Develop

# Build and push all service images when code lands on develop
# This is the unified deployment workflow for post-merge builds

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force rebuild all images regardless of changes'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: 5dlabs

permissions:
  contents: read
  packages: write

jobs:
  # Detect which components changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      pm: ${{ steps.filter.outputs.pm }}
      controller: ${{ steps.filter.outputs.controller }}
      sidecar: ${{ steps.filter.outputs.sidecar }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pm:
              - 'crates/pm/**'
              - 'infra/images/pm-server/**'
            controller:
              - 'crates/controller/**'
              - 'infra/images/controller/**'
              - 'templates/**'
            sidecar:
              - 'crates/pm/**'
              - 'infra/images/linear-sidecar/**'

  # Build PM Server
  build-pm:
    needs: changes
    if: needs.changes.outputs.pm == 'true' || github.event.inputs.force_all == 'true'
    runs-on: [k8s-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (k8s-runner)
        uses: ./.github/actions/setup-rust-k8s
        with:
          sccache-size: '50G'

      - name: Build pm-server binary
        uses: ./.github/actions/rust-build
        with:
          package: pm
          binary: pm-server
          output-path: pm-server
          use-sccache: 'true'

      - name: Get version info
        id: version
        run: |
          VERSION=$(cargo metadata --manifest-path crates/pm/Cargo.toml --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "pm") | .version')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: ./.github/actions/docker-build-push
        with:
          image-name: pm-server
          context: .
          dockerfile: ./infra/images/pm-server/Dockerfile
          version: ${{ steps.version.outputs.version }}
          short-sha: ${{ steps.version.outputs.short-sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tag-latest: 'true'

  # Build Controller
  build-controller:
    needs: changes
    if: needs.changes.outputs.controller == 'true' || github.event.inputs.force_all == 'true'
    runs-on: [k8s-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (k8s-runner)
        uses: ./.github/actions/setup-rust-k8s
        with:
          sccache-size: '50G'

      - name: Build controller binary
        uses: ./.github/actions/rust-build
        with:
          package: controller
          binary: agent-controller
          working-directory: ./crates/controller
          output-path: ../../agent-controller
          use-sccache: 'true'

      - name: Get version info
        id: version
        run: |
          VERSION=$(cargo metadata --manifest-path crates/controller/Cargo.toml --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "controller") | .version')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: ./.github/actions/docker-build-push
        with:
          image-name: controller
          context: .
          dockerfile: ./infra/images/controller/Dockerfile
          version: ${{ steps.version.outputs.version }}
          short-sha: ${{ steps.version.outputs.short-sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Build Linear Sidecar
  build-sidecar:
    needs: changes
    if: needs.changes.outputs.sidecar == 'true' || github.event.inputs.force_all == 'true'
    runs-on: [k8s-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Calculate version
        id: version
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push linear-sidecar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/images/linear-sidecar/Dockerfile
          target: local
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/linear-sidecar:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/linear-sidecar:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Summary
  summary:
    needs: [build-pm, build-controller, build-sidecar]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          {
            echo "## 🚀 Develop Deploy Summary"
            echo ""
            echo "| Image | Status |"
            echo "|-------|--------|"
            echo "| pm-server | ${{ needs.build-pm.result || 'skipped' }} |"
            echo "| controller | ${{ needs.build-controller.result || 'skipped' }} |"
            echo "| linear-sidecar | ${{ needs.build-sidecar.result || 'skipped' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
