name: CTO Lite Release

on:
  push:
    tags:
      - 'cto-lite-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS ARM64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS Intel
          - platform: ubuntu-22.04
            args: ''
            name: Linux x64
          - platform: windows-latest
            args: ''
            name: Windows x64

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install UI dependencies
        working-directory: crates/cto-lite/ui
        run: npm ci

      - name: Build UI
        working-directory: crates/cto-lite/ui
        run: npm run build

      - name: Install Tauri CLI dependencies
        working-directory: crates/cto-lite/tauri
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/cto-lite/tauri
          args: ${{ matrix.args }}
          tagName: cto-lite-v__VERSION__
          releaseName: 'CTO Lite v__VERSION__'
          releaseBody: |
            See the changelog for what's new in this release.
            
            ## Installation
            
            - **macOS**: Download `.dmg` and drag to Applications
            - **Windows**: Download `.msi` or `.exe` installer
            - **Linux**: Download `.AppImage` or `.deb`
            
            ## Requirements
            
            - Docker Desktop, OrbStack, or Colima running
            - API key from Anthropic or OpenAI
          releaseDraft: true
          prerelease: false

  create-universal-macos:
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS builds
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Universal Binary
        run: |
          # This would combine ARM and Intel builds into a universal binary
          # Requires the individual builds to be available
          echo "Universal binary creation would happen here"
