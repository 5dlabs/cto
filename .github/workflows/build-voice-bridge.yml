name: Build and Push voice-bridge Image

on:
  push:
    branches: [main, feat/coder-welcome-gitlab-swap]
    paths:
      - 'infra/images/voice-bridge/**'
      - '.github/workflows/build-voice-bridge.yml'
  workflow_dispatch:

concurrency:
  group: voice-bridge-build
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 5dlabs/voice-bridge

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: kaseonedge
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=v

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./infra/images/voice-bridge
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
