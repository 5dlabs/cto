---
name: Infrastructure Images

# Build infrastructure images like databases, caching systems, etc.
# Separate from agent images to maintain logical separation

on:
  # Daily build at 7 AM UTC (after agents build)
  schedule:
    - cron: '0 7 * * *'

  # Manual trigger only - no push trigger to avoid wasting runners
  # Infrastructure images rarely change, rebuild manually when needed
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all infrastructure images'
        required: false
        default: false
        type: boolean
      image:
        description: 'Specific image to build (postgresql, rust-builder, openmemory, tweakcn, or leave blank for all)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: 5dlabs

jobs:
  # Build infrastructure images
  build-infrastructure:
    runs-on: [k8s-runner]
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: postgresql
            name: PostgreSQL+pgvector
            image: postgresql
            context: ./infra/images/postgresql
            file: ./infra/images/postgresql/Dockerfile
            version: "16.3.0-pgvector"
            description: "PostgreSQL 16 with pgvector extension for high-dimensional vectors"
          - id: rust-builder
            name: Rust Builder
            image: rust-builder
            context: ./infra/images/builder
            file: ./infra/images/builder/Dockerfile
            version: "latest"
            description: "Rust development environment with pre-warmed dependencies for CI/CD"
          - id: openmemory
            name: OpenMemory
            image: openmemory
            context: ./infra/images/openmemory
            file: ./infra/images/openmemory/Dockerfile
            version: "1.0.0"
            description: "OpenMemory long-term memory system for AI agents"
          - id: tweakcn
            name: Tweakcn
            image: tweakcn
            context: ./infra/images/tweakcn
            file: ./infra/images/tweakcn/Dockerfile
            version: "1.0.0"
            description: "Visual theme editor for shadcn/ui components"
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4

      - name: Check if should build this image
        id: should-build
        env:
          INPUT_IMAGE: ${{ github.event.inputs.image }}
          MATRIX_ID: ${{ matrix.id }}
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          if [ "$INPUT_IMAGE" = "" ] || [ "$INPUT_IMAGE" = "$MATRIX_ID" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "✅ Building $MATRIX_NAME image"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Skipping $MATRIX_NAME (building $INPUT_IMAGE only)"
          fi

      - name: Log in to Container Registry
        if: steps.should-build.outputs.build == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        if: steps.should-build.outputs.build == 'true'
        id: version
        run: |
          # Use directory hash for versioning to ensure rebuilds when content changes
          VERSION=$(git log -1 --format="%h" -- "${{ matrix.context }}/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 ${{ matrix.name }} version: $VERSION"

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.build == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3
        with:
          # Use host network for BuildKit to inherit network configuration from k8s-runner
          # The buildkitd.toml file provides explicit DNS configuration (Cloudflare/Google DNS)
          # to fix DNS resolution failures that occur when the default bridge network
          # doesn't properly inherit DNS from the k8s-runner pod
          driver-opts: network=host
          buildkitd-config: ./infra/buildkitd.toml

      - name: Build and push ${{ matrix.name }} image
        if: steps.should-build.outputs.build == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          pull: true
          push: true
          # Use host network for RUN instructions to inherit DNS configuration
          # This fixes DNS resolution failures (e.g., "Could not resolve host: github.com")
          # that occur during git clone and curl operations in Dockerfiles
          network: host
          allow: network.host
          # Disable attestations - avoids GHCR permission issues for new packages
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ matrix.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image }}:v${{ steps.version.outputs.version }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show GHCR tags for ${{ matrix.name }}
        if: steps.should-build.outputs.build == 'true'
        run: |
          echo "🔎 Latest GHCR tags for ${{ matrix.image }}:"
          gh api -H "Accept: application/vnd.github+json" \
            "/orgs/${{ env.IMAGE_BASE }}/packages/container/${{ matrix.image }}/versions?per_page=3" \
            | jq -r '.[].metadata.container.tags' || echo "Package not found or no access"

      - name: Image build summary
        if: steps.should-build.outputs.build == 'true'
        run: |
          {
            echo "## ✅ ${{ matrix.name }} Build Complete"
            echo ""
            echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.image }}\`"
            echo "- **Tags**: \`latest\`, \`${{ matrix.version }}\`, \`v${{ steps.version.outputs.version }}\`"
            echo "- **Description**: ${{ matrix.description }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Cycle Arc runners when rust-builder image is updated (only on main branch)
  cycle-runners:
    needs: build-infrastructure
    runs-on: [k8s-runner]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4
        with:
          fetch-depth: 2  # Need HEAD~1 for git diff

      - name: Check if rust-builder was built
        id: check-rust-builder
        run: |
          # Check if rust-builder context changed in this push
          if git diff --name-only HEAD~1 HEAD | grep -q "infra/images/builder/"; then
            echo "rust_builder_changed=true" >> "$GITHUB_OUTPUT"
            echo "🔄 rust-builder image was updated, will cycle runners"
          else
            echo "rust_builder_changed=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  rust-builder unchanged, skipping runner cycling"
          fi

      - name: Cycle rust-builder runners
        if: steps.check-rust-builder.outputs.rust_builder_changed == 'true'
        run: |
          echo "🔄 Cycling Arc runners to use new rust-builder image..."

          # Delete Arc runner pods to force them to pull new image
          kubectl delete pods -n arc-runners \
            -l runner-deployment-name=k8s-runner \
            --grace-period=30 || true

          echo "✅ Runner pods deleted - new pods will use updated rust-builder image"
          echo "⏱️  Wait ~2-3 minutes for new runners to become available"
