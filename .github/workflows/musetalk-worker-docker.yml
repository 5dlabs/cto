name: Build and Push MuseTalk Worker Image

on:
  push:
    branches: [main]
    paths:
      - 'infra/images/musetalk-worker/**'
      - '.github/workflows/musetalk-worker-docker.yml'
  workflow_dispatch:

concurrency:
  group: musetalk-worker-build
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 5dlabs/musetalk-worker

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=phase4-bootstrap
            type=sha,prefix=phase4-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./infra/images/musetalk-worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
