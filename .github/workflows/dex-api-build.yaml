---
name: DEX API Build

on:
  push:
    branches: [main]
    paths:
      - 'crates/dex-indexer/**'
      - 'infra/images/dex-api/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: 5dlabs

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [k8s-runner]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p dex-indexer --bin dex-api

      - name: Prepare build context
        run: cp target/release/dex-api .

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3
        with:
          driver-opts: network=host
          buildkitd-config: ./infra/buildkitd.toml

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v5
        with:
          context: .
          file: infra/images/dex-api/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          network: host
          allow: network.host
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/dex-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/dex-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
