name: Build and Push Narrator Sidecar Base Image

on:
  push:
    branches: [main]
    paths:
      - 'infra/images/narrator-sidecar-base/**'
      - '.github/workflows/build-narrator-sidecar-base.yml'
  workflow_dispatch:

concurrency:
  group: narrator-sidecar-base-build
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 5dlabs/narrator-sidecar-base

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: 5dlabs
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=v

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./infra/images/narrator-sidecar-base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
