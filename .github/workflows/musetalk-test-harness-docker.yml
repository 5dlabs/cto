name: Build and Push MuseTalk Test Harness Image

on:
  push:
    branches: [main]
    paths:
      - 'infra/images/musetalk-test-harness/**'
      - '.github/workflows/musetalk-test-harness-docker.yml'
  workflow_dispatch:

concurrency:
  group: musetalk-test-harness-build
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 5dlabs/musetalk-test-harness

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=phase4-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./infra/images/musetalk-test-harness
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
