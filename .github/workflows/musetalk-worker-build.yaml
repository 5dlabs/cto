---
name: MuseTalk Worker Build

on:
  push:
    branches: [main]
    paths:
      - 'infra/images/musetalk-worker/**'
      - '.github/workflows/musetalk-worker-build.yaml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (in addition to commit SHA)'
        required: false
        default: 'phase4-bootstrap'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 5dlabs/musetalk-worker

permissions:
  contents: read
  packages: write

jobs:
  build:
    # Large runner needed: nvcr.io/nvidia/pytorch:23.10-py3 base is ~10GB
    runs-on: ubuntu-latest-large
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=phase4-bootstrap" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v5
        with:
          context: infra/images/musetalk-worker
          file: infra/images/musetalk-worker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=musetalk-worker
          cache-to: type=gha,mode=max,scope=musetalk-worker
