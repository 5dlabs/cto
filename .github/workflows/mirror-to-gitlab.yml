name: Mirror to GitLab

on:
  push:
    branches: [main]
    tags: ['*']

concurrency:
  group: mirror-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Disabled until self-hosted GitLab cutover is ready.
    # To re-enable: set repo variable MIRROR_TO_GITLAB=true and ensure
    # the GITLAB_PUSH_TOKEN secret is populated. See plan.md → "Self-hosted
    # GitLab inventory" for the full re-enable checklist.
    if: ${{ vars.MIRROR_TO_GITLAB == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@gitlab.5dlabs.ai/5dlabs/${GITHUB_REPOSITORY#*/}.git" 2>/dev/null || true
          git push gitlab --all --force
          git push gitlab --tags --force
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_PUSH_TOKEN }}
