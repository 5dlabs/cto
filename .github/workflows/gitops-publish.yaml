---
# GITOPS-002: Manifest Publishing Pipeline
#
# This workflow publishes runtime manifests to the GitOps template repository
# when a new release is created. Customer GitOps repos (created from the template)
# receive updates via PRs.
#
# Triggered by release-please when a new version is released.

name: GitOps Manifest Publish

on:
  # Trigger after release-please creates a release
  release:
    types: [published]

  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.17)'
        required: true
        type: string
      dry_run:
        description: 'Dry run - do not push to template repo'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  TEMPLATE_REPO: 5dlabs/cto-argocd-template
  REGISTRY: ghcr.io

jobs:
  # Build and push container images to GHCR
  build-images:
    runs-on: [k8s-runner]
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from release tag (e.g., v0.2.17 -> 0.2.17)
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent-controller image
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: crates/controller/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/5dlabs/cto-controller:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/5dlabs/cto-controller:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Generate and publish Kubernetes manifests
  publish-manifests:
    runs-on: [k8s-runner]
    needs: build-images
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6

      - name: Checkout template repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TEMPLATE_REPO }}
          token: ${{ secrets.TEMPLATE_REPO_TOKEN }}
          path: template-repo

      - name: Update manifest versions
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          echo "Updating manifests to version ${VERSION}"

          # Update agent-controller.yaml version
          sed -i "s/targetRevision: \"[0-9.]*\"/targetRevision: \"${VERSION}\"/" \
            template-repo/applications/agent-controller.yaml

          # Update mcp-tools.yaml version
          sed -i "s/targetRevision: \"[0-9.]*\"/targetRevision: \"${VERSION}\"/" \
            template-repo/applications/mcp-tools.yaml

          # Update image tags in helm values
          sed -i "s/tag: \"[0-9.]*\"/tag: \"${VERSION}\"/" \
            template-repo/applications/agent-controller.yaml
          sed -i "s/tag: \"[0-9.]*\"/tag: \"${VERSION}\"/" \
            template-repo/applications/mcp-tools.yaml

          # Update versions in values.yaml
          sed -i "s/agentController: \"[0-9.]*\"/agentController: \"${VERSION}\"/" \
            template-repo/values.yaml
          sed -i "s/mcpTools: \"[0-9.]*\"/mcpTools: \"${VERSION}\"/" \
            template-repo/values.yaml

          echo "Manifest updates complete"

      - name: Copy base manifests
        run: |
          # Copy any updated base manifests from source to template
          cp -r templates/gitops-template/base/* template-repo/base/ 2>/dev/null || true

          # Show what changed
          echo "=== Changes to template repo ==="
          cd template-repo
          git diff --stat

      - name: Check for dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "Dry run mode - not pushing changes"
          echo "Changes would have been:"
          cd template-repo && git diff

      - name: Commit and push to template repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          cd template-repo

          git config user.name "CTO Bot"
          git config user.email "bot@5dlabs.ai"

          # Check if there are changes
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add .
          git commit -m "chore: update to v${VERSION}

          Updates runtime component versions to ${VERSION}

          - agent-controller: ${VERSION}
          - mcp-tools: ${VERSION}
          - Base manifests updated

          Automated by gitops-publish workflow."

          git tag "v${VERSION}"
          git push origin main --tags

          echo "Pushed updates to template repo"

      - name: Summary
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          {
            echo "## 📦 GitOps Manifest Publish"
            echo ""
            echo "**Version:** v${VERSION}"
            echo ""
            echo "### Updates"
            echo ""
            echo "- ✅ Container images pushed to GHCR"
            echo "- ✅ Template repo updated: \`${TEMPLATE_REPO}\`"
            echo ""
            echo "### Customer Updates"
            echo ""
            echo "Customer GitOps repos created from the template will receive"
            echo "update notifications via Dependabot or manual PR."
          } >> "$GITHUB_STEP_SUMMARY"

  # Optional: Create PRs for existing customer repos
  notify-customers:
    runs-on: [k8s-runner]
    needs: [build-images, publish-manifests]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    steps:
      - name: Notify customer repo updates available
        uses: actions/github-script@v9
        with:
          script: |
            const version = '${{ needs.build-images.outputs.version }}';
            console.log(`GitOps manifests published: v${version}`);

            // In production, this would:
            // 1. Query database for customer GitOps repos
            // 2. Create PRs in each customer repo with version update
            // For now, just log that this step would happen

            console.log('Customer notification step placeholder');
            console.log('In production: would create PRs in customer GitOps repos');

      - name: Summary
        run: |
          echo "### 📣 Customer Notifications" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Customer repos would receive update PRs (not implemented in MVP)" >> "$GITHUB_STEP_SUMMARY"
