---
name: Agent Images

# Build the unified agent image (ghcr.io/5dlabs/agents) which bundles ALL CLI tools:
#   Claude Code, OpenAI Codex, Every Code, Cursor Agent, Factory Droid,
#   Gemini CLI, OpenCode, OpenClaw
#
# Triggers: daily schedule, pushes to infra/images/**, or manual dispatch

on:
  # Daily build to pick up new CLI versions (Claude Code, Codex, etc.)
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC

  # Rebuild on pushes that change image definitions
  push:
    branches: [main]
    paths:
      - 'infra/images/**'

  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if versions match'
        required: false
        default: false
        type: boolean
      no_cache:
        description: 'Disable buildx cache (use when builds hang due to cache corruption)'
        required: false
        default: false
        type: boolean
      openclaw_version:
        description: 'Override OpenClaw version (e.g., "2026.2.12"). Defaults to latest.'
        required: false
        default: ''
        type: string
      opencode_version:
        description: 'Override OpenCode version (e.g., "1.1.44"). Defaults to Dockerfile default.'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: 5dlabs

# Prevent auto-cancellation of in-progress runs when new runs are triggered
concurrency:
  group: agents-build
  cancel-in-progress: false

# Workflow-level permissions for GHCR pushes
permissions:
  contents: read
  packages: write

jobs:
  build-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      built: ${{ steps.set-built.outputs.built }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift \
            /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/heroku 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          echo "=== After cleanup ==="
          df -h /

      - name: Setup Node.js (for npm version discovery)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          check-latest: true

      - name: Get latest binaries release version
        id: binaries-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail

          TOOLS_VERSION=""

          echo "📍 Checking gh CLI..."
          if ! command -v gh &> /dev/null; then
            echo "⚠️ gh CLI not found, installing..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
          fi
          echo "✅ gh version: $(gh --version | head -1)"

          echo "📍 Fetching releases..."
          RAW_RELEASES=$(gh release list --limit 20 || echo "")
          RELEASES=$(echo "$RAW_RELEASES" | awk -F'\t' '{print $3}' | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "")

          mkdir -p .docker-binaries
          touch .docker-binaries/.gitkeep

          # Only tools-client is needed (used by mcp-check.sh.hbs in agent pods).
          # intake-util is a Bun binary built in-image from apps/intake-util/.
          # play-monitor and Rust intake are no longer used.
          for TAG in $RELEASES; do
            VERSION="${TAG#v}"

            if [ -z "$TOOLS_VERSION" ]; then
              if gh release download "$TAG" --pattern 'tools-client-linux-x86_64' --skip-existing --dir .docker-binaries 2>/dev/null; then
                echo "📦 Found tools-client in release: $VERSION"
                TOOLS_VERSION="$VERSION"
                break
              fi
            fi
          done

          echo "📁 Downloaded binaries:"
          ls -la .docker-binaries/ || echo "  (none)"

          if [ -n "$TOOLS_VERSION" ]; then
            echo "✅ Using tools version: $TOOLS_VERSION"
            echo "tools_version=$TOOLS_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ No release with tools-client found, skipping tools"
            echo "tools_version=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute base tag (Dockerfile hash + binary versions)
        id: tag
        run: |
          set -euo pipefail
          DOCKERFILE_HASH=$(git log -1 --format="%h" -- infra/images/runtime/Dockerfile)
          TOOLS_VER="${{ steps.binaries-version.outputs.tools_version }}"

          VERSION_SUFFIX=""
          if [ "$TOOLS_VER" != "skip" ] && [ -n "$TOOLS_VER" ]; then
            VERSION_SUFFIX="${VERSION_SUFFIX}-t$(echo "$TOOLS_VER" | tr '.' '-')"
          fi

          if [ -z "$VERSION_SUFFIX" ]; then
            VERSION_SUFFIX="-nobin"
          fi

          TAG="${DOCKERFILE_HASH}${VERSION_SUFFIX}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Computed runtime tag: $TAG"

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if base image exists
        id: check
        run: |
          if timeout 30 docker manifest inspect "${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/runtime:v${{ steps.tag.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Base image exists: v${{ steps.tag.outputs.tag }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "📦 Base image not found or check timed out, will rebuild"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false' || inputs.force_rebuild == true
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3

      - name: Build and push base image
        if: steps.check.outputs.exists == 'false' || inputs.force_rebuild == true
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v5
        with:
          context: .
          file: ./infra/images/runtime/Dockerfile
          target: production
          platforms: linux/amd64
          pull: true
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/runtime:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/runtime:full
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/runtime:v${{ steps.tag.outputs.tag }}
          build-args: |
            TOOLS_VERSION=${{ steps.binaries-version.outputs.tools_version }}
            INSTALL_SCCACHE=false
          no-cache: ${{ inputs.no_cache == true }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/runtime:buildcache
            ${{ inputs.no_cache != true && 'type=gha,scope=runtime' || '' }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/runtime:buildcache,mode=max
            ${{ inputs.no_cache != true && 'type=gha,scope=runtime,mode=max' || '' }}

      - name: Set build output
        id: set-built
        run: |
          if [[ "${{ steps.check.outputs.exists }}" == "false" || "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
          fi

  build-sidecar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3

      - name: Calculate sidecar version
        id: version
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Sidecar version: $VERSION"

      - name: Build and push linear-sidecar
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v6
        with:
          context: .
          file: ./infra/images/linear-sidecar/Dockerfile
          target: local
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/linear-sidecar:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/linear-sidecar:${{ steps.version.outputs.version }}
          no-cache: ${{ inputs.no_cache == true }}
          cache-from: ${{ inputs.no_cache != true && 'type=gha,scope=sidecar' || '' }}
          cache-to: ${{ inputs.no_cache != true && 'type=gha,scope=sidecar,mode=max' || '' }}

      - name: Summary
        run: |
          {
            echo "### 🔌 Linear Sidecar"
            echo ""
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/linear-sidecar:latest"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/linear-sidecar:${{ steps.version.outputs.version }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Build the unified agents image containing ALL CLI tools
  build-agents:
    needs: build-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift \
            /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/heroku 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          df -h /

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          check-latest: true

      - name: Resolve OpenClaw version
        id: openclaw-version
        run: |
          if [ -n "${{ inputs.openclaw_version }}" ]; then
            VERSION="${{ inputs.openclaw_version }}"
            echo "📦 Using OpenClaw override: $VERSION"
          else
            VERSION=$(npm view openclaw version 2>/dev/null || echo "latest")
            echo "📦 Latest OpenClaw: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Discover npm CLI versions
        id: cli-versions
        run: |
          get_ver() { npm view "$1" version 2>/dev/null || echo "unknown"; }
          echo "acpx=$(get_ver acpx)" >> "$GITHUB_OUTPUT"
          echo "claude=$(get_ver @anthropic-ai/claude-code)" >> "$GITHUB_OUTPUT"
          echo "codex=$(get_ver @openai/codex)" >> "$GITHUB_OUTPUT"
          echo "copilot=$(get_ver @github/copilot)" >> "$GITHUB_OUTPUT"
          echo "code=$(get_ver @just-every/code)" >> "$GITHUB_OUTPUT"
          echo "gemini=$(get_ver @google/gemini-cli)" >> "$GITHUB_OUTPUT"
          echo "clawhub=$(get_ver clawhub)" >> "$GITHUB_OUTPUT"
          echo "openai=$(get_ver openai)" >> "$GITHUB_OUTPUT"
          echo "📦 Discovered npm CLI versions"

      - name: Compute agents image tag
        id: tag
        run: |
          # Tag from Dockerfile hash + openclaw version
          DOCKERFILE_HASH=$(git log -1 --format="%h" -- infra/images/agents/Dockerfile infra/images/agents/entrypoint.sh)
          OPENCLAW_VER="${{ steps.openclaw-version.outputs.version }}"
          TAG="${DOCKERFILE_HASH}-oc$(echo "$OPENCLAW_VER" | tr '.' '-')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Computed agents tag: $TAG"

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if agents image exists
        id: check
        run: |
          if timeout 30 docker manifest inspect "${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/agents:v${{ steps.tag.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Agents image exists: v${{ steps.tag.outputs.tag }}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "📦 Agents image not found, will build"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false' || inputs.force_rebuild == true
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3

      - name: Build and push agents image
        if: steps.check.outputs.exists == 'false' || inputs.force_rebuild == true
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v5
        with:
          context: .
          file: ./infra/images/agents/Dockerfile
          platforms: linux/amd64
          pull: true
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/agents:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/agents:v${{ steps.tag.outputs.tag }}
          labels: |
            ai.5dlabs.openclaw.version=${{ steps.openclaw-version.outputs.version }}
            ai.5dlabs.cli.acpx=${{ steps.cli-versions.outputs.acpx }}
            ai.5dlabs.cli.claude=${{ steps.cli-versions.outputs.claude }}
            ai.5dlabs.cli.codex=${{ steps.cli-versions.outputs.codex }}
            ai.5dlabs.cli.copilot=${{ steps.cli-versions.outputs.copilot }}
            ai.5dlabs.cli.code=${{ steps.cli-versions.outputs.code }}
            ai.5dlabs.cli.gemini=${{ steps.cli-versions.outputs.gemini }}
            ai.5dlabs.cli.clawhub=${{ steps.cli-versions.outputs.clawhub }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/runtime:v${{ needs.build-runtime.outputs.tag }}
            OPENCLAW_VERSION=${{ steps.openclaw-version.outputs.version }}
            ${{ inputs.opencode_version != '' && format('OPENCODE_VERSION={0}', inputs.opencode_version) || '' }}
          no-cache: ${{ inputs.no_cache == true }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/runtime:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/agents:buildcache
            ${{ inputs.no_cache != true && 'type=gha,scope=agents' || '' }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/agents:buildcache,mode=max
            ${{ inputs.no_cache != true && 'type=gha,scope=agents,mode=max' || '' }}

      - name: Extract binary CLI versions
        id: binary-versions
        if: steps.check.outputs.exists == 'false' || inputs.force_rebuild == true
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/agents:latest"
          MANIFEST=$(docker run --rm --entrypoint cat "$IMAGE" /etc/cto/versions.json 2>/dev/null || echo '{}')
          echo "$MANIFEST" | tee /tmp/versions.json
          # Extract binary-only versions (not available via npm view)
          get_v() { echo "$MANIFEST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('clis',d.get('tools',{})).get('$1','unknown'))" 2>/dev/null || echo "unknown"; }
          echo "droid=$(get_v droid)" >> "$GITHUB_OUTPUT"
          echo "cursor=$(get_v cursor)" >> "$GITHUB_OUTPUT"
          echo "kimi=$(get_v kimi)" >> "$GITHUB_OUTPUT"
          echo "opencode=$(get_v opencode)" >> "$GITHUB_OUTPUT"
          echo "gh=$(get_v gh)" >> "$GITHUB_OUTPUT"
          echo "op=$(get_v op)" >> "$GITHUB_OUTPUT"
          echo "node=$(get_v node)" >> "$GITHUB_OUTPUT"
          echo "bun=$(get_v bun)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(echo "$MANIFEST" | python3 -c "import sys,json; print(json.load(sys.stdin).get('buildDate',''))" 2>/dev/null)" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "### 🤖 Unified Agents Image"
            echo ""
            echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/agents\`"
            echo ""
            echo "**Tags:**"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/agents:latest\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/agents:v${{ steps.tag.outputs.tag }}\`"
            echo ""
            echo "#### CLI Versions"
            echo ""
            echo "| CLI | Version | Source |"
            echo "|-----|---------|--------|"
            echo "| OpenClaw | \`${{ steps.openclaw-version.outputs.version }}\` | npm |"
            echo "| acpx | \`${{ steps.cli-versions.outputs.acpx }}\` | npm |"
            echo "| Claude Code | \`${{ steps.cli-versions.outputs.claude }}\` | npm |"
            echo "| Codex | \`${{ steps.cli-versions.outputs.codex }}\` | npm |"
            echo "| Copilot | \`${{ steps.cli-versions.outputs.copilot }}\` | npm |"
            echo "| Every-Code | \`${{ steps.cli-versions.outputs.code }}\` | npm |"
            echo "| Gemini | \`${{ steps.cli-versions.outputs.gemini }}\` | npm |"
            echo "| ClawHub | \`${{ steps.cli-versions.outputs.clawhub }}\` | npm |"
            echo "| Droid | \`${{ steps.binary-versions.outputs.droid || 'n/a' }}\` | binary |"
            echo "| Cursor | \`${{ steps.binary-versions.outputs.cursor || 'n/a' }}\` | binary |"
            echo "| Kimi | \`${{ steps.binary-versions.outputs.kimi || 'n/a' }}\` | binary |"
            echo "| OpenCode | \`${{ steps.binary-versions.outputs.opencode || 'n/a' }}\` | binary |"
            echo ""
            echo "#### Tools"
            echo ""
            echo "| Tool | Version |"
            echo "|------|---------|"
            echo "| gh | \`${{ steps.binary-versions.outputs.gh || 'n/a' }}\` |"
            echo "| 1Password | \`${{ steps.binary-versions.outputs.op || 'n/a' }}\` |"
            echo "| Node.js | \`${{ steps.binary-versions.outputs.node || 'n/a' }}\` |"
            echo "| Bun | \`${{ steps.binary-versions.outputs.bun || 'n/a' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    needs: [build-runtime, build-agents, build-sidecar]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary header
        run: |
          {
            echo "## 🤖 Agent Images Update"
            echo ""
            echo "### 📋 Results"
            echo "Single unified image with all CLIs — see agent section above for details."
            echo ""
            echo "🔄 **Next run**: Tomorrow at 6 AM UTC (or trigger manually)"
          } >> "$GITHUB_STEP_SUMMARY"
