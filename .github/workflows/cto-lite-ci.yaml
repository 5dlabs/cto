name: CTO Lite CI

on:
  pull_request:
    paths:
      - "crates/cto-lite/**"
      - ".github/workflows/cto-lite-*.yaml"
  push:
    branches:
      - main
      - "ctolite/**"
    paths:
      - "crates/cto-lite/**"
      - ".github/workflows/cto-lite-*.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint and type check the frontend
  frontend-check:
    runs-on: ubuntu-latest
    name: Frontend Checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/cto-lite/ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: crates/cto-lite/ui

      - name: Type check
        run: npm run typecheck
        working-directory: crates/cto-lite/ui

      - name: Lint
        run: npm run lint
        working-directory: crates/cto-lite/ui

      - name: Build
        run: npm run build
        working-directory: crates/cto-lite/ui

  # Lint and build the Rust backend
  backend-check:
    runs-on: ubuntu-latest
    name: Backend Checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./crates/cto-lite/tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev

      - name: Format check
        run: cargo fmt --check
        working-directory: crates/cto-lite/tauri

      - name: Create frontend dist placeholder
        run: |
          mkdir -p crates/cto-lite/ui/dist
          echo '<!DOCTYPE html><html><body>placeholder</body></html>' > crates/cto-lite/ui/dist/index.html

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: crates/cto-lite/tauri

      - name: Build
        run: cargo build --release
        working-directory: crates/cto-lite/tauri

      - name: Test
        run: cargo test
        working-directory: crates/cto-lite/tauri

  # Build test on all platforms (but don't upload)
  build-test:
    needs: [frontend-check, backend-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            name: macOS
          - platform: windows-latest
            name: Windows
          - platform: ubuntu-22.04
            name: Linux

    runs-on: ${{ matrix.platform }}
    name: Build Test (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/cto-lite/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./crates/cto-lite/tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install UI dependencies
        run: npm ci
        working-directory: crates/cto-lite/ui

      - name: Build UI
        run: npm run build
        working-directory: crates/cto-lite/ui

      - name: Build Tauri (debug)
        run: cargo build
        working-directory: crates/cto-lite/tauri

  # MCP server checks
  mcp-check:
    runs-on: ubuntu-latest
    name: MCP Server Checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./crates/cto-lite/mcp-lite -> target"

      - name: Format check
        run: cargo fmt --check
        working-directory: crates/cto-lite/mcp-lite

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: crates/cto-lite/mcp-lite

      - name: Build
        run: cargo build --release
        working-directory: crates/cto-lite/mcp-lite

      - name: Test
        run: cargo test
        working-directory: crates/cto-lite/mcp-lite

  # PM Lite checks
  pm-lite-check:
    runs-on: ubuntu-latest
    name: PM Lite Checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./crates/cto-lite/pm-lite -> target"

      - name: Format check
        run: cargo fmt --check
        working-directory: crates/cto-lite/pm-lite

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: crates/cto-lite/pm-lite

      - name: Build
        run: cargo build --release
        working-directory: crates/cto-lite/pm-lite

      - name: Test
        run: cargo test
        working-directory: crates/cto-lite/pm-lite
