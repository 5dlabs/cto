[package]
name = "pm-lite"
version = "0.1.0"
edition = "2021"
description = "Lightweight PM server for CTO Lite - GitHub webhooks only"
license = "MIT"

# Keep out of root workspace
[workspace]

[[bin]]
name = "pm-lite"
path = "src/bin/main.rs"

[dependencies]
# Shared utilities
cto-lite-common = { path = "../common" }

# Web framework
axum = { version = "0.8", features = ["macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP client
reqwest = { version = "0.12", features = ["json"] }

# Crypto for webhook verification
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
subtle = "2.5"  # Constant-time comparison for HMAC verification

# Error handling
anyhow = "1"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Kubernetes client
kube = { version = "0.96", features = ["runtime", "derive"] }
k8s-openapi = { version = "0.23", features = ["v1_31"] }

# Config
config = "0.14"
dotenvy = "0.15"

# Utils
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
base64 = "0.22"

[dev-dependencies]
tokio-test = "0.4"
