[package]
name = "mcp-lite"
version = "0.1.0"
edition = "2021"
description = "MCP server for CTO Lite - IDE integration for workflow triggering"
license = "MIT"

# Keep out of root workspace
[workspace]

[[bin]]
name = "mcp-lite"
path = "src/main.rs"

[lib]
path = "src/lib.rs"
name = "mcp_lite_lib"

[dependencies]
# Shared utilities
cto-lite-common = { path = "../common" }

# MCP protocol
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async runtime
tokio = { version = "1", features = ["full", "io-std"] }

# HTTP client for Kubernetes API
reqwest = { version = "0.12", features = ["json"] }

# Error handling
anyhow = "1"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# UUID for workflow names
uuid = { version = "1", features = ["v4", "serde"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
