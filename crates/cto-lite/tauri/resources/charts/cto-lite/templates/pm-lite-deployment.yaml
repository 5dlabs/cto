{{- if .Values.pmLite.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cto-lite.fullname" . }}-pm-lite
  labels:
    {{- include "cto-lite.pm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.pmLite.replicas }}
  selector:
    matchLabels:
      {{- include "cto-lite.pm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cto-lite.pm.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cto-lite.fullname" . }}
      containers:
        - name: pm-lite
          image: "{{ .Values.pmLite.image.repository }}:{{ .Values.pmLite.image.tag }}"
          imagePullPolicy: {{ .Values.pmLite.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.pmLite.port }}
              protocol: TCP
          env:
            - name: CTO_LITE
              value: "true"
            - name: RUST_LOG
              value: "info,pm_lite=debug"
            - name: PORT
              value: "{{ .Values.pmLite.port }}"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.pmLite.github.appId }}
            - name: GITHUB_APP_ID
              value: "{{ .Values.pmLite.github.appId }}"
            {{- end }}
            {{- if .Values.pmLite.github.privateKeySecret }}
            - name: GITHUB_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pmLite.github.privateKeySecret }}
                  key: private-key.pem
            {{- end }}
            {{- if .Values.pmLite.github.webhookSecret }}
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pmLite.github.webhookSecret }}
                  key: webhook-secret
            {{- end }}
          resources:
            {{- toYaml .Values.pmLite.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cto-lite.fullname" . }}-pm-lite
  labels:
    {{- include "cto-lite.pm.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.pmLite.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cto-lite.pm.selectorLabels" . | nindent 4 }}
{{- end }}
