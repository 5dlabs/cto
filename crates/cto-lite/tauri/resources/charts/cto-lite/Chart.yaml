# CTO Lite Helm Chart
# Simplified deployment for Kind clusters (local development)

apiVersion: v2
name: cto-lite
description: AI-powered development workflow for individual developers
type: application
version: 0.1.0
appVersion: "1.0.0"

keywords:
  - ai
  - development
  - workflow
  - mcp
  - local

home: https://cto.dev
sources:
  - https://git.5dlabs.ai/5dlabs/cto

maintainers:
  - name: 5D Labs
    email: support@5dlabs.io

dependencies:
  - name: argo-workflows
    version: "0.45.x"
    repository: https://argoproj.github.io/argo-helm
    condition: argo-workflows.enabled
