apiVersion: v1
kind: Namespace
metadata:
  name: messaging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: messaging
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/part-of: openclaw
    spec:
      containers:
        - name: nats
          image: docker.io/nats:2.11-alpine
          args:
            - "--addr"
            - "0.0.0.0"
            - "--port"
            - "4222"
            - "--http_port"
            - "8222"
          ports:
            - name: client
              containerPort: 4222
              protocol: TCP
            - name: monitor
              containerPort: 8222
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: messaging
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: openclaw
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: client
      protocol: TCP
    - name: monitor
      port: 8222
      targetPort: monitor
      protocol: TCP
