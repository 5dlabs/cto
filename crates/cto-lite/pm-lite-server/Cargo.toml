[package]
name = "pm-lite-server"
version = "0.1.0"
edition = "2021"
description = "Lightweight PM server for CTO Lite"
license = "MIT"

[dependencies]
# Shared utilities
cto-lite-common = { path = "../common" }

# Web framework
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }

# Async runtime
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# HTTP client
reqwest = { workspace = true }

# Crypto for webhook verification
hmac = "0.13"
sha2 = "0.10"
hex = "0.4"
subtle = "2.5"

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Kubernetes
kube = { workspace = true }
k8s-openapi = { workspace = true }

# Config
config = "0.14"
dotenvy = "0.15"

# Utils
chrono = { workspace = true }
uuid = { version = "1", features = ["v4", "serde"] }
base64 = "0.22"
urlencoding = "2"

[[bin]]
name = "pm-lite"
path = "src/bin/main.rs"
