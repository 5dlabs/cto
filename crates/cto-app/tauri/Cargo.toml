[package]
name = "cto-app-tauri"
version = "0.1.0"
description = "CTO App Desktop - Tauri Backend"
authors = ["CTO Team"]
edition = "2021"

[dependencies]
tauri = { version = "2.0" }
tauri-plugin-shell = "2.0"
keyring = "2"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
lazy_static = "1"
parking_lot = "0.12"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "z"
strip = true
