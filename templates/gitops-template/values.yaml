# Tenant Configuration
# Generated by CTO Onboarding - Customize as needed

tenant:
  # Unique tenant identifier
  id: "TENANT_ID_PLACEHOLDER"
  # Bare metal provider (latitude, hetzner, vultr, etc.)
  provider: "PROVIDER_PLACEHOLDER"
  # Deployment region
  region: "REGION_PLACEHOLDER"
  # Cluster size (small, medium, large)
  clusterSize: "SIZE_PLACEHOLDER"

cluster:
  # Kubernetes cluster name
  name: "CLUSTER_NAME_PLACEHOLDER"
  # Cluster ID for ClusterMesh (auto-generated)
  meshId: null

# ArgoCD sync configuration
argocd:
  # Target revision for all applications
  targetRevision: HEAD
  # Sync policy for applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

# Container registry settings
registry:
  # GHCR for public images
  server: ghcr.io
  # Image pull secret (if private)
  pullSecret: null

# Runtime component versions
versions:
  agentController: "v0.2.17"
  mcpTools: "v0.2.17"
  cilium: "1.16.4"
  localPathProvisioner: "0.0.30"

# Runtime components to deploy
# Set enabled: false to disable a component
applications:
  - name: agent-controller
    enabled: true
    namespace: cto-system
    chart: ghcr.io/5dlabs/charts/agent-controller

  - name: mcp-tools
    enabled: true
    namespace: cto-system
    chart: ghcr.io/5dlabs/charts/mcp-tools

  - name: cilium
    enabled: true
    namespace: kube-system
    # Cilium installed separately via installer, ArgoCD manages config
    managedExternally: true

  - name: local-path-provisioner
    enabled: true
    namespace: local-path-storage
    chart: https://github.com/rancher/local-path-provisioner

# MCP server configuration
mcp:
  servers:
    - name: github
      enabled: true
    - name: linear
      enabled: false  # Enable after Linear OAuth setup
    - name: latitude
      enabled: true   # Provider-specific MCP

# Monitoring and observability
monitoring:
  enabled: true
  metricsExport:
    # Export to control plane
    endpoint: null

# Feature flags
features:
  clusterMesh: true
  warpConnector: true
  openbaoIntegration: true
