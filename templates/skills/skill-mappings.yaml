# Skill Mappings Configuration
# Maps agents to their default and job-type-specific skills
#
# Skills are loaded based on:
# 1. Default skills - always loaded for the agent
# 2. Job-type skills - merged with defaults based on run_type
# 3. Optional skills - loaded based on triggers or explicit request (future)
#
# Job types: coder, healer, intake, quality, test, deploy, security, review, integration
#
# For Claude Code, Factory, OpenCode, Codex: skills are copied to native skill directories
# For other CLIs: skill content is baked into AGENTS.md

# ============================================================================
# FRONTEND AGENTS
# ============================================================================

blaze:
  description: "Frontend implementation expert for React/Next.js"
  default:
    # Context engineering (all agents)
    - context-fundamentals
    - context-degradation
    - context-optimization
    # Tool skills
    - openmemory
    - context7
    - octocode
    - llm-docs
    - github-mcp
    # Frontend specific
    - shadcn-stack
    - anime-js
    - effect-frontend-patterns
    - frontend-excellence
    - frontend-design
  coder:
    - tool-design
    - firecrawl
    - compound-engineering
  healer:
    - incident-response
    - observability
    - kubernetes-mcp
  optional:
    tanstack-stack:
      replaces: shadcn-stack
      description: "Use for TanStack-based client-first applications"
    better-auth:
      triggers: [auth, login, session, signin, signup, oauth]
      description: "Authentication implementation"
    memory-systems:
      triggers: [memory, persistence, state]
      description: "Agent memory architecture patterns"
    deep-research:
      triggers: [research, competitive, like, similar to, compare, best practices, ui patterns]
      description: "Deep technical research for UI patterns and competitive analysis"
    ralph-technique:
      triggers: [minimal, ralph, loop, autonomous, simple]
      description: "Minimal prompting technique for loop-based autonomous execution"

