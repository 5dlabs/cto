name: implement-task-1
metadata:
  task_id: 1
  agent: bolt
  stack: Kubernetes/Helm

inputs:
  - name: task_dir
  - name: repo_url
  - name: branch_name
    default: "task-1/feature-branch"
  - name: agent
    default: "bolt"
  - name: cli
    default: "claude"
  - name: model
    default: "claude-opus-4-6"
  - name: max_implementation_retries
    default: 10
  - name: max_quality_retries
    default: 5

steps:
  - name: setup
    command: >
      git clone {{inputs.repo_url}} work && cd work &&
      git checkout -b {{inputs.branch_name}}

  - name: scaffold-files
    depends_on: [setup]
    command: >
      cd work && mkdir -p kubernetes/namespaces kubernetes/cnpg kubernetes/valkey kubernetes/secrets kubernetes/configmaps kubernetes/networkpolicies

  - name: implement-subtask-undefined
    depends_on: [scaffold-files]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.undefined/prompt.md

  - name: validate-subtask-undefined
    depends_on: [implement-subtask-undefined]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-undefined
    depends_on: [scaffold-files]
    retry: { max: "{{inputs.max_implementation_retries}}" }
