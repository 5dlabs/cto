name: implement-task-1
metadata:
  task_id: 1
  agent: bolt
  stack: Kubernetes/Helm

inputs:
  - name: task_dir
  - name: repo_url
  - name: branch_name
    default: "task-1/feature-branch"
  - name: agent
    default: "bolt"
  - name: cli
    default: "claude"
  - name: model
    default: "claude-opus-4-6"
  - name: max_implementation_retries
    default: 10
  - name: max_quality_retries
    default: 5

steps:
  - name: setup
    command: >
      git clone {{inputs.repo_url}} work && cd work &&
      git checkout -b {{inputs.branch_name}}

  - name: scaffold-files
    depends_on: [setup]
    command: >
      cd work && mkdir -p k8s/namespaces k8s/db k8s/secrets k8s/configmaps k8s/cloudflare k8s/sidecars k8s/monitoring k8s/network

  - name: implement-subtask-1001
    depends_on: [scaffold-files]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1001/prompt.md

  - name: validate-subtask-1001
    depends_on: [implement-subtask-1001]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1002
    depends_on: [validate-subtask-1001]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1002/prompt.md

  - name: validate-subtask-1002
    depends_on: [implement-subtask-1002]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1003
    depends_on: [validate-subtask-1002]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1003/prompt.md

  - name: validate-subtask-1003
    depends_on: [implement-subtask-1003]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1004
    depends_on: [validate-subtask-1002]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1004/prompt.md

  - name: validate-subtask-1004
    depends_on: [implement-subtask-1004]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1005
    depends_on: [validate-subtask-1001]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1005/prompt.md

  - name: validate-subtask-1005
    depends_on: [implement-subtask-1005]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1006
    depends_on: [validate-subtask-1003]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1006/prompt.md

  - name: validate-subtask-1006
    depends_on: [implement-subtask-1006]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1007
    depends_on: [validate-subtask-1001]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1007/prompt.md

  - name: validate-subtask-1007
    depends_on: [implement-subtask-1007]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1008
    depends_on: [validate-subtask-1004, validate-subtask-1005]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1008/prompt.md

  - name: validate-subtask-1008
    depends_on: [implement-subtask-1008]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1009
    depends_on: [validate-subtask-1001]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1009/prompt.md

  - name: validate-subtask-1009
    depends_on: [implement-subtask-1009]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1010
    depends_on: [validate-subtask-1001]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1010/prompt.md

  - name: validate-subtask-1010
    depends_on: [implement-subtask-1010]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1011
    depends_on: [validate-subtask-1001]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1011/prompt.md

  - name: validate-subtask-1011
    depends_on: [implement-subtask-1011]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: implement-subtask-1012
    depends_on: [validate-subtask-1004, validate-subtask-1005]
    retry: { max: "{{inputs.max_implementation_retries}}" }
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt-file {{inputs.task_dir}}/subtasks/task-1.1012/prompt.md

  - name: validate-subtask-1012
    depends_on: [implement-subtask-1012]
    retry: { max: "{{inputs.max_quality_retries}}" }
    command: >
      cd work && kubectl apply --dry-run=client -f . && helm template . | kubeval && yamllint .

  - name: integration-validation
    depends_on: [validate-subtask-1001, validate-subtask-1002, validate-subtask-1003, validate-subtask-1004, validate-subtask-1005, validate-subtask-1006, validate-subtask-1007, validate-subtask-1008, validate-subtask-1009, validate-subtask-1010, validate-subtask-1011, validate-subtask-1012]
    command: >
      cd work && bun tsc --noEmit && bun test --run && bun lint

  - name: acceptance-check
    depends_on: [integration-validation]
    command: >
      {{inputs.cli}} --model {{inputs.model}} --prompt "Review changes against {{inputs.task_dir}}/acceptance.md. Output PASS or FAIL."

  - name: create-pr
    depends_on: [acceptance-check]
    command: >
      cd work && git add -A &&
      git commit -m "feat: task-1" &&
      git push origin {{inputs.branch_name}} &&
      source "${WORKSPACE:-.}/scripts/scm-dispatch.sh" &&
      scm_create_pr "feat: task-1" "$(cat {{inputs.task_dir}}/task.md)" "main"