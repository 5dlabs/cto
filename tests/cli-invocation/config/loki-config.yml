# Loki Configuration for Local Development
# Minimal config - single-node, filesystem storage

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

limits_config:
  # Allow recent logs (within last 1 hour) - good for testing
  reject_old_samples: true
  reject_old_samples_max_age: 1h
  # Increase ingestion rate for testing
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
