# =============================================================================
# FluentD Configuration - Agent Log Routing
# =============================================================================
#
# Routes agent CLI logs to:
#   1. Loki - for dashboards, retention, querying
#   2. Sidecar - for real-time Linear agent dialog updates
#
# =============================================================================

# Input: Forward protocol from Docker logging driver
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Parse JSON lines from CLI output
<filter agent.**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
  </parse>
</filter>

# Add metadata labels
<filter agent.**>
  @type record_transformer
  <record>
    hostname "#{Socket.gethostname}"
    timestamp ${time}
  </record>
</filter>

# Route to both Loki and Sidecar
<match agent.**>
  @type copy

  # Store 1: Loki (for dashboards, long-term storage)
  <store>
    @type loki
    url "http://loki:3100"
    <label>
      cli $.cli
      agent $.agent
      container_name $.container_name
    </label>
    <buffer>
      @type memory
      flush_interval 1s
      chunk_limit_size 1m
      retry_max_times 3
    </buffer>
  </store>

  # Store 2: Sidecar HTTP endpoint (real-time Linear updates)
  <store>
    @type http
    endpoint "http://sidecar:8080/ingest"
    http_method post
    content_type application/json
    json_array false
    <format>
      @type json
    </format>
    <buffer>
      @type memory
      flush_interval 0.1s
      flush_mode interval
      chunk_limit_size 256k
      retry_max_times 2
      retry_wait 1s
    </buffer>
    <secondary>
      @type stdout
    </secondary>
  </store>

  # Store 3: Stdout for debugging (optional, remove in prod)
  <store>
    @type stdout
  </store>
</match>

# Fallback for unmatched logs
<match **>
  @type stdout
</match>
