# =============================================================================
# Loki Logging Stack - Docker Compose Override
# =============================================================================
#
# Unified log collection for ALL CLIs via Loki.
# Use with: docker compose -f docker-compose.yml -f docker-compose.loki.yml up
#
# Prerequisites:
#   docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions
#
# =============================================================================

# Common Loki logging config
x-loki-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://localhost:3100/loki/api/v1/push"
    loki-batch-size: "100"
    loki-retries: "2"
    loki-timeout: "2s"

services:
  # ===========================================================================
  # Loki - Log Aggregation
  # ===========================================================================
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Grafana - Log Visualization
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      loki:
        condition: service_healthy

  # ===========================================================================
  # Claude CLI - Logs to Loki
  # ===========================================================================
  claude:
    logging:
      <<: *loki-logging
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "cli=claude,agent=rex"

  claude-sidecar:
    environment:
      LOG_SOURCE: loki
      LOKI_URL: http://localhost:3100
      LOKI_QUERY: '{cli="claude"}'

  # ===========================================================================
  # Factory CLI - Logs to Loki
  # ===========================================================================
  factory:
