apiVersion: apps/v1
kind: Deployment
metadata:
  name: rex-api-demo
  labels:
    app: rex-api-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rex-api-demo
  template:
    metadata:
      labels:
        app: rex-api-demo
    spec:
      containers:
      - name: api
        image: rex-api-demo:latest
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rex-api-demo-service
spec:
  selector:
    app: rex-api-demo
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
