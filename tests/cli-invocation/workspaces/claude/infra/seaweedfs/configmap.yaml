apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-config
  namespace: storage
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: config
data:
  master.toml: |
    # Master server configuration
    [master]
    port = 9333
    volumeSizeLimitMB = 30000
    defaultReplication = "001"

    [master.sequencer]
    type = "memory"

    [master.maintenance]
    scripts = ""

  filer.toml: |
    # Filer configuration
    [filer.options]
    recursive_delete = true

    # Use master for metadata storage
    [leveldb2]
    enabled = true
    dir = "/data/filerldb2"

    # Enable S3 compatible API
    [filer.s3]
    enabled = true
    port = 8333
    domainName = ""

    # Directory buckets
    [filer.sync.buckets]
    enabled = true

  security.toml: |
    # Security configuration
    [jwt.signing]
    key = ""

    [jwt.filer_signing]
    key = ""
