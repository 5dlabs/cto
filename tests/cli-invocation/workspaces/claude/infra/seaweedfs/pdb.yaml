---
# PodDisruptionBudget for Master - ensure majority available
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: seaweedfs-master
  namespace: storage
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: master
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
      app.kubernetes.io/component: master

---
# PodDisruptionBudget for Volume - ensure data availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: seaweedfs-volume
  namespace: storage
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: volume
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
      app.kubernetes.io/component: volume

---
# PodDisruptionBudget for Filer - ensure service availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: seaweedfs-filer
  namespace: storage
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: filer
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
      app.kubernetes.io/component: filer
