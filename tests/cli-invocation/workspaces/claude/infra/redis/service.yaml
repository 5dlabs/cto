---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-headless
  namespace: databases
  labels:
    app: redis-cluster
    component: redis
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: redis
    port: 6379
    targetPort: redis
    protocol: TCP
  - name: cluster-bus
    port: 16379
    targetPort: cluster-bus
    protocol: TCP
  selector:
    app: redis-cluster
    component: redis

---
# Service for client access to the cluster
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: databases
  labels:
    app: redis-cluster
    component: redis
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  type: ClusterIP
  ports:
  - name: redis
    port: 6379
    targetPort: redis
    protocol: TCP
  selector:
    app: redis-cluster
    component: redis

---
# Headless service for Sentinel StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel-headless
  namespace: databases
  labels:
    app: redis-sentinel
    component: sentinel
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: sentinel
    port: 26379
    targetPort: sentinel
    protocol: TCP
  selector:
    app: redis-sentinel
    component: sentinel

---
# Service for Sentinel access
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: databases
  labels:
    app: redis-sentinel
    component: sentinel
spec:
  type: ClusterIP
  ports:
  - name: sentinel
    port: 26379
    targetPort: sentinel
    protocol: TCP
  selector:
    app: redis-sentinel
    component: sentinel
