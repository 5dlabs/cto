apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: databases

resources:
  - namespace.yaml
  - cluster.yaml

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: redis
  app.kubernetes.io/managed-by: kustomize

# Images can be managed centrally
images:
  - name: redis
    newName: redis
    newTag: 7.2-alpine
