---
# Example application deployment that connects to MongoDB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-app-example
  namespace: applications
  labels:
    app: mongodb-app-example
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mongodb-app-example
  template:
    metadata:
      labels:
        app: mongodb-app-example
        access-mongodb: "true"  # Required for network policy
    spec:
      containers:
        - name: app
          image: your-app-image:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            # MongoDB connection string
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-app-credentials
                  key: mongodb-uri

            # Individual connection parameters (alternative)
            - name: MONGODB_HOST
              value: "mongodb-rs.databases.svc.cluster.local"

            - name: MONGODB_PORT
              value: "27017"

            - name: MONGODB_DATABASE
              value: "myapp"

            - name: MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-app-credentials
                  key: username

            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-app-credentials
                  key: password

            - name: MONGODB_REPLICA_SET
              value: "rs0"

            - name: MONGODB_AUTH_SOURCE
              value: "admin"

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
# Application credentials secret
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-app-credentials
  namespace: applications
  labels:
    app: mongodb-app-example
type: Opaque
stringData:
  # Full connection string (recommended)
  mongodb-uri: "mongodb://appuser:apppassword@mongodb-rs.databases.svc.cluster.local:27017/myapp?replicaSet=rs0&authSource=admin"

  # Individual credentials
  username: "appuser"
  password: "apppassword"

---
# Service for the application
apiVersion: v1
kind: Service
metadata:
  name: mongodb-app-example
  namespace: applications
  labels:
    app: mongodb-app-example
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: mongodb-app-example

---
# Example script to create application user in MongoDB
# Run this as a Job after MongoDB cluster is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-create-appuser
  namespace: databases
  labels:
    app: mongodb-setup
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-setup
          image: percona/percona-server-mongodb:7.0.4-2
          command:
            - /bin/bash
            - -c
            - |
              # Wait for MongoDB to be ready
              until mongosh "mongodb://mongodb-rs.databases.svc.cluster.local:27017/admin" \
                --username "${ADMIN_USER}" \
                --password "${ADMIN_PASSWORD}" \
                --eval "db.adminCommand('ping')" &>/dev/null; do
                echo "Waiting for MongoDB..."
                sleep 5
              done

              # Create application user
              mongosh "mongodb://mongodb-rs.databases.svc.cluster.local:27017/admin" \
                --username "${ADMIN_USER}" \
                --password "${ADMIN_PASSWORD}" \
                --eval "
                  db = db.getSiblingDB('myapp');
                  db.createUser({
                    user: 'appuser',
                    pwd: 'apppassword',
                    roles: [
                      { role: 'readWrite', db: 'myapp' }
                    ]
                  });
                  print('Application user created successfully');
                "
          env:
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-rs-secrets
                  key: MONGODB_DATABASE_ADMIN_USER

            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-rs-secrets
                  key: MONGODB_DATABASE_ADMIN_PASSWORD
