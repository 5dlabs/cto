---
# MongoDB Users Secret
# Generate secure passwords using: openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-rs-secrets
  namespace: databases
  labels:
    app: mongodb
    app.kubernetes.io/name: percona-server-mongodb
    app.kubernetes.io/instance: mongodb-rs
type: Opaque
stringData:
  # Database admin user
  MONGODB_DATABASE_ADMIN_USER: databaseAdmin
  MONGODB_DATABASE_ADMIN_PASSWORD: "changeme-admin-password"

  # Cluster admin user
  MONGODB_CLUSTER_ADMIN_USER: clusterAdmin
  MONGODB_CLUSTER_ADMIN_PASSWORD: "changeme-cluster-password"

  # Cluster monitor user
  MONGODB_CLUSTER_MONITOR_USER: clusterMonitor
  MONGODB_CLUSTER_MONITOR_PASSWORD: "changeme-monitor-password"

  # Backup user
  MONGODB_BACKUP_USER: backup
  MONGODB_BACKUP_PASSWORD: "changeme-backup-password"

  # User admin
  MONGODB_USER_ADMIN_USER: userAdmin
  MONGODB_USER_ADMIN_PASSWORD: "changeme-useradmin-password"

---
# S3 Backup Credentials Secret
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-backup-s3
  namespace: databases
  labels:
    app: mongodb
    app.kubernetes.io/name: percona-server-mongodb
    app.kubernetes.io/instance: mongodb-rs
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "your-access-key-id"
  AWS_SECRET_ACCESS_KEY: "your-secret-access-key"

---
# PMM Server API Key Secret (optional)
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-pmm-secret
  namespace: databases
  labels:
    app: mongodb
    app.kubernetes.io/name: percona-server-mongodb
    app.kubernetes.io/instance: mongodb-rs
type: Opaque
stringData:
  PMM_SERVER_KEY: "your-pmm-api-key"
