apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-rs-config
  namespace: databases
  labels:
    app: mongodb
    app.kubernetes.io/name: percona-server-mongodb
    app.kubernetes.io/instance: mongodb-rs
data:
  # MongoDB configuration
  mongod.conf: |
    # MongoDB configuration file for Percona Server for MongoDB

    # Storage configuration
    storage:
      dbPath: /data/db
      engine: wiredTiger
      wiredTiger:
        engineConfig:
          cacheSizeGB: 1.5
          directoryForIndexes: true
        collectionConfig:
          blockCompressor: snappy
        indexConfig:
          prefixCompression: true

    # Replication configuration
    replication:
      replSetName: rs0
      enableMajorityReadConcern: true

    # Network configuration
    net:
      port: 27017
      bindIpAll: true
      maxIncomingConnections: 65536
      compression:
        compressors: snappy,zstd,zlib

    # Security configuration
    security:
      authorization: enabled
      javascriptEnabled: false

    # Operation profiling
    operationProfiling:
      mode: slowOp
      slowOpThresholdMs: 100
      slowOpSampleRate: 1.0

    # Process management
    processManagement:
      fork: false

    # System log
    systemLog:
      destination: file
      path: /data/db/mongod.log
      logAppend: true
      verbosity: 0
      component:
        replication:
          verbosity: 1
        storage:
          verbosity: 1

    # Set parameter
    setParameter:
      enableLocalhostAuthBypass: false
      authenticationMechanisms: SCRAM-SHA-256
      ttlMonitorSleepSecs: 60
      cursorTimeoutMillis: 600000
