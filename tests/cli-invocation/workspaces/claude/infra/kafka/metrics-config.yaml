apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics
  namespace: messaging
data:
  kafka-metrics-config.yml: |
    # Kafka JMX metrics for Prometheus
    lowercaseOutputName: true
    rules:
    # Special cases and very specific rules
    - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
      name: kafka_server_$1_$2
      type: GAUGE
      labels:
       clientId: "$3"
       topic: "$4"
       partition: "$5"
    - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)><>Value
      name: kafka_server_$1_$2
      type: GAUGE
      labels:
       clientId: "$3"
       broker: "$4:$5"
    - pattern: kafka.server<type=(.+), cipher=(.+), protocol=(.+), listener=(.+), networkProcessor=(.+)><>connections
      name: kafka_server_$1_connections_tls_info
      type: GAUGE
      labels:
        listener: "$2"
        networkProcessor: "$3"
        protocol: "$4"
        cipher: "$5"
    - pattern: kafka.server<type=(.+), clientSoftwareName=(.+), clientSoftwareVersion=(.+), listener=(.+), networkProcessor=(.+)><>connections
      name: kafka_server_$1_connections_software
      type: GAUGE
      labels:
        clientSoftwareName: "$2"
        clientSoftwareVersion: "$3"
        listener: "$4"
        networkProcessor: "$5"
    - pattern: "kafka.server<type=(.+), listener=(.+), networkProcessor=(.+)><>(.+):"
      name: kafka_server_$1_$4
      type: GAUGE
      labels:
       listener: "$2"
       networkProcessor: "$3"
    - pattern: kafka.server<type=(.+), listener=(.+), networkProcessor=(.+)><>(.+)
      name: kafka_server_$1_$4
      type: GAUGE
      labels:
       listener: "$2"
       networkProcessor: "$3"
    # Some percent metrics use MeanRate attribute
    - pattern: kafka.server<type=(.+), name=(.+)><>MeanRate
      name: kafka_server_$1_$2_percent
      type: GAUGE
    # Generic gauges for percents
    - pattern: kafka.server<type=(.+), name=(.+)Percent\w*><>Value
      name: kafka_server_$1_$2_percent
      type: GAUGE
    - pattern: kafka.server<type=(.+), name=(.+)Percent\w*><>Count
      name: kafka_server_$1_$2_total_count
      type: COUNTER
    - pattern: kafka.server<type=(.+), name=(.+)Percent\w*, (.+)=(.+)><>Value
      name: kafka_server_$1_$2_percent
      type: GAUGE
      labels:
        "$3": "$4"
    # Generic per-second counters with 0-2 key/value pairs
    - pattern: kafka.server<type=(.+), name=(.+)PerSec\w*, (.+)=(.+), (.+)=(.+)><>Count
      name: kafka_server_$1_$2_total
      type: COUNTER
      labels:
        "$3": "$4"
        "$5": "$6"
    - pattern: kafka.server<type=(.+), name=(.+)PerSec\w*, (.+)=(.+)><>Count
      name: kafka_server_$1_$2_total
      type: COUNTER
      labels:
        "$3": "$4"
    - pattern: kafka.server<type=(.+), name=(.+)PerSec\w*><>Count
      name: kafka_server_$1_$2_total
      type: COUNTER
    # Generic gauges with 0-2 key/value pairs
    - pattern: kafka.server<type=(.+), name=(.+), (.+)=(.+), (.+)=(.+)><>Value
      name: kafka_server_$1_$2
      type: GAUGE
      labels:
        "$3": "$4"
        "$5": "$6"
    - pattern: kafka.server<type=(.+), name=(.+), (.+)=(.+)><>Value
      name: kafka_server_$1_$2
      type: GAUGE
      labels:
        "$3": "$4"
    - pattern: kafka.server<type=(.+), name=(.+)><>Value
      name: kafka_server_$1_$2
      type: GAUGE
    # Emulate Prometheus 'Summary' metrics for the exported 'Histogram's.
    - pattern: kafka.server<type=(.+), name=(.+), (.+)=(.+), (.+)=(.+)><>Count
      name: kafka_server_$1_$2_count
      type: COUNTER
      labels:
        "$3": "$4"
        "$5": "$6"
    - pattern: kafka.server<type=(.+), name=(.+), (.+)=(.*), (.+)=(.+)><>(\d+)thPercentile
      name: kafka_server_$1_$2
      type: GAUGE
      labels:
        "$3": "$4"
        "$5": "$6"
        quantile: "0.$7"
    - pattern: kafka.server<type=(.+), name=(.+), (.+)=(.+)><>Count
      name: kafka_server_$1_$2_count
      type: COUNTER
      labels:
        "$3": "$4"
    - pattern: kafka.server<type=(.+), name=(.+), (.+)=(.*)><>(\d+)thPercentile
      name: kafka_server_$1_$2
      type: GAUGE
      labels:
        "$3": "$4"
        quantile: "0.$5"
    - pattern: kafka.server<type=(.+), name=(.+)><>Count
      name: kafka_server_$1_$2_count
      type: COUNTER
    - pattern: kafka.server<type=(.+), name=(.+)><>(\d+)thPercentile
      name: kafka_server_$1_$2
      type: GAUGE
      labels:
        quantile: "0.$3"

  zookeeper-metrics-config.yml: |
    # ZooKeeper JMX metrics for Prometheus
    lowercaseOutputName: true
    rules:
    - pattern: "org.apache.ZooKeeperService<name0=ReplicatedServer_id(\\d+)><>(\\w+)"
      name: "zookeeper_$2"
      type: GAUGE
    - pattern: "org.apache.ZooKeeperService<name0=ReplicatedServer_id(\\d+), name1=replica.(\\d+)><>(\\w+)"
      name: "zookeeper_$3"
      type: GAUGE
      labels:
        replicaId: "$2"
    - pattern: "org.apache.ZooKeeperService<name0=ReplicatedServer_id(\\d+), name1=replica.(\\d+), name2=(\\w+)><>(Packets\\w+)"
      name: "zookeeper_$4"
      type: COUNTER
      labels:
        replicaId: "$2"
        memberType: "$3"
    - pattern: "org.apache.ZooKeeperService<name0=ReplicatedServer_id(\\d+), name1=replica.(\\d+), name2=(\\w+)><>(\\w+)"
      name: "zookeeper_$4"
      type: GAUGE
      labels:
        replicaId: "$2"
        memberType: "$3"
    - pattern: "org.apache.ZooKeeperService<name0=ReplicatedServer_id(\\d+), name1=replica.(\\d+), name2=(\\w+), name3=(\\w+)><>(\\w+)"
      name: "zookeeper_$4_$5"
      type: GAUGE
      labels:
        replicaId: "$2"
        memberType: "$3"
