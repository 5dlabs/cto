---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: databases

# Base configuration
resources:
  - ../../

# Production-specific patches
patchesStrategicMerge:
  - resource-limits-patch.yaml
  - storage-patch.yaml

# Production labels
commonLabels:
  environment: production
  tier: database

commonAnnotations:
  environment: production
  managed-by: kustomize
  contact: devops@example.com
