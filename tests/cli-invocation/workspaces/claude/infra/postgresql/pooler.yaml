  # Pool size and connection limits
  instances: 3
  type: ro  # Read-Only pooler (connects to replicas)

  # PgBouncer configuration
  pgbouncer:
    # Pool mode: transaction is recommended for most applications
    poolMode: transaction

    # Connection parameters
    parameters:
      # Connection limits
      max_client_conn: "1000"
      default_pool_size: "25"
      min_pool_size: "5"
