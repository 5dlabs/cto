---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-cluster-pooler-auth-query
  namespace: databases
type: Opaque
stringData:
  # The pooler will use the superuser credentials to execute the auth query
  # This secret is automatically managed by the operator
  username: postgres
  password: change-me-superuser-password
