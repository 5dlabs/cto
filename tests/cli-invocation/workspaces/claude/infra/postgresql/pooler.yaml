---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: postgres-cluster-pooler-rw
  namespace: databases
spec:
  cluster:
    name: postgres-cluster

  # Pool size and connection limits
  instances: 3
  type: rw  # Read-Write pooler (connects to primary)

  # PgBouncer configuration
  pgbouncer:
    # Pool mode: transaction is recommended for most applications
    poolMode: transaction

    # Connection parameters
    parameters:
      # Connection limits
      max_client_conn: "1000"
      default_pool_size: "25"
      min_pool_size: "5"
      reserve_pool_size: "5"
      reserve_pool_timeout: "3"
      max_db_connections: "100"
      max_user_connections: "100"

      # Timeouts
      server_idle_timeout: "600"
      server_lifetime: "3600"
      server_connect_timeout: "15"
      query_timeout: "0"
      query_wait_timeout: "120"
      client_idle_timeout: "0"
      idle_transaction_timeout: "0"

      # Logging
      log_connections: "1"
      log_disconnections: "1"
      log_pooler_errors: "1"

      # Other settings
      ignore_startup_parameters: "extra_float_digits"
      application_name_add_host: "1"

    # Authentication query for dynamic user authentication
    authQuerySecret:
      name: postgres-cluster-pooler-auth-query

    # Authentication mode
    authQuery: "SELECT usename, passwd FROM pg_shadow WHERE usename=$1"

  # Resource management
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  # High availability
  template:
    metadata:
      labels:
        app: postgres-pooler
        pooler: rw
    spec:
      containers: []
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: pooler
                      operator: In
                      values:
                        - rw
                topologyKey: kubernetes.io/hostname

  # Monitoring
  monitoring:
    enabled: true
    podMonitorEnabled: true

---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
