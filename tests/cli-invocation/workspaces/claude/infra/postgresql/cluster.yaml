apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-test
  namespace: databases
spec:
  instances: 1

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"

  # Storage configuration
  storage:
    size: 1Gi
    storageClass: standard

  # Resource limits
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  # Bootstrap configuration
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: postgres-app-user

  # Monitoring
  monitoring:
    enablePodMonitor: false
