---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: databases
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"

  storage:
    size: 10Gi
    storageClass: standard

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  bootstrap:
    initdb:
      database: appdb
      owner: appuser
      secret:
        name: postgres-cluster-app-user

  monitoring:
    enablePodMonitor: false

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-cluster-app-user
  namespace: databases
type: kubernetes.io/basic-auth
stringData:
  username: appuser
  password: test-password-change-me
