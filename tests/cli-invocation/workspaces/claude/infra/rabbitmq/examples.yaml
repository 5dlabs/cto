---
# Example application deployment that connects to RabbitMQ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-consumer-example
  namespace: messaging
  labels:
    app: rabbitmq-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rabbitmq-consumer
  template:
    metadata:
      labels:
        app: rabbitmq-consumer
    spec:
      containers:
        - name: consumer
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              pip install pika
              python /app/consumer.py
          env:
            - name: RABBITMQ_HOST
              value: "rabbitmq-cluster-amqp.messaging.svc.cluster.local"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-app-credentials
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-app-credentials
                  key: password
            - name: RABBITMQ_VHOST
              value: "/production"
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          configMap:
            name: rabbitmq-consumer-code

---
# Secret for application credentials
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-app-credentials
  namespace: messaging
type: Opaque
stringData:
  username: app-user
  password: changeme456

---
# ConfigMap with example Python consumer code
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-consumer-code
  namespace: messaging
data:
  consumer.py: |
    #!/usr/bin/env python3
    import pika
    import os
    import time
    import json
    from datetime import datetime

    def get_connection():
        """Establish connection to RabbitMQ with retry logic"""
        max_retries = 5
        retry_delay = 5

        credentials = pika.PlainCredentials(
            os.getenv('RABBITMQ_USERNAME', 'app-user'),
            os.getenv('RABBITMQ_PASSWORD', 'changeme456')
        )

        parameters = pika.ConnectionParameters(
            host=os.getenv('RABBITMQ_HOST', 'rabbitmq-cluster-amqp'),
            port=int(os.getenv('RABBITMQ_PORT', 5672)),
            virtual_host=os.getenv('RABBITMQ_VHOST', '/production'),
            credentials=credentials,
            heartbeat=600,
            blocked_connection_timeout=300,
            connection_attempts=max_retries,
            retry_delay=retry_delay
        )

        for attempt in range(max_retries):
            try:
                print(f"Connecting to RabbitMQ (attempt {attempt + 1}/{max_retries})...")
                connection = pika.BlockingConnection(parameters)
                print("✓ Connected to RabbitMQ successfully")
                return connection
            except Exception as e:
                print(f"✗ Connection failed: {e}")
                if attempt < max_retries - 1:
                    time.sleep(retry_delay)
                else:
                    raise

    def callback(ch, method, properties, body):
        """Process incoming messages"""
        try:
            print(f"[{datetime.now()}] Received message:")
            print(f"  Routing Key: {method.routing_key}")
            print(f"  Body: {body.decode()}")

            # Process message here
            time.sleep(1)  # Simulate work

            # Acknowledge message
            ch.basic_ack(delivery_tag=method.delivery_tag)
            print("✓ Message processed and acknowledged")

        except Exception as e:
            print(f"✗ Error processing message: {e}")
            # Reject and requeue message
            ch.basic_nack(delivery_tag=method.delivery_tag, requeue=True)

    def main():
        """Main consumer loop"""
        connection = None
        channel = None

        try:
            # Connect to RabbitMQ
            connection = get_connection()
            channel = connection.channel()

            # Declare queue (idempotent)
            queue_name = 'example_queue'
            channel.queue_declare(
                queue=queue_name,
                durable=True,
                arguments={
                    'x-message-ttl': 86400000,  # 24 hours
                    'x-max-length': 100000
                }
            )

            # Set QoS - prefetch 10 messages
            channel.basic_qos(prefetch_count=10)

            # Start consuming
            print(f"Starting consumer for queue: {queue_name}")
            channel.basic_consume(
                queue=queue_name,
                on_message_callback=callback,
                auto_ack=False
            )

            print("Waiting for messages. Press Ctrl+C to exit.")
            channel.start_consuming()

        except KeyboardInterrupt:
            print("\nShutting down gracefully...")
            if channel:
                channel.stop_consuming()
        except Exception as e:
            print(f"Fatal error: {e}")
        finally:
            if connection and not connection.is_closed:
                connection.close()
                print("Connection closed")

    if __name__ == '__main__':
        main()

  producer.py: |
    #!/usr/bin/env python3
    import pika
    import os
    import json
    import time
    from datetime import datetime

    def get_connection():
        """Establish connection to RabbitMQ"""
        credentials = pika.PlainCredentials(
            os.getenv('RABBITMQ_USERNAME', 'app-user'),
            os.getenv('RABBITMQ_PASSWORD', 'changeme456')
        )

        parameters = pika.ConnectionParameters(
            host=os.getenv('RABBITMQ_HOST', 'rabbitmq-cluster-amqp'),
            port=int(os.getenv('RABBITMQ_PORT', 5672)),
            virtual_host=os.getenv('RABBITMQ_VHOST', '/production'),
            credentials=credentials,
            heartbeat=600,
            blocked_connection_timeout=300
        )

        return pika.BlockingConnection(parameters)

    def publish_message(channel, message, routing_key='example_queue'):
        """Publish a message with persistence"""
        try:
            channel.basic_publish(
                exchange='',
                routing_key=routing_key,
                body=json.dumps(message),
                properties=pika.BasicProperties(
                    delivery_mode=2,  # Persistent
                    content_type='application/json',
                    timestamp=int(time.time())
                )
            )
            print(f"✓ Message published: {message}")
            return True
        except Exception as e:
            print(f"✗ Failed to publish message: {e}")
            return False

    def main():
        """Publish example messages"""
        try:
            connection = get_connection()
            channel = connection.channel()

            # Declare queue
            channel.queue_declare(
                queue='example_queue',
                durable=True
            )

            # Publish 10 messages
            for i in range(10):
                message = {
                    'id': i,
                    'timestamp': datetime.now().isoformat(),
                    'data': f'Message {i}'
                }
                publish_message(channel, message)
                time.sleep(1)

            connection.close()
            print("All messages published")

        except Exception as e:
            print(f"Error: {e}")

    if __name__ == '__main__':
        main()

---
# Example ConfigMap for connection configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-connection-config
  namespace: messaging
data:
  config.json: |
    {
      "connections": {
        "default": {
          "host": "rabbitmq-cluster-amqp.messaging.svc.cluster.local",
          "port": 5672,
          "vhost": "/production",
          "connection_timeout": 10,
          "heartbeat": 600,
          "blocked_connection_timeout": 300,
          "retry_delay": 5,
          "max_retries": 5
        },
        "staging": {
          "host": "rabbitmq-cluster-amqp.messaging.svc.cluster.local",
          "port": 5672,
          "vhost": "/staging",
          "connection_timeout": 10,
          "heartbeat": 600
        }
      },
      "queues": {
        "events": {
          "name": "events_queue",
          "durable": true,
          "arguments": {
            "x-message-ttl": 86400000,
            "x-max-length": 100000,
            "x-queue-type": "quorum"
          }
        },
        "notifications": {
          "name": "notifications_queue",
          "durable": true,
          "arguments": {
            "x-message-ttl": 3600000,
            "x-max-length": 50000
          }
        }
      }
    }

---
# Example Job that publishes test messages
apiVersion: batch/v1
kind: Job
metadata:
  name: rabbitmq-test-publisher
  namespace: messaging
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: publisher
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              pip install pika
              python /app/producer.py
          env:
            - name: RABBITMQ_HOST
              value: "rabbitmq-cluster-amqp.messaging.svc.cluster.local"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-app-credentials
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-app-credentials
                  key: password
            - name: RABBITMQ_VHOST
              value: "/production"
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          configMap:
            name: rabbitmq-consumer-code

---
# Example HPA for consumer scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rabbitmq-consumer-hpa
  namespace: messaging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rabbitmq-consumer-example
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
