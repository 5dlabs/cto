apiVersion: batch/v1
kind: CronJob
metadata:
  name: linear-runtime-token-mint
  namespace: cto-system
spec:
  # Run twice a month as a safety net. PM remains the primary token broker
  # and should also mint on demand when a runtime token is missing or expiring.
  schedule: "0 3 1,15 * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mint
              image: curlimages/curl:latest
              env:
                - name: PM_BASE_URL
                  value: "http://pm.cto.svc.cluster.local:8081"
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  echo "Requesting PM bulk mint..."
                  RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
                    "${PM_BASE_URL}/oauth/mint-all" || echo -e "\n000")

                  HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                  BODY=$(echo "$RESPONSE" | sed '$d')

                  if [ "$HTTP_CODE" != "200" ]; then
                    echo "Bulk mint failed (HTTP ${HTTP_CODE})"
                    echo "$BODY"
                    exit 1
                  fi

                  echo "$BODY"
                  echo "PM bulk mint completed"
