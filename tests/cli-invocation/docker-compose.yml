# =============================================================================
# CLI Integration Test - Docker Compose (Multi-Agent Support)
# =============================================================================
#
# Supports running any agent with their configured skills and tools.
#
# Prerequisites:
#   ./build-images.sh all        # Build all CLI images
#   ./scaffold-skills.sh         # Generate per-agent skills directories
#   cp .env.example .env         # Copy and configure secrets
#
# Usage:
#   # Run specific agent tests
#   AGENT=bolt docker compose --profile claude up
#   AGENT=rex docker compose --profile claude up
#   AGENT=blaze docker compose --profile claude up
#
#   # Run with setup script (recommended)
#   ./run-agent.sh bolt          # Runs setup + docker compose
#
# =============================================================================

# Default agent (can be overridden with AGENT env var)
x-default-agent: &default-agent
  AGENT: ${AGENT:-bolt}

x-sidecar-env: &sidecar-env
  LINEAR_OAUTH_TOKEN: ${LINEAR_OAUTH_TOKEN}
  LINEAR_ISSUE_IDENTIFIER: ${LINEAR_ISSUE_IDENTIFIER}
  LINEAR_SESSION_ID: ${LINEAR_SESSION_ID:-}
  LINEAR_API_URL: https://api.linear.app/graphql
  RUST_LOG: debug
  CTO_SKILLS_DIR: /cto-skills
  CTO_CONFIG_PATH: /cto-config.json

x-sidecar-volumes: &sidecar-volumes
  - ../../templates/skills:/cto-skills:ro
  - ../../cto-config.json:/cto-config.json:ro

x-local-image: &local-image
  pull_policy: never

# Common Claude-based CLI configuration
x-claude-base: &claude-base
  <<: *local-image
  image: cto-claude:local
  network_mode: host
  env_file: .env
  environment:
    - CLI_WORK_DIR=/workspace
    - TOOLS_URL=http://tools.fra.5dlabs.ai/mcp

# Common sidecar configuration
x-sidecar-base: &sidecar-base
  <<: *local-image
  image: cto-linear-sidecar:local
  network_mode: host
  environment:
    <<: *sidecar-env
    MAIN_EXIT_WATCH_ENABLED: "false"
    WHIP_CRACK_ENABLED: "true"
    WHIP_CRACK_INITIAL_DELAY_MS: "3600000"

services:
  # ===========================================================================
  # CLAUDE-BASED AGENTS (bolt, blaze, rex, morgan, cleo, etc.)
  # ===========================================================================
  
  # ---------------------------------------------------------------------------
  # Bolt - Infrastructure & DevOps
  # ---------------------------------------------------------------------------
  bolt:
    <<: *claude-base
    profiles: ["bolt", "all"]
    volumes:
      - ./workspaces/bolt:/workspace
      - ./config/claude-settings.json:/home/node/.claude/settings.json:ro
      - ./config/skills-bolt:/home/node/.claude/skills:ro
      - ./config/client-config-bolt.json:/config/client-config.json:ro
      - ./config/task-bolt:/task:ro
      - ./scripts/run-claude.sh:/run.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CLI_WORK_DIR=/workspace
      - MCP_CLIENT_CONFIG=/config/client-config.json
      - TOOLS_URL=http://tools.fra.5dlabs.ai/mcp
      - TASK_FILE=/task/prompt.md
    working_dir: /workspace
    entrypoint: ["bash", "/run.sh"]

  bolt-sidecar:
    <<: *sidecar-base
    profiles: ["bolt", "all"]
    depends_on:
      bolt:
        condition: service_started
    volumes:
      - ./workspaces/bolt:/workspace
      - ../../templates/skills:/cto-skills:ro
      - ../../cto-config.json:/cto-config.json:ro
    environment:
      <<: *sidecar-env
      CLI_TYPE: claude
      STREAM_FILE: /workspace/stream.jsonl
      CLAUDE_STREAM_FILE: /workspace/stream.jsonl
      DEBUG_JSONL_PATH: /workspace/debug.jsonl
      CTO_AGENT_NAME: bolt
      WORKSPACE_PATH: /workspace
      MAIN_EXIT_WATCH_ENABLED: "false"
      WHIP_CRACK_ENABLED: "true"
      WHIP_CRACK_INITIAL_DELAY_MS: "3600000"

  # ---------------------------------------------------------------------------
  # Rex - Backend Rust Development
  # ---------------------------------------------------------------------------
  rex:
    <<: *claude-base
    profiles: ["rex", "all"]
    volumes:
      - ./workspaces/rex:/workspace
      - ./config/claude-settings.json:/home/node/.claude/settings.json:ro
      - ./config/skills-rex:/home/node/.claude/skills:ro
      - ./config/client-config-rex.json:/config/client-config.json:ro
      - ./config/task-rex:/task:ro
      - ./scripts/run-claude.sh:/run.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
