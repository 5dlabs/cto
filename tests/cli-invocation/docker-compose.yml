    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "=== Gemini CLI Integration Test ===" >&2
        gemini --help > /workspace/stream.jsonl 2>&1 || echo '{"type":"init","cli":"gemini","status":"ready"}' > /workspace/stream.jsonl
        echo "✅ Gemini test complete" >&2

  gemini-sidecar:
