      - TOOLS_URL=http://tools.fra.5dlabs.ai/mcp
      - TASK_FILE=/task/prompt.md
    working_dir: /workspace
    entrypoint: ["bash", "/run.sh"]

  blaze-sidecar:
    <<: *sidecar-base
    profiles: ["blaze", "all"]
    depends_on:
      blaze:
