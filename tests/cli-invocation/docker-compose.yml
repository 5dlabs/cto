# =============================================================================
# CLI Integration Test - Docker Compose (Linear Agent Dialog)
# =============================================================================
#
# Runs all CLIs in parallel, each creating its own agent session on a Linear issue.
# Each CLI's output is piped to a sidecar that streams to Linear.
#
# Prerequisites:
#   ./build-images.sh all   # Build all images first
#   ./setup.sh rex coder    # Setup skills + tools from cto-config.json
#   cp .env.example .env    # Copy and fill in secrets
#
# The setup.sh script reads cto-config.json and:
#   1. Copies skill files to config/flat-skills/ (mirrors controller's get_agent_skills)
#   2. Generates client-config-{agent}.json (mirrors controller's client-config.json)
#
# Usage:
#   ./setup.sh rex coder         # Setup skills + tools from cto-config.json
#   docker compose up            # Run all CLIs with Linear integration
#
# =============================================================================

x-sidecar-env: &sidecar-env
  LINEAR_OAUTH_TOKEN: ${LINEAR_OAUTH_TOKEN}
  LINEAR_ISSUE_IDENTIFIER: ${LINEAR_ISSUE_IDENTIFIER}
  LINEAR_SESSION_ID: ${LINEAR_SESSION_ID:-}
  LINEAR_API_URL: https://api.linear.app/graphql
  RUST_LOG: info
  CTO_SKILLS_DIR: /cto-skills
  CTO_CONFIG_PATH: /cto-config.json

# Common sidecar volume mounts for CTO config
x-sidecar-volumes: &sidecar-volumes
  - ../../templates/skills:/cto-skills:ro
  - ../../cto-config.json:/cto-config.json:ro

x-local-image: &local-image
  pull_policy: never

services:
  # ===========================================================================
  # Claude CLI + Sidecar
  # ===========================================================================
  claude:
    pull_policy: never
    image: cto-claude:local
    network_mode: host
    env_file: .env
    volumes:
      - ./workspaces/claude:/workspace
      # Mount to actual $HOME in container (verified: /home/node)
      - ./config/claude-settings.json:/home/node/.claude/settings.json:ro
      # Skills (generated by setup.sh from cto-config.json)
      # Structure: skills/<skill-name>/SKILL.md (mirrors controller's skills-setup.sh.hbs)
      - ./config/skills:/home/node/.claude/skills:ro
      # Tool filtering config (generated by setup.sh from cto-config.json)
      # Note: mounted to /config, not /workspace (can't mount file inside volume)
      - ./config/client-config-rex.json:/config/client-config.json:ro
      # Container script (mirrors controller's container.sh.hbs template)
      - ./scripts/run-claude.sh:/run.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CLI_WORK_DIR=/workspace
      - MCP_CLIENT_CONFIG=/config/client-config.json
      - TOOLS_URL=http://tools.fra.5dlabs.ai/mcp
    working_dir: /workspace
    entrypoint: ["bash", "/run.sh"]

  claude-sidecar:
    pull_policy: never
    image: cto-linear-sidecar:local
    network_mode: host
    depends_on:
      claude:
        condition: service_started
    volumes:
      - ./workspaces/claude:/workspace  # writable for debug log
      - ../../templates/skills:/cto-skills:ro  # CTO skills for discovery
      - ../../cto-config.json:/cto-config.json:ro  # CTO tools config
    environment:
      <<: *sidecar-env
      CLI_TYPE: claude
      STREAM_FILE: /workspace/stream.jsonl
      CLAUDE_STREAM_FILE: /workspace/stream.jsonl
      DEBUG_JSONL_PATH: /workspace/debug.jsonl
      DOCTOR_OUTPUT: /workspace/claude-doctor.txt  # Read doctor output from file
      MCP_TOOLS_OUTPUT: /workspace/mcp-tools.txt   # Read mcp tools list from file
      CTO_SKILLS_DIR: /cto-skills
      CTO_CONFIG_PATH: /cto-config.json
      CTO_AGENT_NAME: rex  # Use rex agent's tool configuration
      # Disable exit watch for docker-compose (can't see Claude container's processes)
      MAIN_EXIT_WATCH_ENABLED: "false"
      # Enable whip cracking with long interval (prevents premature shutdown)
      WHIP_CRACK_ENABLED: "true"
      WHIP_CRACK_INITIAL_DELAY_MS: "3600000"  # 1 hour - effectively disabled

  # ===========================================================================
  # Codex CLI + Sidecar
  # ===========================================================================
  codex:
    pull_policy: never
    image: cto-codex:local
    network_mode: host
    volumes:
      - ./workspaces/codex:/workspace
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLI_WORK_DIR=/workspace
    working_dir: /workspace
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "=== Codex CLI Integration Test ===" >&2
        codex --help > /workspace/stream.jsonl 2>&1 || echo '{"type":"error","message":"Codex requires API key"}' > /workspace/stream.jsonl
        echo "✅ Codex test complete" >&2

  codex-sidecar:
    pull_policy: never
    image: cto-linear-sidecar:local
    network_mode: host
    depends_on:
      codex:
        condition: service_started
    volumes:
      - ./workspaces/codex:/workspace:ro
    environment:
      <<: *sidecar-env
      CLI_TYPE: codex
      STREAM_FILE: /workspace/stream.jsonl

  # ===========================================================================
  # Every Code CLI + Sidecar
  # ===========================================================================
  code:
    pull_policy: never
    image: cto-code:local
    network_mode: host
    volumes:
      - ./workspaces/code:/workspace
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLI_WORK_DIR=/workspace
    working_dir: /workspace
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "=== Every Code CLI Integration Test ===" >&2
        code --help > /workspace/stream.jsonl 2>&1 || echo '{"type":"init","cli":"code","status":"ready"}' > /workspace/stream.jsonl
        echo "✅ Code test complete" >&2

  code-sidecar:
    pull_policy: never
    image: cto-linear-sidecar:local
    network_mode: host
    depends_on:
      code:
        condition: service_started
    volumes:
      - ./workspaces/code:/workspace:ro
    environment:
      <<: *sidecar-env
      CLI_TYPE: code
      STREAM_FILE: /workspace/stream.jsonl

  # ===========================================================================
  # Cursor CLI + Sidecar
  # ===========================================================================
  cursor:
    pull_policy: never
    image: cto-cursor:local
    network_mode: host
    volumes:
      - ./workspaces/cursor:/workspace
    environment:
      - CLI_WORK_DIR=/workspace
    working_dir: /workspace
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "=== Cursor CLI Integration Test ===" >&2
        cursor --help > /workspace/stream.jsonl 2>&1 || echo '{"type":"init","cli":"cursor","status":"ready"}' > /workspace/stream.jsonl
        echo "✅ Cursor test complete" >&2

  cursor-sidecar:
    pull_policy: never
    image: cto-linear-sidecar:local
    network_mode: host
    depends_on:
      cursor:
        condition: service_started
    volumes:
      - ./workspaces/cursor:/workspace:ro
    environment:
      <<: *sidecar-env
      CLI_TYPE: cursor
      STREAM_FILE: /workspace/stream.jsonl

  # ===========================================================================
  # OpenCode CLI + Sidecar
  # ===========================================================================
  opencode:
    pull_policy: never
    image: cto-opencode:local
    network_mode: host
    volumes:
      - ./workspaces/opencode:/workspace
    environment:
      - CLI_WORK_DIR=/workspace
    working_dir: /workspace
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "=== OpenCode CLI Integration Test ===" >&2
        opencode --help > /workspace/stream.jsonl 2>&1 || echo '{"type":"init","cli":"opencode","status":"ready"}' > /workspace/stream.jsonl
        echo "✅ OpenCode test complete" >&2

  opencode-sidecar:
    pull_policy: never
    image: cto-linear-sidecar:local
    network_mode: host
    depends_on:
      opencode:
        condition: service_started
    volumes:
      - ./workspaces/opencode:/workspace:ro
    environment:
      <<: *sidecar-env
      CLI_TYPE: opencode
      STREAM_FILE: /workspace/stream.jsonl

  # ===========================================================================
  # Gemini CLI + Sidecar
  # ===========================================================================
  gemini:
    pull_policy: never
    image: cto-gemini:local
    network_mode: host
    volumes:
      - ./workspaces/gemini:/workspace
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - CLI_WORK_DIR=/workspace
    working_dir: /workspace
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "=== Gemini CLI Integration Test ===" >&2
        gemini --help > /workspace/stream.jsonl 2>&1 || echo '{"type":"init","cli":"gemini","status":"ready"}' > /workspace/stream.jsonl
        echo "✅ Gemini test complete" >&2

  gemini-sidecar:
    pull_policy: never
    image: cto-linear-sidecar:local
    network_mode: host
    depends_on:
      gemini:
        condition: service_started
    volumes:
      - ./workspaces/gemini:/workspace:ro
    environment:
      <<: *sidecar-env
      CLI_TYPE: gemini
      STREAM_FILE: /workspace/stream.jsonl

  # ===========================================================================
  # Factory (Droid) CLI + Sidecar
  # ===========================================================================
  factory:
    pull_policy: never
    image: cto-factory:local
    network_mode: host
    env_file: .env
    volumes:
      - ./workspaces/factory:/workspace
      # Skills (generated by setup.sh from cto-config.json)
      # Structure: skills/<skill-name>/SKILL.md
      - ./config/skills:/home/node/.factory/skills:ro
      # Tool filtering config (generated by setup.sh from cto-config.json)
      - ./config/client-config-rex.json:/config/client-config.json:ro
      # Container script (mirrors controller's container.sh.hbs template)
      - ./scripts/run-factory.sh:/run.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CLI_WORK_DIR=/workspace
      - MCP_CLIENT_CONFIG=/config/client-config.json
      - TOOLS_URL=http://tools.fra.5dlabs.ai/mcp
    working_dir: /workspace
    entrypoint: ["bash", "/run.sh"]

  factory-sidecar:
    pull_policy: never
    image: cto-linear-sidecar:local
    network_mode: host
    depends_on:
      factory:
        condition: service_started
    volumes:
      - ./workspaces/factory:/workspace:ro
    environment:
      <<: *sidecar-env
      CLI_TYPE: factory
      STREAM_FILE: /workspace/stream.jsonl

  # ===========================================================================
  # Dexter CLI + Sidecar
  # ===========================================================================
  dexter:
    pull_policy: never
    image: cto-dexter:local
    network_mode: host
    volumes:
      - ./workspaces/dexter:/workspace
    environment:
      - CLI_WORK_DIR=/workspace
    working_dir: /workspace
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "=== Dexter CLI Integration Test ===" >&2
        bun --version > /workspace/stream.jsonl 2>&1
        echo '{"type":"init","cli":"dexter","runtime":"bun","status":"ready"}' >> /workspace/stream.jsonl
        echo "✅ Dexter test complete" >&2

  dexter-sidecar:
    pull_policy: never
    image: cto-linear-sidecar:local
    network_mode: host
    depends_on:
      dexter:
        condition: service_started
    volumes:
      - ./workspaces/dexter:/workspace:ro
    environment:
      <<: *sidecar-env
      CLI_TYPE: dexter
      STREAM_FILE: /workspace/stream.jsonl
