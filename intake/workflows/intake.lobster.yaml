name: intake

args:
  audio_debug:
    default: "true"
  prd_content:
    default: ''
  prd_path:
    default: ''
  num_tasks:
    default: 10
  project_name:
    default: project
  intake_metadata:
    default: ''
  pr_base_branch:
    default: main
  codebase_context_file:
    default: '.intake/contexts/codebase.txt'
  infrastructure_context_file:
    default: '.intake/contexts/infrastructure.txt'
  design_context_file:
    default: '.intake/contexts/design.txt'
  linear_project_id:
    default: ''
  linear_prd_issue_id:
    default: ''
  linear_team_id:
    default: ''
  linear_agent_map:
    default: '{}'
  pm_url:
    default: ''
  repository_url:
    default: ''
  tool_context_file:
    default: '.intake/contexts/tools.txt'
  verify:
    default: 'true'
  breakpoints:
    default: 'false'
  linear_session_id:
    default: ''
  linear_issue_id:
    default: ''
  run_id:
    default: ''
  model_primary_provider:
    default: gemini
  model_primary:
    default: gemini-2.5-flash
  model_fast_provider:
    default: gemini
  model_fast:
    default: gemini-2.5-flash
  model_frontier_provider:
    default: gemini
  model_frontier:
    default: claude-opus-4-6
  voter_1_provider:
    default: gemini
  voter_1_model:
    default: claude-opus-4-6
  voter_2_provider:
    default: openai
  voter_2_model:
    default: gpt-5.2-pro
  voter_3_provider:
    default: gemini
  voter_3_model:
    default: gemini-2.5-flash

steps:
  - id: register-run
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "register-run" "${audio_debug}"
      intake-util register-run \
        --run-id "${run_id}" \
        --agent intake \
        --session-id "${linear_session_id}" \
        --workflow intake || echo "register-run: skipped (non-fatal)" >&2

  - id: linear-plan-parsing
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-plan-parsing" "${audio_debug}"
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --issue-id "${linear_issue_id}" \
        --type plan \
        --title "Phase: PRD Parsing & Analysis" \
        --body "Starting PRD parse and complexity analysis" >/dev/null || true
      intake-util linear-plan \
        --session-id "${linear_session_id}" \
        --step parse-prd || true

  - id: parse-prd
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "parse-prd" "${audio_debug}"
      if [ ! -s "$root/.intake/run-prd-for-intake.txt" ]; then
        echo "parse-prd: FATAL — .intake/run-prd-for-intake.txt is missing or empty" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "parse-prd" "failed: PRD file missing" "${audio_debug}" "error"
        exit 1
      fi
      # num_tasks=0 means "let the model decide based on project scope"
      EFFECTIVE_NUM_TASKS="${num_tasks}"
      if [ "$EFFECTIVE_NUM_TASKS" = "0" ] || [ -z "$EFFECTIVE_NUM_TASKS" ]; then
        EFFECTIVE_NUM_TASKS="0"
        NUM_TASKS_INSTRUCTION="as many tasks as the project scope requires (aim for thorough granularity — one task per deployable unit of work)"
      else
        NUM_TASKS_INSTRUCTION="exactly ${EFFECTIVE_NUM_TASKS}"
      fi
      ARGS=$(jq -n \
        --rawfile sys "$root/intake/prompts/parse-prd-system.md" \
        --rawfile usr "$root/intake/prompts/parse-prd-user.md" \
        --rawfile prd "$root/.intake/run-prd-for-intake.txt" \
        --rawfile codebase "$root/.intake/contexts/codebase.txt" \
        --rawfile design_context "$root/.intake/contexts/design.txt" \
        --arg num_tasks "$NUM_TASKS_INSTRUCTION" \
        --argjson num_tasks_raw "$EFFECTIVE_NUM_TASKS" \
        --arg schema "$root/intake/schemas/generated-task.schema.json" \
        --arg provider "${model_primary_provider}" \
        --arg model "${model_primary}" \
        '{ "prompt": ($sys + "\n\n" + $usr),
           "input": { "prd_content": $prd, "codebase_context": $codebase, "design_context": $design_context, "num_tasks": (if $num_tasks_raw > 0 then $num_tasks_raw else "auto" end), "num_tasks_instruction": $num_tasks, "next_id": 1 },
           "schema": $schema, "provider": $provider, "model": $model }') || {
        echo "parse-prd: FATAL — failed to build LLM args (jq error)" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "parse-prd" "failed: jq args" "${audio_debug}" "error"
        exit 1
      }
      FALLBACK_TASKS_FILE="$root/.intake/initial-tasks.json"
      OUTPUT=$("$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS") || {
        if [ -s "$FALLBACK_TASKS_FILE" ] && jq -e 'type=="array" and length>0' "$FALLBACK_TASKS_FILE" >/dev/null 2>&1; then
          echo "parse-prd: openclaw.invoke failed; using fallback from $FALLBACK_TASKS_FILE" >&2
          cat "$FALLBACK_TASKS_FILE"
          exit 0
        fi
        echo "parse-prd: FATAL — openclaw.invoke failed after retries and no fallback tasks available" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "parse-prd" "failed: openclaw.invoke error" "${audio_debug}" "error"
        exit 1
      }
      if [ -z "$OUTPUT" ] || ! printf '%s' "$OUTPUT" | jq -e 'type' >/dev/null 2>&1; then
        if [ -s "$FALLBACK_TASKS_FILE" ] && jq -e 'type=="array" and length>0' "$FALLBACK_TASKS_FILE" >/dev/null 2>&1; then
          echo "parse-prd: invalid model output; using fallback from $FALLBACK_TASKS_FILE" >&2
          cat "$FALLBACK_TASKS_FILE"
          exit 0
        fi
        echo "parse-prd: FATAL — openclaw.invoke returned empty/invalid JSON and no fallback tasks available" >&2
        printf '%s\n' "$OUTPUT" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "parse-prd" "failed: empty or invalid output" "${audio_debug}" "error"
        exit 1
      fi
      printf '%s' "$OUTPUT"

  - id: verify-parse-prd
    env:
      CTO_PARSE_PRD_OUT: $parse-prd.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "verify-parse-prd" "${audio_debug}"
      if [ -z "$CTO_PARSE_PRD_OUT" ]; then
        echo "verify-parse-prd: FATAL — parse-prd produced no output" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "verify-parse-prd" "failed: empty output from parse-prd" "${audio_debug}" "error"
        exit 1
      fi
      TASK_COUNT=$(printf '%s' "$CTO_PARSE_PRD_OUT" | jq 'if type=="array" then length else 0 end' 2>/dev/null || echo 0)
      if [ "$TASK_COUNT" = "0" ]; then
        echo "verify-parse-prd: FATAL — parse-prd returned 0 tasks" >&2
        printf 'Output was: %.500s\n' "$CTO_PARSE_PRD_OUT" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "verify-parse-prd" "failed: zero tasks parsed" "${audio_debug}" "error"
        exit 1
      fi
      printf '%s' "$CTO_PARSE_PRD_OUT" | intake-util validate --type generated-task || echo "verify-parse-prd: generated-task validation failed (continuing in degraded mode)" >&2

  - id: breakpoint-parse-prd
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "breakpoint-parse-prd" "${audio_debug}"
      if [ "${breakpoints}" = "true" ] || [ "${breakpoints}" = "1" ]; then
        echo "breakpoint-parse-prd: breakpoint reached — manual approval required" >&2
      fi
      printf '%s\n' '{"breakpoint":"parse-prd","skipped":true}'

  - id: linear-activity-parse-prd
    env:
      CTO_PARSE_PRD_OUT: $parse-prd.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-activity-parse-prd" "${audio_debug}"
      TASK_COUNT=$(printf '%s' "$CTO_PARSE_PRD_OUT" | jq 'length')
      BODY=$(printf '## PRD Parsed\n\nExtracted **%s** tasks from the PRD.\n\nProceeding to complexity analysis and committee review...' "$TASK_COUNT")
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type thought \
        --body "$BODY" >/dev/null || true
      intake-util linear-plan \
        --session-id "${linear_session_id}" \
        --step analyze-complexity || true

  - id: analyze-complexity
    env:
      CTO_PARSE_PRD_OUT: $parse-prd.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "analyze-complexity" "${audio_debug}"
      if [ -z "$CTO_PARSE_PRD_OUT" ]; then
        echo "analyze-complexity: FATAL — no parsed tasks available (parse-prd output empty)" >&2
        exit 1
      fi
      mkdir -p "$root/.intake/tmp"
      TASKS_FILE="$root/.intake/tmp/analyze-complexity-tasks.json"
      if ! printf '%s' "$CTO_PARSE_PRD_OUT" | jq -c '.' > "$TASKS_FILE" 2>/dev/null; then
        if [ -s "$root/.intake/initial-tasks.json" ]; then
          cp "$root/.intake/initial-tasks.json" "$TASKS_FILE"
        else
          echo "analyze-complexity: FATAL — parse-prd output is not valid JSON and no fallback tasks file found" >&2
          exit 1
        fi
      fi
      ARGS=$(jq -n \
        --rawfile sys "$root/intake/prompts/analyze-complexity-system.md" \
        --slurpfile tasks "$TASKS_FILE" \
        --arg schema "$root/intake/schemas/complexity-analysis.schema.json" \
        --arg provider "${model_primary_provider}" \
        --arg model "${model_primary}" \
        '{ "prompt": $sys,
           "input": { "tasks": $tasks[0] },
           "schema": $schema, "provider": $provider, "model": $model }') || {
        echo "analyze-complexity: FATAL — jq args build failed" >&2; exit 1; }
      OUTPUT=$("$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS") || {
        echo "analyze-complexity: model failed; using deterministic fallback complexity" >&2
        printf '%s' '{"overall_complexity":"medium","risk_areas":["LLM provider reliability"],"critical_path":[1],"notes":"Fallback complexity due model outage."}'
        exit 0; }
      if [ -z "$OUTPUT" ]; then
        echo "analyze-complexity: empty output; using deterministic fallback complexity" >&2
        printf '%s' '{"overall_complexity":"medium","risk_areas":["LLM provider reliability"],"critical_path":[1],"notes":"Fallback complexity due empty model output."}'
        exit 0; fi
      printf '%s' "$OUTPUT"

  - id: verify-analyze-complexity
    env:
      CTO_ANALYZE_COMPLEXITY_OUT: $analyze-complexity.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "verify-analyze-complexity" "${audio_debug}"
      printf '%s' "$CTO_ANALYZE_COMPLEXITY_OUT" | intake-util validate --type complexity-analysis || echo "verify-analyze-complexity: complexity-analysis validation failed (continuing in degraded mode)" >&2

  - id: breakpoint-analyze-complexity
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "breakpoint-analyze-complexity" "${audio_debug}"
      printf '%s\n' '{"breakpoint":"analyze-complexity","skipped":true}'

  - id: linear-activity-analyze-complexity
    env:
      CTO_ANALYZE_COMPLEXITY_OUT: $analyze-complexity.stdout
      CTO_PARSE_PRD_OUT: $parse-prd.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-activity-analyze-complexity" "${audio_debug}"
      # Build a rich markdown table of task complexity scores
      TABLE_ROWS=$(printf '%s' "$CTO_PARSE_PRD_OUT" | jq -r '
        . as $tasks | $tasks | to_entries | map(
          "| " + (.value.id|tostring) + " | " +
          ((.value.title // "Untitled") | if length > 40 then .[:39] + "..." else . end) + " | " +
          ((.value.agent // "_unassigned_") | tostring) + " | " +
          ((.value.priority // "---") | tostring) + " |"
        ) | join("\n")' 2>/dev/null || echo "| --- | _complexity data unavailable_ | --- | --- |")
      TASK_COUNT=$(printf '%s' "$CTO_PARSE_PRD_OUT" | jq 'length' 2>/dev/null || echo "0")
      BODY=$(printf '## Complexity Analysis\n\nAnalyzed **%s** tasks for implementation complexity.\n\n| # | Task | Agent | Priority |\n|---|------|-------|----------|\n%s' \
        "$TASK_COUNT" "$TABLE_ROWS")
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type thought \
        --body "$BODY" >/dev/null || true
      intake-util linear-plan \
        --session-id "${linear_session_id}" \
        --step review-tasks || true

  - id: review-tasks
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "review-tasks" "${audio_debug}"
      printf '%s\n' '{"breakpoint":"review-tasks","skipped":true}'

  - id: linear-action-refine-tasks
    command: |
      root="${WORKSPACE:-.}"
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type action \
        --action "Refining tasks" \
        --parameter "Running committee vote and task expansion" \
        --ephemeral >/dev/null || true
      intake-util linear-plan \
        --session-id "${linear_session_id}" \
        --step refine-tasks || true

  - id: refine-tasks
    env:
      CTO_PARSE_PRD_OUT: $parse-prd.stdout
      CTO_ANALYZE_COMPLEXITY_OUT: $analyze-complexity.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "refine-tasks" "${audio_debug}"
      WS="${WORKSPACE:-.}"
      mkdir -p "$WS/.intake/tmp"
      printf '%s' "$CTO_PARSE_PRD_OUT" > "$WS/.intake/tmp/refine-tasks-input.json"
      if ! printf '%s' "$CTO_ANALYZE_COMPLEXITY_OUT" | jq -c '
        if type == "array" then .
        elif type == "object" and (.complexityAnalysis | type == "array") then .complexityAnalysis
        elif type == "object" then [.]
        else error("refine-tasks expected complexity array or .complexityAnalysis array")
        end
      ' > "$WS/.intake/tmp/refine-complexity-input.json"; then
        echo "refine-tasks: FATAL — analyze-complexity output could not be normalized into a complexity array" >&2
        printf 'refine-tasks complexity preview: %.500s\n' "$CTO_ANALYZE_COMPLEXITY_OUT" >&2
        exit 1
      fi
      ARGS=$(jq -n \
        --arg tasks_file "$WS/.intake/tmp/refine-tasks-input.json" \
        --arg complexity_file "$WS/.intake/tmp/refine-complexity-input.json" \
        --arg evaluation_criteria "task decomposition quality, dependency ordering, decision point coverage" \
        --arg max_revisions "2" \
        --arg model_primary_provider "${model_primary_provider}" \
        --arg model_primary "${model_primary}" \
        --arg voter_1_provider "${voter_1_provider}" \
        --arg voter_1_model "${voter_1_model}" \
        --arg voter_2_provider "${voter_2_provider}" \
        --arg voter_2_model "${voter_2_model}" \
        --arg voter_3_provider "${voter_3_provider}" \
        --arg voter_3_model "${voter_3_model}" \
        --arg linear_session_id "${linear_session_id}" \
        --arg audio_debug "${audio_debug}" \
        '{tasks_file: $tasks_file, complexity_file: $complexity_file, evaluation_criteria: $evaluation_criteria, max_revisions: $max_revisions, model_primary_provider: $model_primary_provider, model_primary: $model_primary, voter_1_provider: $voter_1_provider, voter_1_model: $voter_1_model, voter_2_provider: $voter_2_provider, voter_2_model: $voter_2_model, voter_3_provider: $voter_3_provider, voter_3_model: $voter_3_model, linear_session_id: $linear_session_id, audio_debug: $audio_debug}')
      REFINE_LOG="$WS/.intake/task-refinement.log"
      REFINE_STDOUT_LOG="$WS/.intake/task-refinement.stdout.log"
      if ! lobster run --mode tool "$WS/intake/workflows/task-refinement.lobster.yaml" --args-json "$ARGS" >"$REFINE_STDOUT_LOG" 2>"$REFINE_LOG"; then
        echo "refine-tasks: FATAL — task-refinement workflow failed. Fix the expansion model or prompt and rerun." >&2
        echo "--- task-refinement stderr ---" >&2
        tail -80 "$REFINE_LOG" >&2
        echo "--- task-refinement stdout ---" >&2
        tail -80 "$REFINE_STDOUT_LOG" >&2
        echo "--- end ---" >&2
        "$WS/intake/scripts/workflow-gate-audio.sh" "intake" "refine-tasks" "failed: refinement workflow error" "${audio_debug}" "error"
        exit 1
      fi
      cat "$REFINE_STDOUT_LOG"

  - id: verify-refine-tasks
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_PARSE_PRD_OUT: $parse-prd.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "verify-refine-tasks" "${audio_debug}"
      if [ -z "$CTO_REFINE_TASKS_OUT" ]; then
        echo "verify-refine-tasks: FATAL — refine-tasks produced no output" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "verify-refine-tasks" "failed: empty refinement output" "${audio_debug}" "error"
        exit 1
      fi
      # EXP extraction: the jq chain handles two output formats from refine-tasks:
      # .output[0].expanded_tasks is tried first (fallback/wrapper format), then
      # .expanded_tasks for the happy-path resolve-output format, then .tasks as last resort.
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
      if ! printf '%s' "$EXP" | jq -e 'type=="array"' >/dev/null 2>&1; then
        echo "verify-refine-tasks: FATAL — refinement output was not a valid expanded task array" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "verify-refine-tasks" "failed: invalid refinement output format" "${audio_debug}" "error"
        exit 1
      fi
      if [ -z "$EXP" ] || [ "$EXP" = "null" ]; then
        echo "verify-refine-tasks: FATAL — could not extract expanded_tasks from refinement output" >&2
        printf 'Raw output: %.500s\n' "$CTO_REFINE_TASKS_OUT" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "verify-refine-tasks" "failed: no expanded tasks in output" "${audio_debug}" "error"
        exit 1
      fi
      TASK_COUNT=$(printf '%s' "$EXP" | jq 'if type=="array" then length else 0 end' 2>/dev/null || echo 0)
      if [ "$TASK_COUNT" = "0" ]; then
        echo "verify-refine-tasks: FATAL — expanded_tasks array is empty" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "verify-refine-tasks" "failed: zero expanded tasks" "${audio_debug}" "error"
        exit 1
      fi
      if ! printf '%s' "$EXP" | intake-util validate --type expanded-tasks; then
        echo "verify-refine-tasks: FATAL — expanded-tasks validation failed" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "verify-refine-tasks" "failed: expanded-tasks validation error" "${audio_debug}" "error"
        exit 1
      fi

  - id: breakpoint-refine-tasks
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "breakpoint-refine-tasks" "${audio_debug}"
      printf '%s\n' '{"breakpoint":"refine-tasks","skipped":true}'

  - id: linear-activity-refine-tasks
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-activity-refine-tasks" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
      TASK_COUNT=$(printf '%s' "$EXP" | jq 'length')
      VERDICT=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -r '.output[0].verdict // "unknown"' 2>/dev/null || echo "unknown")
      # Extract vote breakdown and scores if available
      VOTE_BREAKDOWN=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -r '.output[0].tally.vote_breakdown // empty | "**Votes:** \(.approve) approve / \(.revise) revise / \(.reject) reject"' 2>/dev/null || echo "")
      SCORE_TABLE=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -r '.output[0].tally.average_scores // empty | to_entries | map("| " + (.key | gsub("_"; " ") | gsub("\\b\\w"; .[:1] | ascii_upcase + .[1:])) + " | " + (.value | tostring) + " |") | join("\n")' 2>/dev/null || echo "")
      CONSENSUS=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -r '.output[0].tally.consensus_score // empty | . * 100 | floor | tostring + "%"' 2>/dev/null || echo "")
      BODY="$(printf '## Tasks Refined\n\n')"
      BODY="${BODY}$(printf 'Expanded tasks: %s\nVerdict: %s\n' "$TASK_COUNT" "$VERDICT")"
      [ -n "$VOTE_BREAKDOWN" ] && BODY="${BODY}$(printf '\n%s' "$VOTE_BREAKDOWN")"
      [ -n "$CONSENSUS" ] && BODY="${BODY}$(printf '\nConsensus: %s' "$CONSENSUS")"
      [ -n "$SCORE_TABLE" ] && BODY="${BODY}$(printf '\n\n| Dimension | Score |\n|-----------|-------|\n%s' "$SCORE_TABLE")"
      BODY="${BODY}$(printf '\n\nProceeding to artifact generation...')"
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type action \
        --action "Refined tasks" \
        --parameter "Committee review complete" \
        --result "$BODY" >/dev/null || true

  - id: linear-plan-generation
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-plan-generation" "${audio_debug}"
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --issue-id "${linear_issue_id}" \
        --type plan \
        --title "Phase: Artifact Generation" \
        --body "Generating scaffolds, docs, prompts, workflows, and security analysis" >/dev/null || true
      intake-util linear-plan \
        --session-id "${linear_session_id}" \
        --step generate-artifacts || true

  - id: reset-task-artifacts
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "reset-task-artifacts" "${audio_debug}"
      mkdir -p .tasks/docs .tasks/tasks
      find .tasks/docs -mindepth 1 -maxdepth 1 -type d -name 'task-*' -exec rm -rf {} +
      rm -f \
        .tasks/tasks/tasks.json \
        .tasks/docs/security-report.json \
        .tasks/docs/remediation-tasks.json \
        .tasks/docs/scale-tasks.json

  - id: generate-scaffolds
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "generate-scaffolds" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]");
      if ! EXP_NORM="$(printf '%s' "$EXP" | jq -c '.' 2>/dev/null)"; then
        EXP_NORM=""
      fi
      if ! printf '%s' "$EXP_NORM" | jq -e 'type=="array"' >/dev/null 2>&1; then
        if [ -s "$root/.intake/initial-tasks.json" ] && jq -e 'type=="array" and length>0' "$root/.intake/initial-tasks.json" >/dev/null 2>&1; then
          EXP_NORM="$(jq -c '.' "$root/.intake/initial-tasks.json")"
        fi
      fi
      EXP="$EXP_NORM"
      if [ -z "$EXP" ] || [ "$EXP" = "null" ] || [ "$EXP" = "[]" ]; then
        echo "generate-scaffolds: FATAL — no expanded tasks available" >&2; exit 1; fi
      mkdir -p "$root/.intake/tmp"
      EXP_FILE="$root/.intake/tmp/generate-scaffolds-expanded-tasks.json"
      printf '%s' "$EXP" > "$EXP_FILE"
      ARGS=$(jq -n \
        --rawfile sys "$root/intake/prompts/scaffold-generation-system.md" \
        --slurpfile expanded_tasks "$EXP_FILE" \
        --rawfile codebase "$root/.intake/contexts/codebase.txt" \
        --rawfile infra "$root/.intake/contexts/infrastructure.txt" \
        --arg schema "$root/intake/schemas/scaffold.schema.json" \
        --arg provider "${model_fast_provider}" \
        --arg model "${model_fast}" \
        '{ "prompt": $sys,
           "input": { "expanded_tasks": $expanded_tasks[0], "codebase_context": $codebase, "infrastructure_context": $infra },
           "schema": $schema, "provider": $provider, "model": $model }') || {
        echo "generate-scaffolds: FATAL — jq args build failed" >&2; exit 1; }
      OUTPUT=$("$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS") || {
        echo "generate-scaffolds: model failed; building deterministic fallback scaffolds" >&2
        printf '%s' "$EXP" | jq '{scaffolds:[.[] | {task_id:.id}]}' && exit 0; }
      if [ -z "$OUTPUT" ]; then
        echo "generate-scaffolds: empty output; building deterministic fallback scaffolds" >&2
        printf '%s' "$EXP" | jq '{scaffolds:[.[] | {task_id:.id}]}' && exit 0; fi
      printf '%s' "$OUTPUT"

  - id: verify-generate-scaffolds
    env:
      CTO_GENERATE_SCAFFOLDS_OUT: $generate-scaffolds.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "verify-generate-scaffolds" "${audio_debug}"
      if [ -z "$CTO_GENERATE_SCAFFOLDS_OUT" ]; then
        echo "verify-generate-scaffolds: FATAL — generate-scaffolds produced no output" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "verify-generate-scaffolds" "failed: empty scaffolds output" "${audio_debug}" "error"
        exit 1
      fi
      printf '%s' "$CTO_GENERATE_SCAFFOLDS_OUT" | intake-util validate --type scaffold || echo "verify-generate-scaffolds: scaffold validation failed (continuing in degraded mode)" >&2

  - id: breakpoint-generate-scaffolds
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "breakpoint-generate-scaffolds" "${audio_debug}"
      printf '%s\n' '{"breakpoint":"generate-scaffolds","skipped":true}'

  - id: linear-activity-generate-scaffolds
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-activity-generate-scaffolds" "${audio_debug}"
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type thought \
        --title "Scaffolds Generated" \
        --body "Generated code scaffolds for all tasks" >/dev/null || true

  - id: linear-action-fan-out-docs
    command: |
      root="${WORKSPACE:-.}"
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type action \
        --action "Generating documentation" \
        --parameter "Running LLM fan-out for task docs" \
        --ephemeral >/dev/null || true

  - id: fan-out-docs
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_GENERATE_SCAFFOLDS_OUT: $generate-scaffolds.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "fan-out-docs" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]");
      if ! printf '%s' "$EXP" | jq -e . >/dev/null 2>&1; then
        echo "fan-out-docs: expanded_tasks blob not valid JSON; recovering from refine-tasks-input or initial-tasks" >&2
        if [ -s "$root/.intake/tmp/refine-tasks-input.json" ] && jq -e . "$root/.intake/tmp/refine-tasks-input.json" >/dev/null 2>&1; then
          EXP="$(jq -c '.' "$root/.intake/tmp/refine-tasks-input.json")"
        elif [ -s "$root/.intake/initial-tasks.json" ]; then
          EXP="$(jq -c '.' "$root/.intake/initial-tasks.json")"
        else
          EXP="[]"
        fi
      else
        EXP="$(printf '%s' "$EXP" | jq -c '.' 2>/dev/null)" || EXP="[]"
        if ! printf '%s' "$EXP" | jq -e 'type=="array"' >/dev/null 2>&1; then
          EXP=$(printf '%s' "$EXP" | jq -c 'if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) else [] end' 2>/dev/null || echo "[]")
        fi
      fi
      if ! printf '%s' "$EXP" | jq -e 'type=="array"' >/dev/null 2>&1; then
        EXP="[]"
      fi
      printf '%s' "$EXP" > "$root/.intake/tmp/fanout-docs-expanded-tasks.json"
      if [ -z "$EXP" ] || [ "$EXP" = "null" ] || [ "$EXP" = "[]" ]; then
        echo "fan-out-docs: FATAL — no expanded tasks available" >&2; exit 1; fi
      if [ -z "$CTO_GENERATE_SCAFFOLDS_OUT" ]; then
        echo "fan-out-docs: FATAL — no scaffolds available (generate-scaffolds output empty)" >&2; exit 1; fi
      mkdir -p "$root/.intake/tmp"
      SCAFFOLDS_FILE="$root/.intake/tmp/fanout-docs-scaffolds.json"
      if ! printf '%s' "$CTO_GENERATE_SCAFFOLDS_OUT" | jq -c '.' > "$SCAFFOLDS_FILE" 2>/dev/null; then
        printf '%s' '{"scaffolds":[]}' > "$SCAFFOLDS_FILE"
      fi
      CTX=$(jq -n \
        --slurpfile sc "$SCAFFOLDS_FILE" \
        --rawfile cb "$root/.intake/contexts/codebase.txt" \
        --rawfile inf "$root/.intake/contexts/infrastructure.txt" \
        '{scaffolds: $sc[0], codebase_context: $cb, infrastructure_context: $inf}') || {
        echo "fan-out-docs: FATAL — jq context build failed" >&2; exit 1; }
      build_doc_fallback() {
        jq -nc --argjson tasks "$EXP" '
          [ $tasks[] as $t | select($t | type == "object") | {
              task_id: $t.id,
              task_md: (
                "# Task " + (($t.id // 0)|tostring) + ": " + (($t.title // "Untitled task") | tostring)
                + "\n\n## Overview\n" + (($t.description // "No description provided.") | tostring)
                + "\n\n## Implementation Details\n" + (($t.details // $t.description // "Follow the task description to implement.") | tostring)
                + "\n\n## Dependencies\n"
                + (if (($t.dependencies // []) | length) > 0
                    then "Tasks: " + (($t.dependencies // []) | map(tostring) | join(", "))
                    else "None"
                  end)
                + "\n\n## Subtasks\n"
                + (if (($t.subtasks // []) | length) > 0
                    then (($t.subtasks // [])
                      | map(select(type == "object"))
                      | map("- **" + ((.title // ("Subtask " + ((.id // 0)|tostring))) | tostring) + "**: " + ((.description // "No description.") | tostring))
                      | join("\n"))
                    else "_No subtasks._"
                  end)
              ),
              decisions_md: (
                "## Decisions for Task " + (($t.id // 0)|tostring)
                + "\n\n- Stack: " + (($t.stack // "Unspecified") | tostring)
                + "\n- Agent: " + (($t.agent // "Unassigned") | tostring)
                + "\n- Priority: " + (($t.priority // "unspecified") | tostring)
                + "\n\n_Fallback doc: LLM generation was unavailable._"
              ),
              acceptance_md: (
                "## Acceptance Criteria for Task " + (($t.id // 0)|tostring)
                + "\n\n" + (($t.test_strategy // "Run tests and confirm task outcomes.") | tostring)
                + "\n\n_Generated from task metadata (LLM fallback)._"
              )
          } ]'
      }
      OUTPUT=$(printf '%s' "$EXP" | intake-util fan-out \
        --prompt "$root/intake/prompts/smart-docs-system.md" \
        --schema "$root/intake/schemas/smart-doc-item.schema.json" \
        --context "$CTX" \
        --provider "${model_fast_provider}" \
        --model "${model_fast}" \
        --concurrency "${INTAKE_FAN_OUT_CONCURRENCY:-4}") || {
        echo "fan-out-docs: intake-util fan-out failed; building deterministic fallback docs" >&2
        build_doc_fallback
        exit 0; }
      if [ -z "$OUTPUT" ]; then
        echo "fan-out-docs: fan-out returned empty output; building deterministic fallback docs" >&2
        build_doc_fallback
        exit 0; fi
      printf '%s' "$OUTPUT"

  - id: validate-docs
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_FAN_OUT_DOCS_OUT: $fan-out-docs.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "validate-docs" "${audio_debug}"
      if [ -z "$CTO_FAN_OUT_DOCS_OUT" ]; then
        echo "validate-docs: FATAL — fan-out-docs produced no output" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-docs" "failed: empty docs output" "${audio_debug}" "error"
        exit 1
      fi
      # Read expanded tasks from file (written by fan-out-docs) — avoids 50KB+ JSON
      # through shell variables which can corrupt with control characters.
      mkdir -p "$root/.intake/tmp"
      EXP=""
      for candidate in \
        "$root/.intake/tmp/fanout-docs-expanded-tasks.json" \
        "$root/.intake/tmp/fanout-prompts-expanded-tasks.json" \
        "$root/.tasks/tasks/tasks.json" \
        "$root/.intake/tmp/refine-tasks-input.json" \
        "$root/.intake/initial-tasks.json"
      do
        if [ -s "$candidate" ] && jq -e 'type=="array" and length>0' "$candidate" >/dev/null 2>&1; then
          EXP="$(jq -c '.' "$candidate")"
          echo "validate-docs: using expanded tasks from $candidate" >&2
          break
        fi
      done
      if [ -z "$EXP" ]; then
        EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
        echo "validate-docs: fell back to shell variable for expanded tasks" >&2
      fi
      TASK_IDS=$(printf '%s' "$EXP" | jq '[.[].id]')
      RAW_DOCS="$root/.intake/tmp/validate-docs-raw.json"
      printf '%s' "$CTO_FAN_OUT_DOCS_OUT" > "$RAW_DOCS"
      DOCS_NORM_FILE="$root/.intake/tmp/validate-docs-norm.json"
      printf '%s' "$CTO_FAN_OUT_DOCS_OUT" | jq -c 'if type=="array" then map(select(type=="object")) elif .task_docs? then (.task_docs | map(select(type=="object"))) else [] end' > "$DOCS_NORM_FILE" 2>/dev/null || printf '[]' > "$DOCS_NORM_FILE"
      # Write EXP to file so jq reads it via --slurpfile (avoids shell variable corruption
      # on large JSON with embedded control characters).
      EXP_FILE="$root/.intake/tmp/validate-docs-tasks.json"
      printf '%s' "$EXP" > "$EXP_FILE"
      # NOTE: tostring guards on all field accesses — Gemini can return non-string
      # types (numbers, objects) for fields like description, agent, stack, etc.
      # The select(type=="object") skips any non-object entries in the tasks array.
      DOCS_FINAL="$(jq -nc --slurpfile tasks_arr "$EXP_FILE" --slurpfile docs_arr "$DOCS_NORM_FILE" '($tasks_arr[0] // []) as $tasks | ($docs_arr[0] // []) as $docs |
        [ $tasks[] as $t
          | select($t | type == "object")
          | ([$docs[]? | select(.task_id == $t.id)][0]) as $d
          | if (
              $d
              and (($d.task_md // "") | length > 0)
              and (($d.acceptance_md // "") | length > 0)
              and (($d.decisions_md // "") | length > 0)
            ) then $d else {
              task_id: $t.id,
              task_title: (($t.title // "Untitled") | tostring),
              task_md: (
                "## " + (($t.title // ("Task " + (($t.id // 0)|tostring))) | tostring)
                + "\n\n### Objective\n" + (($t.description // "No description provided.") | tostring)
                + "\n\n### Ownership\n"
                + "- Agent: " + (($t.agent // "Unassigned") | tostring)
                + "\n- Stack: " + (($t.stack // "Unspecified") | tostring)
                + "\n- Priority: " + (($t.priority // "unspecified") | tostring)
                + "\n- Status: " + (($t.status // "pending") | tostring)
                + "\n- Dependencies: "
                + (if (($t.dependencies // []) | length) > 0
                    then (($t.dependencies // []) | map(tostring) | join(", "))
                    else "None"
                  end)
                + "\n\n### Implementation Details\n" + (($t.details // $t.description // "No implementation details provided.") | tostring)
                + "\n\n### Subtasks\n"
                + (if (($t.subtasks // []) | length) > 0
                    then (($t.subtasks // [])
                      | map(select(type == "object"))
                      | map("- [ ] " + ((.title // ("Subtask " + ((.id // 0)|tostring))) | tostring) + ": " + ((.description // .details // "No description provided.") | tostring))
                      | join("\n"))
                    else "_No subtasks generated._"
                  end)
              ),
              acceptance_md: (
                "## Acceptance Criteria\n\n- [ ] "
                + ((($t.test_strategy // "Validate implementation outcomes.") | tostring) | gsub("\n"; "\n- [ ] "))
                + "\n\n## Verification Notes\n\n"
                + "- [ ] Confirm dependencies are satisfied before implementation.\n"
                + "- [ ] Update tests, docs, and configuration touched by this task.\n"
                + "- [ ] Validate the final behavior against the task objective."
              ),
              decisions_md: (
                (if (($t.decision_points // []) | length) > 0
                  then ("## Decision Points\n\n" + (($t.decision_points // []) | map(
                    if type == "object" then ("- " + ((.description // "Decision") | tostring))
                    elif type == "string" then ("- " + .)
                    else ("- " + tostring)
                    end) | join("\n")))
                  else "## Decision Points\n\n_No explicit decision points generated._"
                end)
                + "\n\n## Coordination Notes\n\n"
                + "- Agent owner: " + (($t.agent // "Unassigned") | tostring)
                + "\n- Primary stack: " + (($t.stack // "Unspecified") | tostring)
              )
            } end
        ]' 2>"$root/.intake/tmp/validate-docs-jq-err.log")" || {
        echo "validate-docs: DOCS_FINAL jq failed; using minimal fallback from task metadata" >&2
        cat "$root/.intake/tmp/validate-docs-jq-err.log" >&2
        DOCS_FINAL="$(jq -c '[.[] | select(type=="object") | {
          task_id: .id,
          task_md: ("## " + ((.title // "Task") | tostring) + "\n\n" + ((.description // "No description.") | tostring)),
          acceptance_md: ("## Acceptance Criteria\n\n- [ ] " + ((.test_strategy // "Validate outcomes.") | tostring)),
          decisions_md: ("## Decision Points\n\n_Fallback: see task metadata._")
        }]' "$EXP_FILE" 2>/dev/null || echo '[]')"
      }
      STRICT_CONTENT_GATES="${INTAKE_STRICT_CONTENT_GATES:-true}"
      DOC_VALIDATE_STATUS=0
      DOC_VALIDATE_OUT="$(printf '%s' "$DOCS_FINAL" | intake-util validate --type docs --task-ids "$TASK_IDS" 2>&1)" || DOC_VALIDATE_STATUS=$?
      if [ -n "$DOC_VALIDATE_OUT" ]; then
        printf '%s\n' "$DOC_VALIDATE_OUT" >&2
      fi
      if [ "$DOC_VALIDATE_STATUS" != "0" ]; then
        if [ "$STRICT_CONTENT_GATES" = "true" ] || [ "$STRICT_CONTENT_GATES" = "1" ]; then
          echo "validate-docs: FATAL — docs validation failed and strict mode is enabled" >&2
          exit 1
        fi
        echo "validate-docs: docs validation failed (continuing in degraded mode)" >&2
      fi
      INVALID_TASK_IDS=$(printf '%s' "$DOCS_FINAL" | jq '[.[] | select((.task_id|type) != "number") | .task_id]')
      INVALID_TASK_IDS_COUNT=$(printf '%s' "$INVALID_TASK_IDS" | jq 'length')
      if [ "$INVALID_TASK_IDS_COUNT" != "0" ]; then
        echo "validate-docs: FATAL — docs contain non-numeric task_id values: $INVALID_TASK_IDS" >&2
        exit 1
      fi
      MISSING_ACCEPTANCE=$(printf '%s' "$DOCS_FINAL" | jq '[.[] | select((.acceptance_md // "") | length == 0) | .task_id]')
      MISSING_ACCEPTANCE_COUNT=$(printf '%s' "$MISSING_ACCEPTANCE" | jq 'length')
      if [ "$MISSING_ACCEPTANCE_COUNT" != "0" ]; then
        if [ "$STRICT_CONTENT_GATES" = "true" ] || [ "$STRICT_CONTENT_GATES" = "1" ]; then
          echo "validate-docs: FATAL — $MISSING_ACCEPTANCE_COUNT doc(s) missing acceptance_md: $MISSING_ACCEPTANCE" >&2
          exit 1
        fi
        echo "validate-docs: WARNING — $MISSING_ACCEPTANCE_COUNT doc(s) missing acceptance_md: $MISSING_ACCEPTANCE" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-docs" "warning: $MISSING_ACCEPTANCE_COUNT docs missing acceptance criteria" "${audio_debug}" "warning"
      fi
      MISSING_DECISIONS=$(printf '%s' "$DOCS_FINAL" | jq '[.[] | select((.decisions_md // "") | length == 0) | .task_id]')
      MISSING_DECISIONS_COUNT=$(printf '%s' "$MISSING_DECISIONS" | jq 'length')
      if [ "$MISSING_DECISIONS_COUNT" != "0" ]; then
        if [ "$STRICT_CONTENT_GATES" = "true" ] || [ "$STRICT_CONTENT_GATES" = "1" ]; then
          echo "validate-docs: FATAL — $MISSING_DECISIONS_COUNT doc(s) missing decisions_md: $MISSING_DECISIONS" >&2
          exit 1
        fi
        echo "validate-docs: WARNING — $MISSING_DECISIONS_COUNT doc(s) missing decisions_md: $MISSING_DECISIONS" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-docs" "warning: $MISSING_DECISIONS_COUNT docs missing decision points" "${audio_debug}" "warning"
      fi
      DOC_COUNT=$(printf '%s' "$DOCS_FINAL" | jq 'if type=="array" then length else 0 end')
      TASK_COUNT=$(printf '%s' "$EXP" | jq 'length')
      if [ "$DOC_COUNT" != "$TASK_COUNT" ]; then
        if [ "$STRICT_CONTENT_GATES" = "true" ] || [ "$STRICT_CONTENT_GATES" = "1" ]; then
          echo "validate-docs: FATAL — doc count ($DOC_COUNT) does not match task count ($TASK_COUNT)" >&2
          exit 1
        fi
        echo "validate-docs: WARNING — doc count ($DOC_COUNT) does not match task count ($TASK_COUNT)" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-docs" "warning: doc/task count mismatch ($DOC_COUNT vs $TASK_COUNT)" "${audio_debug}" "warning"
      fi
      printf '%s\n' "$DOCS_FINAL"

  - id: write-docs
    env:
      CTO_VALIDATED_DOCS_OUT: $validate-docs.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "write-docs" "${audio_debug}"
      DOCS_PAYLOAD="$(printf '%s' "$CTO_VALIDATED_DOCS_OUT" | jq -c 'if type=="array" then {task_docs:.} else . end')"
      printf '%s' "$DOCS_PAYLOAD" | intake-util write-files --base-path .tasks/docs --type docs

  - id: linear-activity-write-docs
    env:
      CTO_VALIDATED_DOCS_OUT: $validate-docs.stdout
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-activity-write-docs" "${audio_debug}"
      DOC_COUNT=$(printf '%s' "$CTO_VALIDATED_DOCS_OUT" | jq 'if type=="array" then length else 0 end' 2>/dev/null || echo "0")
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
      TASK_COUNT=$(printf '%s' "$EXP" | jq 'length' 2>/dev/null || echo "0")
      MISSING_ACC=$(printf '%s' "$CTO_VALIDATED_DOCS_OUT" | jq '[.[] | select((.acceptance_md // "") | length == 0)] | length' 2>/dev/null || echo "0")
      MISSING_DEC=$(printf '%s' "$CTO_VALIDATED_DOCS_OUT" | jq '[.[] | select((.decisions_md // "") | length == 0)] | length' 2>/dev/null || echo "0")
      if [ "$DOC_COUNT" = "$TASK_COUNT" ] && [ "$MISSING_ACC" = "0" ] && [ "$MISSING_DEC" = "0" ]; then
        STATUS="Passed"
      else
        STATUS="Degraded"
      fi
      MATCH_STR=$([ "$DOC_COUNT" = "$TASK_COUNT" ] && echo "Yes" || echo "No (${DOC_COUNT}/${TASK_COUNT})")
      BODY=$(printf '## Documentation Validation: %s\n\n| Metric | Value |\n|--------|-------|\n| Documents generated | %s |\n| Tasks expected | %s |\n| Missing acceptance criteria | %s |\n| Missing decision points | %s |\n| Doc/task match | %s |' \
        "$STATUS" "$DOC_COUNT" "$TASK_COUNT" "$MISSING_ACC" "$MISSING_DEC" "$MATCH_STR")
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type action \
        --action "Validated documentation" \
        --parameter "${DOC_COUNT} docs for ${TASK_COUNT} tasks" \
        --result "$BODY" >/dev/null || true

  - id: search-skills
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "search-skills" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
      printf '%s' "$EXP" | jq -r '.[] | select(type == "object") | "\(.id)|\(.title // "") \(.stack // "") \((.description // "") | tostring | .[0:200])"' | while IFS='|' read -r task_id query; do
        results=$(clawhub search "$query" --limit 5 --json 2>/dev/null || echo '[]')
        echo "{\"task_id\": $task_id, \"search_results\": $results}"
      done | jq -s '{"skill_search_results": .}'

  - id: discover-skills
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_SEARCH_SKILLS_OUT: $search-skills.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "discover-skills" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]");
      if ! EXP="$(printf '%s' "$EXP" | jq -c '.' 2>/dev/null)"; then
        EXP="[]"
      fi
      mkdir -p "$root/.intake/tmp"
      EXP_FILE="$root/.intake/tmp/discover-skills-expanded-tasks.json"
      SEARCH_RESULTS_FILE="$root/.intake/tmp/discover-skills-search-results.json"
      printf '%s' "$EXP" > "$EXP_FILE"
      if ! printf '%s' "$CTO_SEARCH_SKILLS_OUT" | jq -c '.skill_search_results // []' > "$SEARCH_RESULTS_FILE" 2>/dev/null; then
        printf '%s' '[]' > "$SEARCH_RESULTS_FILE"
      fi
      ARGS=$(jq -n \
        --rawfile sys "$root/intake/prompts/skill-discovery-system.md" \
        --slurpfile expanded_tasks "$EXP_FILE" \
        --slurpfile skill_search_results "$SEARCH_RESULTS_FILE" \
        --arg schema "$root/intake/schemas/skill-recommendations.schema.json" \
        --arg provider "${model_fast_provider}" \
        --arg model "${model_fast}" \
        '{ "prompt": $sys,
           "input": { "expanded_tasks": $expanded_tasks[0], "skill_search_results": $skill_search_results[0] },
           "schema": $schema, "provider": $provider, "model": $model }')
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: verify-discover-skills
    env:
      CTO_DISCOVER_SKILLS_OUT: $discover-skills.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "verify-discover-skills" "${audio_debug}"
      printf '%s' "$CTO_DISCOVER_SKILLS_OUT" | intake-util validate --type skill-recommendations || echo "verify-discover-skills: skill-recommendations validation failed (continuing in degraded mode)" >&2

  - id: linear-activity-discover-skills
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-activity-discover-skills" "${audio_debug}"
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type thought \
        --title "Skills Discovered" \
        --body "Skill recommendations generated for all tasks" >/dev/null || true

  - id: generate-tool-manifest
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "generate-tool-manifest" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]");
      if ! EXP="$(printf '%s' "$EXP" | jq -c '.' 2>/dev/null)"; then
        EXP="[]"
      fi
      mkdir -p "$root/.intake/tmp"
      EXP_FILE="$root/.intake/tmp/tool-manifest-expanded-tasks.json"
      printf '%s' "$EXP" > "$EXP_FILE"
      ARGS=$(jq -n \
        --rawfile sys "$root/intake/prompts/tool-manifest-system.md" \
        --slurpfile expanded_tasks "$EXP_FILE" \
        --rawfile available_tools "$root/.intake/contexts/tools.txt" \
        --rawfile infrastructure_context "$root/.intake/contexts/infrastructure.txt" \
        --arg schema "$root/intake/schemas/tool-manifest.schema.json" \
        --arg provider "${model_fast_provider}" \
        --arg model "${model_fast}" \
        '{ "prompt": $sys,
           "input": { "expanded_tasks": $expanded_tasks[0], "available_tools": $available_tools, "infrastructure_context": $infrastructure_context },
           "schema": $schema, "provider": $provider, "model": $model }')
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: fan-out-prompts
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_GENERATE_SCAFFOLDS_OUT: $generate-scaffolds.stdout
      CTO_DISCOVER_SKILLS_OUT: $discover-skills.stdout
      CTO_GENERATE_TOOL_MANIFEST_OUT: $generate-tool-manifest.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "fan-out-prompts" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]");
      if ! printf '%s' "$EXP" | jq -e . >/dev/null 2>&1; then
        echo "fan-out-prompts: expanded_tasks blob not valid JSON; recovering from refine-tasks-input or initial-tasks" >&2
        if [ -s "$root/.intake/tmp/refine-tasks-input.json" ] && jq -e . "$root/.intake/tmp/refine-tasks-input.json" >/dev/null 2>&1; then
          EXP="$(jq -c '.' "$root/.intake/tmp/refine-tasks-input.json")"
        elif [ -s "$root/.intake/initial-tasks.json" ]; then
          EXP="$(jq -c '.' "$root/.intake/initial-tasks.json")"
        else
          EXP="[]"
        fi
      else
        EXP="$(printf '%s' "$EXP" | jq -c '.' 2>/dev/null)" || EXP="[]"
        if ! printf '%s' "$EXP" | jq -e 'type=="array"' >/dev/null 2>&1; then
          EXP=$(printf '%s' "$EXP" | jq -c 'if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) else [] end' 2>/dev/null || echo "[]")
        fi
      fi
      if ! printf '%s' "$EXP" | jq -e 'type=="array"' >/dev/null 2>&1; then
        EXP="[]"
      fi
      printf '%s' "$EXP" > "$root/.intake/tmp/fanout-prompts-expanded-tasks.json"
      if [ -z "$EXP" ] || [ "$EXP" = "null" ] || [ "$EXP" = "[]" ]; then
        echo "fan-out-prompts: FATAL — no expanded tasks available" >&2; exit 1; fi
      if [ -z "$CTO_GENERATE_SCAFFOLDS_OUT" ]; then
        echo "fan-out-prompts: FATAL — no scaffolds available" >&2; exit 1; fi
      mkdir -p "$root/.intake/tmp"
      SCAFFOLDS_FILE="$root/.intake/tmp/fanout-prompts-scaffolds.json"
      SKILLS_FILE="$root/.intake/tmp/fanout-prompts-skills.json"
      TOOL_MANIFEST_FILE="$root/.intake/tmp/fanout-prompts-tool-manifest.json"
      if ! printf '%s' "$CTO_GENERATE_SCAFFOLDS_OUT" | jq -c '.' > "$SCAFFOLDS_FILE" 2>/dev/null; then
        printf '%s' '{"scaffolds":[]}' > "$SCAFFOLDS_FILE"
      fi
      if ! printf '%s' "$CTO_DISCOVER_SKILLS_OUT" | jq -c '.' > "$SKILLS_FILE" 2>/dev/null; then
        printf '%s' '{"recommendations":[]}' > "$SKILLS_FILE"
      fi
      if ! printf '%s' "$CTO_GENERATE_TOOL_MANIFEST_OUT" | jq -c '.' > "$TOOL_MANIFEST_FILE" 2>/dev/null; then
        printf '%s' '{}' > "$TOOL_MANIFEST_FILE"
      fi
      CTX=$(jq -n \
        --slurpfile sc "$SCAFFOLDS_FILE" \
        --slurpfile sr "$SKILLS_FILE" \
        --slurpfile tm "$TOOL_MANIFEST_FILE" \
        --rawfile cb "$root/.intake/contexts/codebase.txt" \
        --arg pn "${project_name}" \
        '{scaffolds: $sc[0], skill_recommendations: $sr[0], tool_manifest: $tm[0], codebase_context: $cb, project_name: $pn}') || {
        echo "fan-out-prompts: FATAL — jq context build failed" >&2; exit 1; }
      build_prompt_fallback() {
        jq -nc --argjson tasks "$EXP" '
          [ $tasks[] as $t | select($t | type == "object") | {
              task_id: $t.id,
              task_title: (($t.title // "Untitled") | tostring),
              prompt_md: (
                "Implement task " + (($t.id // 0)|tostring) + ": " + (($t.title // "Untitled task") | tostring)
                + "\n\n## Goal\n" + (($t.description // "No description provided.") | tostring)
                + "\n\n## Task Context\n"
                + "- Agent owner: " + (($t.agent // "Unassigned") | tostring)
                + "\n- Stack: " + (($t.stack // "Unspecified") | tostring)
                + "\n- Priority: " + (($t.priority // "unspecified") | tostring)
                + "\n- Dependencies: "
                + (if (($t.dependencies // []) | length) > 0
                    then (($t.dependencies // []) | map(tostring) | join(", "))
                    else "None"
                  end)
                + "\n\n## Implementation Plan\n" + (($t.details // $t.description // "No implementation details provided.") | tostring)
                + "\n\n## Acceptance Criteria\n" + (($t.test_strategy // "Run tests and confirm task outcomes.") | tostring)
                + "\n\n## Subtasks\n"
                + (if (($t.subtasks // []) | length) > 0
                    then (($t.subtasks // [])
                      | map(select(type == "object"))
                      | map("- " + ((.title // ("Subtask " + ((.id // 0)|tostring))) | tostring) + ": " + ((.description // .details // "No description provided.") | tostring))
                      | join("\n"))
                    else "_No subtasks generated._"
                  end)
                + "\n\n## Deliverables\n"
                + "- Update the relevant code, configuration, and tests.\n"
                + "- Keep artifacts aligned with the acceptance criteria.\n"
                + "- Document blockers or assumptions in your final summary."
              ),
              prompt_xml: "<acceptance><checklist><item>Implement required behavior.</item><item>Run tests and lint.</item></checklist></acceptance>",
              subtasks: [($t.subtasks // [])[]? | select(type == "object") | {
                subtask_id: .id,
                prompt_md: (
                  "Implement subtask " + ((.id // 0)|tostring) + ": " + ((.title // "Untitled subtask") | tostring)
                  + "\n\n## Objective\n" + ((.description // "No description provided.") | tostring)
                  + "\n\n## Steps\n" + ((.details // .description // "No implementation details provided.") | tostring)
                  + "\n\n## Validation\n" + ((.test_strategy // "Verify the subtask outcomes.") | tostring)
                )
              }]
            } ]'
      }
      OUTPUT=$(printf '%s' "$EXP" | intake-util fan-out \
        --prompt "$root/intake/prompts/smart-prompts-system.md" \
        --schema "$root/intake/schemas/smart-prompt-item.schema.json" \
        --context "$CTX" \
        --provider "${model_fast_provider}" \
        --model "${model_fast}" \
        --concurrency "${INTAKE_FAN_OUT_CONCURRENCY:-4}") || {
        echo "fan-out-prompts: fan-out failed; building deterministic fallback prompts" >&2
        build_prompt_fallback
        exit 0
      }
      if [ -z "$OUTPUT" ]; then
        echo "fan-out-prompts: fan-out returned empty output; building deterministic fallback prompts" >&2
        build_prompt_fallback
        exit 0
      fi
      printf '%s' "$OUTPUT"

  - id: validate-prompts
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_FAN_OUT_PROMPTS_OUT: $fan-out-prompts.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "validate-prompts" "${audio_debug}"
      if [ -z "$CTO_FAN_OUT_PROMPTS_OUT" ]; then
        echo "validate-prompts: FATAL — fan-out-prompts produced no output" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-prompts" "failed: empty prompts output" "${audio_debug}" "error"
        exit 1
      fi
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
      TASK_IDS=$(printf '%s' "$EXP" | jq '[.[].id]')
      PROMPTS_NORM="$(printf '%s' "$CTO_FAN_OUT_PROMPTS_OUT" | jq -c 'if type=="array" then map(select(type=="object")) elif .task_prompts? then (.task_prompts | map(select(type=="object"))) else [] end' 2>/dev/null || echo '[]')"
      TMP_DIR="$(mktemp -d "${TMPDIR:-/tmp}/validate-prompts.XXXXXX")"
      trap 'rm -rf "$TMP_DIR"' EXIT
      TASKS_FILE="$TMP_DIR/tasks.json"
      PROMPTS_FILE="$TMP_DIR/prompts.json"
      printf '%s' "$EXP" > "$TASKS_FILE"
      printf '%s' "$PROMPTS_NORM" > "$PROMPTS_FILE"
      PROMPTS_FINAL="$(jq -nc --slurpfile tasks "$TASKS_FILE" --slurpfile prompts "$PROMPTS_FILE" '
        ($tasks[0] // []) as $tasks
        | ($prompts[0] // []) as $prompts
        | [ $tasks[] as $t
          | select($t | type == "object")
          | ([$prompts[]? | select(.task_id == $t.id)][0]) as $p
          | if (
              $p
              and (($p.prompt_md // "") | length > 0)
            ) then
              ($p + { prompt_xml: ($p.prompt_xml // "<acceptance><checklist><item>Implement and verify task outcomes.</item></checklist></acceptance>") })
            else {
              task_id: $t.id,
              task_title: (($t.title // "Untitled") | tostring),
              prompt_md: (
                "Implement task " + (($t.id // 0)|tostring) + ": " + (($t.title // "Untitled task") | tostring)
                + "\n\n## Goal\n" + (($t.description // "No description provided.") | tostring)
                + "\n\n## Task Context\n"
                + "- Agent owner: " + (($t.agent // "Unassigned") | tostring)
                + "\n- Stack: " + (($t.stack // "Unspecified") | tostring)
                + "\n- Priority: " + (($t.priority // "unspecified") | tostring)
                + "\n- Dependencies: "
                + (if (($t.dependencies // []) | length) > 0
                    then (($t.dependencies // []) | map(tostring) | join(", "))
                    else "None"
                  end)
                + "\n\n## Implementation Plan\n" + (($t.details // $t.description // "No implementation details provided.") | tostring)
                + "\n\n## Acceptance Criteria\n" + (($t.test_strategy // "Run tests and confirm task outcomes.") | tostring)
                + "\n\n## Subtasks\n"
                + (if (($t.subtasks // []) | length) > 0
                    then (($t.subtasks // [])
                      | map(select(type == "object"))
                      | map("- " + ((.title // ("Subtask " + ((.id // 0)|tostring))) | tostring) + ": " + ((.description // .details // "No description provided.") | tostring))
                      | join("\n"))
                    else "_No subtasks generated._"
                  end)
                + "\n\n## Deliverables\n"
                + "- Update the relevant code, configuration, and tests.\n"
                + "- Keep artifacts aligned with the acceptance criteria.\n"
                + "- Document blockers or assumptions in your final summary."
              ),
              prompt_xml: "<acceptance><checklist><item>Implement required behavior.</item><item>Run tests and lint.</item></checklist></acceptance>",
              subtasks: [($t.subtasks // [])[]? | select(type == "object") | {
                subtask_id: .id,
                prompt_md: (
                  "Implement subtask " + ((.id // 0)|tostring) + ": " + ((.title // "Untitled subtask") | tostring)
                  + "\n\n## Objective\n" + ((.description // "No description provided.") | tostring)
                  + "\n\n## Steps\n" + ((.details // .description // "No implementation details provided.") | tostring)
                  + "\n\n## Validation\n" + ((.test_strategy // "Verify the subtask outcomes.") | tostring)
                )
              }]
            } end
        ]')"
      STRICT_CONTENT_GATES="${INTAKE_STRICT_CONTENT_GATES:-true}"
      PROMPTS_VALIDATE_STATUS=0
      PROMPTS_VALIDATE_OUT="$(printf '%s' "$PROMPTS_FINAL" | intake-util validate --type prompts --task-ids "$TASK_IDS" 2>&1)" || PROMPTS_VALIDATE_STATUS=$?
      if [ -n "$PROMPTS_VALIDATE_OUT" ]; then
        printf '%s\n' "$PROMPTS_VALIDATE_OUT" >&2
      fi
      if [ "$PROMPTS_VALIDATE_STATUS" != "0" ]; then
        if [ "$STRICT_CONTENT_GATES" = "true" ] || [ "$STRICT_CONTENT_GATES" = "1" ]; then
          echo "validate-prompts: FATAL — prompts validation failed and strict mode is enabled" >&2
          exit 1
        fi
        echo "validate-prompts: prompts validation failed (continuing in degraded mode)" >&2
      fi
      INVALID_TASK_IDS=$(printf '%s' "$PROMPTS_FINAL" | jq '[.[] | select((.task_id|type) != "number") | .task_id]')
      INVALID_TASK_IDS_COUNT=$(printf '%s' "$INVALID_TASK_IDS" | jq 'length')
      if [ "$INVALID_TASK_IDS_COUNT" != "0" ]; then
        echo "validate-prompts: FATAL — prompts contain non-numeric task_id values: $INVALID_TASK_IDS" >&2
        exit 1
      fi
      MISSING_XML=$(printf '%s' "$PROMPTS_FINAL" | jq '[.[] | select((.prompt_xml // "") | length == 0) | .task_id]')
      MISSING_XML_COUNT=$(printf '%s' "$MISSING_XML" | jq 'length')
      if [ "$MISSING_XML_COUNT" != "0" ]; then
        echo "validate-prompts: WARNING — $MISSING_XML_COUNT prompt(s) missing prompt_xml (acceptance criteria): $MISSING_XML" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-prompts" "warning: $MISSING_XML_COUNT prompts missing acceptance criteria XML" "${audio_debug}" "warning"
      fi
      TASKS_WITH_SUBTASKS=$(printf '%s' "$EXP" | jq '[.[] | select((.subtasks // []) | length > 0) | .id]')
      TASKS_WITH_SUBTASKS_COUNT=$(printf '%s' "$TASKS_WITH_SUBTASKS" | jq 'length')
      if [ "$TASKS_WITH_SUBTASKS_COUNT" != "0" ]; then
        PROMPTS_MISSING_SUBTASK_PROMPTS=$(printf '%s' "$PROMPTS_FINAL" | jq --argjson parent_ids "$TASKS_WITH_SUBTASKS" \
          '[.[] | select(.task_id as $tid | $parent_ids | index($tid)) | select((.subtasks // []) | length == 0) | .task_id]')
        MISSING_SP_COUNT=$(printf '%s' "$PROMPTS_MISSING_SUBTASK_PROMPTS" | jq 'length')
        if [ "$MISSING_SP_COUNT" != "0" ]; then
          if [ "$STRICT_CONTENT_GATES" = "true" ] || [ "$STRICT_CONTENT_GATES" = "1" ]; then
            echo "validate-prompts: FATAL — $MISSING_SP_COUNT task(s) with subtasks have no subtask prompts: $PROMPTS_MISSING_SUBTASK_PROMPTS" >&2
            exit 1
          fi
          echo "validate-prompts: WARNING — $MISSING_SP_COUNT task(s) with subtasks have no subtask prompts: $PROMPTS_MISSING_SUBTASK_PROMPTS" >&2
          "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-prompts" "warning: $MISSING_SP_COUNT tasks missing subtask prompts" "${audio_debug}" "warning"
        fi
      fi
      PROMPT_COUNT=$(printf '%s' "$PROMPTS_FINAL" | jq 'if type=="array" then length else 0 end')
      TASK_COUNT=$(printf '%s' "$EXP" | jq 'length')
      if [ "$PROMPT_COUNT" != "$TASK_COUNT" ]; then
        if [ "$STRICT_CONTENT_GATES" = "true" ] || [ "$STRICT_CONTENT_GATES" = "1" ]; then
          echo "validate-prompts: FATAL — prompt count ($PROMPT_COUNT) does not match task count ($TASK_COUNT)" >&2
          exit 1
        fi
        echo "validate-prompts: WARNING — prompt count ($PROMPT_COUNT) does not match task count ($TASK_COUNT)" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-prompts" "warning: prompt/task count mismatch ($PROMPT_COUNT vs $TASK_COUNT)" "${audio_debug}" "warning"
      fi
      rm -rf "$TMP_DIR"
      trap - EXIT
      printf '%s\n' "$PROMPTS_FINAL"

  - id: write-prompts
    env:
      CTO_VALIDATED_PROMPTS_OUT: $validate-prompts.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "write-prompts" "${audio_debug}"
      PROMPTS_PAYLOAD="$(printf '%s' "$CTO_VALIDATED_PROMPTS_OUT" | jq -c 'if type=="array" then {task_prompts:.} else . end')"
      printf '%s' "$PROMPTS_PAYLOAD" | intake-util write-files --base-path .tasks/docs --type prompts

  - id: linear-activity-write-prompts
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-activity-write-prompts" "${audio_debug}"
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type thought \
        --title "Prompts Written" \
        --body "Per-agent implementation prompts written to .tasks/docs" >/dev/null || true

  - id: generate-workflows
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_GENERATE_SCAFFOLDS_OUT: $generate-scaffolds.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "generate-workflows" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
      if [ -z "$EXP" ] || [ "$EXP" = "null" ] || [ "$EXP" = "[]" ]; then
        echo "generate-workflows: FATAL — no expanded tasks available" >&2; exit 1; fi
      SCF_TMP="$(mktemp "${TMPDIR:-/tmp}/intake-gw-scaffolds.XXXXXX")"
      printf '%s' "$CTO_GENERATE_SCAFFOLDS_OUT" > "$SCF_TMP"
      OUTPUT=$(printf '%s' "$EXP" | intake-util generate-workflows \
        --scaffolds-json "$SCF_TMP" \
        --config cto-config.json \
        --repository-url "${repository_url}") || {
        rm -f "$SCF_TMP"
        echo "generate-workflows: FATAL — intake-util generate-workflows failed (exit $?)" >&2; exit 1; }
      rm -f "$SCF_TMP"
      if [ -z "$OUTPUT" ]; then
        echo "generate-workflows: FATAL — generate-workflows returned empty output" >&2; exit 1; fi
      printf '%s' "$OUTPUT"

  - id: validate-workflows
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_GENERATE_WORKFLOWS_OUT: $generate-workflows.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "validate-workflows" "${audio_debug}"
      if [ -z "$CTO_GENERATE_WORKFLOWS_OUT" ]; then
        echo "validate-workflows: FATAL — generate-workflows produced no output" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-workflows" "failed: empty workflow output" "${audio_debug}" "error"
        exit 1
      fi
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
      TASK_IDS=$(printf '%s' "$EXP" | jq '[.[].id]')
      WF_COUNT=$(printf '%s' "$CTO_GENERATE_WORKFLOWS_OUT" | jq '.task_workflows | length' 2>/dev/null || echo 0)
      if [ "$WF_COUNT" = "0" ]; then
        echo "validate-workflows: FATAL — task_workflows array is empty" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "validate-workflows" "failed: zero workflows generated" "${audio_debug}" "error"
        exit 1
      fi
      STRICT_CONTENT_GATES="${INTAKE_STRICT_CONTENT_GATES:-true}"
      WORKFLOWS_VALIDATE_STATUS=0
      WORKFLOWS_VALIDATE_OUT="$(printf '%s' "$CTO_GENERATE_WORKFLOWS_OUT" | jq '.task_workflows' | intake-util validate --type workflows --task-ids "$TASK_IDS" 2>&1)" || WORKFLOWS_VALIDATE_STATUS=$?
      if [ -n "$WORKFLOWS_VALIDATE_OUT" ]; then
        printf '%s\n' "$WORKFLOWS_VALIDATE_OUT" >&2
      fi
      if [ "$WORKFLOWS_VALIDATE_STATUS" != "0" ]; then
        if [ "$STRICT_CONTENT_GATES" = "true" ] || [ "$STRICT_CONTENT_GATES" = "1" ]; then
          echo "validate-workflows: FATAL — workflows validation failed and strict mode is enabled" >&2
          exit 1
        fi
        echo "validate-workflows: workflows validation failed (continuing in degraded mode)" >&2
      fi

  - id: write-workflows
    env:
      CTO_GENERATE_WORKFLOWS_OUT: $generate-workflows.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "write-workflows" "${audio_debug}"
      printf '%s' "$CTO_GENERATE_WORKFLOWS_OUT" | intake-util write-files --base-path .tasks/docs --type workflows

  - id: generate-scale-tasks
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "generate-scale-tasks" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]");
      if ! EXP="$(printf '%s' "$EXP" | jq -c '.' 2>/dev/null)"; then
        EXP="[]"
      fi
      mkdir -p "$root/.intake/tmp"
      EXP_FILE="$root/.intake/tmp/generate-scale-expanded-tasks.json"
      printf '%s' "$EXP" > "$EXP_FILE"
      ARGS=$(jq -n \
        --rawfile sys "$root/intake/prompts/bolt-production-hardening-system.md" \
        --slurpfile expanded_tasks "$EXP_FILE" \
        --rawfile infrastructure_context "$root/.intake/contexts/infrastructure.txt" \
        --arg schema "$root/intake/schemas/scale-tasks.schema.json" \
        --arg provider "${model_fast_provider}" \
        --arg model "${model_fast}" \
        '{ "prompt": $sys,
           "input": { "expanded_tasks": $expanded_tasks[0], "infrastructure_context": $infrastructure_context },
           "schema": $schema, "provider": $provider, "model": $model }')
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: generate-security-report
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_GENERATE_SCALE_TASKS_OUT: $generate-scale-tasks.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "generate-security-report" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]");
      if ! EXP="$(printf '%s' "$EXP" | jq -c '.' 2>/dev/null)"; then
        EXP="[]"
      fi
      mkdir -p "$root/.intake/tmp"
      EXP_FILE="$root/.intake/tmp/generate-security-expanded-tasks.json"
      SCALE_FILE="$root/.intake/tmp/generate-security-scale-tasks.json"
      printf '%s' "$EXP" > "$EXP_FILE"
      if ! printf '%s' "$CTO_GENERATE_SCALE_TASKS_OUT" | jq -c '.' > "$SCALE_FILE" 2>/dev/null; then
        printf '%s' '[]' > "$SCALE_FILE"
      fi
      ARGS=$(jq -n \
        --rawfile sys "$root/intake/prompts/security-report-system.md" \
        --slurpfile expanded_tasks "$EXP_FILE" \
        --slurpfile scale_tasks "$SCALE_FILE" \
        --arg schema "$root/intake/schemas/security-report.schema.json" \
        --arg provider "${model_frontier_provider}" \
        --arg model "${model_frontier}" \
        '{ "prompt": $sys,
           "input": { "expanded_tasks": $expanded_tasks[0], "scale_tasks": $scale_tasks[0] },
           "schema": $schema, "provider": $provider, "model": $model }')
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: linear-activity-security-report
    env:
      CTO_GENERATE_SECURITY_REPORT_OUT: $generate-security-report.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-activity-security-report" "${audio_debug}"
      FINDING_COUNT=$(printf '%s' "$CTO_GENERATE_SECURITY_REPORT_OUT" | jq '.findings | length')
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type thought \
        --title "Security Report" \
        --body "Security analysis found ${FINDING_COUNT} findings" >/dev/null || true

  - id: generate-remediation-tasks
    env:
      CTO_GENERATE_SECURITY_REPORT_OUT: $generate-security-report.stdout
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "generate-remediation-tasks" "${audio_debug}"
      EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]");
      if ! EXP="$(printf '%s' "$EXP" | jq -c '.' 2>/dev/null)"; then
        EXP="[]"
      fi
      mkdir -p "$root/.intake/tmp"
      EXP_FILE="$root/.intake/tmp/generate-remediation-expanded-tasks.json"
      SECURITY_FILE="$root/.intake/tmp/generate-remediation-security-report.json"
      printf '%s' "$EXP" > "$EXP_FILE"
      if ! printf '%s' "$CTO_GENERATE_SECURITY_REPORT_OUT" | jq -c '.' > "$SECURITY_FILE" 2>/dev/null; then
        printf '%s' '{}' > "$SECURITY_FILE"
      fi
      ARGS=$(jq -n \
        --rawfile sys "$root/intake/prompts/security-remediation-system.md" \
        --slurpfile security_report "$SECURITY_FILE" \
        --slurpfile expanded_tasks "$EXP_FILE" \
        --arg schema "$root/intake/schemas/remediation-tasks.schema.json" \
        --arg provider "${model_fast_provider}" \
        --arg model "${model_fast}" \
        '{ "prompt": $sys,
           "input": { "security_report": $security_report[0], "expanded_tasks": $expanded_tasks[0] },
           "schema": $schema, "provider": $provider, "model": $model }')
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: verify-artifact-gates
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_FAN_OUT_DOCS_OUT: $fan-out-docs.stdout
      CTO_FAN_OUT_PROMPTS_OUT: $fan-out-prompts.stdout
      CTO_GENERATE_WORKFLOWS_OUT: $generate-workflows.stdout
      CTO_GENERATE_SECURITY_REPORT_OUT: $generate-security-report.stdout
      CTO_GENERATE_REMEDIATION_TASKS_OUT: $generate-remediation-tasks.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "verify-artifact-gates" "${audio_debug}"
      EXP=""
      EXP_SOURCE=""
      for candidate in \
        "$root/.intake/tmp/fanout-docs-expanded-tasks.json" \
        "$root/.intake/tmp/fanout-prompts-expanded-tasks.json" \
        "$root/.intake/tmp/generate-scale-expanded-tasks.json" \
        "$root/.tasks/tasks/tasks.json" \
        "$root/.intake/tmp/refine-tasks-input.json" \
        "$root/.intake/initial-tasks.json"
      do
        if [ -s "$candidate" ] && jq -e 'type=="array" and length>0' "$candidate" >/dev/null 2>&1; then
          EXP="$(jq -c '.' "$candidate")"
          EXP_SOURCE="$candidate"
          break
        fi
      done
      if [ -z "$EXP" ]; then
        EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
        if ! printf '%s' "$EXP" | jq -e 'type=="array" and length>0' >/dev/null 2>&1; then
          EXP="[]"
        fi
      else
        echo "verify-artifact-gates: using expanded tasks from $EXP_SOURCE" >&2
      fi
      mkdir -p .tasks/tasks
      printf '%s\n' "$EXP" > .tasks/tasks/tasks.json

      TASK_COUNT=$(printf '%s' "$EXP" | jq 'length' 2>/dev/null || echo 0)
      DOC_COUNT=$(printf '%s' "$CTO_FAN_OUT_DOCS_OUT" | jq 'if type=="array" then length elif .items? then (.items|length) else 0 end' 2>/dev/null || echo 0)
      PROMPT_COUNT=$(printf '%s' "$CTO_FAN_OUT_PROMPTS_OUT" | jq 'if type=="array" then length elif .items? then (.items|length) else 0 end' 2>/dev/null || echo 0)
      WORKFLOW_COUNT=$(printf '%s' "$CTO_GENERATE_WORKFLOWS_OUT" | jq '.task_workflows | length' 2>/dev/null || echo 0)

      if ! printf '%s' "$TASK_COUNT" | jq -e 'type=="number" and . > 0' >/dev/null 2>&1; then
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "failed: tasks missing" "${audio_debug}" "error" "project ${project_name}"
        echo "verify-artifact-gates: expected expanded tasks > 0" >&2
        exit 1
      fi
      if ! printf '%s' "$DOC_COUNT" | jq -e 'type=="number" and . > 0' >/dev/null 2>&1; then
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "failed: docs missing" "${audio_debug}" "error" "project ${project_name}"
        echo "verify-artifact-gates: expected docs fan-out output > 0" >&2
        exit 1
      fi
      if ! printf '%s' "$PROMPT_COUNT" | jq -e 'type=="number" and . > 0' >/dev/null 2>&1; then
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "failed: prompts missing" "${audio_debug}" "error" "project ${project_name}"
        echo "verify-artifact-gates: expected prompts fan-out output > 0" >&2
        exit 1
      fi
      if ! printf '%s' "$WORKFLOW_COUNT" | jq -e 'type=="number" and . > 0' >/dev/null 2>&1; then
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "failed: workflows missing" "${audio_debug}" "error" "project ${project_name}"
        echo "verify-artifact-gates: expected generated workflows > 0" >&2
        exit 1
      fi
      if [ ! -s .tasks/tasks/tasks.json ]; then
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "failed: tasks.json not written" "${audio_debug}" "error" "project ${project_name}"
        echo "verify-artifact-gates: .tasks/tasks/tasks.json missing or empty" >&2
        exit 1
      fi

      TASKS_WITH_SUBTASKS=$(printf '%s' "$EXP" | jq '[.[] | select((.subtasks // []) | length > 0)] | length' 2>/dev/null || echo 0)
      TOTAL_SUBTASKS=$(printf '%s' "$EXP" | jq '[.[] | (.subtasks // []) | length] | add // 0' 2>/dev/null || echo 0)
      TASKS_WITH_DECISIONS=$(printf '%s' "$EXP" | jq '[.[] | select((.decision_points // []) | length > 0)] | length' 2>/dev/null || echo 0)
      TOTAL_DECISIONS=$(printf '%s' "$EXP" | jq '[.[] | (.decision_points // []) | length] | add // 0' 2>/dev/null || echo 0)
      REQUIRE_SUBTASKS="${INTAKE_REQUIRE_SUBTASKS:-true}"
      if [ "$TASKS_WITH_SUBTASKS" = "0" ]; then
        if [ "$REQUIRE_SUBTASKS" = "true" ] || [ "$REQUIRE_SUBTASKS" = "1" ]; then
          "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "failed: no subtasks generated" "${audio_debug}" "error" "project ${project_name}"
          echo "verify-artifact-gates: FATAL — none of the $TASK_COUNT tasks have subtasks" >&2
          exit 1
        fi
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "warning: no tasks have subtasks" "${audio_debug}" "warning" "project ${project_name}"
        echo "verify-artifact-gates: WARNING — none of the $TASK_COUNT tasks have subtasks" >&2
      else
        echo "verify-artifact-gates: $TASKS_WITH_SUBTASKS/$TASK_COUNT tasks have subtasks ($TOTAL_SUBTASKS total subtasks)" >&2
      fi
      if [ "$TASKS_WITH_DECISIONS" = "0" ]; then
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "warning: no tasks have decision points" "${audio_debug}" "warning" "project ${project_name}"
        echo "verify-artifact-gates: WARNING — none of the $TASK_COUNT tasks have decision_points" >&2
      else
        echo "verify-artifact-gates: $TASKS_WITH_DECISIONS/$TASK_COUNT tasks have decision_points ($TOTAL_DECISIONS total)" >&2
      fi

      if [ ! -s .tasks/docs/security-report.json ] && [ -n "$CTO_GENERATE_SECURITY_REPORT_OUT" ]; then
        printf '%s\n' "$CTO_GENERATE_SECURITY_REPORT_OUT" > .tasks/docs/security-report.json
      fi
      if [ ! -s .tasks/docs/remediation-tasks.json ] && [ -n "$CTO_GENERATE_REMEDIATION_TASKS_OUT" ]; then
        printf '%s\n' "$CTO_GENERATE_REMEDIATION_TASKS_OUT" > .tasks/docs/remediation-tasks.json
      fi
      if [ "${deliberate}" = "true" ] || [ "${deliberate}" = "1" ]; then
        if [ ! -s .tasks/docs/design-brief.md ]; then
          "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "failed: design-brief missing" "${audio_debug}" "error" "project ${project_name}"
          echo "verify-artifact-gates: .tasks/docs/design-brief.md missing or empty" >&2
          exit 1
        fi
      fi

      "$root/intake/scripts/workflow-gate-audio.sh" "intake" "artifacts" "passed tasks=${TASK_COUNT}(${TOTAL_SUBTASKS} subtasks, ${TOTAL_DECISIONS} decisions) docs=${DOC_COUNT} prompts=${PROMPT_COUNT} workflows=${WORKFLOW_COUNT}" "${audio_debug}" "normal" "project ${project_name}"
      jq -nc \
        --argjson task_count "$TASK_COUNT" \
        --argjson doc_count "$DOC_COUNT" \
        --argjson prompt_count "$PROMPT_COUNT" \
        --argjson workflow_count "$WORKFLOW_COUNT" \
        --argjson subtask_count "$TOTAL_SUBTASKS" \
        --argjson decision_point_count "$TOTAL_DECISIONS" \
        '{task_count:$task_count,doc_count:$doc_count,prompt_count:$prompt_count,workflow_count:$workflow_count,subtask_count:$subtask_count,decision_point_count:$decision_point_count,tasks_path:".tasks/tasks/tasks.json"}'

  - id: verify-folder-structure
    env:
      CTO_VERIFY_ARTIFACT_GATES_OUT: $verify-artifact-gates.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "verify-folder-structure" "${audio_debug}"
      ERRORS=""
      if [ ! -d .tasks ]; then
        ERRORS="${ERRORS}FATAL: .tasks/ directory does not exist\n"
      fi
      if [ ! -d .tasks/tasks ]; then
        ERRORS="${ERRORS}FATAL: .tasks/tasks/ directory does not exist\n"
      fi
      if [ ! -s .tasks/tasks/tasks.json ]; then
        ERRORS="${ERRORS}FATAL: .tasks/tasks/tasks.json missing or empty\n"
      else
        TASK_COUNT=$(jq 'length' .tasks/tasks/tasks.json 2>/dev/null || echo 0)
        SUBTASK_TOTAL=$(jq '[.[] | (.subtasks // []) | length] | add // 0' .tasks/tasks/tasks.json 2>/dev/null || echo 0)
        DECISION_TOTAL=$(jq '[.[] | (.decision_points // []) | length] | add // 0' .tasks/tasks/tasks.json 2>/dev/null || echo 0)
        echo "verify-folder-structure: .tasks/tasks/tasks.json — $TASK_COUNT tasks, $SUBTASK_TOTAL subtasks, $DECISION_TOTAL decision points" >&2
      fi
      if [ ! -d .tasks/docs ]; then
        ERRORS="${ERRORS}FATAL: .tasks/docs/ directory does not exist\n"
      else
        DOC_FILES=$(find .tasks/docs -name "*.md" -o -name "*.json" 2>/dev/null | wc -l | tr -d ' ')
        echo "verify-folder-structure: .tasks/docs/ contains $DOC_FILES files" >&2
        if [ "$DOC_FILES" = "0" ]; then
          ERRORS="${ERRORS}FATAL: .tasks/docs/ exists but contains no files\n"
        fi
        if [ "${deliberate}" = "true" ] || [ "${deliberate}" = "1" ]; then
          if [ ! -s .tasks/docs/design-brief.md ]; then
            ERRORS="${ERRORS}FATAL: .tasks/docs/design-brief.md missing or empty\n"
          fi
        fi
        if [ -d .tasks/docs/task-undefined ]; then
          ERRORS="${ERRORS}FATAL: .tasks/docs/task-undefined exists (invalid task_id in generated docs/prompts)\n"
        fi
        for task_id in $(jq -r '.[].id' .tasks/tasks/tasks.json 2>/dev/null); do
          for required_file in task.md acceptance.md prompt.md; do
            f=".tasks/docs/task-${task_id}/${required_file}"
            if [ ! -s "$f" ]; then
              ERRORS="${ERRORS}FATAL: missing or empty $f\n"
            fi
          done
        done
        SUBTASK_MAP="$(mktemp "${TMPDIR:-/tmp}/intake-subtask-map.XXXXXX")"
        jq -r '.[] | .id as $pid | (.subtasks // [])[]? | [$pid, .id] | @tsv' .tasks/tasks/tasks.json 2>/dev/null > "$SUBTASK_MAP" || true
        while IFS='	' read -r parent_id subtask_id; do
          [ -z "$parent_id" ] && continue
          sf=".tasks/docs/task-${parent_id}/subtasks/task-${parent_id}.${subtask_id}/prompt.md"
          if [ ! -s "$sf" ]; then
            ERRORS="${ERRORS}FATAL: missing or empty $sf\n"
          fi
        done < "$SUBTASK_MAP"
        rm -f "$SUBTASK_MAP"
        PROMPT_FILES=$(find .tasks/docs -name "*prompt*" -o -name "*-prompt.md" 2>/dev/null | wc -l | tr -d ' ')
        DOC_MD_FILES=$(find .tasks/docs -name "*.md" ! -name "*prompt*" ! -name "design-brief.md" 2>/dev/null | wc -l | tr -d ' ')
        echo "verify-folder-structure: found $PROMPT_FILES prompt files, $DOC_MD_FILES doc markdown files" >&2
        for expected_json in security-report.json remediation-tasks.json scale-tasks.json; do
          if [ -f ".tasks/docs/$expected_json" ]; then
            SIZE=$(wc -c < ".tasks/docs/$expected_json" | tr -d ' ')
            echo "verify-folder-structure: .tasks/docs/$expected_json — ${SIZE} bytes" >&2
          else
            echo "verify-folder-structure: WARNING — .tasks/docs/$expected_json not found" >&2
          fi
        done
      fi
      if [ -n "$ERRORS" ]; then
        printf '%b' "$ERRORS" >&2
        "$root/intake/scripts/workflow-gate-audio.sh" "intake" "folder-structure" "failed: missing expected files or directories" "${audio_debug}" "error" "project ${project_name}"
        exit 1
      fi
      ARTIFACT_COUNTS=$(printf '%s' "$CTO_VERIFY_ARTIFACT_GATES_OUT" | jq -c '.' 2>/dev/null || printf '{}')
      echo "verify-folder-structure: all expected directories and files present" >&2
      "$root/intake/scripts/workflow-gate-audio.sh" "intake" "folder-structure" "passed" "${audio_debug}" "normal" "project ${project_name}"

  - id: update-plan-quality-gate
    command: |
      intake-util linear-plan \
        --session-id "${linear_session_id}" \
        --step quality-gate || true

  - id: llm-quality-gate-artifacts
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "llm-quality-gate-artifacts" "${audio_debug}"
      if [ "${INTAKE_ENABLE_LLM_GATES:-true}" != "true" ] && [ "${INTAKE_ENABLE_LLM_GATES:-true}" != "1" ]; then
        echo "llm-quality-gate-artifacts: skipped (INTAKE_ENABLE_LLM_GATES disabled)" >&2
        printf '{"skipped":true}\n'
        exit 0
      fi
      mkdir -p "$root/.intake/tmp"
      BUNDLE="$root/.intake/tmp/quality-gate-intake-artifacts.txt"
      TASK_COUNT="$(jq 'length' .tasks/tasks/tasks.json 2>/dev/null || echo 0)"
      SUBTASK_COUNT="$(jq '[.[] | (.subtasks // []) | length] | add // 0' .tasks/tasks/tasks.json 2>/dev/null || echo 0)"
      DOC_FILE_COUNT="$(find .tasks/docs -name "*.md" -o -name "*.json" 2>/dev/null | wc -l | tr -d ' ')"
      SAMPLE_TASK_COUNT=2
      {
        echo "stage=intake-artifacts"
        echo "project=${project_name}"
        echo "summary:"
        echo "Generated ${TASK_COUNT} tasks with ${SUBTASK_COUNT} subtasks and ${DOC_FILE_COUNT} documentation artifacts for ${project_name}. Bundle below includes sampled summaries and file excerpts for the first ${SAMPLE_TASK_COUNT} tasks."
        echo
        echo "task_summaries:"
        jq -c --argjson sample_count "$SAMPLE_TASK_COUNT" '[.[0:$sample_count][] | {
          id,
          title,
          agent,
          stack,
          priority,
          dependencies,
          subtask_count: ((.subtasks // []) | length),
          decision_point_count: ((.decision_points // []) | length),
          description: ((.description // "")[0:220]),
          test_strategy: ((.test_strategy // "")[0:220])
        }]' .tasks/tasks/tasks.json 2>/dev/null || true
        echo
        for task_id in $(jq -r --argjson sample_count "$SAMPLE_TASK_COUNT" '.[0:$sample_count] | .[].id' .tasks/tasks/tasks.json 2>/dev/null); do
          for section in task acceptance prompt; do
            f=".tasks/docs/task-${task_id}/${section}.md"
            echo "=== ${f} ==="
            if [ -s "$f" ]; then
              sed -n '1,80p' "$f"
            else
              echo "__MISSING_OR_EMPTY__"
            fi
            echo
          done
        done
      } > "$BUNDLE"
      "$root/intake/scripts/quality-gate.sh" --stage "intake-artifacts" --input-file "$BUNDLE"

  - id: sync-linear-issues
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "sync-linear-issues" "${audio_debug}"
      # Moved to sync-linear-issues-post-push so links resolve to pushed branch.
      printf '{"issueCount":0,"skipped":true,"reason":"deferred_to_post_push"}\n'

  - id: linear-plan-commit
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-plan-commit" "${audio_debug}"
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --issue-id "${linear_issue_id}" \
        --type plan \
        --title "Phase: Commit & PR" \
        --body "Committing generated artifacts and opening PR" >/dev/null || true
      intake-util linear-plan \
        --session-id "${linear_session_id}" \
        --step commit-and-pr || true

  - id: commit-outputs
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_GENERATE_SCALE_TASKS_OUT: $generate-scale-tasks.stdout
      CTO_GENERATE_SECURITY_REPORT_OUT: $generate-security-report.stdout
      CTO_GENERATE_REMEDIATION_TASKS_OUT: $generate-remediation-tasks.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "commit-outputs" "${audio_debug}"
      EXP=""
      EXP_SOURCE=""
      for candidate in \
        "$root/.intake/tmp/fanout-docs-expanded-tasks.json" \
        "$root/.intake/tmp/fanout-prompts-expanded-tasks.json" \
        "$root/.intake/tmp/generate-scale-expanded-tasks.json" \
        "$root/.tasks/tasks/tasks.json" \
        "$root/.intake/tmp/refine-tasks-input.json" \
        "$root/.intake/initial-tasks.json"
      do
        if [ -s "$candidate" ] && jq -e 'type=="array" and length>0' "$candidate" >/dev/null 2>&1; then
          EXP="$(jq -c '.' "$candidate")"
          EXP_SOURCE="$candidate"
          break
        fi
      done
      if [ -z "$EXP" ]; then
        EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
        if ! printf '%s' "$EXP" | jq -e 'type=="array" and length>0' >/dev/null 2>&1; then
          EXP="[]"
        fi
      else
        echo "commit-outputs: using expanded tasks from $EXP_SOURCE" >&2
      fi
      TASK_COUNT=$(printf '%s' "$EXP" | jq 'length')
      printf '%s' "$CTO_GENERATE_SCALE_TASKS_OUT" > .tasks/docs/scale-tasks.json
      printf '%s' "$CTO_GENERATE_SECURITY_REPORT_OUT" > .tasks/docs/security-report.json
      printf '%s' "$CTO_GENERATE_REMEDIATION_TASKS_OUT" > .tasks/docs/remediation-tasks.json
      REFINEMENT_WARNING=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -c '.output[0].warning' 2>/dev/null || printf '%s' "$CTO_REFINE_TASKS_OUT")
      VERDICT=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -c '.output[0].verdict' 2>/dev/null || printf '%s' "$CTO_REFINE_TASKS_OUT")
      REVISION_COUNT=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -c '.output[0].revision_count' 2>/dev/null || printf '%s' "$CTO_REFINE_TASKS_OUT")
      git config user.email "morgan@5dlabs.io"
      git config user.name "Morgan (Intake Agent)"
      BRANCH_NAME="intake/${project_name}-$(date +%Y%m%d-%H%M%S)"
      git checkout -b "$BRANCH_NAME" || {
        echo "commit-outputs: branch $BRANCH_NAME already exists or checkout failed — using current branch" >&2
        BRANCH_NAME="$(git rev-parse --abbrev-ref HEAD)"
      }
      git add .tasks/
      git add .tasks/design/ 2>/dev/null || true
      if git diff --staged --quiet 2>/dev/null; then
        echo "commit-outputs: no staged changes to commit" >&2
      else
        git diff --staged --stat
        git commit -m "feat(intake): generated ${TASK_COUNT} tasks for ${project_name}

      Generated by Morgan intake pipeline (Lobster). - design-brief.md: resolved decisions and architecture overview - tasks/: expanded task breakdown with subtask prompts - docs/: task documentation and per-agent prompts - Vote verdict: ${VERDICT} (after ${REVISION_COUNT} revision(s))" || echo "commit-outputs: git commit failed (non-fatal)" >&2
      fi

  - id: session-url-branch
    command: |
      root="${WORKSPACE:-.}"
      BRANCH="$(git rev-parse --abbrev-ref HEAD)"
      REPO_WEB="$(printf '%s' "${repository_url}" | sed -E 's#\.git$##')"
      if [ -n "${linear_session_id}" ] && [ -n "$REPO_WEB" ] && [ -n "$BRANCH" ]; then
        intake-util linear-session update-urls \
          --session-id "${linear_session_id}" \
          --add-url "Branch=${REPO_WEB}/tree/${BRANCH}" || true
      fi

  - id: create-pr
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "create-pr" "${audio_debug}"
      source "$root/scripts/scm-dispatch.sh"
      EXP=""
      EXP_SOURCE=""
      for candidate in \
        "$root/.intake/tmp/fanout-docs-expanded-tasks.json" \
        "$root/.intake/tmp/fanout-prompts-expanded-tasks.json" \
        "$root/.intake/tmp/generate-scale-expanded-tasks.json" \
        "$root/.tasks/tasks/tasks.json" \
        "$root/.intake/tmp/refine-tasks-input.json" \
        "$root/.intake/initial-tasks.json"
      do
        if [ -s "$candidate" ] && jq -e 'type=="array" and length>0' "$candidate" >/dev/null 2>&1; then
          EXP="$(jq -c '.' "$candidate")"
          EXP_SOURCE="$candidate"
          break
        fi
      done
      if [ -z "$EXP" ]; then
        EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
        if ! printf '%s' "$EXP" | jq -e 'type=="array" and length>0' >/dev/null 2>&1; then
          EXP="[]"
        fi
      else
        echo "create-pr: using expanded tasks from $EXP_SOURCE" >&2
      fi
      TASK_COUNT=$(printf '%s' "$EXP" | jq 'length')
      VERDICT=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -c '.output[0].verdict' 2>/dev/null || printf '%s' "$CTO_REFINE_TASKS_OUT")
      REVISION_COUNT=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -c '.output[0].revision_count' 2>/dev/null || printf '%s' "$CTO_REFINE_TASKS_OUT")
      WARNING=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -c '.output[0].warning' 2>/dev/null || printf '%s' "$CTO_REFINE_TASKS_OUT")
      BRANCH=$(git rev-parse --abbrev-ref HEAD)
      git push origin "$BRANCH"
      PR_PATTERN=$(scm_pr_url_pattern)
      case "$SCM_PROVIDER" in
        github)
          PR_CREATE_OUT="$(gh pr create \
            --title "feat(intake): ${project_name} task breakdown" \
            --body "## Intake Pipeline Output

      This PR was generated automatically by the Morgan intake pipeline.
      ### What's included - \`.tasks/docs/design-brief.md\` — Architecture decisions from Optimist vs Pessimist deliberation - \`.tasks/docs/task-*/\` — Expanded task descriptions with implementation guidance - Per-agent implementation prompts (\`prompt.md\`, \`prompt.xml\`, \`acceptance.md\`)
      ### Process 1. PRD parsed into ${TASK_COUNT} tasks with agent routing 2. Complexity analyzed and subtasks expanded 3. 5-model committee voted on task quality — verdict: **${VERDICT}** (${REVISION_COUNT} revision round(s)) 4. Documentation and prompts generated
      ${WARNING:+> **Note:** $WARNING}
      <!-- intake-metadata: ${intake_metadata} -->
      _Review and merge to kick off implementation._" \
            --base "${pr_base_branch}" 2>&1 || true)"
          PR_URL="$(printf '%s' "$PR_CREATE_OUT" | rg -o "$PR_PATTERN" -m 1 || true)"
          if [ -z "$PR_URL" ]; then
            PR_URL="$(gh pr view "$BRANCH" --json url --jq '.url' 2>/dev/null || true)"
          fi
          if [ -n "$PR_URL" ] && [ "$PR_URL" != "none" ]; then
            gh pr edit "$PR_URL" --add-label "intake" 2>/dev/null || true
          fi
          ;;
        gitlab)
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          PR_CREATE_OUT="$(scm_create_pr "feat(intake): ${project_name} task breakdown" "Intake Pipeline Output - ${project_name}" "${pr_base_branch}" 2>&1 || true)"
          PR_URL="$(printf '%s' "$PR_CREATE_OUT" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("web_url",""))' 2>/dev/null || printf '%s' "$PR_CREATE_OUT" | rg -o "$PR_PATTERN" -m 1 || true)"
          ;;
      esac
      printf '%s\n' "$PR_CREATE_OUT" > /tmp/pr-url.txt
      if [ -z "$PR_URL" ]; then
        echo "create-pr: regex did not match gh pr create output; trying gh pr view" >&2
        PR_URL="$(gh pr view "$BRANCH" --json url --jq '.url' 2>/dev/null || true)"
      fi
      if [ -z "$PR_URL" ]; then
        echo "create-pr: PR creation failed or returned no URL (non-fatal)" >&2
        printf '%s\n' "$PR_CREATE_OUT" >&2
        PR_URL="none"
      fi
      jq -nc --arg pr_url "$PR_URL" --arg branch "$BRANCH" '{pr_url: $pr_url, branch: $branch}'

  - id: sync-linear-issues-post-push
    env:
      CTO_REFINE_TASKS_OUT: $refine-tasks.stdout
      CTO_CREATE_PR_OUT: $create-pr.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "sync-linear-issues-post-push" "${audio_debug}"
      EXP=""
      EXP_SOURCE=""
      for candidate in \
        "$root/.intake/tmp/fanout-docs-expanded-tasks.json" \
        "$root/.intake/tmp/fanout-prompts-expanded-tasks.json" \
        "$root/.intake/tmp/generate-scale-expanded-tasks.json" \
        "$root/.tasks/tasks/tasks.json" \
        "$root/.intake/tmp/refine-tasks-input.json" \
        "$root/.intake/initial-tasks.json"
      do
        if [ -s "$candidate" ] && jq -e 'type=="array" and length>0' "$candidate" >/dev/null 2>&1; then
          EXP="$(jq -c '.' "$candidate")"
          EXP_SOURCE="$candidate"
          break
        fi
      done
      if [ -z "$EXP" ]; then
        EXP=$(printf '%s' "$CTO_REFINE_TASKS_OUT" | jq -cs 'map(select(type!="null")) | (.[-1] // []) | if type=="object" then (.output[0].expanded_tasks // .expanded_tasks // .tasks // []) elif type=="array" then . else [] end' 2>/dev/null || echo "[]")
        if ! printf '%s' "$EXP" | jq -e 'type=="array" and length>0' >/dev/null 2>&1; then
          EXP="[]"
        fi
      else
        echo "sync-linear-issues-post-push: using expanded tasks from $EXP_SOURCE" >&2
      fi
      BRANCH="$(printf '%s' "$CTO_CREATE_PR_OUT" | jq -r '.branch // empty' 2>/dev/null || true)"
      PR_URL="$(printf '%s' "$CTO_CREATE_PR_OUT" | jq -r '.pr_url // empty' 2>/dev/null || true)"
      REPO_WEB="$(printf '%s' "${repository_url}" | sed -E 's#\.git$##')"
      BASE_URL="${REPO_WEB}"
      if [ -n "$BRANCH" ]; then
        BASE_URL="${REPO_WEB}/blob/${BRANCH}"
      fi
      AGENT_MAP_VAL='${linear_agent_map}'
      AGENT_MAP_LEN="$(printf '%s' "$AGENT_MAP_VAL" | wc -c | tr -d ' ')"
      echo "sync-linear-issues-post-push: agent-map length=${AGENT_MAP_LEN} preview=$(printf '%s' "$AGENT_MAP_VAL" | head -c 120)" >&2
      TASK_COUNT="$(printf '%s' "$EXP" | jq 'length' 2>/dev/null || echo '?')"
      echo "sync-linear-issues-post-push: syncing ${TASK_COUNT} tasks to project=${linear_project_id}" >&2
      SYNC_ERR_LOG="$(mktemp)"
      PM_URL_ARG=""
      if [ -n "${pm_url}" ]; then
        PM_URL_ARG="--pm-url ${pm_url}"
        echo "sync-linear-issues-post-push: using PM server at ${pm_url} for per-agent tokens" >&2
      fi
      SYNC_OUT="$(printf '%s' "$EXP" | intake-util sync-linear issues \
        --project-id "${linear_project_id}" \
        --prd-issue-id "${linear_prd_issue_id}" \
        --team-id "${linear_team_id}" \
        --base-url "$BASE_URL" \
        --pr-url "$PR_URL" \
        --agent-map "$AGENT_MAP_VAL" \
        $PM_URL_ARG 2>"$SYNC_ERR_LOG")" || {
        echo "sync-linear-issues-post-push: Linear sync failed (non-fatal)" >&2
        cat "$SYNC_ERR_LOG" >&2
        rm -f "$SYNC_ERR_LOG"
        printf '{"issueCount":0,"skipped":true}\n'
        exit 0
      }
      if [ -s "$SYNC_ERR_LOG" ]; then
        echo "sync-linear-issues-post-push: stderr from intake-util:" >&2
        cat "$SYNC_ERR_LOG" >&2
      fi
      rm -f "$SYNC_ERR_LOG"
      ISSUE_COUNT="$(printf '%s' "$SYNC_OUT" | jq -r '.issueCount // 0' 2>/dev/null || echo 0)"
      if ! printf '%s' "$ISSUE_COUNT" | jq -e 'type=="number" and . > 0' >/dev/null 2>&1; then
        echo "sync-linear-issues-post-push: issueCount=$ISSUE_COUNT (non-fatal warning)" >&2
      fi
      UNRESOLVED_COUNT="$(printf '%s' "$SYNC_OUT" | jq -r '(.unresolvedAgents // []) | length' 2>/dev/null || echo 0)"
      if [ "$UNRESOLVED_COUNT" != "0" ]; then
        echo "sync-linear-issues-post-push: unresolved agents for assignment: $(printf '%s' "$SYNC_OUT" | jq -c '.unresolvedAgents // []')" >&2
        if [ "${INTAKE_STRICT_ASSIGNMENTS:-false}" = "true" ] || [ "${INTAKE_STRICT_ASSIGNMENTS:-false}" = "1" ]; then
          echo "sync-linear-issues-post-push: FATAL — strict assignment mode enabled with unresolved agents" >&2
          exit 1
        fi
      fi
      printf '%s\n' "$SYNC_OUT"

  - id: verify-delivery-gates
    env:
      CTO_SYNC_LINEAR_ISSUES_OUT: $sync-linear-issues-post-push.stdout
      CTO_CREATE_PR_OUT: $create-pr.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "verify-delivery-gates" "${audio_debug}"
      ISSUE_COUNT="$(printf '%s' "$CTO_SYNC_LINEAR_ISSUES_OUT" | jq -r '.issueCount // 0' 2>/dev/null || echo 0)"
      UNASSIGNED_ISSUE_COUNT="$(printf '%s' "$CTO_SYNC_LINEAR_ISSUES_OUT" | jq -r '.unassignedIssueCount // 0' 2>/dev/null || echo 0)"
      UNRESOLVED_AGENTS="$(printf '%s' "$CTO_SYNC_LINEAR_ISSUES_OUT" | jq -c '.unresolvedAgents // []' 2>/dev/null || echo '[]')"
      PR_URL="$(printf '%s' "$CTO_CREATE_PR_OUT" | jq -r '.pr_url // empty' 2>/dev/null || true)"
      if [ -z "$PR_URL" ]; then
        PR_URL="$(printf '%s' "$CTO_CREATE_PR_OUT" | rg -o 'https://github\\.com/[^[:space:]]+/pull/[0-9]+' -m 1 || true)"
      fi
      if ! printf '%s' "$ISSUE_COUNT" | jq -e 'type=="number" and . > 0' >/dev/null 2>&1; then
        echo "verify-delivery-gates: Linear issues gate skipped (issueCount=$ISSUE_COUNT)" >&2
      fi

      # Agent assignment gate — fail if issues went unassigned
      if [ "$UNASSIGNED_ISSUE_COUNT" != "0" ]; then
        echo "verify-delivery-gates: GATE FAILED — $UNASSIGNED_ISSUE_COUNT of $ISSUE_COUNT Linear issues were left unassigned" >&2
        echo "verify-delivery-gates: unresolved agents: $UNRESOLVED_AGENTS" >&2

        if [ "${INTAKE_ASSIGNMENT_GATE_SKIP:-false}" = "true" ] || [ "${INTAKE_ASSIGNMENT_GATE_SKIP:-false}" = "1" ]; then
          echo "verify-delivery-gates: bypassed via INTAKE_ASSIGNMENT_GATE_SKIP — continuing with unassigned issues" >&2
        else
          ASSIGNED_COUNT=$((ISSUE_COUNT - UNASSIGNED_ISSUE_COUNT))
          echo "verify-delivery-gates: $ASSIGNED_COUNT/$ISSUE_COUNT issues assigned, $UNASSIGNED_ISSUE_COUNT unassigned" >&2
          echo "verify-delivery-gates: set INTAKE_ASSIGNMENT_GATE_SKIP=true to bypass this gate" >&2
          "$root/intake/scripts/workflow-gate-audio.sh" "intake" "agent-assignment" "failed — ${UNASSIGNED_ISSUE_COUNT} issues unassigned" "${audio_debug}" "alert" "project ${project_name}" || true
          exit 1
        fi
      else
        echo "verify-delivery-gates: agent assignment gate PASSED — all $ISSUE_COUNT issues assigned" >&2
      fi

      if [ -z "$PR_URL" ]; then
        echo "verify-delivery-gates: PR gate skipped (no PR URL — may need manual creation)" >&2
        PR_URL="none"
      fi
      "$root/intake/scripts/workflow-gate-audio.sh" "intake" "delivery" "passed with ${ISSUE_COUNT} Linear issues and PR ${PR_URL}" "${audio_debug}" "normal" "project ${project_name}"
      jq -nc --arg pr_url "$PR_URL" --argjson issue_count "$ISSUE_COUNT" --argjson unassigned_issue_count "$UNASSIGNED_ISSUE_COUNT" --argjson unresolved_agents "$UNRESOLVED_AGENTS" '{pr_url: $pr_url, issue_count: $issue_count, unassigned_issue_count: $unassigned_issue_count, unresolved_agents: $unresolved_agents}'

  - id: linear-activity-pr-created
    env:
      CTO_CREATE_PR_OUT: $create-pr.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "linear-activity-pr-created" "${audio_debug}"
      PR_URL="$(printf '%s' "$CTO_CREATE_PR_OUT" | jq -r '.pr_url // empty' 2>/dev/null || true)"
      if [ -z "$PR_URL" ]; then
        PR_URL="$(printf '%s' "$CTO_CREATE_PR_OUT" | rg -o 'https://github\\.com/[^[:space:]]+/pull/[0-9]+' -m 1 || true)"
      fi
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type thought \
        --title "PR Created" \
        --body "Pull request opened: ${PR_URL}" >/dev/null || true

  - id: session-url-pr
    env:
      CTO_CREATE_PR_OUT: $create-pr.stdout
    command: |
      root="${WORKSPACE:-.}"
      PR_URL="$(printf '%s' "$CTO_CREATE_PR_OUT" | jq -r '.pr_url // empty' 2>/dev/null || true)"
      if [ -n "${linear_session_id}" ] && [ -n "$PR_URL" ] && [ "$PR_URL" != "none" ]; then
        intake-util linear-session update-urls \
          --session-id "${linear_session_id}" \
          --add-url "Pull Request=${PR_URL}" || true
      fi

  - id: write-handoff-summary
    env:
      CTO_VERIFY_ARTIFACT_GATES_OUT: $verify-artifact-gates.stdout
      CTO_VERIFY_DELIVERY_GATES_OUT: $verify-delivery-gates.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "write-handoff-summary" "${audio_debug}"
      mkdir -p "$root/.intake" "$root/.intake/tmp"
      HANDOFF_ART="$root/.intake/tmp/handoff-artifact-gates.json"
      HANDOFF_DEL="$root/.intake/tmp/handoff-delivery-gates.json"
      if ! printf '%s' "$CTO_VERIFY_ARTIFACT_GATES_OUT" | jq -c '.' > "$HANDOFF_ART" 2>/dev/null; then
        printf '%s' '{}' > "$HANDOFF_ART"
      fi
      if ! printf '%s' "$CTO_VERIFY_DELIVERY_GATES_OUT" | jq -c '.' > "$HANDOFF_DEL" 2>/dev/null; then
        printf '%s' '{}' > "$HANDOFF_DEL"
      fi
      jq -nc \
        --arg project_name "${project_name}" \
        --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --arg decision_record_path ".tasks/docs/design-brief.md" \
        --arg tasks_path ".tasks/tasks/tasks.json" \
        --arg docs_path ".tasks/docs" \
        --arg prompts_path ".tasks/docs" \
        --arg workflows_path ".tasks/docs" \
        --slurpfile artifacts "$HANDOFF_ART" \
        --slurpfile delivery "$HANDOFF_DEL" \
        '{
          project_name: $project_name,
          generated_at: $generated_at,
          decision_record_path: $decision_record_path,
          tasks_path: $tasks_path,
          docs_path: $docs_path,
          prompts_path: $prompts_path,
          workflows_path: $workflows_path,
          artifact_counts: {
            task_count: ($artifacts[0].task_count // 0),
            subtask_count: ($artifacts[0].subtask_count // 0),
            decision_point_count: ($artifacts[0].decision_point_count // 0),
            doc_count: ($artifacts[0].doc_count // 0),
            prompt_count: ($artifacts[0].prompt_count // 0),
            workflow_count: ($artifacts[0].workflow_count // 0)
          },
          delivery: {
            issue_count: ($delivery[0].issue_count // 0),
            pr_url: ($delivery[0].pr_url // "")
          }
        }' > "$root/.intake/intake-summary.json"
      cat "$root/.intake/intake-summary.json"

  - id: deregister-run
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "intake" "deregister-run" "${audio_debug}"
      intake-util deregister-run \
        --run-id "${run_id}" \
        --status completed || echo "deregister-run: skipped (non-fatal)" >&2
