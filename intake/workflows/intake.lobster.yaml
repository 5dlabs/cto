name: intake
description: "PRD intake pipeline with voting committee"
inputs:
  - name: prd_content
    type: string
  - name: prd_path
    type: string
  - name: num_tasks
    type: number
    default: 10
  - name: project_name
    type: string
    default: "project"

steps:
  - name: parse-prd
    command: >
      openclaw.invoke --tool llm-task --action json --args-json '{
        "prompt": "{{prompts/parse-prd-system.md}}\n\n{{prompts/parse-prd-user.md}}",
        "input": {
          "prd_content": "{{inputs.prd_content}}",
          "num_tasks": {{inputs.num_tasks}},
          "next_id": 1
        },
        "schema": "{{schemas/generated-task.schema.json}}",
        "provider": "anthropic",
        "model": "claude-sonnet-4-20250514"
      }'

  - name: analyze-complexity
    command: >
      openclaw.invoke --tool llm-task --action json --args-json '{
        "prompt": "{{prompts/analyze-complexity-system.md}}",
        "input": { "tasks": ${{ steps.parse-prd.output }} },
        "schema": "{{schemas/complexity-analysis.schema.json}}",
        "provider": "anthropic",
        "model": "claude-sonnet-4-20250514"
      }'

  - name: review-tasks
    approval:
      message: "Review generated tasks and complexity analysis before expanding"
      show:
        - tasks: ${{ steps.parse-prd.output }}
        - complexity: ${{ steps.analyze-complexity.output }}

  - name: expand-tasks
    command: >
      openclaw.invoke --tool llm-task --action json --args-json '{
        "prompt": "{{prompts/expand-task-system.md}}",
        "input": {
          "tasks": ${{ steps.parse-prd.output }},
          "complexity": ${{ steps.analyze-complexity.output }}
        },
        "schema": "{{schemas/generated-task.schema.json}}",
        "provider": "anthropic",
        "model": "claude-sonnet-4-20250514"
      }'

  - name: vote-on-quality
    workflow: voting.lobster.yaml
    inputs:
      content_to_evaluate: ${{ steps.expand-tasks.output }}
      evaluation_criteria: "task decomposition quality, dependency ordering, decision point coverage"

  - name: generate-docs
    command: >
      echo '${{ steps.expand-tasks.output }}' | intake-util generate-docs --base-path .tasks/docs

  - name: generate-prompts
    command: >
      echo '${{ steps.expand-tasks.output }}' | intake-util generate-prompts --output-dir .tasks/docs --project-name {{inputs.project_name}}

  - name: commit-outputs
    description: "Stage all generated task files for PR"
    depends_on: [generate-prompts, generate-docs]
    command: >
      git config user.email "morgan@5dlabs.io" &&
      git config user.name "Morgan (Intake Agent)" &&
      git checkout -b intake/{{inputs.project_name}}-$(date +%Y%m%d-%H%M%S) &&
      git add .tasks/ &&
      git diff --staged --stat &&
      git commit -m "feat(intake): generated tasks for {{inputs.project_name}}

      Generated by Morgan intake pipeline.
      - design-brief.md: resolved decisions and architecture overview
      - tasks/: expanded task breakdown with subtask prompts
      - docs/: task documentation

      Session: {{inputs.session_id | default('unknown')}}"

  - name: create-pr
    description: "Open GitHub PR with generated tasks, design brief, and subtask docs"
    depends_on: [commit-outputs]
    command: >
      BRANCH=$(git rev-parse --abbrev-ref HEAD) &&
      git push origin "$BRANCH" &&
      gh pr create \
        --title "feat(intake): {{inputs.project_name}} task breakdown" \
        --body "## Intake Pipeline Output

      This PR was generated automatically by the Morgan intake pipeline.

      ### What's included
      - \`.tasks/docs/design-brief.md\` — Architecture decisions from Optimist vs Pessimist deliberation
      - \`.tasks/docs/\` — Expanded task descriptions with implementation guidance
      - Task prompts for each sub-agent

      ### Process
      1. PRD analyzed and tasks parsed
      2. Complexity analyzed
      3. Tasks expanded with full implementation context
      4. 5-model committee voted on quality

      _Review and merge to kick off implementation._" \
        --base main \
        --label "intake" 2>&1 | tee /tmp/pr-url.txt &&
      cat /tmp/pr-url.txt
