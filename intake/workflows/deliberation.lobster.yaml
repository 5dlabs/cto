name: deliberation

args:
  audio_debug:
    default: "true"
  prd_content:
    default: ''
  timebox_minutes:
    default: 30
  session_id:
    default: ''
  infrastructure_context_file:
    default: '.intake/contexts/infrastructure.txt'
  codebase_context_file:
    default: '.intake/contexts/codebase.txt'
  design_context_file:
    default: '.intake/contexts/design.txt'
  parsed_tasks:
    default: ''
  decision_points_json:
    default: '[]'
  human_review_mode:
    default: human_required
  verify:
    default: 'true'
  breakpoints:
    default: 'false'
  linear_session_id:
    default: ''
  model_frontier_provider:
    default: gemini
  model_frontier:
    default: claude-opus-4-6
  voter_1_provider:
    default: gemini
  voter_1_model:
    default: claude-opus-4-6
  voter_2_provider:
    default: openai
  voter_2_model:
    default: gpt-5.2-pro
  voter_3_provider:
    default: gemini
  voter_3_model:
    default: gemini-2.5-flash

steps:
  - id: research-prd
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "research-prd" "${audio_debug}"
      PRD_FILE="$root/.intake/run-prd.txt"
      [ -f "$PRD_FILE" ] || { echo "deliberation: missing $PRD_FILE — run pipeline materialize-prd first" >&2; exit 1; }
      INTAKE_AGENT_BIN="${INTAKE_AGENT_BIN:-}"
      if [ -z "$INTAKE_AGENT_BIN" ]; then
        if command -v intake-agent >/dev/null 2>&1; then
          INTAKE_AGENT_BIN="intake-agent"
        elif [ -x "$root/apps/intake-agent/dist/intake-agent" ]; then
          INTAKE_AGENT_BIN="$root/apps/intake-agent/dist/intake-agent"
        elif [ -x "$root/apps/intake-agent/intake-agent" ]; then
          INTAKE_AGENT_BIN="$root/apps/intake-agent/intake-agent"
        fi
      fi
      if [ -z "$INTAKE_AGENT_BIN" ]; then
        "$root/intake/scripts/workflow-gate-audio.sh" "deliberation" "research-prd" "failed: intake-agent missing" "${audio_debug}" "error" "session ${session_id}"
        echo "deliberation research-prd: intake-agent binary not found. Set INTAKE_AGENT_BIN or build apps/intake-agent." >&2
        exit 1
      fi
      DP_JSON="$(cat "$root/.intake/decision-points.json" 2>/dev/null || echo '[]')"
      DP_SUMMARY=""
      if [ -n "$DP_JSON" ] && [ "$DP_JSON" != "[]" ]; then
        DP_SUMMARY=$(printf '%s' "$DP_JSON" | jq -r '
          [.[] | "[" + .id + "] " + .category + ": " + .description +
           " (affects tasks " + ([.affected_tasks[] | tostring] | join(", ")) + ")"
          ] | join("\n")' 2>/dev/null || true)
      fi
      CB_FILE="$root/.intake/contexts/codebase.txt"
      DC_FILE="$root/.intake/contexts/design.txt"
      jq -n \
        --rawfile prd_content "$PRD_FILE" \
        --rawfile codebase_context "$CB_FILE" \
        --rawfile design_context "$DC_FILE" \
        --arg decision_points "$DP_SUMMARY" \
        '{
          "operation": "prd_research",
          "payload": {
            "prd_content": (
              (if $codebase_context != "" then ($prd_content + "\n\n## Existing Codebase Context\n" + $codebase_context) else $prd_content end)
              + (if $design_context != "" then "\n\n## Design Context\n" + $design_context else "" end)
              + (if $decision_points != "" then "\n\n## Decision Points to Research\nThe following strategic decision points need evidence:\n" + $decision_points else "" end)
            )
          }
        }' | "$INTAKE_AGENT_BIN"

  - id: linear-plan-research
    command: |
      root="${WORKSPACE:-.}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ] && LINEAR_SID="$(cat "$FALLBACK_FILE")"
      [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ] && LINEAR_SID="${linear_session_id}"
      if [ -n "$LINEAR_SID" ]; then
        intake-util linear-plan --session-id "$LINEAR_SID" --step delib-research || true
      fi

  - id: save-research-artifact
    env:
      CTO_RESEARCH_PRD: $research-prd.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "save-research-artifact" "${audio_debug}"
      mkdir -p .tasks/docs
      if printf '%s' "$CTO_RESEARCH_PRD" | jq . >/dev/null 2>&1; then
        printf '%s' "$CTO_RESEARCH_PRD" | jq . > .tasks/docs/research-prd.json
      else
        printf '%s\n' "$CTO_RESEARCH_PRD" > .tasks/docs/research-prd.txt
      fi
      if [ -f .tasks/docs/research-prd.json ]; then
        echo "Research bundle saved to .tasks/docs/research-prd.json"
      else
        echo "Research bundle saved to .tasks/docs/research-prd.txt"
      fi

  - id: init-debate
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "init-debate" "${audio_debug}"
      DP_FILE="$root/.intake/decision-points.json"
      DP_COUNT=$(jq 'if type=="array" then length else 0 end' "$DP_FILE" 2>/dev/null || echo 0)
      jq -n --arg session_id "${session_id}" --arg start "$(date +%s)" --argjson dp_count "$DP_COUNT" \
        '{session_id: $session_id, start_epoch: ($start | tonumber), dp_count: $dp_count}'

  - id: linear-activity-delib-start
    command: |
      root="${WORKSPACE:-.}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ] && LINEAR_SID="$(cat "$FALLBACK_FILE")"
      [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ] && LINEAR_SID="${linear_session_id}"
      DP_FILE="$root/.intake/decision-points.json"
      DP_COUNT=$(jq 'if type=="array" then length else 0 end' "$DP_FILE" 2>/dev/null || echo 0)
      if [ -n "$LINEAR_SID" ]; then
        BODY="$(printf '## 🧠 Deliberation Started\n\n**Session:** `%s`\n**Decision points:** %s\n\n**The committee is assembling:**\n⚡ **Optimist** — advocates modern, scalable approaches\n🛡️ **Pessimist** — anchors to proven, operational simplicity\n🏛️ **Architect** — evaluates structural integrity\n⚖️ **Pragmatist** — weighs practical trade-offs\n✂️ **Minimalist** — cuts to essential complexity\n\n---\n\n*Debate is beginning...*' \
          "${session_id}" "$DP_COUNT")"
        intake-util linear-activity \
          --session-id "$LINEAR_SID" \
          --type thought \
          --body "$BODY" >/dev/null || true
      fi

  - id: notify-start
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "notify-start" "${audio_debug}"
      DP_FILE="$root/.intake/decision-points.json"
      DP_COUNT=$(jq 'if type=="array" then length else 0 end' "$DP_FILE" 2>/dev/null || echo 0)
      echo "🧠 **Deliberation started** — session ${session_id} — ${DP_COUNT} decision points to resolve" | intake-util bridge-notify --from intake --to deliberation \
        --metadata '{"step":"deliberation-start","session_id":"'${session_id}'","dp_count":'$DP_COUNT'}' || true

  - id: linear-plan-optimist
    command: |
      root="${WORKSPACE:-.}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ] && LINEAR_SID="$(cat "$FALLBACK_FILE")"
      [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ] && LINEAR_SID="${linear_session_id}"
      if [ -n "$LINEAR_SID" ]; then
        intake-util linear-plan --session-id "$LINEAR_SID" --step delib-optimist || true
      fi

  - id: optimist-turn
    env:
      CTO_RESEARCH_PRD: $research-prd.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "optimist-turn" "${audio_debug}"
      RESEARCH_OPT=$(printf '%s' "$CTO_RESEARCH_PRD" | jq -r '.data.optimist // .optimist // empty');
      PARSED_TASKS_JSON="$(cat "$root/.intake/initial-tasks.json" 2>/dev/null || echo '[]')"
      PARSED_TASKS_CTX=""
      if [ -n "$PARSED_TASKS_JSON" ] && [ "$PARSED_TASKS_JSON" != "null" ] && [ "$PARSED_TASKS_JSON" != "" ]; then
        PARSED_TASKS_CTX=$(printf '%s' "$PARSED_TASKS_JSON" | jq -r '
          "## Initial Task Decomposition (" + (length | tostring) + " tasks)\n\n" +
          ([.[] |
            "### Task " + (.id | tostring) + ": " + .title + "\n" +
            "- Agent: " + .agent + " | Stack: " + .stack + "\n" +
            "- " + .description
          ] | join("\n"))' 2>/dev/null || true)
      fi
      DP_CTX=""
      DP_JSON="$(cat "$root/.intake/decision-points.json" 2>/dev/null || echo '[]')"
      if [ -n "$DP_JSON" ] && [ "$DP_JSON" != "[]" ]; then
        DP_CTX=$(printf '%s' "$DP_JSON" | jq -r '
          "## Decision Points (" + (length | tostring) + " to resolve)\n\n" +
          ([.[] |
            "### [" + .id + "] " + .category + "\n" +
            "**Question:** " + .description + "\n" +
            "**Options:** " + (.options | join(" vs ")) + "\n" +
            "**Affects tasks:** " + ([.affected_tasks[] | tostring] | join(", ")) + "\n" +
            "**Constraint:** " + .constraint_type + "\n" +
            "**Rationale:** " + .rationale
          ] | join("\n\n"))' 2>/dev/null || true)
      fi
      OPT_ARGS=$(jq -n \
        --rawfile prompt "$root/intake/prompts/debate-optimist-soul.md" \
        --rawfile prd "$root/.intake/run-prd.txt" \
        --arg research "$RESEARCH_OPT" \
        --arg parsed_tasks "$PARSED_TASKS_CTX" \
        --arg decision_points "$DP_CTX" \
        --rawfile infrastructure_context "$root/.intake/contexts/infrastructure.txt" \
        --rawfile codebase_context "$root/.intake/contexts/codebase.txt" \
        --rawfile design_context "$root/.intake/contexts/design.txt" \
        --arg instruction "Present your position on ALL decision points. Address each one with specific evidence." \
        --arg provider "${model_frontier_provider}" \
        --arg model "${model_frontier}" \
        '{
          "prompt": $prompt,
          "input": {
            "prd": $prd,
            "parsed_tasks": $parsed_tasks,
            "decision_points": $decision_points,
            "research": $research,
            "infrastructure_context": $infrastructure_context,
            "codebase_context": $codebase_context,
            "design_context": $design_context,
            "debate_log": [],
            "resolved_decisions": [],
            "instruction": $instruction
          },
          "provider": $provider,
          "model": $model
        }')
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action text --args-json "$OPT_ARGS"

  - id: notify-opt
    env:
      CTO_OT: $optimist-turn.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "notify-opt" "${audio_debug}"
      printf '%s' "$CTO_OT" | intake-util bridge-notify --from optimist --to deliberation \
        --metadata '{"speaker":"optimist","session_id":"'${session_id}'"}' || true
      LV_BIN=""; command -v lobster-voice >/dev/null 2>&1 && LV_BIN="lobster-voice" || { [ -x "$root/apps/lobster-voice/lobster-voice" ] && LV_BIN="$root/apps/lobster-voice/lobster-voice"; }
      [ -n "$LV_BIN" ] && WORKSPACE="$root" "$LV_BIN" debate optimist "$(printf '%s' "$CTO_OT")" || true

  - id: linear-activity-opt
    env:
      CTO_OT: $optimist-turn.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "linear-activity-opt" "${audio_debug}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      if [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ]; then
        LINEAR_SID="$(cat "$FALLBACK_FILE")"
        echo "linear-activity-opt: session ID from file='$LINEAR_SID'" >&2
      fi
      if [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ]; then
        LINEAR_SID="${linear_session_id}"
        echo "linear-activity-opt: session ID from arg='$LINEAR_SID'" >&2
      fi
      if [ -n "$LINEAR_SID" ]; then
        intake-util linear-activity \
          --session-id "$LINEAR_SID" \
          --type thought \
          --body "$(printf '## ⚡ Optimist\n\n> *Pushing the frontier — modern, scalable, evidence-driven.*\n\n---\n\n%s' "$CTO_OT")" >/dev/null || true
      else
        echo "linear-activity-opt: NO session ID — skipping" >&2
      fi

  - id: parse-dp-opt
    env:
      CTO_OT: $optimist-turn.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "parse-dp-opt" "${audio_debug}"
      jq -n --arg content "$(printf '%s' "$CTO_OT")" --arg speaker optimist \
        '{content: $content, speaker: $speaker}' |
      intake-util parse-decision-points

  - id: linear-plan-pessimist
    command: |
      root="${WORKSPACE:-.}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ] && LINEAR_SID="$(cat "$FALLBACK_FILE")"
      [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ] && LINEAR_SID="${linear_session_id}"
      if [ -n "$LINEAR_SID" ]; then
        intake-util linear-plan --session-id "$LINEAR_SID" --step delib-pessimist || true
      fi

  - id: pessimist-turn
    env:
      CTO_RESEARCH_PRD: $research-prd.stdout
      CTO_OT: $optimist-turn.stdout
    command: |
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "pessimist-turn" "${audio_debug}"
      RESEARCH_PES=$(printf '%s' "$CTO_RESEARCH_PRD" | jq -r '.data.pessimist // .pessimist // empty');
      DEBATE_LOG=$(jq -n --arg c "$(printf '%s' "$CTO_OT")" '[{turn: 1, speaker: "optimist", content: $c}]');
      PARSED_TASKS_JSON="$(cat "$root/.intake/initial-tasks.json" 2>/dev/null || echo '[]')"
      PARSED_TASKS_CTX=""
      if [ -n "$PARSED_TASKS_JSON" ] && [ "$PARSED_TASKS_JSON" != "null" ] && [ "$PARSED_TASKS_JSON" != "" ]; then
        PARSED_TASKS_CTX=$(printf '%s' "$PARSED_TASKS_JSON" | jq -r '
          "## Initial Task Decomposition (" + (length | tostring) + " tasks)\n\n" +
          ([.[] |
            "### Task " + (.id | tostring) + ": " + .title + "\n" +
            "- Agent: " + .agent + " | Stack: " + .stack + "\n" +
            "- " + .description
          ] | join("\n"))' 2>/dev/null || true)
      fi
      DP_CTX=""
      DP_JSON="$(cat "$root/.intake/decision-points.json" 2>/dev/null || echo '[]')"
      if [ -n "$DP_JSON" ] && [ "$DP_JSON" != "[]" ]; then
        DP_CTX=$(printf '%s' "$DP_JSON" | jq -r '
          "## Decision Points (" + (length | tostring) + " to resolve)\n\n" +
          ([.[] |
            "### [" + .id + "] " + .category + "\n" +
            "**Question:** " + .description + "\n" +
            "**Options:** " + (.options | join(" vs ")) + "\n" +
            "**Affects tasks:** " + ([.affected_tasks[] | tostring] | join(", ")) + "\n" +
            "**Constraint:** " + .constraint_type + "\n" +
            "**Rationale:** " + .rationale
          ] | join("\n\n"))' 2>/dev/null || true)
      fi
      PES_ARGS=$(jq -n \
        --rawfile prompt "$root/intake/prompts/debate-pessimist-soul.md" \
        --rawfile prd "$root/.intake/run-prd.txt" \
        --arg research "$RESEARCH_PES" \
        --arg parsed_tasks "$PARSED_TASKS_CTX" \
        --arg decision_points "$DP_CTX" \
        --rawfile infrastructure_context "$root/.intake/contexts/infrastructure.txt" \
        --rawfile codebase_context "$root/.intake/contexts/codebase.txt" \
        --rawfile design_context "$root/.intake/contexts/design.txt" \
        --argjson debate_log "$DEBATE_LOG" \
        --arg instruction "Respond to the Optimist on ALL decision points. Challenge weak points, propose simpler alternatives." \
        --arg provider "${model_frontier_provider}" \
        --arg model "${model_frontier}" \
        '{
          "prompt": $prompt,
          "input": {
            "prd": $prd,
            "parsed_tasks": $parsed_tasks,
            "decision_points": $decision_points,
            "research": $research,
            "infrastructure_context": $infrastructure_context,
            "codebase_context": $codebase_context,
            "design_context": $design_context,
            "debate_log": $debate_log,
            "resolved_decisions": [],
            "instruction": $instruction
          },
          "provider": $provider,
          "model": $model
        }')
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action text --args-json "$PES_ARGS"

  - id: notify-pes
    env:
      CTO_PT: $pessimist-turn.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "notify-pes" "${audio_debug}"
      printf '%s' "$CTO_PT" | intake-util bridge-notify --from pessimist --to deliberation \
        --metadata '{"speaker":"pessimist","session_id":"'${session_id}'"}' || true
      LV_BIN=""; command -v lobster-voice >/dev/null 2>&1 && LV_BIN="lobster-voice" || { [ -x "$root/apps/lobster-voice/lobster-voice" ] && LV_BIN="$root/apps/lobster-voice/lobster-voice"; }
      [ -n "$LV_BIN" ] && WORKSPACE="$root" "$LV_BIN" debate pessimist "$(printf '%s' "$CTO_PT")" || true

  - id: linear-activity-pes
    env:
      CTO_PT: $pessimist-turn.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "linear-activity-pes" "${audio_debug}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      if [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ]; then
        LINEAR_SID="$(cat "$FALLBACK_FILE")"
        echo "linear-activity-pes: session ID from file='$LINEAR_SID'" >&2
      fi
      if [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ]; then
        LINEAR_SID="${linear_session_id}"
        echo "linear-activity-pes: session ID from arg='$LINEAR_SID'" >&2
      fi
      if [ -n "$LINEAR_SID" ]; then
        intake-util linear-activity \
          --session-id "$LINEAR_SID" \
          --type thought \
          --body "$(printf '## 🛡️ Pessimist\n\n> *Anchoring to proven ground — operational simplicity, named failure modes.*\n\n---\n\n%s' "$CTO_PT")" >/dev/null || true
      else
        echo "linear-activity-pes: NO session ID — skipping" >&2
      fi

  - id: parse-dp-pes
    env:
      CTO_PT: $pessimist-turn.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "parse-dp-pes" "${audio_debug}"
      jq -n --arg content "$(printf '%s' "$CTO_PT")" --arg speaker pessimist \
        '{content: $content, speaker: $speaker}' |
      intake-util parse-decision-points

  - id: resolve-dps
    env:
      CTO_PARSE_OPT: $parse-dp-opt.stdout
      CTO_PARSE_PES: $parse-dp-pes.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "resolve-dps" "${audio_debug}"
      jq -n \
        --arg opt_raw "$(printf '%s' "$CTO_PARSE_OPT")" \
        --arg pes_raw "$(printf '%s' "$CTO_PARSE_PES")" \
        '
        (try ($opt_raw | fromjson) catch []) as $opt |
        (try ($pes_raw | fromjson) catch []) as $pes |
        {
          all_dps: ($opt + $pes),
          votable: [
            $opt[] as $o |
            ($pes[] | select(.id == $o.id)) as $p |
            {id: $o.id, question: $o.question, category: $o.category,
             optimist_position: $o.proposing_option, pessimist_position: $p.proposing_option}
          ],
          pending: [($opt + $pes) | group_by(.id)[] | select(length == 1) | .[0]]
        }'

  - id: linear-plan-vote
    command: |
      root="${WORKSPACE:-.}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ] && LINEAR_SID="$(cat "$FALLBACK_FILE")"
      [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ] && LINEAR_SID="${linear_session_id}"
      if [ -n "$LINEAR_SID" ]; then
        intake-util linear-plan --session-id "$LINEAR_SID" --step delib-vote || true
      fi

  - id: vote-all-dps
    env:
      CTO_RESOLVE_DPS: $resolve-dps.stdout
    command: |-
      root="${WORKSPACE:-.}"
      WS="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "vote-all-dps" "${audio_debug}"
      VOTABLE_JSON=$(printf '%s' "$CTO_RESOLVE_DPS" | jq -c '.votable // []')
      DP_COUNT=$(printf '%s' "$VOTABLE_JSON" | jq 'length')
      if [ "$DP_COUNT" -eq 0 ]; then
        "$root/intake/scripts/workflow-gate-audio.sh" "deliberation" "vote-all-dps" "no paired decision points to vote on" "${audio_debug}" "wait" "session ${session_id}"
        echo "vote-all-dps: no votable DPs found — debaters did not produce matching DECISION_POINT blocks" >&2
        printf '[]'
        exit 0
      fi
      "$root/intake/scripts/workflow-gate-audio.sh" "deliberation" "vote-all-dps" "voting on ${DP_COUNT} decision points" "${audio_debug}" "normal" "session ${session_id}"
      RESULTS="[]"
      FAILED=0
      DP_TMPDIR="$WS/.intake/tmp/vote-dps"
      mkdir -p "$DP_TMPDIR"
      for i in $(seq 0 $((DP_COUNT - 1))); do
        DP_ID=$(printf '%s' "$VOTABLE_JSON" | jq -r ".[$i].id")
        DP_CAT=$(printf '%s' "$VOTABLE_JSON" | jq -r ".[$i].category")
        IDX=$((i + 1))
        printf '%s' "$VOTABLE_JSON" | jq -r ".[$i].question" > "$DP_TMPDIR/question-${i}.txt"
        printf '%s' "$VOTABLE_JSON" | jq -r ".[$i].optimist_position" > "$DP_TMPDIR/optimist-${i}.txt"
        printf '%s' "$VOTABLE_JSON" | jq -r ".[$i].pessimist_position" > "$DP_TMPDIR/pessimist-${i}.txt"
        "$root/intake/scripts/workflow-gate-audio.sh" "deliberation" "vote-dp" "voting on decision ${IDX} of ${DP_COUNT}: ${DP_ID}" "${audio_debug}" "normal" "session ${session_id}"
        ARGS=$(jq -n \
          --rawfile question "$DP_TMPDIR/question-${i}.txt" \
          --rawfile optimist_position "$DP_TMPDIR/optimist-${i}.txt" \
          --rawfile pessimist_position "$DP_TMPDIR/pessimist-${i}.txt" \
          --arg context_file "$WS/.intake/run-prd.txt" \
          --arg question_file "$DP_TMPDIR/question-${i}.txt" \
          --arg optimist_file "$DP_TMPDIR/optimist-${i}.txt" \
          --arg pessimist_file "$DP_TMPDIR/pessimist-${i}.txt" \
          --arg decision_id "$DP_ID" \
          --arg session_id "${session_id}" \
          --arg human_review_mode "${human_review_mode}" \
          --arg voter_1_provider "${voter_1_provider}" \
          --arg voter_1_model "${voter_1_model}" \
          --arg voter_2_provider "${voter_2_provider}" \
          --arg voter_2_model "${voter_2_model}" \
          --arg voter_3_provider "${voter_3_provider}" \
          --arg voter_3_model "${voter_3_model}" \
          --arg audio_debug "${audio_debug}" \
          --arg linear_session_id "${linear_session_id}" \
          '{question: $question, optimist_position: $optimist_position, pessimist_position: $pessimist_position, context_file: $context_file, question_file: $question_file, optimist_file: $optimist_file, pessimist_file: $pessimist_file, decision_id: $decision_id, session_id: $session_id, human_review_mode: $human_review_mode, voter_1_provider: $voter_1_provider, voter_1_model: $voter_1_model, voter_2_provider: $voter_2_provider, voter_2_model: $voter_2_model, voter_3_provider: $voter_3_provider, voter_3_model: $voter_3_model, audio_debug: $audio_debug, linear_session_id: $linear_session_id}')
        VOTE_OK=false
        VOTE_OUT=""
        for ATTEMPT in 1 2 3 4 5; do
          VOTE_OUT="$(lobster run --mode tool "$WS/intake/workflows/decision-voting.lobster.yaml" --args-json "$ARGS" 2>&1)" && { VOTE_OK=true; break; }
          case "$VOTE_OUT" in
            *"HTTP Error 503"*|*"The read operation timed out"*|*"Service Unavailable"*|*"ECONNREFUSED"*|*"network"*)
              if [ "$ATTEMPT" -lt 5 ]; then
                BACKOFF=$((ATTEMPT * ATTEMPT * 5))
                "$WS/intake/scripts/workflow-gate-audio.sh" "deliberation" "vote-dp retry" "retrying vote for ${DP_ID} (attempt ${ATTEMPT}, waiting ${BACKOFF}s)" "${audio_debug}" "wait" "session ${session_id}"
                sleep "$BACKOFF"
                continue
              fi
              ;;
          esac
          break
        done
        if [ "$VOTE_OK" = true ]; then
          VOTE_RESULT=$(printf '%s' "$VOTE_OUT" | jq -c '.output[0].decision_result // empty' 2>/dev/null || echo '{}')
          RESULTS=$(printf '%s' "$RESULTS" | jq --argjson r "$VOTE_RESULT" '. + [$r]')
          WINNER=$(printf '%s' "$VOTE_RESULT" | jq -r '.winning_option // "none"' 2>/dev/null || echo "none")
          "$root/intake/scripts/workflow-gate-audio.sh" "deliberation" "vote-dp" "decision ${DP_ID} resolved: ${WINNER}" "${audio_debug}" "normal" "session ${session_id}"
        else
          FAILED=$((FAILED + 1))
          echo "vote-all-dps: voting failed for ${DP_ID} after 5 attempts — continuing" >&2
          FAIL_MSG="$(jq -n --arg did "$DP_ID" '"❌ **Decision voting failed** for `" + $did + "` — skipping."')"
          FAIL_META="$(jq -nc --arg step "decision-voting-failed" --arg sid "${session_id}" --arg did "$DP_ID" '{step:$step,session_id:$sid,decision_id:$did,severity:"error"}')"
          echo "$FAIL_MSG" | intake-util bridge-notify --from deliberation --to deliberation --metadata "$FAIL_META" || true
        fi
      done
      RESOLVED=$(printf '%s' "$RESULTS" | jq 'length')
      "$root/intake/scripts/workflow-gate-audio.sh" "deliberation" "vote-all-dps" "${RESOLVED} of ${DP_COUNT} decisions resolved, ${FAILED} failed" "${audio_debug}" "normal" "session ${session_id}"
      printf '%s' "$RESULTS"

  - id: assemble-result
    env:
      CTO_INIT_DEBATE: $init-debate.stdout
      CTO_VOTE_ALL: $vote-all-dps.stdout
      CTO_RESOLVE_DPS: $resolve-dps.stdout
      CTO_OT: $optimist-turn.stdout
      CTO_PT: $pessimist-turn.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "assemble-result" "${audio_debug}"
      ELAPSED=$(( ( $(date +%s) - $(printf '%s' "$CTO_INIT_DEBATE" | jq -r '.start_epoch') ) / 60 ))
      jq -n \
        --arg session_id "${session_id}" \
        --argjson timebox "${timebox_minutes}" \
        --argjson elapsed "$ELAPSED" \
        --arg all_dps_raw "$(printf '%s' "$CTO_RESOLVE_DPS")" \
        --arg votes_raw "$(printf '%s' "$CTO_VOTE_ALL")" \
        --arg o1 "$(printf '%s' "$CTO_OT")" \
        --arg p1 "$(printf '%s' "$CTO_PT")" \
        '
          (try ($all_dps_raw | fromjson) catch {all_dps: [], votable: []}) as $dps |
          (try ($votes_raw | fromjson) catch []) as $votes |
          {
          session_id: $session_id,
          timebox_minutes: $timebox,
          elapsed_minutes: $elapsed,
          status: "completed",
          debate_turns: 2,
          decision_points: ($dps.all_dps | group_by(.id) | map({
            id: .[0].id,
            question: .[0].question,
            category: .[0].category,
            raised_by: .[0].raised_by,
            positions: map({speaker: .raised_by, option: .proposing_option})
          })),
          resolved_decisions: $votes,
          debate_log: [
            {turn: 1, speaker: "optimist", content: $o1},
            {turn: 1, speaker: "pessimist", content: $p1}
          ]
        }'

  - id: write-architecture-audio-transcript
    env:
      CTO_ASSEMBLE_RESULT: $assemble-result.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "write-architecture-audio-transcript" "${audio_debug}"
      mkdir -p .tasks/audio .intake/audio
      RESULT_FILE="$(mktemp)"
      printf '%s' "$CTO_ASSEMBLE_RESULT" > "$RESULT_FILE"
      # Guard: if assemble result is empty or not valid JSON, write a fallback transcript
      if [ ! -s "$RESULT_FILE" ] || ! jq -e '.' "$RESULT_FILE" >/dev/null 2>&1; then
        echo "write-architecture-audio-transcript: assemble result empty or invalid JSON — writing fallback transcript" >&2
        jq -n --arg session_id "${session_id}" --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          '{kind:"architecture-deliberation",sessionId:$session_id,generatedAt:$ts,segments:[{speaker:"narrator",label:"Architecture Deliberation",text:"Architecture deliberation transcript could not be generated — source data was unavailable."}]}' \
          > .tasks/audio/architecture-deliberation.transcript.json
        rm -f "$RESULT_FILE"
        printf '%s\n' ".tasks/audio/architecture-deliberation.transcript.json"
        exit 0
      fi
      jq -n \
        --slurpfile result "$RESULT_FILE" \
        --arg session_id "${session_id}" \
        --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        '
          ($result[0] // {}) as $r |
          {
            kind: "architecture-deliberation",
            sessionId: $session_id,
            generatedAt: $generated_at,
            segments: (
              [
                {
                  speaker: "narrator",
                  label: "Architecture Deliberation",
                  text:
                    "Architecture deliberation for session " + $session_id + ". "
                    + (($r.decision_points // []) | length | tostring) + " decision points were considered."
                }
              ]
              + (
                  ($r.debate_log // [])
                  | map(
                      select((.content // "") | length > 0)
                      | {
                          speaker: (.speaker // "narrator"),
                          label: (
                            ((.speaker // "speaker") | ascii_upcase)
                            + (if (.turn? != null) then " turn " + (.turn | tostring) else "" end)
                          ),
                          text: (.content // "")
                        }
                    )
                )
              + [
                {
                  speaker: "compiler",
                  label: "Resolution Summary",
                  text:
                    "Deliberation complete. Status: " + (($r.status // "unknown") | tostring) + ". "
                    + "Resolved " + (($r.resolved_decisions // []) | length | tostring)
                    + " of " + (($r.decision_points // []) | length | tostring) + " decisions. "
                    + (if (($r.resolved_decisions // []) | length) > 0 then
                        "Winning decisions: "
                        + (
                            ($r.resolved_decisions // [])
                            | map(
                                (.decision_id // .id // "decision")
                                + " chose "
                                + ((.winning_option // .winner // "an option") | tostring)
                              )
                            | join("; ")
                          )
                      else
                        "No decisions were resolved."
                      end)
                }
              ]
            )
          }
        ' > .tasks/audio/architecture-deliberation.transcript.json
      rm -f "$RESULT_FILE"
      printf '%s\n' ".tasks/audio/architecture-deliberation.transcript.json"

  - id: launch-architecture-audio-export
    env:
      CTO_TRANSCRIPT_PATH: $write-architecture-audio-transcript.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "launch-architecture-audio-export" "${audio_debug}"
      TRANSCRIPT_PATH="$(printf '%s' "$CTO_TRANSCRIPT_PATH" | tail -n 1 | tr -d '\r')"
      if [ ! -f "$TRANSCRIPT_PATH" ]; then
        echo "launch-architecture-audio-export: transcript missing at $TRANSCRIPT_PATH" >&2
        jq -nc --arg path "$TRANSCRIPT_PATH" '{"launched":false,"reason":"missing transcript","path":$path}'
        exit 0
      fi
      "$root/intake/scripts/render-deliberation-audio.sh" \
        "architecture-deliberation" \
        "$TRANSCRIPT_PATH" \
        "$root/.tasks/audio/architecture-deliberation.mp3" \
        "$root/.intake/audio/architecture-deliberation.status.json" \
        "$root/.intake/audio/architecture-deliberation.log" || true

  - id: notify-complete
    env:
      CTO_ASSEMBLE_RESULT: $assemble-result.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "notify-complete" "${audio_debug}"
      MSG=$(printf '%s' "$CTO_ASSEMBLE_RESULT" | jq -r '
        . as $r
        | ($r.resolved_decisions // []) as $rd
        | "🧠 **Deliberation Complete**\n"
          + "🏁 Status: **\(($r.status | ascii_upcase))**  •  🔁 Turns: **\($r.debate_turns)**  •  ⏱ Duration: **\($r.elapsed_minutes) min**\n"
          + "📌 Resolved decisions: **\(($rd | length))** of **\(($r.decision_points | length))**\n"
          + (if ($rd | length) > 0 then
              "🏆 Decisions:\n" + ([
                $rd[] |
                "  - **\(.decision_id // .id // "?")**: " + (.winning_option // "n/a" | tostring | gsub("\\s+"; " ") | .[0:120])
              ] | join("\n")) + "\n"
            else "" end)
      ')
      META=$(printf '%s' "$CTO_ASSEMBLE_RESULT" | jq -c \
        --arg sid "${session_id}" \
        '{step:"deliberation-complete",session_id:$sid,resolved_count:(.resolved_decisions|length),total_dps:(.decision_points|length)}')
      echo "$MSG" | intake-util bridge-notify --from intake --to deliberation --metadata "$META" || true

  - id: linear-activity-complete
    env:
      CTO_ASSEMBLE_RESULT: $assemble-result.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "linear-activity-complete" "${audio_debug}"
      TITLE=$(printf '%s' "$CTO_ASSEMBLE_RESULT" | jq -r '
        "Deliberation complete: " + ((.resolved_decisions | length) | tostring) + " decisions resolved"
      ')
      BODY=$(printf '%s' "$CTO_ASSEMBLE_RESULT" | jq -r '
        . as $r |
        "## 🏁 Deliberation Complete\n\n"
        + "| Metric | Value |\n|--------|-------|\n"
        + "| Status | " + ($r.status | ascii_upcase) + " |\n"
        + "| Turns | " + ($r.debate_turns | tostring) + " |\n"
        + "| Duration | " + ($r.elapsed_minutes | tostring) + " min |\n"
        + "| Resolved | " + (($r.resolved_decisions | length) | tostring) + " of " + (($r.decision_points | length) | tostring) + " |\n\n"
        + (if (($r.resolved_decisions // []) | length) > 0 then
            "### Decisions\n\n" + ([($r.resolved_decisions // [])[] |
              "✅ **" + (.decision_id // .id // "?") + "**: " + (.winning_option // "n/a" | tostring | gsub("\\s+"; " ") | .[0:120])
            ] | join("\n")) + "\n"
          else "⚠️ No decisions resolved.\n" end)
      ')
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      if [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ]; then
        LINEAR_SID="$(cat "$FALLBACK_FILE")"
        echo "linear-activity-complete: session ID from file='$LINEAR_SID'" >&2
      fi
      if [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ]; then
        LINEAR_SID="${linear_session_id}"
        echo "linear-activity-complete: session ID from arg='$LINEAR_SID'" >&2
      fi
      if [ -n "$LINEAR_SID" ]; then
        intake-util linear-activity \
          --session-id "$LINEAR_SID" \
          --type thought \
          --body "$(printf '**%s**\n\n%s' "$TITLE" "$BODY")" >/dev/null || true
      else
        echo "linear-activity-complete: NO session ID — skipping" >&2
      fi

  - id: linear-plan-compile
    command: |
      root="${WORKSPACE:-.}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ] && LINEAR_SID="$(cat "$FALLBACK_FILE")"
      [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ] && LINEAR_SID="${linear_session_id}"
      if [ -n "$LINEAR_SID" ]; then
        intake-util linear-plan --session-id "$LINEAR_SID" --step delib-compile || true
      fi

  - id: compile-brief
    env:
      CTO_ASSEMBLE_RESULT: $assemble-result.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "compile-brief" "${audio_debug}"
      DELIB_RESULT_FILE="$(mktemp)"
      printf '%s' "$CTO_ASSEMBLE_RESULT" > "$DELIB_RESULT_FILE"
      PARSED_TASKS_JSON="$(cat "$root/.intake/initial-tasks.json" 2>/dev/null || echo '[]')"
      PARSED_TASKS_INPUT="[]"
      if [ -n "$PARSED_TASKS_JSON" ] && [ "$PARSED_TASKS_JSON" != "null" ] && [ "$PARSED_TASKS_JSON" != "" ]; then
        PARSED_TASKS_INPUT="$PARSED_TASKS_JSON"
      fi
      BRIEF_ARGS=$(jq -n \
        --rawfile prompt "$root/intake/prompts/compile-design-brief-system.md" \
        --rawfile prd_content "$root/.intake/run-prd.txt" \
        --rawfile design_context "$root/.intake/contexts/design.txt" \
        --argjson parsed_tasks "$PARSED_TASKS_INPUT" \
        --arg provider "${model_frontier_provider}" \
        --arg model "${model_frontier}" \
        --slurpfile delib_result "$DELIB_RESULT_FILE" \
        '{
          "prompt": $prompt,
          "input": {
            "deliberation_result": $delib_result[0],
            "prd_content": $prd_content,
            "parsed_tasks": $parsed_tasks,
            "design_context": $design_context
          },
          "provider": $provider,
          "model": $model,
          "temperature": 0.2
        }')
      if BRIEF_OUT="$("$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action text --args-json "$BRIEF_ARGS")"; then
        printf '%s\n' "$BRIEF_OUT"
      else
        echo "compile-brief: LLM summarization failed; generating deterministic fallback brief" >&2
        jq -rn \
          --rawfile prd_content "$root/.intake/run-prd.txt" \
          --rawfile design_context "$root/.intake/contexts/design.txt" \
          --argjson parsed_tasks "$PARSED_TASKS_INPUT" \
          --slurpfile delib_result "$DELIB_RESULT_FILE" '
            ($delib_result[0] // {}) as $r |
            def quote_block($text):
              ($text // "")
              | split("\n")
              | map("> " + .)
              | join("\n");
            def task_scope($tasks):
              if ($tasks | length) == 0 then
                "- No initial tasks were parsed.\n"
              else
                ($tasks | map(
                  "- Task " + ((.id // "?") | tostring)
                  + ": " + (.title // "Untitled task")
                  + (if (.description // "") != "" then " — " + .description else "" end)
                ) | join("\n")) + "\n"
              end;
            def resolved_decisions($items):
              if ($items | length) == 0 then
                "_No resolved decisions were recorded._\n"
              else
                ($items | to_entries | map(
                  "### [D" + ((.key + 1) | tostring) + "] " + (.value.question // .value.decision_id // ("Decision " + ((.key + 1) | tostring)) | tostring) + "\n\n"
                  + "- Status: Accepted\n"
                  + "- Decision: " + ((.value.winning_option // .value.winner // "Not specified") | tostring) + "\n"
                  + "- Consensus: " + (
                      if (.value.vote_counts? != null) then (.value.vote_counts | tostring)
                      elif (.value.tally? != null) then (.value.tally | tostring)
                      else "Recorded in deliberation output"
                      end
                    ) + "\n"
                  + (if (.value.rationale // "") != "" then "- Rationale: " + (.value.rationale | tostring) + "\n" else "" end)
                  + (if ((.value.caveats // []) | length) > 0 then "- Caveats:\n" + ((.value.caveats // []) | map("  - " + (. | tostring)) | join("\n")) + "\n" else "" end)
                ) | join("\n"))
              end;
            "# Enhanced PRD\n\n"
            + "## 1. Original Requirements\n\n"
            + quote_block($prd_content) + "\n\n"
            + "## 2. Project Scope\n\n"
            + "- Total tasks identified: " + (($parsed_tasks | length) | tostring) + "\n"
            + task_scope($parsed_tasks) + "\n"
            + "## 3. Resolved Decisions\n\n"
            + resolved_decisions($r.resolved_decisions // []) + "\n\n"
            + "## 4. Architecture Overview\n\n"
            + "- Deliberation status: " + (($r.status // "unknown") | tostring) + "\n"
            + "- Debate turns: " + (($r.debate_turns // 0) | tostring) + "\n"
            + "- Elapsed minutes: " + (($r.elapsed_minutes // 0) | tostring) + "\n"
            + "- Decision points considered: " + ((($r.decision_points // []) | length) | tostring) + "\n"
            + "- Decisions resolved: " + ((($r.resolved_decisions // []) | length) | tostring) + "\n\n"
            + "## 5. Design Intake Summary\n\n"
            + (if ($design_context | length) > 0 then $design_context else "_No design context available._" end) + "\n\n"
            + "## 6. Open Questions\n\n"
            + "- Use the deliberation record and task decomposition to resolve any remaining implementation details not captured above.\n"
          '
      fi
      rm -f "$DELIB_RESULT_FILE"

  - id: save-brief
    env:
      CTO_COMPILE_BRIEF: $compile-brief.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "deliberation" "save-brief" "${audio_debug}"
      mkdir -p .tasks/docs
      printf '%s\n' "$CTO_COMPILE_BRIEF" > .tasks/docs/design-brief.md
      echo "Design brief saved to .tasks/docs/design-brief.md"
      LV_BIN=""; command -v lobster-voice >/dev/null 2>&1 && LV_BIN="lobster-voice" || { [ -x "$root/apps/lobster-voice/lobster-voice" ] && LV_BIN="$root/apps/lobster-voice/lobster-voice"; }
      [ -n "$LV_BIN" ] && WORKSPACE="$root" "$LV_BIN" debate compiler "$(printf '%s' "$CTO_COMPILE_BRIEF")" --summarize || true
