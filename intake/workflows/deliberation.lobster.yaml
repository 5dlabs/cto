name: deliberation
description: >
  PRD deliberation — Optimist vs Pessimist debate with multi-model committee
  voting on decision points. All communication flows through a single shared
  NATS subject (deliberation.room); intake-agent broadcasts the PRD and
  orchestrates turns internally. Produces a resolved design-brief.md before
  task generation begins.

inputs:
  - name: prd_content
    type: string
    description: "Full PRD markdown content"
  - name: timebox_minutes
    type: number
    default: 30
    description: "Maximum deliberation time in minutes"
  - name: session_id
    type: string
    description: "Unique session identifier (UUID)"
  - name: infrastructure_context
    type: string
    default: ""
    description: "Available operators and services (injected from cluster state)"
  - name: codebase_context
    type: string
    default: ""
    description: "Structured codebase context from codebase-analysis step (empty for greenfield)"

outputs:
  - name: design_brief
    type: string
    description: "Resolved design brief markdown — feeds into parse-prd"
  - name: deliberation_result
    type: object
    description: "Full DeliberationResult JSON for audit logging"

steps:
  # ─────────────────────────────────────────────────────────
  # Step 1: Research PRD context via Tavily
  # Fires targeted searches to give each debate agent evidence for
  # their position before the debate begins.
  # ─────────────────────────────────────────────────────────
  - name: research-prd
    description: "Research PRD context via Tavily before debate — gives each agent evidence for their position"
    timeout: "5m"
    command: >
      jq -n
        --arg prd_content "{{inputs.prd_content}}"
        --arg codebase_context "{{inputs.codebase_context}}"
        '{
          "operation": "prd_research",
          "payload": {
            "prd_content": (if $codebase_context != "" then ($prd_content + "\n\n## Existing Codebase Context\n" + $codebase_context) else $prd_content end)
          }
        }' | intake-agent

  # ─────────────────────────────────────────────────────────
  # Step 2: Conduct the time-boxed debate
  # intake-agent broadcasts the PRD to deliberation.room internally (Step 1 of
  # runDeliberation), then orchestrates the debate loop, committee votes, and
  # result collection — all via the single shared deliberation.room subject.
  # NOTE: Timeout includes 10-minute buffer beyond internal timebox to allow
  # for in-flight agent requests (5min), committee votes (2min), and post-loop
  # processing, preventing premature termination during final iteration.
  # ─────────────────────────────────────────────────────────
  - name: conduct-deliberation
    description: "Run conductor loop for timebox_minutes, collecting turns and votes"
    depends_on: [research-prd]
    timeout: "{{inputs.timebox_minutes + 10}}m"
    command: >
      jq -n
        --arg session_id "{{inputs.session_id}}"
        --arg prd_content "{{inputs.prd_content}}"
        --arg infra_context "{{inputs.infrastructure_context}}"
        --arg codebase_context "{{inputs.codebase_context}}"
        --argjson timebox {{inputs.timebox_minutes}}
        --argjson research_memos '${{ steps.research-prd.output }}'
        '{
          "operation": "deliberate",
          "payload": {
            "session_id": $session_id,
            "prd_content": $prd_content,
            "infrastructure_context": (if $codebase_context != "" then ($infra_context + "\n\n## Existing Codebase\n" + $codebase_context) else $infra_context end),
            "timebox_minutes": $timebox,
            "research_memos": $research_memos,
            "vote_timeout_seconds": 120,
            "committee_ids": ["committee-1", "committee-2", "committee-3", "committee-4", "committee-5"]
          }
        }' | intake-agent

  # ─────────────────────────────────────────────────────────
  # Step 2: Compile resolved decisions into a design brief
  # ─────────────────────────────────────────────────────────
  - name: compile-brief
    description: "Synthesize deliberation result + original PRD into design-brief.md"
    depends_on: [conduct-deliberation]
    command: >
      echo '${{ steps.conduct-deliberation.output }}' > /tmp/delib_result.json &&
      jq -n
        --arg prompt "{{prompts/compile-design-brief-system.md}}"
        --arg prd_content "{{inputs.prd_content}}"
        --slurpfile delib_result /tmp/delib_result.json
        '{
          "prompt": $prompt,
          "input": {
            "deliberation_result": $delib_result[0],
            "prd_content": $prd_content
          },
          "provider": "anthropic",
          "model": "claude-opus-4-20250514",
          "temperature": 0.2
        }' | xargs -I{} openclaw.invoke --tool llm-task --action text --args-json '{}'

  # ─────────────────────────────────────────────────────────
  # Step 3: Save design brief to .tasks/docs/design-brief.md
  # ─────────────────────────────────────────────────────────
  - name: save-brief
    description: "Persist design brief for audit trail and downstream pipeline"
    depends_on: [compile-brief]
    command: >
      mkdir -p .tasks/docs &&
      echo "${{ steps.compile-brief.output }}" > .tasks/docs/design-brief.md &&
      echo "Design brief saved to .tasks/docs/design-brief.md"

output_mappings:
  design_brief: ${{ steps.compile-brief.output }}
  deliberation_result: ${{ steps.conduct-deliberation.output }}
