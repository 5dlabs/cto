name: pipeline
description: >
  Top-level intake pipeline — optionally analyzes an existing codebase,
  runs the Optimist/Pessimist deliberation phase, then feeds the resulting
  context (codebase + design brief, or raw PRD) into the task-generation
  intake workflow.

args:
  prd_content:
    default: ""
  # When set (path relative to WORKSPACE), PRD is copied into .intake/run-prd.txt so shell never
  # expands $(command) / backticks inside the document. Required for real PRDs (e.g. sigma-1).
  prd_path:
    default: ""
  design_prompt:
    default: ""
  design_artifacts_path:
    default: ""
  design_urls:
    default: ""
  design_mode:
    default: ingest_plus_stitch
  design_provider:
    default: stitch
  design_framer_project:
    default: ""
  project_name:
    default: project
  num_tasks:
    default: 10
  include_codebase:
    default: false
  repository_url:
    default: ""
  github_org:
    default: 5dlabs
  github_visibility:
    default: private
  webhook_callback_url:
    default: ""
  deliberate:
    default: "true"
  timebox_minutes:
    default: 30
  infrastructure_context:
    default: ""
  intake_metadata:
    default: ""
  pr_base_branch:
    default: main
  linear_session_id:
    default: ""
  linear_issue_id:
    default: ""
  target_repo_local_path:
    default: ""
  verify:
    default: "true"
  breakpoints:
    default: "false"
  audio_debug:
    default: "false"
  audio_mute_pre_intake:
    default: "true"

steps:
  - id: load-config
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      root="${WORKSPACE:-.}"
      date +%s > "$root/.intake/.pipeline-start-epoch"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "load-config" "${audio_debug}" "project ${project_name}"
      python3 -c "
      import json, os
      config_path = os.path.join(os.environ.get('WORKSPACE', '.'), 'cto-config.json')
      with open(config_path) as f:
        c = json.load(f)
      t = c.get('defaults',{}).get('intake',{}).get('models',{}).get('tiers',{})
      cm = c.get('defaults',{}).get('intake',{}).get('models',{}).get('committee',[])
      r = {}
      for k in ['primary','fast','frontier']:
        d = t.get(k,{})
        r[k+'_provider'] = d.get('provider','gemini')
        r[k+'_model'] = d.get('model','gemini-2.5-flash')
      for i,v in enumerate(cm):
        r['voter_%d_provider'%(i+1)] = v.get('provider','gemini')
        r['voter_%d_model'%(i+1)] = v.get('model','gemini-2.5-flash')
      lin = c.get('defaults',{}).get('linear',{})
      r['linear_team_id'] = lin.get('teamId','')
      print(json.dumps(r))
      "

  - id: preflight
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "preflight" "${audio_debug}" "project ${project_name}"
      "${root}/intake/scripts/pipeline-preflight.sh"

  - id: materialize-prd
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "materialize-prd" "${audio_debug}" "project ${project_name}"
      mkdir -p "$WS/.intake"
      OUT="$WS/.intake/run-prd.txt"
      if [ -n "${prd_path}" ]; then
        REL=$(printf '%s' "${prd_path}" | sed 's|^\./||')
        case "$REL" in
          /*) SRC="$REL" ;;          # absolute path (e.g. target repo PRD)
          *)  SRC="$WS/$REL" ;;      # relative to workspace
        esac
        if [ ! -f "$SRC" ]; then
          echo "materialize-prd: missing PRD file: $SRC (prd_path=${prd_path})" >&2
          exit 1
        fi
        cp "$SRC" "$OUT"
      else
        if [ -z "${prd_content}" ]; then
          echo "materialize-prd: set prd_path or prd_content" >&2
          exit 1
        fi
        printf '%s' "${prd_content}" > "$OUT"
      fi
      printf '%s\n' "$OUT"

  - id: materialize-design-inputs
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "materialize-design-inputs" "${audio_debug}" "project ${project_name}"
      DESIGN_DIR="$WS/.intake/design"
      ASSETS_DIR="$DESIGN_DIR/assets"
      mkdir -p "$ASSETS_DIR"
      INTAKE_AGENT_BIN="${INTAKE_AGENT_BIN:-}"
      if [ -z "$INTAKE_AGENT_BIN" ]; then
        if command -v intake-agent >/dev/null 2>&1; then
          INTAKE_AGENT_BIN="intake-agent"
        elif [ -x "$WS/apps/intake-agent/dist/intake-agent" ]; then
          INTAKE_AGENT_BIN="$WS/apps/intake-agent/dist/intake-agent"
        elif [ -x "$WS/apps/intake-agent/intake-agent" ]; then
          INTAKE_AGENT_BIN="$WS/apps/intake-agent/intake-agent"
        fi
      fi
      if [ -z "$INTAKE_AGENT_BIN" ]; then
        "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "design-intake-agent" "failed" "${audio_debug}" "error" "project ${project_name}"
        echo "materialize-design-inputs: intake-agent binary not found. Set INTAKE_AGENT_BIN or build apps/intake-agent." >&2
        exit 1
      fi
      MODE="${design_mode:-ingest_plus_stitch}"
      PROVIDER_MODE="${design_provider:-}"
      FRAMER_PROJECT_TARGET="${design_framer_project:-${FRAMER_PROJECT_URL:-${FRAMER_PROJECT_ID:-}}}"
      if [ -z "$PROVIDER_MODE" ]; then
        case "$MODE" in
          stitch|framer|both|auto) PROVIDER_MODE="$MODE" ;;
          ingest_only) PROVIDER_MODE="auto" ;;
          *) PROVIDER_MODE="stitch" ;;
        esac
      fi
      export INTAKE_STITCH_GENERATION_TIMEOUT_MS="${INTAKE_STITCH_GENERATION_TIMEOUT_MS:-60000}"
      export INTAKE_STITCH_GENERATION_MAX_RETRIES="${INTAKE_STITCH_GENERATION_MAX_RETRIES:-1}"
      STITCH_KEY_STATE="missing"
      if [ -n "${STITCH_API_KEY:-}" ]; then
        STITCH_KEY_STATE="present"
      fi
      FRAMER_KEY_STATE="missing"
      if [ -n "${FRAMER_API_KEY:-}" ]; then
        FRAMER_KEY_STATE="present"
      fi
      AUTH_DISCOVERY_JSON="$DESIGN_DIR/auth-discovery.json"
      jq -n \
        --arg mode "$MODE" \
        --arg provider_mode "$PROVIDER_MODE" \
        --arg stitch_api_key_state "$STITCH_KEY_STATE" \
        --arg framer_api_key_state "$FRAMER_KEY_STATE" \
        --arg framer_project_state "$( [ -n "${FRAMER_PROJECT_TARGET:-}" ] && printf 'present' || printf 'missing' )" \
        --arg framer_project_url_state "$( [ -n "${FRAMER_PROJECT_URL:-}" ] && printf 'present' || printf 'missing' )" \
        --arg framer_project_id_state "$( [ -n "${FRAMER_PROJECT_ID:-}" ] && printf 'present' || printf 'missing' )" \
        --arg stitch_project_id_state "$( [ -n "${STITCH_PROJECT_ID:-}" ] && printf 'present' || printf 'missing' )" \
        --arg stitch_access_token_state "$( [ -n "${STITCH_ACCESS_TOKEN:-}" ] && printf 'present' || printf 'missing' )" \
        --arg google_cloud_project_state "$( [ -n "${GOOGLE_CLOUD_PROJECT:-}" ] && printf 'present' || printf 'missing' )" \
        '{mode:$mode, provider_mode:$provider_mode, stitch_api_key:$stitch_api_key_state, framer_api_key:$framer_api_key_state, framer_project:$framer_project_state, framer_project_url:$framer_project_url_state, framer_project_id:$framer_project_id_state, stitch_project_id:$stitch_project_id_state, stitch_access_token:$stitch_access_token_state, google_cloud_project:$google_cloud_project_state}' \
        > "$AUTH_DISCOVERY_JSON"

      REQUIRES_STITCH=false
      REQUIRES_FRAMER=false
      case "$PROVIDER_MODE" in
        stitch|both|auto) REQUIRES_STITCH=true ;;
      esac
      case "$PROVIDER_MODE" in
        framer|both) REQUIRES_FRAMER=true ;;
      esac

      if [ "$MODE" = "ingest_plus_stitch" ]; then
        REQUIRES_STITCH=true
      fi

      if [ "$REQUIRES_STITCH" = "true" ] && [ -z "${STITCH_API_KEY:-}" ]; then
        "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "stitch-credentials" "failed" "${audio_debug}" "error" "design_mode ${MODE}"
        echo "materialize-design-inputs: STITCH_API_KEY is required for provider mode ${PROVIDER_MODE}." >&2
        echo "credential discovery: $(cat "$AUTH_DISCOVERY_JSON")" >&2
        exit 1
      fi
      if [ "$REQUIRES_FRAMER" = "true" ] && { [ -z "${FRAMER_API_KEY:-}" ] || [ -z "${FRAMER_PROJECT_TARGET:-}" ]; }; then
        "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "framer-credentials" "failed" "${audio_debug}" "error" "provider_mode ${PROVIDER_MODE}"
        echo "materialize-design-inputs: FRAMER_API_KEY and a Framer project target are required for provider mode=${PROVIDER_MODE}." >&2
        echo "credential discovery: $(cat "$AUTH_DISCOVERY_JSON")" >&2
        exit 1
      fi
      "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "stitch-credentials" "passed" "${audio_debug}" "normal" "design_mode ${MODE}"

      if [ -n "${design_artifacts_path}" ]; then
        REL=$(printf '%s' "${design_artifacts_path}" | sed 's|^\./||')
        SRC="$WS/$REL"
        if [ -e "$SRC" ]; then
          cp -R "$SRC" "$ASSETS_DIR/"
        else
          echo "materialize-design-inputs: design_artifacts_path not found: $SRC" >&2
        fi
      fi

      RESOLVED_DESIGN_URLS="${design_urls}"
      if [ -z "$RESOLVED_DESIGN_URLS" ] && [ -s "$WS/.intake/run-prd.txt" ]; then
        RESOLVED_DESIGN_URLS=$(grep -oE 'https?://[^ )"<>]+' "$WS/.intake/run-prd.txt" \
          | grep -v 'github\.com\|signal\.me\|img\.shields' \
          | sort -u | head -5 | paste -sd',' -)
      fi
      if [ -z "$RESOLVED_DESIGN_URLS" ] && [ -n "${target_repo_local_path}" ] && [ -f "${target_repo_local_path}/README.md" ]; then
        RESOLVED_DESIGN_URLS=$(grep -oE 'https?://[^ )"<>]+' "${target_repo_local_path}/README.md" \
          | grep -v 'github\.com\|signal\.me\|img\.shields' \
          | sort -u | head -5 | paste -sd',' -)
      fi
      if [ -n "$RESOLVED_DESIGN_URLS" ] && [ "$RESOLVED_DESIGN_URLS" != "${design_urls}" ]; then
        echo "materialize-design-inputs: auto-discovered design URLs: $RESOLVED_DESIGN_URLS" >&2
      fi

      jq -n \
        --rawfile prd "$WS/.intake/run-prd.txt" \
        --arg design_prompt "${design_prompt}" \
        --arg design_artifacts_path "$ASSETS_DIR" \
        --arg design_urls "$RESOLVED_DESIGN_URLS" \
        --arg design_mode "${design_mode}" \
        --arg design_provider "${PROVIDER_MODE}" \
        --arg design_framer_project "${FRAMER_PROJECT_TARGET}" \
        --arg project_name "${project_name}" \
        --arg output_dir "$DESIGN_DIR" \
        '{
          operation: "design_intake",
          payload: {
            prd_content: $prd,
            design_prompt: $design_prompt,
            design_artifacts_path: $design_artifacts_path,
            design_urls: $design_urls,
            design_mode: $design_mode,
            design_provider: $design_provider,
            design_framer_project: $design_framer_project,
            project_name: $project_name,
            output_dir: $output_dir
          }
        }' | "$INTAKE_AGENT_BIN" > "/tmp/design-intake-$$.json"

      if ! jq -e '.success == true' "/tmp/design-intake-$$.json" >/dev/null 2>&1; then
        echo "materialize-design-inputs: intake-agent design_intake failed; writing fallback design context." >&2
        jq -n \
          --arg project_name "${project_name}" \
          --arg design_mode "${design_mode}" \
          --arg design_prompt "${design_prompt}" \
          '{"projectName":$project_name,"mode":$design_mode,"providerMode":"stitch","prompt":$design_prompt,"hasFrontend":false,"frontendTargets":[],"confidence":0,"evidence":[],"urls":[],"providers":{"stitch":{"status":"failed","reason":"design_intake_failed","warnings":["intake-agent design_intake failed"],"candidates":[]},"framer":{"status":"skipped","reason":"not_requested","warnings":[],"candidates":[]}},"stitch":{"status":"failed","reason":"design_intake_failed","warnings":["intake-agent design_intake failed"],"candidates":[]},"framer":{"status":"skipped","reason":"not_requested","warnings":[],"candidates":[]},"normalized_candidates":[]}' \
          > "$DESIGN_DIR/design-context.json"
      else
        jq -c '.data' "/tmp/design-intake-$$.json" > "$DESIGN_DIR/design-context.json"
      fi

      cat "$DESIGN_DIR/design-context.json"

  - id: save-design-bundle
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "save-design-bundle" "${audio_debug}" "project ${project_name}"
      SRC_DIR="$WS/.intake/design"
      OUT_DIR="$WS/.tasks/design"
      mkdir -p "$OUT_DIR/crawled" "$OUT_DIR/stitch" "$OUT_DIR/framer"
      cp "$SRC_DIR/design-context.json" "$OUT_DIR/design-context.json"
      if [ -f "$SRC_DIR/crawled/urls.json" ]; then
        cp "$SRC_DIR/crawled/urls.json" "$OUT_DIR/crawled/urls.json"
      fi
      if [ -f "$SRC_DIR/stitch/stitch-run.json" ]; then
        cp "$SRC_DIR/stitch/stitch-run.json" "$OUT_DIR/stitch/stitch-run.json"
      fi
      if [ -f "$SRC_DIR/stitch/candidates.json" ]; then
        cp "$SRC_DIR/stitch/candidates.json" "$OUT_DIR/stitch/candidates.json"
      fi
      if [ -f "$SRC_DIR/framer/framer-run.json" ]; then
        cp "$SRC_DIR/framer/framer-run.json" "$OUT_DIR/framer/framer-run.json"
      fi
      if [ -f "$SRC_DIR/framer/candidates.json" ]; then
        cp "$SRC_DIR/framer/candidates.json" "$OUT_DIR/framer/candidates.json"
      fi
      if [ -f "$SRC_DIR/candidates.normalized.json" ]; then
        cp "$SRC_DIR/candidates.normalized.json" "$OUT_DIR/candidates.normalized.json"
      fi
      if [ -f "$SRC_DIR/component-library.json" ]; then
        cp "$SRC_DIR/component-library.json" "$OUT_DIR/component-library.json"
      fi
      if [ -f "$SRC_DIR/design-system.md" ]; then
        cp "$SRC_DIR/design-system.md" "$OUT_DIR/design-system.md"
      fi
      if [ -f "$SRC_DIR/auth-discovery.json" ]; then
        cp "$SRC_DIR/auth-discovery.json" "$OUT_DIR/auth-discovery.json"
      fi
      jq -n \
        --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --arg project_name "${project_name}" \
        --arg linear_session_id "${linear_session_id}" \
        --arg design_mode "${design_mode}" \
        --arg design_provider "${design_provider}" \
        --arg bundle_dir "$OUT_DIR" \
        --arg stitch_required "$(if [ "${design_provider}" = "stitch" ] || [ "${design_provider}" = "both" ] || [ "${design_mode}" = "ingest_plus_stitch" ]; then printf 'true'; else printf 'false'; fi)" \
        --argjson context "$(cat "$SRC_DIR/design-context.json" 2>/dev/null || printf '{}')" \
        '{
          generated_at: $generated_at,
          project_name: $project_name,
          linear_session_id: $linear_session_id,
          design_mode: $design_mode,
          design_provider: $design_provider,
          stitch_required: ($stitch_required == "true"),
          bundle_dir: $bundle_dir,
          has_frontend: ($context.hasFrontend // false),
          stitch_status: ($context.stitch.status // "unknown"),
          framer_status: ($context.framer.status // "unknown"),
          files: {
            design_context: ($bundle_dir + "/design-context.json"),
            crawled_urls: ($bundle_dir + "/crawled/urls.json"),
            stitch_run: ($bundle_dir + "/stitch/stitch-run.json"),
            stitch_candidates: ($bundle_dir + "/stitch/candidates.json"),
            framer_run: ($bundle_dir + "/framer/framer-run.json"),
            framer_candidates: ($bundle_dir + "/framer/candidates.json"),
            normalized_candidates: ($bundle_dir + "/candidates.normalized.json"),
            component_library: ($bundle_dir + "/component-library.json"),
            design_system: ($bundle_dir + "/design-system.md"),
            design_variants: ($bundle_dir + "/stitch/design-variants.json"),
            design_selections: ($bundle_dir + "/selections.json"),
            source_screenshots: ($bundle_dir + "/source-screenshots.json"),
            snapshot_links_json: ($bundle_dir + "/snapshot-links.json"),
            snapshot_links_md: ($bundle_dir + "/snapshot-links.md"),
            auth_discovery: ($bundle_dir + "/auth-discovery.json")
          }
        }' > "$OUT_DIR/manifest.json"
      cat "$OUT_DIR/manifest.json"

  - id: persist-design-metadata
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "persist-design-metadata" "${audio_debug}" "project ${project_name}"
      DESIGN_CTX="$(cat "$WS/.intake/design/design-context.json" 2>/dev/null || printf '{}')"
      SNAPSHOT_PAYLOAD="$(jq -nc \
        --arg session_id "${linear_session_id:-${project_name}-design}" \
        --arg run_id "" \
        --arg project_name "${project_name}" \
        --arg design_mode "${design_mode}" \
        --arg design_provider "${design_provider}" \
        --arg stitch_required "$(if [ "${design_provider}" = "stitch" ] || [ "${design_provider}" = "both" ] || [ "${design_mode}" = "ingest_plus_stitch" ]; then printf 'true'; else printf 'false'; fi)" \
        --arg stitch_status "$(printf '%s' "$DESIGN_CTX" | jq -r '.stitch.status // "unknown"')" \
        --arg framer_status "$(printf '%s' "$DESIGN_CTX" | jq -r '.framer.status // "unknown"')" \
        --arg has_frontend "$(printf '%s' "$DESIGN_CTX" | jq -r '.hasFrontend // false')" \
        --arg artifact_bundle_path "$WS/.tasks/design" \
        --argjson context "$DESIGN_CTX" \
        '{session_id:$session_id,run_id:$run_id,project_name:$project_name,design_mode:$design_mode,design_provider:$design_provider,stitch_required:($stitch_required=="true"),stitch_status:$stitch_status,framer_status:$framer_status,has_frontend:($has_frontend=="true"),artifact_bundle_path:$artifact_bundle_path,context:$context}')"
      LINEAR_URL="${LINEAR_BRIDGE_URL:-http://127.0.0.1:3100}"
      DISCORD_URL="${DISCORD_BRIDGE_URL:-http://127.0.0.1:3200}"
      linear_ok=false
      discord_ok=false
      if curl -fsS -X POST "${LINEAR_URL%/}/history/design-snapshot" -H 'Content-Type: application/json' -d "$SNAPSHOT_PAYLOAD" >/dev/null 2>&1; then
        linear_ok=true
      else
        if curl -fsS -X POST "${DISCORD_URL%/}/history/design-snapshot" -H 'Content-Type: application/json' -d "$SNAPSHOT_PAYLOAD" >/dev/null 2>&1; then
          discord_ok=true
        fi
      fi
      if [ "$linear_ok" != true ] && [ "$discord_ok" != true ]; then
        if [ "${INTAKE_PREFLIGHT_BRIDGES_SKIP:-}" = "true" ]; then
          echo "persist-design-metadata: bridges skipped (INTAKE_PREFLIGHT_BRIDGES_SKIP=true); continuing without persistence" >&2
        else
          "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "design-metadata-persistence" "failed" "${audio_debug}" "error" "project ${project_name}"
          echo "persist-design-metadata: failed to persist design snapshot to linear and discord bridges" >&2
          exit 1
        fi
      fi
      "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "design-metadata-persistence" "passed" "${audio_debug}" "normal" "linear=${linear_ok},discord=${discord_ok}"
      jq -nc --argjson linear "$linear_ok" --argjson discord "$discord_ok" '{linear:$linear,discord:$discord}'

  - id: generate-design-variants
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "generate-design-variants" "${audio_debug}" "project ${project_name}"
      CANDIDATES="$WS/.intake/design/candidates.normalized.json"
      if [ ! -f "$CANDIDATES" ]; then
        CANDIDATES="$WS/.intake/design/stitch/candidates.json"
      fi
      if [ "${design_mode}" = "ingest_only" ]; then
        echo "generate-design-variants: skipped (design_mode=${design_mode})" >&2
        printf '{"skipped":true,"reason":"ingest_only"}'
        exit 0
      fi
      if [ ! -f "$CANDIDATES" ]; then
        echo "generate-design-variants: no candidates.json — skipping" >&2
        printf '{"skipped":true,"reason":"no_candidates"}'
        exit 0
      fi
      GENERATED=$(jq '[.[] | select(.status=="generated")] | length' "$CANDIDATES" 2>/dev/null || echo 0)
      if [ "$GENERATED" -eq 0 ]; then
        echo "generate-design-variants: no generated screens — skipping" >&2
        printf '{"skipped":true,"reason":"no_generated_screens"}'
        exit 0
      fi
      echo '{"operation":"design_variants","payload":{"candidates_path":"'"$CANDIDATES"'","output_dir":"'"$WS/.intake/design/stitch"'","variant_count":3,"creative_range":"EXPLORE"}}' \
        | "$WS/apps/intake-agent/intake-agent"
      RESULT=$?
      if [ $RESULT -ne 0 ]; then
        echo "generate-design-variants: intake-agent failed (exit $RESULT) — continuing without variants" >&2
        printf '{"skipped":true,"reason":"intake_agent_failed"}'
        exit 0
      fi
      "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "generate-design-variants" "design variants generated" "${audio_debug}" "normal" "project ${project_name}"
      cat "$WS/.intake/design/stitch/design-variants.json"

  - id: design-review
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_DESIGN_VARIANTS_STDOUT: $generate-design-variants.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "design-review" "${audio_debug}" "project ${project_name}"
      VARIANTS_FILE="$WS/.intake/design/stitch/design-variants.json"
      if [ ! -f "$VARIANTS_FILE" ]; then
        echo "design-review: no design-variants.json — skipping" >&2
        printf '{"skipped":true}'
        exit 0
      fi
      SKIPPED=$(printf '%s' "$CTO_DESIGN_VARIANTS_STDOUT" | jq -r '.skipped // false' 2>/dev/null || echo true)
      if [ "$SKIPPED" = "true" ]; then
        echo "design-review: variant generation was skipped — skipping review" >&2
        printf '{"skipped":true}'
        exit 0
      fi
      SESSION_ID="${linear_session_id:-${project_name}-design}"
      intake-util design-review \
        --variants "$VARIANTS_FILE" \
        --session-id "$SESSION_ID" \
        --output "$WS/.intake/design/stitch/design-selections.json" \
        ${linear_issue_id:+--linear-issue-id "$linear_issue_id"} \
        || {
          echo "design-review: intake-util failed — continuing without selections" >&2
          printf '{"skipped":true,"reason":"intake_util_failed"}'
          exit 0
        }
      "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "design-review" "design feedback collected" "${audio_debug}" "normal" "project ${project_name}"
      cat "$WS/.intake/design/stitch/design-selections.json"

  - id: save-design-selections
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_DESIGN_REVIEW_STDOUT: $design-review.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "save-design-selections" "${audio_debug}" "project ${project_name}"
      SRC="$WS/.intake/design/stitch/design-selections.json"
      DST="$WS/.tasks/design/selections.json"
      if [ -f "$SRC" ]; then
        mkdir -p "$(dirname "$DST")"
        cp "$SRC" "$DST"
        echo "save-design-selections: saved to $DST" >&2
        cat "$DST"
      else
        echo "save-design-selections: no selections to save — skipping" >&2
        printf '{"skipped":true}'
      fi
      if [ -f "$WS/.intake/design/stitch/design-variants.json" ]; then
        cp "$WS/.intake/design/stitch/design-variants.json" "$WS/.tasks/design/stitch/design-variants.json" 2>/dev/null || true
      fi
      SOURCE_SCREENSHOTS="$WS/.tasks/design/source-screenshots.json"
      jq -n '[]' > "$SOURCE_SCREENSHOTS"
      if [ -f "$WS/.tasks/design/design-context.json" ]; then
        URLS_FILE="$(mktemp)"
        jq -r '((.urls // []) + ((.crawledUrls // []) | map(select(.status == "ok") | .url))) | map(select(type == "string" and length > 0)) | unique | .[:3][]' "$WS/.tasks/design/design-context.json" > "$URLS_FILE"
        while IFS= read -r SOURCE_URL; do
          [ -n "$SOURCE_URL" ] || continue
          UPLOAD_FILE="$(mktemp)"
          ATTEMPT=1
          UPLOAD_OK=false
          LAST_ERROR=""
          while [ "$ATTEMPT" -le 2 ]; do
            ERR_FILE="$(mktemp)"
            set +e
            UPLOAD_JSON="$("$WS/intake/scripts/upload-mockup-to-linear.sh" "$SOURCE_URL" DESKTOP 2>"$ERR_FILE")"
            UPLOAD_STATUS=$?
            set -e
            STDERR_TEXT="$(cat "$ERR_FILE" 2>/dev/null || true)"
            if [ "$UPLOAD_STATUS" -eq 0 ] && printf '%s' "${UPLOAD_JSON:-{}}" | jq -c '.' > "$UPLOAD_FILE" 2>/dev/null; then
              if jq -e '.success == true' "$UPLOAD_FILE" >/dev/null 2>&1; then
                UPLOAD_OK=true
                rm -f "$ERR_FILE"
                break
              fi
              LAST_ERROR="$(jq -r '.error // empty' "$UPLOAD_FILE" 2>/dev/null || true)"
            else
              LAST_ERROR="$(printf '%s' "$STDERR_TEXT" | tr '\n' ' ' | cut -c1-300)"
            fi
            FALLBACK_ASSET_URL="$(printf '%s\n' "$STDERR_TEXT" | sed -n 's/.*→ \(https:\/\/[^ ]*\).*/\1/p' | tail -n 1)"
            FALLBACK_LOCAL_PATH="$(printf '%s\n' "$STDERR_TEXT" | sed -n 's/^Screenshot saved: \(.*\)$/\1/p' | tail -n 1)"
            if [ -n "$FALLBACK_ASSET_URL" ]; then
              jq -nc --arg url "$FALLBACK_ASSET_URL" --arg path "$FALLBACK_LOCAL_PATH" \
                '{success:true, assetUrl:$url, localPath:$path}' > "$UPLOAD_FILE"
              UPLOAD_OK=true
              rm -f "$ERR_FILE"
              break
            fi
            rm -f "$ERR_FILE"
            ATTEMPT=$((ATTEMPT + 1))
            sleep 2
          done
          if [ "$UPLOAD_OK" != true ]; then
            printf '{"success":false,"error":%s}\n' "$(jq -Rn --arg err "${LAST_ERROR:-invalid upload response}" '$err')" > "$UPLOAD_FILE"
          fi
          TMP_SCREENSHOTS="$(mktemp)"
          jq --arg source_url "$SOURCE_URL" --slurpfile upload "$UPLOAD_FILE" \
            '. + [{
              source_url: $source_url,
              success: (($upload[0].success // false) == true),
              asset_url: ($upload[0].assetUrl // ""),
              local_path: ($upload[0].localPath // ""),
              error: ($upload[0].error // "")
            }]' "$SOURCE_SCREENSHOTS" > "$TMP_SCREENSHOTS" && mv "$TMP_SCREENSHOTS" "$SOURCE_SCREENSHOTS"
          rm -f "$UPLOAD_FILE"
        done < "$URLS_FILE"
        rm -f "$URLS_FILE"
      fi
      SNAPSHOT_JSON="$WS/.tasks/design/snapshot-links.json"
      SNAPSHOT_MD="$WS/.tasks/design/snapshot-links.md"
      python3 - "$WS/.tasks/design/design-context.json" "$WS/.tasks/design/stitch/design-variants.json" "$WS/.tasks/design/selections.json" "$SOURCE_SCREENSHOTS" "$SNAPSHOT_JSON" "$SNAPSHOT_MD" <<'PY'
      import json
      import sys
      from pathlib import Path

      context_path = Path(sys.argv[1])
      variants_path = Path(sys.argv[2])
      selections_path = Path(sys.argv[3])
      source_screenshots_path = Path(sys.argv[4])
      snapshot_json_path = Path(sys.argv[5])
      snapshot_md_path = Path(sys.argv[6])

      def load_json(path: Path, default):
          if not path.exists():
              return default
          try:
              return json.loads(path.read_text())
          except Exception:
              return default

      context = load_json(context_path, {})
      variants = load_json(variants_path, {})
      selections = load_json(selections_path, [])
      source_screenshots = load_json(source_screenshots_path, [])

      current_urls = []
      for value in (context.get("urls") or []) + (context.get("crawledUrls") or []):
          if isinstance(value, dict):
              value = value.get("url")
          if isinstance(value, str) and value and value not in current_urls:
              current_urls.append(value)

      selection_by_screen = {}
      for selection in selections if isinstance(selections, list) else []:
          screen_id = selection.get("screen_id")
          variant_id = selection.get("selected_variant_id")
          if isinstance(screen_id, str) and screen_id and isinstance(variant_id, str) and variant_id:
              selection_by_screen[screen_id] = variant_id

      generated_variants = []
      for screen in (variants.get("screens") or []) if isinstance(variants, dict) else []:
          if not isinstance(screen, dict):
              continue
          source_screen_id = screen.get("source_screen_id") or ""
          source_target = screen.get("source_target") or ""
          for variant in screen.get("variants") or []:
              if not isinstance(variant, dict):
                  continue
              if variant.get("status") != "generated":
                  continue
              image_url = variant.get("image_url") or ""
              html_url = variant.get("html_url") or ""
              if not image_url and not html_url:
                  continue
              generated_variants.append({
                  "screen_id": source_screen_id,
                  "screen_target": source_target,
                  "variant_id": variant.get("variant_id") or "",
                  "label": variant.get("label") or variant.get("variant_id") or "variant",
                  "selected": selection_by_screen.get(source_screen_id) == (variant.get("variant_id") or ""),
                  "image_url": image_url,
                  "html_url": html_url,
              })

      current_site_snapshots = []
      for snapshot in source_screenshots if isinstance(source_screenshots, list) else []:
          if not isinstance(snapshot, dict):
              continue
          source_url = snapshot.get("source_url")
          if not isinstance(source_url, str) or not source_url:
              continue
          asset_url = snapshot.get("asset_url")
          success = snapshot.get("success") is True
          current_site_snapshots.append({
              "source_url": source_url,
              "asset_url": asset_url if isinstance(asset_url, str) else "",
              "success": success,
              "error": snapshot.get("error") if isinstance(snapshot.get("error"), str) else "",
          })
          if source_url not in current_urls:
              current_urls.append(source_url)

      selected_variants = [variant for variant in generated_variants if variant["selected"]]
      snapshot_payload = {
          "current_urls": current_urls,
          "current_site_snapshots": current_site_snapshots,
          "generated_variants": generated_variants,
          "selected_variants": selected_variants,
          "counts": {
              "current_urls": len(current_urls),
              "current_site_snapshots": len(current_site_snapshots),
              "generated_variants": len(generated_variants),
              "selected_variants": len(selected_variants),
          },
      }
      snapshot_json_path.write_text(json.dumps(snapshot_payload, indent=2) + "\n")

      md_lines = ["### Design snapshots", ""]
      md_lines.append("#### Current site snapshots")
      if current_site_snapshots:
          for snapshot in current_site_snapshots:
              line = f"- `{snapshot['source_url']}`"
              if snapshot["asset_url"]:
                  line += f" — [Image]({snapshot['asset_url']})"
              elif snapshot["error"]:
                  line += f" — screenshot failed: {snapshot['error']}"
              md_lines.append(line)
              if snapshot["asset_url"]:
                  md_lines.extend(["", f"![Current site]({snapshot['asset_url']})", ""])
      elif current_urls:
          md_lines.extend(f"- `{url}`" for url in current_urls)
      else:
          md_lines.append("- None captured for this run.")

      variants_for_md = selected_variants or generated_variants
      md_lines.extend(["", "#### Generated variants"])
      if variants_for_md:
          for variant in variants_for_md:
              links = []
              if variant["html_url"]:
                  links.append(f"[HTML]({variant['html_url']})")
              if variant["image_url"]:
                  links.append(f"[Image]({variant['image_url']})")
              prefix = "- **" + (variant["screen_target"] or "design")
              prefix += " / " + (variant["label"] or variant["variant_id"] or "variant") + "**"
              if variant["selected"]:
                  prefix += " _(selected)_"
              if links:
                  prefix += " — " + " · ".join(links)
              md_lines.append(prefix)
              if variant["image_url"]:
                  alt = f"{variant['screen_target'] or 'design'} — {variant['label'] or 'variant'}"
                  md_lines.extend(["", f"![{alt}]({variant['image_url']})", ""])
      else:
          md_lines.append("- No generated variant URLs were captured.")

      snapshot_md_path.write_text("\n".join(md_lines).rstrip() + "\n")
      PY
      if [ -f "$WS/.tasks/design/manifest.json" ]; then
        TMP_MANIFEST="$(mktemp)"
        jq \
          --arg design_variants "$WS/.tasks/design/stitch/design-variants.json" \
          --arg design_selections "$WS/.tasks/design/selections.json" \
          --arg source_screenshots "$SOURCE_SCREENSHOTS" \
          --arg snapshot_links_json "$SNAPSHOT_JSON" \
          --arg snapshot_links_md "$SNAPSHOT_MD" \
          '.files.design_variants = $design_variants
           | .files.design_selections = $design_selections
           | .files.source_screenshots = $source_screenshots
           | .files.snapshot_links_json = $snapshot_links_json
           | .files.snapshot_links_md = $snapshot_links_md' \
          "$WS/.tasks/design/manifest.json" > "$TMP_MANIFEST" && mv "$TMP_MANIFEST" "$WS/.tasks/design/manifest.json"
      fi
      if [ -f "$WS/.tasks/design/manifest.json" ]; then
        cat "$WS/.tasks/design/manifest.json"
      else
        printf '{"skipped":false}'
      fi

  - id: notify-pipeline-start
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "notify-pipeline-start" "${audio_debug}" "project ${project_name}"
      RUN_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      MSG=$(jq -n \
        --arg pn "${project_name}" \
        --arg ts "$RUN_TS" \
        --arg d "${deliberate}" \
        --arg sid "${linear_session_id:-}" \
        --arg iid "${linear_issue_id:-}" \
        --arg branch "${pr_base_branch}" \
        '"🚀 **Intake pipeline fired up** for project **" + $pn + "**\n\n" +
        "⚙️ deliberate: " + $d + "\n" +
        "🌿 pr_base_branch: " + $branch + "\n" +
        "🔗 linear_session_id: " + $sid + "\n" +
        "📎 linear_issue_id: " + $iid + "\n" +
        "⏰ " + $ts')
      META=$(jq -nc \
        --arg step "pipeline-start" \
        --arg pn "${project_name}" \
        --arg d "${deliberate}" \
        --arg sid "${linear_session_id:-}" \
        --arg iid "${linear_issue_id:-}" \
        --arg ts "$RUN_TS" \
        '{step: $step, project_name: $pn, deliberate: $d, linear_session_id: $sid, linear_issue_id: $iid, time_utc: $ts}')
      echo "$MSG" | intake-util bridge-notify --from intake --to deliberation --metadata "$META" || true

  - id: register-run
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "register-run" "${audio_debug}" "project ${project_name}"
      RUN_TS=$(date +%s)
      if [ "${INTAKE_PREFLIGHT_BRIDGES_SKIP:-}" = "true" ]; then
        echo '{"registered":false,"run_id":"'"${project_name}-${RUN_TS}"'","skipped":"bridges_skip"}'
      else
        intake-util register-run \
          --run-id "${project_name}-${RUN_TS}" \
          --agent intake \
          --linear-session-id "${linear_session_id}" \
          --issue-id "${linear_issue_id}"
      fi

  - id: setup-repo
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "setup-repo" "${audio_debug}" "project ${project_name}"
      source "$root/scripts/scm-dispatch.sh"
      REPO_URL="${repository_url}"
      ORG="${github_org}"
      PROJECT="${project_name}"
      VISIBILITY="${github_visibility}"
      WEBHOOK_URL="${webhook_callback_url}"
      if [ -n "$REPO_URL" ] && [ "$REPO_URL" != "unnamed-project" ]; then
        case "$SCM_PROVIDER" in
          github) REPO_FULL=$(echo "$REPO_URL" | sed 's|https://github.com/||') ;;
          gitlab) REPO_FULL=$(echo "$REPO_URL" | sed "s|https://${SCM_GITLAB_HOST}/||") ;;
        esac
        echo "Using existing repository: $REPO_URL" >&2
      else
        REPO_FULL="${ORG}/${PROJECT}"
        REPO_URL=$(scm_repo_url "$REPO_FULL")
        echo "Creating repository: $REPO_FULL ($VISIBILITY)" >&2
        scm_create_repo "$REPO_FULL" "$VISIBILITY" "Generated by CTO intake pipeline"
        echo "Initializing default branch" >&2
        scm_init_file "$REPO_FULL" "README.md" "$(echo "# ${PROJECT}" | base64)" "chore: initialize repository"
      fi
      if [ -n "$WEBHOOK_URL" ]; then
        echo "Setting up webhook → $WEBHOOK_URL" >&2
        scm_create_webhook "$REPO_FULL" "$WEBHOOK_URL"
      fi
      echo "{\"repository_url\": \"${REPO_URL}\", \"repo_full\": \"${REPO_FULL}\"}"

  - id: create-linear-project
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_LOAD_CONFIG_JSON: $load-config.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "create-linear-project" "${audio_debug}" "project ${project_name}"
      TEAM_ID=$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.linear_team_id')
      intake-util sync-linear init \
        --project-name "${project_name}" \
        --team-id "$TEAM_ID" < "$WS/.intake/run-prd.txt"

  - id: verify-agent-resolution
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_CREATE_LINEAR_JSON: $create-linear-project.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "verify-agent-resolution" "${audio_debug}" "project ${project_name}"

      AGENT_MAP="$(printf '%s' "$CTO_CREATE_LINEAR_JSON" | jq -c '.agentMap // {}')"
      EXPECTED_AGENTS="morgan bolt rex grizz nova blaze tap spark cipher tess cleo atlas stitch angie"

      RESOLVED=0
      MISSING=""
      for agent in $EXPECTED_AGENTS; do
        uid="$(printf '%s' "$AGENT_MAP" | jq -r --arg a "$agent" '.[$a] // empty')"
        if [ -n "$uid" ]; then
          RESOLVED=$((RESOLVED + 1))
        else
          MISSING="${MISSING} ${agent}"
        fi
      done

      TOTAL=14
      echo "verify-agent-resolution: ${RESOLVED}/${TOTAL} agents resolved in Linear workspace" >&2
      if [ -n "$MISSING" ]; then
        echo "verify-agent-resolution: MISSING agents:${MISSING}" >&2
        echo "verify-agent-resolution: ensure these users exist in Linear and match naming convention (see intake/docs/linear-agent-assignment-checklist.md)" >&2
        if [ "${INTAKE_AGENT_GATE_SKIP:-false}" = "true" ] || [ "${INTAKE_AGENT_GATE_SKIP:-false}" = "1" ]; then
          echo "verify-agent-resolution: bypassed via INTAKE_AGENT_GATE_SKIP — issues for missing agents will be unassigned" >&2
        else
          "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "agent-resolution" "failed — missing:${MISSING}" "${audio_debug}" "alert" "project ${project_name}" || true
          exit 1
        fi
      else
        echo "verify-agent-resolution: all agents resolved ✓" >&2
      fi
      printf '%s\n' "$AGENT_MAP"

  - id: ensure-linear-session
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_CREATE_LINEAR_JSON: $create-linear-project.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "ensure-linear-session" "${audio_debug}" "project ${project_name}"
      SESSION_FILE="$WS/.intake/linear-session-id.txt"
      mkdir -p "$WS/.intake"
      if [ -n "${linear_session_id}" ]; then
        printf '%s' "${linear_session_id}" > "$SESSION_FILE"
        echo "ensure-linear-session: using provided session_id=${linear_session_id}" >&2
        jq -nc --arg sid "${linear_session_id}" '{linear_session_id: $sid}'
        exit 0
      fi
      ISSUE_REF_INPUT="$(printf '%s' "${linear_issue_id:-}" | sed -E 's#https?://linear.app/[^/]+/issue/([^/]+).*#\1#')"
      PRD_ISSUE_ID="$(printf '%s' "$CTO_CREATE_LINEAR_JSON" | jq -r '.prdIssueId // empty')"
      PRD_IDENTIFIER="$(printf '%s' "$CTO_CREATE_LINEAR_JSON" | jq -r '.prdIdentifier // empty')"
      ISSUE_REF="${ISSUE_REF_INPUT:-${PRD_ISSUE_ID:-$PRD_IDENTIFIER}}"
      echo "ensure-linear-session: ISSUE_REF='$ISSUE_REF' (input='$ISSUE_REF_INPUT' issueId='$PRD_ISSUE_ID' ident='$PRD_IDENTIFIER')" >&2
      if [ -z "$ISSUE_REF" ]; then
        echo "ensure-linear-session: missing issue reference (linear_issue_id or PRD issue)" >&2
        printf '' > "$SESSION_FILE"
        jq -nc '{linear_session_id: ""}'
        exit 0
      fi
      # Dismiss any existing agent sessions before creating new ones.
      # Reuse the current runtime token instead of reading a cached token from 1Password.
      MORGAN_OAUTH="${LINEAR_API_KEY:-}"
      if [ -n "$MORGAN_OAUTH" ]; then
        NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        EXISTING="$(curl -s -X POST https://api.linear.app/graphql \
          -H "Authorization: Bearer $MORGAN_OAUTH" -H "Content-Type: application/json" \
          --data-raw '{"query":"{ agentSessions(first: 20) { nodes { id dismissedAt issue { identifier } } } }"}')"
        printf '%s' "$EXISTING" | jq -r --arg ident "$ISSUE_REF" \
          '.data.agentSessions.nodes[] | select(.dismissedAt == null) | select(.issue.identifier == $ident) | .id' 2>/dev/null | while read -r OLD_SID; do
          curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: Bearer $MORGAN_OAUTH" -H "Content-Type: application/json" \
            --data-raw "{\"query\":\"mutation { agentSessionUpdate(id: \\\"$OLD_SID\\\", input: { dismissedAt: \\\"$NOW\\\" }) { success } }\"}" >/dev/null 2>&1
          echo "ensure-linear-session: dismissed old session $OLD_SID" >&2
        done
      fi
      code=$(curl -sS -o /tmp/linear_session_create_$$.json -w '%{http_code}' \
        -H "Authorization: Bearer ${LINEAR_API_KEY:?LINEAR_API_KEY required}" \
        -H "Content-Type: application/json" \
        -d "$(jq -nc --arg issue "$ISSUE_REF" \
          '{query:"mutation Create($input: AgentSessionCreateOnIssue!){ agentSessionCreateOnIssue(input:$input){ success agentSession { id } } }", variables:{input:{issueId:$issue}}}')" \
        https://api.linear.app/graphql)
      echo "ensure-linear-session: HTTP=$code response=$(cat /tmp/linear_session_create_$$.json | head -c 500)" >&2
      if [[ "$code" != "200" ]]; then
        echo "ensure-linear-session: Linear HTTP $code — session creation failed" >&2
        printf '' > "$SESSION_FILE"
        jq -nc '{linear_session_id: ""}'
        exit 0
      fi
      sid="$(jq -r '.data.agentSessionCreateOnIssue.agentSession.id // empty' /tmp/linear_session_create_$$.json)"
      if [ -z "$sid" ]; then
        echo "ensure-linear-session: could not extract session ID from response" >&2
        printf '' > "$SESSION_FILE"
        jq -nc '{linear_session_id: ""}'
        exit 0
      fi
      printf '%s' "$sid" > "$SESSION_FILE"
      echo "ensure-linear-session: SUCCESS session=$sid (written to $SESSION_FILE)" >&2
      jq -nc --arg sid "$sid" '{linear_session_id: $sid}'

  - id: session-url-repo
    env:
      CTO_ENSURE_LINEAR_SESSION_JSON: $ensure-linear-session.stdout
      CTO_SETUP_REPO_JSON: $setup-repo.stdout
    command: |
      root="${WORKSPACE:-.}"
      SESSION_ID="$(printf '%s' "$CTO_ENSURE_LINEAR_SESSION_JSON" | jq -r '.linear_session_id // empty' 2>/dev/null || true)"
      REPO_URL="$(printf '%s' "$CTO_SETUP_REPO_JSON" | jq -r '.repository_url // empty' 2>/dev/null || true)"
      REPO_WEB="$(printf '%s' "$REPO_URL" | sed -E 's#\.git$##')"
      if [ -n "$SESSION_ID" ] && [ -n "$REPO_WEB" ]; then
        intake-util linear-session update-urls \
          --session-id "$SESSION_ID" \
          --add-url "Repository=${REPO_WEB}" || true
      fi

  - id: build-infra-context
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "build-infra-context" "${audio_debug}" "project ${project_name}"
      kubectl cluster-info >/dev/null 2>&1 || { echo "ERROR: No cluster access — cannot build infrastructure context" >&2; exit 1; } &&
      echo "## Deployed Operators" &&
      kubectl get pods -n operators -o jsonpath='{range .items[*]}{.metadata.labels.app\.kubernetes\.io/name}{"\n"}{end}' \
        2>/dev/null | sort -u | sed 's/^/- /' &&
      echo "" &&
      echo "## ArgoCD Applications" &&
      (command -v argocd >/dev/null 2>&1 && [ -n "${ARGOCD_SERVER:-}" ] && argocd app list --output json 2>/dev/null | jq -r '.[] | "- \(.metadata.name) [\(.status.sync.status)] ns=\(.spec.destination.namespace)"' || echo "- (argocd skipped: set ARGOCD_SERVER, ensure argocd is on PATH, and run argocd login — or ignore for local runs)") &&
      echo "" &&
      echo "## Custom Resource Definitions" &&
      kubectl get crds -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null | grep -v 'argoproj\|cert-manager' | head -30 | sed 's/^/- /' &&
      echo "" &&
      echo "## Services (non-kube-system)" &&
      kubectl get svc --all-namespaces --no-headers 2>/dev/null | grep -v kube-system | awk '{print "- " $1 "/" $2 " (" $5 ")"}' | head -40

  - id: discover-tools
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "discover-tools" "${audio_debug}" "project ${project_name}"
      echo "## Agent Tool Registry (from cto-config.json)" &&
      python3 -c "
      import json, os
      config_path = os.path.join(os.environ.get('WORKSPACE', '.'), 'cto-config.json')
      with open(config_path) as f:
        c = json.load(f)
      tools = set()
      for agent_name, agent_cfg in c.get('agents', {}).items():
        for t in agent_cfg.get('tools', {}).get('remote', []):
          server = t.split('_')[0]
          tools.add(server)
      for t in sorted(tools):
        print(f'- {t}')
      " &&
      echo "" &&
      echo "## Cluster MCP Services" &&
      kubectl get svc -n operators -l 'app.kubernetes.io/component=mcp-server'
        -o jsonpath='{range .items[*]}- {.metadata.name} ({.spec.clusterIP}:{.spec.ports[0].port}){"\n"}{end}' 2>/dev/null || echo "- (no MCP services labeled)" &&
      echo "" &&
      echo "## Cluster Databases & Caches" &&
      kubectl get svc -n operators --no-headers 2>/dev/null | grep -iE 'postgres|redis|mysql|mongo|nats' | awk '{print "- " $1 " (" $5 ")"}' | head -20

  - id: codebase-analysis
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_LOAD_CONFIG_JSON: $load-config.stdout
      CTO_SETUP_REPO_JSON: $setup-repo.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "codebase-analysis" "${audio_debug}" "project ${project_name}"
      if [ "${include_codebase}" != "true" ] && [ "${include_codebase}" != "1" ]; then
        printf ''; exit 0; fi;
      WS="${WORKSPACE:-.}";
      ARGS=$(jq -n \
        --arg repository_url "$(printf '%s' "$CTO_SETUP_REPO_JSON" | jq -r '.repository_url')" \
        --arg branch "${pr_base_branch}" \
        --arg model_primary_provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.primary_provider')" \
        --arg model_primary "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.primary_model')" \
        --arg audio_debug "${audio_debug}" \
        '{repository_url: $repository_url, branch: $branch, model_primary_provider: $model_primary_provider, model_primary: $model_primary, audio_debug: $audio_debug}') &&
      lobster run --mode tool "$WS/intake/workflows/codebase-analysis.lobster.yaml" --args-json "$ARGS" || { "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "codebase-analysis failed" "${audio_debug}" "error" "project ${project_name}"; exit 1; }

  - id: initial-parse-prd
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_LOAD_CONFIG_JSON: $load-config.stdout
      CTO_CODEBASE_ANALYSIS_STDOUT: $codebase-analysis.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "initial-parse-prd" "${audio_debug}" "project ${project_name}"
      if [ "${deliberate}" != "true" ] && [ "${deliberate}" != "1" ]; then
        printf '[]'; exit 0; fi
      PRD_FILE="$WS/.intake/run-prd.txt"
      if [ ! -s "$PRD_FILE" ]; then
        echo "initial-parse-prd: PRD file missing or empty — skipping" >&2
        printf '[]'; exit 0
      fi
      CODEBASE_CTX="$(printf '%s' "$CTO_CODEBASE_ANALYSIS_STDOUT" | jq -r '.output[-1] // empty' 2>/dev/null || true)"
      DESIGN_CONTEXT_BRIEF="$(jq -r '[
        "mode=" + (.mode // "unknown"),
        "has_frontend=" + ((.hasFrontend // false) | tostring),
        "targets=" + ((.frontendTargets // []) | join("|")),
        "stitch_status=" + (.stitch.status // "unknown"),
        "stitch_reason=" + (.stitch.reason // "")
      ] | join("; ")' "$WS/.intake/design/design-context.json" 2>/dev/null || printf '')"
      EFFECTIVE_NUM_TASKS="${num_tasks}"
      if [ "$EFFECTIVE_NUM_TASKS" = "0" ] || [ -z "$EFFECTIVE_NUM_TASKS" ]; then
        EFFECTIVE_NUM_TASKS="0"
        NUM_TASKS_INSTRUCTION="as many tasks as the project scope requires (aim for thorough granularity — one task per deployable unit of work)"
      else
        NUM_TASKS_INSTRUCTION="exactly ${EFFECTIVE_NUM_TASKS}"
      fi
      ARGS=$(jq -n \
        --rawfile sys "$WS/intake/prompts/parse-prd-system.md" \
        --rawfile usr "$WS/intake/prompts/parse-prd-user.md" \
        --rawfile prd "$PRD_FILE" \
        --arg codebase "$CODEBASE_CTX" \
        --arg design_context "$DESIGN_CONTEXT_BRIEF" \
        --arg num_tasks "$NUM_TASKS_INSTRUCTION" \
        --argjson num_tasks_raw "$EFFECTIVE_NUM_TASKS" \
        --arg schema "$WS/intake/schemas/generated-task.schema.json" \
        --arg provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.fast_provider')" \
        --arg model "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.fast_model')" \
        '{ "prompt": ($sys + "\n\n" + $usr),
           "input": { "prd_content": $prd, "codebase_context": $codebase, "design_context": $design_context, "num_tasks": (if $num_tasks_raw > 0 then $num_tasks_raw else "auto" end), "num_tasks_instruction": $num_tasks, "next_id": 1 },
           "schema": $schema, "provider": $provider, "model": $model }') || {
        echo "initial-parse-prd: failed to build LLM args — falling back to empty tasks" >&2
        printf '[]'; exit 0
      }
      OUTPUT=$("$WS/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS") || {
        echo "initial-parse-prd: openclaw.invoke failed — falling back to empty tasks" >&2
        printf '[]'; exit 0
      }
      if [ -z "$OUTPUT" ] || ! printf '%s' "$OUTPUT" | jq -e 'type' >/dev/null 2>&1; then
        echo "initial-parse-prd: invalid JSON output — falling back to empty tasks" >&2
        printf '[]'; exit 0
      fi
      OUTPUT=$(printf '%s' "$OUTPUT" | jq '
        def parse_kv: split(": ") | {(.[0]): (.[1:] | join(": "))};
        def fix_colon_obj:
          [to_entries[] | (.key | parse_kv), (.value | tostring | parse_kv)] | add
          | if .requires_approval then .requires_approval |= (. == "true") else . end
          | if .options and (.options | type) == "string" then .options |= (try fromjson catch [.]) else . end;
        def fix_one_dp:
          if type == "string" then (try fromjson catch null)
          elif type == "object" then
            if has("id") and has("category") then .
            elif (keys | any(startswith("{"))) then
              (keys | map(select(startswith("{"))))[0] | try fromjson catch null
            elif (keys | any(contains(": "))) then
              fix_colon_obj
            else . end
          else null
          end;
        def fix_dp_array:
          if type == "array" and length > 0 and (.[0] | type) == "string" and (.[0] | startswith("{") | not) then
            [range(0; length; 2) as $i | {(.[($i)]): .[($i+1)]}] | add // {}
            | if .options and (.options | type) == "string" then .options |= (try fromjson catch [.]) else . end
            | [.]
          elif type == "array" then
            [.[] | fix_one_dp | select(. != null and type == "object" and has("id"))]
          else .
          end;
        [.[] | .decision_points = ((.decision_points // .decisionPoints // []) | fix_dp_array)]
      ' 2>/dev/null || printf '%s' "$OUTPUT")
      printf '%s' "$OUTPUT" > "$WS/.intake/initial-tasks.json"
      TASK_COUNT=$(printf '%s' "$OUTPUT" | jq 'if type=="array" then length else 0 end' 2>/dev/null || echo 0)
      echo "initial-parse-prd: parsed $TASK_COUNT tasks" >&2
      "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "initial-parse-prd" "parsed ${TASK_COUNT} tasks" "${audio_debug}" "normal" "project ${project_name}"
      printf '%s' "$OUTPUT"

  - id: validate-tasks
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_INITIAL_PARSE_PRD_STDOUT: $initial-parse-prd.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "validate-tasks" "${audio_debug}" "project ${project_name}"
      if [ "${deliberate}" != "true" ] && [ "${deliberate}" != "1" ]; then
        printf '{"valid":true,"skipped":true}'; exit 0; fi
      RESULT=$(cat "$WS/.intake/initial-tasks.json" | intake-util validate --type tasks --strict 2>&1) || true
      VALID=$(printf '%s' "$RESULT" | jq -r '.valid // false' 2>/dev/null || echo false)
      if [ "$VALID" = "true" ]; then
        "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "validate-tasks" "tasks validated successfully" "${audio_debug}" "normal" "project ${project_name}"
      else
        "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "validate-tasks" "task validation has warnings" "${audio_debug}" "wait" "project ${project_name}"
        echo "validate-tasks: warnings — $RESULT" >&2
        echo "$RESULT" | intake-util bridge-notify --from pipeline --to deliberation \
          --metadata '{"step":"validate-tasks","severity":"warning"}' || true
      fi
      printf '%s' "$RESULT"

  - id: extract-decision-points
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_LOAD_CONFIG_JSON: $load-config.stdout
      CTO_BUILD_INFRA_STDOUT: $build-infra-context.stdout
      CTO_CODEBASE_ANALYSIS_STDOUT: $codebase-analysis.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "extract-decision-points" "${audio_debug}" "project ${project_name}"
      if [ "${deliberate}" != "true" ] && [ "${deliberate}" != "1" ]; then
        printf '[]' > "$WS/.intake/decision-points.json"
        printf '[]'; exit 0; fi
      PRD_FILE="$WS/.intake/run-prd.txt"
      TASKS_FILE="$WS/.intake/initial-tasks.json"
      if [ ! -s "$PRD_FILE" ] || [ ! -s "$TASKS_FILE" ]; then
        echo "extract-decision-points: PRD or tasks file missing — skipping" >&2
        printf '[]' > "$WS/.intake/decision-points.json"
        printf '[]'; exit 0
      fi
      CODEBASE_CTX="$(printf '%s' "$CTO_CODEBASE_ANALYSIS_STDOUT" | jq -r '.output[-1] // empty' 2>/dev/null || true)"
      INFRA_CTX="$(printf '%s' "$CTO_BUILD_INFRA_STDOUT" 2>/dev/null || true)"
      DESIGN_CTX="$(jq -r '[
        "mode=" + (.mode // "unknown"),
        "has_frontend=" + ((.hasFrontend // false) | tostring),
        "targets=" + ((.frontendTargets // []) | join("|")),
        "stitch_status=" + (.stitch.status // "unknown")
      ] | join("; ")' "$WS/.intake/design/design-context.json" 2>/dev/null || printf '')"
      TASKS_SUMMARY=$(jq -r '
        "## Task Decomposition (" + (length | tostring) + " tasks)\n\n" +
        ([.[] |
          "### Task " + (.id | tostring) + ": " + .title + "\n" +
          "- Agent: " + .agent + " | Stack: " + .stack + "\n" +
          "- " + .description
        ] | join("\n\n"))' "$TASKS_FILE" 2>/dev/null || echo "")
      ARGS=$(jq -n \
        --rawfile sys "$WS/intake/prompts/extract-decision-points-system.md" \
        --rawfile prd "$PRD_FILE" \
        --arg tasks "$TASKS_SUMMARY" \
        --arg codebase_context "$CODEBASE_CTX" \
        --arg infrastructure_context "$INFRA_CTX" \
        --arg design_context "$DESIGN_CTX" \
        --arg schema "$WS/intake/schemas/project-decision-points.schema.json" \
        --arg provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.fast_provider')" \
        --arg model "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.fast_model')" \
        '{ "prompt": ($sys),
           "input": { "prd": $prd, "tasks": $tasks, "codebase_context": $codebase_context, "infrastructure_context": $infrastructure_context, "design_context": $design_context },
           "schema": $schema, "provider": $provider, "model": $model }') || {
        echo "extract-decision-points: failed to build LLM args" >&2
        printf '[]' > "$WS/.intake/decision-points.json"
        printf '[]'; exit 0
      }
      OUTPUT=$("$WS/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS") || {
        echo "extract-decision-points: openclaw.invoke failed" >&2
        printf '[]' > "$WS/.intake/decision-points.json"
        printf '[]'; exit 0
      }
      if [ -z "$OUTPUT" ] || ! printf '%s' "$OUTPUT" | jq -e 'type == "array"' >/dev/null 2>&1; then
        echo "extract-decision-points: invalid output — expected JSON array" >&2
        printf '[]' > "$WS/.intake/decision-points.json"
        printf '[]'; exit 0
      fi
      printf '%s' "$OUTPUT" > "$WS/.intake/decision-points.json"
      DP_COUNT=$(printf '%s' "$OUTPUT" | jq 'length' 2>/dev/null || echo 0)
      echo "extract-decision-points: extracted $DP_COUNT decision points" >&2
      "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "extract-decision-points" "extracted ${DP_COUNT} decision points" "${audio_debug}" "normal" "project ${project_name}"
      TASKS_WITH_DPS=$(jq --slurpfile dps "$WS/.intake/decision-points.json" '
        [.[] | . as $task | .decision_points = [
          $dps[0][] | select(.affected_tasks | index($task.id))
          | {id, category, description, options, requires_approval, constraint_type}
        ]]' "$TASKS_FILE" 2>/dev/null || cat "$TASKS_FILE")
      printf '%s' "$TASKS_WITH_DPS" > "$WS/.intake/initial-tasks.json"
      printf '%s' "$OUTPUT"

  - id: split-decision-points
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_DECISION_POINTS_STDOUT: $extract-decision-points.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "split-decision-points" "${audio_debug}" "project ${project_name}"
      ALL_DPS="$(cat "$WS/.intake/decision-points.json" 2>/dev/null || echo '[]')"
      if [ -z "$ALL_DPS" ] || ! printf '%s' "$ALL_DPS" | jq -e 'type == "array"' >/dev/null 2>&1; then
        ALL_DPS="[]"
      fi
      DESIGN_CATS='["ux-behavior","visual-identity","design-system","component-library","layout-pattern"]'
      TECH_DPS=$(printf '%s' "$ALL_DPS" | jq --argjson dc "$DESIGN_CATS" '[.[] | select(.category as $c | $dc | index($c) | not)]')
      DESIGN_DPS=$(printf '%s' "$ALL_DPS" | jq --argjson dc "$DESIGN_CATS" '[.[] | select(.category as $c | $dc | index($c))]')
      TECH_COUNT=$(printf '%s' "$TECH_DPS" | jq 'length')
      DESIGN_COUNT=$(printf '%s' "$DESIGN_DPS" | jq 'length')
      printf '%s' "$TECH_DPS" > "$WS/.intake/tech-decision-points.json"
      printf '%s' "$DESIGN_DPS" > "$WS/.intake/design-decision-points.json"
      echo "split-decision-points: $TECH_COUNT tech, $DESIGN_COUNT design" >&2
      "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "split-decision-points" "split: ${TECH_COUNT} tech, ${DESIGN_COUNT} design" "${audio_debug}" "normal" "project ${project_name}"
      jq -n \
        --argjson tech "$TECH_DPS" \
        --argjson design "$DESIGN_DPS" \
        --argjson tech_count "$TECH_COUNT" \
        --argjson design_count "$DESIGN_COUNT" \
        '{tech_decision_points: $tech, design_decision_points: $design, tech_count: $tech_count, design_count: $design_count}'

  - id: design-deliberation
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_SPLIT_DPS_JSON: $split-decision-points.stdout
      CTO_LOAD_CONFIG_JSON: $load-config.stdout
      CTO_ENSURE_LINEAR_SESSION_JSON: $ensure-linear-session.stdout
      CTO_CREATE_LINEAR_JSON: $create-linear-project.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "design-deliberation" "${audio_debug}" "project ${project_name}"
      DESIGN_DPS=$(printf '%s' "$CTO_SPLIT_DPS_JSON" | jq -c '.design_decision_points // []')
      DESIGN_COUNT=$(printf '%s' "$CTO_SPLIT_DPS_JSON" | jq -r '.design_count // 0')
      CANDIDATES_FILE="$WS/.intake/design/candidates.normalized.json"
      if [ ! -f "$CANDIDATES_FILE" ]; then
        CANDIDATES_FILE="$WS/.intake/design/stitch/candidates.json"
      fi
      MOCKUP_COUNT=0
      [ -f "$CANDIDATES_FILE" ] && MOCKUP_COUNT="$(jq '[.[] | select(.status == "generated")] | length' "$CANDIDATES_FILE" 2>/dev/null || echo 0)"
      STITCH_FILE="$WS/.intake/design/stitch/candidates.json"
      STITCH_COUNT=0
      [ -f "$STITCH_FILE" ] && STITCH_COUNT="$(jq '[.[] | select(.status == "generated")] | length' "$STITCH_FILE" 2>/dev/null || echo 0)"
      echo "design-deliberation-pipeline: DESIGN_COUNT=$DESIGN_COUNT MOCKUP_COUNT=$MOCKUP_COUNT STITCH_COUNT=$STITCH_COUNT" >&2

      if [ "$DESIGN_COUNT" -eq 0 ] && [ "$MOCKUP_COUNT" -eq 0 ]; then
        echo "design-deliberation: no design decision points or mockups — skipping" >&2
        jq -nc '{skipped: true, design_decisions: []}'
        exit 0
      fi

      # Create a SEPARATE Linear agent session for design deliberation (parallel to intake)
      PRD_ISSUE_ID="$(printf '%s' "$CTO_CREATE_LINEAR_JSON" | jq -r '.prdIssueId // empty')"
      PRD_IDENTIFIER="$(printf '%s' "$CTO_CREATE_LINEAR_JSON" | jq -r '.prdIdentifier // empty')"
      ISSUE_REF="${PRD_ISSUE_ID:-$PRD_IDENTIFIER}"
      DESIGN_LINEAR_SID=""
      DESIGN_SESSION_FILE="$WS/.intake/design-linear-session-id.txt"
      if [ -n "$ISSUE_REF" ]; then
        DESIGN_RESP="$(curl -sS \
          -H "Authorization: Bearer ${LINEAR_API_KEY:?}" \
          -H "Content-Type: application/json" \
          -d "$(jq -nc --arg issue "$ISSUE_REF" \
            '{query:"mutation Create($input: AgentSessionCreateOnIssue!){ agentSessionCreateOnIssue(input:$input){ success agentSession { id } } }", variables:{input:{issueId:$issue}}}')" \
          https://api.linear.app/graphql 2>/dev/null)"
        DESIGN_LINEAR_SID="$(printf '%s' "$DESIGN_RESP" | jq -r '.data.agentSessionCreateOnIssue.agentSession.id // empty')"
        echo "design-deliberation: created PARALLEL session=$DESIGN_LINEAR_SID" >&2
      fi
      if [ -n "$DESIGN_LINEAR_SID" ]; then
        printf '%s' "$DESIGN_LINEAR_SID" > "$DESIGN_SESSION_FILE"
      fi

      # Post assembly intro to the design session
      if [ -n "$DESIGN_LINEAR_SID" ]; then
        INTRO_BODY="$(printf '## 🎨 Design Deliberation\n\n**Mockups:** %s\n**Decision points:** %s\n\n**The design team is assembling:**\n🎨 **Designer** — crafting the visual identity\n🏛️ **Architect** — structural review\n⚖️ **Pragmatist** — practical constraints\n\n---\n\n*Reviewing design mockups and presenting options...*' \
          "$MOCKUP_COUNT" "$DESIGN_COUNT")"
        intake-util linear-activity --session-id "$DESIGN_LINEAR_SID" --type thought --body "$INTRO_BODY" >/dev/null 2>/dev/null || true
      fi

      # Post Stitch mockups to the DESIGN session (screenshot + upload to Linear)
      if [ "$STITCH_COUNT" -gt 0 ] && [ -n "$DESIGN_LINEAR_SID" ]; then
        SCREENSHOT_DIR="$WS/.intake/design/stitch/screenshots"
        mkdir -p "$SCREENSHOT_DIR"
        for i in $(seq 0 $((STITCH_COUNT - 1))); do
          HTML_URL="$(jq -r ".[$i].htmlUrl // empty" "$STITCH_FILE")"
          DEVICE="$(jq -r ".[$i].deviceType // \"unknown\"" "$STITCH_FILE")"
          TARGET="$(jq -r ".[$i].target // \"unknown\"" "$STITCH_FILE")"
          RATIONALE="$(jq -r ".[$i].rationale // \"\"" "$STITCH_FILE")"
          SCREEN_ID="$(jq -r ".[$i].screenId // \"unknown\"" "$STITCH_FILE")"
          HTML_LOCAL="$SCREENSHOT_DIR/mockup-$((i+1))-${DEVICE}.html"
          if [ -n "$HTML_URL" ]; then
            curl -sL "$HTML_URL" -o "$HTML_LOCAL" 2>/dev/null || true
          fi
          # Screenshot and upload to Linear
          IMG_MARKDOWN=""
          if [ -f "$HTML_LOCAL" ]; then
            UPLOAD_JSON="$("$WS/intake/scripts/upload-mockup-to-linear.sh" "$HTML_LOCAL" "$DEVICE" 2>/dev/null)" || true
            ASSET_URL="$(printf '%s' "$UPLOAD_JSON" | jq -r '.assetUrl // empty' 2>/dev/null)"
            if [ -n "$ASSET_URL" ]; then
              IMG_MARKDOWN="$(printf '\n\n![%s mockup — %s](%s)\n' "$TARGET" "$DEVICE" "$ASSET_URL")"
            fi
          fi
          MOCK_BODY="$(printf '## 🎨 Designer\n\n> *Crafting the visual identity — form follows function.*\n\n**Mockup %d:** %s (%s)\n**Screen:** `%s`%s\n\n%s' \
            "$((i + 1))" "$TARGET" "$DEVICE" "$SCREEN_ID" "$IMG_MARKDOWN" "$RATIONALE")"
          intake-util linear-activity --session-id "$DESIGN_LINEAR_SID" --type thought --body "$MOCK_BODY" >/dev/null 2>/dev/null || true
        done
      fi

      RUN_TS=$(date +%s)
      SESSION_ID="${project_name}-design-${RUN_TS}"
      LINEAR_SID="${DESIGN_LINEAR_SID}"
      if [ -z "$LINEAR_SID" ]; then
        LINEAR_SID="$(printf '%s' "$CTO_ENSURE_LINEAR_SESSION_JSON" | jq -r '.linear_session_id // empty')"
      fi
      echo "design-deliberation-pipeline: LINEAR_SID='${LINEAR_SID}' (design session)" >&2
      PRD_IDENT="$(printf '%s' "$CTO_CREATE_LINEAR_JSON" | jq -r '.prdIdentifier // empty')"
      LINEAR_ISSUE_URL=""
      if [ -n "$PRD_IDENT" ]; then
        LINEAR_ISSUE_URL="https://linear.app/jonathonfritz/issue/${PRD_IDENT}"
      fi
      ARGS=$(jq -n \
        --arg audio_debug "false" \
        --arg session_id "$SESSION_ID" \
        --arg design_decision_points "$DESIGN_DPS" \
        --arg linear_session_id "$LINEAR_SID" \
        --arg linear_issue_id "${linear_issue_id}" \
        --arg linear_issue_url "$LINEAR_ISSUE_URL" \
        --arg model_frontier_provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.frontier_provider')" \
        --arg model_frontier "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.frontier_model')" \
        '{audio_debug: $audio_debug, session_id: $session_id, design_decision_points: $design_decision_points, linear_session_id: $linear_session_id, linear_issue_id: $linear_issue_id, linear_issue_url: $linear_issue_url, model_frontier_provider: $model_frontier_provider, model_frontier: $model_frontier}')
      DELIB_DESIGN_OUT="$(lobster run --mode tool "$WS/intake/workflows/design-deliberation.lobster.yaml" --args-json "$ARGS" 2>"$WS/.intake/design-deliberation.log")" || {
        echo "design-deliberation sub-workflow failed — see $WS/.intake/design-deliberation.log" >&2
        cat "$WS/.intake/design-deliberation.log" >&2
        jq -nc '{skipped: false, failed: true, design_decisions: []}'
        exit 0
      }
      echo "design-deliberation-pipeline: sub-workflow stdout=$(printf '%s' "$DELIB_DESIGN_OUT" | head -c 500)" >&2
      printf '%s' "$DELIB_DESIGN_OUT"

  - id: deliberation
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_LOAD_CONFIG_JSON: $load-config.stdout
      CTO_BUILD_INFRA_STDOUT: $build-infra-context.stdout
      CTO_CODEBASE_ANALYSIS_STDOUT: $codebase-analysis.stdout
      CTO_ENSURE_LINEAR_SESSION_JSON: $ensure-linear-session.stdout
      CTO_MATERIALIZE_DESIGN_STDOUT: $materialize-design-inputs.stdout
      CTO_INITIAL_PARSE_PRD_STDOUT: $initial-parse-prd.stdout
      CTO_SPLIT_DPS_JSON: $split-decision-points.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "deliberation" "${audio_debug}" "project ${project_name}"
      if [ "${deliberate}" != "true" ] && [ "${deliberate}" != "1" ]; then
        printf '%s' '{"skipped":true}'; exit 0; fi;
      RUN_TS=$(date +%s);
      SESSION_ID="${project_name}-${RUN_TS}";
      CODEBASE_CTX="$(printf '%s' "$CTO_CODEBASE_ANALYSIS_STDOUT" | jq -r '.output[-1] // empty' 2>/dev/null || true)";
      DESIGN_CONTEXT_BRIEF="$(jq -r '[
        "mode=" + (.mode // "unknown"),
        "provider_mode=" + (.providerMode // "unknown"),
        "has_frontend=" + ((.hasFrontend // false) | tostring),
        "targets=" + ((.frontendTargets // []) | join("|")),
        "stitch_status=" + (.stitch.status // "unknown"),
        "stitch_reason=" + (.stitch.reason // ""),
        "framer_status=" + (.framer.status // "unknown"),
        "framer_reason=" + (.framer.reason // "")
      ] | join("; ")' "$WS/.intake/design/design-context.json" 2>/dev/null || printf '')";
      INITIAL_TASKS_JSON="$(printf '%s' "$CTO_INITIAL_PARSE_PRD_STDOUT")"
      if [ -z "$INITIAL_TASKS_JSON" ] || ! printf '%s' "$INITIAL_TASKS_JSON" | jq -e 'type' >/dev/null 2>&1; then
        INITIAL_TASKS_JSON="[]"
      fi
      DECISION_POINTS_JSON="$(cat "$WS/.intake/tech-decision-points.json" 2>/dev/null || cat "$WS/.intake/decision-points.json" 2>/dev/null || echo '[]')"
      if [ -z "$DECISION_POINTS_JSON" ] || ! printf '%s' "$DECISION_POINTS_JSON" | jq -e 'type' >/dev/null 2>&1; then
        DECISION_POINTS_JSON="[]"
      fi
      WS="${WORKSPACE:-.}";
      CTX_DIR="$WS/.intake/contexts"
      mkdir -p "$CTX_DIR"
      printf '%s' "$CTO_BUILD_INFRA_STDOUT" > "$CTX_DIR/infrastructure.txt"
      printf '%s' "$DESIGN_CONTEXT_BRIEF" > "$CTX_DIR/design.txt"
      printf '%s' "$CODEBASE_CTX" > "$CTX_DIR/codebase.txt"
      DELIB_LINEAR_SID="$(printf '%s' "$CTO_ENSURE_LINEAR_SESSION_JSON" | jq -r '.linear_session_id // empty')"
      echo "deliberation-pipeline: LINEAR_SID='${DELIB_LINEAR_SID}' from ensure-linear-session" >&2
      echo "deliberation-pipeline: CTO_ENSURE_LINEAR_SESSION_JSON='$(printf '%s' "$CTO_ENSURE_LINEAR_SESSION_JSON" | head -c 200)'" >&2
      ARGS=$(jq -n \
        --arg timebox_minutes "${timebox_minutes}" \
        --arg session_id "${SESSION_ID}" \
        --arg human_review_mode "human_required" \
        --arg verify "${verify}" \
        --arg breakpoints "${breakpoints}" \
        --arg linear_session_id "$DELIB_LINEAR_SID" \
        --arg model_frontier_provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.frontier_provider')" \
        --arg model_frontier "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.frontier_model')" \
        --arg voter_1_provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.voter_1_provider')" \
        --arg voter_1_model "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.voter_1_model')" \
        --arg voter_2_provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.voter_2_provider')" \
        --arg voter_2_model "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.voter_2_model')" \
        --arg voter_3_provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.voter_3_provider')" \
        --arg voter_3_model "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.voter_3_model')" \
        --arg parsed_tasks "$INITIAL_TASKS_JSON" \
        --arg decision_points_json "$DECISION_POINTS_JSON" \
        --arg audio_debug "false" \
        '{timebox_minutes: $timebox_minutes, session_id: $session_id, human_review_mode: $human_review_mode, verify: $verify, breakpoints: $breakpoints, linear_session_id: $linear_session_id, model_frontier_provider: $model_frontier_provider, model_frontier: $model_frontier, voter_1_provider: $voter_1_provider, voter_1_model: $voter_1_model, voter_2_provider: $voter_2_provider, voter_2_model: $voter_2_model, voter_3_provider: $voter_3_provider, voter_3_model: $voter_3_model, parsed_tasks: $parsed_tasks, decision_points_json: $decision_points_json, audio_debug: $audio_debug}') &&
      DELIB_OK=false
      DELIB_OUT=""
      for ATTEMPT in 1 2 3 4 5; do
        DELIB_OUT="$(lobster run --mode tool "$WS/intake/workflows/deliberation.lobster.yaml" --args-json "$ARGS" 2>&1)" && { DELIB_OK=true; break; }
        case "$DELIB_OUT" in
          *"HTTP Error 503"*|*"Service Unavailable"*|*"ECONNREFUSED"*|*"network"*)
            if [ "$ATTEMPT" -lt 5 ]; then
              BACKOFF=$((ATTEMPT * ATTEMPT * 5))
              "$WS/intake/scripts/workflow-gate-audio.sh" "pipeline" "deliberation-retry" "retrying after transient failure (attempt ${ATTEMPT}, waiting ${BACKOFF}s)" "${audio_debug}" "wait" "project ${project_name}, session ${SESSION_ID}"
              sleep "$BACKOFF"
              continue
            fi
            ;;
        esac
        break
      done
      [ "$DELIB_OK" = true ] && printf '%s\n' "$DELIB_OUT" || {
        printf '%s\n' "$DELIB_OUT" >&2
        FAIL_MSG="$(jq -n --arg sid "${SESSION_ID}" --arg pn "${project_name}" \
          '"❌ **Deliberation failed** for **" + $pn + "** (session `" + $sid + "`)."')"
        THREAD_META="$(jq -nc --arg step "deliberation-failed" --arg sid "${SESSION_ID}" --arg pn "${project_name}" \
          '{step:$step,session_id:$sid,project_name:$pn,severity:"error"}')"
        MAIN_META="$(jq -nc --arg step "deliberation-failed" --arg pn "${project_name}" \
          '{step:$step,project_name:$pn,severity:"error"}')"
        echo "$FAIL_MSG" | intake-util bridge-notify --from intake --to deliberation --metadata "$THREAD_META" || true
        echo "$FAIL_MSG" | intake-util bridge-notify --from intake --to deliberation --metadata "$MAIN_META" || true
        "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "deliberation failed" "${audio_debug}" "error" "project ${project_name}, session ${SESSION_ID}"
        exit 1
      }

  - id: notify-task-gen
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
      CTO_DESIGN_DELIB_STDOUT: $design-deliberation.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "notify-task-gen" "${audio_debug}" "project ${project_name}"
      DESIGN_STATUS=$(printf '%s' "$CTO_DESIGN_DELIB_STDOUT" | jq -r 'if .skipped == true then "skipped" elif .failed == true then "failed" else "completed" end' 2>/dev/null || echo "unknown")
      MSG=$(jq -n --arg pn "${project_name}" --arg ds "$DESIGN_STATUS" \
        '"🔨 **Deliberation wrapped up** — moving to task generation for **" + $pn + "**\n\n" +
        "📦 Compiling design brief into actionable tasks...\n" +
        "🎨 Design deliberation: " + $ds + "\n" +
        "🤖 Agents standing by for assignments."')
      META=$(jq -nc --arg step "task-gen-start" --arg pn "${project_name}" '{step:$step,project_name:$pn}')
      echo "$MSG" | intake-util bridge-notify --from intake --to deliberation --metadata "$META" || true
      # Rich Linear activity: pipeline context with project overview
      TASKS_LABEL="${num_tasks}"
      [ "$TASKS_LABEL" = "0" ] || [ -z "$TASKS_LABEL" ] && TASKS_LABEL="auto (model decides)"
      BODY=$(printf '## Pipeline: Task Generation\n\n**Project:** %s\n**Tasks requested:** %s\n**Design deliberation:** %s\n\n---\n\nParsing PRD and analyzing task complexity...' \
        "${project_name}" "$TASKS_LABEL" "$DESIGN_STATUS")
      intake-util linear-activity \
        --session-id "${linear_session_id}" \
        --type thought \
        --body "$BODY" >/dev/null || true

  - id: quality-gate-deliberation
    env:
      CTO_DELIBERATION_STDOUT: $deliberation.stdout
      CTO_LOAD_CONFIG_JSON: $load-config.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "quality-gate-deliberation" "${audio_debug}" "project ${project_name}"
      if [ "${INTAKE_ENABLE_LLM_GATES:-true}" != "true" ] && [ "${INTAKE_ENABLE_LLM_GATES:-true}" != "1" ]; then
        echo "quality-gate-deliberation: skipped (INTAKE_ENABLE_LLM_GATES disabled)" >&2
        printf '{"skipped":true}\n'
        exit 0
      fi
      if [ "${deliberate}" != "true" ] && [ "${deliberate}" != "1" ]; then
        printf '{"skipped":true,"reason":"deliberate=false"}\n'
        exit 0
      fi
      mkdir -p "$root/.intake/tmp"
      GATE_IN="$root/.intake/tmp/quality-gate-deliberation.txt"
      {
        echo "project=${project_name}"
        echo "deliberate=${deliberate}"
        echo
        echo "deliberation_stdout:"
        printf '%s\n' "$CTO_DELIBERATION_STDOUT"
        echo
        echo "design_brief_excerpt:"
        if [ -s "$root/.tasks/docs/design-brief.md" ]; then
          sed -n '1,180p' "$root/.tasks/docs/design-brief.md"
        else
          echo "__MISSING_OR_EMPTY__"
        fi
      } > "$GATE_IN"
      "$root/intake/scripts/quality-gate.sh" --stage "pipeline-deliberation" --input-file "$GATE_IN" --prompt "$root/intake/prompts/quality-gate-deliberation-system.md" --provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.fast_provider')" --model "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.fast_model')"

  - id: gateway-health-check
    env:
      INTAKE_AUDIO_MUTE: ${audio_mute_pre_intake}
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "gateway-health-check" "${audio_debug}" "project ${project_name}"
      if ! openclaw.invoke --tool llm-task --action json --args-json '{"prompt":"ping","input":{},"provider":"gemini","model":"gemini-2.5-flash"}' >/dev/null 2>&1; then
        echo "gateway-health-check: OpenClaw gateway unhealthy — restarting..." >&2
        pkill -f openclaw-gateway 2>/dev/null || true
        sleep 3
        if ! openclaw.invoke --tool llm-task --action json --args-json '{"prompt":"ping","input":{},"provider":"gemini","model":"gemini-2.5-flash"}' >/dev/null 2>&1; then
          echo "gateway-health-check: gateway still unhealthy after restart — proceeding anyway" >&2
        else
          echo "gateway-health-check: gateway recovered after restart" >&2
        fi
      else
        echo "gateway-health-check: OpenClaw gateway healthy" >&2
      fi
      printf '{"gateway":"checked"}'

  - id: intake
    env:
      CTO_LOAD_CONFIG_JSON: $load-config.stdout
      CTO_SETUP_REPO_JSON: $setup-repo.stdout
      CTO_CREATE_LINEAR_JSON: $create-linear-project.stdout
      CTO_REGISTER_RUN_JSON: $register-run.stdout
      CTO_ENSURE_LINEAR_SESSION_JSON: $ensure-linear-session.stdout
      CTO_BUILD_INFRA_STDOUT: $build-infra-context.stdout
      CTO_DISCOVER_TOOLS_STDOUT: $discover-tools.stdout
      CTO_CODEBASE_ANALYSIS_STDOUT: $codebase-analysis.stdout
      CTO_DELIBERATION_STDOUT: $deliberation.stdout
      CTO_MATERIALIZE_DESIGN_STDOUT: $materialize-design-inputs.stdout
    command: |
      WS="${WORKSPACE:-.}"
      "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "intake" "${audio_debug}" "project ${project_name}"
      CODEBASE_CTX="$(printf '%s' "$CTO_CODEBASE_ANALYSIS_STDOUT" | jq -r '.output[-1] // empty' 2>/dev/null || true)";
      DESIGN_CONTEXT_BRIEF="$(jq -r '[
        "mode=" + (.mode // "unknown"),
        "has_frontend=" + ((.hasFrontend // false) | tostring),
        "targets=" + ((.frontendTargets // []) | join("|")),
        "stitch_status=" + (.stitch.status // "unknown"),
        "stitch_reason=" + (.stitch.reason // "")
      ] | join("; ")' "$WS/.intake/design/design-context.json" 2>/dev/null || printf '')";
      WS="${WORKSPACE:-.}";
      INTAKE_PRD="$WS/.intake/run-prd-for-intake.txt"
      if [ "${deliberate}" = "true" ] || [ "${deliberate}" = "1" ]; then
        ENHANCED_PRD="$WS/.tasks/docs/design-brief.md"
        if [ -s "$ENHANCED_PRD" ]; then
          cp "$ENHANCED_PRD" "$INTAKE_PRD"
          echo "intake: using Enhanced PRD from deliberation ($ENHANCED_PRD)" >&2
        else
          BRIEF_RAW="$(printf '%s' "$CTO_DELIBERATION_STDOUT" | jq -r '(.output // [])
            | map(select(type=="string"))
            | map(select(test("^Design brief saved to "; "i") | not))
            | last // empty' 2>/dev/null || true)"
          if [ -n "$BRIEF_RAW" ] && [ "$BRIEF_RAW" != "null" ]; then
            printf '%s\n' "$BRIEF_RAW" > "$INTAKE_PRD"
            echo "intake: using design brief from deliberation stdout (fallback)" >&2
          else
            cp "$WS/.intake/run-prd.txt" "$INTAKE_PRD"
            echo "intake: using raw PRD (no deliberation output found)" >&2
          fi
        fi
      else
        cp "$WS/.intake/run-prd.txt" "$INTAKE_PRD"
      fi
      CTX_DIR="$WS/.intake/contexts"
      mkdir -p "$CTX_DIR"
      printf '%s' "$CTO_BUILD_INFRA_STDOUT" > "$CTX_DIR/infrastructure.txt"
      printf '%s' "$CTO_DISCOVER_TOOLS_STDOUT" > "$CTX_DIR/tools.txt"
      printf '%s' "$DESIGN_CONTEXT_BRIEF" > "$CTX_DIR/design.txt"
      printf '%s' "$CODEBASE_CTX" > "$CTX_DIR/codebase.txt"
      LOAD_CFG="$(printf '%s' "$CTO_LOAD_CONFIG_JSON")"
      INTAKE_MODEL_PRIMARY_PROVIDER="$(printf '%s' "$LOAD_CFG" | jq -r '.primary_provider')"
      INTAKE_MODEL_PRIMARY="$(printf '%s' "$LOAD_CFG" | jq -r '.primary_model')"
      # Always use the primary model for task generation/refinement.
      # Fast models produce corrupted subtask arrays; fast tier is still used
      # for fan-out docs/prompts which are simpler generation tasks.
      ARGS=$(jq -n \
        --arg prd_path ".tasks/docs/prd.txt" \
        --arg num_tasks_raw "${num_tasks}" \
        --arg project_name "${project_name}" \
        --arg intake_metadata "${intake_metadata}" \
        --arg pr_base_branch "${pr_base_branch}" \
        --arg linear_project_id "$(printf '%s' "$CTO_CREATE_LINEAR_JSON" | jq -r '.projectId')" \
        --arg linear_prd_issue_id "$(printf '%s' "$CTO_CREATE_LINEAR_JSON" | jq -r '.prdIssueId')" \
        --arg linear_team_id "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.linear_team_id')" \
        --arg linear_agent_map "$(printf '%s' "$CTO_CREATE_LINEAR_JSON" | jq -c '.agentMap')" \
        --arg pm_url "${PM_URL:-}" \
        --arg repository_url "$(printf '%s' "$CTO_SETUP_REPO_JSON" | jq -r '.repository_url')" \
        --arg verify "${verify}" \
        --arg breakpoints "${breakpoints}" \
        --arg linear_session_id "$(printf '%s' "$CTO_ENSURE_LINEAR_SESSION_JSON" | jq -r '.linear_session_id // empty')" \
        --arg linear_issue_id "${linear_issue_id}" \
        --arg run_id "$(printf '%s' "$CTO_REGISTER_RUN_JSON" | jq -r '.run_id // empty')" \
        --arg model_primary_provider "$INTAKE_MODEL_PRIMARY_PROVIDER" \
        --arg model_primary "$INTAKE_MODEL_PRIMARY" \
        --arg model_fast_provider "$(printf '%s' "$LOAD_CFG" | jq -r '.fast_provider')" \
        --arg model_fast "$(printf '%s' "$LOAD_CFG" | jq -r '.fast_model')" \
        --arg model_frontier_provider "$(printf '%s' "$LOAD_CFG" | jq -r '.frontier_provider')" \
        --arg model_frontier "$(printf '%s' "$LOAD_CFG" | jq -r '.frontier_model')" \
        --arg voter_1_provider "$(printf '%s' "$LOAD_CFG" | jq -r '.voter_1_provider')" \
        --arg voter_1_model "$(printf '%s' "$LOAD_CFG" | jq -r '.voter_1_model')" \
        --arg voter_2_provider "$(printf '%s' "$LOAD_CFG" | jq -r '.voter_2_provider')" \
        --arg voter_2_model "$(printf '%s' "$LOAD_CFG" | jq -r '.voter_2_model')" \
        --arg voter_3_provider "$(printf '%s' "$LOAD_CFG" | jq -r '.voter_3_provider')" \
        --arg voter_3_model "$(printf '%s' "$LOAD_CFG" | jq -r '.voter_3_model')" \
        --arg audio_debug "${audio_debug}" \
        '{prd_path: $prd_path, num_tasks: ($num_tasks_raw | tonumber), project_name: $project_name, intake_metadata: $intake_metadata, pr_base_branch: $pr_base_branch, linear_project_id: $linear_project_id, linear_prd_issue_id: $linear_prd_issue_id, linear_team_id: $linear_team_id, linear_agent_map: $linear_agent_map, pm_url: $pm_url, repository_url: $repository_url, verify: $verify, breakpoints: $breakpoints, linear_session_id: $linear_session_id, linear_issue_id: $linear_issue_id, run_id: $run_id, model_primary_provider: $model_primary_provider, model_primary: $model_primary, model_fast_provider: $model_fast_provider, model_fast: $model_fast, model_frontier_provider: $model_frontier_provider, model_frontier: $model_frontier, voter_1_provider: $voter_1_provider, voter_1_model: $voter_1_model, voter_2_provider: $voter_2_provider, voter_2_model: $voter_2_model, voter_3_provider: $voter_3_provider, voter_3_model: $voter_3_model, audio_debug: $audio_debug}') &&
      INTAKE_LOG="$WS/.intake/intake-sub-workflow.log"
      lobster run --mode tool "$WS/intake/workflows/intake.lobster.yaml" --args-json "$ARGS" >"$INTAKE_LOG" 2>&1 || {
        echo "intake sub-workflow failed — detailed log:" >&2
        tail -200 "$INTAKE_LOG" >&2
        "$WS/intake/scripts/workflow-step-audio.sh" "pipeline" "intake failed" "${audio_debug}" "error" "project ${project_name}"
        exit 1
      }

  - id: verify-intake-output
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "verify-intake-output" "${audio_debug}" "project ${project_name}"
      if [ ! -f "$root/.intake/intake-summary.json" ]; then
        "$root/intake/scripts/workflow-gate-audio.sh" "pipeline" "intake-output" "failed: intake-summary.json missing" "${audio_debug}" "error" "project ${project_name}"
        echo "verify-intake-output: .intake/intake-summary.json does not exist — intake workflow produced no artifacts" >&2
        exit 1
      fi
      TASK_COUNT="$(jq -r '.artifact_counts.task_count // 0' "$root/.intake/intake-summary.json" 2>/dev/null || echo 0)"
      SUBTASK_COUNT="$(jq -r '.artifact_counts.subtask_count // 0' "$root/.intake/intake-summary.json" 2>/dev/null || echo 0)"
      if [ "$TASK_COUNT" = "0" ] || [ "$TASK_COUNT" = "null" ]; then
        "$root/intake/scripts/workflow-gate-audio.sh" "pipeline" "intake-output" "failed: zero tasks generated" "${audio_debug}" "error" "project ${project_name}"
        echo "verify-intake-output: intake-summary.json exists but task_count is $TASK_COUNT — intake workflow failed to generate tasks" >&2
        cat "$root/.intake/intake-summary.json" >&2
        exit 1
      fi
      if [ "${INTAKE_REQUIRE_SUBTASKS:-true}" = "true" ] || [ "${INTAKE_REQUIRE_SUBTASKS:-true}" = "1" ]; then
        if [ "$SUBTASK_COUNT" = "0" ] || [ "$SUBTASK_COUNT" = "null" ]; then
          "$root/intake/scripts/workflow-gate-audio.sh" "pipeline" "intake-output" "failed: zero subtasks generated" "${audio_debug}" "error" "project ${project_name}"
          echo "verify-intake-output: intake-summary.json shows subtask_count=$SUBTASK_COUNT; subtasks are required" >&2
          cat "$root/.intake/intake-summary.json" >&2
          exit 1
        fi
      fi
      "$root/intake/scripts/workflow-gate-audio.sh" "pipeline" "intake-output" "passed with ${TASK_COUNT} tasks" "${audio_debug}" "normal" "project ${project_name}"

  - id: quality-gate-intake-output
    env:
      CTO_LOAD_CONFIG_JSON: $load-config.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "quality-gate-intake-output" "${audio_debug}" "project ${project_name}"
      if [ "${INTAKE_ENABLE_LLM_GATES:-true}" != "true" ] && [ "${INTAKE_ENABLE_LLM_GATES:-true}" != "1" ]; then
        echo "quality-gate-intake-output: skipped (INTAKE_ENABLE_LLM_GATES disabled)" >&2
        printf '{"skipped":true}\n'
        exit 0
      fi
      mkdir -p "$root/.intake/tmp"
      GATE_IN="$root/.intake/tmp/quality-gate-intake-output.txt"
      TASK_COUNT="$(jq 'length' "$root/.tasks/tasks/tasks.json" 2>/dev/null || echo 0)"
      SUBTASK_COUNT="$(jq '[.[] | (.subtasks // []) | length] | add // 0' "$root/.tasks/tasks/tasks.json" 2>/dev/null || echo 0)"
      {
        echo "project=${project_name}"
        echo
        echo "intake_summary:"
        jq -c '{
          project_name,
          generated_at,
          artifact_counts,
          delivery
        }' "$root/.intake/intake-summary.json" 2>/dev/null || true
        echo
        echo "summary:"
        echo "Pipeline intake output for ${project_name}: ${TASK_COUNT} tasks, ${SUBTASK_COUNT} subtasks. Bundle below includes compact snapshots for every generated task doc/prompt artifact."
        echo
        echo "task_summaries:"
        jq -c '[.[] | {
          id,
          title,
          agent,
          stack,
          priority,
          dependencies,
          subtask_count: ((.subtasks // []) | length),
          decision_point_count: ((.decision_points // []) | length),
          description: ((.description // "")[0:220]),
          test_strategy: ((.test_strategy // "")[0:220])
        }]' "$root/.tasks/tasks/tasks.json" 2>/dev/null || true
        echo
        for task_id in $(jq -r '.[].id' "$root/.tasks/tasks/tasks.json" 2>/dev/null); do
          echo "--- task_id=${task_id} ---"
          for section in task acceptance prompt; do
            f="$root/.tasks/docs/task-${task_id}/${section}.md"
            if [ -s "$f" ]; then
              size="$(wc -c < "$f" | tr -d ' ')"
              excerpt="$(tr '\n' ' ' < "$f" | sed 's/[[:space:]]\+/ /g' | cut -c1-220)"
              echo "${section}_size=${size}"
              echo "${section}_excerpt=${excerpt}"
            else
              echo "${section}_size=0"
              echo "${section}_excerpt=__MISSING_OR_EMPTY__"
            fi
          done
          echo
        done
      } > "$GATE_IN"
      "$root/intake/scripts/quality-gate.sh" --stage "pipeline-intake-output" --input-file "$GATE_IN" --provider "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.fast_provider')" --model "$(printf '%s' "$CTO_LOAD_CONFIG_JSON" | jq -r '.fast_model')"

  - id: sync-to-target-repo
    command: |
      root="$(cd "${WORKSPACE:-.}" && pwd)"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "sync-to-target-repo" "${audio_debug}" "project ${project_name}"
      TARGET="${target_repo_local_path}"
      if [ -z "$TARGET" ]; then
        echo "sync-to-target-repo: target_repo_local_path not set — skipping" >&2
        jq -nc '{"synced":false,"reason":"no target_repo_local_path"}'
        exit 0
      fi
      if [ ! -d "$TARGET/.git" ]; then
        echo "sync-to-target-repo: $TARGET is not a git repository — skipping" >&2
        jq -nc --arg path "$TARGET" '{"synced":false,"reason":"not a git repo","path":$path}'
        exit 0
      fi
      EXPECTED_URL="${repository_url}"
      if [ -n "$EXPECTED_URL" ]; then
        ACTUAL_URL="$(git -C "$TARGET" remote get-url origin 2>/dev/null || true)"
        ACTUAL_NORM="$(printf '%s' "$ACTUAL_URL" | sed 's/\.git$//')"
        EXPECTED_NORM="$(printf '%s' "$EXPECTED_URL" | sed 's/\.git$//')"
        if [ "$ACTUAL_NORM" != "$EXPECTED_NORM" ]; then
          echo "sync-to-target-repo: WARNING — origin mismatch: expected=$EXPECTED_NORM actual=$ACTUAL_NORM" >&2
        fi
      fi
      if [ ! -d "$root/.tasks" ]; then
        echo "sync-to-target-repo: no .tasks/ directory in workspace — nothing to sync" >&2
        jq -nc '{"synced":false,"reason":"no .tasks directory"}'
        exit 0
      fi
      cd "$TARGET"
      git checkout main 2>/dev/null || true
      git pull --ff-only origin main 2>/dev/null || true
      rm -rf "$TARGET/.tasks"
      rsync -a "$root/.tasks/" "$TARGET/.tasks/"
      BRANCH_NAME="intake/${project_name}-$(date +%Y%m%d-%H%M%S)"
      git checkout -b "$BRANCH_NAME" 2>/dev/null || {
        echo "sync-to-target-repo: branch $BRANCH_NAME exists — using current branch" >&2
        BRANCH_NAME="$(git rev-parse --abbrev-ref HEAD)"
      }
      git config user.email "morgan@5dlabs.io"
      git config user.name "Morgan (Intake Agent)"
      git add .tasks/
      if git diff --staged --quiet 2>/dev/null; then
        echo "sync-to-target-repo: no changes to commit in target repo" >&2
        jq -nc --arg branch "$BRANCH_NAME" '{"synced":false,"reason":"no changes","branch":$branch}'
        exit 0
      fi
      TASK_COUNT="$(jq -r '.artifact_counts.task_count // 0' "$root/.intake/intake-summary.json" 2>/dev/null || echo 0)"
      git diff --staged --stat
      git commit \
        -m "feat(intake): generated ${TASK_COUNT} tasks for ${project_name}" \
        -m "Generated by Morgan intake pipeline." \
        -m "Contains docs/design-brief.md, docs/research-prd.json when available, docs/, tasks/, and design/ artifacts." || {
        echo "sync-to-target-repo: git commit failed" >&2
        jq -nc '{"synced":false,"reason":"commit failed"}'
        exit 1
      }
      git push origin "$BRANCH_NAME" 2>&1 || {
        echo "sync-to-target-repo: git push failed" >&2
        jq -nc --arg branch "$BRANCH_NAME" '{"synced":false,"reason":"push failed","branch":$branch}'
        exit 1
      }
      PR_URL=""
      if command -v gh >/dev/null 2>&1; then
        PR_BODY_FILE="$(mktemp)"
        if [ -x "$root/intake/scripts/generate-pr-body.sh" ]; then
          "$root/intake/scripts/generate-pr-body.sh" "$root" "${project_name}" > "$PR_BODY_FILE"
        else
          {
            printf '%s\n' '## Intake Pipeline Output'
            printf '\n'
            printf '%s\n' 'Generated by Morgan intake pipeline (Lobster).'
            printf '\n'
            printf '**Tasks:** %s\n' "$TASK_COUNT"
            printf '**Project:** %s\n' "${project_name}"
          } > "$PR_BODY_FILE"
        fi
        PR_CREATE_OUTPUT="$(gh pr create \
          --title "feat(intake): ${project_name} task breakdown" \
          --body-file "$PR_BODY_FILE" \
          --base main 2>&1)" || {
          echo "sync-to-target-repo: gh pr create failed: $PR_CREATE_OUTPUT" >&2
          PR_URL="none"
        }
        if [ -z "$PR_URL" ]; then
          PR_URL="$PR_CREATE_OUTPUT"
        fi
        rm -f "$PR_BODY_FILE"
      else
        echo "sync-to-target-repo: gh CLI not available — PR not created" >&2
        PR_URL="none"
      fi
      jq -nc --arg pr_url "$PR_URL" --arg branch "$BRANCH_NAME" --arg target "$TARGET" \
        '{"synced":true,"pr_url":$pr_url,"branch":$branch,"target_repo":$target}'

  - id: notify-pipeline-complete
    env:
      CTO_REGISTER_RUN_JSON: $register-run.stdout
      CTO_SYNC_TARGET_REPO_JSON: $sync-to-target-repo.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "notify-pipeline-complete" "${audio_debug}" "project ${project_name}"
      TARGET_PR="$(printf '%s' "$CTO_SYNC_TARGET_REPO_JSON" | jq -r '.pr_url // empty' 2>/dev/null || true)"
      TARGET_SYNCED="$(printf '%s' "$CTO_SYNC_TARGET_REPO_JSON" | jq -r '.synced // false' 2>/dev/null || echo false)"
      RUN_ID="$(printf '%s' "$CTO_REGISTER_RUN_JSON" | jq -r '.run_id // empty')"
      if [ -n "$RUN_ID" ]; then
        ACTIVE_COUNT="$(sqlite3 "$root/.intake/bridge-state.db" "select count(*) from runs where run_id = '$RUN_ID';" 2>/dev/null || printf '0')"
        if [ "$ACTIVE_COUNT" != "1" ]; then
          echo "notify-pipeline-complete: suppressing completion notify for inactive run $RUN_ID" >&2
          exit 0
        fi
      fi
      START_EPOCH="$(cat "$root/.intake/.pipeline-start-epoch" 2>/dev/null || date +%s)"
      ELAPSED=$(( $(date +%s) - START_EPOCH ))
      MINS=$(( ELAPSED / 60 ))
      SECS=$(( ELAPSED % 60 ))
      SUMMARY_JSON="$(cat "$root/.intake/intake-summary.json" 2>/dev/null || printf '{}')"
      TASK_COUNT="$(printf '%s' "$SUMMARY_JSON" | jq -r '.artifact_counts.task_count // 0' 2>/dev/null || echo 0)"
      if [ "$TASK_COUNT" = "0" ] || [ "$TASK_COUNT" = "null" ]; then
        MSG=$(jq -n \
          --arg pn "${project_name}" \
          --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --arg dur "${MINS}m ${SECS}s" \
          '"❌ **INTAKE FAILED** ❌\n\n" +
          "🏁 Project **" + $pn + "** completed the pipeline but **produced zero artifacts**.\n" +
          "📋 Expanded tasks: 0\n" +
          "⏱️ Total time: " + $dur + "\n" +
          "⏰ Failed at " + $ts + "\n\n" +
          "🔍 Check the lobster run terminal output and OpenClaw gateway logs for errors.\n" +
          "🦞 *The intake workflow ran but did not generate any tasks, docs, or prompts.*"')
        META=$(jq -nc \
          --arg step "pipeline-failed" \
          --arg pn "${project_name}" \
          --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          '{step: $step, project_name: $pn, time_utc: $ts, severity: "error"}')
        echo "$MSG" | intake-util bridge-notify --from intake --to deliberation --metadata "$META" || true
        exit 1
      fi
      MSG=$(jq -n \
        --arg pn "${project_name}" \
        --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --arg dur "${MINS}m ${SECS}s" \
        --arg target_synced "$TARGET_SYNCED" \
        --arg target_pr "$TARGET_PR" \
        --argjson summary "$SUMMARY_JSON" \
        '"🎉🎉🎉 **INTAKE HANDOFF READY!** 🎉🎉🎉\n\n" +
        "🏁 Project **" + $pn + "** has finished the full intake handoff.\n" +
        "🧭 Decision record: `" + ($summary.decision_record_path // ".tasks/docs/design-brief.md") + "`\n" +
        "📋 Expanded tasks: " + (($summary.artifact_counts.task_count // 0) | tostring)
          + "  (" + (($summary.artifact_counts.subtask_count // 0) | tostring) + " subtasks, "
          + (($summary.artifact_counts.decision_point_count // 0) | tostring) + " decision points)\n" +
        "📝 Docs: " + (($summary.artifact_counts.doc_count // 0) | tostring)
          + "  •  Prompts: " + (($summary.artifact_counts.prompt_count // 0) | tostring)
          + "  •  Workflows: " + (($summary.artifact_counts.workflow_count // 0) | tostring) + "\n" +
        "🧩 Linear issues: " + (($summary.delivery.issue_count // 0) | tostring) + "\n" +
        (if (($summary.delivery.pr_url // "") | length) > 0
          then "🔗 PR: " + ($summary.delivery.pr_url // "") + "\n"
          else "" end) +
        (if ($target_synced == "true") and (($target_pr // "") | length) > 0
          then "🎯 Target repo PR: " + $target_pr + "\n"
          else "" end) +
        "⏱️ Total time: " + $dur + "\n" +
        "⏰ Finished at " + $ts + "\n\n" +
        "🦞 *Woohoo! The intake package is ready for implementation.* 🚀"')
      META=$(jq -nc \
        --arg step "pipeline-complete" \
        --arg pn "${project_name}" \
        --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        '{step: $step, project_name: $pn, time_utc: $ts}')
      echo "$MSG" | intake-util bridge-notify --from intake --to deliberation --metadata "$META" || true

  - id: deregister-run
    env:
      CTO_REGISTER_RUN_JSON: $register-run.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "pipeline" "deregister-run" "${audio_debug}" "project ${project_name}"
      if [ "${INTAKE_PREFLIGHT_BRIDGES_SKIP:-}" = "true" ]; then
        echo "deregister-run: skipped (bridges not available)" >&2
      else
        intake-util deregister-run \
          --run-id "$(printf '%s' "$CTO_REGISTER_RUN_JSON" | jq -r '.run_id // empty')"
      fi
