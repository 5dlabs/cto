name: pipeline
description: >
  Top-level intake pipeline — optionally analyzes an existing codebase,
  runs the Optimist/Pessimist deliberation phase, then feeds the resulting
  context (codebase + design brief, or raw PRD) into the task-generation
  intake workflow.

inputs:
  - name: prd_content
    type: string
    description: "Full PRD markdown content"
  - name: project_name
    type: string
    default: "project"
    description: "Short project slug used for branch names and PR titles"
  - name: num_tasks
    type: number
    default: 10
    description: "Target number of top-level tasks to generate"
  - name: include_codebase
    type: boolean
    default: false
    description: "When true, analyze existing repo via Repomix/OctoCode before task generation"
  - name: repository_url
    type: string
    default: ""
    description: "Existing GitHub repository URL. If empty, a new repo is created from project_name."
  - name: github_org
    type: string
    default: "5dlabs"
    description: "GitHub org for new repo creation (ignored when repository_url is set)"
  - name: github_visibility
    type: string
    default: "private"
    description: "Visibility for new repos: 'public' or 'private'"
  - name: webhook_callback_url
    type: string
    default: ""
    description: "PM server webhook URL. If set, a GitHub webhook is created on the repo."
  - name: deliberate
    type: boolean
    default: true
    description: "When true, run Optimist/Pessimist deliberation before task generation"
  - name: timebox_minutes
    type: number
    default: 30
    description: "Deliberation timebox in minutes (ignored when deliberate=false)"
  - name: infrastructure_context
    type: string
    default: ""
    description: "Available operators and services (injected from cluster state)"
  - name: intake_metadata
    type: string
    default: ""
    description: "JSON string of Linear metadata for PR body"
  - name: pr_base_branch
    type: string
    default: "main"
    description: "Base branch for the PR"
  - name: linear_session_id
    type: string
    default: ""
    description: "Linear session ID for activity tracking"
  - name: linear_issue_id
    type: string
    default: ""
    description: "Linear issue ID for plan updates"
  - name: verify
    type: string
    default: "true"
    description: "When true, validate outputs after each major step"
  - name: breakpoints
    type: string
    default: "false"
    description: "When true, pause for human approval at key checkpoints"

steps:
  # ─────────────────────────────────────────────────────────
  # Phase 0: Load model configuration from cto-config.json
  # Reads tiers (primary/fast/frontier) and committee models,
  # outputs flat key-value pairs for downstream steps.
  # ─────────────────────────────────────────────────────────
  - name: load-config
    description: "Load model tiers and committee config from cto-config.json"
    command: >
      python3 -c "
      import json, os
      config_path = os.path.join(os.environ.get('WORKSPACE', '.'), 'cto-config.json')
      with open(config_path) as f:
        c = json.load(f)
      t = c.get('defaults',{}).get('intake',{}).get('models',{}).get('tiers',{})
      cm = c.get('defaults',{}).get('intake',{}).get('models',{}).get('committee',[])
      r = {}
      for k in ['primary','fast','frontier']:
        d = t.get(k,{})
        r[k+'_provider'] = d.get('provider','anthropic')
        r[k+'_model'] = d.get('model','claude-sonnet-4-6')
      for i,v in enumerate(cm):
        r['voter_%d_provider'%(i+1)] = v.get('provider','anthropic')
        r['voter_%d_model'%(i+1)] = v.get('model','claude-sonnet-4-6')
      lin = c.get('defaults',{}).get('linear',{})
      r['linear_team_id'] = lin.get('teamId','')
      print(json.dumps(r))
      "

  - name: register-run
    depends_on: [load-config]
    description: "Register pipeline run for tracking"
    command: >
      intake-util register-run
        --run-id "{{inputs.project_name}}-{{timestamp}}"
        --agent intake
        --linear-session-id "{{inputs.linear_session_id}}"
        --issue-id "{{inputs.linear_issue_id}}"

  # ─────────────────────────────────────────────────────────
  # Phase 0-repo: Ensure GitHub repository exists
  # If repository_url is provided, validates it exists.
  # If not, creates a new repo under the configured org and
  # attaches a webhook for PR merge notifications.
  # ─────────────────────────────────────────────────────────
  - name: setup-repo
    description: "Create or verify GitHub repository and attach webhook"
    depends_on: [load-config]
    command: >
      REPO_URL="{{inputs.repository_url}}"
      ORG="{{inputs.github_org}}"
      PROJECT="{{inputs.project_name}}"
      VISIBILITY="{{inputs.github_visibility}}"
      WEBHOOK_URL="{{inputs.webhook_callback_url}}"

      if [ -n "$REPO_URL" ] && [ "$REPO_URL" != "unnamed-project" ]; then
        REPO_FULL=$(echo "$REPO_URL" | sed 's|https://github.com/||')
        echo "Using existing repository: $REPO_URL" >&2
      else
        REPO_FULL="${ORG}/${PROJECT}"
        REPO_URL="https://github.com/${REPO_FULL}"
        echo "Creating repository: $REPO_FULL ($VISIBILITY)" >&2
        gh repo create "$REPO_FULL" --"$VISIBILITY" --description "Generated by CTO intake pipeline" --clone=false 2>&1 || true
        echo "Initializing default branch" >&2
        gh api "repos/${REPO_FULL}/contents/README.md" \
          -X PUT \
          -f message="chore: initialize repository" \
          -f content="$(echo "# ${PROJECT}" | base64)" \
          --silent 2>&1 || true
      fi

      if [ -n "$WEBHOOK_URL" ]; then
        echo "Setting up webhook → $WEBHOOK_URL" >&2
        gh api "repos/${REPO_FULL}/hooks" \
          -X POST \
          -f name=web \
          -f "config[url]=${WEBHOOK_URL}" \
          -f "config[content_type]=json" \
          -f "config[insecure_ssl]=0" \
          -f "events[]=pull_request" \
          -f "events[]=check_run" \
          -f "events[]=issue_comment" \
          -f active=true \
          --silent 2>&1 || echo "Webhook may already exist" >&2
      fi

      echo "{\"repository_url\": \"${REPO_URL}\", \"repo_full\": \"${REPO_FULL}\"}"

  # ─────────────────────────────────────────────────────────
  # Phase 0-lin: Create Linear project and PRD issue
  # Gives stakeholders immediate visibility into the pipeline
  # run as soon as config is loaded.
  # ─────────────────────────────────────────────────────────
  - name: create-linear-project
    description: "Create Linear project and PRD issue for early visibility"
    depends_on: [load-config]
    command: >
      echo '{{inputs.prd_content}}' |
      intake-util sync-linear init
        --project-name "{{inputs.project_name}}"
        --team-id "${{ steps.load-config.output | jq -r '.linear_team_id' }}"

  # ─────────────────────────────────────────────────────────
  # Phase 0a: Build Infrastructure Context
  # Reads the static operator catalog and formats it as structured
  # context for downstream steps (deliberation, task generation).
  # This runs unconditionally so agents always know what infra
  # is available in the cluster.
  # ─────────────────────────────────────────────────────────
  - name: build-infra-context
    description: "Query cluster for live infrastructure context"
    command: >
      kubectl cluster-info >/dev/null 2>&1 || { echo "ERROR: No cluster access — cannot build infrastructure context" >&2; exit 1; } &&
      echo "## Deployed Operators" &&
      kubectl get pods -n operators -o jsonpath='{range .items[*]}{.metadata.labels.app\.kubernetes\.io/name}{"\n"}{end}' \
        2>/dev/null | sort -u | sed 's/^/- /' &&
      echo "" &&
      echo "## ArgoCD Applications" &&
      (command -v argocd >/dev/null 2>&1 && [ -n "${ARGOCD_SERVER:-}" ] && argocd app list --output json 2>/dev/null | jq -r '.[] | "- \(.metadata.name) [\(.status.sync.status)] ns=\(.spec.destination.namespace)"' || echo "- (argocd skipped: set ARGOCD_SERVER, ensure argocd is on PATH, and run argocd login — or ignore for local runs)") &&
      echo "" &&
      echo "## Custom Resource Definitions" &&
      kubectl get crds -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null | grep -v 'argoproj\|cert-manager' | head -30 | sed 's/^/- /' &&
      echo "" &&
      echo "## Services (non-kube-system)" &&
      kubectl get svc --all-namespaces --no-headers 2>/dev/null | grep -v kube-system | awk '{print "- " $1 "/" $2 " (" $5 ")"}' | head -40

  # ─────────────────────────────────────────────────────────
  # Phase 0a-tools: Discover available MCP tools
  # Queries cto-config.json for agent tool registrations and
  # the cluster for MCP-related services. Produces a text
  # inventory passed to intake for tool manifest generation.
  # ─────────────────────────────────────────────────────────
  - name: discover-tools
    description: "Discover available MCP tools from config and cluster"
    depends_on: [load-config]
    command: >
      echo "## Agent Tool Registry (from cto-config.json)" &&
      python3 -c "
      import json, os
      config_path = os.path.join(os.environ.get('WORKSPACE', '.'), 'cto-config.json')
      with open(config_path) as f:
        c = json.load(f)
      tools = set()
      for agent_name, agent_cfg in c.get('agents', {}).items():
        for t in agent_cfg.get('tools', {}).get('remote', []):
          server = t.split('_')[0]
          tools.add(server)
      for t in sorted(tools):
        print(f'- {t}')
      " &&
      echo "" &&
      echo "## Cluster MCP Services" &&
      kubectl get svc -n operators -l 'app.kubernetes.io/component=mcp-server'
        -o jsonpath='{range .items[*]}- {.metadata.name} ({.spec.clusterIP}:{.spec.ports[0].port}){"\n"}{end}' 2>/dev/null || echo "- (no MCP services labeled)" &&
      echo "" &&
      echo "## Cluster Databases & Caches" &&
      kubectl get svc -n operators --no-headers 2>/dev/null | grep -iE 'postgres|redis|mysql|mongo|nats' | awk '{print "- " $1 " (" $5 ")"}' | head -20

  # ─────────────────────────────────────────────────────────
  # Phase 0b: Codebase Analysis (conditional)
  # For non-greenfield projects, pack and analyze the existing
  # repository to produce structured context that informs both
  # the deliberation debate and the task generation.
  # ─────────────────────────────────────────────────────────
  - name: codebase-analysis
    when: "{{inputs.include_codebase}}"
    depends_on: [load-config, setup-repo]
    workflow: codebase-analysis.lobster.yaml
    inputs:
      repository_url: "${{ steps.setup-repo.output | jq -r '.repository_url' }}"
      prd_content: "{{inputs.prd_content}}"
      branch: "{{inputs.pr_base_branch}}"
      model_primary_provider: "${{ steps.load-config.output | jq -r '.primary_provider' }}"
      model_primary: "${{ steps.load-config.output | jq -r '.primary_model' }}"

  # ─────────────────────────────────────────────────────────
  # Phase 1: Deliberation (conditional)
  # Runs the Optimist/Pessimist debate to produce a design brief
  # that resolves architectural decision points before task generation.
  # When codebase analysis ran, its context is passed to the debate
  # agents so they can reference existing architecture.
  # ─────────────────────────────────────────────────────────
  - name: deliberation
    when: "{{inputs.deliberate}}"
    depends_on: [load-config, build-infra-context, codebase-analysis]
    workflow: deliberation.lobster.yaml
    inputs:
      prd_content: "{{inputs.prd_content}}"
      timebox_minutes: "{{inputs.timebox_minutes}}"
      session_id: "{{inputs.project_name}}-{{timestamp}}"
      infrastructure_context: "${{ steps.build-infra-context.output }}"
      human_review_mode: "full_auto"
      verify: "{{inputs.verify}}"
      breakpoints: "{{inputs.breakpoints}}"
      linear_session_id: "{{inputs.linear_session_id}}"
      model_frontier_provider: "${{ steps.load-config.output | jq -r '.frontier_provider' }}"
      model_frontier: "${{ steps.load-config.output | jq -r '.frontier_model' }}"
      voter_1_provider: "${{ steps.load-config.output | jq -r '.voter_1_provider' }}"
      voter_1_model: "${{ steps.load-config.output | jq -r '.voter_1_model' }}"
      voter_2_provider: "${{ steps.load-config.output | jq -r '.voter_2_provider' }}"
      voter_2_model: "${{ steps.load-config.output | jq -r '.voter_2_model' }}"
      voter_3_provider: "${{ steps.load-config.output | jq -r '.voter_3_provider' }}"
      voter_3_model: "${{ steps.load-config.output | jq -r '.voter_3_model' }}"
      voter_4_provider: "${{ steps.load-config.output | jq -r '.voter_4_provider' }}"
      voter_4_model: "${{ steps.load-config.output | jq -r '.voter_4_model' }}"
      voter_5_provider: "${{ steps.load-config.output | jq -r '.voter_5_provider' }}"
      voter_5_model: "${{ steps.load-config.output | jq -r '.voter_5_model' }}"
      codebase_context: >
        {{#if steps.codebase-analysis.outputs.codebase_context}}
          {{steps.codebase-analysis.outputs.codebase_context}}
        {{else}}
        {{/if}}

  # ─────────────────────────────────────────────────────────
  # Phase 2: Task generation
  # Uses the design brief from deliberation as the PRD content
  # when deliberation ran, otherwise uses the raw PRD directly.
  # Codebase context is passed through so the parse-prd step
  # can generate tasks that extend existing code.
  # ─────────────────────────────────────────────────────────
  - name: intake
    depends_on: [load-config, deliberation, codebase-analysis, build-infra-context, discover-tools, create-linear-project, setup-repo]
    workflow: intake.lobster.yaml
    inputs:
      prd_content: >
        {{#if steps.deliberation.outputs.design_brief}}
          {{steps.deliberation.outputs.design_brief}}
        {{else}}
          {{inputs.prd_content}}
        {{/if}}
      prd_path: ".tasks/docs/prd.txt"
      num_tasks: "{{inputs.num_tasks}}"
      project_name: "{{inputs.project_name}}"
      intake_metadata: "{{inputs.intake_metadata}}"
      pr_base_branch: "{{inputs.pr_base_branch}}"
      linear_project_id: "${{ steps.create-linear-project.output | jq -r '.projectId' }}"
      linear_prd_issue_id: "${{ steps.create-linear-project.output | jq -r '.prdIssueId' }}"
      linear_team_id: "${{ steps.load-config.output | jq -r '.linear_team_id' }}"
      linear_agent_map: "${{ steps.create-linear-project.output | jq -c '.agentMap' }}"
      repository_url: "${{ steps.setup-repo.output | jq -r '.repository_url' }}"
      verify: "{{inputs.verify}}"
      breakpoints: "{{inputs.breakpoints}}"
      linear_session_id: "{{inputs.linear_session_id}}"
      linear_issue_id: "{{inputs.linear_issue_id}}"
      run_id: "${{ steps.register-run.output | jq -r '.run_id // empty' }}"
      infrastructure_context: "${{ steps.build-infra-context.output }}"
      tool_context: "${{ steps.discover-tools.output }}"
      codebase_context: >
        {{#if steps.codebase-analysis.outputs.codebase_context}}
          {{steps.codebase-analysis.outputs.codebase_context}}
        {{else}}
        {{/if}}
      model_primary_provider: "${{ steps.load-config.output | jq -r '.primary_provider' }}"
      model_primary: "${{ steps.load-config.output | jq -r '.primary_model' }}"
      model_fast_provider: "${{ steps.load-config.output | jq -r '.fast_provider' }}"
      model_fast: "${{ steps.load-config.output | jq -r '.fast_model' }}"
      model_frontier_provider: "${{ steps.load-config.output | jq -r '.frontier_provider' }}"
      model_frontier: "${{ steps.load-config.output | jq -r '.frontier_model' }}"
      voter_1_provider: "${{ steps.load-config.output | jq -r '.voter_1_provider' }}"
      voter_1_model: "${{ steps.load-config.output | jq -r '.voter_1_model' }}"
      voter_2_provider: "${{ steps.load-config.output | jq -r '.voter_2_provider' }}"
      voter_2_model: "${{ steps.load-config.output | jq -r '.voter_2_model' }}"
      voter_3_provider: "${{ steps.load-config.output | jq -r '.voter_3_provider' }}"
      voter_3_model: "${{ steps.load-config.output | jq -r '.voter_3_model' }}"
      voter_4_provider: "${{ steps.load-config.output | jq -r '.voter_4_provider' }}"
      voter_4_model: "${{ steps.load-config.output | jq -r '.voter_4_model' }}"
      voter_5_provider: "${{ steps.load-config.output | jq -r '.voter_5_provider' }}"
      voter_5_model: "${{ steps.load-config.output | jq -r '.voter_5_model' }}"

  - name: deregister-run
    depends_on: [intake]
    description: "Deregister pipeline run"
    command: >
      intake-util deregister-run
        --run-id "${{ steps.register-run.output | jq -r '.run_id // empty' }}"

output_mappings:
  repository_url: ${{ steps.setup-repo.output | jq -r '.repository_url' }}
  infrastructure_context: ${{ steps.build-infra-context.output }}
  codebase_context: ${{ steps.codebase-analysis.outputs.codebase_context }}
  design_brief: ${{ steps.deliberation.outputs.design_brief }}
  deliberation_result: ${{ steps.deliberation.outputs.deliberation_result }}
  pr_url: ${{ steps.intake.outputs.pr_url }}
  linear_project_id: ${{ steps.create-linear-project.output | jq -r '.projectId' }}
  linear_prd_issue_id: ${{ steps.create-linear-project.output | jq -r '.prdIssueId' }}
  linear_issues: ${{ steps.intake.outputs.linear_issues }}
  run_id: ${{ steps.register-run.output | jq -r '.run_id // empty' }}
