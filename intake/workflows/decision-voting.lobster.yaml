name: decision-voting
description: >
  3-member committee vote on a single deliberation decision point.
  Reuses the parallel voting pattern from voting.lobster.yaml but with
  decision-point-specific prompts and elicitation for human-in-the-loop.

args:
  question:
    default: ""
  optimist_position:
    default: ""
  pessimist_position:
    default: ""
  context:
    default: ""
  question_file:
    default: ""
  optimist_file:
    default: ""
  pessimist_file:
    default: ""
  context_file:
    default: ""
  decision_id:
    default: ""
  session_id:
    default: ""
  human_review_mode:
    default: human_required
  verify:
    default: "true"
  audio_debug:
    default: "true"
  linear_issue_id:
    default: ""
  discord_channel_id:
    default: ""
  linear_session_id:
    default: ""
  voter_1_provider:
    default: gemini
  voter_1_model:
    default: claude-opus-4-6
  voter_2_provider:
    default: openai-api
  voter_2_model:
    default: gpt-5.3-codex
  voter_3_provider:
    default: gemini
  voter_3_model:
    default: gemini-2.5-flash

steps:
  - id: voter-1
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "decision-voting" "voter-1" "${audio_debug}"
      QF="${question_file}"; OF="${optimist_file}"; PF="${pessimist_file}"; CF="${context_file}"
      ARGS=$(jq -n \
        --rawfile p1 "$root/intake/prompts/voter-architect-soul.md" \
        --rawfile p2 "$root/intake/prompts/decision-vote-system.md" \
        --rawfile question "$QF" \
        --rawfile optimist "$OF" \
        --rawfile pessimist "$PF" \
        --rawfile context "$CF" \
        --arg schema "$root/intake/schemas/decision-vote-response.schema.json" \
        --arg provider "${voter_1_provider}" \
        --arg model "${voter_1_model}" \
        '{
          "prompt": ($p1 + "\n\n---\n\n" + $p2),
          "input": {
            "question": $question,
            "category": "architecture",
            "optimist_position": $optimist,
            "pessimist_position": $pessimist,
            "context": $context
          },
          "schema": $schema,
          "provider": $provider,
          "model": $model
        }')
      VOTE_OUT="$("$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS")"
      LV_BIN=""; command -v lobster-voice >/dev/null 2>&1 && LV_BIN="lobster-voice" || { [ -x "$root/apps/lobster-voice/lobster-voice" ] && LV_BIN="$root/apps/lobster-voice/lobster-voice"; }
      VOTE_SAY="$(printf '%s' "$VOTE_OUT" | jq -r '(.output[0] // .) | "I vote for " + (.chosen_option // .chosenOption // "undecided") + ". " + (.reasoning // .rationale // "")' 2>/dev/null || true)"
      [ -n "$LV_BIN" ] && [ -n "$VOTE_SAY" ] && WORKSPACE="$root" "$LV_BIN" debate voter-1 "$VOTE_SAY" --summarize || true
      printf '%s' "$VOTE_OUT"

  - id: voter-2
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "decision-voting" "voter-2" "${audio_debug}"
      QF="${question_file}"; OF="${optimist_file}"; PF="${pessimist_file}"; CF="${context_file}"
      ARGS=$(jq -n \
        --rawfile p1 "$root/intake/prompts/voter-pragmatist-soul.md" \
        --rawfile p2 "$root/intake/prompts/decision-vote-system.md" \
        --rawfile question "$QF" \
        --rawfile optimist "$OF" \
        --rawfile pessimist "$PF" \
        --rawfile context "$CF" \
        --arg schema "$root/intake/schemas/decision-vote-response.schema.json" \
        --arg provider "${voter_2_provider}" \
        --arg model "${voter_2_model}" \
        '{
          "prompt": ($p1 + "\n\n---\n\n" + $p2),
          "input": {
            "question": $question,
            "category": "architecture",
            "optimist_position": $optimist,
            "pessimist_position": $pessimist,
            "context": $context
          },
          "schema": $schema,
          "provider": $provider,
          "model": $model
        }')
      VOTE_OUT="$("$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS")"
      LV_BIN=""; command -v lobster-voice >/dev/null 2>&1 && LV_BIN="lobster-voice" || { [ -x "$root/apps/lobster-voice/lobster-voice" ] && LV_BIN="$root/apps/lobster-voice/lobster-voice"; }
      VOTE_SAY="$(printf '%s' "$VOTE_OUT" | jq -r '(.output[0] // .) | "I vote for " + (.chosen_option // .chosenOption // "undecided") + ". " + (.reasoning // .rationale // "")' 2>/dev/null || true)"
      [ -n "$LV_BIN" ] && [ -n "$VOTE_SAY" ] && WORKSPACE="$root" "$LV_BIN" debate voter-2 "$VOTE_SAY" --summarize || true
      printf '%s' "$VOTE_OUT"

  - id: voter-3
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "decision-voting" "voter-3" "${audio_debug}"
      QF="${question_file}"; OF="${optimist_file}"; PF="${pessimist_file}"; CF="${context_file}"
      ARGS=$(jq -n \
        --rawfile p1 "$root/intake/prompts/voter-minimalist-soul.md" \
        --rawfile p2 "$root/intake/prompts/decision-vote-system.md" \
        --rawfile question "$QF" \
        --rawfile optimist "$OF" \
        --rawfile pessimist "$PF" \
        --rawfile context "$CF" \
        --arg schema "$root/intake/schemas/decision-vote-response.schema.json" \
        --arg provider "${voter_3_provider}" \
        --arg model "${voter_3_model}" \
        '{
          "prompt": ($p1 + "\n\n---\n\n" + $p2),
          "input": {
            "question": $question,
            "category": "architecture",
            "optimist_position": $optimist,
            "pessimist_position": $pessimist,
            "context": $context
          },
          "schema": $schema,
          "provider": $provider,
          "model": $model
        }')
      VOTE_OUT="$("$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS")"
      LV_BIN=""; command -v lobster-voice >/dev/null 2>&1 && LV_BIN="lobster-voice" || { [ -x "$root/apps/lobster-voice/lobster-voice" ] && LV_BIN="$root/apps/lobster-voice/lobster-voice"; }
      VOTE_SAY="$(printf '%s' "$VOTE_OUT" | jq -r '(.output[0] // .) | "I vote for " + (.chosen_option // .chosenOption // "undecided") + ". " + (.reasoning // .rationale // "")' 2>/dev/null || true)"
      [ -n "$LV_BIN" ] && [ -n "$VOTE_SAY" ] && WORKSPACE="$root" "$LV_BIN" debate voter-3 "$VOTE_SAY" --summarize || true
      printf '%s' "$VOTE_OUT"

  - id: linear-activity-voter-1
    env:
      CTO_VOTER_1: $voter-1.stdout
    command: |
      root="${WORKSPACE:-.}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ] && LINEAR_SID="$(cat "$FALLBACK_FILE")"
      [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ] && LINEAR_SID="${linear_session_id}"
      if [ -n "$LINEAR_SID" ]; then
        VOTE_JSON="$(printf '%s' "$CTO_VOTER_1" | jq -c '(.output[0] // .)' 2>/dev/null || echo '{}')"
        CHOSEN="$(printf '%s' "$VOTE_JSON" | jq -r '.chosen_option // .chosenOption // "undecided"' 2>/dev/null)"
        REASONING="$(printf '%s' "$VOTE_JSON" | jq -r '.reasoning // .rationale // "No reasoning"' 2>/dev/null)"
        CONFIDENCE="$(printf '%s' "$VOTE_JSON" | jq -r '.confidence // 0.6' 2>/dev/null)"
        CONF_PCT="$(echo "$CONFIDENCE * 100" | bc 2>/dev/null || echo '60')"
        CONF_INT="${CONF_PCT%.*}"
        if [ "$CONF_INT" -ge 80 ] 2>/dev/null; then SENTIMENT="💪"; elif [ "$CONF_INT" -ge 60 ] 2>/dev/null; then SENTIMENT="🤔"; else SENTIMENT="⚠️"; fi
        BODY="$(printf '## 🏛️ Architect\n\n> *Evaluating structural integrity and long-term maintainability.*\n\n**Vote:** %s %s\n**Confidence:** %s%% %s\n**Model:** `%s`\n\n---\n\n%s' \
          "$CHOSEN" "$SENTIMENT" "$CONF_PCT" "$SENTIMENT" "${voter_1_model}" "$REASONING")"
        intake-util linear-activity \
          --session-id "$LINEAR_SID" \
          --type thought \
          --body "$BODY" >/dev/null || true
      fi

  - id: linear-activity-voter-2
    env:
      CTO_VOTER_2: $voter-2.stdout
    command: |
      root="${WORKSPACE:-.}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ] && LINEAR_SID="$(cat "$FALLBACK_FILE")"
      [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ] && LINEAR_SID="${linear_session_id}"
      if [ -n "$LINEAR_SID" ]; then
        VOTE_JSON="$(printf '%s' "$CTO_VOTER_2" | jq -c '(.output[0] // .)' 2>/dev/null || echo '{}')"
        CHOSEN="$(printf '%s' "$VOTE_JSON" | jq -r '.chosen_option // .chosenOption // "undecided"' 2>/dev/null)"
        REASONING="$(printf '%s' "$VOTE_JSON" | jq -r '.reasoning // .rationale // "No reasoning"' 2>/dev/null)"
        CONFIDENCE="$(printf '%s' "$VOTE_JSON" | jq -r '.confidence // 0.6' 2>/dev/null)"
        CONF_PCT="$(echo "$CONFIDENCE * 100" | bc 2>/dev/null || echo '60')"
        CONF_INT="${CONF_PCT%.*}"
        if [ "$CONF_INT" -ge 80 ] 2>/dev/null; then SENTIMENT="💪"; elif [ "$CONF_INT" -ge 60 ] 2>/dev/null; then SENTIMENT="🤔"; else SENTIMENT="⚠️"; fi
        BODY="$(printf '## ⚖️ Pragmatist\n\n> *Weighing practical trade-offs and real-world constraints.*\n\n**Vote:** %s %s\n**Confidence:** %s%% %s\n**Model:** `%s`\n\n---\n\n%s' \
          "$CHOSEN" "$SENTIMENT" "$CONF_PCT" "$SENTIMENT" "${voter_2_model}" "$REASONING")"
        intake-util linear-activity \
          --session-id "$LINEAR_SID" \
          --type thought \
          --body "$BODY" >/dev/null || true
      fi

  - id: linear-activity-voter-3
    env:
      CTO_VOTER_3: $voter-3.stdout
    command: |
      root="${WORKSPACE:-.}"
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID=""
      [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ] && LINEAR_SID="$(cat "$FALLBACK_FILE")"
      [ -z "$LINEAR_SID" ] && [ -n "${linear_session_id}" ] && LINEAR_SID="${linear_session_id}"
      if [ -n "$LINEAR_SID" ]; then
        VOTE_JSON="$(printf '%s' "$CTO_VOTER_3" | jq -c '(.output[0] // .)' 2>/dev/null || echo '{}')"
        CHOSEN="$(printf '%s' "$VOTE_JSON" | jq -r '.chosen_option // .chosenOption // "undecided"' 2>/dev/null)"
        REASONING="$(printf '%s' "$VOTE_JSON" | jq -r '.reasoning // .rationale // "No reasoning"' 2>/dev/null)"
        CONFIDENCE="$(printf '%s' "$VOTE_JSON" | jq -r '.confidence // 0.6' 2>/dev/null)"
        CONF_PCT="$(echo "$CONFIDENCE * 100" | bc 2>/dev/null || echo '60')"
        CONF_INT="${CONF_PCT%.*}"
        if [ "$CONF_INT" -ge 80 ] 2>/dev/null; then SENTIMENT="💪"; elif [ "$CONF_INT" -ge 60 ] 2>/dev/null; then SENTIMENT="🤔"; else SENTIMENT="⚠️"; fi
        BODY="$(printf '## ✂️ Minimalist\n\n> *Cutting to essential complexity — less is more.*\n\n**Vote:** %s %s\n**Confidence:** %s%% %s\n**Model:** `%s`\n\n---\n\n%s' \
          "$CHOSEN" "$SENTIMENT" "$CONF_PCT" "$SENTIMENT" "${voter_3_model}" "$REASONING")"
        intake-util linear-activity \
          --session-id "$LINEAR_SID" \
          --type thought \
          --body "$BODY" >/dev/null || true
      fi

  - id: tally
    env:
      CTO_VOTER_1: $voter-1.stdout
      CTO_VOTER_2: $voter-2.stdout
      CTO_VOTER_3: $voter-3.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "decision-voting" "tally" "${audio_debug}"
      normalize_vote() {
        printf '%s' "$1" | jq -c '
          (.output[0] // .output // .result // .data // .response // .) as $raw
          | (if ($raw | type) == "string"
             then (
               try ($raw | fromjson)
               catch (
                 try ($raw | match("(?s)\\{.*\\}") | .string | fromjson)
                 catch {raw_text: $raw}
               )
             )
             else $raw
             end) as $v
          | (if ($v | type) != "object" then {} else $v end)
          | (if (.chosen_option? == null and .chosenOption? != null) then . + {chosen_option: .chosenOption} else . end)
          | (if (.chosen_option? == null and .selectedOption? != null) then . + {chosen_option: .selectedOption} else . end)
          | (if (.chosen_option? == null and .selectedOptionValue? != null) then . + {chosen_option: .selectedOptionValue} else . end)
          | (if (.chosen_option? == null and .selected_option? != null) then . + {chosen_option: .selected_option} else . end)
          | (if (.chosen_option? == null and .winning_option? != null) then . + {chosen_option: .winning_option} else . end)
          | (if (.chosen_option? == null and .vote? != null) then . + {chosen_option: .vote} else . end)
          | (if (.chosen_option? == null and .choice? != null) then . + {chosen_option: .choice} else . end)
          | (if (.chosen_option? == null and .option? != null) then . + {chosen_option: .option} else . end)
          | (if (.chosen_option? == null and .position? != null) then . + {chosen_option: .position} else . end)
          | ._vote_text = (((.chosen_option // "") + " " + (.reasoning // "") + " " + (.raw_text // "")) | ascii_downcase)
          | (if (.chosen_option? // "" | type) == "string" and ((.chosen_option | ascii_downcase) | test("optimist")) then . + {chosen_option: "optimist_option"} else . end)
          | (if (.chosen_option? // "" | type) == "string" and ((.chosen_option | ascii_downcase) | test("pessimist")) then . + {chosen_option: "pessimist_option"} else . end)
          | (if (.chosen_option? // "" | type) == "string" and ((.chosen_option | ascii_downcase) | test("(hono|bun|cloudflare|worker|workers)")) then . + {chosen_option: "optimist_option"} else . end)
          | (if (.chosen_option? // "" | type) == "string" and ((.chosen_option | ascii_downcase) | test("(node|express|fastify|container|kubernetes|k8s)")) then . + {chosen_option: "pessimist_option"} else . end)
          | (if (.chosen_option? == null and (.raw_text? // "" | ascii_downcase | test("(hono|bun|cloudflare|worker|workers)"))) then . + {chosen_option: "optimist_option"} else . end)
          | (if (.chosen_option? == null and (.raw_text? // "" | ascii_downcase | test("(node|express|fastify|container|kubernetes|k8s)"))) then . + {chosen_option: "pessimist_option"} else . end)
          | (if ((.chosen_option? // "") == "" and (._vote_text | test("(hono|bun|cloudflare|worker|workers|edge runtime|serverless)"))) then . + {chosen_option: "optimist_option"} else . end)
          | (if ((.chosen_option? // "") == "" and (._vote_text | test("(node|express|fastify|container|kubernetes|k8s|pod|deployment)"))) then . + {chosen_option: "pessimist_option"} else . end)
          | .confidence = (.confidence // 0.6)
          | .reasoning = (.reasoning // .rationale // .why // .explanation // "No reasoning provided.")
          | .concerns = (.concerns // [])
          | del(._vote_text)
        ' 2>/dev/null || printf '{}'
      }
      V1="$(normalize_vote "$CTO_VOTER_1")"
      V2="$(normalize_vote "$CTO_VOTER_2")"
      V3="$(normalize_vote "$CTO_VOTER_3")"
      VOTES_JSON="$(jq -nc \
        --arg v1 "$V1" \
        --arg v2 "$V2" \
        --arg v3 "$V3" \
        '[ (($v1 | fromjson? // {}) + {"voter_id":"architect"}),
           (($v2 | fromjson? // {}) + {"voter_id":"pragmatist"}),
           (($v3 | fromjson? // {}) + {"voter_id":"minimalist"}) ]')"
      printf '%s' "$VOTES_JSON" | intake-util tally-decision-votes

  - id: verify-tally
    env:
      CTO_TALLY_OUT: $tally.stdout
    command: >
      root="${WORKSPACE:-.}" && "$root/intake/scripts/workflow-step-audio.sh" "decision-voting" "verify-tally" "${audio_debug}" &&
      if [ "${verify}" = "true" ]; then
        printf '%s' "$CTO_TALLY_OUT" | intake-util validate --type decision-vote || exit 1
      fi &&
      "$root/intake/scripts/workflow-gate-audio.sh" "decision-voting" "verify-tally" "passed" "${audio_debug}" "normal" "session ${session_id}, decision ${decision_id}" &&
      printf '%s' "$CTO_TALLY_OUT"

  - id: resolve
    env:
      CTO_TALLY_OUT: $tally.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "decision-voting" "resolve" "${audio_debug}"
      QF="${question_file}"
      TALLY_JSON="$(printf '%s' "$CTO_TALLY_OUT" | jq -c '
        (.output[0] // .output // .result // .) as $t
        | (if ($t | type) == "string" then (try ($t | fromjson) catch {}) else $t end)
      ' 2>/dev/null || printf '{}')"
      RESOLVED_JSON="$(jq -n \
        --arg tally "$TALLY_JSON" \
        --arg decision_id "${decision_id}" \
        --rawfile question "$QF" \
        '{
          decision_id: $decision_id,
          question: $question,
          winning_option: (($tally | fromjson?) // {} | .winning_option),
          escalated: (($tally | fromjson?) // {} | .escalated),
          consensus_strength: (($tally | fromjson?) // {} | .consensus_strength),
          tally: (($tally | fromjson?) // {} | .tally),
          human_override: false,
          voter_notes: (($tally | fromjson?) // {} | .voter_notes)
        }')"
      WINNER="$(printf '%s' "$RESOLVED_JSON" | jq -r '.winning_option // "none"')"
      "$root/intake/scripts/workflow-gate-audio.sh" "decision-voting" "resolve" "winner ${WINNER}" "${audio_debug}" "normal" "session ${session_id}, decision ${decision_id}"
      printf '%s' "$RESOLVED_JSON"

  - id: publish-elicitation
    env:
      CTO_TALLY_OUT: $tally.stdout
      CTO_RESOLVE_OUT: $resolve.stdout
    command: |
      root="${WORKSPACE:-.}"
      "$root/intake/scripts/workflow-step-audio.sh" "decision-voting" "publish-elicitation" "${audio_debug}"
      QF="${question_file}"; OF="${optimist_file}"; PF="${pessimist_file}"
      QUESTION_TEXT="$(cat "$QF")"
      OPTIMIST_TEXT="$(cat "$OF")"
      PESSIMIST_TEXT="$(cat "$PF")"
      TALLY_JSON="$(printf '%s' "$CTO_TALLY_OUT" | jq -c '
        (.output[0] // .output // .result // .) as $t
        | (if ($t | type) == "string" then (try ($t | fromjson) catch {}) else $t end)
      ' 2>/dev/null || printf '{}')"
      RESOLVE_JSON="$(printf '%s' "$CTO_RESOLVE_OUT" | jq -c '
        (.output[0] // .output // .result // .) as $r
        | (if ($r | type) == "string" then (try ($r | fromjson) catch {}) else $r end)
      ' 2>/dev/null || printf '{}')"
      PAYLOAD="$(jq -nc \
        --rawfile question "$QF" \
        --arg category "architecture" \
        --rawfile optimist_position "$OF" \
        --rawfile pessimist_position "$PF" \
        --argjson tally "$TALLY_JSON" \
        --argjson resolved "$RESOLVE_JSON" '
        {
          question: $question,
          category: $category,
          options: (
            if (($tally.tally // {} | length) > 0) then
              ($tally.tally | to_entries | map(
                if .key == "optimist_option" then
                  {label: ("Optimist: " + ($optimist_position | gsub("\\s+"; " ") | .[0:120])), value: .key, vote_count: .value}
                elif .key == "pessimist_option" then
                  {label: ("Pessimist: " + ($pessimist_position | gsub("\\s+"; " ") | .[0:120])), value: .key, vote_count: .value}
                else
                  {label: .key, value: .key, vote_count: .value}
                end
              ))
            else
              [
                {label: ("Optimist: " + ($optimist_position | gsub("\\s+"; " ") | .[0:120])), value: "optimist_option", vote_count: 0},
                {label: ("Pessimist: " + ($pessimist_position | gsub("\\s+"; " ") | .[0:120])), value: "pessimist_option", vote_count: 0}
              ]
            end
          ),
          vote_summary: {
            total_voters: ($tally.total_voters // 0),
            tally: ($tally.tally // {}),
            consensus_strength: ($tally.consensus_strength // 0),
            escalated: ($tally.escalated // false),
            voter_notes: ($tally.voter_notes // [])
          },
          recommended_option: (
            $resolved.winning_option
            // $tally.winning_option
            // (($tally.tally // {} | to_entries | sort_by(-.value) | .[0].key) // "")
          ),
          winning_option: ($resolved.winning_option // $tally.winning_option // null)
        }')"
      WAIT_MSG="$(jq -n --rawfile q "$QF" --arg did "${decision_id}" \
        '"⏳ **Waiting for your decision** in main intake channel.\n\n" +
        "Decision `" + $did + "`: " + $q + "\n" +
        "A decision card is being posted in this channel now. Please select an option to continue."')"
      WAIT_META="$(jq -nc --arg step "decision-waiting-main" --arg did "${decision_id}" \
        '{step:$step,decision_id:$did,severity:"info"}')"
      echo "$WAIT_MSG" | intake-util bridge-notify --from deliberation --to deliberation --metadata "$WAIT_META" || true
      "$root/intake/scripts/workflow-gate-audio.sh" "decision-voting" "human-review" "waiting for user decision" "${audio_debug}" "wait" "session ${session_id}, decision ${decision_id}"
      intake-util bridge-elicitation \
        --session-id "${session_id}" \
        --decision-id "${decision_id}" \
        --vote-result "$PAYLOAD" \
        --resume-token "${LOBSTER_RESUME_TOKEN:-}" \
        --human-review-mode "${human_review_mode}" \
        --linear-issue-id "${linear_issue_id}" \
        --discord-channel-id "${discord_channel_id}"
      "$root/intake/scripts/workflow-gate-audio.sh" "decision-voting" "human-review" "decision captured from user" "${audio_debug}" "normal" "session ${session_id}, decision ${decision_id}"
