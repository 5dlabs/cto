name: task-refinement
description: >
  Expand tasks into subtasks, run 5-model quality voting, and revise if needed.
  Supports up to max_revisions rounds (default 2). If the committee rejects after
  all rounds, proceeds with the best attempt and attaches a warning.

args:
  audio_debug:
    default: "true"
  linear_session_id:
    default: ""
  tasks:
    default: "[]"
  complexity:
    default: "{}"
  tasks_file:
    default: ""
  complexity_file:
    default: ""
  evaluation_criteria:
    default: "task decomposition quality, dependency ordering, decision point coverage"
  max_revisions:
    default: 2
  model_primary_provider:
    default: gemini
  model_primary:
    default: gemini-3.1-pro-preview
  voter_1_provider:
    default: gemini
  voter_1_model:
    default: gemini-3.1-pro-preview
  voter_2_provider:
    default: gemini
  voter_2_model:
    default: gemini-3.1-pro-preview
  voter_3_provider:
    default: gemini
  voter_3_model:
    default: gemini-3.1-pro-preview

steps:
  - id: expand-round-0
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "expand-round-0" "${audio_debug}";
      WS="${WORKSPACE:-.}";
      mkdir -p "$WS/.intake/tmp";
      OUT_FILE="$WS/.intake/tmp/expand-round-0.json";
      TF="${tasks_file}"; CF="${complexity_file}";
      if [ -n "$TF" ] && [ -f "$TF" ] && [ -n "$CF" ] && [ -f "$CF" ]; then
        "$root/intake/scripts/expand-tasks-batched.sh" \
          --tasks-file "$TF" \
          --complexity-file "$CF" \
          --provider "${model_primary_provider}" \
          --model "${model_primary}" > "$OUT_FILE";
      else
        TMPF=$(mktemp); TMPC=$(mktemp);
        printf '%s' "${tasks}" > "$TMPF";
        printf '%s' "${complexity}" > "$TMPC";
        "$root/intake/scripts/expand-tasks-batched.sh" \
          --tasks-file "$TMPF" \
          --complexity-file "$TMPC" \
          --provider "${model_primary_provider}" \
          --model "${model_primary}" > "$OUT_FILE";
        rm -f "$TMPF" "$TMPC";
      fi;
      printf '%s' "$OUT_FILE"

  - id: vote-round-0
    env:
      CTO_EXPAND_R0: $expand-round-0.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "vote-round-0" "${audio_debug}";
      WS="${WORKSPACE:-.}";
      mkdir -p "$WS/.intake/tmp";
      CONTENT_FILE="$(printf '%s' "$CTO_EXPAND_R0")";
      if [ ! -f "$CONTENT_FILE" ]; then
        echo "vote-round-0: expansion output file not found: $CONTENT_FILE" >&2; exit 1; fi;
      "$root/intake/scripts/inline-vote.sh" \
        "$CONTENT_FILE" \
        "${evaluation_criteria}" \
        "${voter_1_provider}" "${voter_1_model}" \
        "${voter_2_provider}" "${voter_2_model}" \
        "${voter_3_provider}" "${voter_3_model}" || {
        "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "vote-round-0 failed" "${audio_debug}" "error"; exit 1; }

  - id: check-round-0
    env:
      CTO_VOTE_R0: $vote-round-0.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "check-round-0" "${audio_debug}";
      printf '%s' "$CTO_VOTE_R0" | jq '
        .output[0] as $t |
        { verdict: $t.verdict, suggestions: ($t.suggestions // []), round: 0,
          needs_revision: ($t.verdict == "revise" or $t.verdict == "reject") }'

  - id: expand-round-1
    env:
      CTO_CHECK_R0: $check-round-0.stdout
      CTO_EXPAND_R0: $expand-round-0.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "expand-round-1" "${audio_debug}";
      if [ "$(printf '%s' "$CTO_CHECK_R0" | jq -r '.needs_revision')" != "true" ]; then
        printf '%s' "$CTO_EXPAND_R0"; exit 0; fi;
      TF="${tasks_file}"; CF="${complexity_file}";
      WS="${WORKSPACE:-.}";
      mkdir -p "$WS/.intake/tmp";
      PREVIOUS_FILE="$(printf '%s' "$CTO_EXPAND_R0")";
      if [ ! -f "$PREVIOUS_FILE" ]; then
        echo "expand-round-1: previous expansion output file not found: $PREVIOUS_FILE" >&2; exit 1; fi;
      OUT_FILE="$WS/.intake/tmp/expand-round-1.json";
      if [ -n "$TF" ] && [ -f "$TF" ] && [ -n "$CF" ] && [ -f "$CF" ]; then
        ARGS=$(jq -n \
          --rawfile prompt "$root/intake/prompts/expand-task-system.md" \
          --rawfile tasks_raw "$TF" \
          --rawfile complexity_raw "$CF" \
          --rawfile previous "$PREVIOUS_FILE" \
          --argjson revision_suggestions "$(printf '%s' "$CTO_CHECK_R0" | jq '.suggestions')" \
          --argjson revision_round "1" \
          --arg additional_context "This is revision round 1. The 5-model voting committee flagged issues with the previous expansion. Address the suggestions below while preserving what worked well." \
          --arg schema "$root/intake/schemas/generated-task.schema.json" \
          --arg provider "${model_primary_provider}" \
          --arg model "${model_primary}" \
          '{"prompt": $prompt,
            "input": {
              "tasks": ($tasks_raw | fromjson), "complexity": ($complexity_raw | fromjson),
              "previous_expansion": ($previous | fromjson), "revision_suggestions": $revision_suggestions,
              "revision_round": $revision_round, "additional_context": $additional_context
            },
            "schema": $schema, "provider": $provider, "model": $model}');
      else
        ARGS=$(jq -n \
          --rawfile prompt "$root/intake/prompts/expand-task-system.md" \
          --argjson tasks "$(printf '%s' "${tasks}")" \
          --argjson complexity "$(printf '%s' "${complexity}")" \
          --rawfile previous "$PREVIOUS_FILE" \
          --argjson revision_suggestions "$(printf '%s' "$CTO_CHECK_R0" | jq '.suggestions')" \
          --argjson revision_round "1" \
          --arg additional_context "This is revision round 1. The 5-model voting committee flagged issues with the previous expansion. Address the suggestions below while preserving what worked well." \
          --arg schema "$root/intake/schemas/generated-task.schema.json" \
          --arg provider "${model_primary_provider}" \
          --arg model "${model_primary}" \
          '{"prompt": $prompt,
            "input": {
              "tasks": $tasks, "complexity": $complexity,
              "previous_expansion": ($previous | fromjson), "revision_suggestions": $revision_suggestions,
              "revision_round": $revision_round, "additional_context": $additional_context
            },
            "schema": $schema, "provider": $provider, "model": $model}');
      fi;
      "$root/intake/scripts/llm-invoke.sh" --tool llm-task --action json --args-json "$ARGS" > "$OUT_FILE";
      printf '%s' "$OUT_FILE"

  - id: vote-round-1
    env:
      CTO_CHECK_R0: $check-round-0.stdout
      CTO_VOTE_R0: $vote-round-0.stdout
      CTO_EXPAND_R1: $expand-round-1.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "vote-round-1" "${audio_debug}";
      if [ "$(printf '%s' "$CTO_CHECK_R0" | jq -r '.needs_revision')" != "true" ]; then
        printf '%s' "$CTO_VOTE_R0"; exit 0; fi;
      WS="${WORKSPACE:-.}";
      mkdir -p "$WS/.intake/tmp";
      CONTENT_FILE="$(printf '%s' "$CTO_EXPAND_R1")";
      if [ ! -f "$CONTENT_FILE" ]; then
        echo "vote-round-1: expansion output file not found: $CONTENT_FILE" >&2; exit 1; fi;
      "$root/intake/scripts/inline-vote.sh" \
        "$CONTENT_FILE" \
        "${evaluation_criteria}" \
        "${voter_1_provider}" "${voter_1_model}" \
        "${voter_2_provider}" "${voter_2_model}" \
        "${voter_3_provider}" "${voter_3_model}" || {
        "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "vote-round-1 failed" "${audio_debug}" "error"; exit 1; }

  - id: check-round-1
    env:
      CTO_CHECK_R0: $check-round-0.stdout
      CTO_VOTE_R1: $vote-round-1.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "check-round-1" "${audio_debug}";
      if [ "$(printf '%s' "$CTO_CHECK_R0" | jq -r '.needs_revision')" != "true" ]; then
        printf '%s' "$CTO_CHECK_R0"; exit 0; fi;
      printf '%s' "$CTO_VOTE_R1" | jq '
        .output[0] as $t |
        { verdict: $t.verdict, suggestions: ($t.suggestions // []), round: 1,
          needs_revision: ($t.verdict == "revise" or $t.verdict == "reject") }'

  - id: expand-round-2
    env:
      CTO_CHECK_R1: $check-round-1.stdout
      CTO_EXPAND_R1: $expand-round-1.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "expand-round-2" "${audio_debug}";
      if [ "$(printf '%s' "$CTO_CHECK_R1" | jq -r '.needs_revision')" != "true" ]; then
        printf '%s' "$CTO_EXPAND_R1"; exit 0; fi;
      if [ "${max_revisions}" -lt 2 ] 2>/dev/null; then
        printf '%s' "$CTO_EXPAND_R1"; exit 0; fi;
      TF="${tasks_file}"; CF="${complexity_file}";
      WS="${WORKSPACE:-.}";
      mkdir -p "$WS/.intake/tmp";
      PREVIOUS_FILE="$(printf '%s' "$CTO_EXPAND_R1")";
      if [ ! -f "$PREVIOUS_FILE" ]; then
        echo "expand-round-2: previous expansion output file not found: $PREVIOUS_FILE" >&2; exit 1; fi;
      OUT_FILE="$WS/.intake/tmp/expand-round-2.json";
      if [ -n "$TF" ] && [ -f "$TF" ] && [ -n "$CF" ] && [ -f "$CF" ]; then
        ARGS=$(jq -n \
          --rawfile prompt "$root/intake/prompts/expand-task-system.md" \
          --rawfile tasks_raw "$TF" \
          --rawfile complexity_raw "$CF" \
          --rawfile previous "$PREVIOUS_FILE" \
          --argjson revision_suggestions "$(printf '%s' "$CTO_CHECK_R1" | jq '.suggestions')" \
          --argjson revision_round "2" \
          --arg additional_context "This is revision round 2 (final). The committee still has concerns. Make targeted fixes for the specific issues raised — do not restructure the entire decomposition." \
          --arg schema "$root/intake/schemas/generated-task.schema.json" \
          --arg provider "${model_primary_provider}" \
          --arg model "${model_primary}" \
          '{"prompt": $prompt,
            "input": {
              "tasks": ($tasks_raw | fromjson), "complexity": ($complexity_raw | fromjson),
              "previous_expansion": ($previous | fromjson), "revision_suggestions": $revision_suggestions,
              "revision_round": $revision_round, "additional_context": $additional_context
            },
            "schema": $schema, "provider": $provider, "model": $model}');
      else
        ARGS=$(jq -n \
          --rawfile prompt "$root/intake/prompts/expand-task-system.md" \
          --argjson tasks "$(printf '%s' "${tasks}")" \
          --argjson complexity "$(printf '%s' "${complexity}")" \
          --rawfile previous "$PREVIOUS_FILE" \
          --argjson revision_suggestions "$(printf '%s' "$CTO_CHECK_R1" | jq '.suggestions')" \
          --argjson revision_round "2" \
          --arg additional_context "This is revision round 2 (final). The committee still has concerns. Make targeted fixes for the specific issues raised — do not restructure the entire decomposition." \
          --arg schema "$root/intake/schemas/generated-task.schema.json" \
          --arg provider "${model_primary_provider}" \
          --arg model "${model_primary}" \
          '{"prompt": $prompt,
            "input": {
              "tasks": $tasks, "complexity": $complexity,
              "previous_expansion": ($previous | fromjson), "revision_suggestions": $revision_suggestions,
              "revision_round": $revision_round, "additional_context": $additional_context
            },
            "schema": $schema, "provider": $provider, "model": $model}');
      fi;
      "$root/intake/scripts/llm-invoke.sh" --tool llm-task --action json --args-json "$ARGS" > "$OUT_FILE";
      printf '%s' "$OUT_FILE"

  - id: vote-round-2
    env:
      CTO_CHECK_R1: $check-round-1.stdout
      CTO_VOTE_R1: $vote-round-1.stdout
      CTO_EXPAND_R2: $expand-round-2.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "vote-round-2" "${audio_debug}";
      if [ "$(printf '%s' "$CTO_CHECK_R1" | jq -r '.needs_revision')" != "true" ]; then
        printf '%s' "$CTO_VOTE_R1"; exit 0; fi;
      if [ "${max_revisions}" -lt 2 ] 2>/dev/null; then
        printf '%s' "$CTO_VOTE_R1"; exit 0; fi;
      WS="${WORKSPACE:-.}";
      mkdir -p "$WS/.intake/tmp";
      CONTENT_FILE="$(printf '%s' "$CTO_EXPAND_R2")";
      if [ ! -f "$CONTENT_FILE" ]; then
        echo "vote-round-2: expansion output file not found: $CONTENT_FILE" >&2; exit 1; fi;
      "$root/intake/scripts/inline-vote.sh" \
        "$CONTENT_FILE" \
        "${evaluation_criteria}" \
        "${voter_1_provider}" "${voter_1_model}" \
        "${voter_2_provider}" "${voter_2_model}" \
        "${voter_3_provider}" "${voter_3_model}" || {
        "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "vote-round-2 failed" "${audio_debug}" "error"; exit 1; }

  - id: check-round-2
    env:
      CTO_CHECK_R1: $check-round-1.stdout
      CTO_VOTE_R2: $vote-round-2.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "check-round-2" "${audio_debug}";
      if [ "$(printf '%s' "$CTO_CHECK_R1" | jq -r '.needs_revision')" != "true" ]; then
        printf '%s' "$CTO_CHECK_R1"; exit 0; fi;
      if [ "${max_revisions}" -lt 2 ] 2>/dev/null; then
        printf '%s' "$CTO_CHECK_R1"; exit 0; fi;
      printf '%s' "$CTO_VOTE_R2" | jq '
        .output[0] as $t |
        { verdict: $t.verdict, suggestions: ($t.suggestions // []), round: 2,
          needs_revision: ($t.verdict == "revise" or $t.verdict == "reject") }'

  - id: resolve-output
    env:
      CTO_CHECK_R2: $check-round-2.stdout
      CTO_CHECK_R1: $check-round-1.stdout
      CTO_CHECK_R0: $check-round-0.stdout
      CTO_EXPAND_R2: $expand-round-2.stdout
      CTO_EXPAND_R1: $expand-round-1.stdout
      CTO_EXPAND_R0: $expand-round-0.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "task-refinement" "resolve-output" "${audio_debug}";
      ROUND_2=$(printf '%s' "$CTO_CHECK_R2") &&
      ROUND_1=$(printf '%s' "$CTO_CHECK_R1") &&
      ROUND_0=$(printf '%s' "$CTO_CHECK_R0") &&
      if [ "${max_revisions}" -ge 2 ] 2>/dev/null && [ -n "$ROUND_2" ] &&
        printf '%s' "$ROUND_2" | jq -e '(.round == 2)' >/dev/null 2>&1; then
        FINAL_TASKS_FILE=$(printf '%s' "$CTO_EXPAND_R2") &&
        FINAL_VOTE="$ROUND_2" && REVISION_COUNT=2;
      elif [ -n "$ROUND_1" ] &&
        printf '%s' "$ROUND_1" | jq -e '(.round == 1)' >/dev/null 2>&1; then
        FINAL_TASKS_FILE=$(printf '%s' "$CTO_EXPAND_R1") &&
        FINAL_VOTE="$ROUND_1" && REVISION_COUNT=1;
      else
        FINAL_TASKS_FILE=$(printf '%s' "$CTO_EXPAND_R0") &&
        FINAL_VOTE="$ROUND_0" && REVISION_COUNT=0;
      fi &&
      VERDICT=$(printf '%s' "$FINAL_VOTE" | jq -r '.verdict') &&
      WARN="" &&
      if [ "$VERDICT" != "approve" ]; then
        WARN="WARNING: Task decomposition proceeded after ${REVISION_COUNT} revision(s) without full committee approval (verdict: ${VERDICT}). Review carefully.";
      fi &&
      WS="${WORKSPACE:-.}" &&
      mkdir -p "$WS/.intake/tmp" &&
      DEBUG_DIR="$WS/.intake/tmp/task-refinement-debug" &&
      mkdir -p "$DEBUG_DIR" &&
      cp "$(printf '%s' "$CTO_EXPAND_R0")" "$DEBUG_DIR/expand-round-0.json" &&
      cp "$(printf '%s' "$CTO_EXPAND_R1")" "$DEBUG_DIR/expand-round-1.json" &&
      cp "$(printf '%s' "$CTO_EXPAND_R2")" "$DEBUG_DIR/expand-round-2.json" &&
      printf '%s' "$ROUND_0" > "$DEBUG_DIR/check-round-0.json" &&
      printf '%s' "$ROUND_1" > "$DEBUG_DIR/check-round-1.json" &&
      printf '%s' "$ROUND_2" > "$DEBUG_DIR/check-round-2.json" &&
      if [ ! -f "$FINAL_TASKS_FILE" ]; then
        echo "resolve-output: FATAL — final expansion output file not found: $FINAL_TASKS_FILE" >&2 &&
        exit 1;
      fi &&
      if [ -n "${tasks_file}" ] && [ -f "${tasks_file}" ]; then
        EXPECTED_TASKS="$(jq 'length' "${tasks_file}" 2>/dev/null)";
      else
        EXPECTED_TASKS="$(printf '%s' "${tasks}" | jq 'length' 2>/dev/null)";
      fi &&
      FINAL_TASKS="$(cat "$FINAL_TASKS_FILE")" &&
      if ! printf '%s' "$FINAL_TASKS" | jq -e 'type=="array"' >/dev/null 2>&1; then
        echo "resolve-output: FATAL — expansion output was not a valid task array" >&2 &&
        printf 'resolve-output preview: %.500s\n' "$FINAL_TASKS" >&2 &&
        exit 1;
      fi &&
      FINAL_TASKS="$(printf '%s' "$FINAL_TASKS" | jq -c '
        def parse_flat_subtasks:
          reduce .[] as $item (
            {groups: [], current: []};
            if ($item == "id") and (.current | length > 0) then
              .groups += [.current] | .current = [$item]
            else
              .current += [$item]
            end
          )
          | .groups + [ .current | select(length > 0) ]
          | map(
              . as $group
              | reduce range(0; ($group | length); 2) as $i (
                  {};
                  ($group[$i] // null | tostring) as $key
                  | .[$key] = ($group[$i + 1] // null)
                )
            );
        def parse_jsonish:
          if type == "string" then (fromjson? // .) else . end;
        def normalize_deps:
          if type == "array" then map(tonumber? // .)
          elif type == "string" then ((fromjson? // []) | if type == "array" then map(tonumber? // .) else [] end)
          else [] end;
        def normalize_bool:
          if type == "boolean" then .
          elif type == "string" then (ascii_downcase == "true")
          else false end;
        def normalize_subtask_objects($raw):
          ($raw // []) as $items
          | if ($items | type) != "array" then []
            elif ($items | all(.[]; type == "object")) then $items
            elif ($items | all(.[]; type == "string" and ((fromjson? // null) | type == "object"))) then ($items | map(fromjson))
            elif ($items | all(.[]; type == "string" or type == "number" or type == "boolean" or type == "null")) then ($items | parse_flat_subtasks)
            else []
            end
          | map(parse_jsonish)
          | map(select(type == "object"))
          | map({
              id: ((.id // 0) | tonumber? // (.id // 0)),
              title: ((.title // "Untitled subtask") | tostring),
              description: ((.description // .details // "No description provided.") | tostring),
              dependencies: ((.dependencies // []) | normalize_deps),
              details: ((.details // .description // "No implementation details provided.") | tostring),
              status: ((.status // "pending") | tostring),
              test_strategy: ((.test_strategy // .testStrategy // "Verify the subtask outcomes.") | tostring),
              subagentType: ((.subagentType // .subagent_type // "implementer") | tostring),
              parallelizable: ((.parallelizable // false) | normalize_bool)
            })
          | map(select((.id | type) == "number" and (.title | length) > 0 and (.description | length) > 0));
        map(
          . as $task
          | . + {
              subtasks: (
                normalize_subtask_objects(.subtasks)
              )
            }
        )')" || {
          echo "resolve-output: FATAL — malformed expansion JSON could not be normalized" >&2
          printf 'resolve-output preview: %.500s\n' "$FINAL_TASKS" >&2
          exit 1
        } &&
      printf '%s' "$FINAL_TASKS" > "$WS/.intake/tmp/refined-expanded-tasks.json" &&
      FINAL_TASK_COUNT="$(printf '%s' "$FINAL_TASKS" | jq 'length' 2>/dev/null)" &&
      if [ "$FINAL_TASK_COUNT" != "$EXPECTED_TASKS" ]; then
        echo "resolve-output: FATAL — expected $EXPECTED_TASKS expanded tasks but got $FINAL_TASK_COUNT" >&2 &&
        exit 1
      fi &&
      REQUIRE_SUBTASKS="${INTAKE_REQUIRE_SUBTASKS:-true}" &&
      TOTAL_SUBTASKS="$(printf '%s' "$FINAL_TASKS" | jq '[.[] | (.subtasks // []) | length] | add // 0' 2>/dev/null)" || {
        echo "resolve-output: FATAL — could not count subtasks from normalized expansion output" >&2
        exit 1
      } &&
      if [ "$REQUIRE_SUBTASKS" = "true" ] || [ "$REQUIRE_SUBTASKS" = "1" ]; then
        if [ "$TOTAL_SUBTASKS" = "0" ]; then
          echo "resolve-output: FATAL — no subtasks generated in refinement output" >&2
          exit 1
        fi
      fi &&
      jq -n \
        --argjson tasks "$FINAL_TASKS" \
        --argjson vote "$FINAL_VOTE" \
        --argjson revision_count "$REVISION_COUNT" \
        --arg verdict "$VERDICT" \
        --arg warning "$WARN" \
        --argjson total_subtasks "$TOTAL_SUBTASKS" \
        '{
          expanded_tasks: $tasks,
          final_vote: $vote,
          revision_count: $revision_count,
          verdict: $verdict,
          warning: $warning,
          total_subtasks: $total_subtasks
        }'
