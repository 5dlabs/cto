name: codebase-analysis
description: >
  Analyze an existing codebase before task generation. Packs the repository
  via Repomix (or falls back to OctoCode for GitHub search), then runs an
  LLM summarization pass to extract structured context: service boundaries,
  API contracts, data models, patterns, and test infrastructure.

args:
  audio_debug:
    default: "true"
  repository_url:
    default: ""
  prd_content:
    default: ""
  branch:
    default: main
  model_primary_provider:
    default: gemini
  model_primary:
    default: gemini-3.1-pro-preview

steps:
  - id: pack-repo
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "codebase-analysis" "pack-repo" "${audio_debug}";
      PACK_OUT="$root/.intake/packed-repo.json";
      if command -v repomix >/dev/null 2>&1 || openclaw.invoke --tool repomix --action check 2>/dev/null; then
        openclaw.invoke --tool repomix --action pack_remote_repository --args-json "$(jq -n --arg remote "${repository_url}" --arg branch "${branch}" '{"remote": $remote, "branch": $branch}')" > "$PACK_OUT"
      else
        echo '{"fallback": "octocode", "message": "Repomix unavailable — using OctoCode structure view"}' >&2 &&
        REPO_PATH=$(echo "${repository_url}" | sed 's|https://github.com/||' | sed 's|\.git$||') &&
        openclaw.invoke --tool octocode --action githubViewRepoStructure --args-json "{
          \"repository\": \"${REPO_PATH}\",
          \"branch\": \"${branch}\"
        }" > "$PACK_OUT"
      fi;
      PACK_SIZE=$(wc -c < "$PACK_OUT");
      if [ "$PACK_SIZE" -gt 500000 ]; then
        echo "pack-repo: output is ${PACK_SIZE} bytes — truncating to ~400KB of priority files" >&2;
        python3 "$root/intake/scripts/truncate-packed-repo.py" "$PACK_OUT";
      fi;
      echo "{\"packed_file\": \"$PACK_OUT\", \"size_bytes\": $(wc -c < "$PACK_OUT")}"

  - id: search-patterns
    command: >
      root="${WORKSPACE:-.}";
      SEARCH_OUT="$root/.intake/search-patterns.json";
      "$root/intake/scripts/workflow-step-audio.sh" "codebase-analysis" "search-patterns" "${audio_debug}";
      REPO_PATH=$(echo "${repository_url}" | sed 's|https://github.com/||' | sed 's|\.git$||') &&
      timeout 120 openclaw.invoke --tool octocode --action githubSearchCode --args-json "{
        \"repository\": \"${REPO_PATH}\",
        \"query\": \"path:src OR path:lib OR path:app language:rust OR language:go OR language:typescript\",
        \"maxResults\": 50
      }" > "$SEARCH_OUT" || { echo '{"search_skipped": true, "reason": "octocode timeout or unavailable"}' > "$SEARCH_OUT"; };
      echo "{\"search_file\": \"$SEARCH_OUT\", \"size_bytes\": $(wc -c < "$SEARCH_OUT")}"

  - id: summarize-codebase
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "codebase-analysis" "summarize-codebase" "${audio_debug}";
      PACK_FILE="$root/.intake/packed-repo.json";
      SEARCH_FILE="$root/.intake/search-patterns.json";
      ARGS_FILE=$(mktemp);
      trap 'rm -f "$ARGS_FILE"' EXIT;
      jq -n \
        --rawfile prompt "$root/intake/prompts/codebase-analysis-system.md" \
        --rawfile prd_content "$root/.intake/run-prd.txt" \
        --arg repo_url "${repository_url}" \
        --rawfile packed_output_raw "$PACK_FILE" \
        --rawfile search_results_raw "$SEARCH_FILE" \
        --arg provider "${model_primary_provider}" \
        --arg model "${model_primary}" \
        '{
          "prompt": $prompt,
          "input": {
            "repository_url": $repo_url,
            "packed_output": $packed_output_raw,
            "search_results": $search_results_raw,
            "prd_content": $prd_content
          },
          "provider": $provider,
          "model": $model,
          "temperature": 0.2
        }' > "$ARGS_FILE";
      "$root/intake/scripts/llm-invoke.sh" --tool llm-task --action text --args-file "$ARGS_FILE"

  - id: save-context
    env:
      CTO_SUMMARIZE_CODEBASE_OUT: $summarize-codebase.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "codebase-analysis" "save-context" "${audio_debug}";
      mkdir -p .tasks/docs &&
      printf '%s' "$CTO_SUMMARIZE_CODEBASE_OUT" > .tasks/docs/codebase-context.md &&
      printf '%s' "$CTO_SUMMARIZE_CODEBASE_OUT"
