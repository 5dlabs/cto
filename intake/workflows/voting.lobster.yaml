name: voting
description: >
  3-model voting committee for task quality evaluation. Each voter has a
  distinct evaluation personality (soul) and runs on a different frontier
  model to maximize perspective diversity and avoid groupthink.

args:
  audio_debug:
    default: "true"
  content_file:
    default: ""
  content_to_evaluate:
    default: ""
  evaluation_criteria:
    default: ""
  voter_1_provider:
    default: anthropic
  voter_1_model:
    default: claude-opus-4-6
  voter_2_provider:
    default: openai
  voter_2_model:
    default: gpt-5.2-pro
  voter_3_provider:
    default: anthropic
  voter_3_model:
    default: claude-sonnet-4-6

steps:
  - id: voter-1
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "voting" "voter-1" "${audio_debug}";
      CF="${content_file}";
      if [ -n "$CF" ] && [ -f "$CF" ]; then
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-architect-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --rawfile content "$CF" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_1_provider}" \
          --arg model "${voter_1_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      else
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-architect-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --arg content "${content_to_evaluate}" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_1_provider}" \
          --arg model "${voter_1_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      fi;
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: voter-2
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "voting" "voter-2" "${audio_debug}";
      CF="${content_file}";
      if [ -n "$CF" ] && [ -f "$CF" ]; then
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-pragmatist-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --rawfile content "$CF" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_2_provider}" \
          --arg model "${voter_2_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      else
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-pragmatist-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --arg content "${content_to_evaluate}" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_2_provider}" \
          --arg model "${voter_2_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      fi;
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: voter-3
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "voting" "voter-3" "${audio_debug}";
      CF="${content_file}";
      if [ -n "$CF" ] && [ -f "$CF" ]; then
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-minimalist-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --rawfile content "$CF" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_3_provider}" \
          --arg model "${voter_3_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      else
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-minimalist-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --arg content "${content_to_evaluate}" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_3_provider}" \
          --arg model "${voter_3_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      fi;
      "$root/intake/scripts/openclaw-invoke-retry.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: tally
    env:
      CTO_VOTER_1: $voter-1.stdout
      CTO_VOTER_2: $voter-2.stdout
      CTO_VOTER_3: $voter-3.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "voting" "tally" "${audio_debug}";
      intake-util tally --ballots-json "$(jq -n \
        --argjson v1 "$(printf '%s' "$CTO_VOTER_1")" \
        --argjson v2 "$(printf '%s' "$CTO_VOTER_2")" \
        --argjson v3 "$(printf '%s' "$CTO_VOTER_3")" \
        '[ $v1, $v2, $v3 ]')"
