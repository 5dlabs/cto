name: voting
description: >
  3-model voting committee for task quality evaluation. Each voter has a
  distinct evaluation personality (soul) and runs on a different frontier
  model to maximize perspective diversity and avoid groupthink.

args:
  audio_debug:
    default: "true"
  linear_session_id:
    default: ""
  content_file:
    default: ""
  content_to_evaluate:
    default: ""
  evaluation_criteria:
    default: ""
  voter_1_provider:
    default: gemini
  voter_1_model:
    default: gemini-2.5-flash
  voter_2_provider:
    default: gemini
  voter_2_model:
    default: gemini-2.5-flash
  voter_3_provider:
    default: gemini
  voter_3_model:
    default: gemini-2.5-flash

steps:
  - id: voter-1
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "voting" "voter-1" "${audio_debug}";
      CF="${content_file}";
      if [ -n "$CF" ] && [ -f "$CF" ]; then
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-architect-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --rawfile content "$CF" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_1_provider}" \
          --arg model "${voter_1_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      else
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-architect-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --arg content "${content_to_evaluate}" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_1_provider}" \
          --arg model "${voter_1_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      fi;
      "$root/intake/scripts/llm-invoke.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: voter-2
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "voting" "voter-2" "${audio_debug}";
      CF="${content_file}";
      if [ -n "$CF" ] && [ -f "$CF" ]; then
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-pragmatist-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --rawfile content "$CF" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_2_provider}" \
          --arg model "${voter_2_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      else
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-pragmatist-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --arg content "${content_to_evaluate}" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_2_provider}" \
          --arg model "${voter_2_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      fi;
      "$root/intake/scripts/llm-invoke.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: voter-3
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "voting" "voter-3" "${audio_debug}";
      CF="${content_file}";
      if [ -n "$CF" ] && [ -f "$CF" ]; then
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-minimalist-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --rawfile content "$CF" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_3_provider}" \
          --arg model "${voter_3_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      else
        ARGS=$(jq -n \
          --rawfile p1 "$root/intake/prompts/voter-minimalist-soul.md" \
          --rawfile p2 "$root/intake/prompts/vote-system.md" \
          --arg content "${content_to_evaluate}" \
          --arg criteria "${evaluation_criteria}" \
          --arg schema "$root/intake/schemas/vote-ballot.schema.json" \
          --arg provider "${voter_3_provider}" \
          --arg model "${voter_3_model}" \
          '{ "prompt": ($p1 + "\n\n---\n\n" + $p2),
             "input": {"content": $content, "criteria": $criteria},
             "schema": $schema, "provider": $provider, "model": $model }');
      fi;
      "$root/intake/scripts/llm-invoke.sh" --tool llm-task --action json --args-json "$ARGS"

  - id: linear-activity-voter-1
    env:
      CTO_VOTER_1: $voter-1.stdout
    command: |
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID="${linear_session_id}"
      if [ -z "$LINEAR_SID" ] && [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ]; then
        LINEAR_SID="$(cat "$FALLBACK_FILE")"
      fi
      if [ -z "$LINEAR_SID" ]; then exit 0; fi
      VOTE_JSON="$(printf '%s' "$CTO_VOTER_1")"
      CHOSEN="$(printf '%s' "$VOTE_JSON" | jq -r '.chosen_option // .verdict // "unknown"' 2>/dev/null)"
      REASONING="$(printf '%s' "$VOTE_JSON" | jq -r '.reasoning // "No reasoning provided."' 2>/dev/null)"
      CONFIDENCE="$(printf '%s' "$VOTE_JSON" | jq -r '.confidence // 0.6' 2>/dev/null)"
      CONF_PCT="$(echo "$CONFIDENCE * 100" | bc 2>/dev/null || echo '60')"
      CONF_INT="${CONF_PCT%.*}"
      if [ "$CONF_INT" -ge 80 ] 2>/dev/null; then SENTIMENT="💪"; elif [ "$CONF_INT" -ge 60 ] 2>/dev/null; then SENTIMENT="🤔"; else SENTIMENT="⚠️"; fi
      BODY="$(printf '## 🏛️ Architect\n\n> *Evaluating structural integrity and long-term maintainability.*\n\n**Vote:** %s %s\n**Confidence:** %s%% %s\n**Model:** `%s`\n\n---\n\n%s' \
        "$CHOSEN" "$SENTIMENT" "$CONF_PCT" "$SENTIMENT" "${voter_1_model}" "$REASONING")"
      intake-util linear-activity \
        --session-id "$LINEAR_SID" \
        --type thought \
        --body "$BODY" >/dev/null || true

  - id: linear-activity-voter-2
    env:
      CTO_VOTER_2: $voter-2.stdout
    command: |
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID="${linear_session_id}"
      if [ -z "$LINEAR_SID" ] && [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ]; then
        LINEAR_SID="$(cat "$FALLBACK_FILE")"
      fi
      if [ -z "$LINEAR_SID" ]; then exit 0; fi
      VOTE_JSON="$(printf '%s' "$CTO_VOTER_2")"
      CHOSEN="$(printf '%s' "$VOTE_JSON" | jq -r '.chosen_option // .verdict // "unknown"' 2>/dev/null)"
      REASONING="$(printf '%s' "$VOTE_JSON" | jq -r '.reasoning // "No reasoning provided."' 2>/dev/null)"
      CONFIDENCE="$(printf '%s' "$VOTE_JSON" | jq -r '.confidence // 0.6' 2>/dev/null)"
      CONF_PCT="$(echo "$CONFIDENCE * 100" | bc 2>/dev/null || echo '60')"
      CONF_INT="${CONF_PCT%.*}"
      if [ "$CONF_INT" -ge 80 ] 2>/dev/null; then SENTIMENT="💪"; elif [ "$CONF_INT" -ge 60 ] 2>/dev/null; then SENTIMENT="🤔"; else SENTIMENT="⚠️"; fi
      BODY="$(printf '## ⚖️ Pragmatist\n\n> *Weighing practical trade-offs and real-world constraints.*\n\n**Vote:** %s %s\n**Confidence:** %s%% %s\n**Model:** `%s`\n\n---\n\n%s' \
        "$CHOSEN" "$SENTIMENT" "$CONF_PCT" "$SENTIMENT" "${voter_2_model}" "$REASONING")"
      intake-util linear-activity \
        --session-id "$LINEAR_SID" \
        --type thought \
        --body "$BODY" >/dev/null || true

  - id: linear-activity-voter-3
    env:
      CTO_VOTER_3: $voter-3.stdout
    command: |
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID="${linear_session_id}"
      if [ -z "$LINEAR_SID" ] && [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ]; then
        LINEAR_SID="$(cat "$FALLBACK_FILE")"
      fi
      if [ -z "$LINEAR_SID" ]; then exit 0; fi
      VOTE_JSON="$(printf '%s' "$CTO_VOTER_3")"
      CHOSEN="$(printf '%s' "$VOTE_JSON" | jq -r '.chosen_option // .verdict // "unknown"' 2>/dev/null)"
      REASONING="$(printf '%s' "$VOTE_JSON" | jq -r '.reasoning // "No reasoning provided."' 2>/dev/null)"
      CONFIDENCE="$(printf '%s' "$VOTE_JSON" | jq -r '.confidence // 0.6' 2>/dev/null)"
      CONF_PCT="$(echo "$CONFIDENCE * 100" | bc 2>/dev/null || echo '60')"
      CONF_INT="${CONF_PCT%.*}"
      if [ "$CONF_INT" -ge 80 ] 2>/dev/null; then SENTIMENT="💪"; elif [ "$CONF_INT" -ge 60 ] 2>/dev/null; then SENTIMENT="🤔"; else SENTIMENT="⚠️"; fi
      BODY="$(printf '## ✂️ Minimalist\n\n> *Cutting to essential complexity — less is more.*\n\n**Vote:** %s %s\n**Confidence:** %s%% %s\n**Model:** `%s`\n\n---\n\n%s' \
        "$CHOSEN" "$SENTIMENT" "$CONF_PCT" "$SENTIMENT" "${voter_3_model}" "$REASONING")"
      intake-util linear-activity \
        --session-id "$LINEAR_SID" \
        --type thought \
        --body "$BODY" >/dev/null || true

  - id: tally
    env:
      CTO_VOTER_1: $voter-1.stdout
      CTO_VOTER_2: $voter-2.stdout
      CTO_VOTER_3: $voter-3.stdout
    command: >
      root="${WORKSPACE:-.}";
      "$root/intake/scripts/workflow-step-audio.sh" "voting" "tally" "${audio_debug}";
      intake-util tally --ballots-json "$(jq -n \
        --argjson v1 "$(printf '%s' "$CTO_VOTER_1")" \
        --argjson v2 "$(printf '%s' "$CTO_VOTER_2")" \
        --argjson v3 "$(printf '%s' "$CTO_VOTER_3")" \
        '[ $v1, $v2, $v3 ]')"

  - id: linear-activity-tally
    env:
      CTO_TALLY: $tally.stdout
    command: |
      FALLBACK_FILE="${WORKSPACE:-.}/.intake/linear-session-id.txt"
      LINEAR_SID="${linear_session_id}"
      if [ -z "$LINEAR_SID" ] && [ -f "$FALLBACK_FILE" ] && [ -s "$FALLBACK_FILE" ]; then
        LINEAR_SID="$(cat "$FALLBACK_FILE")"
      fi
      if [ -z "$LINEAR_SID" ]; then exit 0; fi
      VERDICT="$(printf '%s' "$CTO_TALLY" | jq -r '.verdict // "unknown"' 2>/dev/null)"
      APPROVE_CT="$(printf '%s' "$CTO_TALLY" | jq -r '.approve // 0' 2>/dev/null)"
      REVISE_CT="$(printf '%s' "$CTO_TALLY" | jq -r '.revise // 0' 2>/dev/null)"
      REJECT_CT="$(printf '%s' "$CTO_TALLY" | jq -r '.reject // 0' 2>/dev/null)"
      if [ "$VERDICT" = "approve" ]; then ICON="✅"; elif [ "$VERDICT" = "revise" ]; then ICON="🔄"; else ICON="❌"; fi
      BODY="$(printf '## 🗳️ Committee Verdict: %s %s\n\n| Vote | Count |\n|------|-------|\n| ✅ Approve | %s |\n| 🔄 Revise | %s |\n| ❌ Reject | %s |' \
        "$VERDICT" "$ICON" "$APPROVE_CT" "$REVISE_CT" "$REJECT_CT")"
      intake-util linear-activity \
        --session-id "$LINEAR_SID" \
        --type thought \
        --body "$BODY" >/dev/null || true
