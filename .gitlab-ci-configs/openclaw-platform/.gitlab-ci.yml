# GitLab CI/CD for OpenClaw Platform
# Replaces all GitHub Actions workflows:
#   build-image.yaml, build-mission-control.yml, release.yaml,
#   nats-messenger-release.yaml, lint-test.yaml, code-quality.yaml,
#   e2e-test.yaml, skills-security-scan.yaml

stages:
  - test
  - security
  - build
  - release

variables:
  REGISTRY: registry.5dlabs.ai
  IMAGE_BASE: 5dlabs

# ====================================================================
# Test Stage
# ====================================================================

lint-test:
  stage: test
  image: python:3.12
  before_script:
    - pip install pre-commit yamllint
    - |
      curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  script:
    - yamllint -c .yamllint.yaml . || true
    - helm lint . || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"
  tags:
    - k8s

code-quality:
  stage: test
  image: node:20
  script:
    - npm install -g jscpd markdownlint-cli
    - markdownlint '**/*.md' --ignore node_modules --ignore charts || true
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"
  tags:
    - k8s

# ====================================================================
# Security Stage
# ====================================================================

skills-security-scan:
  stage: security
  image: python:3.12-slim
  script:
    - pip install uv
    - |
      shopt -s globstar nullglob 2>/dev/null || true
      mkdir -p /tmp/skills-scan
      for f in charts/openclaw/agents/*/skills/**/*.md; do
        [ -f "$f" ] || continue
        name=$(basename "$f" .md)
        mkdir -p "/tmp/skills-scan/$name"
        if ! head -1 "$f" | grep -q '^---'; then
          printf -- '---\nname: %s\ndescription: OpenClaw skill\n---\n' "$name" \
            | cat - "$f" > "/tmp/skills-scan/$name/SKILL.md"
        else
          cp "$f" "/tmp/skills-scan/$name/SKILL.md"
        fi
      done
    - uvx mcp-scan@latest --skills --json /tmp/skills-scan > scan-results.json || true
    - cat scan-results.json
  artifacts:
    paths:
      - scan-results.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"
  tags:
    - k8s

# ====================================================================
# Build Stage: Agent Images
# ====================================================================

.docker-build:
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
      variables:
        DOCKER_TLS_CERTDIR: ""
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --use --name ci-builder --driver docker-container 2>/dev/null || docker buildx use ci-builder
    - docker buildx inspect --bootstrap
  tags:
    - k8s
    - docker

build-openclaw-agent-latest:
  extends: .docker-build
  stage: build
  before_script:
    - !reference [.docker-build, before_script]
    - apk add --no-cache nodejs npm
  script:
    - |
      LATEST_VERSION=$(npm view openclaw version)
      BUILD_DATE=$(date -u +"%Y-%m-%d")
      docker buildx build \
        --file Dockerfile \
        --push --provenance=false \
        --platform linux/amd64 \
        --build-arg "OPENCLAW_VERSION=$LATEST_VERSION" \
        --build-arg "OPENCLAW_BUILD_DATE=$BUILD_DATE" \
        --tag "$REGISTRY/$IMAGE_BASE/openclaw-agent:latest" \
        --cache-from "type=registry,ref=$REGISTRY/$IMAGE_BASE/openclaw-agent:buildcache" \
        --cache-to "type=registry,ref=$REGISTRY/$IMAGE_BASE/openclaw-agent:buildcache,mode=max" \
        .
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  timeout: 60m

build-openclaw-agent-nightly:
  extends: .docker-build
  stage: build
  before_script:
    - !reference [.docker-build, before_script]
    - apk add --no-cache nodejs npm
  script:
    - |
      LATEST_VERSION=$(npm view openclaw version)
      BUILD_DATE=$(date -u +"%Y-%m-%d")
      docker buildx build \
        --file Dockerfile \
        --push --provenance=false \
        --platform linux/amd64 \
        --build-arg "OPENCLAW_VERSION=$LATEST_VERSION" \
        --build-arg "OPENCLAW_BUILD_DATE=$BUILD_DATE" \
        --tag "$REGISTRY/$IMAGE_BASE/openclaw-agent:${BUILD_DATE}" \
        --cache-from "type=registry,ref=$REGISTRY/$IMAGE_BASE/openclaw-agent:buildcache" \
        --cache-to "type=registry,ref=$REGISTRY/$IMAGE_BASE/openclaw-agent:buildcache,mode=max" \
        .
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  timeout: 60m

build-openclaw-agent-beta:
  extends: .docker-build
  stage: build
  before_script:
    - !reference [.docker-build, before_script]
    - apk add --no-cache nodejs npm
  script:
    - |
      BETA_VERSION=$(npm view openclaw@beta version 2>/dev/null || npm view openclaw version)
      BUILD_DATE=$(date -u +"%Y-%m-%d")
      docker buildx build \
        --file Dockerfile \
        --push --provenance=false \
        --platform linux/amd64 \
        --build-arg "OPENCLAW_VERSION=$BETA_VERSION" \
        --build-arg "OPENCLAW_BUILD_DATE=$BUILD_DATE" \
        --tag "$REGISTRY/$IMAGE_BASE/openclaw-agent:beta" \
        --cache-from "type=registry,ref=$REGISTRY/$IMAGE_BASE/openclaw-agent:buildcache" \
        --cache-to "type=registry,ref=$REGISTRY/$IMAGE_BASE/openclaw-agent:buildcache,mode=max" \
        .
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  timeout: 60m

# --- Mission Control images (upstream + patches) ---

build-mission-control-backend:
  extends: .docker-build
  stage: build
  before_script:
    - !reference [.docker-build, before_script]
    - apk add --no-cache git
  script:
    - |
      git clone --depth 1 https://github.com/abhi1693/openclaw-mission-control.git /tmp/mc
      PATCH_DIR=.github/mission-control-patches/backend/app/services/openclaw
      TARGET_DIR=/tmp/mc/backend/app/services/openclaw
      cp "$PATCH_DIR/gateway_rpc.py" "$TARGET_DIR/gateway_rpc.py" 2>/dev/null || true
      cp "$PATCH_DIR/provisioning.py" "$TARGET_DIR/provisioning.py" 2>/dev/null || true
      docker buildx build \
        --context /tmp/mc \
        --file /tmp/mc/backend/Dockerfile \
        --push --provenance=false \
        --platform linux/amd64 \
        --tag "$REGISTRY/$IMAGE_BASE/mission-control-backend:latest" \
        --tag "$REGISTRY/$IMAGE_BASE/mission-control-backend:${CI_PIPELINE_ID}" \
        --cache-from "type=registry,ref=$REGISTRY/$IMAGE_BASE/mission-control-backend:buildcache" \
        --cache-to "type=registry,ref=$REGISTRY/$IMAGE_BASE/mission-control-backend:buildcache,mode=max" \
        /tmp/mc
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  timeout: 30m

build-mission-control-frontend:
  extends: .docker-build
  stage: build
  before_script:
    - !reference [.docker-build, before_script]
    - apk add --no-cache git
  script:
    - |
      git clone --depth 1 https://github.com/abhi1693/openclaw-mission-control.git /tmp/mc
      BACKEND_URL="${MISSION_CONTROL_BACKEND_URL:-http://localhost:8000}"
      docker buildx build \
        --context /tmp/mc/frontend \
        --file /tmp/mc/frontend/Dockerfile \
        --push --provenance=false \
        --platform linux/amd64 \
        --build-arg "NEXT_PUBLIC_API_URL=$BACKEND_URL" \
        --build-arg "NEXT_PUBLIC_AUTH_MODE=local" \
        --tag "$REGISTRY/$IMAGE_BASE/mission-control-frontend:latest" \
        --tag "$REGISTRY/$IMAGE_BASE/mission-control-frontend:${CI_PIPELINE_ID}" \
        --cache-from "type=registry,ref=$REGISTRY/$IMAGE_BASE/mission-control-frontend:buildcache" \
        --cache-to "type=registry,ref=$REGISTRY/$IMAGE_BASE/mission-control-frontend:buildcache,mode=max" \
        /tmp/mc/frontend
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  timeout: 30m

# ====================================================================
# Release Stage: Helm chart + nats-messenger
# ====================================================================

publish-helm-chart:
  stage: release
  image: alpine/helm:3.14
  script:
    - helm registry login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - helm dependency update .
    - helm package .
    - |
      PKG=$(ls openclaw-*.tgz)
      helm push "$PKG" oci://$CI_REGISTRY/5dlabs/charts
      VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
      echo "Published: oci://$CI_REGISTRY/5dlabs/charts/openclaw:${VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - Chart.yaml
        - values.yaml
        - "templates/**"
        - "skills/**"
        - "packages/**"
    - if: $CI_PIPELINE_SOURCE == "web"
  tags:
    - k8s

publish-nats-messenger:
  stage: release
  image: oven/bun:1
  script:
    - cd packages/nats-messenger
    - bun install --frozen-lockfile || bun install
    - |
      echo "@5dlabs:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
      echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm publish
    - |
      chmod +x build.sh 2>/dev/null || true
      ./build.sh 2>/dev/null || true
  artifacts:
    paths:
      - packages/nats-messenger/dist/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - "packages/nats-messenger/**"
    - if: $CI_PIPELINE_SOURCE == "web"
  tags:
    - k8s

nats-messenger-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: publish-nats-messenger
      artifacts: true
  script:
    - |
      VERSION=$(git rev-parse --short HEAD)
      TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
      echo "TAG=nats-messenger-${TIMESTAMP}-${VERSION}" > release.env
  release:
    tag_name: nats-messenger-${CI_COMMIT_SHORT_SHA}
    name: "NATS Messenger ${CI_COMMIT_SHORT_SHA}"
    description: "Automated release of NATS Messenger standalone binaries"
    assets:
      links:
        - name: nats-messenger-linux-x64
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/packages/nats-messenger/dist/nats-messenger-linux-x64"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - "packages/nats-messenger/**"
  tags:
    - k8s
