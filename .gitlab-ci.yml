# GitLab CI/CD Pipeline for 5D Labs CTO Platform
# Replaces GitHub Actions workflows:
#   - agents-build.yaml → build-* jobs
#   - deploy-marketing.yaml → deploy-marketing job
#   - deploy-splash.yaml → deploy-splash job

stages:
  - build
  - deploy

variables:
  REGISTRY: registry.5dlabs.ai
  IMAGE_BASE: 5dlabs

# Include CI templates
include:
  - local: '.gitlab/ci/templates/docker-build.yml'

# -------------------------------------------------------------------
# Build Stage: Agent Images
# -------------------------------------------------------------------

build-runtime:
  extends: .docker-build
  stage: build
  variables:
    DOCKERFILE: infra/images/runtime/Dockerfile
    IMAGE_NAME: runtime
    BUILD_TARGET: production
    BUILD_PLATFORMS: linux/amd64,linux/arm64
  before_script:
    - !reference [.docker-build, before_script]
    # Download pre-built binaries from GitLab releases
    - |
      apt-get update && apt-get install -y jq curl
      mkdir -p .docker-binaries
      touch .docker-binaries/.gitkeep

      # Fetch latest release binaries
      RELEASES=$(curl -s --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" | jq -r '.[].tag_name' | head -20)

      for TAG in $RELEASES; do
        VERSION="${TAG#v}"
        for BINARY in tools-client play-monitor intake intake-agent; do
          SUFFIX="${BINARY}-linux-x86_64"
          if [ ! -f ".docker-binaries/$SUFFIX" ]; then
            ASSET_URL=$(curl -s --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
              "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${TAG}/assets/links" \
              | jq -r ".[] | select(.name == \"$SUFFIX\") | .direct_asset_url" 2>/dev/null || echo "")
            if [ -n "$ASSET_URL" ] && [ "$ASSET_URL" != "null" ]; then
              curl -sLo ".docker-binaries/$SUFFIX" "$ASSET_URL" && echo "Downloaded $SUFFIX from $TAG"
            fi
          fi
        done
      done
  script:
    - |
      DOCKERFILE_HASH=$(git log -1 --format="%h" -- infra/images/runtime/Dockerfile)
      TAG="${DOCKERFILE_HASH}-${CI_COMMIT_SHORT_SHA}"

      # Check if image already exists
      if docker manifest inspect "$REGISTRY/$IMAGE_BASE/runtime:v${TAG}" > /dev/null 2>&1; then
        echo "Image already exists: v${TAG}"
        echo "RUNTIME_TAG=v${TAG}" >> build.env
        exit 0
      fi

      docker buildx build \
        --file infra/images/runtime/Dockerfile \
        --target production \
        --platform linux/amd64,linux/arm64 \
        --pull \
        --push \
        --provenance=false \
        --tag "$REGISTRY/$IMAGE_BASE/runtime:latest" \
        --tag "$REGISTRY/$IMAGE_BASE/runtime:full" \
        --tag "$REGISTRY/$IMAGE_BASE/runtime:v${TAG}" \
        --cache-from "type=registry,ref=$REGISTRY/$IMAGE_BASE/runtime:buildcache" \
        --cache-to "type=registry,ref=$REGISTRY/$IMAGE_BASE/runtime:buildcache,mode=max" \
        .

      echo "RUNTIME_TAG=v${TAG}" >> build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - infra/images/**
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  timeout: 90m

build-sidecar:
  extends: .docker-build
  stage: build
  variables:
    DOCKERFILE: infra/images/linear-sidecar/Dockerfile
    IMAGE_NAME: linear-sidecar
    BUILD_TARGET: local
    BUILD_PLATFORMS: linux/amd64,linux/arm64
  script:
    - |
      VERSION=$(git rev-parse --short HEAD)

      docker buildx build \
        --file infra/images/linear-sidecar/Dockerfile \
        --target local \
        --platform linux/amd64,linux/arm64 \
        --push \
        --provenance=false \
        --tag "$REGISTRY/$IMAGE_BASE/linear-sidecar:latest" \
        --tag "$REGISTRY/$IMAGE_BASE/linear-sidecar:${VERSION}" \
        .
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - infra/images/**
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  timeout: 15m

build-agents:
  extends: .docker-build
  stage: build
  needs:
    - job: build-runtime
      artifacts: true
  variables:
    DOCKERFILE: infra/images/agents/Dockerfile
    IMAGE_NAME: agents
    BUILD_PLATFORMS: linux/amd64,linux/arm64
  before_script:
    - !reference [.docker-build, before_script]
    - apt-get update && apt-get install -y nodejs npm 2>/dev/null || true
  script:
    - |
      # Resolve OpenClaw version
      if [ -n "${OPENCLAW_VERSION_OVERRIDE:-}" ]; then
        OPENCLAW_VERSION="$OPENCLAW_VERSION_OVERRIDE"
      else
        OPENCLAW_VERSION=$(npm view openclaw version 2>/dev/null || echo "latest")
      fi
      echo "OpenClaw version: $OPENCLAW_VERSION"

      # Compute tag
      DOCKERFILE_HASH=$(git log -1 --format="%h" -- infra/images/agents/Dockerfile infra/images/agents/entrypoint.sh)
      TAG="${DOCKERFILE_HASH}-oc$(echo "$OPENCLAW_VERSION" | tr '.' '-')"

      # Check if image already exists
      if docker manifest inspect "$REGISTRY/$IMAGE_BASE/agents:v${TAG}" > /dev/null 2>&1; then
        echo "Agents image already exists: v${TAG}"
        exit 0
      fi

      docker buildx build \
        --file infra/images/agents/Dockerfile \
        --platform linux/amd64,linux/arm64 \
        --pull \
        --push \
        --provenance=false \
        --tag "$REGISTRY/$IMAGE_BASE/agents:latest" \
        --tag "$REGISTRY/$IMAGE_BASE/agents:v${TAG}" \
        --build-arg "BASE_IMAGE=$REGISTRY/$IMAGE_BASE/runtime:${RUNTIME_TAG:-latest}" \
        --build-arg "OPENCLAW_VERSION=$OPENCLAW_VERSION" \
        --cache-from "type=registry,ref=$REGISTRY/$IMAGE_BASE/runtime:buildcache" \
        --cache-from "type=registry,ref=$REGISTRY/$IMAGE_BASE/agents:buildcache" \
        --cache-to "type=registry,ref=$REGISTRY/$IMAGE_BASE/agents:buildcache,mode=max" \
        ./infra/images/agents
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - infra/images/**
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  timeout: 60m

# -------------------------------------------------------------------
# Deploy Stage: Cloudflare Pages
# -------------------------------------------------------------------

deploy-marketing:
  stage: deploy
  image: node:20
  script:
    - cd apps/marketing
    - npm ci
    - npm run build
    - npx wrangler pages deploy out --project-name=cto-marketing --branch=main --commit-dirty=true
  variables:
    CLOUDFLARE_API_TOKEN: $CLOUDFLARE_API_TOKEN
    CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - apps/marketing/**
    - if: $CI_PIPELINE_SOURCE == "web"

deploy-splash:
  stage: deploy
  image: node:20
  script:
    - cd apps/splash
    - npm ci
    - npm run build
    - npx wrangler pages deploy out --project-name=5dlabs-splash --commit-dirty=true
  variables:
    CLOUDFLARE_API_TOKEN: $CLOUDFLARE_API_TOKEN
    CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - apps/splash/**
    - if: $CI_PIPELINE_SOURCE == "web"
