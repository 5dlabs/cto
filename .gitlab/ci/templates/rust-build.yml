# Shared Rust build/test/lint templates for GitLab CI
# Includes sccache integration and cargo-nextest for faster test execution.

.rust-setup:
  image: rust:latest
  variables:
    CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
    SCCACHE_DIR: /tmp/sccache
    CARGO_INCREMENTAL: "0"
    RUSTC_WRAPPER: sccache
  before_script:
    - rustup default stable
    - rustup component add rustfmt clippy
    - |
      if ! command -v sccache &>/dev/null; then
        cargo install sccache --locked 2>/dev/null || true
      fi
    - |
      if ! command -v cargo-nextest &>/dev/null; then
        cargo install cargo-nextest --locked 2>/dev/null || true
      fi
  cache:
    key: rust-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/
    policy: pull-push
  tags:
    - k8s

.rust-fmt:
  extends: .rust-setup
  script:
    - cargo fmt --all -- --check

.rust-clippy:
  extends: .rust-setup
  script:
    - cargo clippy --all-targets --all-features -- -D warnings

.rust-test:
  extends: .rust-setup
  script:
    - |
      if command -v cargo-nextest &>/dev/null; then
        cargo nextest run --all-targets
      else
        cargo test --all-targets
      fi

.rust-build:
  extends: .rust-setup
  script:
    - cargo build --release --package $RUST_PACKAGE
  artifacts:
    paths:
      - target/release/$RUST_BINARY
    expire_in: 1 day

.rust-audit:
  extends: .rust-setup
  script:
    - cargo install cargo-audit --locked 2>/dev/null || true
    - cargo audit
  allow_failure: true
