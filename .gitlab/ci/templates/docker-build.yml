# Shared Docker build template for GitLab CI
# Usage:
#   extends: .docker-build
#   variables:
#     DOCKERFILE: path/to/Dockerfile
#     IMAGE_NAME: my-image
#     BUILD_TARGET: production        (optional)
#     BUILD_PLATFORMS: linux/amd64    (optional, default: linux/amd64)

.docker-build:
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
      # Allow dind to talk HTTP to the in-cluster registry service
      # (gitlab-registry.gitlab.svc.cluster.local:5000) so we can bypass
      # the Cloudflare tunnel 100MB body limit on large layer PUTs.
      command:
        - "--tls=false"
        - "--insecure-registry=gitlab-registry.gitlab.svc.cluster.local:5000"
      variables:
        DOCKER_TLS_CERTDIR: ""
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    BUILD_PLATFORMS: linux/amd64
    # Minimize gitaly load when 17 docker-build jobs clone in parallel.
    # Shallow clone (depth=1) + no submodules keeps pack size small and
    # prevents gitaly pack-objects from returning early EOF under load.
    GIT_DEPTH: "1"
    GIT_STRATEGY: fetch
    GIT_SUBMODULE_STRATEGY: none
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Second login keyed by internal registry hostname. Same JWT auth
    # realm (gitlab.5dlabs.ai/jwt/auth) — docker's credential store is
    # keyed by hostname, so we need both entries.
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $INTERNAL_REGISTRY
    - docker login -u $CI_DEPENDENCY_PROXY_USER -p $CI_DEPENDENCY_PROXY_PASSWORD $CI_DEPENDENCY_PROXY_SERVER
    - docker buildx create --use --name ci-builder --driver docker-container --driver-opt network=host --buildkitd-flags '--allow-insecure-entitlement network.host' 2>/dev/null || docker buildx use ci-builder
    - docker buildx inspect --bootstrap
  tags:
    - k8s
    - docker
  # Serialize all Docker builds through a single resource_group.
  # Without this, ~17 parallel builds overload gitaly (early EOF on clone)
  # AND race on the shared buildkit cargo cache (`cargo-registry-shared`
  # -> "File exists" on .cargo-ok). Serializing guarantees green at the
  # cost of wall-clock time. We can revisit with per-service cache IDs
  # and a scaled gitaly once the pipeline is stable.
  resource_group: docker-build
  # Gitaly occasionally returns early-EOF on concurrent clones across the
  # parallel build fan-out (~17 jobs). Auto-retry transient git/script
  # failures so a single flake does not kill the whole pipeline.
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - unknown_failure
      - script_failure
      - api_failure

# Convenience: standard single-image build+push script
# Override `script:` in the extending job if you need custom logic.
.docker-build-push:
  extends: .docker-build
  script:
    - |
      TAG="${CI_COMMIT_SHORT_SHA}"
      TARGET_FLAG=""
      if [ -n "${BUILD_TARGET:-}" ]; then
        TARGET_FLAG="--target $BUILD_TARGET"
      fi

      docker buildx build \
        --file "$DOCKERFILE" \
        --platform "$BUILD_PLATFORMS" \
        $TARGET_FLAG \
        --build-arg BASE_REGISTRY=$BASE_REGISTRY \
        --push \
        --provenance=false \
        --tag "$INTERNAL_REGISTRY/$IMAGE_BASE/$IMAGE_NAME:latest" \
        --tag "$INTERNAL_REGISTRY/$IMAGE_BASE/$IMAGE_NAME:v${TAG}" \
        --cache-from "type=registry,ref=$INTERNAL_REGISTRY/$IMAGE_BASE/$IMAGE_NAME:buildcache" \
        --cache-to "type=registry,ref=$INTERNAL_REGISTRY/$IMAGE_BASE/$IMAGE_NAME:buildcache,mode=max" \
        .
