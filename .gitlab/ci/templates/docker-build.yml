# Shared Docker build template for GitLab CI
# Replaces GitHub composite action: .github/actions/docker-build-push/action.yaml
#
# Usage:
#   extends: .docker-build
#   variables:
#     DOCKERFILE: path/to/Dockerfile
#     IMAGE_NAME: my-image
#     BUILD_TARGET: production (optional)
#     BUILD_PLATFORMS: linux/amd64 (optional, default: linux/amd64)

.docker-build:
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
      variables:
        DOCKER_TLS_CERTDIR: ""
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    BUILD_PLATFORMS: linux/amd64
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Set up buildx for multi-platform builds
    - docker buildx create --use --name ci-builder --driver docker-container 2>/dev/null || docker buildx use ci-builder
    - docker buildx inspect --bootstrap
  tags:
    - k8s
    - docker
