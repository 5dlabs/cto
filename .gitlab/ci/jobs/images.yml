# Docker image builds for all CTO platform services
# Each job extends .docker-build and pushes to registry.5dlabs.ai/5dlabs/<name>

# --- Rust service images (cargo-chef pattern) ---

build-controller:
  extends: .docker-build
  stage: build
  script:
    - |
      docker buildx build \
        --build-arg BASE_REGISTRY=$BASE_REGISTRY \
        --file infra/images/controller/Dockerfile \
        --target local \
        --push --provenance=false \
        --tag "$INTERNAL_REGISTRY/$IMAGE_BASE/controller:latest" \
        --tag "$INTERNAL_REGISTRY/$IMAGE_BASE/controller:v${CI_COMMIT_SHORT_SHA}" \
        --cache-from "type=registry,ref=$INTERNAL_REGISTRY/$IMAGE_BASE/controller:buildcache" \
        --cache-to "type=registry,ref=$INTERNAL_REGISTRY/$IMAGE_BASE/controller:buildcache,mode=max" \
        .
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - crates/controller/**
        - templates/**
        - infra/images/controller/**
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE =~ /^(web|api|schedule)$/
  timeout: 45m

