job:
  activeDeadlineSeconds: 7200

agent:
  image:
    repository: "ghcr.io/5dlabs/agents"
    tag: "latest"
  imagePullSecrets:
    - ghcr-secret
  cliImages:
    claude:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    code:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    codex:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    copilot:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    cursor:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    factory:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    gemini:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    grok:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    kimi:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    opencode:
      repository: ghcr.io/5dlabs/agents
      tag: latest
    research:
      repository: ghcr.io/5dlabs/agents
      tag: latest

# Agent definitions from cto-config.json - maps GitHub App to CLI configuration
agents:
  morgan:
    githubApp: "5DLabs-Morgan"
    cli: "grok"
    model: "claude-sonnet-4-20250514"
  rex:
    githubApp: "5DLabs-Rex"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  blaze:
    githubApp: "5DLabs-Blaze"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  cleo:
    githubApp: "5DLabs-Cleo"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  tess:
    githubApp: "5DLabs-Tess"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  cipher:
    githubApp: "5DLabs-Cipher"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  grizz:
    githubApp: "5DLabs-Grizz"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  nova:
    githubApp: "5DLabs-Nova"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  tap:
    githubApp: "5DLabs-Tap"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  spark:
    githubApp: "5DLabs-Spark"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  bolt:
    githubApp: "5DLabs-Bolt"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  atlas:
    githubApp: "5DLabs-Atlas"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  stitch:
    githubApp: "5DLabs-Stitch"
    cli: "claude"
    model: "claude-opus-4-5-20251101"

secrets:
  apiKeySecretName: cto-secrets
  apiKeySecretKey: ANTHROPIC_API_KEY
  cliApiKeys:
    codex:
      secretKey: OPENAI_API_KEY
      envVar: OPENAI_API_KEY
    copilot:
      secretKey: OPENAI_API_KEY
      envVar: COPILOT_GITHUB_TOKEN
    cursor:
      secretKey: CURSOR_API_KEY
      envVar: CURSOR_API_KEY
    gemini:
      secretKey: GEMINI_API_KEY
      envVar: GEMINI_API_KEY
    kimi:
      secretKey: FIREWORKS_API_KEY
      envVar: KIMI_API_KEY
    opencode:
      secretKey: FIREWORKS_API_KEY
      envVar: FIREWORKS_API_KEY
    factory:
      secretKey: FACTORY_API_KEY
      envVar: FACTORY_API_KEY

permissions:
  agentToolsOverride: false
  allow:
    - "Bash(*)"
    - "Edit(*)"
    - "Read(*)"
    - "Write(*)"
    - "MultiEdit(*)"
    - "Glob(*)"
    - "Grep(*)"
    - "LS(*)"
  deny:
    - "Bash(npm:install*, yarn:install*, cargo:install*, docker:*, kubectl:*, rm:-rf*, git:*)"

telemetry:
  enabled: true
  otlpEndpoint: "http://otel-collector.observability.svc.cluster.local:4317"
  otlpProtocol: "grpc"
  logsEndpoint: "http://otel-collector.observability.svc.cluster.local:4318"
  logsProtocol: "http"

storage:
  storageClassName: mayastor
  workspaceSize: "10Gi"

cleanup:
  enabled: true
  successTTLSeconds: 3600
  failureTTLSeconds: 7200
  completedJobDelayMinutes: 5
  failedJobDelayMinutes: 60
  deleteConfigMap: true

linear:
  sidecarImage: "ghcr.io/5dlabs/linear-sidecar:dev"
  serviceUrl: "http://pm-server:8080"

