# config/controller-config.yaml - Local development controller configuration
# This config mirrors the Kubernetes ConfigMap for local development

job:
  activeDeadlineSeconds: 7200

agent:
  image:
    repository: "ghcr.io/5dlabs/agent"
    tag: "latest"
  imagePullSecrets:
    - ghcr-secret
  cliImages:
    claude:
      repository: ghcr.io/5dlabs/claude
      tag: dev
    cursor:
      repository: ghcr.io/5dlabs/cursor
      tag: latest
    codex:
      repository: ghcr.io/5dlabs/codex
      tag: latest
    gemini:
      repository: ghcr.io/5dlabs/gemini
      tag: latest
    factory:
      repository: ghcr.io/5dlabs/factory
      tag: latest

# Agent definitions - maps GitHub App to CLI configuration
agents:
  morgan:
    githubApp: "5DLabs-Morgan"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  rex:
    githubApp: "5DLabs-Rex"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  blaze:
    githubApp: "5DLabs-Blaze"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  cleo:
    githubApp: "5DLabs-Cleo"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  tess:
    githubApp: "5DLabs-Tess"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  cipher:
    githubApp: "5DLabs-Cipher"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  grizz:
    githubApp: "5DLabs-Grizz"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  nova:
    githubApp: "5DLabs-Nova"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  tap:
    githubApp: "5DLabs-Tap"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  spark:
    githubApp: "5DLabs-Spark"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  bolt:
    githubApp: "5DLabs-Bolt"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  atlas:
    githubApp: "5DLabs-Atlas"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
  stitch:
    githubApp: "5DLabs-Stitch"
    cli: "claude"
    model: "claude-opus-4-5-20251101"
    tools:
      remote:
        - "context7_resolve_library_id"
        - "context7_get_library_docs"
        - "octocode_githubSearchCode"
        - "octocode_githubSearchRepositories"
        - "octocode_githubViewRepoStructure"
        - "octocode_githubGetFileContent"
        - "octocode_githubSearchPullRequests"
        - "octocode_packageSearch"
        - "openmemory_openmemory_query"
        - "openmemory_openmemory_store"
        - "openmemory_openmemory_list"
        - "openmemory_openmemory_get"
        - "openmemory_openmemory_reinforce"
        - "github_get_pull_request"
        - "github_get_pull_request_files"
        - "github_get_pull_request_comments"
        - "github_add_pull_request_review_comment"
        - "github_create_pull_request_review"
        - "github_get_file_contents"
      localServers: {}

secrets:
  apiKeySecretName: cto-secrets  # pragma: allowlist secret
  apiKeySecretKey: ANTHROPIC_API_KEY  # pragma: allowlist secret
  cliApiKeys:
    codex:
      secretKey: OPENAI_API_KEY  # pragma: allowlist secret
      envVar: OPENAI_API_KEY
    gemini:
      secretKey: GEMINI_API_KEY  # pragma: allowlist secret
      envVar: GEMINI_API_KEY
    factory:
      secretKey: FACTORY_API_KEY  # pragma: allowlist secret
      envVar: FACTORY_API_KEY

permissions:
  agentToolsOverride: false
  allow:
    - "Bash(*)"
    - "Edit(*)"
    - "Read(*)"
    - "Write(*)"
    - "MultiEdit(*)"
    - "Glob(*)"
    - "Grep(*)"
    - "LS(*)"
  deny:
    - "Bash(npm:install*, yarn:install*, cargo:install*, docker:*, kubectl:*, rm:-rf*, git:*)"

telemetry:
  enabled: false  # Disabled for local dev
  otlpEndpoint: ""
  otlpProtocol: "grpc"
  logsEndpoint: ""
  logsProtocol: "http"

storage:
  storageClassName: "mayastor"
  workspaceSize: "10Gi"

cleanup:
  enabled: true
  successTTLSeconds: 3600
  failureTTLSeconds: 7200
  completedJobDelayMinutes: 5
  failedJobDelayMinutes: 60
  deleteConfigMap: true

linear:
  sidecarImage: "ghcr.io/5dlabs/linear-sidecar:latest"
  serviceUrl: "http://localhost:8081"
