apiVersion: agents.platform/v1
kind: CodeRun
metadata:
  name: harness-cipher-codex
  namespace: cto
  labels:
    harness-test: openclaw-gateway
    cli-type: codex
spec:
  runType: implementation
  service: test-sandbox
  repositoryUrl: https://github.com/5dlabs/test-sandbox
  docsRepositoryUrl: https://github.com/5dlabs/test-sandbox
  docsBranch: main
  workingDirectory: .
  githubApp: 5DLabs-Cipher
  model: codex-mini-latest
  contextVersion: 1
  enableDocker: false
  cliConfig:
    cliType: codex
    model: codex-mini-latest
    settings:
      listToolsOnStart: true
  promptModification: |
    Print your identity, versions, tools, and skills. Then write a single
    line "OK: <agent-name>" to stdout and exit. Do not modify any files.
    Do not open any PRs.
