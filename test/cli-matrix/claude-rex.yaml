apiVersion: agents.platform/v1
kind: CodeRun
metadata:
  name: smoke-claude-rex
  namespace: cto
  labels:
    cli-matrix: phase-d
    cli-type: claude
spec:
  runType: implementation
  service: test-sandbox
  repositoryUrl: https://github.com/5dlabs/test-sandbox
  docsRepositoryUrl: https://github.com/5dlabs/test-sandbox
  docsBranch: main
  workingDirectory: .
  githubApp: 5DLabs-Rex
  model: claude-sonnet-4-5-20250929
  enableDocker: false
  cliConfig:
    cliType: claude
    model: claude-sonnet-4-5-20250929
    settings:
      listToolsOnStart: true
  promptModification: |
    Print your identity, versions, tools, and skills (already done by the
    diagnostic block above). Then write a single line "OK: <agent>" to stdout
    and exit. Do not modify any files. Do not open any PRs.
