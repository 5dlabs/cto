apiVersion: agents.platform/v1
kind: CodeRun
metadata:
  name: e2e-skills-factory
  namespace: cto
spec:
  cliConfig:
    cliType: factory
    maxTokens: 8192
    model: qwen3-235b-a22b
  contextVersion: 1
  continueSession: false
  docsRepositoryUrl: https://github.com/5dlabs/cto-agents.git
  enableDocker: false
  env:
    GIT_BRANCH: main
  githubApp: 5DLabs-Rex
  model: qwen3-235b-a22b
  openclaw:
    discordEnabled: false
    providers:
    - api: openai-completions
      apiKeyEnvVar: FIREWORKS_API_KEY
      baseUrl: https://api.fireworks.ai/inference/v1
      models:
      - contextWindow: 131072
        displayName: Qwen3 235B (factory)
        maxTokens: 8192
        name: accounts/fireworks/models/qwen3-235b-a22b
        reasoning: false
      name: fireworks
  promptModification: List all skills available to you. Report the count and name
    of each skill file you can find. You are running as the factory CLI.
  repositoryUrl: https://github.com/5dlabs/cto-agents.git
  runType: implementation
  service: cto
  skillsUrl: https://github.com/5dlabs/cto-agent-personas/releases/download/skills-v0.1.1/skills.tar.gz
  taskId: 1
  workingDirectory: .
