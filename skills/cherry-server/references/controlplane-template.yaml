# Talos controlplane.yaml template for Cherry Servers Solana Server Gen5
# Replace {PLACEHOLDERS} before use
# Generate secrets first: talosctl gen secrets -o config/secrets.yaml
# Then: talosctl gen config trading-cluster https://{SERVER_IP}:6443 --with-secrets config/secrets.yaml

version: v1alpha1
debug: false
persist: true
machine:
    type: controlplane
    # token, ca, certSANs — generated by talosctl gen config
    kubelet:
        image: ghcr.io/siderolabs/kubelet:v1.32.3
        defaultRuntimeSeccompProfileEnabled: true
        disableManifestsDirectory: true
        extraConfig:
            cpuManagerPolicy: static
            cpuManagerReconcilePeriod: 5s
            topologyManagerPolicy: single-numa-node
            reservedSystemCPUs: "0-15"
            evictionHard:
                memory.available: "1Gi"
                nodefs.available: "5%"
    network:
        hostname: {HOSTNAME}
        interfaces:
            # ALWAYS use deviceSelector with MAC address — never hardcode NIC names
            - deviceSelector:
                hardwareAddr: "{NIC_MAC}"
              addresses:
                - {SERVER_IP}/{CIDR}
              routes:
                - network: 0.0.0.0/0
                  gateway: {GATEWAY}
        nameservers:
            - 1.1.1.1
            - 8.8.8.8
    install:
        disk: /dev/nvme0n1
        image: factory.talos.dev/installer/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba:v1.9.5
        wipe: true
        extraKernelArgs:
            # CPU performance
            - cpufreq.default_governor=performance
            - idle=poll
            - processor.max_cstate=0
            - isolcpus=16-31
            - nohz_full=16-31
            - rcu_nocbs=16-31
            - preempt=full
            # Memory
            - hugepagesz=2M
            - hugepages=2048
            - transparent_hugepage=madvise
            # Timekeeping & interrupts
            - tsc=reliable
            - clocksource=tsc
            - nmi_watchdog=0
            - nosoftlockup
            - skew_tick=1
            # Security (traded for performance)
            - mitigations=off
            - audit=0
            # I/O
            - nvme_core.io_timeout=4294967295
            - iommu.strict=0
    disks:
        # Map large NVMe drives to Solana data dirs
        # IMPORTANT: Cherry RAID1 leaves nvme1n1 with old Ubuntu partitions — skip it
        # Use talosctl get discoveredvolumes --insecure to verify device mapping
        - device: /dev/nvme2n1
          partitions:
            - mountpoint: /var/mnt/accounts
              size: 0
        - device: /dev/nvme3n1
          partitions:
            - mountpoint: /var/mnt/ledger
              size: 0
    time:
        servers:
            - time.cloudflare.com
    sysctls:
        # UDP buffers (Solana gossip)
        net.core.rmem_max: "134217728"
        net.core.wmem_max: "134217728"
        net.core.rmem_default: "134217728"
        net.core.wmem_default: "134217728"
        net.ipv4.udp_mem: "65536 131072 262144"
        # TCP tuning (exchange APIs, RPC)
        net.ipv4.tcp_rmem: "4096 1048576 67108864"
        net.ipv4.tcp_wmem: "4096 1048576 67108864"
        net.ipv4.tcp_fastopen: "3"
        net.ipv4.tcp_tw_reuse: "1"
        net.ipv4.tcp_fin_timeout: "10"
        net.ipv4.tcp_low_latency: "1"
        # Low-latency socket polling
        net.core.busy_poll: "50"
        net.core.busy_read: "50"
        # Connection handling
        net.core.somaxconn: "8192"
        net.core.netdev_max_backlog: "10000"
        net.ipv4.tcp_max_syn_backlog: "8192"
        # File descriptors
        fs.file-max: "2097152"
        fs.nr_open: "2097152"
        # Memory
        vm.max_map_count: "2000000"
        vm.swappiness: "1"
        vm.dirty_background_ratio: "5"
        vm.dirty_ratio: "10"
        # eBPF (Cilium)
        net.core.bpf_jit_enable: "1"
        net.core.bpf_jit_harden: "0"
        # IP forwarding (Cilium native routing)
        net.ipv4.conf.all.forwarding: "1"
        net.ipv6.conf.all.forwarding: "1"
    kernel:
        modules:
            - name: br_netfilter
            - name: ip_tables
            - name: nvme
    features:
        rbac: true
        stableHostname: true
        apidCheckExtKeyUsage: true
        diskQuotaSupport: true
        kubePrism:
            enabled: true
            port: 7445
        hostDNS:
            enabled: true
            forwardKubeDNSToHost: true
cluster:
    controlPlane:
        endpoint: https://{SERVER_IP}:6443
    clusterName: trading-cluster
    network:
        cni:
            name: none
        dnsDomain: cluster.local
        podSubnets:
            - 10.244.0.0/16
        serviceSubnets:
            - 10.96.0.0/12
    proxy:
        disabled: true
    allowSchedulingOnControlPlanes: true
