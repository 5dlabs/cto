apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: trading
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: registry.5dlabs.ai/5dlabs/runtime:trader
          command: ["node"]
          args: ["server.js"]
          workingDir: /app/skills/trader/dashboard
          ports:
            - containerPort: 3847
          envFrom:
            - secretRef:
                name: trader-env
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: trading
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 3847
      targetPort: 3847
      nodePort: 30847
