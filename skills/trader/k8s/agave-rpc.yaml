---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yellowstone-grpc-config
  namespace: solana
data:
  config.json: |
    {
      "libpath": "/opt/yellowstone/lib/libyellowstone_grpc_geyser.so",
      "log": {
        "level": "info"
      },
      "tokio": {
        "worker_threads": 8
      },
      "grpc": {
        "address": "0.0.0.0:10000",
        "tls_config": null,
        "compression": {
          "accept": ["gzip", "zstd"],
          "send": ["gzip", "zstd"]
        },
        "max_decoding_message_size": "4_194_304",
        "snapshot_plugin_channel_capacity": "100_000_000",
        "snapshot_client_channel_capacity": "50_000_000",
        "channel_capacity": "500_000",
        "unary_concurrency_limit": 100,
        "unary_disabled": false,
        "x_token": null,
        "replay_stored_slots": 0,
        "filter_name_size_limit": 128,
        "filter_names_size_limit": 4096,
        "filter_names_cleanup_interval": "1s"
      },
      "prometheus": {
        "address": "0.0.0.0:8999"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agave-rpc
  namespace: solana
  labels:
    app: agave-rpc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agave-rpc
  template:
    metadata:
      labels:
        app: agave-rpc
    spec:
      nodeSelector:
        kubernetes.io/hostname: solana-rpc-01
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 300
      securityContext:
        seccompProfile:
          type: Unconfined
      initContainers:
        # SEV-ZERO mitigation: wipe stale state on startup to prevent FailedThreshold stalls.
        # If the most recent snapshot is older than MAX_SNAPSHOT_AGE_HOURS, or no snapshot
        # exists, wipe accounts + snapshots so the validator downloads a fresh snapshot.
        # This prevents the "fell too far behind → diverged fork → stuck root" failure mode.
        - name: check-stale-state
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              MAX_AGE_SEC=28800  # 8 hours
              SNAPSHOT_DIR="/mnt/ledger/snapshots"
              ACCOUNTS_DIR="/mnt/accounts"

              echo "=== Stale state check ==="

              # If no snapshot directory or it's empty, nothing to check — fresh start
              if [ ! -d "$SNAPSHOT_DIR" ] || [ -z "$(ls -A $SNAPSHOT_DIR 2>/dev/null)" ]; then
                echo "No snapshots found — clean start expected."
                exit 0
              fi

              # Find the newest file in the snapshots directory
              NEWEST=$(find "$SNAPSHOT_DIR" -type f -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1)
              if [ -z "$NEWEST" ]; then
                echo "No snapshot files found — clean start expected."
                exit 0
              fi

              NEWEST_TIME=$(echo "$NEWEST" | cut -d' ' -f1 | cut -d'.' -f1)
              NEWEST_FILE=$(echo "$NEWEST" | cut -d' ' -f2-)
              NOW=$(date +%s)
              AGE=$((NOW - NEWEST_TIME))

              echo "Newest snapshot: $NEWEST_FILE"
              echo "Age: ${AGE}s (max: ${MAX_AGE_SEC}s)"

              if [ "$AGE" -gt "$MAX_AGE_SEC" ]; then
                echo "STALE STATE DETECTED — snapshot is $(($AGE / 3600))h old (> $(($MAX_AGE_SEC / 3600))h)"
                echo "Wiping accounts and snapshots to force fresh snapshot download..."
                rm -rf "$ACCOUNTS_DIR"/* 2>/dev/null || true
                rm -rf "$SNAPSHOT_DIR"/* 2>/dev/null || true
                echo "Wipe complete. Validator will download fresh snapshot."
              else
                echo "Snapshots are fresh — proceeding with existing state."
              fi
          volumeMounts:
            - name: accounts
              mountPath: /mnt/accounts
            - name: ledger
              mountPath: /mnt/ledger
        # Verify Yellowstone gRPC geyser plugin .so is present
        # Built from source: docker build -f docker/Dockerfile.yellowstone-grpc .
        # Deployed to node: kubectl cp ... solana-rpc-01:/var/mnt/yellowstone/lib/
        - name: check-yellowstone
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ -f /opt/yellowstone/lib/libyellowstone_grpc_geyser.so ]; then
                echo "Yellowstone gRPC plugin found."
                ls -la /opt/yellowstone/lib/
              else
                echo "WARNING: Yellowstone gRPC plugin not found at /opt/yellowstone/lib/"
                echo "Validator will start without geyser plugin."
                mkdir -p /opt/yellowstone/lib
              fi
          volumeMounts:
            - name: yellowstone-plugin
              mountPath: /opt/yellowstone
        # Sidecar: Agave validator starts first, stays running (K8s 1.28+ native sidecar)
        - name: agave-validator
          restartPolicy: Always
          image: ghcr.io/dysnix/docker-agave:v3.1.11
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
          command: ["agave-validator"]
          args:
            - --identity
            - /etc/solana/validator-keypair.json
            - --ledger
            - /mnt/ledger
            - --accounts
            - /mnt/accounts
            - --snapshots
            - /mnt/ledger/snapshots
            - --rpc-port
            - "8899"
            - --rpc-bind-address
            - 0.0.0.0
            - --private-rpc
            - --full-rpc-api
            - --enable-rpc-transaction-history
            - --no-voting
            - --no-poh-speed-test
            - --no-os-network-limits-test
            - --only-known-rpc
            - --account-index
            - spl-token-owner
            - --account-index
            - program-id
            - --accounts-db-cache-limit-mb
            - "16384"
            - --limit-ledger-size
            - "50000000"
            - --expected-genesis-hash
            - 5eykt4UsFv8P8NJdTREpY1vzqKqZKvdpKuc147dw2N9d
            - --entrypoint
            - entrypoint.mainnet-beta.solana.com:8001
            - --entrypoint
            - entrypoint2.mainnet-beta.solana.com:8001
            - --entrypoint
            - entrypoint3.mainnet-beta.solana.com:8001
            - --entrypoint
            - entrypoint4.mainnet-beta.solana.com:8001
            - --entrypoint
            - entrypoint5.mainnet-beta.solana.com:8001
            - --known-validator
            - 7Np41oeYqPefeNQEHSv1UDhYrehxin3NStELsSKCT4K2
            - --known-validator
            - GdnSyH3YtwcxFvQrVVJMm1JhTS4QVX7MFsX56uJLUfiZ
            - --known-validator
            - dDzy5SR3AXdYWVqbDEkVFdvSPCtS9ihF5kJkHCtXoFs
            - --known-validator
            - Ft5fbkqNa76vnsjYNwjDZUXoTWpP7VYm3mtsaQckQADN
            - --known-validator
            - CW9C7HBwAMgqNdXkNgFg9Mge3bE3WLSXrvj3AHcbGnY
            - --dynamic-port-range
            - "8000-8030"
            - --gossip-port
            - "8001"
            - --no-port-check
            - --wal-recovery-mode
            - skip_any_corrupted_record
            - --use-snapshot-archives-at-startup
            - when-newest
            - --geyser-plugin-config
            - /etc/yellowstone/config.json
            - --log
            - "-"
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -sf http://localhost:8899/health || exit 1"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 240
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -sf http://localhost:8899/health || exit 1"
            periodSeconds: 60
            failureThreshold: 10
            timeoutSeconds: 5
          env:
            - name: RUST_LOG
              value: "solana=info"
            - name: MALLOC_CONF
              value: "background_thread:true,metadata_thp:always,dirty_decay_ms:5000,narenas:8"
          ports:
            - name: rpc
              containerPort: 8899
              protocol: TCP
            - name: ws
              containerPort: 8900
              protocol: TCP
            - name: gossip-tcp
              containerPort: 8001
              protocol: TCP
            - name: gossip-udp
              containerPort: 8001
              protocol: UDP
            - name: grpc
              containerPort: 10000
              protocol: TCP
            - name: ys-metrics
              containerPort: 8999
              protocol: TCP
          volumeMounts:
            - name: accounts
              mountPath: /mnt/accounts
            - name: ledger
              mountPath: /mnt/ledger
            - name: identity
              mountPath: /etc/solana
              readOnly: true
            - name: yellowstone-plugin
              mountPath: /opt/yellowstone
              readOnly: true
            - name: yellowstone-config
              mountPath: /etc/yellowstone
              readOnly: true
          resources:
            requests:
              cpu: "16"
              memory: 740Gi
            limits:
              cpu: "16"
              memory: 740Gi
        # Gate: blocks until Agave RPC accepts connections
        - name: wait-for-rpc
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Agave RPC on port 8899..."
              until nc -z localhost 8899; do
                echo "RPC not ready, retrying in 15s..."
                sleep 15
              done
              echo "RPC is ready!"
      containers:
        - name: solana-exporter
          image: ghcr.io/asymmetric-research/solana-exporter:v3.0.2
          args:
            - -rpc-url=http://localhost:8899
            - -listen-address=:9179
            - -light-mode
          ports:
            - name: metrics
              containerPort: 9179
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9179
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9179
            periodSeconds: 15
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: accounts
          hostPath:
            path: /var/mnt/accounts
            type: DirectoryOrCreate
        - name: ledger
          hostPath:
            path: /var/mnt/ledger
            type: DirectoryOrCreate
        - name: identity
          secret:
            secretName: agave-identity
        - name: yellowstone-plugin
          hostPath:
            path: /var/mnt/yellowstone
            type: DirectoryOrCreate
        - name: yellowstone-config
          configMap:
            name: yellowstone-grpc-config
