---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yellowstone-grpc-config
  namespace: solana
data:
  config.json: |
    {
      "libpath": "/opt/yellowstone/lib/libyellowstone_grpc_geyser.so",
      "log": {
        "level": "info"
      },
      "tokio": {
        "worker_threads": 4
      },
      "grpc": {
        "address": "0.0.0.0:10000",
        "tls_config": null,
        "compression": {
          "accept": ["gzip", "zstd"],
          "send": ["gzip", "zstd"]
        },
        "max_decoding_message_size": "4_194_304",
        "snapshot_plugin_channel_capacity": null,
        "snapshot_client_channel_capacity": "50_000_000",
        "channel_capacity": "100_000",
        "unary_concurrency_limit": 100,
        "unary_disabled": false,
        "x_token": null,
        "replay_stored_slots": 0,
        "filter_name_size_limit": 128,
        "filter_names_size_limit": 4096,
        "filter_names_cleanup_interval": "1s"
      },
      "prometheus": {
        "address": "0.0.0.0:8999"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agave-rpc
  namespace: solana
  labels:
    app: agave-rpc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agave-rpc
  template:
    metadata:
      labels:
        app: agave-rpc
    spec:
      nodeSelector:
        kubernetes.io/hostname: solana-rpc-01
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 120
      securityContext:
        seccompProfile:
          type: Unconfined
      initContainers:
        # Verify Yellowstone gRPC geyser plugin .so is present
        # Built from source: docker build -f docker/Dockerfile.yellowstone-grpc .
        # Deployed to node: kubectl cp ... solana-rpc-01:/var/mnt/yellowstone/lib/
        - name: check-yellowstone
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ -f /opt/yellowstone/lib/libyellowstone_grpc_geyser.so ]; then
                echo "Yellowstone gRPC plugin found."
                ls -la /opt/yellowstone/lib/
              else
                echo "WARNING: Yellowstone gRPC plugin not found at /opt/yellowstone/lib/"
                echo "Validator will start without geyser plugin."
                mkdir -p /opt/yellowstone/lib
              fi
          volumeMounts:
            - name: yellowstone-plugin
              mountPath: /opt/yellowstone
        # Sidecar: Agave validator starts first, stays running (K8s 1.28+ native sidecar)
        - name: agave-validator
          restartPolicy: Always
          image: ghcr.io/dysnix/docker-agave:v2.2.20
          command: ["agave-validator"]
          args:
            - --identity
            - /etc/solana/validator-keypair.json
            - --ledger
            - /mnt/ledger
            - --accounts
            - /mnt/accounts
            - --snapshots
            - /mnt/ledger/snapshots
            - --rpc-port
            - "8899"
            - --rpc-bind-address
            - 0.0.0.0
            - --private-rpc
            - --full-rpc-api
            - --no-voting
            - --account-index
            - spl-token-owner
            - --account-index
            - program-id
            - --account-index
            - spl-token-mint
            - --limit-ledger-size
            - "500000000"
            - --expected-genesis-hash
            - 5eykt4UsFv8P8NJdTREpY1vzqKqZKvdpKuc147dw2N9d
            - --entrypoint
            - entrypoint.mainnet-beta.solana.com:8001
            - --entrypoint
            - entrypoint2.mainnet-beta.solana.com:8001
            - --entrypoint
            - entrypoint3.mainnet-beta.solana.com:8001
            - --known-validator
            - 7Np41oeYqPefeNQEHSv1UDhYrehxin3NStELsSKCT4K2
            - --known-validator
            - GdnSyH3YtwcxFvQrVVJMm1JhTS4QVX7MFsX56uJLUfiZ
            - --known-validator
            - dDzy5SR3AXdYWVqbDEkVFdvSPCtS9ihF5kJkHCtXoFs
            - --known-validator
            - Ft5fbkqNa76vnsjYNwjDZUXoTWpP7VYm3mtsaQckQADN
            - --dynamic-port-range
            - "8000-8020"
            - --gossip-port
            - "8001"
            - --no-port-check
            - --wal-recovery-mode
            - skip_any_corrupted_record
            - --use-snapshot-archives-at-startup
            - when-newest
            - --geyser-plugin-config
            - /etc/yellowstone/config.json
            - --log
            - "-"
          env:
            - name: RUST_LOG
              value: "solana=info"
            - name: MALLOC_CONF
              value: "background_thread:true,metadata_thp:always,dirty_decay_ms:3000"
          ports:
            - name: rpc
              containerPort: 8899
              protocol: TCP
            - name: ws
              containerPort: 8900
              protocol: TCP
            - name: gossip-tcp
              containerPort: 8001
              protocol: TCP
            - name: gossip-udp
              containerPort: 8001
              protocol: UDP
            - name: grpc
              containerPort: 10000
              protocol: TCP
            - name: ys-metrics
              containerPort: 8999
              protocol: TCP
          volumeMounts:
            - name: accounts
              mountPath: /mnt/accounts
            - name: ledger
              mountPath: /mnt/ledger
            - name: identity
              mountPath: /etc/solana
              readOnly: true
            - name: yellowstone-plugin
              mountPath: /opt/yellowstone
              readOnly: true
            - name: yellowstone-config
              mountPath: /etc/yellowstone
              readOnly: true
          resources:
            requests:
              cpu: "16"
              memory: 512Gi
              hugepages-2Mi: 4Gi
            limits:
              cpu: "16"
              memory: 750Gi
              hugepages-2Mi: 4Gi
        # Gate: blocks until Agave RPC accepts connections
        - name: wait-for-rpc
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Agave RPC on port 8899..."
              until nc -z localhost 8899; do
                echo "RPC not ready, retrying in 15s..."
                sleep 15
              done
              echo "RPC is ready!"
      containers:
        - name: solana-exporter
          image: ghcr.io/asymmetric-research/solana-exporter:v3.0.2
          args:
            - -rpc-url=http://localhost:8899
            - -listen-address=:9179
            - -light-mode
          ports:
            - name: metrics
              containerPort: 9179
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9179
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9179
            periodSeconds: 15
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: accounts
          hostPath:
            path: /var/mnt/accounts
            type: DirectoryOrCreate
        - name: ledger
          hostPath:
            path: /var/mnt/ledger
            type: DirectoryOrCreate
        - name: identity
          secret:
            secretName: agave-identity
        - name: yellowstone-plugin
          hostPath:
            path: /var/mnt/yellowstone
            type: DirectoryOrCreate
        - name: yellowstone-config
          configMap:
            name: yellowstone-grpc-config
