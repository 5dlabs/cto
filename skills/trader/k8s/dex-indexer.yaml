---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex-indexer
  namespace: solana
  labels:
    app: dex-indexer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dex-indexer
  template:
    metadata:
      labels:
        app: dex-indexer
    spec:
      nodeSelector:
        kubernetes.io/hostname: db-01
      containers:
        - name: dex-indexer
          image: ghcr.io/5dlabs/dex-indexer:latest
          env:
            - name: GRPC_URL
              value: "http://10.172.144.41:10000"
            - name: QUESTDB_URL
              value: "http://questdb.questdb.svc:9000"
            - name: FLUSH_BATCH_SIZE
              value: "500"
            - name: FLUSH_INTERVAL_MS
              value: "250"
            - name: RUST_LOG
              value: "dex_indexer=info"
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "kill -0 1"
            periodSeconds: 30
            failureThreshold: 3
