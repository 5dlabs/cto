# Loki Helm values for Cherry trading cluster
# Chart: grafana/loki v6.16.0
# Storage: local-path (hostPath on db-01), single binary mode
# Deploy: helm install loki grafana/loki -n observability -f loki-values.yaml

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: "local-path"
    size: 50Gi
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  nodeSelector:
    kubernetes.io/hostname: db-01
  securityContext:
    fsGroup: 10001
    runAsUser: 10001
    runAsGroup: 10001
    runAsNonRoot: true

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: filesystem
  limits_config:
    ingestion_rate_mb: 128
    ingestion_burst_size_mb: 256
    max_streams_per_user: 50000
    per_stream_rate_limit: 50MB
    per_stream_rate_limit_burst: 100MB
    retention_period: 168h  # 7 days

gateway:
  enabled: true
  replicas: 1

# Disable components not needed for single binary
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

test:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
lokiCanary:
  enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false
