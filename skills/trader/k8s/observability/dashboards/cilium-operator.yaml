# Cilium control-plane/operator dashboard
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cilium-operator
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana.com/folder: "Trading Cluster"
data:
  cilium-operator.json: |
    {
      "title": "Cilium Operator",
      "uid": "cilium-operator",
      "description": "Cilium operator and Hubble control-plane health",
      "tags": ["kubernetes", "control-plane", "cilium"],
      "schemaVersion": 39,
      "version": 3,
      "refresh": "15s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          }
        ]
      },
      "panels": [
        {
          "title": "Cilium Operator Ready Replicas",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "kube_deployment_status_replicas_available{namespace=\"kube-system\", deployment=\"cilium-operator\"}", "refId": "A", "instant": true }]
        },
        {
          "title": "Hubble Relay Ready Replicas",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "kube_deployment_status_replicas_available{namespace=\"kube-system\", deployment=\"hubble-relay\"}", "refId": "A", "instant": true }]
        },
        {
          "title": "Hubble UI Ready Replicas",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "targets": [{ "expr": "kube_deployment_status_replicas_available{namespace=\"kube-system\", deployment=\"hubble-ui\"}", "refId": "A", "instant": true }]
        },
        {
          "title": "CoreDNS Ready Replicas",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "targets": [{ "expr": "kube_deployment_status_replicas_available{namespace=\"kube-system\", deployment=\"coredns\"}", "refId": "A", "instant": true }]
        },
        {
          "title": "Cilium Operator / Hubble Restarts (1h)",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 5 },
          "targets": [{ "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"kube-system\", pod=~\"cilium-operator.*|hubble-relay.*|hubble-ui.*\"}[1h]))", "refId": "A" }]
        },
        {
          "title": "Unavailable Replicas (operator and Hubble)",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 5 },
          "targets": [
            { "expr": "kube_deployment_status_replicas_unavailable{namespace=\"kube-system\", deployment=\"cilium-operator\"}", "refId": "A", "legendFormat": "cilium-operator" },
            { "expr": "kube_deployment_status_replicas_unavailable{namespace=\"kube-system\", deployment=\"hubble-relay\"}", "refId": "B", "legendFormat": "hubble-relay" },
            { "expr": "kube_deployment_status_replicas_unavailable{namespace=\"kube-system\", deployment=\"hubble-ui\"}", "refId": "C", "legendFormat": "hubble-ui" }
          ]
        }
      ]
    }
