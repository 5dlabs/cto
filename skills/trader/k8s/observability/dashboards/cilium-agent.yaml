# Cilium agent network-plane dashboard
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cilium-agent
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana.com/folder: "Trading Cluster"
data:
  cilium-agent.json: |
    {
      "title": "Cilium Agent",
      "uid": "cilium-agent",
      "description": "Cilium dataplane health, restarts, and agent logs",
      "tags": ["network", "cilium", "kubernetes"],
      "schemaVersion": 39,
      "version": 3,
      "refresh": "15s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          },
          {
            "name": "loki_datasource",
            "type": "datasource",
            "query": "loki",
            "current": { "text": "Loki", "value": "Loki" }
          }
        ]
      },
      "panels": [
        {
          "title": "Cilium Ready Pods",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "kube_daemonset_status_number_ready{namespace=\"kube-system\", daemonset=\"cilium\"}", "refId": "A", "instant": true }]
        },
        {
          "title": "Cilium Desired Pods",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "kube_daemonset_status_desired_number_scheduled{namespace=\"kube-system\", daemonset=\"cilium\"}", "refId": "A", "instant": true }]
        },
        {
          "title": "Cilium Envoy Ready Pods",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "targets": [{ "expr": "kube_daemonset_status_number_ready{namespace=\"kube-system\", daemonset=\"cilium-envoy\"}", "refId": "A", "instant": true }]
        },
        {
          "title": "Cilium Agent Restarts (1h)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "targets": [{ "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"kube-system\", container=\"cilium-agent\"}[1h]))", "refId": "A", "instant": true }]
        },
        {
          "title": "Node Receive Throughput (bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "targets": [{ "expr": "sum by (instance) (rate(node_network_receive_bytes_total{job=\"node-exporter\", device!=\"lo\"}[5m]))", "refId": "A" }]
        },
        {
          "title": "Node Transmit Throughput (bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "targets": [{ "expr": "sum by (instance) (rate(node_network_transmit_bytes_total{job=\"node-exporter\", device!=\"lo\"}[5m]))", "refId": "A" }]
        },
        {
          "title": "Cilium Pod Restarts by Pod (1h)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 13 },
          "targets": [
            { "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"kube-system\", container=~\"cilium-agent|cilium-envoy\"}[1h]))", "refId": "A" }
          ]
        },
        {
          "title": "Cilium / Envoy Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 21 },
          "datasource": { "type": "loki", "uid": "${loki_datasource}" },
          "targets": [{ "expr": "{namespace=\"kube-system\", container=~\"cilium-agent|cilium-envoy\"}", "refId": "A" }],
          "options": { "showTime": true, "showLabels": true, "sortOrder": "Descending", "wrapLogMessage": true }
        }
      ]
    }
