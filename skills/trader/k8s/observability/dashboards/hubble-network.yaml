# Hubble flows and DNS dashboard
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-hubble-network
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana.com/folder: "Trading Cluster"
data:
  hubble-network.json: |
    {
      "title": "Hubble Network & DNS",
      "uid": "hubble-network",
      "description": "Hubble flow visibility, DNS health, and Cilium datapath signal",
      "tags": ["network", "dns", "hubble", "cilium"],
      "schemaVersion": 39,
      "version": 3,
      "refresh": "15s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          },
          {
            "name": "loki_datasource",
            "type": "datasource",
            "query": "loki",
            "current": { "text": "Loki", "value": "Loki" }
          }
        ]
      },
      "panels": [
        {
          "title": "Hubble Relay Ready Replicas",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "kube_deployment_status_replicas_available{namespace=\"kube-system\", deployment=\"hubble-relay\"}", "refId": "A", "instant": true }]
        },
        {
          "title": "Hubble UI Ready Replicas",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "kube_deployment_status_replicas_available{namespace=\"kube-system\", deployment=\"hubble-ui\"}", "refId": "A", "instant": true }]
        },
        {
          "title": "CoreDNS Pods Ready",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(kube_pod_status_ready{namespace=\"kube-system\", pod=~\"coredns-.*\", condition=\"true\"})", "refId": "A", "instant": true }]
        },
        {
          "title": "Node Network Errors (rx+tx)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "targets": [{ "expr": "sum(rate(node_network_receive_errs_total{job=\"node-exporter\", device!=\"lo\"}[5m])) + sum(rate(node_network_transmit_errs_total{job=\"node-exporter\", device!=\"lo\"}[5m]))", "refId": "A", "instant": true }]
        },
        {
          "title": "Cilium/Hubble Scrape Up by Job",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "targets": [{ "expr": "sum by (job) (up{job=~\"cilium-agent|cilium-operator|hubble\"})", "refId": "A" }]
        },
        {
          "title": "Cilium/Hubble Restarts (1h)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "targets": [{ "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"kube-system\", pod=~\"cilium.*|hubble.*\"}[1h]))", "refId": "A" }]
        },
        {
          "title": "Hubble/Cilium Pod Count",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
          "targets": [{ "expr": "count(kube_pod_info{namespace=\"kube-system\", pod=~\"cilium.*|hubble.*\"})", "refId": "A" }]
        },
        {
          "title": "Node Throughput (bytes/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 13 },
          "targets": [
            { "expr": "sum by (instance) (rate(node_network_receive_bytes_total{job=\"node-exporter\", device!=\"lo\"}[5m]))", "refId": "A", "legendFormat": "rx {{instance}}" },
            { "expr": "sum by (instance) (rate(node_network_transmit_bytes_total{job=\"node-exporter\", device!=\"lo\"}[5m]))", "refId": "B", "legendFormat": "tx {{instance}}" }
          ]
        },
        {
          "title": "Hubble Relay / UI Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 12, "x": 0, "y": 21 },
          "datasource": { "type": "loki", "uid": "${loki_datasource}" },
          "targets": [{ "expr": "{namespace=\"kube-system\", pod=~\"hubble-relay.*|hubble-ui.*\"}", "refId": "A" }],
          "options": { "showTime": true, "showLabels": true, "sortOrder": "Descending", "wrapLogMessage": true }
        },
        {
          "title": "Cilium Agent Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 12, "x": 12, "y": 21 },
          "datasource": { "type": "loki", "uid": "${loki_datasource}" },
          "targets": [{ "expr": "{namespace=\"kube-system\", container=~\"cilium-agent|cilium-envoy\"}", "refId": "A" }],
          "options": { "showTime": true, "showLabels": true, "sortOrder": "Descending", "wrapLogMessage": true }
        }
      ]
    }
