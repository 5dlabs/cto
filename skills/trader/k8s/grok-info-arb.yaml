apiVersion: apps/v1
kind: Deployment
metadata:
  name: grok-info-arb
  namespace: trading
  labels:
    app: grok-info-arb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grok-info-arb
  template:
    metadata:
      labels:
        app: grok-info-arb
    spec:
      containers:
        - name: grok-info-arb
          image: registry.5dlabs.ai/5dlabs/runtime:trader
          command: ["node"]
          args: ["index.js"]
          workingDir: /app/skills/trader/grok-info-arb
          envFrom:
            - secretRef:
                name: trader-env
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
