apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cto-lite.fullname" . }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cto-lite.fullname" . }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
rules:
  # Argo Workflows management
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates", "cronworkflows"]
    verbs: ["*"]
  # Pod management for agents
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["*"]
  # ConfigMaps and Secrets for config
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["*"]
  # Services for internal routing
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cto-lite.fullname" . }}
  labels:
    {{- include "cto-lite.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cto-lite.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cto-lite.fullname" . }}
    namespace: {{ .Release.Namespace }}
