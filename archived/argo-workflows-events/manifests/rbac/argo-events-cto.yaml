---
# Allow argo-events-sa in automation namespace to create workflows in cto namespace
# This is required for GitHub webhook sensors to trigger play workflows
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-workflows-cto
  namespace: cto
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-workflow-controller
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: automation
---
# Allow argo-events-sa to create CodeRun CRDs in cto namespace
# This is required for Stitch PR review sensor to trigger code reviews
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-events-coderuns
  namespace: cto
rules:
  - apiGroups: ["agents.platform"]
    resources: ["coderuns"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-coderuns
  namespace: cto
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-events-coderuns
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: automation
