---
# =========================================================================
# DEPRECATED: Project Intake WorkflowTemplate
# =========================================================================
#
# STATUS: DEPRECATED - DO NOT USE FOR NEW INTAKE WORKFLOWS
#
# This WorkflowTemplate has been superseded by direct CodeRun creation
# from the PM server. The new architecture:
#
#   1. PM server receives Linear webhook (Morgan assigned to PRD issue)
#   2. PM server reads project-specific cto-config.json from ConfigMap
#   3. PM server creates CodeRun CR directly (no Argo workflow)
#   4. Controller processes CodeRun, Morgan handles GitHub setup + intake
#   5. Linear sidecar logs all progress to the issue
#
# Benefits of new approach:
#   - Single CodeRun with Linear sidecar logging ALL progress
#   - Project-specific settings from cto-config.json are used
#   - Simpler architecture (no multi-step Argo workflow)
#   - GitHub repo creation logged to Linear (was previously silent)
#
# This file is kept for backwards compatibility with any in-flight
# workflows. New intake requests should NOT use this template.
#
# Migration: See crates/pm/src/handlers/intake.rs for the new
# submit_intake_coderun() function that creates CodeRun directly.
#
# =========================================================================
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: project-intake
  namespace: cto
  labels:
    app.kubernetes.io/name: controller
    app.kubernetes.io/component: project-intake
    app.kubernetes.io/managed-by: Helm
  annotations:
    deprecated: "true"
    deprecation-message: "Use direct CodeRun creation from PM server instead"
spec:
  activeDeadlineSeconds: 7200
  serviceAccountName: argo-workflow
  entrypoint: deprecated-notice
  arguments:
    parameters:
      - name: configmap-name
        description: "DEPRECATED - Name of the ConfigMap containing intake files"
        value: ""
      - name: project-name
        description: "DEPRECATED - Project name"
        value: ""

  templates:
    # =========================================================================
    # Deprecated Entry Point - Shows deprecation notice
    # =========================================================================
    - name: deprecated-notice
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          #!/bin/sh
          echo "=============================================="
          echo "DEPRECATED: project-intake WorkflowTemplate"
          echo "=============================================="
          echo ""
          echo "This Argo WorkflowTemplate is deprecated."
          echo ""
          echo "Intake workflows now use direct CodeRun creation:"
          echo "  1. PM server creates CodeRun CR directly"
          echo "  2. Controller processes CodeRun"
          echo "  3. Morgan handles GitHub setup + intake in single pod"
          echo "  4. Linear sidecar logs all progress"
          echo ""
          echo "If you see this message, the PM server needs to be updated"
          echo "to use the new submit_intake_coderun() function."
          echo ""
          exit 1
