---
# Agent @Mention Sensor
# Triggers on PR comments and review comments containing @5DLabs-{agent}
# Filtering for @mention pattern is done in the handler
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: agent-mention
  namespace: automation
  labels:
    app.kubernetes.io/name: agent-mention
spec:
  dependencies:
    # All comment events (issue_comment and pull_request_review_comment)
    - name: comment-event
      eventSourceName: github
      eventName: org
      filters:
        data:
          # Accept both comment event types
          - path: body.X-GitHub-Event
            type: string
            value:
              - issue_comment
              - pull_request_review_comment
          # Only on created comments (not edited/deleted)
          - path: body.action
            type: string
            value:
              - created
  template:
    serviceAccountName: argo-events-sa
  triggers:
    - template:
        name: handle-comment-mention
        conditions: comment-event
        http:
          url: http://cto-pm.cto.svc.cluster.local:8081/webhooks/github/mention
          method: POST
          headers:
            Content-Type: application/json
            # Note: Handler auto-detects event type from payload body (X-GitHub-Event field)
            # or falls back to structure detection (issue vs pull_request fields)
          payload:
            - src:
                dependencyName: comment-event
                dataKey: body
              dest: payload
      retryStrategy:
        steps: 3
        duration: 5s
