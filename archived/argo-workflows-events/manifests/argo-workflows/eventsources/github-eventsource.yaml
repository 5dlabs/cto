---
# =============================================================================
# GitHub EventSource
# =============================================================================
# Receives webhook events from GitHub for the 5dlabs organization.
# Events are consumed by Sensors to trigger workflows.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: github
  namespace: automation
  labels:
    app.kubernetes.io/name: github-eventsource
    app.kubernetes.io/component: webhooks
    platform.5dlabs.io/log-collection: enabled
spec:
  github:
    org:
      # Listen for all GitHub events from the organization
      events:
        - "*"
      organizations:
        - 5dlabs
      webhook:
        endpoint: /github/webhook
        port: "12000"
      # Webhook secret for signature verification
      secret:
        name: github-webhook-secret
        key: secret
  template:
    metadata:
      labels:
        app.kubernetes.io/component: webhooks
        platform.5dlabs.io/log-collection: enabled
      annotations:
        logs.platform.5dlabs.io/collect: "true"
        logs.platform.5dlabs.io/service: github-webhooks
