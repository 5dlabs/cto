---
# =============================================================================
# ArgoCD Application: GitHub Webhooks
# =============================================================================
# Manages Argo Events resources for GitHub webhook handling:
# - EventSource: Receives webhooks from GitHub
# - Sensors: React to events and trigger actions (Stitch reviews, etc.)
#
# Deployed to automation namespace (where Argo Events controller runs)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: github-webhooks
  namespace: argocd
  labels:
    app.kubernetes.io/name: github-webhooks
    app.kubernetes.io/part-of: platform
  annotations:
    # Deploy after Argo Events CRDs/controllers and CTO workflow templates
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  sources:
    # EventSources
    - repoURL: https://github.com/5dlabs/cto
      targetRevision: main
      path: infra/gitops/manifests/argo-workflows/eventsources

    # Sensors
    - repoURL: https://github.com/5dlabs/cto
      targetRevision: main
      path: infra/gitops/manifests/argo-workflows/sensors

  destination:
    server: https://kubernetes.default.svc
    namespace: automation

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
  revisionHistoryLimit: 5
